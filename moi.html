            display:"block",textDecoration:"none",color:"inherit",
            cursor:d.comingSoon?"default":"pointer",opacity:d.comingSoon?0.55:1};
          const hover=e=>{e.currentTarget.style.borderColor=d.color;e.currentTarget.style.background=C.s2;e.currentTarget.style.transform="translateY(-2px)";};
          const unhover=e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.borderTopColor=d.color;e.currentTarget.style.background=C.s1;e.currentTarget.style.transform="none";};
          // A directorate that is not open yet is shown, but does not lead anywhere.
          if(d.comingSoon) return <div key={d.key} style={cardStyle} title="This directorate is not yet open.">{inner}</div>;
          return d.external
            ?<a key={d.key} href={d.href} style={cardStyle} onMouseEnter={hover} onMouseLeave={unhover}>{inner}</a>
            :<div key={d.key} onClick={()=>onSelect(d.key)} style={cardStyle} onMouseEnter={hover} onMouseLeave={unhover}>{inner}</div>;
        })}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [raw,setRaw]=useState({});
  const [section,setSection]=useState(null);
  const [toast,setToast]=useState({msg:"",color:C.accent});
  const [processing,setProcessing]=useState(null);
  const [loading,setLoading]=useState(false);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color});
    setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  // Derived state
  const accounts=useMemo(()=>{
    const a={};
    Object.entries(raw).forEach(([k,v])=>{ if(k.startsWith("mi_acc_")&&v) a[v.username]=v; });
    Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{ if(!a[k]) a[k]=v; });
    return a;
  },[raw]);
  const lssOps=useMemo(()=>raw["mi_lss_ops"]||{},[raw]);
  const lssDocs=useMemo(()=>raw["mi_lss_docs"]||{},[raw]);
  const lfpOps=useMemo(()=>raw["mi_lfp_ops"]||{},[raw]);
  const arrests=useMemo(()=>raw["mi_arrests"]||{},[raw]);
  const mowAlert=useMemo(()=>raw["mow_alert"]||null,[raw]);

  const handleLogin=(u,rawData)=>{
    setUser(u); setRaw(rawData);
    setSection(null);
  };

  const refresh=useCallback(async()=>{
    const newRaw=await sgetAll();
    setRaw(newRaw);
    // Update current user from fresh data
    const freshAccs={};
    Object.entries(newRaw).forEach(([k,v])=>{ if(k.startsWith("mi_acc_")&&v) freshAccs[v.username]=v; });
    Object.entries(newRaw["mi_accounts"]||{}).forEach(([k,v])=>{ if(!freshAccs[k]) freshAccs[k]=v; });
    if(user) setUser(freshAccs[user.username]||user);
  },[user]);

  const onUpdateAccount=useCallback(async(uname,patch,isNew=false)=>{
    const key=uname.toLowerCase();
    // Build current accounts for existence check
    const curAccs={};
    Object.entries(raw).forEach(([k,v])=>{ if(k.startsWith("mi_acc_")&&v) curAccs[v.username]=v; });
    Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{ if(!curAccs[k]) curAccs[k]=v; });
    if(patch===null){
      await deleteRecord("accounts",key);
      const next={...curAccs}; delete next[key];
      setRaw(r=>({...r,"mi_accounts":next}));
      return;
    }
    if(isNew&&curAccs[key]){return "exists";}
    const updated={...(curAccs[key]||{}), ...patch, username:key};
    await saveRecord("accounts",updated);
    const next={...curAccs,[key]:updated};
    setRaw(r=>({...r,"mi_accounts":next}));
    if(user&&user.username===key) setUser({...user,...patch});
  },[raw,user]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createOp"){
      const {chamber,op}=payload;
      const key="mi_"+chamber+"_ops";
      const id="op_"+uid();
      const newOp={...op,id,created:Date.now()};
      setRaw(r=>({...r,[key]:{...r[key]||{},[id]:newOp}}));
      await saveRecord(key,newOp);
    }
    else if(type==="updateOpStatus"){
      const {chamber,opId,status,progress}=payload;
      const key="mi_"+chamber+"_ops";
      const cur=raw[key]||{}; if(!cur[opId]) return;
      const updated={...cur[opId],status,progress};
      setRaw(r=>({...r,[key]:{...r[key]||{},[opId]:updated}}));
      await saveRecord(key,updated);
    }
    else if(type==="addOpNote"){
      const {chamber,opId,note}=payload;
      const key="mi_"+chamber+"_ops";
      const cur=raw[key]||{}; if(!cur[opId]) return;
      const updated={...cur[opId],notes:[...(cur[opId].notes||[]),note]};
      setRaw(r=>({...r,[key]:{...r[key]||{},[opId]:updated}}));
      await saveRecord(key,updated);
    }
    else if(type==="deleteOp"){
      const {chamber,opId}=payload;
      const key="mi_"+chamber+"_ops";
      const ops={...raw[key]||{}}; delete ops[opId];
      setRaw(r=>({...r,[key]:ops}));
      await deleteRecord(key,opId);
    }
    else if(type==="createDoc"){
      const {chamber,doc}=payload;
      const key="mi_"+chamber+"_docs";
      const id="doc_"+uid();
      const newDoc={...doc,id,created:Date.now()};
      setRaw(r=>({...r,[key]:{...r[key]||{},[id]:newDoc}}));
      await saveRecord(key,newDoc);
    }
    else if(type==="deleteDoc"){
      const {chamber,docId}=payload;
      const key="mi_"+chamber+"_docs";
      const docs={...raw[key]||{}}; delete docs[docId];
      setRaw(r=>({...r,[key]:docs}));
      await deleteRecord(key,docId);
    }
    else if(type==="createArrest"){
      const {arrest}=payload;
      const id="arr_"+uid();
      const caseNum="LFP-"+String(Date.now()).slice(-6);
      const newArrest={...arrest,id,caseNumber:caseNum,created:Date.now()};
      setRaw(r=>({...r,"mi_arrests":{...r["mi_arrests"]||{},[id]:newArrest}}));
      await saveRecord("mi_arrests",newArrest);
    }
    else if(type==="addArrestNote"){
      const {arrestId,note}=payload;
      const cur=raw["mi_arrests"]||{}; if(!cur[arrestId]) return;
      const updated={...cur[arrestId],notes:[...(cur[arrestId].notes||[]),note]};
      setRaw(r=>({...r,"mi_arrests":{...r["mi_arrests"]||{},[arrestId]:updated}}));
      await saveRecord("mi_arrests",updated);
    }
    else if(type==="updateArrestStatus"){
      const {arrestId,status}=payload;
      const cur=raw["mi_arrests"]||{}; if(!cur[arrestId]) return;
      const updated={...cur[arrestId],status};
      setRaw(r=>({...r,"mi_arrests":{...r["mi_arrests"]||{},[arrestId]:updated}}));
      await saveRecord("mi_arrests",updated);
    }
    else if(type==="deleteArrest"){
      const {arrestId}=payload;
      const arr={...raw["mi_arrests"]||{}}; delete arr[arrestId];
      setRaw(r=>({...r,"mi_arrests":arr}));
      await deleteRecord("mi_arrests",arrestId);
    }
  },[raw]);

  if(!user) return<LoginScreen onLogin={handleLogin}/>;

  const isLSS=canSeeLSS(user);
  const isLFP=canSeeLFP(user);
  const isIMC=canSeeIMC(user);
  const isMinister=hasRole(user,"minister");
  const isEmperor=user.role==="emperor";

  const DESTINATIONS=[
    {key:"clearances",title:"Human Resources",tag:"PERSONNEL MANAGEMENT",icon:"🗂",color:"#3a9a6a",
     desc:"Clearance tracker and personnel directory. Review and manage staff security classifications.",
     access:"ALL PERSONNEL"},
    ...(isLSS?[{key:"lss",title:"Lech Security Service",tag:"INTERNAL INTELLIGENCE",icon:"🕵",color:"#4a88ff",
     desc:"Classified operations, intelligence documents, and field personnel for internal security.",
     access:"LSS CLEARANCE"}]:[]),
    ...(isLFP?[{key:"lfp",title:"Lech Federal Police",tag:"LAW ENFORCEMENT",icon:"⚖",color:"#cc7a10",
     desc:"Police operations, arrest records, and case management for federal law enforcement.",
     access:"LFP CLEARANCE"}]:[]),
    ...(isIMC?[{key:"imc",title:"Imperial Maritime Commission",tag:"SHIP & PORT REGISTRY",icon:"⚓",color:"#2a8ab4",
     desc:"Vessel and port registration, home-port assignment, and maritime registry administration. The Commission is being stood up — access will open in due course.",
     access:"IMC CLEARANCE",comingSoon:true}]:[]),
    ...(isMinister?[{key:"minister",title:"Minister's Office",tag:"DIRECTORATE ADMINISTRATION",icon:"🎖",color:"#8a6acc",
     desc:"Account management, permission assignment, and ministry-wide oversight.",
     access:"MINISTER"}]:[]),
    ...(isEmperor?[{key:"emperor",title:"Imperial Authority",tag:"SUPREME ADMINISTRATION",icon:"👑",color:C.gold,
     desc:"Full account and role control, including appointment of ministers.",
     access:"EMPEROR"}]:[]),
  ];

  const SECTION_META={
    clearances:{title:"Human Resources",color:"#3a9a6a"},
    lss:{title:"Lech Security Service",color:"#4a88ff"},
    lfp:{title:"Lech Federal Police",color:"#cc7a10"},
    minister:{title:"Minister's Office",color:"#8a6acc"},
    emperor:{title:"Imperial Authority",color:C.gold},
  };
  const meta=section?SECTION_META[section]:null;

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <Toast msg={toast.msg} color={toast.color}/>
      <Overlay label={processing}/>

      {/* Header */}
      <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0.85rem 1.25rem"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",gap:"1.5rem",flexWrap:"wrap"}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
            padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <div onClick={()=>setSection(null)} style={{cursor:"pointer"}} title="Return to main menu">
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,
              letterSpacing:"0.15em",color:C.text,lineHeight:1}}>Ministry of the Interior</div>
            <div className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginTop:2}}>
              Empire of Lech — Secure Intranet
            </div>
          </div>
          <div style={{flex:1}}/>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <ClearanceBadge level={user.clearance||0}/>
            <RoleBadge role={user.role}/>
            <span className="mono" style={{fontSize:10,color:C.textD}}>{user.username}{user.displayName&&<span style={{color:C.textDD,marginLeft:6,fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>({user.displayName})</span>}</span>
            {mowAlert&&mowAlert.level<=3&&(
              <div style={{display:"flex",alignItems:"center",gap:6,
                background:mowAlert.level===1?"#1a0808":mowAlert.level===2?"#1a0a00":"#1a1000",
                border:`1px solid ${mowAlert.level===1?"#8b1010":mowAlert.level===2?"#8a3a00":"#6a4000"}`,
                borderRadius:2,padding:"3px 10px"}}>
                <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,
                  background:mowAlert.level===1?"#cc2222":mowAlert.level===2?"#cc6a10":"#C9A84C"}}/>
                <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,letterSpacing:"0.1em",
                  color:mowAlert.level===1?"#cc2222":mowAlert.level===2?"#cc6a10":"#C9A84C"}}>
                  IRL-{mowAlert.level}
                </span>
              </div>
            )}
            <Btn small variant="ghost" onClick={()=>setUser(null)}>LOGOUT</Btn>
          </div>
        </div>
      </div>

      {/* Breadcrumb bar — only inside a section */}
      {section&&meta&&(
        <div style={{background:C.s2,borderBottom:`1px solid ${C.border}`}}>
          <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",gap:14,
            padding:"0.6rem 1.25rem"}}>
            <button onClick={()=>setSection(null)}
              style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",
                textTransform:"uppercase",background:"transparent",border:`1px solid ${C.border}`,
                borderRadius:2,color:C.textD,cursor:"pointer",padding:"5px 12px"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=meta.color;e.currentTarget.style.color=meta.color;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textD;}}>
              ← Main Menu
            </button>
            <span style={{color:C.textDD}}>/</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,letterSpacing:"0.18em",
              textTransform:"uppercase",color:meta.color}}>{meta.title}</span>
          </div>
        </div>
      )}

      {/* Content */}
      {!section?(
        <MainMenu user={user} destinations={DESTINATIONS} onSelect={setSection}/>
      ):(
        <div style={{maxWidth:1100,margin:"0 auto",padding:"1.5rem 1.25rem"}}>
          {section==="clearances"&&<ClearanceTracker accounts={accounts} currentUser={user} onUpdate={onUpdateAccount} notify={notify} setProcessing={setProcessing}/>}
          {section==="lss"&&isLSS&&<LSSSection currentUser={user} accounts={accounts} lssOps={lssOps} lssDocs={lssDocs} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
          {section==="lfp"&&isLFP&&<LFPSection currentUser={user} accounts={accounts} lfpOps={lfpOps} arrests={arrests} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
          {section==="minister"&&isMinister&&<MinisterPanel currentUser={user} accounts={accounts} onUpdate={onUpdateAccount} notify={notify} setProcessing={setProcessing}/>}
          {section==="emperor"&&isEmperor&&<EmperorPanel currentUser={user} accounts={accounts} onUpdate={onUpdateAccount} notify={notify} setProcessing={setProcessing}/>}
        </div>
      )}

      {/* Footer */}
      <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
        <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,
          letterSpacing:"0.15em",textAlign:"center"}}>
          Ministry of the Interior · Empire of Lech · All access is logged · Gott mit uns
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
