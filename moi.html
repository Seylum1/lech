<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0808;color:#e0d4c8;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0a0808;}
::-webkit-scrollbar-thumb{background:#1e3a5a;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
a{color:#4a9acc;text-decoration:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes shimmer{0%,100%{opacity:.7;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}
.mono{font-family:'Share Tech Mono',monospace;}
/* Sealed MDT record */
@keyframes sealSweep{0%{transform:translateY(-120%);}100%{transform:translateY(520%);}}
@keyframes sealFlicker{0%,100%{opacity:.85;}47%{opacity:.85;}48%{opacity:.35;}52%{opacity:.9;}53%{opacity:.6;}}
@keyframes sealStamp{0%{transform:rotate(-8deg) scale(2.4);opacity:0;}
  60%{transform:rotate(-8deg) scale(.94);opacity:1;}
  100%{transform:rotate(-8deg) scale(1);opacity:1;}}
.sealTape{background-image:repeating-linear-gradient(45deg,#cc2222 0 12px,#180808 12px 24px);}
.sealScan{position:absolute;left:0;right:0;height:56px;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(204,34,34,.10),transparent);
  animation:sealSweep 3.6s linear infinite;}
@keyframes treadIn{0%{transform:scale(.82) rotate(-2deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxLu8jQehAZJEvMEeCLoHc9S2C4FM8o9fQh8Pp4gMzDNwwIG0S9qLJ5-1gyGM1c_InUfQ/exec";
// The Bundeskongress keeps its own store. Its seating chart and officials list
// are the source of truth for legislative standing; the Interior only reads them.
const BK_SCRIPT_URL="https://script.google.com/macros/s/AKfycbz37c5Okp9c7PkXv38x2lq7Is3RifkJPee5ASb2KQfA7EJgsN0NwrigmiRr1a_G0E6d4Q/exec";

// Mirrors the Bundeskongress's own derivation: standing follows the seating
// chart and the officials list, so there is no separate flag to fall out of date.
function bkStandingFor(acc,bk){
  if(!acc||!bk) return "";
  const u=String(acc.username||"").toLowerCase();
  const d=String(acc.displayName||"").toLowerCase();
  if(!u) return "";
  const off=bk.officials||{};
  const seatIn=(roster)=>Object.values(roster||{}).find(m=>
    String(m.username||"").toLowerCase()===u
    ||(!m.username&&!!d&&String(m.name||"").toLowerCase()===d));

  const seat=seatIn(bk.members), bhSeat=seatIn(bk.bundesherren);
  // Offices recorded before usernames were kept hold a bare name, which may be
  // the username or the display name — match either.
  const aliases=[u,d,String(seat?.name||"").toLowerCase(),String(bhSeat?.name||"").toLowerCase()].filter(Boolean);
  const holds=(userKey,nameKey)=>{
    const stored=String(off[userKey]||"").toLowerCase();
    if(stored) return stored===u;
    const bare=String(off[nameKey]||"").toLowerCase();
    return !!bare&&bare!=="vacant"&&aliases.includes(bare);
  };

  const parts=[];
  if(holds("president_bt_username","president_bt")) parts.push("President of the Bundestag");
  else if(seat) parts.push("Sitting Member of the Bundestag");
  if(holds("president_bh_username","president_bh")) parts.push("President of the Bundesherren");
  else if(bhSeat) parts.push("Bundesherr");

  if(seat?.seats) parts.push(seat.seats+" seats");
  if(holds("chancellor_username","chancellor")) parts.push("Imperial Chancellor");
  const mu=off.minister_usernames||{};
  Object.entries(off.ministers||{}).forEach(([portfolio,name])=>{
    const stored=String(mu[portfolio]||"").toLowerCase();
    const hit=stored?stored===u:(!!name&&String(name).toLowerCase()!=="vacant"&&aliases.includes(String(name).toLowerCase()));
    if(hit) parts.push(portfolio);
  });
  return parts.join(" · ");
}

// ── CLEARANCE ─────────────────────────────────────────────────────────────────
const CLEARANCE=[
  {level:0,code:"UNCLASSIFIED",         short:"UC", color:"#2a9a4a",bg:"#0a1a0e",border:"#1a4a2a"},
  {level:1,code:"RELIABILITY SCREENING",short:"RS", color:"#5a9a7a",bg:"#0a1810",border:"#1a4a30"},
  {level:2,code:"CONFIDENTIAL",         short:"C",  color:"#2a6acc",bg:"#0a1228",border:"#1a3a6a"},
  {level:3,code:"SECRET",               short:"S",  color:"#cc7a10",bg:"#1a1000",border:"#6a3a00"},
  {level:4,code:"TOP SECRET",           short:"TS", color:"#cc2222",bg:"#1a0808",border:"#6a1010"},
  {level:5,code:"TS/SCI",               short:"SCI",color:"#9a22cc",bg:"#150a1a",border:"#5a1a6a"},
];
const CL=(level)=>CLEARANCE[Math.max(0,Math.min(5,level||0))];

// ── ROLES ─────────────────────────────────────────────────────────────────────
// ── SYSTEM ROLE ───────────────────────────────────────────────────────────────
// An account's standing in the Ministry itself, and nothing else. Standing in an
// agency is a separate thing — see the agency roles below.
//
// The agency roles used to live on this same ladder, which was wrong twice over.
// It made rank meaningless across parallel agencies (an LSS Director and an LFP
// Director both sat at rank 2, so each satisfied a check for the other and
// picked up the other's powers), and it duplicated the "Assigned" checkboxes,
// which granted the same access by a second route.
const ROLES=[
  {v:"citizen",      l:"Civilian",                   rank:0},
  {v:"minister",     l:"Minister of the Interior",   rank:3},
  {v:"emperor",      l:"Emperor",                    rank:4},
];
// Roles retired from the ladder. Kept so existing accounts still resolve to a
// label and are read correctly, but they carry no Ministry authority of their
// own — their agency standing is derived by lssRole()/lfpRole() below.
const LEGACY_ROLES={
  lss_agent:"LSS Agent (legacy)", lss_director:"LSS Director (legacy)",

function idHash(s){s=(s||"").toLowerCase();let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0;}return h>>>0;}
function genIdNumber(username,code){const six=(idHash("id:"+username)%900000)+100000;return "LEC-"+code+"-"+six;}
function idIssueDate(username){const start=new Date(2022,0,1).getTime();const span=new Date(2026,0,1).getTime()-start;return new Date(start+(idHash("date:"+username)%span));}
function fmtIdDate(d){const m=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];return (d.getDate()<10?"0":"")+d.getDate()+" "+m[d.getMonth()]+" "+d.getFullYear();}
// Procedural guilloché rosette: `copies` rotated rose curves woven into one path (banknote-style).
function guillochePath(cx,cy,rad,petals,depth,copies){
  var d="",TAU=Math.PI*2,S=100;
  for(var j=0;j<copies;j++){var ph=j*TAU/(petals*copies);
    for(var i=0;i<=S;i++){var t=i/S*TAU,rr=rad*(1-depth+depth*Math.cos(petals*t)),a=t+ph;
      d+=(i?"L":"M")+(cx+rr*Math.cos(a)).toFixed(1)+" "+(cy+rr*Math.sin(a)).toFixed(1)+" ";}}
  return d;
}

// ── BACKEND ───────────────────────────────────────────────────────────────────
async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
// ── MongoDB backend (Render API) ───────────────────────────────────────────────
// This page now runs on the new server. Reads arrive already filtered to what
// the signed-in account may see; writes go one record at a time and are
// authorised server-side.
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
async function sgetAll(){
  try{
    const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));
    const d=await r.json();
    return (d&&d.ok)?(d.data||{}):{};
  }catch{return{};}
}
async function slogin(username,password){
  try{
    const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:String(username||"").trim(),password})});
    const d=await r.json();
    if(d&&d.ok){AUTH_TOKEN=d.token;return {ok:true,account:d.account};}
    return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};
  }catch(e){return {ok:false,error:"Connection error"};}
}
// Upsert or remove a single record; the server owns the collection and checks
// the caller's authority before touching it.
async function saveRecord(collection,record){
  try{const r=await fetch(API+"/api/write",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:AUTH_TOKEN,collection,record})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}
}
async function deleteRecord(collection,id){
  try{await fetch(API+"/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:AUTH_TOKEN,collection,id})});return true;}catch{return false;}
}

function STitle({children,color,style:extra={}}){
  return<div style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
    letterSpacing:"0.35em",textTransform:"uppercase",color:color||C.accent,
    paddingBottom:8,borderBottom:`1px solid ${C.border}`,marginBottom:"1.25rem",...extra}}>
    {children}
  </div>;
}
function Card({children,style:extra={}}){
  return<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",...extra}}>
    {children}
  </div>;
}
function Toast({msg,color}){
  if(!msg) return null;
  return<div style={{position:"fixed",top:14,right:14,zIndex:9999,background:C.s2,
    border:`1px solid ${color}55`,borderLeft:`3px solid ${color}`,padding:"8px 16px",borderRadius:2,
    fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.1em",color,
    animation:"fadeIn .2s ease",maxWidth:360}}>{msg}</div>;
}
function Overlay({label}){
  if(!label) return null;
  return<div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(4,8,16,.95)",
    display:"flex",alignItems:"center",justifyContent:"center"}}>

        animation:"pulse 1s infinite"}}>PROCESSING</div>

    </div>
  </div>;
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [scanPos,setScanPos]=useState(0);

  useEffect(()=>{
    const id=setInterval(()=>setScanPos(p=>(p+0.4)%100),30);
    return()=>clearInterval(id);
  },[]);

  const doLogin=async()=>{
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true); setErr("");
    try{
      const res=await slogin(username,password);
      if(!res.ok){setErr((res.error||"ACCESS DENIED")+" — Invalid credentials.");setLoading(false);return;}
      const raw=await sgetAll();
      // Build accounts from per-row keys (mi_acc_<username>), then the legacy blob.
      const accounts={};
      Object.entries(raw).forEach(([k,v])=>{ if(k.startsWith("mi_acc_")&&v) accounts[v.username]=v; });
      Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{ if(!accounts[k]) accounts[k]=v; });
      setErr("");
      onLogin(res.account,{...raw,"mi_accounts":accounts});
    }catch(e){
      console.error("Login error:", e);
      setErr("Connection error — check network: "+e.message);
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#04080f",display:"flex",alignItems:"center",
                  justifyContent:"center",position:"relative",overflow:"hidden"}}>
      {/* Background grid */}
      <div style={{position:"absolute",inset:0,
        backgroundImage:"linear-gradient(#0d1a2a22 1px,transparent 1px),linear-gradient(90deg,#0d1a2a22 1px,transparent 1px)",
        backgroundSize:"40px 40px"}}/>
      {/* Scan line */}
      <div style={{position:"absolute",left:0,right:0,height:2,
        background:"linear-gradient(to right,transparent,#C9A84C22,transparent)",
        top:`${scanPos}%`,transition:"top 0.03s linear",zIndex:1,pointerEvents:"none"}}/>
      {/* Corner brackets */}
      {[{t:20,l:20,r:"auto",b:"auto"},{t:20,r:20,l:"auto",b:"auto"},
        {b:20,l:20,t:"auto",r:"auto"},{b:20,r:20,t:"auto",l:"auto"}].map((pos,i)=>(
        <div key={i} style={{position:"absolute",width:30,height:30,...pos,zIndex:2,
          borderTop:i<2?"2px solid #3399cc44":"none",
          borderBottom:i>=2?"2px solid #3399cc44":"none",
          borderLeft:i%2===0?"2px solid #3399cc44":"none",
          borderRight:i%2===1?"2px solid #3399cc44":"none"}}/>
      ))}

      <div className="fadeIn" style={{position:"relative",zIndex:10,width:"100%",maxWidth:420,padding:"0 20px"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <div className="mono" style={{fontSize:9,letterSpacing:"0.5em",color:C.accent,marginBottom:12,
            animation:"pulse 3s infinite"}}>Empire of Lech — Classified Network</div>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,
            letterSpacing:"0.1em",color:"#e8d4bc",lineHeight:1.2,marginBottom:4}}>
            Ministry of<br/>the Interior
          </div>
          <div className="mono" style={{fontSize:9,letterSpacing:"0.3em",color:"#5a3a30",marginTop:8}}>
            Secure Intranet — Authorised Access Only
          </div>
          {/* Redaction bars for flavor */}
          <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:16}}>
            {[60,40,80,30].map((w,i)=>(
              <div key={i} style={{height:8,width:w,background:"#2a1a10",borderRadius:1}}/>
            ))}
          </div>
        </div>

        {/* Login card */}
        <div style={{background:"#0d1520",border:"1px solid #1e3a5a",borderRadius:3,padding:"2rem"}}>
          <div className="mono" style={{fontSize:9,letterSpacing:"0.25em",color:C.accent,marginBottom:"1.5rem",
            borderBottom:"1px solid #1e2d3d",paddingBottom:8}}>
            Authentication Required
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
            <div>
              <FL>USERNAME</FL>
              <Inp value={username} onChange={setUsername} placeholder="Enter username"
                style={{letterSpacing:"0.08em"}}/>
            </div>
            <div>
              <FL>PASSWORD</FL>
              <Inp value={password} onChange={setPassword} placeholder="Enter password" type="password"
                style={{letterSpacing:"0.15em"}}/>
            </div>
            {err&&(
              <div className="mono" style={{fontSize:10,letterSpacing:"0.08em",color:C.redL,
                background:C.s3,border:`1px solid ${C.redD}44`,padding:"8px 12px",borderRadius:2}}>
                {err}
              </div>
            )}
            <Btn onClick={doLogin} disabled={loading||!username.trim()||!password.trim()}>
              {loading?"AUTHENTICATING…":"AUTHENTICATE"}
            </Btn>
          </div>
          <div className="mono" style={{fontSize:9,color:C.textDD,marginTop:"1.25rem",lineHeight:1.7,
            borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem"}}>
            Unauthorised access is logged and prosecuted under Imperial law.
          </div>
        </div>
      </div>
    </div>
  );
}

// ── CLEARANCE TRACKER ─────────────────────────────────────────────────────────
function ClearanceTracker({accounts,currentUser,onUpdate,notify,setProcessing}){
  const [search,setSearch]=useState("");
  const [filterCl,setFilterCl]=useState("all");
  const [expanded,setExpanded]=useState(null);

  const isAdmin=hasRole(currentUser,"minister");

  const list=Object.values(accounts||{})
    .filter(a=>{
      const q=search.toLowerCase();
      const matchQ=!q||a.displayName?.toLowerCase().includes(q)||a.username.toLowerCase().includes(q)||a.ministry?.toLowerCase().includes(q);
      const matchCl=filterCl==="all"||String(a.clearance)===filterCl;
      return matchQ&&matchCl;
    })
    .sort((a,b)=>(b.clearance||0)-(a.clearance||0)||(a.displayName||a.username).localeCompare(b.displayName||b.username));

  return(
    <div className="fadeIn">
      <STitle>Clearance Tracker</STitle>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:200}}>
          <FL>SEARCH</FL>
          <Inp value={search} onChange={setSearch} placeholder="Name, username, ministry…"/>
        </div>
        <div style={{flex:1,minWidth:140}}>
          <FL>CLEARANCE</FL>
          <DD value={filterCl} onChange={setFilterCl} options={[{v:"all",l:"All Levels"},...CLEARANCE.map(c=>({v:String(c.level),l:c.code}))]}/>
        </div>
      </div>

      {list.length===0?(
        <div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No records matching criteria.</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {list.map(acc=>{
            const cl=CL(acc.clearance||0);
            const isOpen=expanded===acc.username;
            return(
              <div key={acc.username} style={{background:C.s1,border:`1px solid ${isOpen?cl.border:C.border}`,
                borderLeft:`4px solid ${cl.color}`,borderRadius:"0 3px 3px 0",overflow:"hidden"}}>
                <div onClick={()=>setExpanded(isOpen?null:acc.username)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
                  <ClearanceBadge level={acc.clearance||0}/>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:600,
                    color:C.text,flex:1,minWidth:120}}>{acc.username}</span>
                  <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{acc.displayName||""}</span>
                  <span style={{fontSize:12,color:C.textDD,fontStyle:"italic"}}>{acc.ministry||"—"}</span>
                  <span style={{fontSize:11,color:C.textDD}}>{isOpen?"▲":"▼"}</span>
                </div>
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",background:C.s2}}>
                    <div style={{display:"flex",gap:"2rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
                      <div>
                        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>ROLE</div>
                        <RoleBadge role={acc.role}/>
                      </div>
                      <div>
                        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>MINISTRY</div>
                        <span style={{fontSize:13,color:C.text}}>{acc.ministry||"—"}</span>
                        {acc.isContractor&&<span className="mono" style={{fontSize:9,color:"#aa6622",marginLeft:8}}>CONTRACTOR</span>}
                      </div>
                      {!!lssRole(acc)&&<div>
                        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>LSS</div>
                        <span className="mono" style={{fontSize:10,color:"#5a9a7a"}}>{lssRole(acc).toUpperCase()}</span>
                      </div>}
                      {!!lfpRole(acc)&&<div>
                        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>LFP</div>
                        <span className="mono" style={{fontSize:10,color:"#5a7a9a"}}>{lfpRole(acc).toUpperCase()}</span>
                      </div>}
                    </div>
                    {acc.notes&&(
                      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`3px solid ${cl.color}`,
                        borderRadius:"0 3px 3px 0",padding:"0.6rem 0.85rem",marginBottom:"0.75rem"}}>
                        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:4}}>CLEARANCE JUSTIFICATION</div>
                        <div style={{fontSize:13,color:C.textD,lineHeight:1.7,fontStyle:"italic"}}>{acc.notes}</div>
                      </div>
                    )}
                    {isAdmin&&(
                      <ClearanceEditor acc={acc} onUpdate={onUpdate} notify={notify} setProcessing={setProcessing}/>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ClearanceEditor({acc,onUpdate,notify,setProcessing}){
  const [cl,setCl]=useState(String(acc.clearance||0));
  const [notes,setNotes]=useState(acc.notes||"");
  const [saving,setSaving]=useState(false);
  const changed=parseInt(cl)!==acc.clearance||notes!==acc.notes;
  return(
    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem",display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{flex:1,minWidth:160}}>
        <FL>CLEARANCE LEVEL</FL>
        <DD value={cl} onChange={setCl} options={CLEARANCE.map(c=>({v:String(c.level),l:c.code}))}/>
      </div>
      <div style={{flex:3,minWidth:200}}>
        <FL>JUSTIFICATION NOTES</FL>
        <Inp value={notes} onChange={setNotes} placeholder="Basis for clearance level…"/>
      </div>
      <Btn variant="gold" disabled={!changed||saving} small onClick={async()=>{
        setSaving(true); setProcessing("Updating clearance…");
        await onUpdate(acc.username,{clearance:parseInt(cl),notes});
        setProcessing(null); setSaving(false);
        notify("Clearance updated for "+acc.displayName+".",C.gold);
      }}>{saving?"Saving…":"Update"}</Btn>
    </div>
  );
}

// ── LSS OPERATIONS ────────────────────────────────────────────────────────────
function OperationCard({op,accounts,currentUser,onAction,notify,setProcessing,chamber}){
  const [open,setOpen]=useState(false);
  const [addNote,setAddNote]=useState("");
  const [saving,setSaving]=useState(false);
  const st=OP_STATUSES.find(s=>s.v===op.status)||OP_STATUSES[0];
  const cl=CL(op.clearance||0);
  // Directing one agency confers nothing in the other — the two are parallel.
  const myLevel=chamber==="lss"?lssLevel(currentUser):lfpLevel(currentUser);
  const canEdit=myLevel==="director";

  if((op.clearance||0)>(currentUser.clearance||0)) return null;

  return(
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${st.color}`,
                  borderRadius:"0 3px 3px 0",marginBottom:"0.6rem",overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",
        alignItems:"center",padding:"0.85rem 1rem",cursor:"pointer",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
          <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s3,
            border:`1px solid ${st.color}44`,color:st.color}}>{op.status?.toUpperCase()}</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:C.text}}>{op.name}</span>
          {op.codename&&<span className="mono" style={{fontSize:10,color:C.textD}}>// {op.codename}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <ClearanceBadge level={op.clearance||0}/>
          <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem"}}>
          {op.description&&<div style={{fontSize:14,color:C.textD,lineHeight:1.7,marginBottom:"1rem",fontStyle:"italic"}}>{op.description}</div>}

          {/* Progress */}
          {op.progress!=null&&(
            <div style={{marginBottom:"1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span className="mono" style={{fontSize:9,color:C.textDD}}>PROGRESS</span>
                <span className="mono" style={{fontSize:9,color:C.accent}}>{op.progress}%</span>
              </div>
              <div style={{height:6,background:C.s3,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:op.progress+"%",height:"100%",
                  background:`linear-gradient(to right,${C.accentD},${C.accent})`,borderRadius:3}}/>
              </div>
            </div>
          )}

          {/* Documents */}
          {(op.opord_text||op.opord_url)&&(
            <div style={{background:C.s2,border:`1px solid ${cl.border}`,borderLeft:`3px solid ${cl.color}`,
              borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"1rem"}}>
              <div className="mono" style={{fontSize:9,color:cl.color,marginBottom:6}}>OPERATION ORDER (OPORD)</div>
              {op.opord_url&&<a href={op.opord_url} target="_blank" rel="noopener noreferrer"
                style={{display:"inline-block",fontFamily:"'Cinzel',serif",fontSize:11,
                  letterSpacing:"0.1em",color:C.accent,border:`1px solid ${C.accentD}44`,
                  padding:"4px 12px",borderRadius:2,marginBottom:op.opord_text?"0.5rem":"0"}}>
                OPEN DOCUMENT →
              </a>}
              {op.opord_text&&<div style={{fontSize:13,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap",marginTop:4}}>{op.opord_text}</div>}
            </div>
          )}

          {/* Notes log */}
          {(op.notes||[]).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:6}}>FIELD NOTES / UPDATES</div>
              {[...(op.notes||[])].reverse().map((n,i)=>(
                <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                  padding:"0.6rem 0.85rem",marginBottom:4}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span className="mono" style={{fontSize:9,color:C.textD}}>{n.author}</span>
                    <span className="mono" style={{fontSize:9,color:C.textDD}}>{new Date(n.ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</span>
                  </div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{n.text}</div>
                </div>
              ))}
            </div>
          )}

          {/* Add note */}
          {/* Anyone serving in this agency may add a field note. */}
          {!!myLevel&&(
            <div style={{display:"flex",gap:8}}>
              <Inp value={addNote} onChange={setAddNote} placeholder="Add field note or update…" style={{flex:1}}/>
              <Btn small disabled={!addNote.trim()||saving} onClick={async()=>{
                setSaving(true); setProcessing("Adding note…");
                const note={text:addNote.trim(),author:currentUser.displayName||currentUser.username,ts:Date.now()};
                await onAction("addOpNote",{opId:op.id,chamber,note});
                setProcessing(null); setSaving(false); setAddNote("");
                notify("Note added.",C.accent);
              }}>{saving?"…":"Add Note"}</Btn>
            </div>
          )}

          {canEdit&&<OperationEditor op={op} chamber={chamber} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
        </div>
      )}
    </div>
  );
}

function OperationEditor({op,chamber,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const [status,setStatus]=useState(op.status||"planning");
  const [progress,setProgress]=useState(String(op.progress||0));
  const [saving,setSaving]=useState(false);
  if(!open) return<div style={{marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6,display:"flex",justifyContent:"flex-end",gap:6}}>
    <Btn small variant="ghost" onClick={()=>setOpen(true)}>✎ Edit Status</Btn>
    <ArmBtn small label="Delete" confirmLabel="Delete operation?" onConfirm={async()=>{
      setProcessing("Deleting operation…");
      await onAction("deleteOp",{opId:op.id,chamber});
      setProcessing(null); notify("Operation deleted.",C.textD);
    }}/>
  </div>;

  return(
    <div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem",display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{flex:1,minWidth:140}}>
        <FL>STATUS</FL>
        <DD value={status} onChange={setStatus} options={OP_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
      </div>
      <div style={{flex:1,minWidth:100}}>
        <FL>PROGRESS %</FL>
        <Inp value={progress} onChange={setProgress} placeholder="0-100" style={{textAlign:"right"}}/>
      </div>
      <Btn small variant="gold" disabled={saving} onClick={async()=>{
        setSaving(true); setProcessing("Updating operation…");
        await onAction("updateOpStatus",{opId:op.id,chamber,status,progress:parseInt(progress)||0});
        setProcessing(null); setSaving(false); setOpen(false);
        notify("Operation updated.",C.gold);
      }}>{saving?"Saving…":"Save"}</Btn>
      <Btn small variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
    </div>
  );
}

function ArrestCard({arrest,currentUser,canEdit,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const [note,setNote]=useState("");
  const [saving,setSaving]=useState(false);
  const st=ARREST_STATUSES.find(s=>s.v===arrest.status)||ARREST_STATUSES[0];
  return(
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${st.color}`,borderRadius:"0 3px 3px 0",marginBottom:"0.5rem",overflow:"hidden"}}>

        <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s3,border:`1px solid ${st.color}44`,color:st.color}}>{arrest.status?.replace("_"," ").toUpperCase()}</span>

        <div style={{flex:1}}/>
        <span className="mono" style={{fontSize:9,color:C.textDD}}>CASE {arrest.caseNumber}</span>
        <span className="mono" style={{fontSize:9,color:C.textDD}}>{arrest.date}</span>
        <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
      </div>

        <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem"}}>
          <div style={{display:"flex",gap:"2rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            <div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>CHARGES</div>
              <div style={{fontSize:13,color:C.text}}>{arrest.charges}</div></div>
            <div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>ARRESTING OFFICER</div>
              <div style={{fontSize:13,color:C.text}}>{arrest.officer}</div></div>
            <div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>DATE</div>
              <div style={{fontSize:13,color:C.text}}>{arrest.date}</div></div>
          </div>
          {(arrest.notes||[]).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:6}}>CASE NOTES</div>
              {[...(arrest.notes||[])].reverse().map((n,i)=>(
                <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"0.6rem",marginBottom:3}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>

                    <span className="mono" style={{fontSize:9,color:C.textDD}}>{new Date(n.ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</span>

          <div style={{display:"flex",gap:8,marginBottom:canEdit?"0.75rem":0}}>
            <Inp value={note} onChange={setNote} placeholder="Add case note…" style={{flex:1}}/>

              setSaving(true); setProcessing("Adding note…");
              await onAction("addArrestNote",{arrestId:arrest.id,note:{text:note.trim(),author:currentUser?.displayName||currentUser?.username||"Officer",ts:Date.now()}});

            <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>

                <FL>UPDATE STATUS</FL>
                <ArrestStatusInline arrest={arrest} onAction={onAction} notify={notify} setProcessing={setProcessing}/>

              <ArmBtn small label="Delete Record" confirmLabel="Permanently delete?" onConfirm={async()=>{

                await onAction("deleteArrest",{arrestId:arrest.id});
                setProcessing(null); notify("Record deleted.",C.textD);
              }}/>
            </div>

        </div>

function ArrestStatusInline({arrest,onAction,notify,setProcessing}){
  const [status,setStatus]=useState(arrest.status||"detained");
  const [saving,setSaving]=useState(false);
  return(
    <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
      <DD value={status} onChange={setStatus} options={ARREST_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
      <Btn small variant="gold" disabled={status===arrest.status||saving} onClick={async()=>{
        setSaving(true); setProcessing("Updating record…");
        await onAction("updateArrestStatus",{arrestId:arrest.id,status});
        setProcessing(null); setSaving(false);
        notify("Record updated.",C.gold);
      }}>{saving?"…":"Update"}</Btn>
    </div>
  );
}

function CreateArrestForm({onAction,notify,setProcessing,onClose,currentUser,accounts}){
  // A suspect is normally an account, so the record is bound to one and follows
  // them even if they change their display name. Someone with no account can
  // still be booked by name — the record simply is not bound to anything.
  const [offRoll,setOffRoll]=useState(false); // suspect is not in the database
  const [suspectUser,setSuspectUser]=useState("");
  const [suspect,setSuspect]=useState("");
  const [q,setQ]=useState("");
  const [charges,setCharges]=useState("");
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [officer,setOfficer]=useState(currentUser?.displayName||currentUser?.username||"");
  const [saving,setSaving]=useState(false);

  const query=q.trim().toLowerCase();
  const matches=(!offRoll&&!suspectUser&&query.length>=2)
    ?Object.values(accounts||{}).filter(a=>
        (a.username||"").toLowerCase().includes(query)
        ||(a.displayName||"").toLowerCase().includes(query))
      .sort((a,b)=>(a.username||"").localeCompare(b.username||"")).slice(0,8)
    :[];
  const picked=suspectUser?accounts?.[suspectUser]:null;
  const ready=(offRoll?!!suspect.trim():!!suspectUser)&&!!charges.trim();

  return(
    <div style={{background:C.s2,border:`1px solid ${C.accentD}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.25em",color:C.accent,marginBottom:"1rem",display:"flex",justifyContent:"space-between"}}>
        FILE ARREST RECORD
        <button onClick={onClose} style={{background:"transparent",border:"none",color:C.textD,cursor:"pointer",fontSize:14}}>✕</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div>
          <FL>SUSPECT *</FL>
          {picked
            ?<div style={{display:"flex",alignItems:"center",gap:10,background:C.s1,
              border:`1px solid ${C.accentD}66`,borderLeft:`3px solid ${C.accent}`,
              borderRadius:"0 3px 3px 0",padding:"8px 12px",flexWrap:"wrap"}}>
              <span className="mono" style={{fontSize:13,color:C.text,fontWeight:600}}>{picked.username}</span>
              {picked.displayName&&<span style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{picked.displayName}</span>}
              <div style={{flex:1}}/>
              <Btn small variant="ghost" onClick={()=>{setSuspectUser("");setQ("");}}>Change</Btn>
            </div>
            :offRoll
              ?<Inp value={suspect} onChange={setSuspect} placeholder="Name of suspect (not in database)"/>
              :<div>
                <Inp value={q} onChange={setQ} placeholder="Search username or name…"/>
                {query.length>=2&&(
                  matches.length===0
                    ?<div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginTop:6}}>
                      No account matches. Tick below if they are not in the database.
                    </div>
                    :<div style={{marginTop:6,border:`1px solid ${C.border}`,borderRadius:3,overflow:"hidden"}}>
                      {matches.map(a=>(
                        <div key={a.username} onClick={()=>{setSuspectUser(a.username);setSuspect(a.displayName||a.username);}}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"6px 10px",cursor:"pointer",
                            background:C.s1,borderBottom:`1px solid ${C.border}44`}}>
                          <span className="mono" style={{fontSize:12,color:C.text,minWidth:110}}>{a.username}</span>
                          <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{a.displayName||""}</span>
                        </div>
                      ))}
                    </div>
                )}
              </div>
          }
          <div onClick={()=>{setOffRoll(v=>!v);setSuspectUser("");setSuspect("");setQ("");}}
            style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginTop:8}}>
            <div style={{width:14,height:14,border:`2px solid ${offRoll?C.accent:C.border}`,borderRadius:2,
              background:offRoll?C.accentD:"transparent",display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:9,color:C.accent}}>{offRoll?"✓":""}</div>
            <span style={{fontSize:12,color:offRoll?C.text:C.textD}}>Player is not in Intranet Database</span>
          </div>
        </div>
        <div style={{maxWidth:220}}><FL>DATE OF ARREST *</FL><Inp value={date} onChange={setDate} type="date"/></div>
        <div><FL>CHARGES *</FL><TA value={charges} onChange={setCharges} placeholder="List all charges…" rows={3}/></div>
        <div><FL>ARRESTING OFFICER</FL><Inp value={officer} onChange={setOfficer} placeholder="Officer name"/></div>
        <div style={{display:"flex",gap:8}}>
          <Btn disabled={!ready||saving} onClick={async()=>{
            setSaving(true); setProcessing("Filing arrest record…");
            await onAction("createArrest",{arrest:{
              suspect:(offRoll?suspect.trim():(picked?.displayName||picked?.username||suspect.trim())),
              suspectUsername:offRoll?"":suspectUser,
              charges:charges.trim(),date,
              officer:officer.trim(),status:"detained",notes:[],
            }});
            setProcessing(null); setSaving(false);
            notify("Arrest record filed.",C.accent); onClose();
          }}>{saving?"Filing…":"File Record"}</Btn>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        </div>
      </div>
    </div>
  );
}

// ── LSS — LECH SECURITY SERVICE ───────────────────────────────────────────────

function LSSSection({currentUser,accounts,lssOps,lssDocs,onAction,notify,setProcessing}){
  const level=lssLevel(currentUser);
  const isAgent=!!level;
  const isDirector=level==="director";
  const isAdmin=isMinisterOrAbove(currentUser);
  const [sub,setSub]=useState("ops");

  const allOps=Object.values(lssOps||{});
  const visibleOps=allOps.filter(op=>(op.clearance||0)<=(currentUser.clearance||0));
  const allDocs=Object.values(lssDocs||{}).filter(d=>(d.clearance||0)<=(currentUser.clearance||0));
  const activeOps=visibleOps.filter(op=>op.status==="active"||op.status==="planning");

  const SUBTABS=[
    {v:"ops",l:"Operations"},
    {v:"docs",l:"Documents"},
    ...(isDirector||isAdmin?[{v:"personnel",l:"Personnel"}]:[]),
  ];

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1rem"}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:22,letterSpacing:"0.15em",color:C.text}}>Lech Security Service</div>
          <div className="mono" style={{fontSize:9,color:C.textDD,letterSpacing:"0.2em",marginTop:2}}>Internal Intelligence — Classified Operations</div>
        </div>
        <ClearanceBadge level={currentUser.clearance||0}/>
      </div>

      <SummaryBar items={[
        {value:activeOps.length,label:"ACTIVE OPS",color:"#2a6acc",icon:"⚙"},
        {value:allDocs.length,label:"DOCUMENTS",color:CL(currentUser.clearance||0).color,icon:"📄"},
        visibleOps.length<allOps.length?{value:allOps.length-visibleOps.length,label:"REDACTED OPS",color:C.textDD,icon:"🔒"}:null,
      ]}/>

      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem"}}>
        {SUBTABS.map(t=>(
          <button key={t.v} onClick={()=>setSub(t.v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",
              borderBottom:`2px solid ${sub===t.v?"#4a88ff":"transparent"}`,color:sub===t.v?"#88bbff":C.textD}}>
            {t.l}
          </button>
        ))}
      </div>

      {sub==="ops"&&<LSSOperationsTab currentUser={currentUser} lssOps={lssOps} onAction={onAction} notify={notify} setProcessing={setProcessing} canCreate={isDirector||isAdmin}/>}
      {sub==="docs"&&<LSSDocumentsTab currentUser={currentUser} lssDocs={lssDocs} onAction={onAction} notify={notify} setProcessing={setProcessing} canCreate={isAgent||isDirector||isAdmin}/>}
      {sub==="personnel"&&(isDirector||isAdmin)&&<LSSPersonnelTab accounts={accounts} currentUser={currentUser} lssOps={lssOps}/>}
    </div>
  );
}

function LSSOperationsTab({currentUser,lssOps,onAction,notify,setProcessing,canCreate}){
  const [creating,setCreating]=useState(false);
  const [filterStatus,setFilterStatus]=useState("all");
  const ops=Object.values(lssOps||{})
    .filter(op=>(op.clearance||0)<=(currentUser.clearance||0)&&(filterStatus==="all"||op.status===filterStatus))
    .sort((a,b)=>(b.created||0)-(a.created||0));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",gap:8,flexWrap:"wrap"}}>
        <STitle style={{marginBottom:0}}>Active Operations</STitle>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",color:C.text,fontSize:13,fontFamily:"'Crimson Text',serif"}}>
            <option value="all">All Statuses</option>
            {OP_STATUSES.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}
          </select>
          {canCreate&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ New Operation</Btn>}
        </div>
      </div>
      {creating&&<CreateOperationForm chamber="lss" onAction={onAction} notify={notify} setProcessing={setProcessing} onClose={()=>setCreating(false)}/>}
      {/* Show locked clearance notice */}
      {Object.values(lssOps||{}).some(op=>(op.clearance||0)>(currentUser.clearance||0))&&(
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:"4px solid #2a1a2a",borderRadius:"0 3px 3px 0",padding:"0.6rem 1rem",marginBottom:8,display:"flex",alignItems:"center",gap:8,opacity:0.6}}>
          <span className="mono" style={{fontSize:10,color:C.textDD}}>🔒</span>
          <span className="mono" style={{fontSize:9,letterSpacing:"0.1em",color:C.textDD}}>
            {Object.values(lssOps||{}).filter(op=>(op.clearance||0)>(currentUser.clearance||0)).length} OPERATION(S) REDACTED — INSUFFICIENT CLEARANCE
          </span>
        </div>
      )}
      {ops.length===0?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No operations at your clearance level.</div>
        :ops.map(op=><OperationCard key={op.id} op={op} currentUser={currentUser} onAction={onAction} notify={notify} setProcessing={setProcessing} chamber="lss"/>)}
    </div>
  );
}

function LSSDocumentsTab({currentUser,lssDocs,onAction,notify,setProcessing,canCreate}){
  const [creating,setCreating]=useState(false);
  const [filterCl,setFilterCl]=useState("all");
  const userCl=currentUser.clearance||0;
  const docs=Object.values(lssDocs||{})
    .filter(d=>(d.clearance||0)<=userCl&&(filterCl==="all"||String(d.clearance)===filterCl))
    .sort((a,b)=>(b.created||0)-(a.created||0));
  const allLevels=[...new Set(Object.values(lssDocs||{}).filter(d=>(d.clearance||0)<=userCl).map(d=>d.clearance||0))].sort();
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",gap:8,flexWrap:"wrap"}}>
        <STitle style={{marginBottom:0}}>Classified Documents</STitle>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={filterCl} onChange={e=>setFilterCl(e.target.value)}
            style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",color:C.text,fontSize:13,fontFamily:"'Crimson Text',serif"}}>
            <option value="all">All Levels</option>
            {allLevels.map(l=><option key={l} value={String(l)}>{CL(l).code}</option>)}
          </select>
          {canCreate&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ New Document</Btn>}
        </div>
      </div>
      {creating&&<CreateDocumentForm chamber="lss" onAction={onAction} notify={notify} setProcessing={setProcessing} onClose={()=>setCreating(false)} currentUser={currentUser}/>}
      {CLEARANCE.filter(c=>c.level>userCl).map(c=>(

  // Serving members only — the Minister oversees the agency without serving in it.

    .sort((a,b)=>{

              <span className="mono" style={{fontSize:9,color:lssRole(acc)==="director"?C.accent:"#5a9a7a"}}>{lssRole(acc)==="director"?"DIRECTOR":"AGENT"}</span>

// ── MDT — MOBILE DISPATCH TERMINAL ────────────────────────────────────────────
// An officer's lookup tool. Nothing is listed until a search is made: pulling up
// a person is a deliberate act, not something you do by idly scrolling the
// population. Matches an arrest record to an account by the username stored on
// the record, falling back to the name for records filed before that was kept.
function arrestsFor(acc,arrests){
  if(!acc) return [];
  const u=String(acc.username||"").toLowerCase();
  const n=String(acc.displayName||"").toLowerCase();
  return Object.values(arrests||{}).filter(a=>{
    const au=String(a.suspectUsername||"").toLowerCase();
    if(au) return au===u;
    const s=String(a.suspect||"").toLowerCase();
    return !!s&&(s===u||s===n);
  }).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
}

// Shown in place of a sealed record. It confirms the subject exists and that a

// A record is sealed if it is restricted and the viewer is under the bar. The
// Minister and the Emperor oversee the register, so nothing is sealed to them.
function mdtSealed(subject,viewer){
  if(!subject?.mdtRestricted) return false;
  if(isMinisterOrAbove(viewer)) return false;
  return (viewer?.clearance||0)<(subject.mdtClearance||0);
}

function LFPMdt({accounts,arrests,currentUser,onAction,notify,setProcessing,canEdit}){
  const [search,setSearch]=useState("");
  const [viewing,setViewing]=useState(null);
  const q=search.trim().toLowerCase();

  // Deliberately empty until asked: no browsing the population at rest.
  const results=q.length<2?[]:Object.values(accounts||{}).filter(a=>
      (a.username||"").toLowerCase().includes(q)
      ||(a.displayName||"").toLowerCase().includes(q)
      ||(a.stateOfResidency&&PROVINCES[a.stateOfResidency]
        &&genIdNumber(a.username,PROVINCES[a.stateOfResidency].code).toLowerCase().includes(q)))
    .sort((a,b)=>(a.username||"").localeCompare(b.username||""))
    .slice(0,25);

  const subject=viewing?accounts[viewing]:null;
  const sealed=mdtSealed(subject,currentUser);
  const record=sealed?[]:arrestsFor(subject,arrests);
  const open=record.filter(a=>a.status==="detained"||a.status==="pending_trial").length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem",gap:8,flexWrap:"wrap"}}>
        <STitle style={{marginBottom:0}}>Mobile Dispatch Terminal</STitle>
        <span className="mono" style={{fontSize:9,color:C.textDD}}>MDT · FEDERAL LOOKUP</span>
      </div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1rem",lineHeight:1.6}}>
        Search a username to pull their identity card and arrest record.
      </div>
      <div style={{maxWidth:420,marginBottom:"1.25rem"}}>
        <Inp value={search} onChange={v=>{setSearch(v);setViewing(null);}} placeholder="Search username, name, or ID number…"/>
      </div>

      {!subject&&(
        q.length<2
          ?<div style={{textAlign:"center",padding:"2.5rem 1rem",color:C.textDD}}>
            <div style={{fontSize:28,marginBottom:8,opacity:0.5}}>🔎</div>
            <div style={{fontStyle:"italic",fontSize:13}}>Enter at least two characters to run a search.</div>
          </div>
          :results.length===0
            ?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No record matches that search.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:4}}>
              {results.map(a=>{
                const P=a.stateOfResidency?PROVINCES[a.stateOfResidency]:null;
                // A sealed subject gives up nothing in the list either — not their
                // name, not their ID, not whether they have any record at all.
                const isSealed=mdtSealed(a,currentUser);
                const n=isSealed?0:arrestsFor(a,arrests).length;
                return(
                  <div key={a.username} onClick={()=>setViewing(a.username)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"0.6rem 1rem",cursor:"pointer",
                      background:isSealed?"#120606":C.s1,
                      border:`1px solid ${isSealed?"#3a1414":C.border}`,borderRadius:3}}>
                    <img src={COA_B64} alt="" style={{height:22,width:"auto",display:"block",opacity:(P&&!isSealed)?1:0.3}}/>
                    <span className="mono" style={{fontSize:13,color:C.text,fontWeight:600,minWidth:120}}>{a.username}</span>
                    {isSealed
                      ?<span style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
                        <span style={{display:"inline-block",width:110,height:10,background:"#000",
                          border:"1px solid #2a1010",borderRadius:1}}/>
                      </span>
                      :<span style={{fontSize:13,color:C.textD,fontStyle:"italic",flex:1}}>{a.displayName||""}</span>}
                    {n>0&&<span className="mono" style={{fontSize:9,color:"#cc7a20",border:"1px solid #cc7a2044",padding:"1px 6px",borderRadius:2}}>{n} RECORD{n!==1?"S":""}</span>}
                    {isSealed
                      ?<span className="mono" style={{fontSize:9,color:"#cc2222",letterSpacing:".14em",
                        minWidth:80,textAlign:"right"}}>🔒 SEALED</span>
                      :<span className="mono" style={{fontSize:9,color:P?P.foil:C.textDD,minWidth:80,textAlign:"right"}}>
                        {P?genIdNumber(a.username,P.code):"NO ID"}
                      </span>}
                  </div>);
              })}
            </div>
      )}

      {subject&&sealed&&(
        <div>
          <div style={{marginBottom:"1rem"}}>
            <Btn small variant="ghost" onClick={()=>setViewing(null)}>← Back to results</Btn>
          </div>
          <SealedRecord subject={subject} currentUser={currentUser}/>
        </div>
      )}

      {subject&&!sealed&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1rem",flexWrap:"wrap"}}>
            <Btn small variant="ghost" onClick={()=>setViewing(null)}>← Back to results</Btn>
            <span className="mono" style={{fontSize:13,color:C.text,fontWeight:600}}>{subject.username}</span>
            {subject.displayName&&<span style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{subject.displayName}</span>}
            {subject.mdtRestricted&&<span className="mono" style={{fontSize:8,color:"#cc7a20",
              border:"1px solid #cc7a2044",padding:"1px 6px",borderRadius:2}}
              title="This record is restricted. Your clearance opens it.">🔓 RESTRICTED</span>}
            {open>0&&<span className="mono" style={{fontSize:9,color:"#cc5050",border:"1px solid #cc505044",padding:"1px 6px",borderRadius:2}}>{open} OPEN</span>}
          </div>

          {subject.stateOfResidency&&PROVINCES[subject.stateOfResidency]
            ?<div style={{marginBottom:"1.5rem",maxWidth:420}}><IDCard acc={subject}/></div>
            :<div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.textDD}`,
              borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"1.5rem",
              fontSize:13,color:C.textD,fontStyle:"italic"}}>
              No province of residency on file — this person holds no provincial identity card.
            </div>}

          <div className="mono" style={{fontSize:9,color:C.textDD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>
            ARREST RECORD ({record.length})
          </div>
          {record.length===0
            ?<div style={{textAlign:"center",padding:"1.5rem",color:C.textDD,fontStyle:"italic",
              background:C.s1,border:`1px solid ${C.border}`,borderRadius:3}}>No arrest record on file.</div>
            :record.map(a=><ArrestCard key={a.id} arrest={a} currentUser={currentUser} canEdit={canEdit}
                onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
        </div>
      )}
    </div>
  );
}

function LFPCaseFiles({currentUser,accounts,arrests,onAction,notify,setProcessing,canEdit,canFile,officerFilter,setOfficerFilter}){
  const [filterSt,setFilterSt]=useState("all");
  const [search,setSearch]=useState("");
  const [mine,setMine]=useState(false);
  const [filing,setFiling]=useState(false);
  const meNames=[currentUser.displayName,currentUser.username].filter(Boolean);
  // A sealed subject is sealed everywhere. Withholding a record on the MDT while
  // leaving it open on the next tab would only pretend to protect it.
  const sealedUsers=new Set(Object.values(accounts||{})
    .filter(a=>mdtSealed(a,currentUser)).map(a=>String(a.username||"").toLowerCase()));
  const hidden=Object.values(arrests||{}).filter(a=>{
    const au=String(a.suspectUsername||"").toLowerCase();
    return au&&sealedUsers.has(au);
  }).length;
  const list=Object.values(arrests||{})
    .filter(a=>{
      const au=String(a.suspectUsername||"").toLowerCase();
      if(au&&sealedUsers.has(au)) return false;
      const matchSt=filterSt==="all"||a.status===filterSt;
      const q=search.toLowerCase();
      const matchQ=!q||a.suspect?.toLowerCase().includes(q)||a.charges?.toLowerCase().includes(q)||a.caseNumber?.toLowerCase().includes(q);
      const matchMine=!mine||meNames.includes(a.officer);
      const matchOfficer=!officerFilter||a.officer===officerFilter;
      return matchSt&&matchQ&&matchMine&&matchOfficer;
    })
    .sort((a,b)=>(b.created||0)-(a.created||0));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",gap:8,flexWrap:"wrap"}}>
        <STitle style={{marginBottom:0}}>Case Files</STitle>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <Inp value={search} onChange={setSearch} placeholder="Search suspect, charges, case #…" style={{width:200}}/>
          <select value={filterSt} onChange={e=>setFilterSt(e.target.value)}
            style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",color:C.text,fontSize:13,fontFamily:"'Crimson Text',serif"}}>
            <option value="all">All Status</option>
            {ARREST_STATUSES.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}

          {canFile&&!filing&&<Btn small onClick={()=>setFiling(true)}>+ File Arrest</Btn>}
        </div>
      </div>
      {officerFilter&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"0.75rem",background:C.s1,border:`1px solid ${C.borderL}`,borderRadius:2,padding:"5px 12px"}}>
        <span className="mono" style={{fontSize:10,color:C.textD,letterSpacing:"0.1em"}}>FILTERED TO OFFICER · {String(officerFilter).toUpperCase()}</span>
        <button onClick={()=>setOfficerFilter&&setOfficerFilter(null)} style={{background:"transparent",border:"none",color:C.accent,cursor:"pointer",fontSize:12,marginLeft:"auto"}}>Clear ✕</button>
      </div>}
      {filing&&<CreateArrestForm onAction={onAction} notify={notify} setProcessing={setProcessing} onClose={()=>setFiling(false)} currentUser={currentUser} accounts={accounts}/>}
      {hidden>0&&(
        <div style={{background:"#120606",border:"1px solid #3a1414",borderLeft:"3px solid #cc2222",
          borderRadius:"0 3px 3px 0",padding:"0.6rem 1rem",marginBottom:"0.75rem",
          display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13}}>🔒</span>
          <span className="mono" style={{fontSize:9,color:"#cc5050",letterSpacing:".14em"}}>
            {hidden} SEALED
          </span>
          <span style={{fontSize:12,color:"#8a5a5a",fontStyle:"italic"}}>
            Case files withheld from this list. Your clearance does not open them.
          </span>
        </div>
      )}
      {list.length===0?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No case files match.</div>
        :list.map(a=><ArrestCard key={a.id} arrest={a} currentUser={currentUser} canEdit={canEdit} onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
    </div>
  );
}

function LFPOperationsTab({currentUser,lfpOps,onAction,notify,setProcessing,canCreate}){
  const [creating,setCreating]=useState(false);
  const ops=Object.values(lfpOps||{}).sort((a,b)=>(b.created||0)-(a.created||0));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <STitle style={{marginBottom:0}}>Police Operations</STitle>
        {canCreate&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ New Operation</Btn>}
      </div>
      {creating&&<CreateOperationForm chamber="lfp" onAction={onAction} notify={notify} setProcessing={setProcessing} onClose={()=>setCreating(false)}/>}
      {ops.length===0?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No operations logged.</div>
        :ops.map(op=><OperationCard key={op.id} op={op} currentUser={currentUser} onAction={onAction} notify={notify} setProcessing={setProcessing} chamber="lfp"/>)}
    </div>
  );
}

function LFPPersonnelTab({accounts,arrests,onSelectOfficer}){
  // Serving officers only — the Minister oversees the force without serving in it.
  const lfpAccounts=Object.values(accounts||{}).filter(a=>!!lfpRole(a))
    .sort((a,b)=>{
      const rank=u=>lfpRole(u)==="director"?0:1;
      return rank(a)-rank(b)||(a.displayName||a.username).localeCompare(b.displayName||b.username);
    });
  return(
    <div>
      <div className="mono" style={{fontSize:9,color:C.textDD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>LFP PERSONNEL ({lfpAccounts.length}) · CLICK A NAME TO VIEW THEIR CASES</div>
      {lfpAccounts.length===0?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No LFP-assigned personnel on record.</div>
      :lfpAccounts.map(acc=>{
        const who=acc.displayName||acc.username;
        const filedCases=Object.values(arrests||{}).filter(a=>a.officer===acc.displayName||a.officer===acc.username).length;
        const openCases=Object.values(arrests||{}).filter(a=>(a.officer===acc.displayName||a.officer===acc.username)&&(a.status==="detained"||a.status==="pending_trial")).length;
        return(
          <div key={acc.username} onClick={()=>onSelectOfficer&&onSelectOfficer(who)} style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${lfpRole(acc)==="director"?C.accent:"#6a5a20"}`,borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:"0.4rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",cursor:"pointer"}}>
            <div style={{flex:1}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,fontWeight:700}}>{who}</span>
              <span className="mono" style={{fontSize:9,color:C.textDD,marginLeft:8}}>{acc.username}</span>
            </div>
            <span className="mono" style={{fontSize:9,color:lfpRole(acc)==="director"?C.accent:"#a08040"}}>{lfpRole(acc)==="director"?"DIRECTOR":"OFFICER"}</span>
            <span className="mono" style={{fontSize:9,color:C.textDD}}>{filedCases} case{filedCases!==1?"s":""} filed</span>
            {openCases>0&&<span className="mono" style={{fontSize:9,color:"#cc5050",border:"1px solid #cc505044",padding:"1px 6px",borderRadius:2}}>{openCases} OPEN</span>}
          </div>
        );
      })}
    </div>
  );
}

        ))}
      </div>
      {sub==="accounts"&&<AccountManager currentUser={currentUser} accounts={accounts} onUpdate={onUpdate} notify={notify} setProcessing={setProcessing} canSetMinister={true}/>}
      {sub==="clearances"&&<ClearanceTracker accounts={accounts} currentUser={currentUser} onUpdate={onUpdate} notify={notify} setProcessing={setProcessing}/>}
    </div>
  );
}

// ── ACCOUNT MANAGER ───────────────────────────────────────────────────────────
function AccountManager({currentUser,accounts,onUpdate,notify,setProcessing,canSetMinister}){
  const [search,setSearch]=useState("");
  const [creating,setCreating]=useState(false);
  const [bk,setBk]=useState(null);

  // Read the Bundeskongress store so each account's legislative standing can be
  // shown here. Read-only: standing is set over there by seating and appointment.
  useEffect(()=>{
    let alive=true;
    (async()=>{
      try{
        const r=await fetch(BK_SCRIPT_URL+"?action=getall");
        const d=await r.json();
        if(!d.success||!alive) return;
        const parse=(k)=>{try{return d.data[k]?JSON.parse(d.data[k]):{};}catch{return{};}};
        setBk({members:parse("bk_members"),bundesherren:parse("bk_bh"),officials:parse("bk_officials")});
      }catch{ /* standing simply goes unshown if the chamber is unreachable */ }
    })();
    return()=>{alive=false;};
  },[]);

  const list=Object.values(accounts||{})
    .filter(a=>!search||(a.displayName||a.username).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>(a.displayName||a.username).localeCompare(b.displayName||b.username));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",gap:8}}>
        <Inp value={search} onChange={setSearch} placeholder="Search accounts…" style={{flex:1}}/>
        {!creating&&<Btn small onClick={()=>setCreating(true)}>+ Create Account</Btn>}
      </div>
      {creating&&<CreateAccountForm onUpdate={onUpdate} notify={notify} setProcessing={setProcessing} onClose={()=>setCreating(false)} canSetMinister={canSetMinister}/>}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {list.map(acc=>(
          <AccountRow key={acc.username} acc={acc} bk={bk} currentUser={currentUser} onUpdate={onUpdate} notify={notify} setProcessing={setProcessing} canSetMinister={canSetMinister}/>
        ))}
      </div>
    </div>
  );
}

              <FL>JUDICIAL PANEL ACCESS</FL>
              <select value={ijAccess} onChange={e=>setIjAccess(e.target.value)}
                style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
                         padding:"8px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
                <option value="">No Access</option>
                <option value="judge">Judge</option>
                <option value="president">President of the Courts</option>
              </select>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <FL>FINANCE PANEL ACCESS</FL>
              <select value={mofRole} onChange={e=>setMofRole(e.target.value)}
                style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
                         padding:"8px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>

                <option value="auditor">Auditor (read-only)</option>
                <option value="treasurer">Treasurer</option>
                <option value="minister">Minister of Finance</option>
              </select>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <FL>IMPERIAL PRESS ACCESS</FL>
              <select value={pressRole} onChange={e=>setPressRole(e.target.value)}

                         padding:"8px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
                <option value="">No Access</option>
                <option value="journalist">Journalist</option>
                <option value="editor">Editor-in-Chief</option>
              </select>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <FL>MARITIME COMMISSION (IMC) — COMING SOON</FL>
              <select value={imcRole} onChange={e=>setImcRole(e.target.value)}
                style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
                         padding:"8px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
                <option value="">No Access</option>
                <option value="officer">IMC Officer</option>
                <option value="registrar">IMC Registrar</option>
                <option value="commissioner">IMC Commissioner</option>
              </select>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <FL>BUNDESKONGRESS</FL>
              <div style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
                padding:"8px 12px",fontSize:14,color:bkStanding?C.text:C.textD,
                fontFamily:"'Crimson Text',serif",fontStyle:bkStanding?"normal":"italic"}}>
                {bkStanding||"Holds no seat or office"}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:180}}>
              <FL>RESET PASSWORD (optional)</FL>
              <Inp value={newPw} onChange={setNewPw} type="password" placeholder="New password…"/>
            </div>
            <Btn small variant="gold" disabled={saving} onClick={async()=>{
              if(treadsOnEmperor(acc,currentUser)){ setTread(true); return; }
              setSaving(true); setProcessing("Saving account…");
              // Saving writes agency standing to its own field and clears the
              // legacy role/flags, so an account is migrated off them for good.
              const legacyRole=LEGACY_ROLES[role]?"citizen":role;
              const patch={role:legacyRole,ministry,isContractor,
                lssRole:lssRoleV,lfpRole:lfpRoleV,agentAssigned:false,officerAssigned:false,
                mdtRestricted,mdtClearance:mdtRestricted?mdtClearance:0,
                mowAccess:!!mowRole,mowRole,canSetAlert:canSetAlert&&!!mowRole,mfaAccess,ijAccess,
                mofRole,mofAccess:!!mofRole,pressRole,pressAccess:!!pressRole,imcRole,
                clearance:parseInt(clearance),stateOfResidency:residency};
              // Hashed here; the backend salts it on the account's next login
              // (see the legacy-upgrade path in moi-backend.gs).
              if(newPw.trim()) patch.passwordHash=await sha256(newPw.trim());
              await onUpdate(acc.username,patch);
              setProcessing(null); setSaving(false); setNewPw("");
              notify("Account updated: "+acc.username,C.gold);
            }}>{saving?"Saving…":"Save Changes"}</Btn>
            {acc.username!==currentUser.username&&<ArmBtn small label="Delete Account" confirmLabel="Delete permanently?" onConfirm={async()=>{
              // Deleting the Throne is the loudest way of altering it.
              if(treadsOnEmperor(acc,currentUser)){ setTread(true); return; }
              setProcessing("Deleting account…");
              await onUpdate(acc.username,null); // null = delete
              setProcessing(null); notify("Account deleted.",C.textD);
            }}/>}
          </div>
        </div>
      )}
    </div>
  );
}

function CreateAccountForm({onUpdate,notify,setProcessing,onClose,canSetMinister}){
  const [username,setUsername]=useState("");
  const [displayName,setDisplayName]=useState("");
  const [password,setPassword]=useState("");
  const [role,setRole]=useState("citizen");
  const [clearance,setClearance]=useState("0");
  const [ministry,setMinistry]=useState("Civilian");
  const [residency,setResidency]=useState("");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const availRoles=ROLES.filter(r=>canSetMinister?true:r.v!=="minister"&&r.v!=="emperor");
  return(
    <div style={{background:C.s2,border:`1px solid ${C.accentD}`,borderRadius:3,padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.25em",
        color:C.accent,marginBottom:"1rem",display:"flex",justifyContent:"space-between"}}>
        CREATE ACCOUNT
        <button onClick={onClose} style={{background:"transparent",border:"none",color:C.textD,cursor:"pointer",fontSize:14}}>✕</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}><FL>USERNAME *</FL><Inp value={username} onChange={v=>{setUsername(v);setErr("");}} placeholder="Unique username"/></div>
          <div style={{flex:1,minWidth:160}}><FL>DISPLAY NAME *</FL><Inp value={displayName} onChange={setDisplayName} placeholder="Full name"/></div>
          <div style={{flex:1,minWidth:160}}><FL>PASSWORD *</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        </div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:150}}><FL>ROLE</FL><DD value={role} onChange={setRole} options={availRoles.map(r=>({v:r.v,l:r.l}))}/></div>
          <div style={{flex:1,minWidth:140}}><FL>CLEARANCE</FL><DD value={clearance} onChange={setClearance} options={CLEARANCE.map(c=>({v:String(c.level),l:c.code}))}/></div>
          <div style={{flex:2,minWidth:160}}><FL>MINISTRY</FL><DD value={ministry} onChange={setMinistry} options={MINISTRIES.map(m=>({v:m,l:m}))}/></div>
        </div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}><FL>STATE OF RESIDENCY</FL><DD value={residency} onChange={setResidency} options={PROVINCE_OPTS}/></div>
        </div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:C.s1,border:`1px solid ${C.redD}44`,padding:"7px 10px"}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <Btn disabled={!username.trim()||!password.trim()||!displayName.trim()||saving} onClick={async()=>{
            setSaving(true); setProcessing("Creating account…");
            const hash=await sha256(password);
            const result=await onUpdate(username.trim(),{
              username:username.trim().toLowerCase(),displayName:displayName.trim(),
              passwordHash:hash,role,clearance:parseInt(clearance),ministry,stateOfResidency:residency,
              isContractor:false,agentAssigned:false,officerAssigned:false,notes:"",
            },true);
            setProcessing(null); setSaving(false);
            if(result==="exists"){setErr("Username already exists.");return;}
            notify("Account created: "+username,C.accent); onClose();
          }}>{saving?"Creating…":"Create Account"}</Btn>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        </div>
      </div>
    </div>
  );
}
