async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
async function sgetAll(){
  try{
    const r=await fetch(SCRIPT_URL+"?action=getall");
    const d=await r.json();
    if(!d.success) return {};
    const out={};
    Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
    return out;
  }catch{return{};}
}
async function sset(k,v){
  try{
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v)})});
    return true;
  }catch{return false;}
}

function Btn({children,onClick,variant="primary",disabled,small,style:ex={}}){
  const b={fontFamily:"'Cinzel',serif",letterSpacing:"0.1em",fontWeight:700,textTransform:"uppercase",
    fontSize:small?10:11,padding:small?"4px 12px":"7px 18px",border:"1px solid",borderRadius:2,
    cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,transition:"all .15s"};
  const v={
    primary:{background:`linear-gradient(135deg,${C.accentD},${C.accent})`,borderColor:C.accentD,color:"#080a0c"},
    danger: {background:"transparent",borderColor:C.redD,color:C.redL},
    armed:  {background:`linear-gradient(135deg,${C.redD},${C.red})`,borderColor:C.redD,color:"#e0c8c8"},
    ghost:  {background:"transparent",borderColor:C.border,color:C.textD},
    green:  {background:"linear-gradient(135deg,#0a2a10,#1a5a20)",borderColor:"#1a4a18",color:"#7ad47a"},
    gold:   {background:"linear-gradient(135deg,#3a2800,#6a4a00)",borderColor:"#5a4000",color:C.gold},
  };
  return<button onClick={disabled?undefined:onClick} style={{...b,...(v[variant]||v.primary),...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,variant="danger",small}){
  const [armed,setArmed]=useState(false);
  const t=useRef(null);
  return armed
    ?<Btn variant="armed" small={small} onClick={()=>{clearTimeout(t.current);setArmed(false);onConfirm();}}>
        {confirmLabel||"Confirm?"}
     </Btn>
    :<Btn variant={variant} small={small} onClick={()=>{setArmed(true);t.current=setTimeout(()=>setArmed(false),4000);}}>
        {label}
     </Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
             padding:"7px 11px",color:C.text,fontSize:14,outline:"none",...ex}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>;
}
function TA({value,onChange,placeholder,rows=4}){
  return<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
             padding:"7px 11px",color:C.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.6}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>;
}
function DD({value,onChange,options,style:ex={}}){

function Toast({msg,color}){
  if(!msg) return null;
  return<div style={{position:"fixed",top:14,right:14,zIndex:9999,background:C.s2,border:`1px solid ${color}55`,
    borderLeft:`3px solid ${color}`,padding:"8px 16px",borderRadius:2,fontFamily:"'Cinzel',serif",
    fontSize:10,letterSpacing:"0.1em",color,animation:"fadeIn .2s ease",maxWidth:360}}>{msg}</div>;
}
function Overlay({label}){
  if(!label) return null;
  return<div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(4,6,8,.96)",
    display:"flex",alignItems:"center",justifyContent:"center"}}>

  </div>;
}

// ── ALERT LEVEL DISPLAY ───────────────────────────────────────────────────────
function AlertBanner({alertData,compact}){
  if(!alertData) return null;
  const al=AL(alertData.level||5);
  if(compact) return(
    <div style={{display:"flex",alignItems:"center",gap:8,background:al.bg,
      border:`1px solid ${al.border}`,borderRadius:2,padding:"4px 12px"}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:al.color,
        boxShadow:`0 0 6px ${al.color}`,animation:alertData.level<=2?"warflash 1s infinite":"none"}}/>
      <span className="mono" style={{fontSize:9,color:al.color,letterSpacing:"0.12em"}}>{al.short}</span>
    </div>
  );
  return(
    <div style={{background:al.bg,border:`1px solid ${al.border}`,borderTop:`3px solid ${al.color}`,
      borderRadius:"0 0 4px 4px",padding:"1rem 1.5rem",marginBottom:"1.5rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{width:14,height:14,borderRadius:"50%",background:al.color,
          boxShadow:`0 0 12px ${al.color}`,flexShrink:0,
          animation:alertData.level<=2?"warflash 1s infinite":"none"}}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,
            color:al.color,letterSpacing:"0.1em"}}>{al.label}</div>
          <div style={{fontSize:13,color:al.color,opacity:.8,fontStyle:"italic"}}>{al.sub}</div>
        </div>
        {alertData.setBy&&(
          <div className="mono" style={{fontSize:9,color:al.color,opacity:.7,textAlign:"right"}}>
            SET BY {alertData.setBy.toUpperCase()}<br/>
            {new Date(alertData.setAt||0).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
            {alertData.note&&<div style={{fontStyle:"normal",fontFamily:"'Crimson Text',serif",fontSize:11,
              marginTop:2,color:al.color,opacity:.9}}>{alertData.note}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [scan,setScan]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setScan(p=>(p+0.3)%100),25);return()=>clearInterval(id);},[]);

  const doLogin=async()=>{
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true); setErr("");
    try{
      const raw=await sgetAll();
      const accounts={};
      Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v) accounts[v.username]=v;});
      Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(!accounts[k]) accounts[k]=v;});
      const user=Object.values(accounts).find(a=>a.username.toLowerCase()===username.trim().toLowerCase());
      if(!user){setErr("ACCESS DENIED.");setLoading(false);return;}
      if(!user.mowAccess&&user.role!=="emperor"){setErr("AUTHORISATION DENIED — No MOW access.");setLoading(false);return;}
      const hash=await sha256(password);
      if(hash!==user.passwordHash){setErr("ACCESS DENIED.");setLoading(false);return;}
      onLogin(user,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#060808",display:"flex",alignItems:"center",
                  justifyContent:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,
        backgroundImage:"linear-gradient(#1a2a1022 1px,transparent 1px),linear-gradient(90deg,#1a2a1022 1px,transparent 1px)",
        backgroundSize:"50px 50px"}}/>
      <div style={{position:"absolute",left:0,right:0,height:1,
        background:"linear-gradient(to right,transparent,#C9A84C22,transparent)",
        top:`${scan}%`,transition:"top 0.025s linear",pointerEvents:"none"}}/>
      {[[{t:24,l:24},{t:24,r:24},{b:24,l:24},{b:24,r:24}]].flat().map((pos,i)=>(
        <div key={i} style={{position:"absolute",width:28,height:28,...pos,zIndex:2,
          borderTop:i<2?"2px solid #C9A84C33":"none",borderBottom:i>=2?"2px solid #C9A84C33":"none",
          borderLeft:i%2===0?"2px solid #C9A84C33":"none",borderRight:i%2===1?"2px solid #C9A84C33":"none"}}/>
      ))}
      <div className="fadeIn" style={{position:"relative",zIndex:10,width:"100%",maxWidth:420,padding:"0 20px"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:16}}>
            <div style={{height:1,width:60,background:"linear-gradient(to right,transparent,#C9A84C)"}}/>
            <span style={{fontSize:20}}>⚔</span>
            <div style={{height:1,width:60,background:"linear-gradient(to left,transparent,#C9A84C)"}}/>
          </div>
          <div className="mono" style={{fontSize:8,letterSpacing:"0.5em",color:C.accentD,marginBottom:10,
            animation:"pulse 3s infinite"}}>EMPIRE OF LECH — RESTRICTED NETWORK</div>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,letterSpacing:"0.12em",
            color:C.text,lineHeight:1.2}}>Imperial War Office</div>
          <div className="mono" style={{fontSize:8,letterSpacing:"0.3em",color:C.textDD,marginTop:8}}>
            Authorised Military Personnel Only
          </div>
        </div>
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"2rem"}}>
          <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.accent,
            marginBottom:"1.5rem",borderBottom:`1px solid ${C.border}`,paddingBottom:8}}>
            Authentication Required
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
            <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
            <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
            {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:C.s3,
              border:`1px solid ${C.redD}44`,padding:"7px 11px"}}>{err}</div>}
            <Btn onClick={doLogin} disabled={loading||!username.trim()||!password.trim()}>
              {loading?"Authenticating…":"Authenticate"}
            </Btn>
          </div>
          <div className="mono" style={{fontSize:9,color:C.textDD,marginTop:"1.25rem",lineHeight:1.8,
            borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem"}}>
            Authorised military personnel only.<br/>
            <span style={{opacity:.7}}>An account must be registered on the Imperial Intranet by the Minister of the Interior before you can access this system.</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PERSONNEL SECTION ─────────────────────────────────────────────────────────
function PersonnelSection({personnel,commands,currentUser,onAction,notify,setProcessing,canManage}){
  const [search,setSearch]=useState("");
  const [branchFilter,setBranchFilter]=useState("all");
  const [creating,setCreating]=useState(false);

  const list=Object.values(personnel||{})
    .filter(p=>{
      const q=search.toLowerCase();
      const matchQ=!q||p.name?.toLowerCase().includes(q)||p.posting?.toLowerCase().includes(q)||p.position?.toLowerCase().includes(q);
      const matchB=branchFilter==="all"||p.branch===branchFilter;
      return matchQ&&matchB;
    })
    .sort((a,b)=>{
      const ranks=BRANCH_RANKS[a.branch]||ARMY_RANKS;
      const ai=ranks.findIndex(r=>r.grade===a.grade);
      const bi=(BRANCH_RANKS[b.branch]||ARMY_RANKS).findIndex(r=>r.grade===b.grade);
      return bi-ai||a.name?.localeCompare(b.name);
    });

  return(
    <div className="fadeIn">
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:"3px solid #5a6a4a",
        borderRadius:"0 3px 3px 0",padding:"6px 14px",marginBottom:"1rem",fontSize:13,
        color:C.textD,fontStyle:"italic"}}>
        ⚠ This is a manual tracker. Records are not imported from or linked to Ministry of Interior accounts.
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
        <STitle style={{marginBottom:0}}>Personnel Registry</STitle>
        {canManage&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ Enlist Personnel</Btn>}
      </div>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search name, posting, position…"/></div>
        <div style={{flex:1,minWidth:140}}>
          <DD value={branchFilter} onChange={setBranchFilter}
            options={[{v:"all",l:"All Branches"},...BRANCHES.map(b=>({v:b.v,l:b.short}))]}/>
        </div>
      </div>
      {creating&&<PersonnelForm commands={commands} onAction={onAction} notify={notify} setProcessing={setProcessing} onClose={()=>setCreating(false)} isNew={true}/>}
      {list.length===0
        ?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No personnel records found.</div>
        :list.map(p=><PersonnelCard key={p.id} person={p} commands={commands} canManage={canManage}
            onAction={onAction} notify={notify} setProcessing={setProcessing}/>)
      }
    </div>
  );
}

              <FL>FORCE</FL>
              <DD value={force} onChange={setForce} options={[{v:"regular",l:"Regular Force"},{v:"reserve",l:"Reserve Force"}]}/>
            </div>
          </div>
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}><FL>POSITION / ROLE</FL><Inp value={position} onChange={setPosition} placeholder="e.g. Commanding Officer"/></div>
            <div style={{flex:1,minWidth:160}}><FL>POSTING / UNIT</FL><Inp value={posting} onChange={setPosting} placeholder="e.g. 1st Imperial Division"/></div>
            {cmdList.length>0&&<div style={{flex:1,minWidth:160}}>
              <FL>COMBATANT COMMAND</FL>

            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"flex-end"}}>
              <div onClick={()=>setIsAdc(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",flexShrink:0}}>
                <div style={{width:16,height:16,border:`2px solid ${isAdc?C.accent:C.border}`,borderRadius:2,
                  background:isAdc?C.accentD:"transparent",display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:10,color:C.accent}}>{isAdc?"✓":""}</div>
                <span style={{fontSize:13,color:isAdc?C.text:C.textD}}>Appointed as ADC</span>
              </div>
              {isAdc&&<div style={{flex:2,minWidth:180}}>
                <FL>ADC TO</FL><Inp value={adcTo} onChange={setAdcTo} placeholder="Rank and name of principal"/>
              </div>}
              {isAdc&&<div style={{flex:1,minWidth:140}}>
                <FL>TYPE</FL>
                <DD value={adcType} onChange={setAdcType} options={[
                  {v:"camp",    l:"Aide-de-Camp"},
                  {v:"personal",l:"Personal ADC"},
                  {v:"honorary",l:"Honorary ADC"},
                  {v:"military",l:"Military Secretary"},
                ]}/>
              </div>}
            </div>
          </div>
          <div><FL>NOTES</FL><TA value={notes} onChange={setNotes} placeholder="Additional notes…" rows={3}/></div>
          <div style={{display:"flex",gap:8}}>
            <Btn disabled={!name.trim()||saving} onClick={async()=>{
              setSaving(true); setProcessing(isNew?"Enlisting personnel…":"Updating record…");
              await onAction(isNew?"createPersonnel":"updatePersonnel",{
                id:person?.id,name:name.trim(),branch,grade,force,position:position.trim(),
                posting:posting.trim(),commandId,notes:notes.trim(),
                isAdc,adcTo:isAdc?adcTo.trim():"",adcType:isAdc?adcType:"",
              });
              setProcessing(null); setSaving(false);
              notify(name+(isNew?" enlisted.":" updated."),C.accent);
              onClose();
            }}>{saving?"Saving…":isNew?"Enlist":"Save Changes"}</Btn>
            <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          </div>
        </div>
      )}

      {tab==="history"&&!isNew&&(
        <div>
          {(person?.serviceHistory||[]).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              {[...person.serviceHistory].reverse().map((h,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"5px 8px",background:C.s2,
                  border:`1px solid ${C.border}`,marginBottom:3,borderRadius:2}}>
                  <span className="mono" style={{fontSize:9,color:C.textDD,flexShrink:0}}>{h.date}</span>
                  <span style={{fontSize:13,color:C.text,flex:1}}>{h.entry}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:120}}><FL>DATE</FL><Inp value={histDate} onChange={setHistDate} type="date"/></div>
            <div style={{flex:3,minWidth:200}}><FL>SERVICE ENTRY</FL><Inp value={histEntry} onChange={setHistEntry} placeholder="e.g. Promoted to Captain"/></div>
          </div>
          <div style={{marginTop:8}}>
            <Btn small disabled={!histEntry.trim()} onClick={async()=>{
              setProcessing("Adding service entry…");
              await onAction("addServiceHistory",{id:person.id,entry:{date:histDate,entry:histEntry.trim()}});
              setProcessing(null); setHistEntry("");
              notify("Service history updated.",C.accent);
            }}>Add Entry</Btn>
          </div>
          {isNew&&<div style={{fontSize:13,color:C.textDD,fontStyle:"italic",marginTop:8}}>Save the record first, then add service history.</div>}
        </div>
      )}

      {tab==="medals"&&!isNew&&(
        <div>
          {(person?.medals||[]).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              {person.medals.map((m,i)=>{
                const mt=MEDAL_TYPES.find(t=>t.v===m.type);
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                    padding:"5px 10px",background:C.s2,border:`1px solid ${C.border}`,marginBottom:3,borderRadius:2}}>
                    <div>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold}}>🎖 {mt?.l||m.type}</span>
                      {m.citation&&<span style={{fontSize:11,color:C.textD,marginLeft:8,fontStyle:"italic"}}>{m.citation}</span>}
                    </div>
                    <span className="mono" style={{fontSize:9,color:C.textDD}}>{m.awarded}</span>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:200}}>
            <FL>MEDAL / HONOUR</FL>
            <select value={medalType} onChange={e=>setMedalType(e.target.value)}
              style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
                       padding:"7px 11px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
              {MEDAL_CATS.map(cat=>(
                <optgroup key={cat.v} label={cat.l}>
                  {MEDAL_TYPES.filter(m=>m.cat===cat.v).map(m=>(
                    <option key={m.v} value={m.v}>{m.l}</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>
            <div style={{flex:2,minWidth:200}}><FL>CITATION (optional)</FL><Inp value={medalCitation} onChange={setMedalCitation} placeholder="Brief citation…"/></div>
          </div>
          <div style={{marginTop:8}}>
            <Btn small onClick={async()=>{
              setProcessing("Awarding medal…");
              await onAction("addMedal",{id:person.id,medal:{type:medalType,citation:medalCitation.trim(),awarded:new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}});
              setProcessing(null); setMedalCitation("");
              notify("Medal awarded.",C.gold);
            }}>Award Medal</Btn>
          </div>
        </div>
      )}
      {(tab==="history"||tab==="medals")&&isNew&&(
        <div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>Save the basic record first.</div>
      )}
    </div>
  );
}

// ── ASSETS SECTION (multi-category wrapper) ──────────────────────────────────
function AssetsSection({ships,commands,canManage,onAction,notify,setProcessing}){
  const [assetCat,setAssetCat]=useState("vessel");
  const totalByCategory=useMemo(()=>{
    const counts={};
    ASSET_CATEGORIES.forEach(cat=>{counts[cat.v]=0;});
    Object.values(ships||{}).forEach(s=>{const cat=s.assetCategory||"vessel";if(counts[cat]!==undefined)counts[cat]++;});
    return counts;
  },[ships]);

  return(
    <div className="fadeIn">
      <STitle>Asset Registry</STitle>
      {/* Overview stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"0.6rem",marginBottom:"1.5rem"}}>
        {ASSET_CATEGORIES.map(cat=>(
          <div key={cat.v} onClick={()=>setAssetCat(cat.v)}
            style={{background:assetCat===cat.v?C.s2:C.s1,border:`1px solid ${assetCat===cat.v?C.accent:C.border}`,
              borderTop:`3px solid ${assetCat===cat.v?C.accent:C.border}`,borderRadius:"0 0 3px 3px",
              padding:"0.75rem",textAlign:"center",cursor:"pointer",transition:"all .15s"}}>
            <div style={{fontSize:20,marginBottom:4}}>{cat.icon}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:assetCat===cat.v?C.accent:C.text,fontWeight:700}}>{totalByCategory[cat.v]||0}</div>
            <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.1em",marginTop:3}}>
              {cat.l.toUpperCase()}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {ASSET_CATEGORIES.map(cat=>(
          <button key={cat.v} onClick={()=>setAssetCat(cat.v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",
                     padding:"0.55rem 1rem",background:"transparent",border:"none",cursor:"pointer",
                     borderBottom:`2px solid ${assetCat===cat.v?C.accent:"transparent"}`,
                     color:assetCat===cat.v?C.accent:C.textD}}>
            {cat.icon} {cat.l}
          </button>
        ))}
      </div>
      {assetCat==="vessel"&&<ShipsSection ships={ships} commands={commands}
        canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {assetCat==="base"&&<GenericAssetSection category="base" label="Bases & Installations"
        ships={ships} commands={commands} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {assetCat==="weapon"&&<GenericAssetSection category="weapon" label="Weapons Systems"
        ships={ships} commands={commands} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {assetCat==="ordnance"&&<GenericAssetSection category="ordnance" label="Ordnance & Ammunition"
        ships={ships} commands={commands} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {assetCat==="vehicle"&&<GenericAssetSection category="vehicle" label="Vehicles & Equipment"
        ships={ships} commands={commands} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>
  );
}

function GenericAssetSection({category,label,ships,commands,canManage,onAction,notify,setProcessing}){
  const [creating,setCreating]=useState(false);
  const [gName,setGName]=useState(""); const [gType,setGType]=useState(
    category==="base"?"naval_base":category==="weapon"?"artillery":category==="ordnance"?"missile":"other"
  );
  const [gQty,setGQty]=useState(""); const [gLocation,setGLocation]=useState("");
  const [gCommand,setGCommand]=useState(""); const [gStatus,setGStatus]=useState("active");
  const [gNotes,setGNotes]=useState(""); const [saving,setSaving]=useState(false);

  const typeOpts = category==="base"?BASE_TYPES:category==="weapon"?WEAPON_TYPES:
    category==="ordnance"?[{v:"missile",l:"Missiles"},{v:"torpedo",l:"Torpedoes"},{v:"bomb",l:"Bombs/Bombs"},{v:"shell",l:"Artillery Shells"},{v:"rocket",l:"Rockets"},{v:"small_arms_ammo",l:"Small Arms Ammunition"},{v:"other",l:"Other Ordnance"}]:
    [{v:"tank",l:"Tank/Armoured Vehicle"},{v:"apc",l:"APC/IFV"},{v:"truck",l:"Logistics Vehicle"},{v:"helicopter",l:"Helicopter"},{v:"boat",l:"Patrol Boat"},{v:"other",l:"Other Equipment"}];
  const cmdList=Object.values(commands||{});
  const assets=Object.values(ships||{}).filter(s=>s.assetCategory===category).sort((a,b)=>a.name?.localeCompare(b.name));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.15em",color:C.textD}}>{label}</div>
        {canManage&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ Register Asset</Btn>}
      </div>
      {creating&&(
        <div style={{background:C.s2,border:`1px solid ${C.accentD}44`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.2em",color:C.accent,marginBottom:"1rem",
            display:"flex",justifyContent:"space-between"}}>
            REGISTER {label.toUpperCase()}
            <button onClick={()=>setCreating(false)} style={{background:"transparent",border:"none",color:C.textD,cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:200}}><FL>NAME / DESIGNATION *</FL><Inp value={gName} onChange={setGName} placeholder="Name or designation"/></div>
              <div style={{flex:1,minWidth:140}}><FL>TYPE</FL><DD value={gType} onChange={setGType} options={typeOpts.map(t=>({v:t.v,l:t.l}))}/></div>
              {(category==="ordnance"||category==="vehicle"||category==="weapon")&&(
                <div style={{flex:1,minWidth:100}}><FL>QUANTITY</FL><Inp value={gQty} onChange={setGQty} placeholder="e.g. 24"/></div>
              )}
            </div>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:180}}><FL>LOCATION / BASE</FL><Inp value={gLocation} onChange={setGLocation} placeholder="Location"/></div>
              {cmdList.length>0&&<div style={{flex:1,minWidth:180}}>
                <FL>COMMAND</FL>
                <DD value={gCommand} onChange={setGCommand} options={[{v:"",l:"— None —"},...cmdList.map(x=>({v:x.id,l:x.name}))]}/>
              </div>}
              <div style={{flex:1,minWidth:140}}>
                <FL>STATUS</FL>
                <DD value={gStatus} onChange={setGStatus} options={[{v:"active",l:"Active"},{v:"maintenance",l:"Maintenance"},{v:"reserve",l:"Reserve"},{v:"decommissioned",l:"Decommissioned"}]}/>
              </div>
            </div>
            <div><FL>NOTES</FL><TA value={gNotes} onChange={setGNotes} placeholder="Additional notes…" rows={2}/></div>
            <div style={{display:"flex",gap:8}}>
              <Btn disabled={!gName.trim()||saving} onClick={async()=>{
                setSaving(true); setProcessing("Registering asset…");
                await onAction("createShip",{ship:{name:gName.trim(),type:gType,assetCategory:category,
                  quantity:gQty.trim(),location:gLocation.trim(),commandId:gCommand,
                  status:gStatus,notes:gNotes.trim()}});
                setProcessing(null); setSaving(false);
                notify(gName+" registered.",C.accent);
                setGName(""); setGQty(""); setGLocation(""); setGNotes(""); setCreating(false);
              }}>{saving?"Registering…":"Register"}</Btn>
              <Btn variant="ghost" onClick={()=>setCreating(false)}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
      {assets.length===0
        ?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No {label.toLowerCase()} registered.</div>
        :assets.map(asset=>(
          <div key={asset.id} style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.accent}`,
            borderRadius:"0 3px 3px 0",marginBottom:"0.5rem",padding:"0.65rem 1rem",
            display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:600,color:C.text}}>{asset.name}</span>
              {asset.quantity&&<span className="mono" style={{fontSize:9,color:C.textDD,marginLeft:8}}>QTY: {asset.quantity}</span>}
              {asset.location&&<span style={{fontSize:12,color:C.textD,marginLeft:8,fontStyle:"italic"}}>{asset.location}</span>}
              {commands[asset.commandId]&&<span className="mono" style={{fontSize:9,color:C.textDD,marginLeft:8}}>{commands[asset.commandId].name}</span>}
            </div>
            <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s3,
              border:`1px solid ${asset.status==="active"?"#2a9a4a44":C.border}`,
              color:asset.status==="active"?"#2a9a4a":C.textDD}}>
              {(asset.status||"active").toUpperCase()}
            </span>
            {canManage&&<ArmBtn small label="Remove" confirmLabel="Remove?" onConfirm={async()=>{
              setProcessing("Removing asset…"); await onAction("deleteShip",{id:asset.id});
              setProcessing(null); notify(asset.name+" removed.",C.textD);
            }}/>}
          </div>
        ))
      }
    </div>
  );
}

// ── SHIPS SECTION ─────────────────────────────────────────────────────────────
function ShipsSection({ships,commands,canManage,onAction,notify,setProcessing}){
  const [creating,setCreating]=useState(false);
  const [filter,setFilter]=useState("all");
  const vesselOnly=Object.values(ships||{}).filter(s=>!s.assetCategory||s.assetCategory==="vessel");
  const navyBases=Object.values(ships||{}).filter(s=>s.assetCategory==="base"&&(s.type==="naval_base"));
  const list=vesselOnly
    .filter(s=>filter==="all"||s.status===filter)
    .sort((a,b)=>a.name?.localeCompare(b.name));
  return(
    <div className="fadeIn">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",gap:8,flexWrap:"wrap"}}>
        <STitle style={{marginBottom:0}}>Naval Vessel Registry</STitle>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={filter} onChange={e=>setFilter(e.target.value)}
            style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                     padding:"5px 10px",color:C.text,fontSize:13,fontFamily:"'Crimson Text',serif"}}>
            <option value="all">All Status</option>
            {SHIP_STATUSES.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}
          </select>
          {canManage&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ Register Asset</Btn>}
        </div>
      </div>
      {creating&&<ShipForm commands={commands} navyBases={navyBases} onAction={onAction} notify={notify}
          setProcessing={setProcessing} onClose={()=>setCreating(false)}/>}
      {list.length===0
        ?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No assets registered.</div>
        :list.map(s=><ShipCard key={s.id} ship={s} commands={commands} canManage={canManage}
            onAction={onAction} notify={notify} setProcessing={setProcessing}/>)
      }
    </div>
  );
}
function ShipCard({ship,commands,canManage,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const st=SHIP_STATUSES.find(s=>s.v===ship.status)||SHIP_STATUSES[0];
  const tp=SHIP_TYPES.find(t=>t.v===ship.type);
  const cmd=commands?.[ship.commandId];
  return(
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${st.color}`,
      borderRadius:"0 3px 3px 0",marginBottom:"0.5rem",overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:10,padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
        <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s3,
          border:`1px solid ${st.color}44`,color:st.color}}>{ship.status?.toUpperCase()}</span>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:600,color:C.text,flex:1}}>
          {ship.name}
          {ship.hullNumber&&<span className="mono" style={{fontSize:10,color:C.textDD,marginLeft:8}}>{ship.hullNumber}</span>}
        </span>
        {tp&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{tp.l}</span>}
        {cmd&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{cmd.name}</span>}
        <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",background:C.s2}}>
          <div style={{display:"flex",gap:"2rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {ship.shipClass&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>CLASS</div>
              <span style={{fontSize:13,color:C.text}}>{ship.shipClass}</span></div>}
            {ship.displacement&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>DISPLACEMENT</div>
              <span style={{fontSize:13,color:C.text}}>{ship.displacement}</span></div>}
            {ship.crew&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>CREW</div>
              <span style={{fontSize:13,color:C.text}}>{ship.crew}</span></div>}
            {ship.homePort&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>HOME PORT</div>
              <span style={{fontSize:13,color:C.text}}>{ship.homePort}</span></div>}
            {cmd&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>COMMAND</div>
              <span style={{fontSize:13,color:C.textD}}>{cmd.name}</span></div>}
          </div>
          {ship.notes&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"0.75rem"}}>{ship.notes}</div>}
          {canManage&&(
            <div style={{display:"flex",gap:6,borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>
              <ShipStatusEditor ship={ship} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
              <ArmBtn small label="Decommission" confirmLabel="Remove asset?" onConfirm={async()=>{
                setProcessing("Removing asset…");
                await onAction("deleteShip",{id:ship.id});
                setProcessing(null); notify(ship.name+" removed.",C.textD);
              }}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
function ShipStatusEditor({ship,onAction,notify,setProcessing}){
  const [status,setStatus]=useState(ship.status||"active");
  const [saving,setSaving]=useState(false);
  return(
    <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
      <div style={{minWidth:160}}>
        <select value={status} onChange={e=>setStatus(e.target.value)}
          style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:2,
                   padding:"4px 8px",color:C.text,fontSize:12,fontFamily:"'Crimson Text',serif"}}>
          {SHIP_STATUSES.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}
        </select>
      </div>
      <Btn small variant="gold" disabled={status===ship.status||saving} onClick={async()=>{
        setSaving(true); setProcessing("Updating asset status…");
        await onAction("updateShipStatus",{id:ship.id,status});
        setProcessing(null); setSaving(false);
        notify("Asset status updated.",C.gold);
      }}>{saving?"…":"Update"}</Btn>
    </div>
  );
}
function ShipForm({commands,navyBases=[],onAction,notify,setProcessing,onClose}){

function OrbatTree({commands,personnel,ships,canManage,onEdit}){
  const [openMap,setOpenMap]=useState({});
  const toggle=(id)=>setOpenMap(o=>({...o,[id]:!(o[id]===undefined?true:o[id])}));
  const isOpen=(id)=>openMap[id]===undefined?true:openMap[id];

  // Build child map
  const childMap={};
  Object.values(commands||{}).forEach(u=>{
    const pid=u.parentId||"__root";
    if(!childMap[pid]) childMap[pid]=[];
    childMap[pid].push(u);
  });
  // Sort by echelon
  const echOrder={GCC:0,FCC:1,component:2,formation:3,unit:4,subunit:5};
  Object.keys(childMap).forEach(k=>{
    childMap[k].sort((a,b)=>((echOrder[a.echelon||a.type]||5)-(echOrder[b.echelon||b.type]||5))||((a.name||"").localeCompare(b.name||"")));
  });

  function renderNode(unit,depth){
    const children=childMap[unit.id]||[];
    return(
      <div key={unit.id}>
        <OrbatNodeCard unit={unit} depth={depth} hasChildren={children.length>0}
          isOpen={isOpen(unit.id)} onToggle={()=>toggle(unit.id)}
          canManage={canManage} onEdit={onEdit}
          personnel={personnel} ships={ships} commands={commands}/>
        {isOpen(unit.id)&&children.map(child=>renderNode(child,depth+1))}
      </div>
    );
  }

  const roots=childMap["__root"]||[];
  if(roots.length===0) return(
    <div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
      No commands established. Use the form to define the order of battle.
    </div>
  );
  return <div>{roots.map(unit=>renderNode(unit,0))}</div>;
}

          <div style={{flex:1,minWidth:160}}><FL>BRANCH / COMPONENT</FL>

          </div>

        <div><FL>COMMANDING OFFICER</FL><Inp value={commanderName} onChange={setCommanderName} placeholder="Rank and name of CO"/></div>

          }}>{saving?"SAVING...":(cmd?"SAVE CHANGES":"CREATE")}</Btn>

function CommandsSection({commands,personnel,ships,canManage,onAction,notify,setProcessing}){
  const [creating,setCreating]=useState(false);
  const [editing,setEditing]=useState(null);

  async function save(data){
    setProcessing("Saving...");
    if(editing){
      await onAction("updateCommand",{id:editing.id,...data});
      setProcessing(null); setEditing(null); notify("Command updated.",C.accent);
    } else {
      await onAction("createCommand",data);
      setProcessing(null); setCreating(false); notify("Command created.",C.accent);
    }
  }

  return(
    <div className="fadeIn">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <STitle style={{marginBottom:0}}>Order of Battle</STitle>
        {canManage&&!creating&&!editing&&<Btn small onClick={()=>setCreating(true)}>+ New Unit / Command</Btn>}
      </div>
      {(creating||editing)&&(
        <CommandForm cmd={editing} commands={commands}
          onSave={save} onCancel={()=>{setCreating(false);setEditing(null);}}/>
      )}
      <OrbatTree commands={commands} personnel={personnel} ships={ships} canManage={canManage}
        onEdit={u=>{setEditing(u);setCreating(false);}}/>
    </div>
  );
}

// Map canvas with pan/zoom and draggable op markers
function OpsMapCanvas({operations,selectedId,onSelect,onMove,canManage,borders,onMapClick,borderMode,onDeleteBorder,mfaCountries,placingPinFor,onPlacePin,onSelectCountry}){
  const containerRef=useRef(null);
  const [view,setView]=useState({zoom:1,panX:0,panY:0});
  // Center map on mount
  useEffect(()=>{
    if(!containerRef.current) return;
    const rect=containerRef.current.getBoundingClientRect();
    const imgW=1060; const imgH=Math.round(1060*(895/1372)); // actual aspect ratio 1372x895
    setView({zoom:1,panX:(rect.width-imgW)/2,panY:(rect.height-imgH)/2});
  },[]);

  const dragging=useRef(null);
  const lastMouse=useRef({x:0,y:0});
  const imgRef=useRef(null);

  function getMapCoords(cx,cy){
    const rect=containerRef.current.getBoundingClientRect();
    const img=imgRef.current;
    if(!img) return {x:0.5,y:0.5};
    const mx=(cx-rect.left-view.panX)/view.zoom;
    const my=(cy-rect.top-view.panY)/view.zoom;
    return {x:Math.max(0,Math.min(1,mx/img.offsetWidth)),y:Math.max(0,Math.min(1,my/img.offsetHeight))};
  }

  // Point-in-polygon test
  function pointInPoly(px,py,verts){
    let inside=false;
    for(let i=0,j=verts.length-1;i<verts.length;j=i++){
      const xi=verts[i].x,yi=verts[i].y,xj=verts[j].x,yj=verts[j].y;
      if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  const handleMapMouseDown=(e)=>{
    if(e.target.closest("[data-opmarker]")) return;
    dragging.current={type:"pan"};
    lastMouse.current={x:e.clientX,y:e.clientY};
    e.preventDefault();
  };
  const handleMarkerMouseDown=(opId,e)=>{
    if(!canManage) return;
    dragging.current={type:"marker",opId,px:null,py:null};
    lastMouse.current={x:e.clientX,y:e.clientY};
    e.preventDefault(); e.stopPropagation();
  };
  const handleMouseMove=(e)=>{
    if(!dragging.current) return;
    const dx=e.clientX-lastMouse.current.x;
    const dy=e.clientY-lastMouse.current.y;
    lastMouse.current={x:e.clientX,y:e.clientY};
    if(dragging.current.type==="pan"){
      setView(v=>({...v,panX:v.panX+dx,panY:v.panY+dy}));
    } else if(dragging.current.type==="marker"){
      const c=getMapCoords(e.clientX,e.clientY);
      dragging.current.px=c.x; dragging.current.py=c.y;
      onMove(dragging.current.opId,c.x,c.y,false);
    }
  };
  const handleMouseUp=()=>{
    if(dragging.current?.type==="marker" && dragging.current.px!==null){
      onMove(dragging.current.opId,dragging.current.px,dragging.current.py,true);
    }
    dragging.current=null;
  };
  const handleWheel=(e)=>{
    e.preventDefault();
    const rect=containerRef.current.getBoundingClientRect();
    const f=e.deltaY>0?0.85:1.18;
    setView(v=>{
      const nz=Math.max(0.3,Math.min(5,v.zoom*f));
      const mx=e.clientX-rect.left; const my=e.clientY-rect.top;
      return{zoom:nz,panX:mx-(mx-v.panX)*(nz/v.zoom),panY:my-(my-v.panY)*(nz/v.zoom)};
    });
  };

  // Click on map: border mode, place-pin mode, or country select
  const handleMapClick=(e)=>{
    if(e.target.closest("[data-opmarker]")) return;
    const c=getMapCoords(e.clientX,e.clientY);
    if(borderMode){ onMapClick&&onMapClick(c.x,c.y); return; }
    if(placingPinFor){ onPlacePin&&onPlacePin(placingPinFor,c.x,c.y); return; }
    // Check if click is inside any border polygon
    const borderArr=Object.values(borders||{});
    for(const b of borderArr){
      if(b.vertices&&b.vertices.length>2&&pointInPoly(c.x,c.y,b.vertices)){
        onSelectCountry&&onSelectCountry(b.countryId);
        return;
      }
    }
  };

  const opList=Object.values(operations||{}).filter(op=>op.mapX!=null&&op.mapY!=null);

  // Get image dimensions for SVG sizing
  const imgDisplayW=1060;
  // Use actual image aspect ratio: 1372x895
  const imgDisplayH=Math.round(1060*(895/1372));

  // Determine cursor
  const mapCursor=borderMode?"crosshair":placingPinFor?"cell":"grab";

  return(
    <div ref={containerRef} style={{position:"relative",width:"100%",height:"100%",
      overflow:"hidden",background:"#040806",cursor:mapCursor,userSelect:"none"}}
      onMouseDown={handleMapMouseDown} onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onWheel={handleWheel}
      onClick={handleMapClick}>
      <div style={{position:"absolute",left:view.panX,top:view.panY,
        transformOrigin:"0 0",transform:`scale(${view.zoom})`}}>
        <img ref={imgRef} src={MAP_B64} alt="Theatre Map"
          style={{display:"block",width:imgDisplayW,height:imgDisplayH,imageRendering:"pixelated"}}
          draggable="false"/>
        {/* grid overlay */}
        <div style={{position:"absolute",inset:0,
          backgroundImage:"linear-gradient(rgba(200,160,32,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(200,160,32,.05) 1px,transparent 1px)",
          backgroundSize:"53px 50px",pointerEvents:"none"}}/>
        {/* Country border polygons — SVG uses viewBox="0 0 1 1" so fractions map 1:1 */}
        <svg viewBox="0 0 1 1" preserveAspectRatio="none"
          style={{position:"absolute",left:0,top:0,width:imgDisplayW,height:imgDisplayH,pointerEvents:"none",overflow:"visible"}}>
          {Object.values(borders||{}).map(b=>{
            if(!b.vertices||b.vertices.length<2) return null;
            const country=mfaCountries?.[b.countryId];
            const relColors={full:"#2a9a4a",limited:"#C9A84C",none:"#7a7a7a",hostile:"#cc2222"};
            const col=relColors[country?.relation||"none"]||"#4a7aaa";
            // Vertices are already 0-1 fractions — use directly in viewBox 0 0 1 1
            const pts=b.vertices.map(v=>`${v.x},${v.y}`).join(" ");
            return(
              <g key={b.id||b.countryId}>
                {b.vertices.length>2&&(
                  <polygon points={pts} fill={col+"22"} stroke={col}
                    strokeWidth="0.003" strokeDasharray="0.012,0.005"
                    vectorEffect="non-scaling-stroke" style={{pointerEvents:"none"}}/>
                )}
                {b.vertices.length===2&&(
                  <line x1={b.vertices[0].x} y1={b.vertices[0].y}
                        x2={b.vertices[1].x} y2={b.vertices[1].y}
                        stroke={col} strokeWidth="0.003" strokeDasharray="0.012,0.005"
                        vectorEffect="non-scaling-stroke"/>
                )}
                {/* Label at centroid */}
                {b.vertices.length>2&&(()=>{
                  const cx=b.vertices.reduce((s,v)=>s+v.x,0)/b.vertices.length;
                  const cy=b.vertices.reduce((s,v)=>s+v.y,0)/b.vertices.length;
                  return(
                    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
                      fill={col} fontSize="0.018" fontFamily="Share Tech Mono,monospace"
                      style={{pointerEvents:"none",userSelect:"none"}}
                      paintOrder="stroke" stroke="#000" strokeWidth="0.004" strokeLinejoin="round">
                      {b.countryName||b.countryId}
                    </text>
                  );
                })()}
                {/* Vertex dots for emperor editing */}
                {canManage&&borderMode&&b.vertices.map((v,vi)=>(
                  <circle key={vi} cx={v.x} cy={v.y} r="0.007"
                    fill={col} stroke="#fff" strokeWidth="0.002"
                    vectorEffect="non-scaling-stroke" style={{pointerEvents:"none"}}/>
                ))}
              </g>
            );
          })}
        </svg>
        {/* Op markers */}
        {opList.map(op=>{
          const st=OP_STATUSES.find(s=>s.v===op.status)||OP_STATUSES[0];
          const ot=OT(op.type);
          const isSel=selectedId===op.id;
          const isActive=op.status==="active";
          return(
            <div key={op.id} data-opmarker="1"
              onMouseDown={(e)=>handleMarkerMouseDown(op.id,e)}
              onClick={(e)=>{e.stopPropagation();onSelect(op.id===selectedId?null:op.id);}}
              style={{position:"absolute",left:(op.mapX||0.5)*100+"%",top:(op.mapY||0.5)*100+"%",
                transform:"translate(-50%,-50%)",cursor:canManage?"grab":"pointer",zIndex:isSel?20:10}}>

// SMEAC edit form
function SmeacForm({op,onSave,onCancel,operations,personnel,ships,commands}){
  const existing=op||{};
  const existingSmeac=existing.smeac||{};
  const [name,setName]=useState(existing.name||"");
  const [codename,setCodename]=useState(existing.codename||"");
  const [type,setType]=useState(existing.type||"combat");
  const [status,setStatus]=useState(existing.status||"planning");
  const [clearance,setClearance]=useState(String(existing.clearance||0));
  const [mission,setMission]=useState(existing.mission||"");
  const [smeacData,setSmeacData]=useState(()=>{
    const d={};
    SMEAC_SECTIONS.forEach(sec=>{
      d[sec.key]={};
      sec.subs.forEach(sub=>{ d[sec.key][sub.k]=existingSmeac[sec.key]?.[sub.k]||""; });
    });
    return d;
  });
  const [assignedAssets,setAssignedAssets]=useState(existing.assignedAssets||[]);
  const [openSections,setOpenSections]=useState({situation:true,mission:true,execution:false,adminLog:false,cmdSignal:false,assets:false});
  const [saving,setSaving]=useState(false);

  const setSmeacField=(secKey,subKey,val)=>{
    setSmeacData(d=>({...d,[secKey]:{...d[secKey],[subKey]:val}}));
  };
  const toggleSec=(k)=>setOpenSections(o=>({...o,[k]:!o[k]}));

  const allAssets={
    ...Object.fromEntries(Object.values(ships||{}).map(s=>[s.id,{id:s.id,name:s.name,cat:"vessel",cmdId:s.commandId}])),
  };
  const addAsset=(id)=>{
    if(!id||assignedAssets.find(a=>a.assetId===id)) return;
    setAssignedAssets(prev=>[...prev,{assetId:id,role:"",isLoaned:false}]);
  };
  const removeAsset=(id)=>setAssignedAssets(prev=>prev.filter(a=>a.assetId!==id));
  const setAssetField=(id,field,val)=>setAssignedAssets(prev=>prev.map(a=>a.assetId===id?{...a,[field]:val}:a));

  const cl=MCL(parseInt(clearance)||0);

  async function save(){
    if(!name.trim()) return;
    setSaving(true);
    await onSave({
      name:name.trim(),codename:codename.trim().toUpperCase(),type,status,
      clearance:parseInt(clearance)||0,mission:mission.trim(),
      smeac:smeacData,assignedAssets,
    });

  }

    return(

          <div key={sub.k} style={{marginBottom:8}}>

          </div>
        ))}
      </div>}

      {/* Assets */}
      <SecHeader skey="assets" num="+" title="Assigned Assets / Forces"/>
      {openSections.assets&&<div style={{border:`1px solid ${C.border}`,borderTop:"none",padding:"10px",marginBottom:4,background:C.s1}}>
        {assignedAssets.length===0&&<div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:8}}>No assets assigned.</div>}
