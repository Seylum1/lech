// Main operations section
function OperationsSection({operations,currentUser,commands,ships,personnel,canManage,onAction,notify,setProcessing,mapBorders,mfaCountries,isEmperor}){
  const [selectedId,setSelectedId]=useState(null);
  const [editing,setEditing]=useState(null);
  const [creating,setCreating]=useState(false);
  const [filter,setFilter]=useState("all");

  // Border drawing state
  const [borderMode,setBorderMode]=useState(false);
  const [drawingVerts,setDrawingVerts]=useState([]);
  const [drawingCountryId,setDrawingCountryId]=useState("");
  const [drawingCountryName,setDrawingCountryName]=useState("");
  const [showBorderPanel,setShowBorderPanel]=useState(false);

  // Pin placement state
  const [placingPinFor,setPlacingPinFor]=useState(null);

  // Selected country for MFA popup
  const [selectedCountry,setSelectedCountry]=useState(null);

  const selectedOp=selectedId?operations[selectedId]:null;
  const userClearance=currentUser?.clearance||0;

  const filteredOps=useMemo(()=>
    Object.values(operations||{})
      .filter(op=>(op.clearance||0)<=userClearance && (filter==="all"||op.status===filter))
      .sort((a,b)=>(b.created||0)-(a.created||0))
  ,[operations,filter,userClearance]);

  // ESC key to cancel modes
  useEffect(()=>{
    const fn=(e)=>{
      if(e.key==="Escape"){
        if(borderMode){ setBorderMode(false); setDrawingVerts([]); }
        if(placingPinFor){ setPlacingPinFor(null); }
        if(selectedCountry){ setSelectedCountry(null); }
      }
    };
    window.addEventListener("keydown",fn);
    return()=>window.removeEventListener("keydown",fn);
  },[borderMode,placingPinFor,selectedCountry]);

  async function handleMove(opId,x,y,save){
    if(save) await onAction("updateOperation",{id:opId,mapX:x,mapY:y});
  }

  // Border drawing: add vertex on map click
  function handleMapClick(x,y){
    if(!borderMode) return;
    setDrawingVerts(v=>[...v,{x,y}]);
  }

  // Finish drawing a border polygon
  async function finishBorder(){
    if(drawingVerts.length<3||!drawingCountryId.trim()) return;
    const borderId="border_"+Date.now();
    await onAction("saveBorder",{
      id:borderId,
      countryId:drawingCountryId.trim(),
      countryName:drawingCountryName.trim()||drawingCountryId.trim(),
      vertices:drawingVerts
    });
    setBorderMode(false); setDrawingVerts([]); setDrawingCountryId(""); setDrawingCountryName("");
    notify("Border saved.",C.accent);
  }

  // Place pin mode
  async function handlePlacePin(opId,x,y){
    await onAction("updateOperation",{id:opId,mapX:x,mapY:y});
    setPlacingPinFor(null);
    notify("Pin placed.",C.accent);
  }

  async function handleSave(data){
    setProcessing("Saving operation...");
    if(editing){
      await onAction("updateOperation",{id:editing.id,...data});
      setProcessing(null); setEditing(null); notify("Operation saved.",C.accent);
    } else {
      await onAction("createOperation",{op:{...data,notes:[],assignedAssets:data.assignedAssets||[]}});
      setProcessing(null); setCreating(false); notify("Operation created.",C.accent);
    }
  }

  if(creating||editing){
    return(
      <div className="fadeIn" style={{height:"100%",overflowY:"auto"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"1rem 1rem 3rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,letterSpacing:".2em",color:C.accent,marginBottom:12}}>
            {editing?"EDIT OPERATION ORDER":"NEW OPERATION ORDER"}
          </div>
          <SmeacForm op={editing} onSave={handleSave}
            onCancel={()=>{setEditing(null);setCreating(false);}}
            operations={operations} personnel={personnel} ships={ships} commands={commands}/>
        </div>
      </div>
    );
  }

  const relColors={full:"#2a9a4a",limited:"#C9A84C",none:"#7a7a7a",hostile:"#cc2222"};

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      {/* Left: op list + emperor tools */}
      <div style={{width:210,flexShrink:0,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",background:C.s1}}>
        <div style={{padding:"8px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span className="mono" style={{fontSize:8,letterSpacing:".15em",color:C.textDD}}>OPERATIONS</span>
            {canManage&&<Btn small onClick={()=>{setCreating(true);setSelectedId(null);}}>+NEW</Btn>}
          </div>
          <select value={filter} onChange={e=>setFilter(e.target.value)}
            style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,padding:"4px 6px",fontSize:8,color:C.textD,fontFamily:"'Share Tech Mono',monospace"}}>
            <option value="all">ALL STATUS</option>
            {OP_STATUSES.map(s=><option key={s.v} value={s.v}>{s.l.toUpperCase()}</option>)}
          </select>
        </div>
        <div style={{flex:1,overflow:"auto"}}>
          {filteredOps.length===0&&<div className="mono" style={{fontSize:8,color:C.textDD,textAlign:"center",padding:"1rem"}}>No operations.</div>}
          {filteredOps.map(op=>{
            const st=OP_STATUSES.find(s=>s.v===op.status)||OP_STATUSES[0];
            const isSel=selectedId===op.id;
            const isPlacing=placingPinFor===op.id;
            return(
              <div key={op.id} style={{borderBottom:`1px solid ${C.border}`,background:isSel?C.s3:"transparent",borderLeft:`3px solid ${isSel?st.color:"transparent"}`}}>
                <div onClick={()=>setSelectedId(isSel?null:op.id)}
                  style={{padding:"7px 8px",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:st.color,flexShrink:0,
                      animation:op.status==="active"?"pulse 1.5s ease-in-out infinite":"none"}}/>
                    <span className="mono" style={{fontSize:7,color:st.color,letterSpacing:".08em"}}>{(op.status||"").toUpperCase()}</span>
                    {op.mapX!=null&&<span className="mono" style={{fontSize:6,color:C.accent,marginLeft:"auto"}}>●MAP</span>}
                  </div>
                  <div className="mono" style={{fontSize:9,color:C.text,lineHeight:1.3}}>{op.codename||op.name}</div>
                  {op.codename&&<div className="mono" style={{fontSize:7,color:C.textDD}}>{op.name}</div>}
                </div>
                {/* Pin placement controls */}
                {isSel&&canManage&&(
                  <div style={{padding:"0 8px 6px",display:"flex",gap:4,flexWrap:"wrap"}}>
                    {!isPlacing
                      ?<button onClick={()=>setPlacingPinFor(op.id)}
                          style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"2px 6px",
                            background:op.mapX!=null?"#0a1a10":"#1a0a00",
                            border:`1px solid ${op.mapX!=null?"#2a5a2a":"#5a3a00"}`,
                            color:op.mapX!=null?"#4a9a4a":"#C9A84C",cursor:"pointer"}}>
                          {op.mapX!=null?"📍 MOVE PIN":"📍 PLACE PIN"}
                        </button>
                      :<button onClick={()=>setPlacingPinFor(null)}
                          style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"2px 6px",
                            background:"#1a0808",border:"1px solid #cc2222",color:"#cc2222",cursor:"pointer",
                            animation:"warflash 1s infinite"}}>
                          ✕ CANCEL
                        </button>
                    }
                    {op.mapX!=null&&<button onClick={async()=>{
                        await onAction("updateOperation",{id:op.id,mapX:null,mapY:null});
                        notify("Pin removed.",C.textD);
                      }}
                      style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"2px 6px",
                        background:"transparent",border:`1px solid ${C.border}`,color:C.textDD,cursor:"pointer"}}>
                      ✕ PIN
                    </button>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{padding:"6px 8px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          {OP_STATUSES.map(s=>(
            <div key={s.v} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:s.color,flexShrink:0}}/>
              <span className="mono" style={{fontSize:7,color:C.textDD}}>{s.l.toUpperCase()}</span>
            </div>
          ))}
        </div>
        {/* Emperor: Border tools */}
        {isEmperor&&(
          <div style={{borderTop:`1px solid ${C.border}`,padding:"8px",background:C.s2,flexShrink:0}}>
            <div className="mono" style={{fontSize:7,color:C.gold,letterSpacing:".15em",marginBottom:6}}>⬡ COUNTRY BORDERS</div>
            {!borderMode
              ?<button onClick={()=>setShowBorderPanel(p=>!p)}
                  style={{width:"100%",fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"4px 6px",
                    background:"#1a1200",border:`1px solid ${C.accentD}`,color:C.accent,cursor:"pointer",marginBottom:4}}>
                  {showBorderPanel?"▲ HIDE":"▼ DRAW BORDER"}
                </button>
              :<button onClick={()=>{setBorderMode(false);setDrawingVerts([]);}}
                  style={{width:"100%",fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"4px 6px",
                    background:"#1a0808",border:"1px solid #cc2222",color:"#cc2222",cursor:"pointer",marginBottom:4}}>
                  ✕ CANCEL DRAW
                </button>
            }
            {showBorderPanel&&!borderMode&&(
              <div>
                <div style={{marginBottom:4}}>
                  <div className="mono" style={{fontSize:7,color:C.textDD,marginBottom:2}}>COUNTRY ID (from MFA)</div>
                  <input value={drawingCountryId} onChange={e=>setDrawingCountryId(e.target.value)}
                    placeholder="country_id or name"
                    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,padding:"3px 6px",
                      color:C.text,fontSize:9,fontFamily:"'Share Tech Mono',monospace",outline:"none"}}/>
                </div>
                <div style={{marginBottom:6}}>
                  <div className="mono" style={{fontSize:7,color:C.textDD,marginBottom:2}}>DISPLAY NAME</div>
                  <input value={drawingCountryName} onChange={e=>setDrawingCountryName(e.target.value)}
                    placeholder="Label on map"
                    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,padding:"3px 6px",
                      color:C.text,fontSize:9,fontFamily:"'Share Tech Mono',monospace",outline:"none"}}/>
                </div>
                <button onClick={()=>{if(drawingCountryId.trim()){setBorderMode(true);setDrawingVerts([]);setShowBorderPanel(false);}}}
                  disabled={!drawingCountryId.trim()}
                  style={{width:"100%",fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"4px 6px",
                    background:drawingCountryId.trim()?"#0a1200":"#0a0a0a",border:`1px solid ${drawingCountryId.trim()?C.accent:C.border}`,
                    color:drawingCountryId.trim()?C.accent:C.textDD,cursor:drawingCountryId.trim()?"pointer":"not-allowed",marginBottom:4}}>
                  START DRAWING
                </button>
              </div>
            )}
            {borderMode&&(
              <div>
                <div className="mono" style={{fontSize:7,color:"#C9A84C",marginBottom:4}}>
                  Vertices: {drawingVerts.length} — Click map to add points
                </div>
                {drawingVerts.length>=3&&(
                  <button onClick={finishBorder}
                    style={{width:"100%",fontFamily:"'Share Tech Mono',monospace",fontSize:7,padding:"4px 6px",
                      background:"linear-gradient(135deg,#0a2a10,#1a5a20)",border:"1px solid #2a7a2a",
                      color:"#7ad47a",cursor:"pointer",marginBottom:4}}>
                    ✓ SAVE BORDER ({drawingVerts.length} pts)
                  </button>
                )}
              </div>
            )}
            {/* Existing borders list */}
            {Object.values(mapBorders||{}).map(b=>(
              <div key={b.id||b.countryId} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                <div style={{width:8,height:8,borderRadius:1,flexShrink:0,
                  background:(relColors[mfaCountries?.[b.countryId]?.relation]||"#4a7aaa")+"44",
                  border:`1px solid ${relColors[mfaCountries?.[b.countryId]?.relation]||"#4a7aaa"}`}}/>
                <span className="mono" style={{fontSize:7,color:C.textD,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {b.countryName||b.countryId}
                </span>
                <button onClick={async()=>{await onAction("deleteBorder",{id:b.id||b.countryId});notify("Border removed.",C.textD);}}
                  style={{background:"transparent",border:"none",color:C.textDD,cursor:"pointer",fontSize:9,padding:"0 2px",flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Centre: Map */}
      <div style={{flex:1,position:"relative"}}>
        <OpsMapCanvas operations={operations} selectedId={selectedId}
          onSelect={(id)=>{setSelectedId(id);setSelectedCountry(null);}}
          onMove={handleMove} canManage={canManage}
          borders={mapBorders} mfaCountries={mfaCountries}
          borderMode={borderMode} onMapClick={handleMapClick}
          onDeleteBorder={(id)=>onAction("deleteBorder",{id})}
          placingPinFor={placingPinFor} onPlacePin={handlePlacePin}
          onSelectCountry={(cId)=>{setSelectedCountry(cId);setSelectedId(null);}}/>
      </div>

      {/* Right: Op detail OR Country info */}
      {selectedOp&&(
        <div style={{width:340,flexShrink:0}}>
          <OpSidePanel op={selectedOp} currentUser={currentUser} canManage={canManage}
            onAction={onAction} notify={notify} setProcessing={setProcessing}
            onEdit={()=>{setEditing(selectedOp);setSelectedId(null);}}
            onClose={()=>setSelectedId(null)}
            operations={operations} ships={ships}/>
        </div>
      )}
      {selectedCountry&&!selectedOp&&(()=>{
        const c=mfaCountries?.[selectedCountry];
        const relColors2={full:{color:"#2a9a4a",badge:"DIPLOMATIC RELATIONS"},limited:{color:"#C9A84C",badge:"LIMITED RELATIONS"},none:{color:"#7a7a7a",badge:"NO RELATIONS"},hostile:{color:"#cc2222",badge:"DESIGNATED HOSTILE"}};
        const rc=relColors2[c?.relation||"none"]||relColors2.none;
        return(
          <div style={{width:300,flexShrink:0,background:C.s1,borderLeft:`1px solid ${C.borderL}`,display:"flex",flexDirection:"column"}}>
            <div style={{background:C.s2,borderBottom:`1px solid ${C.borderL}`,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div className="mono" style={{fontSize:7,letterSpacing:".2em",color:C.accentD,marginBottom:4}}>MFA — COUNTRY PROFILE</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:C.text}}>{c?.name||selectedCountry}</div>
                <span className="mono" style={{fontSize:8,padding:"1px 6px",border:`1px solid ${rc.color}44`,color:rc.color,background:rc.color+"11"}}>{rc.badge}</span>
              </div>
              <button onClick={()=>setSelectedCountry(null)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDD,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontSize:9,padding:"3px 8px",flexShrink:0}}>✕</button>
            </div>
            <div style={{flex:1,overflow:"auto",padding:"12px 14px"}}>
              {c?(
                <div>
                  {c.entityType&&<div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:8,textTransform:"uppercase"}}>{c.entityType==="state"?"SOVEREIGN STATE":c.entityType==="territory"?"TERRITORY":c.entityType==="organisation"?"INTERNATIONAL ORGANISATION":c.entityType==="militant"?"NON-STATE ARMED GROUP":c.entityType}</div>}
                  {c.policyStatement&&(
                    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`3px solid ${rc.color}`,padding:"8px 10px",marginBottom:10}}>
                      <div className="mono" style={{fontSize:7,color:C.accentD,marginBottom:4,letterSpacing:".12em"}}>POLICY STATEMENT</div>
                      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.6}}>{c.policyStatement}</div>
                    </div>
                  )}
                  {c.visaPolicy&&(
                    <div style={{marginBottom:8}}>
                      <div className="mono" style={{fontSize:7,color:C.textDD,marginBottom:2}}>VISA POLICY</div>
                      <div className="mono" style={{fontSize:10,color:C.text}}>{c.visaPolicy}</div>
                    </div>
                  )}
                  <div style={{marginBottom:8}}>
                    <div className="mono" style={{fontSize:7,color:C.textDD,marginBottom:4}}>TRAVEL ADVISORY</div>
                    {[{level:1,label:"Exercise Normal Caution",color:"#2a9a4a"},{level:2,label:"Exercise Increased Caution",color:"#C9A84C"},{level:3,label:"Avoid Non-Essential Travel",color:"#cc6a10"},{level:4,label:"Do Not Travel",color:"#cc2222"}].map(al=>(
                      <div key={al.level} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",marginBottom:2,background:al.color+"11",border:`1px solid ${al.color}33`,opacity:c.advisoryLevel===al.level?1:0.3}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:al.color,flexShrink:0}}/>
                        <span className="mono" style={{fontSize:8,color:al.color}}>LEVEL {al.level} — {al.label}</span>
                      </div>
                    ))}
                  </div>
                  <a href="mfa.html" style={{display:"block",textAlign:"center",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:".15em",color:C.accent,textDecoration:"none",border:`1px solid ${C.accentD}`,padding:"6px",marginTop:8}}>
                    VIEW FULL MFA PROFILE →
                  </a>
                </div>
              ):(
                <div>
                  <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:8}}>Country ID: {selectedCountry}</div>
                  <div className="mono" style={{fontSize:8,color:C.textDD,fontStyle:"italic"}}>No MFA data found for this region. The border may reference an unknown country ID.</div>
                  <a href="mfa.html" style={{display:"block",textAlign:"center",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:".15em",color:C.accent,textDecoration:"none",border:`1px solid ${C.accentD}`,padding:"6px",marginTop:8}}>
                    OPEN MFA PORTAL →
                  </a>
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}


// ── SCHEDULE SECTION ──────────────────────────────────────────────────────────
function ScheduleSection({schedule,canManage,onAction,notify,setProcessing}){
  const [creating,setCreating]=useState(false);
  const [title,setTitle]=useState(""); const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [time,setTime]=useState(""); const [type,setType]=useState("training");
  const [location,setLocation]=useState(""); const [notes,setNotes]=useState("");
  const [saving,setSaving]=useState(false);

  const now=new Date(); now.setHours(0,0,0,0);
  const upcoming=Object.values(schedule||{})
    .filter(e=>new Date(e.date)>=now)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  const past=Object.values(schedule||{})
    .filter(e=>new Date(e.date)<now)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))
    .slice(0,10);

  return(
    <div className="fadeIn">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <STitle style={{marginBottom:0}}>Training & Schedule</STitle>
        {canManage&&!creating&&<Btn small onClick={()=>setCreating(true)}>+ Add Event</Btn>}
      </div>
      {creating&&(
        <div style={{background:C.s2,border:`1px solid ${C.accentD}44`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.2em",color:C.accent,marginBottom:"1rem",
            display:"flex",justifyContent:"space-between"}}>
            ADD SCHEDULED EVENT
            <button onClick={()=>setCreating(false)} style={{background:"transparent",border:"none",color:C.textD,cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:180}}><FL>TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="Event title"/></div>
              <div style={{flex:1,minWidth:130}}><FL>TYPE</FL><DD value={type} onChange={setType} options={SCHEDULE_TYPES.map(t=>({v:t.v,l:t.l}))}/></div>
            </div>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:140}}><FL>DATE *</FL><Inp value={date} onChange={setDate} type="date"/></div>
              <div style={{flex:1,minWidth:120}}><FL>TIME (optional)</FL><Inp value={time} onChange={setTime} placeholder="e.g. 0800"/></div>
              <div style={{flex:2,minWidth:180}}><FL>LOCATION (optional)</FL><Inp value={location} onChange={setLocation} placeholder="Location or grid ref"/></div>
            </div>
            <div><FL>NOTES</FL><TA value={notes} onChange={setNotes} placeholder="Details, required personnel…" rows={2}/></div>
            <div style={{display:"flex",gap:8}}>
              <Btn disabled={!title.trim()||saving} onClick={async()=>{
                setSaving(true); setProcessing("Adding event…");
                await onAction("createScheduleEvent",{event:{title:title.trim(),date,time:time.trim(),type,location:location.trim(),notes:notes.trim()}});
                setProcessing(null); setSaving(false);
                notify("Event scheduled.",C.accent);
                setTitle(""); setTime(""); setLocation(""); setNotes(""); setCreating(false);
              }}>{saving?"Saving…":"Schedule Event"}</Btn>
              <Btn variant="ghost" onClick={()=>setCreating(false)}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
      {upcoming.length===0&&<div style={{fontSize:14,color:C.textDD,fontStyle:"italic",marginBottom:"1rem"}}>No upcoming events.</div>}
      {upcoming.map(ev=><ScheduleEventCard key={ev.id} event={ev} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
      {past.length>0&&(
        <>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.2em",color:C.textDD,
            marginTop:"1.5rem",marginBottom:"0.75rem",borderBottom:`1px solid ${C.border}`,paddingBottom:6}}>
            Past Events (Last 10)
          </div>
          {past.map(ev=><ScheduleEventCard key={ev.id} event={ev} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing} isPast/>)}
        </>
      )}
    </div>
  );
}
function ScheduleEventCard({event,canManage,onAction,notify,setProcessing,isPast}){
  const st=SCHEDULE_TYPES.find(t=>t.v===event.type)||SCHEDULE_TYPES[0];
  const d=new Date(event.date).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
  return(
    <div style={{background:C.s1,border:`1px solid ${isPast?C.border:st.color+"44"}`,
      borderLeft:`4px solid ${isPast?C.textDD:st.color}`,borderRadius:"0 3px 3px 0",
      marginBottom:"0.5rem",padding:"0.65rem 1rem",display:"flex",alignItems:"center",gap:10,
      flexWrap:"wrap",opacity:isPast?0.6:1}}>
      <div style={{minWidth:140}}>
        <div className="mono" style={{fontSize:9,color:isPast?C.textDD:st.color}}>{d}{event.time&&" · "+event.time}</div>
      </div>
      <div style={{flex:1}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:isPast?C.textD:C.text}}>{event.title}</span>
        {event.location&&<span style={{fontSize:12,color:C.textDD,marginLeft:8,fontStyle:"italic"}}>{event.location}</span>}
      </div>
      <span className="mono" style={{fontSize:9,color:isPast?C.textDD:st.color}}>{st.l}</span>
      {canManage&&<ArmBtn small label="Remove" confirmLabel="Remove event?" onConfirm={async()=>{
        setProcessing("Removing event…"); await onAction("deleteScheduleEvent",{id:event.id});
        setProcessing(null); notify("Event removed.",C.textD);
      }}/>}
    </div>
  );
}

// ── MINISTER / EMPEROR PANEL ──────────────────────────────────────────────────
function AdminPanel({currentUser,accounts,alertData,wartime,announcement,canSetAlert,isEmperor,onAction,notify,setProcessing}){
  const [sec,setSec]=useState("alert");
  const SECS=[
    ["alert","⚠ Readiness"],
    ["announce","📢 Announcement"],
    ...(isEmperor?[["wartime","⚔ Wartime"],["accounts","Accounts"]]:[]),
  ];
  return(
    <div className="fadeIn">
      <STitle color={isEmperor?C.gold:"#8a9a8a"}>{isEmperor?"Emperor Panel":"Minister Panel"}</STitle>
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {SECS.map(([v,l])=>(
          <button key={v} onClick={()=>setSec(v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",
                     padding:"0.6rem 1rem",background:"transparent",border:"none",cursor:"pointer",
                     borderBottom:`2px solid ${sec===v?(isEmperor?C.gold:C.accent):"transparent"}`,
                     color:sec===v?(isEmperor?C.gold:C.accent):C.textD}}>
            {l}
          </button>
        ))}
      </div>
      {sec==="alert"&&<AlertEditor alertData={alertData} canSetAlert={canSetAlert} currentUser={currentUser} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {sec==="announce"&&<AnnouncementEditor announcement={announcement} currentUser={currentUser} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {sec==="wartime"&&isEmperor&&<WartimeEditor wartime={wartime} currentUser={currentUser} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {sec==="accounts"&&isEmperor&&<MowAccountManager accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>
  );
}
function AlertEditor({alertData,canSetAlert,currentUser,onAction,notify,setProcessing}){
  const [level,setLevel]=useState(alertData?.level||5);
  const [note,setNote]=useState("");
  const [saving,setSaving]=useState(false);
  const al=AL(level);
  if(!canSetAlert) return(
    <div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>
      You do not have authority to set the readiness level.
    </div>
  );
  return(
    <div style={{maxWidth:480}}>
      <STitle>Set Readiness Level</STitle>
      <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
        {ALERT_LEVELS.map(a=>(
          <div key={a.level} onClick={()=>setLevel(a.level)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"0.75rem 1rem",cursor:"pointer",
              background:level===a.level?a.bg:C.s1,border:`2px solid ${level===a.level?a.color:C.border}`,
              borderRadius:3,transition:"all .15s"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:a.color,
              boxShadow:level===a.level?`0 0 8px ${a.color}`:"none",flexShrink:0}}/>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:level===a.level?a.color:C.textD,fontWeight:700}}>
                {a.short} — {a.label.replace("Imperial Readiness Level "+a.level+" — ","").replace("Imperial Readiness Level "+a.level,"a.label")}
              </div>
              <div style={{fontSize:12,color:level===a.level?a.color:C.textDD,fontStyle:"italic",opacity:.85}}>{a.sub}</div>
            </div>
          </div>
        ))}
        <div><FL>NOTE (optional)</FL><Inp value={note} onChange={setNote} placeholder="Reason for change…"/></div>
        <Btn variant={level<=2?"armed":"gold"} disabled={saving} onClick={async()=>{
          setSaving(true); setProcessing("Setting readiness level…");
          await onAction("setAlertLevel",{level,note:note.trim(),setBy:currentUser.displayName||currentUser.username,setAt:Date.now()});
          setProcessing(null); setSaving(false); setNote("");
          notify("Readiness level set to "+AL(level).short+".",AL(level).color);
        }}>{saving?"Setting…":"Set Readiness Level"}</Btn>
      </div>
    </div>
  );
}
function AnnouncementEditor({announcement,currentUser,onAction,notify,setProcessing}){
  const [title,setTitle]=useState(announcement?.title||"");
  const [text,setText]=useState(announcement?.text||"");
  const [tone,setTone]=useState(announcement?.tone||"info");
  const [saving,setSaving]=useState(false);
  return(
    <div style={{maxWidth:480}}>
      <STitle>Announcement</STitle>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>TITLE (optional)</FL><Inp value={title} onChange={setTitle} placeholder="Announcement title"/></div>
        <div>
          <FL>TONE</FL>
          <DD value={tone} onChange={setTone} options={[{v:"info",l:"Information"},{v:"order",l:"Standing Order"},{v:"warning",l:"Warning"},{v:"alert",l:"Alert"}]}/>
        </div>
        <div><FL>MESSAGE *</FL><TA value={text} onChange={setText} placeholder="Announcement text…" rows={4}/></div>
        {text.trim()&&(
          <div>
            <FL>PREVIEW</FL>
            <AnnouncementBanner announcement={{title:title.trim(),text:text.trim(),tone,
              postedBy:currentUser.displayName||currentUser.username,posted_at:Date.now()}}/>
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <Btn variant="gold" disabled={!text.trim()||saving} onClick={async()=>{
            setSaving(true); setProcessing("Posting announcement…");
            await onAction("setMowAnnouncement",{title:title.trim(),text:text.trim(),tone,
              postedBy:currentUser.displayName||currentUser.username,posted_at:Date.now()});
            setProcessing(null); setSaving(false);
            notify("Announcement posted.",C.gold);
          }}>{saving?"Posting…":"Post Announcement"}</Btn>
          {announcement?.text&&<ArmBtn label="Clear" confirmLabel="Clear announcement?" onConfirm={async()=>{
            setProcessing("Clearing announcement…");
            await onAction("setMowAnnouncement",{});
            setProcessing(null); setText(""); setTitle("");
            notify("Announcement cleared.",C.textD);
          }}/>}
        </div>
      </div>
    </div>
  );
}
function WartimeEditor({wartime,currentUser,onAction,notify,setProcessing}){
  return(
    <div style={{maxWidth:480}}>
      <STitle>6th Amendment — Wartime Measures</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        The 6th Amendment grants the Emperor emergency wartime powers. Invocation is displayed prominently across the War Office and reflected site-wide.
      </div>
      {wartime?.active?(
        <div>
          <div style={{background:"#1a0404",border:"1px solid #cc2222",borderRadius:3,
            padding:"0.85rem 1rem",marginBottom:"1rem",fontSize:14,color:"#e07070"}}>
            ⚔ Wartime measures currently ACTIVE — invoked by {wartime.invokedBy}
          </div>
          <ArmBtn label="Revoke Wartime Measures" confirmLabel="Revoke 6th Amendment?" variant="danger" onConfirm={async()=>{
            setProcessing("Revoking wartime measures…");
            await onAction("setWartime",{active:false,revokedBy:currentUser.displayName||currentUser.username,revokedAt:Date.now()});
            setProcessing(null); notify("Wartime measures revoked.",C.textD);
          }}/>
        </div>
      ):(
        <ArmBtn label="⚔ Invoke 6th Amendment — Wartime Measures" confirmLabel="Invoke wartime powers?" variant="armed" onConfirm={async()=>{
          setProcessing("Invoking 6th Amendment…");
          await onAction("setWartime",{active:true,invokedBy:currentUser.displayName||currentUser.username,invokedAt:Date.now()});
          setProcessing(null); notify("⚔ Wartime measures invoked.",C.redL);
        }}/>

}
function MowAccountManager({accounts,onAction,notify,setProcessing}){
  const [search,setSearch]=useState("");
  const list=Object.values(accounts||{})
    .filter(a=>!search||(a.displayName||a.username).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>(a.displayName||a.username).localeCompare(b.displayName||b.username));
  return(
    <div>
      <STitle>MOW Account Access</STitle>
      <div style={{marginBottom:"1rem"}}><Inp value={search} onChange={setSearch} placeholder="Search accounts…"/></div>
      {list.map(acc=><MowAccountRow key={acc.username} acc={acc} onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
    </div>
  );
}
function MowAccountRow({acc,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const [mowAccess,setMowAccess]=useState(acc.mowAccess||false);
  const [mowRole,setMowRole]=useState(acc.mowRole||"officer");
  const [canSetAlert,setCanSetAlert]=useState(acc.canSetAlert||false);
  const [saving,setSaving]=useState(false);
  return(
    <div style={{background:C.s1,border:`1px solid ${open?C.accentD:C.border}`,borderRadius:3,marginBottom:4,overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"0.65rem 1rem",cursor:"pointer"}}>
        <span style={{flex:1,fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{acc.displayName||acc.username}</span>
        <span className="mono" style={{fontSize:9,color:C.textD}}>{acc.username}</span>
        {acc.mowAccess&&<span className="mono" style={{fontSize:9,color:C.accent,border:`1px solid ${C.accentD}44`,padding:"1px 6px"}}>MOW</span>}
        <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1rem",
          display:"flex",gap:"1rem",flexWrap:"wrap",alignItems:"flex-end"}}>
          <div onClick={()=>setMowAccess(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <div style={{width:16,height:16,border:`2px solid ${mowAccess?C.accent:C.border}`,borderRadius:2,
              background:mowAccess?C.accentD:"transparent",display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:10,color:C.accent}}>{mowAccess?"✓":""}</div>
            <span style={{fontSize:13,color:mowAccess?C.text:C.textD}}>MOW Access</span>
          </div>
          {mowAccess&&<div style={{minWidth:160}}>
            <FL>ROLE</FL>
            <DD value={mowRole} onChange={setMowRole} options={[
              {v:"officer",l:"Officer"},{v:"commander",l:"Commander"},{v:"minister",l:"Minister"}
            ]}/>
          </div>}
          <div onClick={()=>setCanSetAlert(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <div style={{width:16,height:16,border:`2px solid ${canSetAlert?"#cc6a10":C.border}`,borderRadius:2,
              background:canSetAlert?"#3a1a00":"transparent",display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:10,color:"#cc6a10"}}>{canSetAlert?"✓":""}</div>
            <span style={{fontSize:13,color:canSetAlert?C.text:C.textD}}>Can Set Alert Level</span>
          </div>
          <Btn small variant="gold" disabled={saving} onClick={async()=>{
            setSaving(true); setProcessing("Updating account…");
            await onAction("updateAccountMow",{username:acc.username,mowAccess,mowRole,canSetAlert});
            setProcessing(null); setSaving(false);
            notify(acc.username+" updated.",C.gold);
          }}>{saving?"Saving…":"Save"}</Btn>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [raw,setRaw]=useState({});
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState({msg:"",color:C.accent});
  const [processing,setProcessing]=useState(null);
  const [showRanks,setShowRanks]=useState(false);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color}); setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  const personnel=useMemo(()=>raw["mow_personnel"]||{},[raw]);
  const ships=useMemo(()=>raw["mow_ships"]||{},[raw]);
  const commands=useMemo(()=>raw["mow_commands"]||{},[raw]);
  const operations=useMemo(()=>raw["mow_operations"]||{},[raw]);
  const schedule=useMemo(()=>raw["mow_schedule"]||{},[raw]);
  const alertData=useMemo(()=>raw["mow_alert"]||{level:5},[raw]);
  const wartime=useMemo(()=>raw["mow_wartime"]||{active:false},[raw]);
  const announcement=useMemo(()=>raw["mow_announcement"]||{},[raw]);
  const mfaCountries=useMemo(()=>raw["mfa_countries"]||{},[raw]);
  const mapBorders=useMemo(()=>raw["mow_map_borders"]||{},[raw]);
  const accounts=useMemo(()=>{
    const a={};
    Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v) a[v.username]=v;});
    Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(!a[k]) a[k]=v;});
    return a;
  },[raw]);

  const handleLogin=(u,rawData)=>{ setUser(u); setRaw(rawData); setTab("home"); };

  const isEmperor=user?.role==="emperor";
  const isMowMinister=isEmperor||user?.mowRole==="minister";
  const isMowCommander=isMowMinister||user?.mowRole==="commander";
  const canManage=isMowCommander;
  const canSetAlert=isEmperor||user?.canSetAlert||isMowMinister;

  const TABS=[
    {v:"home",      l:"Home",       icon:"🏠"},
    {v:"personnel", l:"Personnel",  icon:"👤"},
    {v:"assets",    l:"Assets",     icon:"⚓"},
    {v:"commands",  l:"Commands",   icon:"🎖"},
    {v:"operations",l:"Operations", icon:"📍"},
    {v:"schedule",  l:"Schedule",   icon:"📅"},
    ...(isMowMinister||isEmperor?[{v:"admin",l:isEmperor?"Emperor":"Minister",icon:isEmperor?"👑":"🎖"}]:[]),
  ];

  const onAction=useCallback(async(type,payload)=>{
    // Personnel
    if(type==="createPersonnel"){
      const id="pers_"+uid();
      const next={...personnel,[id]:{...payload,id,serviceHistory:[],medals:[],created:Date.now()}};
      setRaw(r=>({...r,mow_personnel:next})); await sset("mow_personnel",next);
    } else if(type==="updatePersonnel"){
      const {id,...rest}=payload;
      const next={...personnel,[id]:{...personnel[id],...rest}};
      setRaw(r=>({...r,mow_personnel:next})); await sset("mow_personnel",next);
    } else if(type==="deletePersonnel"){
      const next={...personnel}; delete next[payload.id];
      setRaw(r=>({...r,mow_personnel:next})); await sset("mow_personnel",next);
    } else if(type==="addServiceHistory"){
      const p={...personnel[payload.id],serviceHistory:[...(personnel[payload.id]?.serviceHistory||[]),payload.entry]};
      const next={...personnel,[payload.id]:p};
      setRaw(r=>({...r,mow_personnel:next})); await sset("mow_personnel",next);
    } else if(type==="addMedal"){
      const p={...personnel[payload.id],medals:[...(personnel[payload.id]?.medals||[]),payload.medal]};
      const next={...personnel,[payload.id]:p};
      setRaw(r=>({...r,mow_personnel:next})); await sset("mow_personnel",next);
    }
    // Ships
    else if(type==="createShip"){
      const id="ship_"+uid();
      const next={...ships,[id]:{...payload.ship,id,created:Date.now()}};
      setRaw(r=>({...r,mow_ships:next})); await sset("mow_ships",next);
    } else if(type==="updateShipStatus"){
      const next={...ships,[payload.id]:{...ships[payload.id],status:payload.status}};
      setRaw(r=>({...r,mow_ships:next})); await sset("mow_ships",next);
    } else if(type==="deleteShip"){
      const next={...ships}; delete next[payload.id];
      setRaw(r=>({...r,mow_ships:next})); await sset("mow_ships",next);
    }
    // Commands
    else if(type==="createCommand"){
      const id="cmd_"+uid();
      const next={...commands,[id]:{...payload,id,created:Date.now()}};
      setRaw(r=>({...r,mow_commands:next})); await sset("mow_commands",next);
    } else if(type==="deleteCommand"){
      const next={...commands}; delete next[payload.id];
      setRaw(r=>({...r,mow_commands:next})); await sset("mow_commands",next);
    } else if(type==="updateCommand"){
      const {id,...rest}=payload;
      const next={...commands,[id]:{...commands[id],...rest,updatedAt:Date.now()}};
      setRaw(r=>({...r,mow_commands:next})); await sset("mow_commands",next);
    }
    // Operations
    else if(type==="createOperation"){
      const id="op_"+uid();
      const next={...operations,[id]:{...payload.op,id,created:Date.now()}};
      setRaw(r=>({...r,mow_operations:next})); await sset("mow_operations",next);
    } else if(type==="updateOperation"){
      const {id,...rest}=payload;
      const next={...operations,[id]:{...operations[id],...rest,updatedAt:Date.now()}};
      setRaw(r=>({...r,mow_operations:next})); await sset("mow_operations",next);
    } else if(type==="addOpNote"){
      const op={...operations[payload.id],notes:[...(operations[payload.id]?.notes||[]),payload.note]};
      const next={...operations,[payload.id]:op};
      setRaw(r=>({...r,mow_operations:next})); await sset("mow_operations",next);
    } else if(type==="deleteOperation"){
      const next={...operations}; delete next[payload.id];
      setRaw(r=>({...r,mow_operations:next})); await sset("mow_operations",next);
    }
    // Schedule
    else if(type==="createScheduleEvent"){
      const id="sched_"+uid();
      const next={...schedule,[id]:{...payload.event,id}};
      setRaw(r=>({...r,mow_schedule:next})); await sset("mow_schedule",next);
    } else if(type==="deleteScheduleEvent"){
      const next={...schedule}; delete next[payload.id];
      setRaw(r=>({...r,mow_schedule:next})); await sset("mow_schedule",next);
    }
    // Alert / Wartime / Announcement
    else if(type==="setAlertLevel"){
      setRaw(r=>({...r,mow_alert:payload})); await sset("mow_alert",payload);
    } else if(type==="setWartime"){
      setRaw(r=>({...r,mow_wartime:payload})); await sset("mow_wartime",payload);
    } else if(type==="setMowAnnouncement"){
      setRaw(r=>({...r,mow_announcement:payload})); await sset("mow_announcement",payload);
    }
    // Account MOW access
    else if(type==="updateAccountMow"){
      const {username,...patch}=payload;
      const rowKey="mi_acc_"+username;
      const updated={...accounts[username],...patch};
      setRaw(r=>({...r,[rowKey]:updated})); await sset(rowKey,updated);
    }
    // Map borders
    else if(type==="saveBorder"){
      const next={...mapBorders,[payload.id]:{...payload}};
      setRaw(r=>({...r,mow_map_borders:next})); await sset("mow_map_borders",next);
    } else if(type==="deleteBorder"){
      const next={...mapBorders}; delete next[payload.id];
      setRaw(r=>({...r,mow_map_borders:next})); await sset("mow_map_borders",next);
    }
  },[raw,personnel,ships,commands,operations,schedule,accounts,mapBorders]);

  if(!user) return<LoginScreen onLogin={handleLogin}/>;

  const totalPersonnel=Object.keys(personnel).length;
  const totalShips=Object.keys(ships).length;
  const activeOps=Object.values(operations).filter(o=>o.status==="active").length;
  const nextEvent=Object.values(schedule).filter(e=>new Date(e.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      {showRanks&&<RankReference onClose={()=>setShowRanks(false)}/>}
      <Toast msg={toast.msg} color={toast.color}/>
      <Overlay label={processing}/>

      {/* Header */}
      <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0.75rem 1.25rem"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",gap:"1.5rem",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
              color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
              padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
            <span style={{fontSize:18}}>⚔</span>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,letterSpacing:"0.15em",color:C.text,lineHeight:1}}>
                Imperial War Office
              </div>
              <div className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginTop:1}}>
                Empire of Lech — Military Network
              </div>
            </div>
          </div>
          <div style={{flex:1}}/>
          <AlertBanner alertData={alertData} compact/>
          {wartime?.active&&(
            <div className="mono" style={{fontSize:9,color:"#cc2222",border:"1px solid #cc222244",
              padding:"3px 10px",animation:"warflash 1.5s infinite"}}>⚔ WARTIME</div>
          )}
          <button onClick={()=>setShowRanks(true)}
            style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,
                     padding:"3px 10px",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
                     color:C.textD,cursor:"pointer"}}>Ranks</button>
          <span className="mono" style={{fontSize:10,color:C.textD}}>{user.displayName||user.username}</span>
          <Btn small variant="ghost" onClick={()=>setUser(null)}>Logout</Btn>
        </div>
      </div>

      {/* Nav */}
      <div style={{background:C.s2,borderBottom:`1px solid ${C.border}`}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.v} onClick={()=>setTab(t.v)}
              style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.18em",
                       textTransform:"uppercase",padding:"0.7rem 1.1rem",background:"transparent",border:"none",
                       whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,
                       borderBottom:`2px solid ${tab===t.v?C.accent:"transparent"}`,
                       color:tab===t.v?C.accent:C.textD}}>
              {t.icon} {t.l}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      {tab==="operations"
        ?<div style={{height:"calc(100vh - 130px)",overflow:"hidden"}}>
          <AnnouncementBanner announcement={announcement}/>
          <WartimeBanner wartime={wartime}/>
          <OperationsSection operations={operations}
            currentUser={user} commands={commands} ships={ships} personnel={personnel} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}
            mapBorders={mapBorders} mfaCountries={mfaCountries} isEmperor={isEmperor}/>
        </div>
        :<div style={{maxWidth:1100,margin:"0 auto",padding:"1.5rem 1.25rem"}}>
        <AnnouncementBanner announcement={announcement}/>
        <WartimeBanner wartime={wartime}/>

        {tab==="home"&&(
          <div className="fadeIn">
            <AlertBanner alertData={alertData}/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"1rem",marginBottom:"2rem"}}>
              {[
                {label:"Total Personnel",value:totalPersonnel,icon:"👤",color:C.army},
                {label:"Registered Assets",value:totalShips,icon:"⚓",color:"#4a6a9a"},
                {label:"Active Operations",value:activeOps,icon:"📍",color:activeOps>0?"#cc6a10":C.textD},
                {label:"Next Event",value:nextEvent?new Date(nextEvent.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"}):"—",icon:"📅",color:C.accent},
              ].map((s,i)=>(
                <div key={i} style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${s.color}`,
                  borderRadius:"0 0 4px 4px",padding:"1rem",textAlign:"center"}}>
                  <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:700,color:s.color}}>{s.value}</div>
                  <div className="mono" style={{fontSize:9,color:C.textDD,letterSpacing:"0.12em",marginTop:4}}>{s.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
            {Object.values(commands).length>0&&(
              <div>
                <STitle>Combatant Commands</STitle>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"0.75rem"}}>
                  {Object.values(commands).map(cmd=>{
                    const assignedP=Object.values(personnel).filter(p=>p.commandId===cmd.id).length;
                    const assignedS=Object.values(ships).filter(s=>s.commandId===cmd.id).length;
                    return(
                      <div key={cmd.id} style={{background:C.s2,border:`1px solid ${C.accent}33`,
                        borderLeft:`3px solid ${C.accent}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem"}}>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,marginBottom:3}}>
                          {cmd.name}
                          {cmd.nickname&&<span className="mono" style={{fontSize:9,color:C.textDD,marginLeft:6}}>{cmd.nickname}</span>}
                        </div>
                        <div style={{display:"flex",gap:12,marginTop:4}}>
                          <span className="mono" style={{fontSize:9,color:C.textDD}}>{assignedP} PERS</span>
                          <span className="mono" style={{fontSize:9,color:C.textDD}}>{assignedS} VESSELS</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="personnel"&&<PersonnelSection personnel={personnel} commands={commands}
          currentUser={user} canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
        {tab==="assets"&&<AssetsSection ships={ships} commands={commands}
          canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
        {tab==="commands"&&<CommandsSection commands={commands} personnel={personnel} ships={ships}
          canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
        {tab==="schedule"&&<ScheduleSection schedule={schedule}
          canManage={canManage} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
        {tab==="admin"&&(isMowMinister||isEmperor)&&(
          <AdminPanel currentUser={user} accounts={accounts} alertData={alertData} wartime={wartime}
            announcement={announcement} canSetAlert={canSetAlert} isEmperor={isEmperor}
            onAction={onAction} notify={notify} setProcessing={setProcessing}/>
        )}
      </div>}

      <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
        <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,
          letterSpacing:"0.15em",textAlign:"center"}}>
          Imperial War Office · Empire of Lech · For Crown & Country
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
