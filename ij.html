<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Imperial Judiciary — Empire of Lech</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#090c12;color:#d4d8e4;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#090c12;}
::-webkit-scrollbar-thumb{background:#1a2a4a;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}
.mono{font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxLu8jQehAZJEvMEeCLoHc9S2C4FM8o9fQh8Pp4gMzDNwwIG0S9qLJ5-1gyGM1c_InUfQ/exec";
const BK_URL="https://script.google.com/macros/s/AKfycbz37c5Okp9c7PkXv38x2lq7Is3RifkJPee5ASb2KQfA7EJgsN0NwrigmiRr1a_G0E6d4Q/exec";

const C={
  bg:"#090c12",s1:"#0e1520",s2:"#121c28",s3:"#162030",
  border:"#1e2e48",borderL:"#2a4070",
  text:"#d4d8e4",textD:"#7a8aaa",textDD:"#3a4a6a",
  accent:"#4a6aaa",accentD:"#2a4a8a",
  silver:"#a8b8cc",silverD:"#5a6a8a",
  gold:"#C9A84C",goldD:"#8a6820",
  red:"#8b1a1a",redD:"#5a0808",redL:"#c05050",
  blue:"#2a4a8a",blueL:"#4a7acc",
};

const COURTS=[
  {v:"constitutional",l:"Constitutional Court",      short:"CC",  color:"#4a6aaa",border:"#2a4a8a",bg:"#0a1020"},
  {v:"regional",      l:"Regional Court",            short:"RC",  color:"#6a8aaa",border:"#3a5a7a",bg:"#0c1418"},
];
const CASE_STATUSES=[
  {v:"filed",      l:"Filed",             color:"#7a8aaa"},
  {v:"active",     l:"Active",            color:"#4a7acc"},
  {v:"hearing",    l:"Before the Court",  color:"#C9A84C"},
  {v:"deliberating",l:"Under Deliberation",color:"#9a6acc"},
  {v:"decided",    l:"Decided",           color:"#2a9a4a"},
  {v:"appealed",   l:"On Appeal",         color:"#cc6a10"},
  {v:"dismissed",  l:"Dismissed",         color:"#7a7a7a"},
  {v:"withdrawn",  l:"Withdrawn",         color:"#5a5a5a"},
];
const CASE_TYPES=[
  {v:"constitutional_challenge",l:"Constitutional Challenge"},
  {v:"criminal",                l:"Criminal Prosecution"},
  {v:"civil",                   l:"Civil Action"},
  {v:"administrative",          l:"Administrative Review"},
  {v:"impeachment",             l:"Impeachment Proceedings"},
  {v:"treaty",                  l:"Treaty Interpretation"},
  {v:"other",                   l:"Other"},
];
const JUDGMENT_TYPES=[
  {v:"ruling",     l:"Ruling"},
  {v:"judgment",   l:"Judgment"},
  {v:"order",      l:"Court Order"},
  {v:"opinion",    l:"Advisory Opinion"},
  {v:"dismissal",  l:"Order of Dismissal"},
];
const APPOINTMENT_ROLES=[
  {v:"president",  l:"President of the Courts",      court:"both",          style:"The Right Honourable"},
  {v:"cc_justice", l:"Justice of the Constitutional Court", court:"constitutional", style:"The Honourable"},
  {v:"rc_justice", l:"Justice of the Regional Court",      court:"regional",       style:"The Honourable"},
];
const STATUTE_CATS=[
  {v:"constitutional",l:"Constitutional Law"},
  {v:"criminal",      l:"Criminal Law"},
  {v:"civil",         l:"Civil Law"},
  {v:"administrative",l:"Administrative Law"},
  {v:"military",      l:"Military Law"},
  {v:"foreign",       l:"Foreign Affairs Law"},
  {v:"fiscal",        l:"Fiscal Law"},
  {v:"other",         l:"Other"},
];

async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
async function sgetAll(){
  try{
    const r=await fetch(SCRIPT_URL+"?action=getall");
    const d=await r.json();
    if(!d.success) return {};
    const out={};
    Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
    return out;
  }catch{return{};}
}
async function sset(k,v){
  try{
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v)})});
    return true;
  }catch{return false;}
}

// ── UI ────────────────────────────────────────────────────────────────────────
function Btn({children,onClick,variant="primary",disabled,small,full,style:ex={}}){
  const base={fontFamily:"'Cinzel',serif",letterSpacing:"0.1em",fontWeight:700,textTransform:"uppercase",
    fontSize:small?10:11,padding:small?"4px 12px":"7px 18px",border:"1px solid",borderRadius:2,
    cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,transition:"all .15s",width:full?"100%":"auto"};
  const variants={
    primary:{background:`linear-gradient(135deg,${C.accentD},${C.accent})`,borderColor:C.accentD,color:"#fff"},
    danger: {background:"transparent",borderColor:C.redD,color:C.redL},
    armed:  {background:`linear-gradient(135deg,${C.redD},${C.red})`,borderColor:C.redD,color:"#e0c8c8"},
    ghost:  {background:"transparent",borderColor:C.border,color:C.textD},
    gold:   {background:"linear-gradient(135deg,#3a2800,#6a4a00)",borderColor:"#5a4000",color:C.gold},
  };
  const vs=variants[variant]||variants.primary;
  return <button onClick={disabled?undefined:onClick} style={{...base,...vs,...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,variant="danger",small}){
  const [armed,setArmed]=useState(false);
  const t=useRef(null);
  if(armed) return <Btn variant="armed" small={small} onClick={()=>{clearTimeout(t.current);setArmed(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>;
  return <Btn variant={variant} small={small} onClick={()=>{setArmed(true);clearTimeout(t.current);t.current=setTimeout(()=>setArmed(false),4000);}}>{label}</Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
             padding:"8px 12px",color:C.text,fontSize:14,outline:"none",...ex}}
    onFocus={e=>e.target.style.borderColor=C.accent}
    onBlur={e=>e.target.style.borderColor=C.border}/>;
}
function TA({value,onChange,placeholder,rows=4}){
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
             padding:"8px 12px",color:C.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.7}}
    onFocus={e=>e.target.style.borderColor=C.accent}
    onBlur={e=>e.target.style.borderColor=C.border}/>;
}
function DD({value,onChange,options,style:ex={}}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
             padding:"8px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif",...ex}}>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function FL({children}){
  return <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:4}}>{children}</div>;
}
function STitle({children,color=C.silver,style:ex={}}){
  return <div style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.3em",
    textTransform:"uppercase",color,paddingBottom:8,borderBottom:`1px solid ${C.border}`,
    marginBottom:"1.25rem",...ex}}>{children}</div>;
}
function CourtBadge({court}){
  const ct=COURTS.find(c=>c.v===court)||COURTS[0];
  return <span className="mono" style={{fontSize:9,padding:"2px 8px",background:ct.bg,
    border:`1px solid ${ct.border}`,color:ct.color,borderRadius:1}}>{ct.short}</span>;
}
function StatusBadge({status}){
  const st=CASE_STATUSES.find(s=>s.v===status)||CASE_STATUSES[0];
  return <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s1,
    border:`1px solid ${st.color}44`,color:st.color,borderRadius:1}}>{st.l.toUpperCase()}</span>;
}
function Toast({msg,color}){
  if(!msg) return null;
  return <div style={{position:"fixed",top:14,right:14,zIndex:9999,background:C.s2,
    border:`1px solid ${color}55`,borderLeft:`3px solid ${color}`,padding:"8px 16px",
    borderRadius:2,fontFamily:"'Cinzel',serif",fontSize:10,color,animation:"fadeIn .2s ease",maxWidth:360}}>{msg}</div>;
}
function Overlay({label}){
  if(!label) return null;
  return <div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(4,6,10,.97)",
    display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{textAlign:"center"}}>
      <div className="mono" style={{color:C.accent,fontSize:10,letterSpacing:"0.3em",marginBottom:8,animation:"pulse 1s infinite"}}>PROCESSING</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:C.text}}>{label}</div>
    </div>
  </div>;
}

// ── CASE DOCKET (public) ──────────────────────────────────────────────────────
function DocketTab({cases,judgments,onAction,notify}){
  const [sub,setSub]=useState("browse");
  const [courtFilter,setCourtFilter]=useState("all");
  const [statusFilter,setStatusFilter]=useState("all");
  const [search,setSearch]=useState("");
  const list=Object.values(cases||{}).filter(c=>{
    const q=search.toLowerCase();
    const matchQ=!q||c.number?.toLowerCase().includes(q)||c.title?.toLowerCase().includes(q)||c.parties?.toLowerCase().includes(q);
    const matchC=courtFilter==="all"||c.court===courtFilter;
    const matchS=statusFilter==="all"||c.status===statusFilter;
    return matchQ&&matchC&&matchS;
  }).sort((a,b)=>(b.filed||0)-(a.filed||0));
  return <div className="fadeIn">
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem"}}>
      {[["browse","Case Docket"],["file","File a Case"]].map(([v,l])=>
        <button key={v} onClick={()=>setSub(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",
                   padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",
                   borderBottom:`2px solid ${sub===v?C.accent:"transparent"}`,
                   color:sub===v?C.accent:C.textD}}>{l}</button>
      )}
    </div>
    {sub==="file"&&<PublicCaseForm onAction={onAction} notify={notify} onDone={()=>setSub("browse")}/>}
    {sub==="browse"&&<div>
    <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search case number, title, parties..."/></div>
      <div style={{flex:1,minWidth:160}}>
        <DD value={courtFilter} onChange={setCourtFilter} options={[{v:"all",l:"All Courts"},...COURTS.map(c=>({v:c.v,l:c.l}))]}/>
      </div>
      <div style={{flex:1,minWidth:160}}>
        <DD value={statusFilter} onChange={setStatusFilter} options={[{v:"all",l:"All Status"},...CASE_STATUSES.map(s=>({v:s.v,l:s.l}))]}/>
      </div>
    </div>
    {list.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No cases on record.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
        {list.map(c=><CaseCard key={c.id} caseData={c} judgments={judgments}/>)}
      </div>
    }
    </div>}
  </div>;
}
function PublicCaseForm({onAction,notify,onDone}){
  // Always starts in Regional Court — only emperor/president can elevate
  const TITLE_TEMPLATES=[
    {v:"crown_v",    l:"Crown v. [Name]",              build:(a)=>`Crown v. ${a}`},
    {v:"v_crown",    l:"[Name] v. The Crown",           build:(a)=>`${a} v. The Crown`},
    {v:"indiv_v",    l:"[Name] v. [Name]",              build:(a,b)=>`${a} v. ${b}`},
    {v:"re",         l:"In re [Subject]",               build:(a)=>`In re ${a}`},
    {v:"matter_of",  l:"In the matter of [Subject]",   build:(a)=>`In the matter of ${a}`},
    {v:"petition",   l:"Petition of [Name]",            build:(a)=>`Petition of ${a}`},
    {v:"application",l:"Application of [Name]",         build:(a)=>`Application of ${a}`},
  ];
  const PARTY_PRESETS=[
    {v:"crown_v_ind",  l:"Crown v. Individual",     build:(a)=>`The Crown v. ${a}`},
    {v:"ind_v_crown",  l:"Individual v. Crown",     build:(a)=>`${a} v. The Crown`},
    {v:"ind_v_ind",    l:"Individual v. Individual",build:(a,b)=>`${a} v. ${b}`},
  ];

  const [titleTemplate,setTitleTemplate]=useState("crown_v");
  const [titleA,setTitleA]=useState("");
  const [titleB,setTitleB]=useState("");
  const [partyPreset,setPartyPreset]=useState("crown_v_ind");
  const [partyA,setPartyA]=useState("");
  const [partyB,setPartyB]=useState("");
  const [type,setType]=useState("criminal");
  const [summary,setSummary]=useState("");
  const [done,setDone]=useState(null);
  const [saving,setSaving]=useState(false);

  const tpl=TITLE_TEMPLATES.find(t=>t.v===titleTemplate)||TITLE_TEMPLATES[0];
  const ppl=PARTY_PRESETS.find(p=>p.v===partyPreset)||PARTY_PRESETS[0];
  const needsTwoTitle=titleTemplate==="indiv_v";
  const needsTwoParty=partyPreset==="ind_v_ind";

  const builtTitle=titleA.trim()?(needsTwoTitle?tpl.build(titleA.trim(),titleB.trim()||"[Name]"):tpl.build(titleA.trim())):"";
  const builtParties=partyA.trim()?(needsTwoParty?ppl.build(partyA.trim(),partyB.trim()||"[Name]"):ppl.build(partyA.trim())):"";

  function genNumber(){
    const yr=new Date().getFullYear();
    const seq=String(Math.floor(Math.random()*900)+100).padStart(3,"0");
    return `RC-${yr}-${seq}`;
  }

  if(done) return <div style={{maxWidth:540}}>
    <div style={{background:C.s1,border:"1px solid #1e3e5a",borderLeft:"4px solid #4a7acc",
      borderRadius:"0 3px 3px 0",padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.blueL,marginBottom:6}}>{"✓ Case Filed"}</div>
      <div style={{fontSize:14,color:C.textD,lineHeight:1.7,marginBottom:"0.5rem"}}>Your case reference number is:</div>
      <div className="mono" style={{fontSize:16,color:C.silver,marginBottom:"0.75rem"}}>{done.number}</div>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:"0.75rem"}}>
        <div style={{fontSize:13,color:C.text}}>{done.title}</div>
        <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{done.parties}</div>
      </div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:"0.65rem"}}>
        Filed to the Regional Court. The court may elevate to the Constitutional Court if warranted. Use the Case Docket to track progress.
      </div>
    </div>
    <Btn variant="ghost" onClick={()=>{setDone(null);setTitleA("");setTitleB("");setPartyA("");setPartyB("");setSummary("");onDone();}}>Back to Docket</Btn>
  </div>;

  return <div style={{maxWidth:600}}>
    <STitle>File a Case</STitle>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`4px solid ${COURTS[1].color}`,
      borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:"1.25rem",
      display:"flex",alignItems:"center",gap:10}}>
      <CourtBadge court="regional"/>
      <span style={{fontSize:13,color:C.textD}}>All cases are filed to the <strong style={{color:C.text}}>Regional Court</strong>. The court may elevate to the Constitutional Court if warranted.</span>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>

      {/* Case type */}
      <div>
        <FL>CASE TYPE *</FL>
        <DD value={type} onChange={setType} options={CASE_TYPES.filter(t=>t.v!=="constitutional_challenge").map(t=>({v:t.v,l:t.l}))}/>
      </div>

      {/* Case title builder */}
      <div>
        <FL>CASE TITLE *</FL>
        <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"0.85rem",display:"flex",flexDirection:"column",gap:"0.65rem"}}>
          <div>
            <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>TITLE FORMAT</div>
            <DD value={titleTemplate} onChange={v=>{setTitleTemplate(v);setTitleA("");setTitleB("");}}
              options={TITLE_TEMPLATES.map(t=>({v:t.v,l:t.l}))}/>
          </div>
          <div style={{display:"flex",gap:"0.65rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>
                {titleTemplate==="re"||titleTemplate==="matter_of"?"SUBJECT *":"NAME / USERNAME *"}
              </div>
              <Inp value={titleA} onChange={setTitleA} placeholder={titleTemplate==="re"||titleTemplate==="matter_of"?"e.g. the Imperial Succession Act":"e.g. JohnDoe"}/>
            </div>
            {needsTwoTitle&&<div style={{flex:1,minWidth:160}}>
              <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>SECOND NAME / USERNAME *</div>
              <Inp value={titleB} onChange={setTitleB} placeholder="e.g. JaneDoe"/>
            </div>}
          </div>
          {builtTitle&&<div style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
            padding:"6px 12px",fontFamily:"'Cinzel',serif",fontSize:13,color:C.silver}}>
            Preview: {builtTitle}
          </div>}
        </div>
      </div>

      {/* Parties builder */}
      <div>
        <FL>PARTIES *</FL>
        <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"0.85rem",display:"flex",flexDirection:"column",gap:"0.65rem"}}>
          <div>
            <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>PARTY FORMAT</div>
            <DD value={partyPreset} onChange={v=>{setPartyPreset(v);setPartyA("");setPartyB("");}}
              options={PARTY_PRESETS.map(p=>({v:p.v,l:p.l}))}/>
          </div>
          <div style={{display:"flex",gap:"0.65rem",flexWrap:"wrap"}}>
            {partyPreset!=="crown_v_ind"&&<div style={{flex:1,minWidth:160}}>
              <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>
                {partyPreset==="ind_v_crown"?"PETITIONER USERNAME *":"PLAINTIFF USERNAME *"}
              </div>
              <Inp value={partyA} onChange={setPartyA} placeholder="In-game username"/>
            </div>}
            {partyPreset==="crown_v_ind"&&<div style={{flex:1,minWidth:160}}>
              <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>DEFENDANT USERNAME *</div>
              <Inp value={partyA} onChange={setPartyA} placeholder="In-game username"/>
            </div>}
            {needsTwoParty&&<div style={{flex:1,minWidth:160}}>
              <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>DEFENDANT USERNAME *</div>
              <Inp value={partyB} onChange={setPartyB} placeholder="In-game username"/>
            </div>}
          </div>
          {builtParties&&<div style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
            padding:"6px 12px",fontFamily:"'Cinzel',serif",fontSize:13,color:C.silver}}>
            Preview: {builtParties}
          </div>}
        </div>
      </div>

      {/* Grounds */}
      <div>
        <FL>GROUNDS FOR FILING *</FL>
        <TA value={summary} onChange={setSummary}
          placeholder={"Describe the matter before the court and the legal grounds for your filing.\n\nInclude:\n\u2022 What occurred or what decision is being challenged\n\u2022 Which law or right you believe has been violated\n\u2022 The remedy or outcome you are seeking"}
          rows={6}/>
      </div>

      <Btn full
        disabled={!builtTitle||!builtParties||!summary.trim()||saving||
          (needsTwoTitle&&!titleB.trim())||
          (!needsTwoTitle&&!titleA.trim())||
          (partyPreset!=="crown_v_ind"&&!partyA.trim())||
          (partyPreset==="crown_v_ind"&&!partyA.trim())||
          (needsTwoParty&&!partyB.trim())}
        onClick={async()=>{
          setSaving(true);
          const number=genNumber();
          await onAction("createCase",{number,title:builtTitle,court:"regional",type,
            parties:builtParties,presiding:"",summary:summary.trim(),
            status:"filed",filed:Date.now()});
          setSaving(false);
          setDone({number,title:builtTitle,parties:builtParties});
          notify("Case "+number+" filed.",C.accent);
        }}>{saving?"Filing...":"File Case"}</Btn>
    </div>
  </div>;
}
function CaseCard({caseData:c,judgments}){
  const [open,setOpen]=useState(false);
  const ct=COURTS.find(x=>x.v===c.court)||COURTS[0];
  const caseJudgments=Object.values(judgments||{}).filter(j=>j.caseId===c.id).sort((a,b)=>(b.date||0)-(a.date||0));
  return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${ct.color}`,
    borderRadius:"0 3px 3px 0",overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,
      padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
      <CourtBadge court={c.court}/>

function LegalCodeTab({statutes,bills}){
  const [catFilter,setCatFilter]=useState("all");
  const [search,setSearch]=useState("");
  // Merge BK passed bills + custom statutes
  const allStatutes=useMemo(()=>{
    const list=[];
    // Custom statutes from ij_statutes
    Object.values(statutes||{}).forEach(s=>{
      list.push({...s,source:"custom"});
    });
    // Auto-pulled from BK passed bills
    Object.values(bills||{}).forEach(b=>{
      if(b.status!=="passed"&&b.status!=="grandfathered") return;
      if(b.type==="motion"||b.type==="decree") return;
      list.push({
        id:"bk_"+b.id,
        title:b.title,
        number:b.number||b.id,
        cat:"other",
        body:b.content||b.description||"",
        enacted:b.passedAt||b.submittedAt||null,
        source:"bundeskongress",
        billType:b.type,
        docUrl:b.docUrl||null,
      });
    });
    return list.filter(s=>{
      const q=search.toLowerCase();
      const matchQ=!q||s.title?.toLowerCase().includes(q)||s.number?.toLowerCase().includes(q);
      const matchC=catFilter==="all"||s.cat===catFilter;
      return matchQ&&matchC;
    }).sort((a,b)=>(a.title||"").localeCompare(b.title||""));
  },[statutes,bills,search,catFilter]);

  return <div className="fadeIn">
    <STitle>Imperial Legal Code</STitle>
    <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
      The consolidated laws of the Empire of Lech. Includes all Acts of the Imperial Bundeskongress and statutes enrolled by the Imperial Judiciary.
    </div>
    <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search title or number..."/></div>
      <div style={{flex:1,minWidth:180}}>
        <DD value={catFilter} onChange={setCatFilter} options={[{v:"all",l:"All Categories"},...STATUTE_CATS.map(c=>({v:c.v,l:c.l}))]}/>
      </div>
    </div>
    {allStatutes.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No statutes on record.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
        {allStatutes.map(s=><StatuteCard key={s.id} statute={s}/>)}
      </div>
    }
  </div>;

// ── PANEL AUTH ────────────────────────────────────────────────────────────────
function PanelAuth({onAuth,onCancel}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  async function doAuth(){
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true); setErr("");
    try{
      const raw=await sgetAll();
      const accounts={};
      Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v) accounts[v.username]=v;});
      Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(!accounts[k]) accounts[k]=v;});
      const user=Object.values(accounts).find(a=>a.username.toLowerCase()===username.trim().toLowerCase());
      if(!user){setErr("ACCESS DENIED.");setLoading(false);return;}
      const hash=await sha256(password);
      if(hash!==user.passwordHash){setErr("ACCESS DENIED.");setLoading(false);return;}
      const ok=user.role==="emperor"||user.ijAccess===true;
      if(!ok){setErr("AUTHORISATION DENIED — Judicial access not granted.");setLoading(false);return;}
      onAuth(user,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  }
  return <div style={{maxWidth:420,margin:"0 auto"}}>
    <STitle>Judicial Panel Authentication</STitle>
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.silver}`,padding:"1.75rem"}}>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.8,marginBottom:"1.25rem",textAlign:"center"}}>
        Restricted to judicial officers of the Empire. Authenticate using your Imperial Intranet credentials.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
        <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:"#1a0808",
          border:`1px solid ${C.redD}44`,padding:"7px 12px"}}>{err}</div>}
        <Btn onClick={doAuth} disabled={loading||!username.trim()||!password.trim()}>
          {loading?"Authenticating...":"Authenticate"}
        </Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

    <STitle>Enrol Custom Statute</STitle>
    <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1rem",lineHeight:1.7}}>
      Passed Bundeskongress bills appear automatically in the Legal Code. Use this to enrol additional statutes, codifications, or instruments not originating from the Bundeskongress.
    </div>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.5rem"}}>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:200}}><FL>STATUTE TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="Title of the statute"/></div>
          <div style={{flex:1,minWidth:120}}><FL>NUMBER / CITATION</FL><Inp value={number} onChange={setNumber} placeholder="e.g. ILC-2026-001"/></div>
          <div style={{flex:1,minWidth:160}}><FL>CATEGORY</FL><DD value={cat} onChange={setCat} options={STATUTE_CATS.map(c=>({v:c.v,l:c.l}))}/></div>
        </div>
        <div><FL>TEXT</FL><TA value={body} onChange={setBody} placeholder="Full text of the statute..." rows={5}/></div>
        <Btn small disabled={!title.trim()||saving} onClick={async()=>{
          setSaving(true); setProcessing("Enrolling statute...");
          await onAction("createStatute",{title:title.trim(),number:number.trim(),cat,body:body.trim(),enacted:Date.now()});
          setProcessing(null); setSaving(false); notify(title+" enrolled.",C.accent);
          setTitle(""); setNumber(""); setBody("");
        }}>{saving?"Enrolling...":"Enrol Statute"}</Btn>
      </div>
    </div>
    <STitle>Custom Statutes</STitle>
    {list.length===0&&<div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>No custom statutes enrolled.</div>}
    {list.map(s=><div key={s.id} style={{background:C.s1,border:`1px solid ${C.border}`,
      borderLeft:`4px solid ${C.accent}`,borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",
      marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      {s.number&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{s.number}</span>}
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,flex:1}}>{s.title}</span>
      <span className="mono" style={{fontSize:9,color:C.textD}}>{(STATUTE_CATS.find(c=>c.v===s.cat)||{l:""}).l}</span>
      <ArmBtn small label="Repeal" confirmLabel="Repeal this statute?" onConfirm={async()=>{
        setProcessing("Repealing..."); await onAction("deleteStatute",{id:s.id});
        setProcessing(null); notify(s.title+" repealed.",C.textD);
      }}/>
    </div>)}
  </div>;
}

function PanelAppointments({appointments,onAction,notify,setProcessing}){
  const [name,setName]=useState("");const [role,setRole]=useState("cc_justice");
  const [since,setSince]=useState("");const [notes,setNotes]=useState("");
  const [saving,setSaving]=useState(false);
  const list=Object.values(appointments||{}).sort((a,b)=>{
    const o={president:0,cc_justice:1,rc_justice:2};
    return (o[a.role]||3)-(o[b.role]||3)||(a.name||"").localeCompare(b.name||"");
  });
  return <div>
    <STitle>Judicial Appointments</STitle>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>APPOINT JUSTICE</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>NAME *</FL><Inp value={name} onChange={setName} placeholder="Full name"/></div>
          <div style={{flex:1,minWidth:200}}><FL>ROLE</FL><DD value={role} onChange={setRole} options={APPOINTMENT_ROLES.map(r=>({v:r.v,l:r.l}))}/></div>
          <div style={{flex:1,minWidth:120}}><FL>DATE OF APPOINTMENT</FL><Inp value={since} onChange={setSince} placeholder="e.g. 1 January 2026"/></div>
        </div>
        <div><FL>NOTES</FL><Inp value={notes} onChange={setNotes} placeholder="Additional notes..."/></div>
        <Btn small disabled={!name.trim()||saving} onClick={async()=>{
          setSaving(true); setProcessing("Appointing...");
          await onAction("createAppointment",{name:name.trim(),role,since:since.trim(),notes:notes.trim()});
          setProcessing(null); setSaving(false); notify(name+" appointed.",C.accent);
          setName(""); setSince(""); setNotes("");
        }}>{saving?"Appointing...":"Appoint"}</Btn>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {list.map(a=>{
        const r=APPOINTMENT_ROLES.find(x=>x.v===a.role)||APPOINTMENT_ROLES[1];
        const ct=COURTS.find(c=>c.v===r.court)||{color:C.silver};
        return <div key={a.id} style={{background:C.s1,border:`1px solid ${C.border}`,
          borderLeft:`4px solid ${ct.color}`,borderRadius:"0 3px 3px 0",
          padding:"0.65rem 1rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,flex:1}}>{a.name}</span>
          <span style={{fontSize:12,color:ct.color,fontStyle:"italic"}}>{r.l}</span>
          <ArmBtn small label="Remove" confirmLabel="Remove appointment?" onConfirm={async()=>{
            setProcessing("Removing..."); await onAction("deleteAppointment",{id:a.id});
            setProcessing(null); notify(a.name+" removed.",C.textD);
          }}/>
        </div>;
      })}
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("docket");
  const [raw,setRaw]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [panelUser,setPanelUser]=useState(null);
  const [panelAuth,setPanelAuth]=useState(false);
  const [toast,setToast]=useState({msg:"",color:""});
  const [processing,setProcessing]=useState(null);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color}); setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  useEffect(()=>{
    Promise.all([
      sgetAll(),
      fetch(BK_URL+"?action=getall").then(r=>r.json()).then(d=>{
        if(!d.success) return {};
        const out={};
        Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
        return out;
      }).catch(()=>({}))
    ]).then(([moiRaw,bkRaw])=>{
      setRaw({...moiRaw,...bkRaw});
      setLoaded(true);
    });
  },[]);

  const cases=useMemo(()=>raw["ij_cases"]||{},[raw]);
  const judgments=useMemo(()=>raw["ij_judgments"]||{},[raw]);
  const statutes=useMemo(()=>raw["ij_statutes"]||{},[raw]);
  const appointments=useMemo(()=>raw["ij_appointments"]||{},[raw]);
  // Pull passed bills from BK for legal code
  const bills=useMemo(()=>{
    const bkBills=raw["bk_bill"]||{};
    // Also try individual bill keys
    const all={};
    Object.entries(raw).forEach(([k,v])=>{
      if(k.startsWith("bk_bill_")&&v) all[k]=v;
    });
    return {...bkBills,...all};
  },[raw]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createCase"){
      const id="case_"+uid(); const next={...cases,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_cases:next})); await sset("ij_cases",next);
    } else if(type==="updateCase"){
      const {id,...rest}=payload; const next={...cases,[id]:{...cases[id],...rest}};
      setRaw(r=>({...r,ij_cases:next})); await sset("ij_cases",next);
    } else if(type==="deleteCase"){
      const next={...cases}; delete next[payload.id];
      setRaw(r=>({...r,ij_cases:next})); await sset("ij_cases",next);
    } else if(type==="createJudgment"){
      const id="jdg_"+uid(); const next={...judgments,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_judgments:next})); await sset("ij_judgments",next);
    } else if(type==="deleteJudgment"){
      const next={...judgments}; delete next[payload.id];
      setRaw(r=>({...r,ij_judgments:next})); await sset("ij_judgments",next);
    } else if(type==="createStatute"){
      const id="stat_"+uid(); const next={...statutes,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_statutes:next})); await sset("ij_statutes",next);
    } else if(type==="deleteStatute"){
      const next={...statutes}; delete next[payload.id];
      setRaw(r=>({...r,ij_statutes:next})); await sset("ij_statutes",next);
    } else if(type==="createAppointment"){
      const id="appt_"+uid(); const next={...appointments,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_appointments:next})); await sset("ij_appointments",next);
    } else if(type==="deleteAppointment"){
      const next={...appointments}; delete next[payload.id];
      setRaw(r=>({...r,ij_appointments:next})); await sset("ij_appointments",next);
    }
  },[raw,cases,judgments,statutes,appointments]);

  const TABS=[
    {v:"docket",      l:"Case Docket",     icon:"📋"},
    {v:"code",        l:"Legal Code",      icon:"📖"},
    {v:"appointments",l:"The Bench",       icon:"⚖"},
    {v:"panel",       l:"Judicial Panel",  icon:"⚙"},
  ];

  function handleTab(v){
    if(v==="panel"&&!panelUser){setPanelAuth(true);return;}
    setTab(v); setPanelAuth(false);
  }

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0 1.25rem"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"0.85rem 0",borderBottom:`1px solid ${C.border}`}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,
            borderRadius:2,padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.5em",color:C.textDD,marginBottom:3,textTransform:"uppercase"}}>Empire of Lech</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,letterSpacing:"0.12em",color:C.text}}>Imperial Judiciary</div>
          </div>
          <div style={{width:80}}/>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>handleTab(t.v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",
                     textTransform:"uppercase",padding:"0.65rem 1rem",background:"transparent",
                     border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,
                     borderBottom:`2px solid ${tab===t.v&&!panelAuth?C.accent:"transparent"}`,
                     color:tab===t.v&&!panelAuth?C.accent:C.textD}}>
            {t.icon}{" "}{t.l}
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"1.75rem 1.25rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem",color:C.textDD}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",animation:"pulse 1.5s infinite"}}>Loading...</div>
      </div>}
      {loaded&&panelAuth&&!panelUser&&<PanelAuth
        onAuth={(u,r)=>{setPanelUser(u);setRaw(prev=>({...prev,...r}));setPanelAuth(false);setTab("panel");notify("Authenticated.",C.accent);}}
        onCancel={()=>setPanelAuth(false)}/>}
      {loaded&&!panelAuth&&tab==="docket"&&<DocketTab cases={cases} judgments={judgments} onAction={onAction} notify={notify}/>}
      {loaded&&!panelAuth&&tab==="code"&&<LegalCodeTab statutes={statutes} bills={bills}/>}
      {loaded&&!panelAuth&&tab==="appointments"&&<AppointmentsTab appointments={appointments}/>}
      {loaded&&!panelAuth&&tab==="panel"&&panelUser&&<JudicialPanel user={panelUser} cases={cases}
        judgments={judgments} statutes={statutes} appointments={appointments}
        onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&!panelAuth&&tab==="panel"&&!panelUser&&<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
        Authentication required. Click Judicial Panel to log in.
      </div>}
    </div>
    <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
      <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,
        letterSpacing:"0.15em",textAlign:"center"}}>
        {"Imperial Judiciary \u00B7 Empire of Lech \u00B7 Fiat Justitia"}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
