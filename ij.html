// ── UTILS ─────────────────────────────────────────────────────────────────────
async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
async function sgetAll(){
  try{const r=await fetch(SCRIPT_URL+"?action=getall");const d=await r.json();
    if(!d.success)return{};const out={};
    Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
    return out;}catch{return{};}
}
async function sset(k,v){
  try{await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v)})});return true;}catch{return false;}
}

    fontSize:small?10:11,padding:small?"4px 12px":"7px 18px",border:"1px solid",borderRadius:2,

    primary:{background:`linear-gradient(135deg,${C.accentD},${C.accent})`,borderColor:C.accentD,color:"#fff"},

    gold:   {background:"linear-gradient(135deg,#3a2800,#6a4a00)",borderColor:"#5a4000",color:C.gold},
  };
  const vs=variants[variant]||variants.primary;
  return <button onClick={disabled?undefined:onClick} style={{...base,...vs,...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,variant="danger",small}){
  const [armed,setArmed]=useState(false);const t=useRef(null);
  if(armed)return <Btn variant="armed" small={small} onClick={()=>{clearTimeout(t.current);setArmed(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>;
  return <Btn variant={variant} small={small} onClick={()=>{setArmed(true);clearTimeout(t.current);t.current=setTimeout(()=>setArmed(false),4000);}}>{label}</Btn>;
}

// ── CASE TIMELINE STEPPER ─────────────────────────────────────────────────────
function CaseTimeline({status,appealCase}){
  const stages=["filed","active","hearing","deliberating","decided"];
  const isTerminal=["withdrawn","dismissed","appealed","final_upheld","final_overturned"].includes(status);
  const curIdx=stages.indexOf(status);
  return <div style={{padding:"0.75rem 0"}}>
    <div style={{display:"flex",alignItems:"center",gap:0}}>
      {stages.map((s,i)=>{
        const def=CASE_PIPELINE[s];
        const passed=isTerminal?false:i<curIdx;
        const current=!isTerminal&&i===curIdx;
        const future=!isTerminal&&i>curIdx;
        const col=current?def.color:passed?def.color+"99":C.textDD;
        return <React.Fragment key={s}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:i===stages.length-1?0:1}}>
            <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
              background:current||passed?col:"transparent",
              border:`2px solid ${future?C.textDD:col}`,
              boxShadow:current?`0 0 8px ${col}66`:""}}/>
            <span className="mono" style={{fontSize:7,color:col,letterSpacing:"0.05em",textAlign:"center",
              whiteSpace:"nowrap",fontWeight:current?"700":"400"}}>{def.label.toUpperCase()}</span>
          </div>
          {i<stages.length-1&&<div style={{flex:1,height:1,background:passed?`${col}88`:C.border,margin:"0 2px",marginBottom:14}}/>}
        </React.Fragment>;
      })}
    </div>
    {isTerminal&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:10,height:10,borderRadius:2,background:CASE_PIPELINE[status]?.color||C.textD,flexShrink:0}}/>
      <span className="mono" style={{fontSize:8,color:CASE_PIPELINE[status]?.color||C.textD}}>
        {(CASE_PIPELINE[status]?.label||status).toUpperCase()}
        {appealCase?` \u2014 SEE ${appealCase}`:""}
      </span>
    </div>}
  </div>;
}

// ── JUSTICE SELECTOR ──────────────────────────────────────────────────────────
function JusticeSelector({value,onChange,appointments,court}){
  const eligible=Object.values(appointments||{}).filter(a=>{
    if(a.role==="president") return true;
    if(court==="constitutional") return a.role==="cc_justice";
    return a.role==="rc_justice";
  });
  const selected=value||[];
  function toggle(id){
    if(selected.includes(id)) onChange(selected.filter(x=>x!==id));
    else onChange([...selected,id]);
  }
  if(eligible.length===0) return <div className="mono" style={{fontSize:10,color:C.textDD,fontStyle:"italic"}}>No justices appointed for this court.</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {eligible.map(a=>{
      const role=APPOINTMENT_ROLES.find(r=>r.v===a.role)||APPOINTMENT_ROLES[1];
      const ct=COURTS.find(c=>c.v===role.court)||{color:C.silver};
      const sel=selected.includes(a.id);
      return <div key={a.id} onClick={()=>toggle(a.id)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer",
          background:sel?C.s2:C.s1,border:`1px solid ${sel?C.accent:C.border}`,borderRadius:2}}>
        <div style={{width:14,height:14,borderRadius:2,background:sel?C.accentD:"transparent",
          border:`2px solid ${sel?C.accent:C.border}`,display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:8,color:C.accent,flexShrink:0}}>{sel?"✓":""}</div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,flex:1}}>{a.name}</span>
        <span className="mono" style={{fontSize:8,color:ct.color}}>{role.l}</span>
      </div>;
    })}
  </div>;
}

// ── PUBLIC DOCKET ─────────────────────────────────────────────────────────────
function DocketTab({cases,judgments,statutes,onAction,notify}){
  const [sub,setSub]=useState("browse");
  const [courtFilter,setCourtFilter]=useState("all");
  const [statusFilter,setStatusFilter]=useState("all");
  const [search,setSearch]=useState("");
  const list=Object.values(cases||{}).filter(c=>{
    const q=search.toLowerCase();
    return(!q||c.number?.toLowerCase().includes(q)||c.title?.toLowerCase().includes(q)||c.parties?.toLowerCase().includes(q))
      &&(courtFilter==="all"||c.court===courtFilter)
      &&(statusFilter==="all"||c.status===statusFilter);
  }).sort((a,b)=>(b.filed||0)-(a.filed||0));
  const statusOpts=[{v:"all",l:"All Status"},
    ...["filed","active","hearing","deliberating","decided","dismissed","withdrawn","appealed","final_upheld","final_overturned"]
      .map(v=>({v,l:(CASE_PIPELINE[v]||{label:v}).label}))];
  return <div className="fadeIn">
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem"}}>
      {[["browse","Case Docket"],["file","File a Case"],["track","Track My Case"]].map(([v,l])=>
        <button key={v} onClick={()=>setSub(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",
                   padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",
                   borderBottom:`2px solid ${sub===v?C.accent:"transparent"}`,color:sub===v?C.accent:C.textD}}>{l}</button>)}
    </div>
    {sub==="file"&&<PublicCaseForm onAction={onAction} notify={notify} statutes={statutes} onDone={()=>setSub("browse")}/>}
    {sub==="track"&&<CaseTracker cases={cases} judgments={judgments}/>}
    {sub==="browse"&&<div>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search case number, title, parties..."/></div>
        <div style={{flex:1,minWidth:140}}><DD value={courtFilter} onChange={setCourtFilter} options={[{v:"all",l:"All Courts"},...COURTS.map(c=>({v:c.v,l:c.l}))]}/></div>
        <div style={{flex:1,minWidth:160}}><DD value={statusFilter} onChange={setStatusFilter} options={statusOpts}/></div>
      </div>
      {list.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No cases on record.</div>
        :<div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          {list.map(c=><CaseCard key={c.id} caseData={c} judgments={judgments} cases={cases}/>)}
        </div>}
    </div>}
  </div>;
}

function CaseCard({caseData:c,judgments,cases}){
  const [open,setOpen]=useState(false);
  const ct=COURTS.find(x=>x.v===c.court)||COURTS[0];
  const caseJudgments=Object.values(judgments||{}).filter(j=>j.caseId===c.id).sort((a,b)=>(b.date||0)-(a.date||0));
  const appealCase=c.appealedBy?cases?.[c.appealedBy]||{number:c.appealedBy}:null;
  const originCase=c.appealOf?cases?.[c.appealOf]||{number:c.appealOf}:null;

const LAW_TYPES=["bill","constitutional_amendment","act","statute","law"];
const NON_LAW_TYPES=["motion","decree","appointment","resolution","nomination","vote","procedural"];
function LegalCodeTab({statutes,bills,cases}){
  const [source,setSource]=useState("all");
  const [cat,setCat]=useState("all");
  const [inForce,setInForce]=useState("force");
  const [search,setSearch]=useState("");
  const casesByStatute=useMemo(()=>{
    const m={};
    Object.values(cases||{}).forEach(c=>{if(c.contestedStatute)m[c.contestedStatute]=(m[c.contestedStatute]||0)+1;});
    return m;
  },[cases]);
  const allStatutes=useMemo(()=>{
    const list=[];
    Object.values(statutes||{}).forEach(s=>list.push({...s,src:"custom"}));
    Object.values(bills||{}).forEach(b=>{
      if(b.status!=="passed"&&b.status!=="grandfathered") return;
      const t=(b.type||"").toLowerCase();
      if(NON_LAW_TYPES.includes(t)) return;
      const title=(b.title||"").trim();
      if(/^(nomination|appointment) of/i.test(title)) return;
      const cleanNum=b.number||(b.billNumber?String(b.billNumber):null);
      list.push({id:"bk_"+b.id,title,number:cleanNum,cat:"other",body:b.content||b.description||"",
        enacted:b.passedAt||b.submittedAt||null,src:"bundeskongress",repealed:false});
    });
    return list.filter(s=>{
      const q=search.toLowerCase();
      const mQ=!q||s.title?.toLowerCase().includes(q);
      const mS=source==="all"||(source==="bk"&&s.src==="bundeskongress")||(source==="custom"&&s.src==="custom");
      const mC=cat==="all"||s.cat===cat;
      const mF=inForce==="all"||(inForce==="force"&&!s.repealed)||(inForce==="repealed"&&s.repealed);
      return mQ&&mS&&mC&&mF;
    }).sort((a,b)=>{
      if(!a.repealed&&b.repealed) return -1;if(a.repealed&&!b.repealed) return 1;
      return (a.title||"").localeCompare(b.title||"");
    });
  },[statutes,bills,search,source,cat,inForce]);
  return <div className="fadeIn">
    <STitle>Imperial Legal Code</STitle>
    <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.5rem"}}>
      The consolidated laws of the Empire of Lech. Includes all Acts of the Imperial Bundeskongress and statutes arising from judicial proceedings.
    </div>
    <div style={{display:"flex",gap:"0.65rem",flexWrap:"wrap",marginBottom:"1rem"}}>
      {[["all","All Sources"],["bk","Bundeskongress Acts"],["custom","Judicial Statutes"]].map(([v,l])=>
        <button key={v} onClick={()=>setSource(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",
                   padding:"4px 12px",background:source===v?C.s2:"transparent",
                   border:`1px solid ${source===v?C.accent:C.border}`,
                   color:source===v?C.accent:C.textD,borderRadius:1,cursor:"pointer"}}>{l}</button>)}
      {[["force","In Force"],["repealed","Repealed"],["all","All"]].map(([v,l])=>
        <button key={v} onClick={()=>setInForce(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",
                   padding:"4px 12px",background:inForce===v?C.s2:"transparent",
                   border:`1px solid ${inForce===v?(v==="force"?"#2a9a4a":v==="repealed"?C.redD:C.accent):C.border}`,
                   color:inForce===v?(v==="force"?"#2a9a4a":v==="repealed"?C.redL:C.accent):C.textD,
                   borderRadius:1,cursor:"pointer"}}>{l}</button>)}
    </div>
    <div style={{display:"flex",gap:"0.65rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search by title..."/></div>
      <div style={{flex:1,minWidth:180}}><DD value={cat} onChange={setCat} options={[{v:"all",l:"All Categories"},...STATUTE_CATS.map(c=>({v:c.v,l:c.l}))]}/></div>
    </div>
    <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{allStatutes.length} ENACTMENT{allStatutes.length!==1?"S":""}</div>
    {allStatutes.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No statutes match your filters.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
        {allStatutes.map(s=><StatuteCard key={s.id} statute={s} caseCount={casesByStatute[s.id]||0}/>)}
      </div>}
  </div>;
}
function StatuteCard({statute:s,caseCount}){

      {caseCount>0&&<span className="mono" style={{fontSize:8,color:C.textD}}>{caseCount} CASE{caseCount!==1?"S":""}</span>}
      {s.enacted&&<span className="mono" style={{fontSize:9,color:C.textDD}}>

// ── PANEL AUTH ────────────────────────────────────────────────────────────────
function PanelAuth({onAuth,onCancel}){
  const [username,setUsername]=useState("");const [password,setPassword]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function doAuth(){
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true);setErr("");
    try{
      const raw=await sgetAll();const accounts={};
      Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v)accounts[v.username]=v;});
      Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(!accounts[k])accounts[k]=v;});
      const user=Object.values(accounts).find(a=>a.username.toLowerCase()===username.trim().toLowerCase());
      if(!user){setErr("ACCESS DENIED.");setLoading(false);return;}
      const hash=await sha256(password);
      if(hash!==user.passwordHash){setErr("ACCESS DENIED.");setLoading(false);return;}
      if(user.role!=="emperor"&&!user.ijAccess){setErr("AUTHORISATION DENIED \u2014 Judicial access not granted.");setLoading(false);return;}
      onAuth(user,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  }
  return <div style={{maxWidth:420,margin:"0 auto"}}>
    <STitle>Judicial Panel Authentication</STitle>
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.silver}`,padding:"1.75rem"}}>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.8,marginBottom:"1.25rem",textAlign:"center"}}>
        Restricted to judicial officers of the Empire. Authenticate using your Imperial Intranet credentials.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
        <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:"#1a0808",border:`1px solid ${C.redD}44`,padding:"7px 12px"}}>{err}</div>}
        <Btn onClick={doAuth} disabled={loading||!username.trim()||!password.trim()}>{loading?"Authenticating...":"Authenticate"}</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

    if(filter==="open") return !["withdrawn","final_upheld","final_overturned"].includes(c.status);

  }).sort((a,b)=>(b.filed||0)-(a.filed||0));
  return <div>

          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",

function CasePipelineRow({caseData:c,appointments,onAction,notify,setProcessing,isEmperor,allCases}){

  const appealCase=c.appealedBy?allCases?.[c.appealedBy]:null;
  const originCase=c.appealOf?allCases?.[c.appealOf]:null;
  async function moveStatus(newStatus){
    const now=Date.now();

      // Auto-create CC case

      const ccId="case_"+uid();

      const updatedCases={...allCases,[ccId]:ccCase};
      const updatedOriginal={...c,status:"appealed",statusHistory:hist,appealedBy:ccId};

      await onAction("bulkUpdateCases",{cases:updatedCases});

  async function savePresiding(){

      {appealCase&&<span className="mono" style={{fontSize:8,color:"#cc6a10"}}>ON APPEAL</span>}
      <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",background:C.s2}}>
      <CaseTimeline status={c.status} appealCase={appealCase?.number}/>
      {originCase&&<div style={{background:C.s1,border:`1px solid #cc6a1044`,borderLeft:`3px solid #cc6a10`,
        borderRadius:"0 3px 3px 0",padding:"6px 10px",marginBottom:"0.75rem",fontSize:12,color:"#cc8040"}}>
        Appeal of {originCase.number} {" \u2014 "} {originCase.title}
      </div>}
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:4}}>{pipeline.desc}</div>
      {/* Presiding selector */}
      <div style={{marginBottom:"1rem"}}>
        <FL>PRESIDING JUSTICE(S)</FL>
        <JusticeSelector value={presiding} onChange={setPresiding} appointments={appointments} court={c.court}/>
      </div>
      {/* Court elevation (emperor only) */}
      {isEmperor&&c.court==="regional"&&!["appealed","withdrawn","final_upheld","final_overturned"].includes(c.status)&&<div style={{marginBottom:"1rem"}}>
        <FL>COURT ELEVATION (EMPEROR ONLY)</FL>
        <DD value={court} onChange={setCourt} options={COURTS.map(x=>({v:x.v,l:x.l}))}/>
        {court==="constitutional"&&c.court==="regional"&&<Disclaimer type="danger">
          Elevating this case to the Constitutional Court is a significant step. It should only be done where the matter directly involves constitutional questions that cannot be addressed at the Regional level.
        </Disclaimer>}

          setProcessing("Removing..."); await onAction("deleteCase",{id:c.id});

        }}/>

      </div>}
    </div>}
  </div>;

// ── JUDGMENT PANEL ────────────────────────────────────────────────────────────
function JudgmentPanel({cases,judgments,statutes,appointments,onAction,notify,setProcessing}){
  const deliberating=Object.values(cases||{}).filter(c=>c.status==="deliberating");
  const [caseId,setCaseId]=useState("");
  const [title,setTitle]=useState("");const [jType,setJType]=useState("judgment");
  const [summary,setSummary]=useState("");const [outcome,setOutcome]=useState("");
  const [statuteAction,setStatuteAction]=useState("none");const [statuteTarget,setStatuteTarget]=useState("");
  const [newStatuteTitle,setNewStatuteTitle]=useState("");const [newStatuteCat,setNewStatuteCat]=useState("other");
  const [newStatuteBody,setNewStatuteBody]=useState("");const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const selCase=caseId?cases?.[caseId]:null;
  const isAppeal=selCase?.appealOf!=null;
  const outcomes=isAppeal?APPEAL_OUTCOMES:JUDGMENT_OUTCOMES;
  const outDef=outcomes.find(o=>o.v===outcome)||null;
  const canTriggerStatute=outcome==="in_favor_complainant"||outcome==="partial"||outcome==="appeal_upheld";
  const allStatutes=Object.values(statutes||{}).filter(s=>!s.repealed).sort((a,b)=>(a.title||"").localeCompare(b.title||""));
  const JUDGMENT_TYPE_OPTS=[{v:"judgment",l:"Judgment"},{v:"ruling",l:"Ruling"},{v:"order",l:"Court Order"},{v:"opinion",l:"Advisory Opinion"},{v:"dismissal",l:"Order of Dismissal"}];
  async function renderJudgment(){
    setSaving(true);setProcessing("Recording judgment...");
    const jId="jdg_"+uid();const now=Date.now();
    // Determine new case status
    let newStatus="decided";
    if(outcome==="dismiss_on_merits") newStatus="dismissed";
    if(outcome==="appeal_upheld") newStatus="final_overturned";
    if(outcome==="appeal_denied") newStatus="final_upheld";
    const hist=[...(selCase.statusHistory||[]),{status:newStatus,at:now}];
    // If this appeal overturns an original, update original too
    let extraUpdates={};
    if(isAppeal&&selCase.appealOf){
      const orig=cases?.[selCase.appealOf];
      if(orig){
        const origNewStatus=outcome==="appeal_upheld"?"final_overturned":"final_upheld";
        const origHist=[...(orig.statusHistory||[]),{status:origNewStatus,at:now}];
        extraUpdates[orig.id]={...orig,status:origNewStatus,statusHistory:origHist};
      }
    }
    // Statute action
    let statuteEffect=null;
    if(canTriggerStatute&&statuteAction!=="none"){
      if(statuteAction==="repeal"&&statuteTarget){
        const st=statutes?.[statuteTarget];
        if(st){
          const updated={...st,repealed:true,repealedAt:now,repealedRef:selCase.number};
          extraUpdates["statute_"+statuteTarget]=updated;
          statuteEffect={action:"repeal",statuteId:statuteTarget,title:st.title};
        }
      } else if(statuteAction==="create"&&newStatuteTitle.trim()){
        const sid="stat_"+uid();
        extraUpdates["new_statute_"+sid]={id:sid,title:newStatuteTitle.trim(),cat:newStatuteCat,
          body:newStatuteBody.trim(),enacted:now,src:"custom",caseRef:selCase.number,
          caseId:selCase.id,judgmentId:jId,repealed:false};
        statuteEffect={action:"create",title:newStatuteTitle.trim()};
      } else if(statuteAction==="modify"&&statuteTarget){
        const st=statutes?.[statuteTarget];
        if(st) statuteEffect={action:"modify",statuteId:statuteTarget,title:st.title};
      }
    }
    await onAction("renderJudgment",{
      judgment:{id:jId,caseId,title:title.trim(),type:jType,summary:summary.trim(),outcome,
        date:now,statuteEffect},
      caseUpdate:{id:caseId,status:newStatus,statusHistory:hist},
      extraUpdates,
    });
    setProcessing(null);setSaving(false);setDone(true);
    notify("Judgment recorded.",C.accent);
  }
  if(done) return <div style={{maxWidth:480}}>
    <div style={{background:C.s1,border:"1px solid #1e3e5a",borderLeft:"4px solid #4a7acc",
      borderRadius:"0 3px 3px 0",padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.blueL,marginBottom:6}}>{"✓ Judgment Recorded"}</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>The case status has been updated automatically.</div>
    </div>
    <Btn variant="ghost" onClick={()=>{setDone(false);setCaseId("");setTitle("");setSummary("");setOutcome("");setStatuteAction("none");setStatuteTarget("");setNewStatuteTitle("");setNewStatuteBody("");}}>Render Another Judgment</Btn>
  </div>;
  return <div>
    <STitle>Render Judgment</STitle>
    {deliberating.length===0&&<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem"}}>
      <div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>No cases are currently under deliberation.</div>
      <Disclaimer type="info">Only cases in the "Under Deliberation" status can receive a formal judgment. Advance a case to deliberation from the Cases tab first.</Disclaimer>
    </div>}
    {deliberating.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
      <div>
        <FL>SELECT CASE *</FL>
        <DD value={caseId} onChange={setCaseId} options={[{v:"",l:"-- Select a deliberating case --"},...deliberating.map(c=>({v:c.id,l:c.number+" \u2014 "+c.title}))]}/>
        {selCase&&<div style={{marginTop:4,background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",display:"flex",gap:10,alignItems:"center"}}>
          <CourtBadge court={selCase.court}/>
          <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{selCase.parties}</span>
          {isAppeal&&<span className="mono" style={{fontSize:8,color:"#cc6a10"}}>APPEAL CASE</span>}
        </div>}
      </div>
      {selCase&&<>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:200}}><FL>JUDGMENT TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="e.g. Judgment in Crown v. PlayerName"/></div>
          <div style={{flex:1,minWidth:160}}><FL>INSTRUMENT TYPE</FL><DD value={jType} onChange={setJType} options={JUDGMENT_TYPE_OPTS}/></div>
        </div>
        <div>
          <FL>OUTCOME *</FL>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {outcomes.map(o=><div key={o.v} onClick={()=>setOutcome(o.v)}
              style={{display:"flex",gap:8,padding:"0.65rem",cursor:"pointer",
                background:outcome===o.v?C.s2:C.s1,
                border:`1px solid ${outcome===o.v?C.accent:C.border}`,borderRadius:2}}>
              <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${outcome===o.v?C.accent:C.textDD}`,
                background:outcome===o.v?C.accent:"transparent",flexShrink:0,marginTop:2}}/>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:outcome===o.v?C.text:C.textD,marginBottom:2}}>{o.l}</div>
                <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",lineHeight:1.5}}>{o.desc}</div>
              </div>
            </div>)}
          </div>
        </div>
        <div><FL>GROUNDS / SUMMARY *</FL><TA value={summary} onChange={setSummary} placeholder="Full reasoning of the court..." rows={5}/></div>
        {/* Statute action — only when outcome warrants */}
        {canTriggerStatute&&<div style={{background:C.s2,border:`1px solid ${C.gold}33`,borderTop:`2px solid ${C.gold}66`,borderRadius:"0 0 3px 3px",padding:"1rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.gold,marginBottom:"0.75rem"}}>LEGAL CODE ACTION</div>
          <Disclaimer type="warning">
            The selected outcome may affect the Imperial Legal Code. Select an action below. If you select "No Statute Action", the legal code is unchanged — the judgment stands but no law is created or repealed.
          </Disclaimer>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:"0.75rem"}}>
            {STATUTE_ACTIONS.map(a=><div key={a.v} onClick={()=>setStatuteAction(a.v)}
              style={{display:"flex",gap:8,padding:"0.65rem",cursor:"pointer",
                background:statuteAction===a.v?C.s1:"transparent",
                border:`1px solid ${statuteAction===a.v?C.gold:C.border}`,borderRadius:2}}>
              <div style={{width:14,height:14,borderRadius:2,border:`2px solid ${statuteAction===a.v?C.gold:C.textDD}`,
                background:statuteAction===a.v?C.goldD:"transparent",flexShrink:0,marginTop:2}}/>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:statuteAction===a.v?C.gold:C.textD,marginBottom:2}}>{a.l}</div>
                <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",lineHeight:1.5}}>{a.desc}</div>
              </div>
            </div>)}
          </div>
          {statuteAction==="repeal"&&<div style={{marginTop:"0.75rem"}}>
            <FL>SELECT STATUTE TO REPEAL *</FL>
            <DD value={statuteTarget} onChange={setStatuteTarget} options={[{v:"",l:"-- Select statute --"},...allStatutes.map(s=>({v:s.id,l:s.title}))]}/>
            <Disclaimer type="danger">Repealing a statute permanently removes it from force. This cannot be undone except by a new enactment or a successful appeal that overturns this judgment.</Disclaimer>
          </div>}
          {statuteAction==="modify"&&<div style={{marginTop:"0.75rem"}}>
            <FL>SELECT STATUTE BEING MODIFIED *</FL>
            <DD value={statuteTarget} onChange={setStatuteTarget} options={[{v:"",l:"-- Select statute --"},...allStatutes.map(s=>({v:s.id,l:s.title}))]}/>
            <Disclaimer type="info">A modification note will be recorded against the statute. The text itself will not change — only the interpretation per this judgment.</Disclaimer>
          </div>}
          {statuteAction==="create"&&<div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginTop:"0.75rem"}}>
            <Disclaimer type="info">A new statute will be created and linked to this case and judgment. It will immediately appear in the Legal Code as "In Force".</Disclaimer>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:180}}><FL>STATUTE TITLE *</FL><Inp value={newStatuteTitle} onChange={setNewStatuteTitle} placeholder="Title of the new statute"/></div>
              <div style={{flex:1,minWidth:160}}><FL>CATEGORY</FL><DD value={newStatuteCat} onChange={setNewStatuteCat} options={STATUTE_CATS.map(c=>({v:c.v,l:c.l}))}/></div>
            </div>
            <div><FL>STATUTE TEXT</FL><TA value={newStatuteBody} onChange={setNewStatuteBody} placeholder="Full text of the statute..." rows={4}/></div>
          </div>}
        </div>}
        <Btn full disabled={!title.trim()||!outcome||!summary.trim()||saving
          ||(canTriggerStatute&&statuteAction==="repeal"&&!statuteTarget)
          ||(canTriggerStatute&&statuteAction==="create"&&!newStatuteTitle.trim())
          ||(canTriggerStatute&&statuteAction==="modify"&&!statuteTarget)}
          onClick={renderJudgment}>{saving?"Recording...":"Record Judgment"}</Btn>
      </>}
    </div>}
    {/* Existing judgments */}
    {Object.values(judgments||{}).length>0&&<div style={{marginTop:"2rem"}}>
      <STitle>Judgment Record</STitle>
      {Object.values(judgments||{}).sort((a,b)=>(b.date||0)-(a.date||0)).map(j=>{
        const rc=cases?.[j.caseId];
        return <div key={j.id} style={{background:C.s1,border:`1px solid ${C.border}`,
          borderTop:`2px solid ${C.silver}`,borderRadius:"0 0 3px 3px",padding:"0.85rem 1rem",marginBottom:"0.5rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div className="mono" style={{fontSize:9,color:C.silverD,marginBottom:2}}>{rc?rc.number+"\u2014":""}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{j.title}</div>
            {j.outcome&&<div className="mono" style={{fontSize:8,color:C.textD,marginTop:2}}>
              {([...JUDGMENT_OUTCOMES,...APPEAL_OUTCOMES].find(o=>o.v===j.outcome)||{l:j.outcome}).l}
            </div>}
          </div>
          {j.date&&<div className="mono" style={{fontSize:9,color:C.textDD}}>
            {new Date(j.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div>}
        </div>;
      })}
    </div>}
  </div>;
}

// ── PANEL STATUTES (emperor-only free form, + view all) ───────────────────────
function PanelStatutes({statutes,cases,onAction,notify,setProcessing,isEmperor}){
  const [title,setTitle]=useState("");const [cat,setCat]=useState("other");
  const [body,setBody]=useState("");const [saving,setSaving]=useState(false);
  const list=Object.values(statutes||{}).sort((a,b)=>{
    if(!a.repealed&&b.repealed) return -1;if(a.repealed&&!b.repealed) return 1;
    return (a.title||"").localeCompare(b.title||"");
  });
  return <div>
    {isEmperor&&<><STitle>Enrol Imperial Statute</STitle>
      <Disclaimer type="info">
        Statutes normally arise from judicial judgments. Use this only for codification, consolidation, or instruments that do not originate from a court ruling — for example, foundational constitutional provisions.
      </Disclaimer>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginTop:"0.75rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            <div style={{flex:2,minWidth:200}}><FL>STATUTE TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="Title of the statute"/></div>
            <div style={{flex:1,minWidth:160}}><FL>CATEGORY</FL><DD value={cat} onChange={setCat} options={STATUTE_CATS.map(c=>({v:c.v,l:c.l}))}/></div>
          </div>
          <div><FL>TEXT</FL><TA value={body} onChange={setBody} placeholder="Full text of the statute..." rows={5}/></div>
          <Btn small disabled={!title.trim()||saving} onClick={async()=>{
            setSaving(true);setProcessing("Enrolling...");
            await onAction("createStatute",{title:title.trim(),cat,body:body.trim(),enacted:Date.now(),src:"custom",repealed:false});
            setProcessing(null);setSaving(false);notify(title+" enrolled.",C.accent);
            setTitle("");setBody("");
          }}>{saving?"Enrolling...":"Enrol Statute"}</Btn>
        </div>
      </div></>}
    <STitle>All Statutes on Record</STitle>
    {list.length===0&&<div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>No custom statutes enrolled.</div>}
    {list.map(s=><div key={s.id} style={{background:s.repealed?"transparent":C.s1,
      border:`1px solid ${s.repealed?C.border+"66":C.border}`,borderLeft:`4px solid ${s.repealed?C.textDD:C.accent}`,
      borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",opacity:s.repealed?.65:1}}>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:s.repealed?C.textD:C.text,flex:1}}>{s.title}</span>
      <span className="mono" style={{fontSize:9,color:s.repealed?C.redL:"#2a9a4a"}}>{s.repealed?"REPEALED":"IN FORCE"}</span>
      {s.caseRef&&<span className="mono" style={{fontSize:8,color:C.textDD}}>{s.caseRef}</span>}
    </div>)}
  </div>;
}

// ── PANEL APPOINTMENTS ────────────────────────────────────────────────────────
function PanelAppointments({appointments,onAction,notify,setProcessing}){
  const [name,setName]=useState("");const [role,setRole]=useState("cc_justice");
  const [since,setSince]=useState("");const [saving,setSaving]=useState(false);
  const list=Object.values(appointments||{}).sort((a,b)=>{const o={president:0,cc_justice:1,rc_justice:2};return(o[a.role]||3)-(o[b.role]||3)||(a.name||"").localeCompare(b.name||"");});
  return <div>
    <STitle>Judicial Appointments</STitle>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>APPOINT JUSTICE</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>NAME *</FL><Inp value={name} onChange={setName} placeholder="Full name"/></div>
          <div style={{flex:1,minWidth:200}}><FL>ROLE</FL><DD value={role} onChange={setRole} options={APPOINTMENT_ROLES.map(r=>({v:r.v,l:r.l}))}/></div>
          <div style={{flex:1,minWidth:120}}><FL>DATE OF APPOINTMENT</FL><Inp value={since} onChange={setSince} placeholder="e.g. 1 January 2026"/></div>
        </div>
        <Btn small disabled={!name.trim()||saving} onClick={async()=>{
          setSaving(true);setProcessing("Appointing...");
          await onAction("createAppointment",{name:name.trim(),role,since:since.trim()});
          setProcessing(null);setSaving(false);notify(name+" appointed.",C.accent);
          setName("");setSince("");
        }}>{saving?"Appointing...":"Appoint"}</Btn>
      </div>
    </div>
    {list.map(a=>{const r=APPOINTMENT_ROLES.find(x=>x.v===a.role)||APPOINTMENT_ROLES[1];const ct=COURTS.find(c=>c.v===r.court)||{color:C.silver};
      return <div key={a.id} style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${ct.color}`,
        borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,flex:1}}>{a.name}</span>
        <span style={{fontSize:12,color:ct.color,fontStyle:"italic"}}>{r.l}</span>
        {a.since&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{a.since}</span>}
        <ArmBtn small label="Remove" confirmLabel="Remove appointment?" onConfirm={async()=>{
          setProcessing("Removing...");await onAction("deleteAppointment",{id:a.id});
          setProcessing(null);notify(a.name+" removed.",C.textD);
        }}/>
      </div>;})}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("docket");
  const [raw,setRaw]=useState({});const [loaded,setLoaded]=useState(false);
  const [panelUser,setPanelUser]=useState(null);const [panelAuth,setPanelAuth]=useState(false);
  const [toast,setToast]=useState({msg:"",color:""});const [processing,setProcessing]=useState(null);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  useEffect(()=>{
    Promise.all([
      sgetAll(),
      fetch(BK_URL+"?action=getall").then(r=>r.json()).then(d=>{
        if(!d.success) return {};
        const out={};
        Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
        return out;
      }).catch(()=>({}))
    ]).then(([moiRaw,bkRaw])=>{setRaw({...moiRaw,...bkRaw});setLoaded(true);});
  },[]);

  const cases=useMemo(()=>raw["ij_cases"]||{},[raw]);
  const judgments=useMemo(()=>raw["ij_judgments"]||{},[raw]);
  const statutes=useMemo(()=>raw["ij_statutes"]||{},[raw]);
  const appointments=useMemo(()=>raw["ij_appointments"]||{},[raw]);
  const bills=useMemo(()=>{
    const all={};
    Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("bk_bill_")&&v)all[k]=v;});
    return all;
  },[raw]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createCase"){
      const id="case_"+uid();const next={...cases,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="updateCase"){
      const {id,...rest}=payload;const next={...cases,[id]:{...cases[id],...rest}};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="bulkUpdateCases"){
      const next={...cases,...payload.cases};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="deleteCase"){
      const next={...cases};delete next[payload.id];
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="renderJudgment"){
      const {judgment,caseUpdate,extraUpdates}=payload;
      const newJudgments={...judgments,[judgment.id]:judgment};
      const newCases={...cases,[caseUpdate.id]:{...cases[caseUpdate.id],...caseUpdate}};
      let newStatutes={...statutes};
      Object.entries(extraUpdates||{}).forEach(([k,v])=>{
        if(k.startsWith("statute_")){const sid=k.replace("statute_","");newStatutes[sid]=v;}
        else if(k.startsWith("new_statute_")){const sid=k.replace("new_statute_","");newStatutes[sid]=v;}
        else if(k in cases||true){newCases[v.id]=v;}
      });
      // Fix: extra updates for cases
      Object.values(extraUpdates||{}).forEach(v=>{if(v.id&&cases[v.id])newCases[v.id]=v;});
      setRaw(r=>({...r,ij_judgments:newJudgments,ij_cases:newCases,ij_statutes:newStatutes}));
      await sset("ij_judgments",newJudgments);
      await sset("ij_cases",newCases);
      if(Object.keys(newStatutes).length!==Object.keys(statutes).length) await sset("ij_statutes",newStatutes);
    } else if(type==="createStatute"){
      const id="stat_"+uid();const next={...statutes,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_statutes:next}));await sset("ij_statutes",next);
    } else if(type==="createAppointment"){
      const id="appt_"+uid();const next={...appointments,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_appointments:next}));await sset("ij_appointments",next);
    } else if(type==="deleteAppointment"){
      const next={...appointments};delete next[payload.id];
      setRaw(r=>({...r,ij_appointments:next}));await sset("ij_appointments",next);
    }
  },[raw,cases,judgments,statutes,appointments]);

  const TABS=[{v:"docket",l:"Case Docket",icon:"📋"},{v:"code",l:"Legal Code",icon:"📖"},{v:"bench",l:"The Bench",icon:"⚖"},{v:"panel",l:"Judicial Panel",icon:"⚙"}];
  function handleTab(v){if(v==="panel"&&!panelUser){setPanelAuth(true);return;}setTab(v);setPanelAuth(false);}

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0 1.25rem"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"0.85rem 0",borderBottom:`1px solid ${C.border}`}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
            padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.5em",color:C.textDD,marginBottom:3,textTransform:"uppercase"}}>Empire of Lech</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,letterSpacing:"0.12em",color:C.text}}>Imperial Judiciary</div>
          </div>
          <div style={{width:80}}/>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>handleTab(t.v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",
                     textTransform:"uppercase",padding:"0.65rem 1rem",background:"transparent",
                     border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,
                     borderBottom:`2px solid ${tab===t.v&&!panelAuth?C.accent:"transparent"}`,
                     color:tab===t.v&&!panelAuth?C.accent:C.textD}}>
            {t.icon}{" "}{t.l}
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"1.75rem 1.25rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem",color:C.textDD}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",animation:"pulse 1.5s infinite"}}>Loading...</div>
      </div>}
      {loaded&&panelAuth&&!panelUser&&<PanelAuth
        onAuth={(u,r)=>{setPanelUser(u);setRaw(prev=>({...prev,...r}));setPanelAuth(false);setTab("panel");notify("Authenticated.",C.accent);}}
        onCancel={()=>setPanelAuth(false)}/>}
      {loaded&&!panelAuth&&tab==="docket"&&<DocketTab cases={cases} judgments={judgments} statutes={statutes} onAction={onAction} notify={notify}/>}
      {loaded&&!panelAuth&&tab==="code"&&<LegalCodeTab statutes={statutes} bills={bills} cases={cases}/>}
      {loaded&&!panelAuth&&tab==="bench"&&<AppointmentsTab appointments={appointments}/>}
      {loaded&&!panelAuth&&tab==="panel"&&panelUser&&<JudicialPanel user={panelUser} cases={cases}
        judgments={judgments} statutes={statutes} appointments={appointments}
        onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&!panelAuth&&tab==="panel"&&!panelUser&&<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
        Authentication required. Click Judicial Panel to log in.
      </div>}
    </div>
    <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
      <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,
        letterSpacing:"0.15em",textAlign:"center"}}>{"Imperial Judiciary \u00B7 Empire of Lech \u00B7 Fiat Justitia"}</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
