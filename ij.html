async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
async function sgetAll(){
  try{const r=await fetch(SCRIPT_URL+"?action=getall");const d=await r.json();
    if(!d.success)return{};const out={};
    Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
    return out;}catch{return{};}
}
async function sset(k,v){
  try{await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v)})});return true;}catch{return false;}
}

// ── CASE TIMELINE STEPPER ─────────────────────────────────────────────────────
function CaseTimeline({status,appealCase}){
  const stages=["filed","active","hearing","deliberating","decided"];
  const isTerminal=["withdrawn","dismissed","appealed","final_upheld","final_overturned"].includes(status);
  const curIdx=stages.indexOf(status);
  return <div style={{padding:"0.75rem 0"}}>
    <div style={{display:"flex",alignItems:"center",gap:0}}>
      {stages.map((s,i)=>{
        const def=CASE_PIPELINE[s];
        const passed=isTerminal?false:i<curIdx;
        const current=!isTerminal&&i===curIdx;
        const future=!isTerminal&&i>curIdx;
        const col=current?def.color:passed?def.color+"99":C.textDD;
        return <React.Fragment key={s}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:i===stages.length-1?0:1}}>
            <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
              background:current||passed?col:"transparent",
              border:`2px solid ${future?C.textDD:col}`,
              boxShadow:current?`0 0 8px ${col}66`:""}}/>
            <span className="mono" style={{fontSize:7,color:col,letterSpacing:"0.05em",textAlign:"center",
              whiteSpace:"nowrap",fontWeight:current?"700":"400"}}>{def.label.toUpperCase()}</span>
          </div>
          {i<stages.length-1&&<div style={{flex:1,height:1,background:passed?`${col}88`:C.border,margin:"0 2px",marginBottom:14}}/>}
        </React.Fragment>;
      })}
    </div>
    {isTerminal&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:10,height:10,borderRadius:2,background:CASE_PIPELINE[status]?.color||C.textD,flexShrink:0}}/>
      <span className="mono" style={{fontSize:8,color:CASE_PIPELINE[status]?.color||C.textD}}>
        {(CASE_PIPELINE[status]?.label||status).toUpperCase()}
        {appealCase?` \u2014 SEE ${appealCase}`:""}
      </span>
    </div>}
  </div>;
}

// ── JUSTICE SELECTOR ──────────────────────────────────────────────────────────
function JusticeSelector({value,onChange,appointments,court}){
  const eligible=Object.values(appointments||{}).filter(a=>{
    if(a.role==="president") return true;
    if(court==="constitutional") return a.role==="cc_justice";
    return a.role==="rc_justice";
  });
  const selected=value||[];
  function toggle(id){
    if(selected.includes(id)) onChange(selected.filter(x=>x!==id));
    else onChange([...selected,id]);
  }
  if(eligible.length===0) return <div className="mono" style={{fontSize:10,color:C.textDD,fontStyle:"italic"}}>No justices appointed for this court.</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {eligible.map(a=>{
      const role=APPOINTMENT_ROLES.find(r=>r.v===a.role)||APPOINTMENT_ROLES[1];
      const ct=COURTS.find(c=>c.v===role.court)||{color:C.silver};
      const sel=selected.includes(a.id);
      return <div key={a.id} onClick={()=>toggle(a.id)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer",
          background:sel?C.s2:C.s1,border:`1px solid ${sel?C.accent:C.border}`,borderRadius:2}}>
        <div style={{width:14,height:14,borderRadius:2,background:sel?C.accentD:"transparent",
          border:`2px solid ${sel?C.accent:C.border}`,display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:8,color:C.accent,flexShrink:0}}>{sel?"✓":""}</div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,flex:1}}>{a.name}</span>
        <span className="mono" style={{fontSize:8,color:ct.color}}>{role.l}</span>
      </div>;
    })}
  </div>;
}

// ── PUBLIC DOCKET ─────────────────────────────────────────────────────────────
function DocketTab({cases,judgments,statutes,appointments,onAction,notify}){

      &&(courtFilter==="all"||c.court===courtFilter)
      &&(statusFilter==="all"||c.status===statusFilter);
  }).sort((a,b)=>(b.filed||0)-(a.filed||0));
  const statusOpts=[{v:"all",l:"All Status"},

      .map(v=>({v,l:(CASE_PIPELINE[v]||{label:v}).label}))];

    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem"}}>

                   borderBottom:`2px solid ${sub===v?C.accent:"transparent"}`,color:sub===v?C.accent:C.textD}}>{l}</button>)}
    </div>

    {sub==="track"&&<CaseTracker cases={cases} judgments={judgments} appointments={appointments}/>}

      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>

        <div style={{flex:1,minWidth:140}}><DD value={courtFilter} onChange={setCourtFilter} options={[{v:"all",l:"All Courts"},...COURTS.map(c=>({v:c.v,l:c.l}))]}/></div>

  </div>;
}

// ── PUBLIC CASE FILING ────────────────────────────────────────────────────────
function PublicCaseForm({onAction,notify,statutes,cases,onDone}){
  const [step,setStep]=useState(1);
  const [type,setType]=useState("criminal");
  const [nameA,setNameA]=useState("");
  const [nameB,setNameB]=useState("");
  const [subject,setSubject]=useState("");
  const [appealOfId,setAppealOfId]=useState("");
  const [contestedId,setContestedId]=useState("");
  const [summary,setSummary]=useState("");
  const [done,setDone]=useState(null);
  const [saving,setSaving]=useState(false);

  const isAppeal=type==="appeal_judgment";
  const isTreaty=type==="treaty";
  const isCrown=type==="criminal"||type==="impeachment";
  const isCivil=type==="civil";
  const isConstitutional=type==="constitutional_challenge";
  const isAdmin=type==="administrative";
  const filingCourt=(isAppeal||isConstitutional)?"constitutional":"regional";
  const canContest=["constitutional_challenge","civil","criminal"].includes(type);
  const appealCase=appealOfId?Object.values(cases||{}).find(x=>x.id===appealOfId):null;
  const a=nameA.trim(),b=nameB.trim(),s=subject.trim();
  const allStatutes=Object.values(statutes||{}).filter(s=>!s.repealed).sort((x,y)=>(x.title||"").localeCompare(y.title||""));

  // Build title and parties directly from type + inputs — no template picker needed
  const builtTitle=(()=>{
    switch(type){
      case "criminal":                return a?`Crown v. ${a}`:"";
      case "civil":                   return a?(b?`${a} v. ${b}`:`${a} v. The Crown`):"";
      case "administrative":          return a?`${a} v. The Crown`:"";
      case "constitutional_challenge":return a?`${a} v. The Crown`:"";
      case "impeachment":             return a?`Crown v. ${a}`:"";
      case "treaty":                  return s?`In re ${s}`:"";
      case "appeal_judgment":         return appealCase?`Appeal \u2014 ${appealCase.title}`:"";
      default:                        return a?`${a} v. The Crown`:"";
    }
  })();
  const builtParties=(()=>{
    switch(type){
      case "criminal":                return a?`The Crown v. ${a}`:"";
      case "civil":                   return a?(b?`${a} v. ${b}`:`${a} v. The Crown`):"";
      case "administrative":          return a?`${a} v. The Crown`:"";
      case "constitutional_challenge":return a?`${a} v. The Crown`:"";
      case "impeachment":             return a?`The Crown v. ${a}`:"";
      case "treaty":                  return s?(a?`${a} \u2014 re: ${s}`:`In re ${s}`):"";
      case "appeal_judgment":         return appealCase?appealCase.parties:"";
      default:                        return a?`${a} v. The Crown`:"";
    }
  })();

  function genNumber(court){
    const prefix=court==="constitutional"?"CC":"RC";const yr=new Date().getFullYear();
    const existing=new Set(Object.values(cases||{}).map(c=>c.number));
    let num,attempts=0;
    do{num=`${prefix}-${yr}-${String(Math.floor(Math.random()*900)+100).padStart(3,"0")}`;attempts++;}
    while(existing.has(num)&&attempts<50);return num;
  }
  function handleTypeChange(v){setType(v);setNameA("");setNameB("");setSubject("");setAppealOfId("");}

  const step1Valid=!isAppeal||!!appealOfId;
  const step2Valid=isAppeal||(isTreaty?!!s:!!a);
  const step3Valid=!!summary.trim();

  function StepBar(){
    const labels=["Proceedings","Parties","Grounds","Review"];
    return <div style={{display:"flex",alignItems:"center",marginBottom:"1.75rem",paddingBottom:"1.25rem",borderBottom:`1px solid ${C.border}`}}>
      {labels.map((label,i)=>{
        const n=i+1,isDone=step>n,isActive=step===n;
        const col=isDone||isActive?C.accent:C.textDD;
        return <React.Fragment key={n}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:"50%",
              background:isDone?C.accentD:isActive?C.accent:"transparent",
              border:`2px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:10,fontFamily:"'Cinzel',serif",fontWeight:700,color:isDone||isActive?"#fff":C.textDD}}>
              {isDone?"\u2713":n}
            </div>
            <span className="mono" style={{fontSize:7,color:col,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
          </div>
          {i<labels.length-1&&<div style={{flex:1,height:1,background:step>n?C.accentD:C.border,margin:"0 8px",marginBottom:18}}/>}
        </React.Fragment>;
      })}
    </div>;
  }

  if(done) return <div style={{maxWidth:500}}>
    <div style={{background:C.s1,border:"1px solid #1e3e5a",borderLeft:"4px solid #4a7acc",
      borderRadius:"0 3px 3px 0",padding:"1.5rem",marginBottom:"1rem"}}>
      <div className="mono" style={{fontSize:9,letterSpacing:"0.25em",color:C.blueL,marginBottom:8}}>CASE FILED</div>
      <div className="mono" style={{fontSize:20,color:C.silver,marginBottom:8}}>{done.number}</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,marginBottom:3}}>{done.title}</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>{done.parties}</div>
      <div style={{fontSize:13,color:C.textD,lineHeight:1.7,borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>
        {filingCourt==="constitutional"
          ?(isAppeal?"Filed to the Constitutional Court.":"Filed to the Constitutional Court. A justice will be assigned to determine admissibility.")
          :"Filed to the Regional Court. The court may elevate to the Constitutional Court if warranted."}
        {" "}Use <strong>Track My Case</strong> with the reference number above to follow progress.
      </div>
    </div>
    <Btn variant="ghost" onClick={()=>{setDone(null);setStep(1);setNameA("");setNameB("");setSubject("");setSummary("");setContestedId("");setAppealOfId("");setType("criminal");}}>File Another Case</Btn>
  </div>;

  return <div style={{maxWidth:620}}>
    <StepBar/>

    {/* ── STEP 1 ── */}
    {step===1&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>STEP 1 — NATURE OF THE PROCEEDINGS</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
        {CASE_TYPES.map(ct=>{const sel=type===ct.v;return <div key={ct.v} onClick={()=>handleTypeChange(ct.v)}
          style={{padding:"0.75rem 1rem",cursor:"pointer",borderRadius:2,display:"flex",gap:10,alignItems:"flex-start",
            background:sel?C.s2:C.s1,border:`1px solid ${sel?C.accent:C.border}`,transition:"all .12s"}}>
          <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${sel?C.accent:C.textDD}`,
            background:sel?C.accent:"transparent",flexShrink:0,marginTop:3}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:sel?C.text:C.textD,fontWeight:sel?700:400,marginBottom:ct.desc?2:0}}>{ct.l}</div>

          notify("Case "+number+" filed.",C.accent);
        }}>{saving?"Filing...":"File Case"}</Btn>
      </div>
    </div>}
  </div>;
}

function bkCalcBT(members,votes,threshold=BK_BT_THRESH){
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    const s=(members[id]?.seats)||0;
    if(v==="for") f+=s; else if(v==="against") a+=s; else if(v==="abstain"||v==="absent") ab+=s;
  });
  return {for_seats:f,against_seats:a,abstain_seats:ab,passed:f>=threshold,threshold};
}
function bkCalcBH(bh,votes){
  let f=0,a=0,ab=0;const total=Object.keys(bh||{}).length;
  Object.entries(votes||{}).forEach(([id,v])=>{
    if(!bh[id]) return;
    if(v==="for") f++; else if(v==="against") a++; else if(v==="abstain") ab++;
  });
  const thresh=Math.floor(total/2)+1;
  return {for_count:f,against_count:a,abstain_count:ab,total,threshold:thresh,passed:f>=thresh};
}

  const tp=total>0?(thresh/total)*100:50.1;const passed=fv>=thresh;
  return <div>
    <div style={{height:18,background:C.s1,borderRadius:3,overflow:"hidden",display:"flex",border:`1px solid ${C.border}`,position:"relative"}}>
      <div style={{width:pf+"%",background:"#1a4a1a",flexShrink:0}}/>

function LegalBillPipeline({bill}){
  const bt=BK_BILL_TYPES[bill.type]||BK_BILL_TYPES.regular;
  const skipBH=bt.skipBH,bhOriginBill=bill.origin==="bh",bhSkipBT=bt.bhOrigin,s=bill.status;
  const stages=[];
  stages.push({key:"submitted",label:"Submitted",icon:"📝"});
  if(bill.type==="motion"){
    if(bill.origin==="bh"){stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});if(bill.motion_scope==="dual")stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});}
    else{stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});if(bill.motion_scope==="dual")stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});}
    stages.push({key:"motion_passed",label:"Passed",icon:"✋"});
  } else if(bhOriginBill){
    stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
    if(!bhSkipBT)stages.push({key:"bt_voting",label:"BT Vote",icon:"🗳"});
  } else {
    stages.push({key:"docket",label:"Docket",icon:"📋"});
    stages.push({key:"bt_voting",label:"BT Vote",icon:"🗳"});
    if(!skipBH)stages.push({key:"bh_voting",label:"BH Vote",icon:"⚜"});
  }
  if(bill.type!=="motion"){stages.push({key:"emperor",label:"Emperor",icon:"👑"});stages.push({key:"passed",label:"Law",icon:"✅"});}
  const stageKey=(()=>{
    if(["pending_emperor"].includes(s))return "submitted";
    if(s==="pending_bh")return "submitted";
    if(s==="pending")return bhOriginBill?"bt_voting":"submitted";
    if(s==="docket")return "docket";if(s==="bt_voting")return "bt_voting";
    if(s==="bh_voting")return "bh_voting";
    if(["ratification","returned"].includes(s))return "emperor";
    if(s==="passed")return "passed";if(s==="motion_passed")return "motion_passed";
    return null;
  })();
  const stageIdx=stages.findIndex(st=>st.key===stageKey);
  const failed=["failed_bt","failed_bh","vetoed","repealed","motion_failed"].includes(s);
  return <div style={{marginBottom:"0.85rem",padding:"0.65rem 0.85rem",background:C.s1,borderRadius:3,border:`1px solid ${C.border}`}}>
    <div className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>Bill Progress</div>
    <div style={{display:"flex",alignItems:"center",flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
      {stages.map((stage,i)=>{
        const done=stageIdx>i||s==="passed";const active=stageIdx===i&&!failed;
        const color=done?"#5aaa5a":active?(s==="returned"&&stage.key==="emperor"?"#f0a050":"#4a88ff"):C.textDD;
        return <React.Fragment key={stage.key}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,minWidth:48}}>
            <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
              background:done?"#0a1e0a":active?(s==="returned"&&stage.key==="emperor"?"#1e1000":"#000c1e"):"transparent",
              border:`2px solid ${color}`,fontSize:11,marginBottom:2,boxShadow:active?`0 0 6px ${color}44`:"none"}}>
              {done?"\u2713":stage.icon}
            </div>
            <div className="mono" style={{fontSize:7,color,letterSpacing:"0.04em",textAlign:"center",lineHeight:1.2,maxWidth:46}}>{stage.label}</div>
          </div>
          {i<stages.length-1&&<div style={{flex:1,height:2,minWidth:6,maxWidth:28,
            background:done?"#2a6a2a":C.border,marginBottom:14,flexShrink:1}}/>}
        </React.Fragment>;
      })}
      {failed&&<div style={{marginLeft:8,fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.1em",marginBottom:14,flexShrink:0}}>
        {s==="failed_bt"?"\u2717 Failed BT":s==="failed_bh"?"\u2717 Failed BH":s==="vetoed"?"\uD83D\uDEAB Vetoed":s==="repealed"?"\uD83D\uDEAB Repealed":"\u2717 Failed"}
      </div>}
    </div>
  </div>;
}

  const finalBorder=isCourtRepealed?`1px solid #8b1a1a55`:isConstitution?`1px solid #c8a87055`:isDecree?`1px solid #8b1a4a44`:`1px solid ${C.border}`;

  return <div className="fadeIn" style={{background:finalBg,border:finalBorder,borderLeft:finalBorderL,

    {isConstitution&&<div style={{background:"linear-gradient(135deg,#1e1600,#140e00)",borderBottom:`1px solid ${C.gold}33`,padding:"3px 10px",display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:12}}>📜</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:"0.3em",color:C.gold,textTransform:"uppercase"}}>Imperial Constitution of the Empire of Lech</span>

// ── LEGAL CODE TAB ────────────────────────────────────────────────────────────
function LegalCodeTab({statutes,bills,cases,members,bundesherren}){
  const [section,setSection]=useState("acts");
  const [statusFilter,setStatusFilter]=useState("all");
  const [catFilter,setCatFilter]=useState("all");
  const [inForce,setInForce]=useState("force");
  const [search,setSearch]=useState("");

  const casesByStatute=useMemo(()=>{
    const m={};
    Object.values(cases||{}).forEach(c=>{if(c.contestedStatute)m[c.contestedStatute]=(m[c.contestedStatute]||0)+1;});
    return m;
  },[cases]);

  const courtRepeals=useMemo(()=>{
    const m={};
    Object.values(statutes||{}).forEach(s=>{
      if(s.src==="court_repeal"){if(s.repealOf)m[s.repealOf]=s;if(s.repealOfTitle)m[s.repealOfTitle]=s;}
    });
    return m;
  },[statutes]);

  const modsMap=useMemo(()=>{
    const m={};
    Object.values(statutes||{}).forEach(s=>{if(s.modifies){if(!m[s.modifies])m[s.modifies]=[];m[s.modifies].push(s);}});
    return m;
  },[statutes]);

  // ── Bundeskongress acts (laws only) ─────────────────────────────────────────
  const SKIP_TYPES=new Set(["motion","appoint_bt_pres","appoint_chancellor","appoint_bh_pres","nominate_minister","dissolve_government"]);
  const bkActs=useMemo(()=>{
    return Object.values(bills||{}).filter(b=>{
      if(!["passed","grandfathered","decree","repealed","failed_bt","failed_bh","vetoed","pulled"].includes(b.status)) return false;
      if(SKIP_TYPES.has(b.type)) return false;
      const title=(b.title||"").trim();
      if(/^(nomination|appointment) of/i.test(title)) return false;
      return true;
    }).map(b=>{
      const bkId="bk_"+b.id;
      const cr=courtRepeals[bkId]||courtRepeals[b.title||""];
      return {...b,_isCourtRepealed:!!cr,_courtRepealRecord:cr||null};
    }).filter(b=>{
      const q=search.trim().toLowerCase();
      const mQ=!q||b.title?.toLowerCase().includes(q)||b.submitter?.toLowerCase().includes(q);
      if(!mQ) return false;
      const isRepealed=b.status==="repealed"||b._isCourtRepealed;
      const isPassed=b.status==="passed"||b.status==="grandfathered";
      const isDecree=b.status==="decree";
      const isFailed=["failed_bt","failed_bh","vetoed","pulled"].includes(b.status);
      if(statusFilter==="passed")return isPassed&&!isRepealed;
      if(statusFilter==="decree")return isDecree;
      if(statusFilter==="repealed")return isRepealed;
      if(statusFilter==="failed")return isFailed;
      if(statusFilter==="constitutional")return b.type==="constitutional_amendment";
      // "all" — show everything
      return true;
    }).filter(b=>{
      if(catFilter==="all") return true;
      if(catFilter==="constitutional") return b.type==="constitutional_amendment";
      return b.category===catFilter;
    }).sort((a,b)=>(b.ratified_at||b.passed_at||b.created||0)-(a.ratified_at||a.passed_at||a.created||0));
  },[bills,search,statusFilter,catFilter,courtRepeals]);

  // ── Judicial statutes (custom, non-meta) ────────────────────────────────────
  const judicialStatutes=useMemo(()=>{
    return Object.values(statutes||{}).filter(s=>s.src!=="court_repeal"&&!s.modifies)
      .filter(s=>{
        const q=search.trim().toLowerCase();
        const mQ=!q||s.title?.toLowerCase().includes(q);
        const mF=inForce==="all"||(inForce==="force"&&!s.repealed)||(inForce==="repealed"&&s.repealed);
        return mQ&&mF;
      }).sort((a,b)=>{
        if(!a.repealed&&b.repealed)return -1;if(a.repealed&&!b.repealed)return 1;
        return (a.title||"").localeCompare(b.title||"");
      });
  },[statutes,search,inForce]);

  const STATUS_OPTS=[
    {v:"all",l:"All"},
    {v:"passed",l:"Passed — In Force"},
    {v:"constitutional",l:"Constitutional"},

// ── PANEL AUTH ────────────────────────────────────────────────────────────────
function PanelAuth({onAuth,onCancel}){
  const [username,setUsername]=useState("");const [password,setPassword]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function doAuth(){
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true);setErr("");
    try{
      const raw=await sgetAll();const accounts={};
      Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v)accounts[v.username]=v;});
      Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(!accounts[k])accounts[k]=v;});
      const user=Object.values(accounts).find(a=>a.username.toLowerCase()===username.trim().toLowerCase());
      if(!user){setErr("ACCESS DENIED.");setLoading(false);return;}
      const hash=await sha256(password);
      if(hash!==user.passwordHash){setErr("ACCESS DENIED.");setLoading(false);return;}
      const hasAccess=user.role==="emperor"||user.ijAccess==="judge"||user.ijAccess==="president";
      if(!hasAccess){setErr("AUTHORISATION DENIED \u2014 Judicial access not granted.");setLoading(false);return;}
      onAuth(user,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  }
  return <div style={{maxWidth:420,margin:"0 auto"}}>
    <STitle>Judicial Panel Authentication</STitle>
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.silver}`,padding:"1.75rem"}}>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.8,marginBottom:"1.25rem",textAlign:"center"}}>
        Restricted to judicial officers of the Empire. Authenticate using your Imperial Intranet credentials.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
        <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:"#1a0808",border:`1px solid ${C.redD}44`,padding:"7px 12px"}}>{err}</div>}
        <Btn onClick={doAuth} disabled={loading||!username.trim()||!password.trim()}>{loading?"Authenticating...":"Authenticate"}</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

        appealOf:c.id,contestedStatute:c.contestedStatute||null,contestedStatuteTitle:c.contestedStatuteTitle||null};
      const updatedCases={...allCases,[ccId]:ccCase};

        <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:6,letterSpacing:"0.1em"}}>SCHEDULE HEARING — saves with assignment, does not change status</div>
        <HearingScheduler hearingDate={hearingDate} setHearingDate={setHearingDate} hearingTime={hearingTime} setHearingTime={setHearingTime} hearingTz={hearingTz} setHearingTz={setHearingTz}/>
      </div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:"0.75rem"}}>
        <Btn small variant="gold" disabled={saving} onClick={savePresiding}>{saving?"Saving...":"Save Assignment"}</Btn>
        <ArmBtn small label="Strike Case" confirmLabel="Strike from record?" onConfirm={async()=>{
          setProcessing("Removing..."); await onAction("deleteCase",{id:c.id});
          setProcessing(null); notify(c.number+" struck from record.",C.textD);
        }}/>
      </div>
      {isEmperor&&["decided","dismissed","final_upheld","final_overturned"].includes(c.status)&&
        <OverrulePanel caseData={c} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {/* Pipeline actions */}
      {pipeline.next.length>0&&<div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem"}}>
        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:8}}>AVAILABLE ACTIONS</div>
        {c.status==="active"&&pipeline.next.includes("hearing")&&!hearingDate&&<div style={{marginBottom:"0.65rem"}}><Disclaimer type="warning">Set a hearing date in the scheduler above before advancing to Before the Court.</Disclaimer></div>}
        {pendingNext&&<div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1rem",marginBottom:"0.75rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,marginBottom:6}}>
            Confirm: Move to <strong>{(CASE_PIPELINE[pendingNext]||{label:pendingNext}).label}</strong>?
          </div>
          {pipeline.nextWarnings?.[pendingNext]&&<Disclaimer type="warning">{pipeline.nextWarnings[pendingNext]}</Disclaimer>}
          <div style={{display:"flex",gap:8,marginTop:"0.75rem"}}>
            <Btn small onClick={()=>moveStatus(pendingNext)}>Confirm</Btn>
            <Btn small variant="ghost" onClick={()=>setPendingNext(null)}>Cancel</Btn>
          </div>
        </div>}
        {!pendingNext&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {pipeline.next.map(ns=>{
            const nDef=CASE_PIPELINE[ns]||{};
            const isDestructive=ns==="dismissed"||ns==="withdrawn";
            const isAppeal=ns==="appealed";
            return <Btn key={ns} small variant={isDestructive?"danger":isAppeal?"gold":"primary"}
              onClick={()=>setPendingNext(ns)}>
              {(pipeline.nextLabels||{})[ns]||nDef.label}
            </Btn>;
          })}
        </div>}
        {pipeline.requiresJudgment&&<div style={{marginTop:"0.5rem"}}>
          <Disclaimer type="info">
            This case is under deliberation. A formal judgment must be rendered to advance it. Click below to go to the Render Judgment tab.
          </Disclaimer>
          <div style={{marginTop:8}}><Btn small onClick={()=>onGotoJudgments()}>Go to Render Judgment →</Btn></div>
        </div>}
      </div>}
    </div>}
  </div>;
}

// ── JUDGMENT PANEL ────────────────────────────────────────────────────────────

function JudgmentTitleBuilder({onChange,selCase,jType,setJType}){
  const [subject,setSubject]=useState("");
  const jTypeDef=JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0];
  // Title template is determined by instrument type — the only allowed template for this type
  const tplDef=JUDGMENT_TITLE_TEMPLATES.find(t=>(t.allowedFor||[]).includes(jType))||JUDGMENT_TITLE_TEMPLATES[0];
  const caseTitle=selCase?selCase.title:"[Case Title]";
  const needsSubject=tplDef.needsSubject||false;
  const preview=needsSubject?(subject.trim()?tplDef.build(subject.trim()):""):tplDef.build(caseTitle);

  // When instrument type changes, reset subject and push new title
  function handleTypeChange(v){
    setJType(v);setSubject("");
    const newTpl=JUDGMENT_TITLE_TEMPLATES.find(t=>(t.allowedFor||[]).includes(v))||JUDGMENT_TITLE_TEMPLATES[0];
    if(!newTpl.needsSubject) onChange(newTpl.build(caseTitle)); else onChange("");
  }
  function handleSubjectChange(v){
    setSubject(v);onChange(v.trim()?tplDef.build(v.trim()):"");
  }
  // On mount: push initial title for default type
  React.useEffect(()=>{
    if(!needsSubject) onChange(tplDef.build(caseTitle));
  },[]);

  return <div>
    <FL>INSTRUMENT TYPE *</FL>
    <div style={{marginBottom:"0.85rem"}}>
      <DescSelect value={jType} onChange={handleTypeChange} options={JUDGMENT_TYPES} cols={2}/>
      {!jTypeDef.disposes&&<Disclaimer type="warning">
        <strong>{jTypeDef.l}</strong> — this instrument does not close the case. Proceedings continue after it is recorded. The case must later receive a <strong>Judgment</strong> or <strong>Order of Dismissal</strong> to be closed.
      </Disclaimer>}
    </div>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"0.85rem",display:"flex",flexDirection:"column",gap:"0.65rem"}}>
      <div className="mono" style={{fontSize:8,color:C.textDD}}>TITLE (auto-generated from instrument type)</div>
      {needsSubject&&<div>
        <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>SUBJECT *</div>
        <Inp value={subject} onChange={handleSubjectChange} placeholder="e.g. the admissibility of the evidence tendered on 12 March"/>
      </div>}
      <div style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:2,
        padding:"6px 12px",fontFamily:"'Cinzel',serif",fontSize:13,
        color:preview?C.silver:C.textDD,fontStyle:preview?"normal":"italic"}}>
        {preview?<>Preview: {preview}</>:"Enter a subject above to generate the title."}
      </div>
    </div>
  </div>;
}
function JudgmentPanel({cases,judgments,statutes,bills,appointments,onAction,notify,setProcessing}){
  const [caseId,setCaseId]=useState("");
  const [title,setTitle]=useState("");const [jType,setJType]=useState("judgment");
  const jTypeDef0=JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0];
  const eligibleStatuses=jTypeDef0.disposes?["deliberating"]:["active","hearing","deliberating"];
  const eligible=Object.values(cases||{}).filter(c=>eligibleStatuses.includes(c.status));
  React.useEffect(()=>{
    const jtd=JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0];
    const es=jtd.disposes?["deliberating"]:["active","hearing","deliberating"];
    if(caseId&&!es.includes(cases?.[caseId]?.status)) setCaseId("");
  },[jType]);
  const [summary,setSummary]=useState("");const [outcome,setOutcome]=useState("");
  const [statuteAction,setStatuteAction]=useState("none");const [statuteTarget,setStatuteTarget]=useState("");
  const [newStatuteTitle,setNewStatuteTitle]=useState("");const [newStatuteCat,setNewStatuteCat]=useState("other");
  const [newStatuteBody,setNewStatuteBody]=useState("");const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const selCase=caseId?cases?.[caseId]:null;
  const isAppeal=selCase?.appealOf!=null;
  const outcomes=isAppeal?APPEAL_OUTCOMES:JUDGMENT_OUTCOMES;
  const outDef=outcomes.find(o=>o.v===outcome)||null;
  const canTriggerStatute=outcome==="in_favor_complainant"||outcome==="partial"||outcome==="appeal_upheld";
  const allStatutes=useMemo(()=>{
    const NON_LAW=["motion","decree","appointment","resolution","nomination","vote","procedural"];
    const list=Object.values(statutes||{}).filter(s=>!s.repealed).map(s=>({...s,src:"custom"}));
    Object.values(bills||{}).forEach(b=>{
      if(b.status!=="passed"&&b.status!=="grandfathered") return;
      if(NON_LAW.includes((b.type||"").toLowerCase())) return;
      if(/^(nomination|appointment) of/i.test(b.title||"")) return;
      list.push({id:"bk_"+b.id,title:b.title,src:"bundeskongress"});
    });
    return list.sort((a,b)=>(a.title||"").localeCompare(b.title||""));
  },[statutes,bills]);
  async function renderJudgment(){
    setSaving(true);setProcessing("Recording judgment...");
    const jId="jdg_"+uid();const now=Date.now();
    const jTypeDef=JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0];
    const presidingNames=(selCase.presiding||[]).map(pid=>{const ap=Object.values(appointments||{}).find(a=>a.id===pid);return ap?ap.name:pid;});
    // Only advance case status if this instrument disposes of the case
    let newStatus=selCase.status; // default: no change
    if(jTypeDef.disposes){
      newStatus="decided";
      if(outcome==="dismiss_on_merits") newStatus="dismissed";
      if(outcome==="order_dismissal"||jType==="order_dismissal") newStatus="dismissed";
      if(outcome==="appeal_upheld") newStatus="final_overturned";
      if(outcome==="appeal_denied") newStatus="final_upheld";
    }
    const hist=newStatus!==selCase.status?[...(selCase.statusHistory||[]),{status:newStatus,at:now}]:(selCase.statusHistory||[]);
    // If this appeal overturns an original, update original too
    let extraUpdates={};
    if(isAppeal&&selCase.appealOf){
      const orig=cases?.[selCase.appealOf];
      if(orig){
        const origNewStatus=outcome==="appeal_upheld"?"final_overturned":"final_upheld";
        const origHist=[...(orig.statusHistory||[]),{status:origNewStatus,at:now}];
        extraUpdates[orig.id]={...orig,status:origNewStatus,statusHistory:origHist};
      }
    }
    // Statute action
    let statuteEffect=null;
    let statutesWereModified=false;
    if(canTriggerStatute&&statuteAction!=="none"){
      if(statuteAction==="repeal"&&statuteTarget){
        const st=allStatutes.find(s=>s.id===statuteTarget);
        if(st){
          if(st.src==="bundeskongress"){
            // BK bills live on a different sheet — write a court_repeal marker into ij_statutes
            const sid="repeal_"+uid();
            extraUpdates["new_statute_"+sid]={id:sid,title:"[REPEALED] "+st.title,
              cat:"other",body:"",enacted:now,src:"court_repeal",
              caseRef:selCase.number,caseTitle:selCase.title,caseId:selCase.id,judgmentId:jId,
              repealed:false,repealOf:st.id,repealOfTitle:st.title,
              presidingIds:selCase.presiding||[],presidingNames:presidingNames};
          } else {
            // Update the existing custom statute record in-place
            extraUpdates["statute_"+statuteTarget]={...st,
              repealed:true,repealedAt:now,
              repealedRef:selCase.number,repealedCaseTitle:selCase.title,
              presidingIds:selCase.presiding||[],presidingNames:presidingNames};
          }
          statuteEffect={action:"repeal",statuteId:statuteTarget,title:st.title};
          statutesWereModified=true;
        }
      } else if(statuteAction==="create"&&newStatuteTitle.trim()){
        const sid="stat_"+uid();
        extraUpdates["new_statute_"+sid]={id:sid,title:newStatuteTitle.trim(),cat:newStatuteCat,
          body:newStatuteBody.trim(),enacted:now,src:"custom",
          caseRef:selCase.number,caseTitle:selCase.title,caseId:selCase.id,judgmentId:jId,
          presidingIds:selCase.presiding||[],presidingNames:presidingNames,
          repealed:false};
        statuteEffect={action:"create",title:newStatuteTitle.trim()};
        statutesWereModified=true;
      } else if(statuteAction==="modify"&&statuteTarget){
        const st=allStatutes.find(s=>s.id===statuteTarget);
        if(st){
          const sid="stat_"+uid();
          extraUpdates["new_statute_"+sid]={id:sid,
            title:"Modification of: "+st.title,
            cat:st.cat||"other",
            body:newStatuteBody.trim()||"(No modification text provided.)",
            enacted:now,src:"custom",
            caseRef:selCase.number,caseTitle:selCase.title,caseId:selCase.id,judgmentId:jId,
            presidingIds:selCase.presiding||[],presidingNames:presidingNames,
            repealed:false,modifies:statuteTarget,modifiesTitle:st.title};
          statuteEffect={action:"modify",statuteId:statuteTarget,title:st.title};
          statutesWereModified=true;
        }
      }
    }
    await onAction("renderJudgment",{
      judgment:{id:jId,caseId,title:title.trim(),type:jType,summary:summary.trim(),outcome,
        date:now,statuteEffect},
      caseUpdate:{id:caseId,status:newStatus,statusHistory:hist},
      extraUpdates,
    });
    setProcessing(null);setSaving(false);setDone(true);
    notify("Judgment recorded.",C.accent);
  }
  if(done) return <div style={{maxWidth:480}}>
    <div style={{background:C.s1,border:"1px solid #1e3e5a",borderLeft:"4px solid #4a7acc",
      borderRadius:"0 3px 3px 0",padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.blueL,marginBottom:6}}>{"✓ Judgment Recorded"}</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>The case status has been updated automatically.</div>
    </div>
    <Btn variant="ghost" onClick={()=>{setDone(false);setCaseId("");setTitle("");setSummary("");setOutcome("");setStatuteAction("none");setStatuteTarget("");setNewStatuteTitle("");setNewStatuteBody("");}}>Render Another Judgment</Btn>
  </div>;
  return <div>
    <STitle>Render Judgment</STitle>
    {eligible.length===0&&<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem"}}>
      <div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>{jTypeDef0.disposes?"No cases are currently under deliberation.":"No cases are currently active, before the court, or under deliberation."}</div>
      <Disclaimer type="info">{jTypeDef0.disposes?"Only cases in the \"Under Deliberation\" status can receive a Judgment or Order of Dismissal. Advance a case to deliberation from the Cases tab first.":"Rulings, Court Orders, and Advisory Opinions can be issued against cases that are Active, Before the Court, or Under Deliberation."}</Disclaimer>
    </div>}
    {eligible.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
      <div>
        <FL>SELECT CASE *</FL>
        <DD value={caseId} onChange={setCaseId} options={[{v:"",l:"-- Select a case --"},...eligible.map(c=>({v:c.id,l:c.number+" \u2014 "+c.title}))]}/>
        {selCase&&<div style={{marginTop:4,background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",display:"flex",gap:10,alignItems:"center"}}>
          <CourtBadge court={selCase.court}/>
          <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{selCase.parties}</span>
          {isAppeal&&<span className="mono" style={{fontSize:8,color:"#cc6a10"}}>APPEAL CASE</span>}
        </div>}
      </div>
      {selCase&&<>
        <JudgmentTitleBuilder onChange={setTitle} selCase={selCase} jType={jType} setJType={setJType}/>
        {(()=>{
          const jtd=JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0];
          if(!jtd.disposes) return <Disclaimer type="info">
            A <strong>{jtd.l}</strong> does not dispose of the case — no outcome is required. The instrument is recorded and the case remains open for further proceedings.
          </Disclaimer>;
          return <div>
            <FL>OUTCOME *</FL>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {outcomes.map(o=><div key={o.v} onClick={()=>setOutcome(o.v)}
                style={{display:"flex",gap:8,padding:"0.65rem",cursor:"pointer",
                  background:outcome===o.v?C.s2:C.s1,
                  border:`1px solid ${outcome===o.v?C.accent:C.border}`,borderRadius:2}}>
                <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${outcome===o.v?C.accent:C.textDD}`,
                  background:outcome===o.v?C.accent:"transparent",flexShrink:0,marginTop:2}}/>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:outcome===o.v?C.text:C.textD,marginBottom:2}}>{o.l}</div>
                  <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",lineHeight:1.5}}>{o.desc}</div>
                </div>
              </div>)}
            </div>
          </div>;
        })()}
        <div><FL>GROUNDS / SUMMARY *</FL><TA value={summary} onChange={setSummary} placeholder="Full reasoning of the court..." rows={5}/></div>
        {/* Statute action — only when outcome warrants */}
        {canTriggerStatute&&<div style={{background:C.s2,border:`1px solid ${C.gold}33`,borderTop:`2px solid ${C.gold}66`,borderRadius:"0 0 3px 3px",padding:"1rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.gold,marginBottom:"0.75rem"}}>LEGAL CODE ACTION</div>
          <Disclaimer type="warning">
            The selected outcome may affect the Imperial Legal Code. Select an action below. If you select "No Statute Action", the legal code is unchanged — the judgment stands but no law is created or repealed.
          </Disclaimer>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:"0.75rem"}}>
            {STATUTE_ACTIONS.map(a=><div key={a.v} onClick={()=>setStatuteAction(a.v)}
              style={{display:"flex",gap:8,padding:"0.65rem",cursor:"pointer",
                background:statuteAction===a.v?C.s1:"transparent",
                border:`1px solid ${statuteAction===a.v?C.gold:C.border}`,borderRadius:2}}>
              <div style={{width:14,height:14,borderRadius:2,border:`2px solid ${statuteAction===a.v?C.gold:C.textDD}`,
                background:statuteAction===a.v?C.goldD:"transparent",flexShrink:0,marginTop:2}}/>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:statuteAction===a.v?C.gold:C.textD,marginBottom:2}}>{a.l}</div>
                <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",lineHeight:1.5}}>{a.desc}</div>
              </div>
            </div>)}
          </div>
          {statuteAction==="repeal"&&<div style={{marginTop:"0.75rem"}}>
            <FL>SELECT STATUTE TO REPEAL *</FL>
            <DD value={statuteTarget} onChange={setStatuteTarget} options={[{v:"",l:"-- Select statute --"},...allStatutes.map(s=>({v:s.id,l:s.title}))]}/>
            <Disclaimer type="danger">Repealing a statute permanently removes it from force. This cannot be undone except by a new enactment or a successful appeal that overturns this judgment.</Disclaimer>
          </div>}
          {statuteAction==="modify"&&<div style={{marginTop:"0.75rem",display:"flex",flexDirection:"column",gap:"0.65rem"}}>
            <FL>SELECT STATUTE BEING MODIFIED *</FL>
            <DD value={statuteTarget} onChange={setStatuteTarget} options={[{v:"",l:"-- Select statute --"},...allStatutes.map(s=>({v:s.id,l:s.title}))]}/>
            <Disclaimer type="info">A modification record will be created and linked to this statute and case. The original text is preserved — the modification records the change in interpretation or scope.</Disclaimer>
            <div><FL>MODIFICATION TEXT</FL><TA value={newStatuteBody} onChange={setNewStatuteBody} placeholder="Describe precisely what aspect of the statute has been modified, restricted, or expanded by this judgment..." rows={3}/></div>
          </div>}
          {statuteAction==="create"&&<div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginTop:"0.75rem"}}>
            <Disclaimer type="info">A new statute will be created and linked to this case and judgment. It will immediately appear in the Legal Code as "In Force".</Disclaimer>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:180}}><FL>STATUTE TITLE *</FL><Inp value={newStatuteTitle} onChange={setNewStatuteTitle} placeholder="Title of the new statute"/></div>
              <div style={{flex:1,minWidth:160}}><FL>CATEGORY</FL><DD value={newStatuteCat} onChange={setNewStatuteCat} options={STATUTE_CATS.map(c=>({v:c.v,l:c.l}))}/></div>
            </div>
            <div><FL>STATUTE TEXT</FL><TA value={newStatuteBody} onChange={setNewStatuteBody} placeholder="Full text of the statute..." rows={4}/></div>
          </div>}
        </div>}
        <Btn full disabled={!title.trim()||((JUDGMENT_TYPES.find(t=>t.v===jType)||JUDGMENT_TYPES[0]).disposes&&!outcome)||!summary.trim()||saving
          ||(canTriggerStatute&&statuteAction==="repeal"&&!statuteTarget)
          ||(canTriggerStatute&&statuteAction==="create"&&!newStatuteTitle.trim())
          ||(canTriggerStatute&&statuteAction==="modify"&&!statuteTarget)}
          onClick={renderJudgment}>{saving?"Recording...":"Record Judgment"}</Btn>
      </>}
    </div>}
    {/* Existing judgments */}
    {Object.values(judgments||{}).length>0&&<div style={{marginTop:"2rem"}}>
      <STitle>Judgment Record</STitle>
      {Object.values(judgments||{}).sort((a,b)=>(b.date||0)-(a.date||0)).map(j=>{
        const rc=cases?.[j.caseId];
        return <div key={j.id} style={{background:C.s1,border:`1px solid ${C.border}`,
          borderTop:`2px solid ${C.silver}`,borderRadius:"0 0 3px 3px",padding:"0.85rem 1rem",marginBottom:"0.5rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div className="mono" style={{fontSize:9,color:C.silverD,marginBottom:2}}>{rc?rc.number+"\u2014":""}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{j.title}</div>
            {j.outcome&&<div className="mono" style={{fontSize:8,color:C.textD,marginTop:2}}>
              {([...JUDGMENT_OUTCOMES,...APPEAL_OUTCOMES].find(o=>o.v===j.outcome)||{l:j.outcome}).l}
            </div>}
          </div>
          {j.date&&<div className="mono" style={{fontSize:9,color:C.textDD}}>
            {new Date(j.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div>}
        </div>;
      })}
    </div>}
  </div>;
}

// ── PANEL STATUTES (emperor-only free form, + view all) ───────────────────────
function PanelStatutes({statutes,cases,onAction,notify,setProcessing,isEmperor}){
  const [title,setTitle]=useState("");const [cat,setCat]=useState("other");
  const [body,setBody]=useState("");const [saving,setSaving]=useState(false);
  const list=Object.values(statutes||{}).sort((a,b)=>{
    if(!a.repealed&&b.repealed) return -1;if(a.repealed&&!b.repealed) return 1;
    return (a.title||"").localeCompare(b.title||"");
  });
  return <div>
    {isEmperor&&<><STitle>Enrol Imperial Statute</STitle>
      <Disclaimer type="info">
        Statutes normally arise from judicial judgments. Use this only for codification, consolidation, or instruments that do not originate from a court ruling — for example, foundational constitutional provisions.
      </Disclaimer>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginTop:"0.75rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            <div style={{flex:2,minWidth:200}}><FL>STATUTE TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="Title of the statute"/></div>
            <div style={{flex:1,minWidth:160}}><FL>CATEGORY</FL><DD value={cat} onChange={setCat} options={STATUTE_CATS.map(c=>({v:c.v,l:c.l}))}/></div>
          </div>
          <div><FL>TEXT</FL><TA value={body} onChange={setBody} placeholder="Full text of the statute..." rows={5}/></div>
          <Btn small disabled={!title.trim()||saving} onClick={async()=>{
            setSaving(true);setProcessing("Enrolling...");
            await onAction("createStatute",{title:title.trim(),cat,body:body.trim(),enacted:Date.now(),src:"custom",repealed:false});
            setProcessing(null);setSaving(false);notify(title+" enrolled.",C.accent);
            setTitle("");setBody("");
          }}>{saving?"Enrolling...":"Enrol Statute"}</Btn>
        </div>
      </div></>}
    <STitle>All Statutes on Record</STitle>
    {list.length===0&&<div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>No custom statutes enrolled.</div>}
    {list.map(s=><div key={s.id} style={{background:s.repealed?"transparent":C.s1,
      border:`1px solid ${s.repealed?C.border+"66":C.border}`,borderLeft:`4px solid ${s.repealed?C.textDD:C.accent}`,
      borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",opacity:s.repealed?.65:1}}>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:s.repealed?C.textD:C.text,flex:1}}>{s.title}</span>
      <span className="mono" style={{fontSize:9,color:s.repealed?C.redL:"#2a9a4a"}}>{s.repealed?"REPEALED":"IN FORCE"}</span>
      {s.caseRef&&<span className="mono" style={{fontSize:8,color:C.textDD}}>{s.caseRef}</span>}
    </div>)}
  </div>;
}

// ── PANEL APPOINTMENTS ────────────────────────────────────────────────────────
function PanelAppointments({appointments,onAction,notify,setProcessing}){
  const [name,setName]=useState("");const [role,setRole]=useState("cc_justice");
  const [since,setSince]=useState("");const [saving,setSaving]=useState(false);
  const list=Object.values(appointments||{}).sort((a,b)=>{const o={president:0,cc_justice:1,rc_justice:2};return(o[a.role]||3)-(o[b.role]||3)||(a.name||"").localeCompare(b.name||"");});
  return <div>
    <STitle>Judicial Appointments</STitle>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>APPOINT JUSTICE</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>NAME *</FL><Inp value={name} onChange={setName} placeholder="Full name"/></div>
          <div style={{flex:1,minWidth:200}}><FL>ROLE</FL><DD value={role} onChange={setRole} options={APPOINTMENT_ROLES.map(r=>({v:r.v,l:r.l}))}/></div>
          <div style={{flex:1,minWidth:120}}><FL>DATE OF APPOINTMENT</FL><Inp value={since} onChange={setSince} placeholder="e.g. 1 January 2026"/></div>
        </div>
        <Btn small disabled={!name.trim()||saving} onClick={async()=>{
          setSaving(true);setProcessing("Appointing...");
          await onAction("createAppointment",{name:name.trim(),role,since:since.trim()});
          setProcessing(null);setSaving(false);notify(name+" appointed.",C.accent);
          setName("");setSince("");
        }}>{saving?"Appointing...":"Appoint"}</Btn>
      </div>
    </div>
    {list.map(a=>{const r=APPOINTMENT_ROLES.find(x=>x.v===a.role)||APPOINTMENT_ROLES[1];const ct=COURTS.find(c=>c.v===r.court)||{color:C.silver};
      return <div key={a.id} style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${ct.color}`,
        borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,flex:1}}>{a.name}</span>
        <span style={{fontSize:12,color:ct.color,fontStyle:"italic"}}>{r.l}</span>
        {a.since&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{a.since}</span>}
        <ArmBtn small label="Remove" confirmLabel="Remove appointment?" onConfirm={async()=>{
          setProcessing("Removing...");await onAction("deleteAppointment",{id:a.id});
          setProcessing(null);notify(a.name+" removed.",C.textD);
        }}/>
      </div>;})}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("docket");
  const [raw,setRaw]=useState({});const [loaded,setLoaded]=useState(false);
  const [panelUser,setPanelUser]=useState(null);const [panelAuth,setPanelAuth]=useState(false);
  const [toast,setToast]=useState({msg:"",color:""});const [processing,setProcessing]=useState(null);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  useEffect(()=>{
    Promise.all([
      sgetAll(),
      fetch(BK_URL+"?action=getall").then(r=>r.json()).then(d=>{
        if(!d.success) return {};
        const out={};
        Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});
        return out;
      }).catch(()=>({}))
    ]).then(([moiRaw,bkRaw])=>{setRaw({...moiRaw,...bkRaw});setLoaded(true);});
  },[]);

  const cases=useMemo(()=>raw["ij_cases"]||{},[raw]);
  const judgments=useMemo(()=>raw["ij_judgments"]||{},[raw]);
  const statutes=useMemo(()=>raw["ij_statutes"]||{},[raw]);
  const appointments=useMemo(()=>raw["ij_appointments"]||{},[raw]);
  const members=useMemo(()=>raw["bk_members"]||{},[raw]);
  const bundesherren=useMemo(()=>raw["bk_bh"]||{},[raw]);
  const bills=useMemo(()=>{
    const all={};
    Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("bk_bill_")&&v)all[k]=v;});
    return all;
  },[raw]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createCase"){
      const id="case_"+uid();const next={...cases,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="updateCase"){
      const {id,...rest}=payload;const next={...cases,[id]:{...cases[id],...rest}};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="bulkUpdateCases"){
      const next={...cases,...payload.cases};
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="deleteCase"){
      const next={...cases};delete next[payload.id];
      setRaw(r=>({...r,ij_cases:next}));await sset("ij_cases",next);
    } else if(type==="renderJudgment"){
      const {judgment,caseUpdate,extraUpdates}=payload;
      const newJudgments={...judgments,[judgment.id]:judgment};
      const newCases={...cases,[caseUpdate.id]:{...cases[caseUpdate.id],...caseUpdate}};
      let newStatutes={...statutes};
      let statutesChanged=false;
      Object.entries(extraUpdates||{}).forEach(([k,v])=>{
        if(k.startsWith("statute_")){
          const sid=k.replace("statute_","");newStatutes[sid]=v;statutesChanged=true;
        } else if(k.startsWith("new_statute_")){
          const sid=k.replace("new_statute_","");newStatutes[sid]=v;statutesChanged=true;
        } else if(v&&v.id&&cases[v.id]){
          newCases[v.id]=v;
        }
      });
      setRaw(r=>({...r,ij_judgments:newJudgments,ij_cases:newCases,ij_statutes:newStatutes}));
      await sset("ij_judgments",newJudgments);
      await sset("ij_cases",newCases);
      if(statutesChanged) await sset("ij_statutes",newStatutes);
    } else if(type==="createStatute"){
      const id="stat_"+uid();const next={...statutes,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_statutes:next}));await sset("ij_statutes",next);
    } else if(type==="createAppointment"){
      const id="appt_"+uid();const next={...appointments,[id]:{...payload,id}};
      setRaw(r=>({...r,ij_appointments:next}));await sset("ij_appointments",next);
    } else if(type==="deleteAppointment"){
      const next={...appointments};delete next[payload.id];
      setRaw(r=>({...r,ij_appointments:next}));await sset("ij_appointments",next);
    }
  },[raw,cases,judgments,statutes,appointments]);

  const TABS=[{v:"docket",l:"Case Docket",icon:"📋"},{v:"code",l:"Legal Code",icon:"📖"},{v:"bench",l:"The Bench",icon:"⚖"},{v:"panel",l:"Judicial Panel",icon:"⚙"}];
  function handleTab(v){if(v==="panel"&&!panelUser){setPanelAuth(true);return;}setTab(v);setPanelAuth(false);}

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0 1.25rem"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"0.85rem 0",borderBottom:`1px solid ${C.border}`}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
            padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.5em",color:C.textDD,marginBottom:3,textTransform:"uppercase"}}>Empire of Lech</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,letterSpacing:"0.12em",color:C.text}}>Imperial Judiciary</div>
          </div>
          <div style={{width:80}}/>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>handleTab(t.v)}
            style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",
                     textTransform:"uppercase",padding:"0.65rem 1rem",background:"transparent",
                     border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,
                     borderBottom:`2px solid ${tab===t.v&&!panelAuth?C.accent:"transparent"}`,
                     color:tab===t.v&&!panelAuth?C.accent:C.textD}}>
            {t.icon}{" "}{t.l}
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"1.75rem 1.25rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem",color:C.textDD}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",animation:"pulse 1.5s infinite"}}>Loading...</div>
      </div>}
      {loaded&&panelAuth&&!panelUser&&<PanelAuth
        onAuth={(u,r)=>{setPanelUser(u);setRaw(prev=>({...prev,...r}));setPanelAuth(false);setTab("panel");notify("Authenticated.",C.accent);}}
        onCancel={()=>setPanelAuth(false)}/>}
      {loaded&&!panelAuth&&tab==="docket"&&<DocketTab cases={cases} judgments={judgments} statutes={statutes} appointments={appointments} onAction={onAction} notify={notify}/>}
      {loaded&&!panelAuth&&tab==="code"&&<LegalCodeTab statutes={statutes} bills={bills} cases={cases} members={members} bundesherren={bundesherren}/>}
      {loaded&&!panelAuth&&tab==="bench"&&<AppointmentsTab appointments={appointments}/>}
      {loaded&&!panelAuth&&tab==="panel"&&panelUser&&<JudicialPanel user={panelUser} cases={cases}
        judgments={judgments} statutes={statutes} bills={bills} appointments={appointments}
        onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&!panelAuth&&tab==="panel"&&!panelUser&&<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
        Authentication required. Click Judicial Panel to log in.
      </div>}
    </div>
    <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
      <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,
        letterSpacing:"0.15em",textAlign:"center"}}>{"Imperial Judiciary \u00B7 Empire of Lech \u00B7 Fiat Justitia"}</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
