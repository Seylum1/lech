const PROSECUTION_ROLES=APPOINTMENT_ROLES.filter(r=>r.cat==="prosecution").map(r=>r.v);
function apptRole(v){return APPOINTMENT_ROLES.find(r=>r.v===v)||APPOINTMENT_ROLES[1];}
// Derived from the role rather than written by hand, so an office without a

function apptSubtitle(v){const r=apptRole(v);return r.style?r.style+", "+r.l:r.l;}
function apptColor(v){const r=apptRole(v);if(r.cat==="prosecution")return PROSECUTION_COLOR;const ct=COURTS.find(c=>c.v===r.court);return ct?ct.color:"#a8b8cc";}
// Is this signed-in MOI account an appointed Federal Prosecutor? Returns the role value or null.
function prosecutorRank(user,appointments){
  if(!user) return null;

  const appt=Object.values(appointments||{}).find(a=>PROSECUTION_ROLES.includes(a.role)&&(a.username||"").toLowerCase()===u);
  return appt?appt.role:null;
}

async function sha256(t){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── MongoDB backend (Render API) ───────────────────────────────────────────────
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
// The account the token belongs to, cached beside it so a page paints its
// signed-in state on the first frame instead of waiting on the /api/me round
// trip. A display cache only — the server still authorises every read and write
// against the token itself — and it is reconciled the moment /api/me answers, so
// a session ended elsewhere is corrected within one page load.
const SESSION_ACC_KEY="lech_session_acc";
function saveSession(t,acc){try{if(t)localStorage.setItem(SESSION_KEY,t);if(acc)localStorage.setItem(SESSION_ACC_KEY,JSON.stringify(acc));}catch(e){}}
// The cached account, for that optimistic first paint. Adopts the stored token
// too, so the snapshot fetched on the same frame is made as the signed-in account.
function cachedAccount(){
  try{
    var t=localStorage.getItem(SESSION_KEY); if(!t) return null;
    var a=localStorage.getItem(SESSION_ACC_KEY); if(!a) return null;
    AUTH_TOKEN=t; return JSON.parse(a);
  }catch(e){ return null; }
}
// Drop the stored token locally. Never talks to the server, so a network hiccup
// can never destroy a session that is still perfectly good.
function clearSession(){try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(SESSION_ACC_KEY);}catch(e){}AUTH_TOKEN=null;}
// A deliberate sign-out: end the session on the server too. Only ever called
// from a real "Sign Out" control — never from a failed restore.
function forgetSession(){const t=AUTH_TOKEN;clearSession();try{if(t)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});}catch(e){}}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{
    // Plain query token, exactly like every other call on this page, so this is a
    // simple request with no CORS preflight.
    const r=await fetch(API+"/api/me?token="+encodeURIComponent(t));
    const d=await r.json();
    if(d&&d.ok&&d.account){saveSession(t,d.account);return d.account;}   // refresh the cache
    clearSession();return null;      // the server rejected it — genuinely stale
  }catch(e){ return null; }          // offline/blocked — keep the token, retry next page
}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}}
async function sdel(k){try{await fetch(API+"/api/unset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k})});}catch{}}
async function slogin(username,password){try{const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});const d=await r.json();if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token,d.account);return {ok:true,account:d.account};}return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};}catch(e){return {ok:false,error:"Connection error"};}}

function Btn({children,onClick,variant="primary",disabled,small,full,style:ex={}}){
  const base={fontFamily:"'Cinzel',serif",letterSpacing:"0.1em",fontWeight:700,textTransform:"uppercase",
    fontSize:small?10:11,padding:small?"4px 12px":"7px 18px",border:"1px solid",borderRadius:2,
    cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,transition:"all .15s",width:full?"100%":"auto"};
  const variants={
    primary:{background:`linear-gradient(135deg,${C.accentD},${C.accent})`,borderColor:C.accentD,color:"#fff"},
    danger: {background:"transparent",borderColor:C.redD,color:C.redL},
    armed:  {background:`linear-gradient(135deg,${C.redD},${C.red})`,borderColor:C.redD,color:"#e0c8c8"},
    ghost:  {background:"transparent",borderColor:C.border,color:C.textD},
    gold:   {background:"linear-gradient(135deg,#3a2800,#6a4a00)",borderColor:"#5a4000",color:C.gold},
  };
  const vs=variants[variant]||variants.primary;
  return <button onClick={disabled?undefined:onClick} style={{...base,...vs,...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,variant="danger",small}){
  const [armed,setArmed]=useState(false);const t=useRef(null);
  if(armed)return <Btn variant="armed" small={small} onClick={()=>{clearTimeout(t.current);setArmed(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>;
  return <Btn variant={variant} small={small} onClick={()=>{setArmed(true);clearTimeout(t.current);t.current=setTimeout(()=>setArmed(false),4000);}}>{label}</Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}

function DD({value,onChange,options,style:ex={}}){

function FL({children}){return <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:4}}>{children}</div>;}
function STitle({children,color=C.silver,style:ex={}}){

function Toast({msg,color}){

function Overlay({label}){

function Disclaimer({children,type="warning"}){

function StatusPill({status}){

  return <span className="mono" style={{fontSize:9,padding:"2px 8px",background:C.s1,

// ── CASE TIMELINE STEPPER ─────────────────────────────────────────────────────
function CaseTimeline({status,appealCase}){
  const stages=["filed","active","hearing","deliberating","decided"];
  const isTerminal=["withdrawn","dismissed","appealed","final_upheld","final_overturned"].includes(status);
  const curIdx=stages.indexOf(status);
  return <div style={{padding:"0.75rem 0"}}>
    <div style={{display:"flex",alignItems:"center",gap:0}}>
      {stages.map((s,i)=>{
        const def=CASE_PIPELINE[s];
        const passed=isTerminal?false:i<curIdx;
        const current=!isTerminal&&i===curIdx;
        const future=!isTerminal&&i>curIdx;
        const col=current?def.color:passed?def.color+"99":C.textDD;
        return <React.Fragment key={s}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:i===stages.length-1?0:1}}>
            <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
              background:current||passed?col:"transparent",
              border:`2px solid ${future?C.textDD:col}`,
              boxShadow:current?`0 0 8px ${col}66`:""}}/>
            <span className="mono" style={{fontSize:7,color:col,letterSpacing:"0.05em",textAlign:"center",
              whiteSpace:"nowrap",fontWeight:current?"700":"400"}}>{def.label.toUpperCase()}</span>
          </div>
          {i<stages.length-1&&<div style={{flex:1,height:1,background:passed?`${col}88`:C.border,margin:"0 2px",marginBottom:14}}/>}
        </React.Fragment>;
      })}
    </div>
    {isTerminal&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:10,height:10,borderRadius:2,background:CASE_PIPELINE[status]?.color||C.textD,flexShrink:0}}/>
      <span className="mono" style={{fontSize:8,color:CASE_PIPELINE[status]?.color||C.textD}}>
        {(CASE_PIPELINE[status]?.label||status).toUpperCase()}
        {appealCase?` \u2014 SEE ${appealCase}`:""}
      </span>
    </div>}
  </div>;
}

// ── JUSTICE SELECTOR ──────────────────────────────────────────────────────────
function JusticeSelector({value,onChange,appointments,court}){
  const eligible=Object.values(appointments||{}).filter(a=>{
    if(a.role==="president") return true;
    if(court==="constitutional") return a.role==="cc_justice";
    return a.role==="rc_justice";
  });
  const selected=value||[];
  function toggle(id){
    if(selected.includes(id)) onChange(selected.filter(x=>x!==id));
    else onChange([...selected,id]);
  }
  if(eligible.length===0) return <div className="mono" style={{fontSize:10,color:C.textDD,fontStyle:"italic"}}>No justices appointed for this court.</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {eligible.map(a=>{
      const role=APPOINTMENT_ROLES.find(r=>r.v===a.role)||APPOINTMENT_ROLES[1];
      const ct=COURTS.find(c=>c.v===role.court)||{color:C.silver};
      const sel=selected.includes(a.id);
      return <div key={a.id} onClick={()=>toggle(a.id)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer",
          background:sel?C.s2:C.s1,border:`1px solid ${sel?C.accent:C.border}`,borderRadius:2}}>
        <div style={{width:14,height:14,borderRadius:2,background:sel?C.accentD:"transparent",
          border:`2px solid ${sel?C.accent:C.border}`,display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:8,color:C.accent,flexShrink:0}}>{sel?"✓":""}</div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,flex:1}}>{a.name}</span>
        <span className="mono" style={{fontSize:8,color:ct.color}}>{role.l}</span>
      </div>;
    })}
  </div>;
}

function DocketStats({items}){

    {items.filter(Boolean).map((it,i)=>(
      <div key={i} style={{background:C.s1,border:`1px solid ${it.color}33`,borderLeft:`3px solid ${it.color}`,

        <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:it.color,lineHeight:1}}>{it.value}</div>
        <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.12em",marginTop:3}}>{it.label}</div>
      </div>
    ))}
  </div>;
}

function DocketTab({cases,judgments,statutes,appointments,user,accounts,isProsecutor,onRequireSignIn,onAction,notify}){
  const [sub,setSub]=useState("browse");
  const [courtFilter,setCourtFilter]=useState("all");
  const [statusFilter,setStatusFilter]=useState("all");
  const [search,setSearch]=useState("");

  const allCases=Object.values(cases||{});
  const liveAll=allCases.filter(c=>LIVE_STATUSES.includes(c.status));
  const archiveAll=allCases.filter(c=>!LIVE_STATUSES.includes(c.status));
  const cnt=(arr,st)=>arr.filter(c=>c.status===st).length;

  function applyFilters(pool){
    const q=search.toLowerCase();
    return pool.filter(c=>
      (!q||c.number?.toLowerCase().includes(q)||c.title?.toLowerCase().includes(q)||c.parties?.toLowerCase().includes(q))
      &&(courtFilter==="all"||c.court===courtFilter)
      &&(statusFilter==="all"||c.status===statusFilter)
    ).sort((a,b)=>(b.filed||0)-(a.filed||0));
  }
  const liveList=applyFilters(liveAll);
  const archiveList=applyFilters(archiveAll);

  const liveStatusOpts=[{v:"all",l:"All Active"},...LIVE_STATUSES.map(v=>({v,l:(CASE_PIPELINE[v]||{label:v}).label}))];
  const archiveStatusOpts=[{v:"all",l:"All Concluded"},...ARCHIVE_STATUSES.map(v=>({v,l:(CASE_PIPELINE[v]||{label:v}).label}))];

  // Reset court/status filters when switching views so a filter from one view doesn't hide the other.
  function go(v){ setSub(v); setStatusFilter("all"); setCourtFilter("all"); setSearch(""); }

  const SUBS=[["browse","Active Docket"],["archive","Archive"],["file","File a Case"],["track","Track My Case"]];

  return <div className="fadeIn">
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.5rem",flexWrap:"wrap"}}>
      {SUBS.map(([v,l])=>
        <button key={v} onClick={()=>go(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",
                   padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",position:"relative",
                   borderBottom:`2px solid ${sub===v?C.accent:"transparent"}`,color:sub===v?C.accent:C.textD}}>
          {l}
          {v==="browse"&&liveAll.length>0&&<span className="mono" style={{fontSize:8,marginLeft:6,color:C.textDD}}>{liveAll.length}</span>}
        </button>)}
    </div>

    {sub==="file"&&(user
      ?<PublicCaseForm onAction={onAction} notify={notify} statutes={statutes} cases={cases}
         user={user} accounts={accounts} isProsecutor={isProsecutor} onDone={()=>go("browse")}/>
      :<div style={{maxWidth:480,margin:"2rem auto",textAlign:"center"}}>
         <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,marginBottom:8}}>Sign in to file a case</div>
         <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
           Filing with the Imperial Judiciary requires an Imperial Intranet (MOI) account. Signing in lets the court tie your filing to your identity and pre-fills your details.
         </div>
         <Btn onClick={onRequireSignIn}>Sign In</Btn>
       </div>)}
    {sub==="track"&&<CaseTracker cases={cases} judgments={judgments} appointments={appointments}/>}

    {sub==="browse"&&<div>
      <DocketStats items={[
        {value:liveAll.length,label:"ACTIVE MATTERS",color:C.accent},
        {value:cnt(liveAll,"hearing"),label:"BEFORE THE COURT",color:"#C9A84C"},
        {value:cnt(liveAll,"deliberating"),label:"AWAITING JUDGMENT",color:"#9a6acc"},
        {value:cnt(liveAll,"appealed"),label:"ON APPEAL",color:"#cc6a10"},
        {value:archiveAll.length,label:"ARCHIVED",color:C.silverD},
      ]}/>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search case number, title, parties..."/></div>
        <div style={{flex:1,minWidth:140}}><DD value={courtFilter} onChange={setCourtFilter} options={[{v:"all",l:"All Courts"},...COURTS.map(c=>({v:c.v,l:c.l}))]}/></div>
        <div style={{flex:1,minWidth:160}}><DD value={statusFilter} onChange={setStatusFilter} options={liveStatusOpts}/></div>
      </div>
      {liveList.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
           {liveAll.length===0?"No active matters before the court.":"No active cases match your filters."}
         </div>
        :<div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          {liveList.map(c=><CaseCard key={c.id} caseData={c} judgments={judgments} cases={cases} appointments={appointments}/>)}
        </div>}
    </div>}

    {sub==="archive"&&<div>
      <Disclaimer type="info">The historical record — concluded matters that are no longer before the court: decided, dismissed, and withdrawn cases, and final judgments on appeal.</Disclaimer>
      <div style={{display:"flex",gap:"0.75rem",margin:"1.25rem 0",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search archived cases..."/></div>
        <div style={{flex:1,minWidth:140}}><DD value={courtFilter} onChange={setCourtFilter} options={[{v:"all",l:"All Courts"},...COURTS.map(c=>({v:c.v,l:c.l}))]}/></div>
        <div style={{flex:1,minWidth:160}}><DD value={statusFilter} onChange={setStatusFilter} options={archiveStatusOpts}/></div>
      </div>
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{archiveList.length} CONCLUDED CASE{archiveList.length!==1?"S":""}</div>
      {archiveList.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>
           {archiveAll.length===0?"No concluded cases yet.":"No archived cases match your filters."}
         </div>
        :<div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          {archiveList.map(c=><CaseCard key={c.id} caseData={c} judgments={judgments} cases={cases} appointments={appointments}/>)}
        </div>}
    </div>}
  </div>;
}

function CaseCard({caseData:c,judgments,cases,appointments}){
  const [open,setOpen]=useState(false);
  const ct=COURTS.find(x=>x.v===c.court)||COURTS[0];
  const caseJudgments=Object.values(judgments||{}).filter(j=>j.caseId===c.id).sort((a,b)=>(b.date||0)-(a.date||0));
  const appealCase=c.appealedBy?cases?.[c.appealedBy]||{number:c.appealedBy}:null;
  const originCase=c.appealOf?cases?.[c.appealOf]||{number:c.appealOf}:null;
  const pipelineDef=CASE_PIPELINE[c.status]||{};
  return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${ct.color}`,borderRadius:"0 3px 3px 0",overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
      <CourtBadge court={c.court}/>
      <StatusPill status={c.status}/>
      <span className="mono" style={{fontSize:9,color:C.textD}}>{c.number}</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,flex:1}}>{c.title}</span>
      {c.parties&&<span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>{c.parties}</span>}
      {appealCase&&<span className="mono" style={{fontSize:8,color:"#cc6a10"}}>ON APPEAL {"\u2192"} {appealCase.number}</span>}
      <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",background:C.s2}}>
      <CaseTimeline status={c.status} appealCase={appealCase?.number}/>
      <div style={{display:"flex",gap:"2rem",flexWrap:"wrap",marginBottom:"0.85rem",marginTop:"0.5rem"}}>
        {c.hearingDate&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:2}}>HEARING SCHEDULED</div>
          <span style={{fontSize:13,color:C.gold}}>{new Date(c.hearingDate).toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})} at {c.hearingTime} {c.hearingTz}</span></div>}
        {c.filed&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:2}}>FILED</div>
          <span style={{fontSize:13,color:C.text}}>{new Date(c.filed).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</span></div>}
        {c.type&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:2}}>TYPE</div>
          <span style={{fontSize:13,color:C.text}}>{(CASE_TYPES.find(t=>t.v===c.type)||{l:c.type}).l}</span></div>}
        {c.presiding?.length>0&&<div><div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:2}}>PRESIDING</div>
          <span style={{fontSize:13,color:C.text}}>{c.presiding.map(pid=>{const ap=Object.values(appointments||{}).find(a=>a.id===pid);return ap?ap.name:pid;}).join(", ")}</span></div>}
      </div>
      {originCase&&<div style={{background:C.s1,border:`1px solid #cc6a1044`,borderLeft:`3px solid #cc6a10`,
        borderRadius:"0 3px 3px 0",padding:"6px 10px",marginBottom:"0.75rem",fontSize:12,color:"#cc8040"}}>
        Appeal of {originCase.number} {"\u2014"} {originCase.title}
      </div>}
      {c.contestedStatuteTitle&&<div style={{background:C.s1,border:`1px solid ${C.border}`,
        borderRadius:2,padding:"6px 10px",marginBottom:"0.75rem",fontSize:12,color:C.textD}}>

          </div>;
        })}
      </div>}
    </div>}
  </div>;

// ── CASE TRACKER (public) ─────────────────────────────────────────────────────
function CaseTracker({cases,judgments,appointments}){
  const [ref,setRef]=useState("");const [found,setFound]=useState(null);const [notFound,setNotFound]=useState(false);
  function doLookup(){
    const q=ref.trim().toUpperCase();
    if(!q) return;
    const c=Object.values(cases||{}).find(x=>(x.number||"").toUpperCase()===q);
    setFound(c||null); setNotFound(!c);
  }
  return <div style={{maxWidth:540}}>
    <STitle>Track Your Case</STitle>
    <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
      Enter your case reference number to check its current status and history.
    </div>
    <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
      <Inp value={ref} onChange={setRef} placeholder="e.g. RC-2026-142" style={{flex:1}}/>
      <Btn onClick={doLookup}>Look Up</Btn>
    </div>
    {notFound&&<Disclaimer type="info">No case found with that reference number. Check the number and try again.</Disclaimer>}
    {found&&<div>
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${(CASE_PIPELINE[found.status]||{color:C.silver}).color}`,
        borderRadius:"0 0 4px 4px",padding:"1.25rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:"0.75rem"}}>
          <div>
            <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:3}}>{found.number}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:C.text}}>{found.title}</div>
            {found.parties&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginTop:2}}>{found.parties}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            <CourtBadge court={found.court}/>
            <StatusPill status={found.status}/>
          </div>
        </div>
        <CaseTimeline status={found.status}/>
        {found.presiding?.length>0&&<div style={{marginTop:"0.5rem"}}>
          <span className="mono" style={{fontSize:9,color:C.textDD}}>PRESIDING </span>
          <span style={{fontSize:13,color:C.text}}>{found.presiding.map(pid=>{const ap=Object.values(appointments||{}).find(a=>a.id===pid);return ap?ap.name:pid;}).join(", ")}</span>
        </div>}
      </div>
      {(found.statusHistory||[]).length>0&&<div style={{marginBottom:"1rem"}}>
        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:6}}>CASE HISTORY</div>
        {[...found.statusHistory].reverse().map((h,i)=><div key={i} style={{display:"flex",gap:10,
          padding:"4px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
          <span className="mono" style={{fontSize:8,color:C.textDD,minWidth:90}}>
            {new Date(h.at).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
          </span>
          <StatusPill status={h.status}/>
        </div>)}
      </div>}
      {Object.values(judgments||{}).filter(j=>j.caseId===found.id).map(j=>
        <div key={j.id} style={{background:C.s1,border:`1px solid ${C.border}`,
          borderTop:`2px solid ${C.silver}`,borderRadius:"0 0 3px 3px",padding:"0.85rem 1rem",marginBottom:"0.5rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,marginBottom:4}}>{j.title}</div>
          {j.summary&&<div style={{fontSize:13,color:C.textD,lineHeight:1.7,fontStyle:"italic"}}>{j.summary}</div>}
        </div>)}
    </div>}
  </div>;
}


// ── DESCRIBED OPTION SELECTOR ─────────────────────────────────────────────────

      style={{padding:"0.65rem 0.85rem",cursor:"pointer",borderRadius:2,

        border:`1px solid ${value===o.v?C.accent:C.border}`,
        transition:"all .12s"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:o.desc?3:0}}>
        <div style={{width:12,height:12,borderRadius:"50%",border:`2px solid ${value===o.v?C.accent:C.textDD}`,
          background:value===o.v?C.accent:"transparent",flexShrink:0}}/>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:value===o.v?C.text:C.textD,fontWeight:value===o.v?700:400}}>{o.l}</span>

// ── PUBLIC CASE FILING ────────────────────────────────────────────────────────
// Party selector: pick a registered MOI citizen from a dropdown, or tick the box to type a non-citizen's name.
function PartyPicker({value,onChange,accounts,blankLabel,placeholder}){
  const [manual,setManual]=useState(false);
  const opts=[{v:"",l:blankLabel||"— Select a registered citizen —"},
    ...((accounts||[]).map(a=>({v:a.username,l:(a.displayName?a.displayName+" ":"")+"@"+a.username})))];
  return <div>
    {manual
      ?<Inp value={value} onChange={onChange} placeholder={placeholder||"Full name of the party"}/>
      :<DD value={value} onChange={onChange} options={opts}/>}
    <div onClick={()=>{setManual(m=>!m);onChange("");}}
      style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginTop:6}}>
      <div style={{width:14,height:14,borderRadius:2,border:`2px solid ${manual?C.accent:C.border}`,
        background:manual?C.accentD:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:9,color:C.accent,flexShrink:0}}>{manual?"✓":""}</div>
      <span style={{fontSize:12,color:manual?C.text:C.textD}}>This party is not a registered citizen — enter their name manually</span>
    </div>
  </div>;
}
function YouField({user}){
  return <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"8px 12px",
    display:"flex",alignItems:"center",gap:8}}>
    <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{user.displayName||user.username}</span>
    <span className="mono" style={{fontSize:9,color:C.textDD}}>@{user.username}</span>
    <span className="mono" style={{fontSize:8,color:C.accent,marginLeft:"auto",border:`1px solid ${C.accent}44`,borderRadius:2,padding:"1px 6px"}}>YOU</span>
  </div>;
}
function PublicCaseForm({onAction,notify,statutes,cases,user,accounts,isProsecutor,onDone}){
  const me=user?(user.username||""):"";
  const [step,setStep]=useState(1);
  const [type,setType]=useState(isProsecutor?"criminal":"civil");
  const [nameA,setNameA]=useState(isProsecutor?"":me);
  const [nameB,setNameB]=useState("");
  const [subject,setSubject]=useState("");
  const [appealOfId,setAppealOfId]=useState("");
  const [contestedId,setContestedId]=useState("");
  const [summary,setSummary]=useState("");
  const [done,setDone]=useState(null);
  const [saving,setSaving]=useState(false);

  const isAppeal=type==="appeal_judgment";
  const isTreaty=type==="treaty";
  const isCrown=type==="criminal"||type==="impeachment";
  const isCivil=type==="civil";
  const isConstitutional=type==="constitutional_challenge";
  const isAdmin=type==="administrative";
  const FILER_IS_A=["civil","administrative","constitutional_challenge","treaty"];
  const filingCourt=(isAppeal||isConstitutional)?"constitutional":"regional";
  const canContest=["constitutional_challenge","civil","criminal"].includes(type);
  const appealCase=appealOfId?Object.values(cases||{}).find(x=>x.id===appealOfId):null;
  const a=nameA.trim(),b=nameB.trim(),s=subject.trim();
  const allStatutes=Object.values(statutes||{}).filter(s=>!s.repealed).sort((x,y)=>(x.title||"").localeCompare(y.title||""));

  // Build title and parties directly from type + inputs — no template picker needed
  const builtTitle=(()=>{
    switch(type){
      case "criminal":                return a?`Crown v. ${a}`:"";
      case "civil":                   return a?(b?`${a} v. ${b}`:`${a} v. The Crown`):"";
      case "administrative":          return a?`${a} v. The Crown`:"";
      case "constitutional_challenge":return a?`${a} v. The Crown`:"";
      case "impeachment":             return a?`Crown v. ${a}`:"";
      case "treaty":                  return s?`In re ${s}`:"";
      case "appeal_judgment":         return appealCase?`Appeal \u2014 ${appealCase.title}`:"";
      default:                        return a?`${a} v. The Crown`:"";
    }
  })();
  const builtParties=(()=>{
    switch(type){
      case "criminal":                return a?`The Crown v. ${a}`:"";
      case "civil":                   return a?(b?`${a} v. ${b}`:`${a} v. The Crown`):"";
      case "administrative":          return a?`${a} v. The Crown`:"";
      case "constitutional_challenge":return a?`${a} v. The Crown`:"";
      case "impeachment":             return a?`The Crown v. ${a}`:"";
      case "treaty":                  return s?(a?`${a} \u2014 re: ${s}`:`In re ${s}`):"";
      case "appeal_judgment":         return appealCase?appealCase.parties:"";
      default:                        return a?`${a} v. The Crown`:"";
    }
  })();

  function genNumber(court){
    const prefix=court==="constitutional"?"CC":"RC";const yr=new Date().getFullYear();
    const existing=new Set(Object.values(cases||{}).map(c=>c.number));
    let num,attempts=0;
    do{num=`${prefix}-${yr}-${String(Math.floor(Math.random()*900)+100).padStart(3,"0")}`;attempts++;}
    while(existing.has(num)&&attempts<50);return num;
  }
  function handleTypeChange(v){
    if((v==="criminal"||v==="impeachment")&&!isProsecutor) return; // restricted to Federal Prosecutors
    setType(v);setNameA(FILER_IS_A.includes(v)?me:"");setNameB("");setSubject("");setAppealOfId("");
  }

  const step1Valid=!isAppeal||!!appealOfId;
  const step2Valid=isAppeal||(isTreaty?!!s:!!a);
  const step3Valid=!!summary.trim();

  function StepBar(){
    const labels=["Proceedings","Parties","Grounds","Review"];
    return <div style={{display:"flex",alignItems:"center",marginBottom:"1.75rem",paddingBottom:"1.25rem",borderBottom:`1px solid ${C.border}`}}>
      {labels.map((label,i)=>{
        const n=i+1,isDone=step>n,isActive=step===n;
        const col=isDone||isActive?C.accent:C.textDD;
        return <React.Fragment key={n}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:"50%",
              background:isDone?C.accentD:isActive?C.accent:"transparent",
              border:`2px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:10,fontFamily:"'Cinzel',serif",fontWeight:700,color:isDone||isActive?"#fff":C.textDD}}>
              {isDone?"\u2713":n}
            </div>
            <span className="mono" style={{fontSize:7,color:col,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
          </div>
          {i<labels.length-1&&<div style={{flex:1,height:1,background:step>n?C.accentD:C.border,margin:"0 8px",marginBottom:18}}/>}
        </React.Fragment>;
      })}
    </div>;
  }

  if(done) return <div style={{maxWidth:500}}>
    <div style={{background:C.s1,border:"1px solid #1e3e5a",borderLeft:"4px solid #4a7acc",
      borderRadius:"0 3px 3px 0",padding:"1.5rem",marginBottom:"1rem"}}>
      <div className="mono" style={{fontSize:9,letterSpacing:"0.25em",color:C.blueL,marginBottom:8}}>CASE FILED</div>
      <div className="mono" style={{fontSize:20,color:C.silver,marginBottom:8}}>{done.number}</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,marginBottom:3}}>{done.title}</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>{done.parties}</div>
      <div style={{fontSize:13,color:C.textD,lineHeight:1.7,borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>
        {filingCourt==="constitutional"
          ?(isAppeal?"Filed to the Constitutional Court.":"Filed to the Constitutional Court. A justice will be assigned to determine admissibility.")
          :"Filed to the Regional Court. The court may elevate to the Constitutional Court if warranted."}
        {" "}Use <strong>Track My Case</strong> with the reference number above to follow progress.
      </div>
    </div>
    <Btn variant="ghost" onClick={()=>{setDone(null);setStep(1);const t=isProsecutor?"criminal":"civil";setType(t);setNameA(FILER_IS_A.includes(t)?me:"");setNameB("");setSubject("");setSummary("");setContestedId("");setAppealOfId("");}}>File Another Case</Btn>
  </div>;

  return <div style={{maxWidth:620}}>
    <StepBar/>

    {/* ── STEP 1 ── */}
    {step===1&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>STEP 1 — NATURE OF THE PROCEEDINGS</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
        {CASE_TYPES.map(ct=>{
          const sel=type===ct.v;
          const restricted=(ct.v==="criminal"||ct.v==="impeachment")&&!isProsecutor;
          return <div key={ct.v} onClick={()=>!restricted&&handleTypeChange(ct.v)}
          style={{padding:"0.75rem 1rem",cursor:restricted?"not-allowed":"pointer",borderRadius:2,display:"flex",gap:10,alignItems:"flex-start",
            background:sel?C.s2:C.s1,border:`1px solid ${sel?C.accent:C.border}`,transition:"all .12s",opacity:restricted?0.5:1}}>
          <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${sel?C.accent:C.textDD}`,
            background:sel?C.accent:"transparent",flexShrink:0,marginTop:3}}/>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:ct.desc?2:0}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:sel?C.text:C.textD,fontWeight:sel?700:400}}>{ct.l}</span>
              {restricted&&<span className="mono" style={{fontSize:8,color:PROSECUTION_COLOR,border:`1px solid ${PROSECUTION_COLOR}55`,borderRadius:2,padding:"1px 6px"}}>FEDERAL PROSECUTORS ONLY</span>}
            </div>
            {ct.desc&&<div style={{fontSize:12,color:C.textDD,lineHeight:1.5}}>{ct.desc}</div>}
          </div>
        </div>;})}
      </div>
      {isAppeal&&<div style={{marginTop:"1rem"}}>
        <FL>CASE BEING APPEALED *</FL>
        {Object.values(cases||{}).filter(c=>["decided","dismissed"].includes(c.status)).length===0
          ?<Disclaimer type="info">No decided or dismissed cases are available to appeal.</Disclaimer>
          :<><DD value={appealOfId} onChange={setAppealOfId}
            options={[{v:"",l:"\u2014 Select the case you are appealing \u2014"},
              ...Object.values(cases||{}).filter(c=>["decided","dismissed"].includes(c.status))
                .sort((a,b)=>(a.number||"").localeCompare(b.number||""))
                .map(c=>({v:c.id,l:c.number+" \u2014 "+c.title}))]}/>
          {appealCase&&<div style={{marginTop:4,background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"6px 10px",fontSize:12,color:C.textD,fontStyle:"italic"}}>
            {appealCase.parties} {"\u2014"} {(CASE_PIPELINE[appealCase.status]||{label:appealCase.status}).label}
          </div>}</>}
      </div>}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:"1.25rem"}}>
        <Btn disabled={!step1Valid} onClick={()=>setStep(isAppeal?3:2)}>Next {"\u2192"}</Btn>
      </div>
    </div>}

    {/* ── STEP 2: PARTIES ── */}
    {step===2&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>STEP 2 — PARTIES</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        {isCrown&&<>
          <Disclaimer type="info">The Crown, represented by {user.displayName||user.username} as Federal Prosecutor, is the prosecuting party. Select the individual being prosecuted, or enter a non-citizen's name.</Disclaimer>
          <div><FL>DEFENDANT *</FL>
            <PartyPicker value={nameA} onChange={setNameA} accounts={accounts} placeholder="Full name of the defendant"/>
          </div>
        </>}
        {isCivil&&<>
          <div><FL>PLAINTIFF (YOU) *</FL><YouField user={user}/></div>
          <div>
            <FL>DEFENDANT <span style={{fontStyle:"italic",color:C.textDD,fontSize:9,fontFamily:"'Crimson Text',serif",fontWeight:400,letterSpacing:0}}>(leave as The Crown to sue the government)</span></FL>
            <PartyPicker value={nameB} onChange={setNameB} accounts={accounts} blankLabel="— The Crown —" placeholder="Full name of the defendant"/>
          </div>
        </>}
        {(isAdmin||isConstitutional)&&<div>
          <FL>PETITIONER (YOU) *</FL><YouField user={user}/>
        </div>}
        {isTreaty&&<>
          <div><FL>SUBJECT MATTER *</FL>
            <Inp value={subject} onChange={setSubject} placeholder="e.g. the Lech Maritime Treaty 2024"/>
          </div>
          <div><FL>FILING PARTY (YOU)</FL><YouField user={user}/></div>
        </>}
      </div>
      {builtTitle&&<div style={{marginTop:"1.25rem",background:C.s1,border:`1px solid ${C.accent}44`,borderRadius:2,padding:"0.85rem",display:"flex",flexDirection:"column",gap:5}}>
        <div><span className="mono" style={{fontSize:8,color:C.textDD,marginRight:6}}>CASE TITLE</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.silver}}>{builtTitle}</span></div>
        {builtParties&&<div><span className="mono" style={{fontSize:8,color:C.textDD,marginRight:6}}>PARTIES</span>
          <span style={{fontSize:13,color:C.textD}}>{builtParties}</span></div>}
        <div><span className="mono" style={{fontSize:8,color:C.textDD,marginRight:6}}>COURT</span><CourtBadge court={filingCourt}/></div>
      </div>}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={()=>setStep(1)}>{"\u2190"} Back</Btn>
        <Btn disabled={!step2Valid} onClick={()=>setStep(3)}>Next {"\u2192"}</Btn>
      </div>
    </div>}

    {/* ── STEP 3: GROUNDS ── */}
    {step===3&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>STEP 3 — GROUNDS FOR FILING</div>
      <div><FL>GROUNDS *</FL>
        <TA value={summary} onChange={setSummary} rows={8}
          placeholder={"Describe the matter and the legal grounds for your filing.\n\nInclude:\n\u2022 What occurred or what decision is being challenged\n\u2022 Which law or right you believe has been violated\n\u2022 The remedy or outcome you are seeking"}/>
      </div>
      {canContest&&allStatutes.length>0&&<div style={{marginTop:"1rem"}}>
        <FL>CONTESTED STATUTE <span style={{fontStyle:"italic",color:C.textDD,fontSize:9,fontFamily:"'Crimson Text',serif",fontWeight:400,letterSpacing:0}}>(optional)</span></FL>
        <DD value={contestedId} onChange={setContestedId}
          options={[{v:"",l:"\u2014 Not contesting a specific statute \u2014"},...allStatutes.map(s=>({v:s.id,l:s.title}))]}/>
        <Disclaimer type="info">If your case challenges the validity or application of a specific statute, select it here to flag it on the docket.</Disclaimer>
      </div>}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={()=>setStep(isAppeal?1:2)}>{"\u2190"} Back</Btn>
        <Btn disabled={!step3Valid} onClick={()=>setStep(4)}>Review {"\u2192"}</Btn>
      </div>
    </div>}

    {/* ── STEP 4: REVIEW ── */}
    {step===4&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>STEP 4 — REVIEW YOUR FILING</div>
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,
        borderRadius:"0 0 4px 4px",padding:"1.25rem",marginBottom:"1rem",display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div>
          <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>CASE TITLE</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:15,color:C.text}}>{builtTitle}</div>
        </div>
        <div style={{display:"flex",gap:"2rem",flexWrap:"wrap"}}>
          {builtParties&&<div>
            <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>PARTIES</div>
            <div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{builtParties}</div>
          </div>}
          <div>
            <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>CASE TYPE</div>
            <div style={{fontSize:13,color:C.textD}}>{(CASE_TYPES.find(t=>t.v===type)||{l:type}).l}</div>
          </div>
          <div>
            <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>COURT</div>
            <CourtBadge court={filingCourt}/>
          </div>
        </div>
        {appealCase&&<div>
          <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>APPEAL OF</div>
          <div style={{fontSize:13,color:C.textD}}>{appealCase.number} {"\u2014"} {appealCase.title}</div>
        </div>}
        {contestedId&&<div>
          <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>CONTESTED STATUTE</div>
          <div style={{fontSize:13,color:C.textD}}>{allStatutes.find(s=>s.id===contestedId)?.title||contestedId}</div>
        </div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>
          <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:4}}>GROUNDS</div>
          <div style={{fontSize:13,color:C.text,lineHeight:1.75,whiteSpace:"pre-wrap",maxHeight:140,overflowY:"auto"}}>{summary}</div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
        <Btn variant="ghost" onClick={()=>setStep(3)}>{"\u2190"} Edit</Btn>
        <Btn disabled={saving} onClick={async()=>{
          setSaving(true);const number=genNumber(filingCourt);
          const contestedS=contestedId?allStatutes.find(s=>s.id===contestedId):null;
          await onAction("createCase",{number,title:builtTitle,court:filingCourt,type,parties:builtParties,
            presiding:[],summary:summary.trim(),status:"filed",filed:Date.now(),
            statusHistory:[{status:"filed",at:Date.now()}],
            contestedStatute:contestedId||null,contestedStatuteTitle:contestedS?.title||null,
            appealOf:appealOfId||null,appealOfNumber:appealCase?.number||null});
          setSaving(false);setDone({number,title:builtTitle,parties:builtParties});
          notify("Case "+number+" filed.",C.accent);
        }}>{saving?"Filing...":"File Case"}</Btn>
      </div>
    </div>}
  </div>;
}

// A vote is a historical fact and must not depend on who currently holds a seat.
// Seats come from the snapshot written on the bill when the vote was cast,
// falling back to the sitting member and then the former-members roll. Reading
// live membership alone — as this once did — silently zeroed a departed
// member's vote on every act they ever voted on. Kept in step with the same
// resolution in bundeskongress.html.
function bkResolveVoter(id,roster,former,snapshot){
  return snapshot?.[id]||roster?.[id]||former?.[id]||null;
}
function bkCalcBT(members,votes,threshold=BK_BT_THRESH,snapshot,former){
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    const s=(bkResolveVoter(id,members,former,snapshot)?.seats)||0;
    if(v==="for") f+=s; else if(v==="against") a+=s; else if(v==="abstain"||v==="absent") ab+=s;
  });
  return {for_seats:f,against_seats:a,abstain_seats:ab,passed:f>=threshold,threshold};
}
function bkCalcBH(bh,votes,snapshot,former){
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    if(!bkResolveVoter(id,bh,former,snapshot)) return;
    if(v==="for") f++; else if(v==="against") a++; else if(v==="abstain") ab++;
  });
  // The bar reflects the chamber as it was, so a later appointment cannot move it.
  const total=Math.max(Object.keys(bh||{}).length,Object.keys(votes||{}).length);
  const thresh=Math.floor(total/2)+1;
  return {for_count:f,against_count:a,abstain_count:ab,total,threshold:thresh,passed:f>=thresh};
}

function LegalVoteBar({fv,av,abv,total,thresh,isBT}){
  const pf=total>0?(fv/total)*100:0,pa=total>0?(av/total)*100:0,pab=total>0?(abv/total)*100:0;
  const tp=total>0?(thresh/total)*100:50.1;const passed=fv>=thresh;
  return <div>
    <div style={{height:18,background:C.s1,borderRadius:3,overflow:"hidden",display:"flex",border:`1px solid ${C.border}`,position:"relative"}}>
      <div style={{width:pf+"%",background:"#1a4a1a",flexShrink:0}}/>
      <div style={{width:pa+"%",background:"#4a1a1a",flexShrink:0}}/>
      <div style={{width:pab+"%",background:"#2a2a1a",flexShrink:0}}/>
      <div style={{position:"absolute",left:tp+"%",top:0,bottom:0,width:2,background:"rgba(255,255,255,.3)",zIndex:1}}/>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.08em"}}>
      <span style={{color:"#5aaa5a"}}>FOR {isBT?fv+" seats":fv}</span>
      <span style={{color:passed?"#5aaa5a":C.redL,fontWeight:700}}>{passed?"\u2713 PASSES":"NEEDS "+thresh+(isBT?" SEATS":"")}</span>
      <span style={{color:C.redL}}>AGAINST {isBT?av+" seats":av}</span>
    </div>
    {abv>0&&<div style={{fontSize:10,color:C.textDD,textAlign:"center",marginTop:1}}>{abv}{isBT?" seat abstention/absent"+(abv!==1?"s":""):" abstention"+(abv!==1?"s":"")}</div>}
  </div>;
}

function LegalBillPipeline({bill}){
  const bt=BK_BILL_TYPES[bill.type]||BK_BILL_TYPES.regular;
  const skipBH=bt.skipBH,bhOriginBill=bill.origin==="bh",bhSkipBT=bt.bhOrigin,s=bill.status;
  const stages=[];
  stages.push({key:"submitted",label:"Submitted",icon:"📝"});
  if(bill.type==="motion"){
    if(bill.origin==="bh"){stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});if(bill.motion_scope==="dual")stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});}
    else{stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});if(bill.motion_scope==="dual")stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});}
    stages.push({key:"motion_passed",label:"Passed",icon:"✋"});
  } else if(bhOriginBill){
    stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
    if(!bhSkipBT)stages.push({key:"bt_voting",label:"BT Vote",icon:"🗳"});
  } else {
    stages.push({key:"docket",label:"Docket",icon:"📋"});
    stages.push({key:"bt_voting",label:"BT Vote",icon:"🗳"});
    if(!skipBH)stages.push({key:"bh_voting",label:"BH Vote",icon:"⚜"});
  }
  if(bill.type!=="motion"){stages.push({key:"emperor",label:"Emperor",icon:"👑"});stages.push({key:"passed",label:"Law",icon:"✅"});}
  const stageKey=(()=>{
    if(["pending_emperor"].includes(s))return "submitted";
    if(s==="pending_bh")return "submitted";
    if(s==="pending")return bhOriginBill?"bt_voting":"submitted";
    if(s==="docket")return "docket";if(s==="bt_voting")return "bt_voting";
    if(s==="bh_voting")return "bh_voting";
    if(["ratification","returned"].includes(s))return "emperor";
    if(s==="passed")return "passed";if(s==="motion_passed")return "motion_passed";
    return null;
  })();
  const stageIdx=stages.findIndex(st=>st.key===stageKey);
  const failed=["failed_bt","failed_bh","vetoed","repealed","motion_failed"].includes(s);
  return <div style={{marginBottom:"0.85rem",padding:"0.65rem 0.85rem",background:C.s1,borderRadius:3,border:`1px solid ${C.border}`}}>
    <div className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>Bill Progress</div>
    <div style={{display:"flex",alignItems:"center",flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
      {stages.map((stage,i)=>{
        const done=stageIdx>i||s==="passed";const active=stageIdx===i&&!failed;
        const color=done?"#5aaa5a":active?(s==="returned"&&stage.key==="emperor"?"#f0a050":"#4a88ff"):C.textDD;
        return <React.Fragment key={stage.key}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,minWidth:48}}>
            <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
              background:done?"#0a1e0a":active?(s==="returned"&&stage.key==="emperor"?"#1e1000":"#000c1e"):"transparent",
              border:`2px solid ${color}`,fontSize:11,marginBottom:2,boxShadow:active?`0 0 6px ${color}44`:"none"}}>
              {done?"\u2713":stage.icon}
            </div>
            <div className="mono" style={{fontSize:7,color,letterSpacing:"0.04em",textAlign:"center",lineHeight:1.2,maxWidth:46}}>{stage.label}</div>
          </div>
          {i<stages.length-1&&<div style={{flex:1,height:2,minWidth:6,maxWidth:28,
            background:done?"#2a6a2a":C.border,marginBottom:14,flexShrink:1}}/>}
        </React.Fragment>;
      })}
      {failed&&<div style={{marginLeft:8,fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.1em",marginBottom:14,flexShrink:0}}>
        {s==="failed_bt"?"\u2717 Failed BT":s==="failed_bh"?"\u2717 Failed BH":s==="vetoed"?"\uD83D\uDEAB Vetoed":s==="repealed"?"\uD83D\uDEAB Repealed":"\u2717 Failed"}
      </div>}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════════════════════════
   PERSON CARD — kept identical with the block of the same name in
   bundeskongress.html. Only the adapter immediately below differs, which maps
   this page's own tables and palette onto the names the block expects. If you
   change the card, change it in both files: there is no build step here, and a
   copy that drifts is how ij.html ended up with a stale vote tally.
   ══════════════════════════════════════════════════════════════════════════ */

// ── Adapter ───────────────────────────────────────────────────────────────────
const PARTIES=BK_PARTIES;
const getParty=(id)=>BK_PARTIES.find(p=>p.id===id)||null;
const BT_SEATS_TOTAL=BK_BT_SEATS;
const STATUS_META=BK_STATUS_META;
const fmtDate=(ts)=>ts?new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";
// The peerage table here carries colours only; styles come from the Household's
// register, where the rank itself carries the gender.
const PEERAGE_STYLE={crown_prince:"His Imperial Highness",prince:"His Imperial Highness",
  princess:"Her Imperial Highness",duke:"His Grace",marquess:"The Most Honourable",
  count:"The Right Honourable",viscount:"The Right Honourable",baron:"The Honourable",
  baronet:"Sir / Dame"};
const PEERAGE_RANKS=BK_PEERAGE_RANKS.map(r=>({...r,style:PEERAGE_STYLE[r.v]||""}));
const BK_PROVINCES={newport:"Newport",cracov:"Cracov",rome:"Rome",kingsland:"Kingsland",
  aquitaine:"Aquitaine",monegasque:"Monégasque",weststadt:"Weststadt"};

// ── Identity ──────────────────────────────────────────────────────────────────
const idKey=(s)=>String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"").replace(/(.)\1+/g,"$1");
const memberKey=(u)=>"u_"+String(u||"").toLowerCase();
const bhKey=(u)=>"ub_"+String(u||"").toLowerCase();
function findSeat(roster,username,displayName){
  if(!username) return null;
  const direct=roster?.[memberKey(username)]||roster?.[bhKey(username)];
  if(direct) return direct;
  const u=String(username).toLowerCase(), d=String(displayName||"").toLowerCase();
  return Object.values(roster||{}).find(m=>
    String(m.username||"").toLowerCase()===u
    ||(!m.username&&String(m.name||"").toLowerCase()===d&&!!d))||null;
}
function identityIds(person,members,bundesherren,formerMembers){
  const ids=new Set();
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);
  (person?.aliases||[]).forEach(a=>ids.add(a));
  const rosters=[members,bundesherren,formerMembers];
  let grew=true;
  while(grew){
    grew=false;
    rosters.forEach(roster=>{
      Object.entries(roster||{}).forEach(([id,r])=>{
        if(ids.has(id)) return;
        const ru=String(r.username||"").toLowerCase();
        const rn=String(r.name||"").toLowerCase();
        const same=(u&&ru===u)||(uk&&!ru&&idKey(rn)===uk)||(n&&rn===n&&(!ru||!u))
          ||(r.aliases||[]).some(a=>ids.has(a))||(person?.aliases||[]).includes(id);
        if(same){ ids.add(id); (r.aliases||[]).forEach(a=>ids.add(a)); grew=true; }
      });
    });
  }
  if(person?.id) ids.add(person.id);
  if(u){ ids.add(memberKey(u)); ids.add(bhKey(u)); }
  return ids;
}
function votingRecord(ids,bills){
  const out=[];
  Object.values(bills||{}).forEach(b=>{
    ["bt","bh"].forEach(ch=>{
      const votes=b[ch+"_votes"]||{};
      for(const id of ids){
        if(votes[id]!==undefined){ out.push({bill:b,chamber:ch,vote:votes[id],
          when:b.ratified_at||b.failed_at||b.created||0}); break; }
      }
    });
  });
  return out.sort((a,b)=>b.when-a.when);
}
function submissionRecord(person,ids,bills){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(name,username)=>{
    const un=String(username||"").toLowerCase(), nm=String(name||"").toLowerCase();
    if(u&&un) return un===u;
    if(!nm) return false;
    return nm===n||nm===u||(!!uk&&idKey(nm)===uk);
  };
  const out=[];
  Object.values(bills||{}).forEach(b=>{
    if(isThem(b.submitter,b.submitterUsername)) out.push({bill:b,role:"submitter"});
    else if((b.cosponsors||[]).some(c=>isThem(c.name,c.username))) out.push({bill:b,role:"cosponsor"});
  });
  return out.sort((a,b)=>(b.bill.created||0)-(a.bill.created||0));
}
function serviceRecord(person,governments){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const hit=(v)=>{const s=String(v||"").toLowerCase(); return !!s&&(s===u||s===n);};
  const out=[];
  Object.values(governments||{}).forEach(g=>{
    if(g.example) return;
    const roles=[];
    if(hit(g.chancellor)) roles.push("Imperial Chancellor");
    (g.ministers||[]).forEach(m=>{ if(hit(m.name)) roles.push(m.portfolio); });
    if(roles.length) out.push({gov:g,roles});
  });
  return out.sort((a,b)=>String(b.gov.startDate||"").localeCompare(String(a.gov.startDate||"")));
}
function activityIndex(votes){
  if(!votes||votes.length===0) return null;
  const absent=votes.filter(v=>v.vote==="absent").length;
  return {pct:Math.round(((votes.length-absent)/votes.length)*100),
    attended:votes.length-absent,total:votes.length,absent};
}
function draftingRatio(votes,submissions){
  const participated=(votes||[]).filter(v=>v.vote!=="absent");
  if(participated.length===0) return null;
  const mine=new Set((submissions||[]).map(s=>s.bill.id));
  const drafted=participated.filter(v=>mine.has(v.bill.id)).length;
  return {pct:Math.round((drafted/participated.length)*100),drafted,participated:participated.length};
}
function judicialRecord(person,ctx){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(v)=>{const s=String(v||"").toLowerCase(); if(!s) return false;
    return s===u||s===n||(!!uk&&idKey(s)===uk);};
  const appts=Object.values(ctx?.ijAppointments||{}).filter(a=>isThem(a.username)||isThem(a.name));
  if(appts.length===0) return null;
  const apptIds=new Set(appts.map(a=>a.id));
  const presided=Object.values(ctx?.ijCases||{})
    .filter(c=>(c.presiding||[]).some(pid=>apptIds.has(pid)))
    .sort((a,b)=>(b.filed||0)-(a.filed||0));
  const caseIds=new Set(presided.map(c=>c.id));
  const rulings=Object.values(ctx?.ijJudgments||{}).filter(j=>caseIds.has(j.caseId))
    .sort((a,b)=>(b.date||0)-(a.date||0));
  const onBench=appts.some(a=>apptRole(a.role).cat==="bench");
  return {appts,presided,rulings,onBench};
}

// ── The register ──────────────────────────────────────────────────────────────
const STYLE_RANK={"His Imperial Majesty":100,"Her Imperial Majesty":100,
  "His Imperial Highness":90,"Her Imperial Highness":90,
  "His Serene Highness":80,"Her Serene Highness":80,
  "His Grace":70,"Her Grace":70,"The Most Honourable":60,
  "The Right Honourable":50,"The Honourable":40,"Sir / Dame":30};
const OFFICE_HONOURS=[
  {key:"emperor",     label:"Emperor",                  style:"His Imperial Majesty", suffix:""},
  {key:"chancellor",  label:"Chancellor",               style:"The Right Honourable", suffix:"MB"},
  {key:"minister",    label:"Council of Ministers",     style:"The Honourable",       suffix:"MB"},
  {key:"bt_president",label:"President of the Bundestag",style:"The Right Honourable",suffix:"MB"},
  {key:"member",      label:"Member of the Bundestag",  style:"",                     suffix:"MB"},
  {key:"ips",         label:"Imperial Private Secretary",style:"The Right Honourable",suffix:"IPS"},
];
const OFFICE=(k)=>OFFICE_HONOURS.find(o=>o.key===k);
const DECORATIONS=[
  {v:"IIC",l:"Imperial Iron Cross",why:"Highest military valor honor"},
  {v:"OBE",l:"Order of the Black Eagle",why:"Exceptional command and leadership"},
  {v:"ICV",l:"Imperial Cross of Valor",why:"Bravery in combat and active warfare"},
