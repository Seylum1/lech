];
const DECOR=(v)=>DECORATIONS.find(d=>d.v===v)||null;

function honorifics(person,ctx){
  const styles=[],suffixes=[];
  if(!person) return {prefix:null,suffixes:[],styles:[]};
  const u=String(person.username||"").toLowerCase();
  const n=String(person.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(v)=>{const s=String(v||"").toLowerCase();
    if(!s||s==="vacant") return false; return s===u||s===n||(!!uk&&idKey(s)===uk);};
  const off=ctx?.officials||{};
  const holds=(userKey,nameKey)=>{
    const stored=String(off[userKey]||"").toLowerCase();
    if(stored) return !!u&&stored===u;
    return isThem(off[nameKey]);
  };
  const bhRec=Object.values(ctx?.bundesherren||{}).find(b=>isThem(b.username)||isThem(b.name))
    ||Object.values(ctx?.formerMembers||{}).find(b=>b.rank&&(isThem(b.username)||isThem(b.name)));
  const pr=bhRec?.rank?PEERAGE_RANKS.find(r=>r.v===bhRec.rank):null;
  if(pr?.style) styles.push({style:pr.style,why:pr.l+" — a peerage, held for life"});
  if(ctx?.account?.role==="emperor"){const o=OFFICE("emperor");styles.push({style:o.style,why:o.label});}

  const seated=Object.values(ctx?.members||{}).some(m=>isThem(m.username)||isThem(m.name));
  const cur=[];
  if(holds("chancellor_username","chancellor")) cur.push(OFFICE("chancellor"));
  if(holds("president_bt_username","president_bt")) cur.push(OFFICE("bt_president"));
  Object.entries(off.ministers||{}).forEach(([p,name])=>{
    const mu=(off.minister_usernames||{})[p];
    const hit=mu?(!!u&&String(mu).toLowerCase()===u):isThem(name);
    if(hit) cur.push({...OFFICE("minister"),label:p});
  });
  if(seated) cur.push(OFFICE("member"));
  // The Bench carries a style; the Prosecution Service does not.
  Object.values(ctx?.ijAppointments||{}).forEach(a=>{
    if(!isThem(a.username)&&!isThem(a.name)) return;
    const r=apptRole(a.role);
    if(r?.style) styles.push({style:r.style,why:r.l});
  });
  cur.forEach(o=>{
    if(o.style) styles.push({style:o.style,why:o.label});
    if(o.suffix&&!suffixes.some(s=>s.code===o.suffix))
      suffixes.push({code:o.suffix,label:o.label,why:o.label,current:true});
  });
  (ctx?.pastOffices||[]).forEach(({roles})=>{
    roles.forEach(role=>{
      const r=String(role).toLowerCase();
      const o=r.includes("chancellor")?OFFICE("chancellor")
        :r.includes("president of the bundestag")?OFFICE("bt_president"):OFFICE("minister");
      if(o?.style&&!styles.some(s=>s.style===o.style&&s.why.startsWith(role)))
        styles.push({style:o.style,why:role+" (former) — the style is retained"});
    });
  });
  const seen=new Set();
  const addDecor=(code,awarded)=>{
    const d=DECOR(code); if(!d||seen.has(d.v)) return;
    seen.add(d.v);
    suffixes.push({code:d.v,label:d.l,why:d.l+" — "+d.why+(awarded?", awarded "+awarded:""),
      current:true,decoration:true,order:DECORATIONS.findIndex(x=>x.v===d.v)});
  };
  Object.values(ctx?.ihHonours||{}).forEach(h=>{
    if(!isThem(h.recipientUsername)&&!isThem(h.recipient)) return;
    addDecor(h.medal,h.awarded);
  });
  Object.values(ctx?.mowPersonnel||{}).forEach(p=>{
    if(!isThem(p.username)&&!isThem(p.name)) return;
    (p.medals||[]).forEach(m=>addDecor(m.type,m.awarded));
  });
  suffixes.sort((a,b)=>{
    if(!!a.decoration!==!!b.decoration) return a.decoration?-1:1;
    if(a.decoration) return (a.order??99)-(b.order??99);
    return 0;
  });
  styles.sort((a,b)=>(STYLE_RANK[b.style]||0)-(STYLE_RANK[a.style]||0));
  return {prefix:styles[0]||null,styles,suffixes};
}

const HonoursCtx=createContext(null);
const useHonours=()=>useContext(HonoursCtx);

// The player's Minecraft face, as their ID card carries it. Drawn from the
// account behind the record, so an unlinked entry simply shows nothing.
function mcFace(n){return "https://mc-heads.net/avatar/"+encodeURIComponent(n||"")+"/64";}
function McFace({person,size=30,style:ex={}}){
  const ctx=useHonours();
  // Records made before usernames were stored hold one in the name field, which
  // is also what the lists show — so the face follows the name on screen.
  const u=person?.username||person?.name;
  if(!u) return null;
  const acc=ctx?.accounts?.[u]||ctx?.accounts?.[String(u).toLowerCase()];
  return <img src={mcFace(acc?.mcName||u)} alt="" width={size} height={size} loading="lazy"
    onError={e=>{e.currentTarget.style.visibility="hidden";}}
    style={{width:size,height:size,borderRadius:2,imageRendering:"pixelated",
      border:`1px solid ${C.border}`,background:C.s2,flexShrink:0,...ex}}/>;
}
function honorificsFor(person,ctx){
  if(!ctx||!person) return {prefix:null,styles:[],suffixes:[]};
  return honorifics(person,{...ctx,
    account:person.username?ctx.accounts?.[person.username]:null,
    pastOffices:serviceRecord(person,ctx.governments)});
}
const FactsheetCtx=createContext(()=>{});
const useFactsheet=()=>useContext(FactsheetCtx);

const ACTIVITY_TOOLTIP=
  "Activity Index — the share of votes put to this member that they took part in. "+
  "Voting for, against or abstaining all count as taking part; only being marked "+
  "absent counts against it. A member present for 3 of 4 votes scores 75%. "+
  "It is drawn from their whole record in the chamber, not the current term.";
const DRAFTING_TOOLTIP=
  "Drafting to Voting — of the bills this member took part in, the share that were "+
  "their own: submitted by them, or drafted with them as a co-sponsor. A low figure "+
  "simply means they vote on others' bills more than they put forward their own, "+
  "which is the ordinary work of the chamber. It is not a measure of merit.";
const activityColor=(pct)=>pct>=75?"#7ad47a":pct>=50?C.gold:pct>=25?"#cc6a10":C.redL;
const SHORT_POST_NOMINAL_LIMIT=4;

function PostNominals({person,style:ex={}}){
  const ctx=useHonours();
  if(!ctx||!person) return null;
  const {suffixes}=honorificsFor(person,ctx);
  if(suffixes.length===0) return null;
  const shown=suffixes.slice(0,SHORT_POST_NOMINAL_LIMIT);
  const rest=suffixes.slice(SHORT_POST_NOMINAL_LIMIT);
  const tip=shown.map(s=>s.code+" — "+s.why).join("\n")
    +(rest.length?"\n\nAlso holds "+rest.map(s=>s.code).join(", ")
      +" — see their factsheet for the full list.":"");
  return(
    <span className="mono" title={tip}
      style={{fontSize:8,letterSpacing:"0.08em",color:C.gold,opacity:0.75,
        cursor:"help",marginLeft:5,...ex}}>
      {shown.map(s=>s.code).join(" ")}
    </span>
  );
}
function MemberLink({person,children,style:ex={}}){
  const open=useFactsheet();
  if(!person) return <span style={ex}>{children}</span>;
  return(
    <button onClick={(e)=>{e.stopPropagation();open(person);}} title="View factsheet"
      style={{background:"none",border:"none",padding:0,margin:0,font:"inherit",color:"inherit",
        cursor:"pointer",textDecoration:"underline",textDecorationColor:"transparent",
        textUnderlineOffset:3,transition:"text-decoration-color .15s",...ex}}
      onMouseEnter={e=>e.currentTarget.style.textDecorationColor="currentColor"}
      onMouseLeave={e=>e.currentTarget.style.textDecorationColor="transparent"}>
      {children}
    </button>
  );
}
function FactRow({label,children}){
  if(!children) return null;
  return(
    <div style={{display:"flex",gap:10,padding:"5px 0",borderBottom:`1px solid ${C.border}55`}}>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.15em",color:C.textDD,
        width:96,flexShrink:0,paddingTop:3,textTransform:"uppercase"}}>{label}</span>
      <div style={{flex:1,minWidth:0,fontSize:13,color:C.text}}>{children}</div>
    </div>
  );
}

function JudicialRecordPanel({judicial}){
  if(!judicial) return <div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>No judicial service.</div>;
  const {appts,presided,rulings,onBench}=judicial;
  const OUTCOME_COLOR={upheld:"#7ad47a",overturned:C.redL,dismissed:C.textD,granted:"#7ad47a",denied:C.redL};
  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:"0.85rem"}}>
        {appts.map((a,i)=>{
          const r=apptRole(a.role);
          const bench=r?.cat==="bench";
          return(
            <span key={i} title={r?.style?r.style+" — "+r.l:(r?.l||a.role)+" — this office carries no style"}
              style={{fontSize:11,cursor:"help",borderRadius:2,padding:"2px 7px",
                color:bench?C.silver:PROSECUTION_COLOR,
                border:`1px solid ${bench?C.silver+"44":PROSECUTION_COLOR+"44"}`,
                background:bench?C.s1:"#1a0c0c"}}>
              ⚖ {r?.l||a.role}{a.since?" · "+a.since:""}
            </span>
          );
        })}
      </div>
      {!onBench
        ?<div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>
          The Prosecution Service brings cases before the courts; it does not decide them,
          so no rulings are recorded against this office.
        </div>
        :<div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
            color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>
            Rulings {rulings.length>0?"— "+rulings.length:""}
          </div>
          {rulings.length===0
            ?<div style={{fontSize:13,color:C.textDD,fontStyle:"italic",marginBottom:"1rem"}}>No rulings handed down.</div>
            :<div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:2,marginBottom:"1rem"}}>
              {rulings.map((j,i)=>{
                const oc=OUTCOME_COLOR[j.outcome]||C.textD;
                return(
                  <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,
                    borderLeft:`2px solid ${oc}`,borderRadius:"0 2px 2px 0",padding:"5px 9px",
                    display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:C.text,flex:1,minWidth:120}}>{j.title}</span>
                    {j.outcome&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:oc,
                      border:`1px solid ${oc}44`,borderRadius:2,padding:"1px 6px",whiteSpace:"nowrap"}}>
                      {String(j.outcome).replace(/_/g," ").toUpperCase()}
                    </span>}
                    <span className="mono" style={{fontSize:9,color:C.textDD}}>{j.date?fmtDate(j.date):""}</span>
                  </div>
                );
              })}
            </div>
          }
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
            color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>
            Cases Presided {presided.length>0?"— "+presided.length:""}
          </div>
          {presided.length===0
            ?<div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>No cases assigned.</div>
            :<div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
              {presided.map((c,i)=>(
                <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,
                  borderRadius:2,padding:"5px 9px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:C.text,flex:1,minWidth:120}}>{c.title||"Case"}</span>
                  {c.number&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{c.number}</span>}
                  <span className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:".08em"}}>
                    {String(c.status||"").replace(/_/g," ").toUpperCase()}
                  </span>
                </div>
              ))}
            </div>
          }
        </div>
      }
    </div>
  );
}

function MemberFactsheet({person,members,bundesherren,formerMembers,officials,bills,accounts,governments,onClose}){
  const [voteTab,setVoteTab]=useState("bt");
  const honCtx=useHonours();
  if(!person) return null;
  const hon=honorificsFor(person,honCtx);
  const acc=person.username?accounts?.[person.username]:null;
  const ids=identityIds(person,members,bundesherren,formerMembers);
  const votes=votingRecord(ids,bills);
  const submissions=submissionRecord(person,ids,bills);
  const service=serviceRecord(person,governments);
  // The card can be opened from a stub — a judicial appointment, an official's
  // name in a banner — which carries no seat or party of its own. Resolve to the
  // roster record that actually holds them so the card reads the same wherever
  // it was opened from.
  const btRec=Object.values(members||{}).find(m=>ids.has(m.id))||null;
  const bhRec=Object.values(bundesherren||{}).find(b=>ids.has(b.id))||null;
  const seated=!!btRec;
  const bhSeated=!!bhRec;
  const former=Object.values(formerMembers||{}).filter(f=>ids.has(f.id));
  const rec=btRec||bhRec||former[0]||person;
  const party=getParty(person.party||rec.party);
  const region=acc?.stateOfResidency?BK_PROVINCES[acc.stateOfResidency]||acc.stateOfResidency:null;
  const rpName=[acc?.displayName,person.name].find(n=>
    n&&String(n).toLowerCase()!==String(person.username||"").toLowerCase())||null;

  const offices=[];
  const u=String(person.username||"").toLowerCase();
  if(u&&String(officials?.president_bt_username||"").toLowerCase()===u) offices.push("President of the Bundestag");
  if(u&&String(officials?.president_bh_username||"").toLowerCase()===u) offices.push("President of the Bundesherren");
  if(u&&String(officials?.chancellor_username||"").toLowerCase()===u) offices.push("Imperial Chancellor");
  Object.entries(officials?.minister_usernames||{}).forEach(([p,mu])=>{
    if(u&&String(mu||"").toLowerCase()===u) offices.push(p);
  });
  if(offices.length===0){
    const names=[person.name,person.username,acc?.displayName].filter(Boolean).map(s=>String(s).toLowerCase());
    const is=(v)=>{const s=String(v||"").toLowerCase(); return !!s&&s!=="vacant"&&names.includes(s);};
    if(is(officials?.president_bt)) offices.push("President of the Bundestag");
    if(is(officials?.president_bh)) offices.push("President of the Bundesherren");
    if(is(officials?.chancellor))   offices.push("Imperial Chancellor");
    Object.entries(officials?.ministers||{}).forEach(([p,mn])=>{ if(is(mn)) offices.push(p); });
  }

  const partyHistory=[];
  [...Object.values(members||{}),...Object.values(bundesherren||{}),...Object.values(formerMembers||{})]
    .filter(r=>ids.has(r.id))
    .forEach(r=>{ if(r.party&&!partyHistory.includes(r.party)) partyHistory.push(r.party); });

  const btVotes=votes.filter(v=>v.chamber==="bt");
  const bhVotes=votes.filter(v=>v.chamber==="bh");
  const judicial=judicialRecord(person,honCtx);
  const RECORDS=[
    ...((seated||btVotes.length>0)?[{v:"bt",l:"Bundestag History",icon:"🏛",n:btVotes.length}]:[]),
    ...((bhSeated||bhVotes.length>0)?[{v:"bh",l:"Bundesherren History",icon:"🏰",n:bhVotes.length}]:[]),
    ...(judicial?[{v:"ij",l:"Judicial Record",icon:"⚖",n:judicial.rulings.length}]:[]),
  ];
  const activeTab=RECORDS.some(r=>r.v===voteTab)?voteTab:(RECORDS[0]?.v||"bt");
  const shownVotes=activeTab==="bh"?bhVotes:activeTab==="bt"?btVotes:[];
  const activity=activityIndex(shownVotes);
  const drafting=draftingRatio(shownVotes,submissions);
  const tally={for:0,against:0,abstain:0,absent:0};
  shownVotes.forEach(v=>{ if(tally[v.vote]!==undefined) tally[v.vote]++; });

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000000dd",zIndex:300,
      display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"2rem 1rem",overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.s1,border:`1px solid ${party?.color||C.silver}55`,
        borderTop:`3px solid ${party?.color||C.silver}`,borderRadius:"0 0 4px 4px",maxWidth:620,width:"100%"}}>
        <div style={{padding:"1.25rem 1.5rem",borderBottom:`1px solid ${C.border}`,
          display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          {/* Opened from a stub the face falls back to the roster record, which
              is the one that actually carries the linked account. */}
          <McFace person={person.username?person:rec} size={56} style={{borderColor:(party?.color||C.silver)+"66"}}/>
          <div style={{flex:1,minWidth:0}}>
            {hon.prefix&&(
              <div title={hon.styles.map(s=>s.style+" — "+s.why).join("\n")}
                style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.16em",
                  color:C.gold,marginBottom:3,cursor:"help"}}>
                {hon.prefix.style.toUpperCase()}
              </div>
            )}
            <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:C.text,letterSpacing:"0.05em"}}>
              {person.username||person.name}
              <PostNominals person={person} style={{fontSize:11,opacity:1,marginLeft:8}}/>
            </div>
            {rpName&&<div style={{fontSize:14,color:C.gold,fontStyle:"italic",marginTop:2}}>{rpName}</div>}
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
              {party&&<span style={{fontSize:12,color:party.color}}>{party.name}</span>}
              {!person.username&&<span style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>unlinked record</span>}
              <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.12em",
                border:`1px solid ${seated||bhSeated?"#4a9a5a66":"#5a5a5a66"}`,borderRadius:2,padding:"1px 6px",
                color:seated||bhSeated?"#7ad47a":"#8a8a8a"}}>
                {seated?"SITTING":bhSeated?"BUNDESHERR":judicial?"JUDICIARY":"FORMER"}
              </span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.textD,
            cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
        </div>

        <div style={{padding:"1rem 1.5rem 1.5rem"}}>
          {shownVotes.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:"1rem"}}>
              {[["For",tally.for,"#7ad47a"],["Against",tally.against,C.redL],
                ["Abstain",tally.abstain,C.textD],["Absent",tally.absent,"#8888bb"]].map(([l,n,c])=>(
                <div key={l} style={{background:C.s2,border:`1px solid ${C.border}`,borderTop:`2px solid ${c}`,
                  borderRadius:"0 0 3px 3px",padding:"7px 4px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:c,lineHeight:1}}>{n}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:"0.12em",
                    color:C.textDD,marginTop:2,textTransform:"uppercase"}}>{l}</div>
                </div>
              ))}
            </div>
          )}
          <FactRow label="Region">
            {region||<span style={{color:C.textDD,fontStyle:"italic"}}>
              {person.username?"No region on file":"Not a registered citizen"}
            </span>}
          </FactRow>
          <FactRow label="Seats">
            {/* Every Bundesherr has one vote, so saying so tells the reader nothing. */}
            {seated&&btRec.seats?btRec.seats.toLocaleString()+" of "+BT_SEATS_TOTAL.toLocaleString():
              bhSeated?"Sits in the Bundesherren":
              <span style={{color:C.textDD,fontStyle:"italic"}}>No seat</span>}
          </FactRow>
          <FactRow label="Offices">
            {offices.length>0
              ?<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {offices.map((o,i)=>(
                  <span key={i} style={{fontSize:11,color:C.gold,border:`1px solid ${C.gold}44`,
                    background:"#1a1400",borderRadius:2,padding:"2px 7px"}}>{o}</span>
                ))}
              </div>
              :<span style={{color:C.textDD,fontStyle:"italic"}}>None</span>}
          </FactRow>
          <FactRow label="Party">
            {partyHistory.length>0
              ?<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {partyHistory.map(pid=>{const p=getParty(pid);
                  return <span key={pid} style={{fontSize:12,color:p?.color||C.textD}}>{p?.name||pid}</span>;})}
              </div>
              :null}
          </FactRow>
          {(hon.suffixes.length>0||hon.styles.length>0)&&(
            <FactRow label="Honours">
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {hon.suffixes.map((s,i)=>(
                  <span key={i} title={s.why} style={{fontSize:11,color:C.gold,cursor:"help",
                    border:`1px solid ${C.gold}44`,background:"#1a1400",borderRadius:2,padding:"2px 7px"}}>{s.code}</span>
                ))}
                {hon.prefix&&(
                  <span title={hon.styles.length>1
                      ?"Addressed as "+hon.prefix.style+" — "+hon.prefix.why+"\n\nAlso entitled to:\n"
                        +hon.styles.slice(1).map(s=>"· "+s.style+" — "+s.why).join("\n")
                      :hon.prefix.style+" — "+hon.prefix.why}
                    style={{fontSize:11,color:C.textD,cursor:"help",
                      border:`1px solid ${C.border}`,borderRadius:2,padding:"2px 7px"}}>
                    {hon.prefix.style}
                    {hon.styles.length>1&&<span style={{color:C.textDD,marginLeft:5}}>+{hon.styles.length-1}</span>}
                  </span>
                )}
              </div>
            </FactRow>
          )}
          {former.length>0&&(
            <FactRow label="Departures">
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {former.map((f,i)=>(
                  <span key={i} style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>
                    {f.departed_reason||"Departed"}{f.departed_at?" · "+fmtDate(f.departed_at):""}
                  </span>
                ))}
              </div>
            </FactRow>
          )}
          {activity&&(
            <FactRow label={<span title={ACTIVITY_TOOLTIP} style={{cursor:"help",borderBottom:`1px dotted ${C.textDD}`}}>Activity Index</span>}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}} title={ACTIVITY_TOOLTIP}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,
                  color:activityColor(activity.pct),lineHeight:1,cursor:"help"}}>{activity.pct}%</span>
                <div style={{flex:1,minWidth:100,maxWidth:180,height:5,background:C.s3,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:activity.pct+"%",background:activityColor(activity.pct),transition:"width .4s"}}/>
                </div>
                <span style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>
                  present for {activity.attended} of {activity.total}{activity.absent>0?" · absent "+activity.absent:""}
                </span>
              </div>
            </FactRow>
          )}
          {drafting&&(
            <FactRow label={<span title={DRAFTING_TOOLTIP} style={{cursor:"help",borderBottom:`1px dotted ${C.textDD}`}}>Drafting to Voting</span>}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}} title={DRAFTING_TOOLTIP}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.textD,lineHeight:1,cursor:"help"}}>{drafting.pct}%</span>
                <div style={{flex:1,minWidth:100,maxWidth:180,height:5,background:C.s3,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:drafting.pct+"%",background:C.textD,transition:"width .4s"}}/>
                </div>
                <span style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>
                  {drafting.drafted} of {drafting.participated} were their own
                </span>
              </div>
            </FactRow>
          )}

          {service.length>0&&(
            <div style={{marginTop:"1.25rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
                color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>Service Record</div>
              {service.map(({gov,roles})=>(
                <div key={gov.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                  padding:"6px 10px",marginBottom:3}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text}}>{gov.name||"Ministry"}</span>
                    <span className="mono" style={{fontSize:10,color:C.textDD}}>{gov.startDate||"?"} — {gov.endDate||"present"}</span>
                  </div>
                  <div style={{fontSize:12,color:C.gold,marginTop:2}}>{roles.join(" · ")}</div>
                </div>
              ))}
            </div>
          )}

          <div style={{marginTop:"1.25rem"}}>
            {RECORDS.length>1
              ?<div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:8,flexWrap:"wrap"}}>
                {RECORDS.map(r=>(
                  <button key={r.v} onClick={()=>setVoteTab(r.v)}
                    style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",
                      textTransform:"uppercase",padding:"5px 12px",background:"transparent",
                      border:"none",cursor:"pointer",
                      borderBottom:`2px solid ${activeTab===r.v?C.gold:"transparent"}`,
                      color:activeTab===r.v?C.gold:C.textD}}>
                    {r.icon} {r.l}{r.n>0?" ("+r.n+")":""}
                  </button>
                ))}
              </div>
              :<div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
                color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>
                {activeTab==="ij"?"Judicial Record":"Voting History "+(shownVotes.length>0?"— "+shownVotes.length+" recorded":"")}
              </div>
            }
            {activeTab==="ij"
              ?<JudicialRecordPanel judicial={judicial}/>
              :shownVotes.length===0
                ?<div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>No votes recorded.</div>
                :<div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
                  {shownVotes.map(({bill,chamber,vote,when},i)=>{
                    const vc=vote==="for"?"#7ad47a":vote==="against"?C.redL:vote==="absent"?"#8888bb":C.textDD;
                    return(
                      <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,
                        borderLeft:`2px solid ${vc}`,borderRadius:"0 2px 2px 0",padding:"5px 9px",
                        display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,color:C.text,flex:1,minWidth:120}}>{bill.title}</span>
                        <span className="mono" style={{fontSize:9,color:C.textDD}}>
                          {chamber.toUpperCase()}{when?" · "+fmtDate(when):""}
                        </span>
                        <span style={{fontFamily:"'Cinzel',serif",fontSize:9,fontWeight:700,color:vc}}>{vote.toUpperCase()}</span>
                      </div>
                    );
                  })}
                </div>
            }
          </div>

          <div style={{marginTop:"1.25rem"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
              color:C.textDD,marginBottom:6,textTransform:"uppercase"}}>
              Submission History {submissions.length>0?"— "+submissions.length:""}
            </div>
            {submissions.length===0
              ?<div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>Nothing submitted.</div>
              :<div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
                {submissions.map(({bill,role},i)=>{
                  const sm=STATUS_META[bill.status]||{label:bill.status,color:C.textDD,icon:"•"};
                  return(
                    <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,
                      borderLeft:`2px solid ${sm.color}`,borderRadius:"0 2px 2px 0",padding:"5px 9px",
                      display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:12,color:C.text,flex:1,minWidth:120}}>{bill.title}</span>
                      {role==="cosponsor"&&<span style={{fontSize:9,color:"#7ad47a",fontStyle:"italic"}}>co-sponsored</span>}
                      <span className="mono" style={{fontSize:9,color:C.textDD}}>{fmtDate(bill.created)}</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:sm.color,
                        border:`1px solid ${sm.color}44`,borderRadius:2,padding:"1px 6px",whiteSpace:"nowrap"}}>

                      </span>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

      <span style={{fontSize:12}}>📜</span>

    {isDecree&&<div style={{background:"linear-gradient(135deg,#120008,#0a0010)",borderBottom:"1px solid #8b1a4a33",padding:"3px 10px",display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:12}}>⚜</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:"0.3em",color:"#c060a0",textTransform:"uppercase"}}>Imperial Instrument of Law</span>
    </div>}
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"0.75rem 1rem",cursor:"pointer",gap:8}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>

          {bill.type!=="regular"&&bill.type!=="motion"&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:C.gold,border:`1px solid ${C.gold}44`,padding:"1px 5px",borderRadius:2}}>{bt.icon} {bt.label}</span>}
          {bill.grandfathered&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#8a7040",border:"1px solid #8a704044",padding:"1px 5px",borderRadius:2,background:"#12100a"}}>⚜ Grandfathered</span>}
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:effectiveSm.color,border:`1px solid ${effectiveSm.color}44`,padding:"1px 6px",borderRadius:2}}>{effectiveSm.label}</span>
          {(()=>{const lc=bill.category?BK_LAW_CATEGORIES.find(x=>x.v===bill.category):null;return lc?<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:lc.color,border:`1px solid ${lc.color}44`,padding:"1px 6px",borderRadius:2}}>{lc.l}</span>:null;})()}
          {mods.length>0&&!isCourtRepealed&&<span className="mono" style={{fontSize:7,color:"#4a7acc",background:"#0a1020",border:"1px solid #2a4a8a44",padding:"1px 5px",borderRadius:1}}>MODIFIED</span>}

      {btData&&<div style={{marginBottom:"1rem"}}>

        <LegalVoteBar fv={btData.for_seats} av={btData.against_seats} abv={btData.abstain_seats}

            return <div key={mid} style={{background:C.s3,border:`1px solid ${C.border}`,borderLeft:`2px solid ${p?.color||C.border}`,borderRadius:"0 2px 2px 0",padding:"2px 7px",display:"flex",alignItems:"center",gap:4}}>

      {bhData&&Object.keys(bill.bh_votes||{}).length>0&&<div style={{marginBottom:"0.85rem"}}>

          {Object.entries(bill.bh_votes).map(([bid,vote])=>{

            return <div key={bid} style={{background:C.s3,border:`1px solid ${C.gold}33`,borderLeft:`2px solid ${C.gold}55`,borderRadius:"0 2px 2px 0",padding:"2px 7px",display:"flex",alignItems:"center",gap:5}}>

      {bill.repealed_at&&<div style={{fontSize:13,color:"#c05050",fontStyle:"italic",marginBottom:3}}>🚫 Repealed {" \u2014 "} {new Date(bill.repealed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>}

        {bill.pull_reason&&<div style={{fontSize:12,color:"#c0a0c0",fontStyle:"italic",lineHeight:1.7}}>{bill.pull_reason}</div>}

      {bill.returned_at&&<div style={{background:"#0e0a00",border:`1px solid #b05a1055`,borderLeft:`3px solid #f0a050`,borderRadius:"0 3px 3px 0",padding:"0.5rem 0.75rem",marginTop:6}}>

        {bill.return_notes&&<div style={{fontSize:12,color:"#d0b090",fontStyle:"italic",lineHeight:1.7}}>{bill.return_notes}</div>}
      </div>}
      {courtRepealRecord&&<div style={{background:"#100808",border:`1px solid ${C.redD}44`,borderLeft:"3px solid #cc2222",borderRadius:"0 3px 3px 0",padding:"0.65rem 0.85rem",marginTop:6}}>

        </div>
        {(courtRepealRecord.presidingNames||[]).length>0&&<div style={{fontSize:11,color:"#9a7070",fontStyle:"italic"}}>{"Presiding: "}{courtRepealRecord.presidingNames.join(", ")}</div>}
      </div>}
      {mods.length>0&&<div style={{marginTop:6,display:"flex",flexDirection:"column",gap:3}}>
        {mods.map((m,i)=><div key={m.id||i} style={{background:"#080a10",border:"1px solid #2a4a8a44",borderLeft:"3px solid #4a6aaa",borderRadius:"0 3px 3px 0",padding:"0.5rem 0.75rem"}}>
          <div className="mono" style={{fontSize:8,color:"#6a8acc",letterSpacing:"0.15em",marginBottom:3}}>{"\u2696 MODIFIED BY COURT ORDER"}</div>
          <div style={{fontSize:12,color:"#a0b8e0",marginBottom:(m.presidingNames||[]).length>0?2:0}}>
            {m.caseRef&&<span className="mono" style={{fontSize:8,color:"#5a7acc",marginRight:5}}>{m.caseRef}</span>}
            {m.caseTitle||""}
            {m.enacted&&<span style={{color:"#5a7090",marginLeft:5}}>{" \u2014 "}{new Date(m.enacted).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</span>}
          </div>
          {(m.presidingNames||[]).length>0&&<div style={{fontSize:11,color:"#5a7090",fontStyle:"italic",marginBottom:m.body?3:0}}>{"Presiding: "}{m.presidingNames.join(", ")}</div>}
          {m.body&&<details style={{marginTop:3}}><summary style={{fontSize:10,color:"#6a8acc",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:"0.1em"}}>VIEW MODIFICATION</summary>

          </details>}
        </div>)}
      </div>}
    </div>}
  </div>;
}

  const cat=STATUTE_CATS.find(c=>c.v===s.cat)||{l:"Other"};
  return <div style={{background:s.repealed?"transparent":C.s1,border:`1px solid ${s.repealed?C.border+"66":C.border}`,
    borderLeft:`4px solid ${s.repealed?C.textDD:C.accent}`,borderRadius:"0 3px 3px 0",overflow:"hidden",opacity:s.repealed?.65:1}}>

        ?<span className="mono" style={{fontSize:8,color:C.redL,background:"#1a0808",border:`1px solid ${C.redD}44`,padding:"1px 6px"}}>REPEALED</span>

      {caseCount>0&&<span className="mono" style={{fontSize:7,color:C.textD}}>{caseCount} CASE{caseCount!==1?"S":""}</span>}

      </div>}
      {s.body?<div style={{fontSize:14,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{s.body}</div>
        :<div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>No text on record.</div>}
      {repealRecord&&<div style={{marginTop:"0.65rem",background:"#100808",border:`1px solid ${C.redD}44`,
        borderLeft:"3px solid #cc2222",borderRadius:"0 3px 3px 0",padding:"0.65rem 0.85rem"}}>
        <div className="mono" style={{fontSize:8,color:"#c05050",letterSpacing:"0.15em",marginBottom:3}}>{"\u2696 REPEALED BY COURT ORDER"}</div>
        <div style={{fontSize:12,color:"#e0b0b0",marginBottom:(repealRecord.presidingNames||[]).length>0?3:0}}>

          {(m.presidingNames||[]).length>0&&<div style={{fontSize:11,color:"#5a7090",fontStyle:"italic",marginBottom:m.body?3:0}}>{"Presiding: "}{m.presidingNames.join(", ")}</div>}

            <div style={{fontSize:12,color:"#a0b8e0",lineHeight:1.7,marginTop:5,paddingTop:5,borderTop:`1px solid ${C.border}`,whiteSpace:"pre-wrap"}}>{m.body}</div>
          </details>}
        </div>)}
      </div>}
    </div>}
  </div>;
}

// ── LEGAL CODE TAB ────────────────────────────────────────────────────────────
function LegalCodeTab({statutes,bills,cases,members,bundesherren,formerMembers}){
  const [section,setSection]=useState("acts");
  const [statusFilter,setStatusFilter]=useState("force");
  const [catFilter,setCatFilter]=useState("all");
  const [inForce,setInForce]=useState("force");
  const [search,setSearch]=useState("");

  const casesByStatute=useMemo(()=>{
    const m={};
    Object.values(cases||{}).forEach(c=>{if(c.contestedStatute)m[c.contestedStatute]=(m[c.contestedStatute]||0)+1;});
    return m;
  },[cases]);

  const courtRepeals=useMemo(()=>{
    const m={};
    Object.values(statutes||{}).forEach(s=>{
      if(s.src==="court_repeal"){if(s.repealOf)m[s.repealOf]=s;if(s.repealOfTitle)m[s.repealOfTitle]=s;}
    });
    return m;
  },[statutes]);

  const modsMap=useMemo(()=>{
    const m={};
    Object.values(statutes||{}).forEach(s=>{if(s.modifies){if(!m[s.modifies])m[s.modifies]=[];m[s.modifies].push(s);}});
    return m;
  },[statutes]);

  // ── Bundeskongress acts (laws only) ─────────────────────────────────────────
  const SKIP_TYPES=new Set(["motion","appoint_bt_pres","appoint_chancellor","appoint_bh_pres","nominate_minister","dissolve_government"]);
  const bkActs=useMemo(()=>{
    return Object.values(bills||{}).filter(b=>{
      // Legal Code shows law only — never bills that failed, were vetoed, or pulled before becoming law.
      if(!["passed","grandfathered","decree","repealed"].includes(b.status)) return false;
      if(SKIP_TYPES.has(b.type)) return false;
      const title=(b.title||"").trim();
      if(/^(nomination|appointment) of/i.test(title)) return false;
      return true;
    }).map(b=>{
      const bkId="bk_"+b.id;
      const cr=courtRepeals[bkId]||courtRepeals[b.title||""];
      return {...b,_isCourtRepealed:!!cr,_courtRepealRecord:cr||null};
    }).filter(b=>{
      const q=search.trim().toLowerCase();
      const mQ=!q||b.title?.toLowerCase().includes(q)||b.submitter?.toLowerCase().includes(q);
      if(!mQ) return false;
      const isRepealed=b.status==="repealed"||b._isCourtRepealed;
      const isPassed=b.status==="passed"||b.status==="grandfathered";
      const isDecree=b.status==="decree";
      if(statusFilter==="force")return (isPassed||isDecree)&&!isRepealed;
      if(statusFilter==="passed")return isPassed&&!isRepealed;
      if(statusFilter==="decree")return isDecree&&!isRepealed;
      if(statusFilter==="repealed")return isRepealed;
      if(statusFilter==="constitutional")return b.type==="constitutional_amendment"&&!isRepealed;
      // "all" — all law on the books (in force + repealed), but never failed/vetoed
      return true;
    }).filter(b=>{
      if(catFilter==="all") return true;
      if(catFilter==="constitutional") return b.type==="constitutional_amendment";
      return b.category===catFilter;
    }).sort((a,b)=>(b.ratified_at||b.passed_at||b.created||0)-(a.ratified_at||a.passed_at||a.created||0));
  },[bills,search,statusFilter,catFilter,courtRepeals]);

  // ── Judicial statutes (custom, non-meta) ────────────────────────────────────
  const judicialStatutes=useMemo(()=>{
    return Object.values(statutes||{}).filter(s=>s.src!=="court_repeal"&&!s.modifies)
      .filter(s=>{
        const q=search.trim().toLowerCase();
        const mQ=!q||s.title?.toLowerCase().includes(q);
        const mF=inForce==="all"||(inForce==="force"&&!s.repealed)||(inForce==="repealed"&&s.repealed);
        return mQ&&mF;
      }).sort((a,b)=>{
        if(!a.repealed&&b.repealed)return -1;if(a.repealed&&!b.repealed)return 1;
        return (a.title||"").localeCompare(b.title||"");
      });
  },[statutes,search,inForce]);

  const STATUS_OPTS=[
    {v:"force",l:"In Force"},
    {v:"constitutional",l:"Constitutional"},
    {v:"decree",l:"Imperial Decrees"},
    {v:"repealed",l:"Repealed"},
    {v:"all",l:"All Law"},
  ];
  const CAT_OPTS=[{v:"all",l:"All Types"},{v:"constitutional",l:"Constitutional Amendments"},...BK_LAW_CATEGORIES.map(c=>({v:c.v,l:c.l}))];

  return <div className="fadeIn">
    {/* Header with cross-link */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:"1.25rem"}}>
      <STitle style={{marginBottom:0}}>Imperial Legal Code</STitle>
      <a href="bundeskongress.html" target="_blank" rel="noopener noreferrer"
        style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",
                 padding:"4px 12px",borderRadius:2,border:`1px solid ${C.gold}55`,background:"#1a1400",
                 color:C.gold,textDecoration:"none"}}>
        {"Bundeskongress Archive \u2192"}
      </a>
    </div>
    <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
      The consolidated laws of the Empire of Lech {" \u2014 "} Acts of the Imperial Bundeskongress, Imperial Decrees, and statutes arising from judicial proceedings.
    </div>

    {/* Section tabs */}
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:"1.25rem"}}>
      {[["acts","Bundeskongress Acts \u0026 Decrees"],["judicial","Judicial Statutes"]].map(([v,l])=>
        <button key={v} onClick={()=>setSection(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",
                   padding:"0.6rem 1rem",background:"transparent",border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,
                   borderBottom:`2px solid ${section===v?C.accent:"transparent"}`,
                   color:section===v?C.accent:C.textD}}>{l}</button>)}
    </div>

    {section==="acts"&&<div>
      {/* Filters */}
      <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
        {STATUS_OPTS.map(({v,l})=><button key={v} onClick={()=>setStatusFilter(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.08em",textTransform:"uppercase",
                   padding:"3px 10px",background:statusFilter===v?C.s2:"transparent",
                   border:`1px solid ${statusFilter===v?C.accent:C.border}`,
                   color:statusFilter===v?C.accent:C.textD,borderRadius:1,cursor:"pointer"}}>{l}</button>)}
      </div>
      <div style={{display:"flex",gap:"0.65rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search by title, submitter..."/></div>
        <div style={{flex:1,minWidth:180}}><DD value={catFilter} onChange={setCatFilter} options={CAT_OPTS}/></div>
      </div>
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{bkActs.length} ENACTMENT{bkActs.length!==1?"S":""}</div>
      {bkActs.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No acts match your filters.</div>
        :<div>{bkActs.map(b=><LegalBillCard key={b.id} bill={b} members={members||{}} bundesherren={bundesherren||{}} ijStatutes={statutes} formerMembers={formerMembers}/>)}</div>}
    </div>}

    {section==="judicial"&&<div>
      <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
        {[["force","In Force"],["repealed","Repealed"],["all","All"]].map(([v,l])=><button key={v} onClick={()=>setInForce(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.08em",textTransform:"uppercase",
                   padding:"3px 10px",background:inForce===v?C.s2:"transparent",
                   border:`1px solid ${inForce===v?(v==="force"?"#2a9a4a":v==="repealed"?C.redD:C.accent):C.border}`,
                   color:inForce===v?(v==="force"?"#2a9a4a":v==="repealed"?C.redL:C.accent):C.textD,
                   borderRadius:1,cursor:"pointer"}}>{l}</button>)}
      </div>
      <div style={{marginBottom:"1rem"}}><Inp value={search} onChange={setSearch} placeholder="Search by title..."/></div>
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{judicialStatutes.length} STATUTE{judicialStatutes.length!==1?"S":""}</div>
      {judicialStatutes.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No judicial statutes match your filters.</div>
        :<div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
          {judicialStatutes.map(s=><JudicialStatuteCard key={s.id} statute={s} caseCount={casesByStatute[s.id]||0}
            mods={modsMap[s.id]||[]} courtRepealRecord={null}/>)}
        </div>}
    </div>}
  </div>;
}

// ── PANEL AUTH ────────────────────────────────────────────────────────────────
function SignIn({onAuth,onClose}){
  const [username,setUsername]=useState("");const [password,setPassword]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function doAuth(){
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true);setErr("");
    try{
      const res=await slogin(username,password);
      if(!res.ok){setErr(res.error==="ACCESS DENIED"?"Incorrect password.":res.error);setLoading(false);return;}
      const raw=await sgetAll();
      onAuth(res.account,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  }
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
    style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(4,6,10,.9)",display:"flex",
      alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{maxWidth:400,width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.silver}`,
      borderRadius:"0 0 4px 4px",padding:"1.75rem",animation:"fadeIn .25s ease"}} onKeyDown={e=>{if(e.key==="Enter")doAuth();}}>
      <div style={{textAlign:"center",marginBottom:"1.25rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.4em",color:C.silver,marginBottom:6}}>EMPIRE OF LECH</div>
        <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,letterSpacing:"0.08em",color:C.text}}>Sign In</div>
        <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginTop:6,lineHeight:1.6}}>
          Use your Imperial Intranet (MOI) credentials to file cases and access judicial functions.
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
        <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:"#1a0808",border:`1px solid ${C.redD}44`,padding:"7px 12px"}}>{err}</div>}
        <Btn onClick={doAuth} disabled={loading||!username.trim()||!password.trim()}>{loading?"Authenticating...":"Sign In"}</Btn>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

  const [filter,setFilter]=useState("open");
  const list=Object.values(cases||{}).filter(c=>{
    if(filter==="open") return !["withdrawn","final_upheld","final_overturned"].includes(c.status);

    return true;
  }).sort((a,b)=>(b.filed||0)-(a.filed||0));
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:"1.25rem"}}>
      {[["open","Open Cases"],["closed","Closed"],["all","All"]].map(([v,l])=>
        <button key={v} onClick={()=>setFilter(v)}
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",
                   padding:"4px 12px",background:filter===v?C.s2:"transparent",
                   border:`1px solid ${filter===v?C.accent:C.border}`,
                   color:filter===v?C.accent:C.textD,borderRadius:1,cursor:"pointer"}}>{l}</button>)}
    </div>
    {list.length===0&&<div style={{fontSize:14,color:C.textDD,fontStyle:"italic"}}>No cases in this view.</div>}
    {list.map(c=><CasePipelineRow key={c.id} caseData={c} appointments={appointments} onAction={onAction}
      notify={notify} setProcessing={setProcessing} isEmperor={isEmperor} isPresident={isPresident} allCases={cases} onGotoJudgments={onGotoJudgments}/>)}
  </div>;
}

      An Imperial Overrule sets aside the court's judgment by Imperial authority. This action is permanent, publicly logged, and should only be used in cases of manifest injustice or constitutional necessity. It cannot be undone.
    </Disclaimer>
    <div style={{marginTop:"0.65rem"}}><FL>IMPERIAL GROUNDS *</FL>
      <TA value={reason} onChange={setReason} placeholder="State the Imperial grounds for overruling this judgment..." rows={3}/>
    </div>
    <div style={{display:"flex",gap:8,marginTop:"0.65rem"}}>
      <Btn small variant="armed" disabled={!reason.trim()||saving} onClick={async()=>{

        setProcessing(null);setSaving(false);

      }}>{saving?"Recording...":"Confirm Imperial Overrule"}</Btn>
      <Btn small variant="ghost" onClick={()=>{setOpen(false);setReason("");}}>Cancel</Btn>
    </div>
  </div>;
}

function CasePipelineRow({caseData:c,appointments,onAction,notify,setProcessing,isEmperor,isPresident,allCases,onGotoJudgments}){
  const [open,setOpen]=useState(false);
  const [presiding,setPresiding]=useState(c.presiding||[]);
  const [court,setCourt]=useState(c.court||"regional");
  const [saving,setSaving]=useState(false);
  const ct=COURTS.find(x=>x.v===c.court)||COURTS[1];
  const pipeline=CASE_PIPELINE[c.status]||{next:[],nextLabels:{},nextWarnings:{}};
  const [pendingNext,setPendingNext]=useState(null);
  const [hearingDate,setHearingDate]=useState(c.hearingDate||"");
  const [hearingTime,setHearingTime]=useState(c.hearingTime||"");
  const [hearingTz,setHearingTz]=useState(c.hearingTz||"AST");
  const appealCase=c.appealedBy?allCases?.[c.appealedBy]:null;
  const originCase=c.appealOf?allCases?.[c.appealOf]:null;
  async function moveStatus(newStatus){
    const now=Date.now();
    const hist=[...(c.statusHistory||[]),{status:newStatus,at:now}];
    setProcessing("Updating case...");
    if(newStatus==="appealed"){
      // Auto-create CC case with collision-safe number
      const yr=new Date().getFullYear();
      const existing=new Set(Object.values(allCases||{}).map(x=>x.number));
      let ccNum,attempts=0;
      do{ccNum="CC-"+yr+"-"+String(Math.floor(Math.random()*900)+100).padStart(3,"0");attempts++;}
      while(existing.has(ccNum)&&attempts<50);
      const ccId="case_"+uid();
      const ccCase={id:ccId,number:ccNum,title:"Appeal of "+c.number+" — "+c.title,
        court:"constitutional",type:c.type,parties:c.parties,presiding:[],summary:c.summary,
        status:"filed",filed:now,statusHistory:[{status:"filed",at:now}],
        appealOf:c.id,contestedStatute:c.contestedStatute||null,contestedStatuteTitle:c.contestedStatuteTitle||null};
      const updatedCases={...allCases,[ccId]:ccCase};
      const updatedOriginal={...c,status:"appealed",statusHistory:hist,appealedBy:ccId};
      updatedCases[c.id]=updatedOriginal;
      await onAction("bulkUpdateCases",{cases:updatedCases});
      notify("Appeal filed. New CC case: "+ccNum,"#cc6a10");
    } else {
      await onAction("updateCase",{id:c.id,status:newStatus,statusHistory:hist,presiding,court,...(newStatus==="hearing"&&hearingDate?{hearingDate,hearingTime,hearingTz}:{})});
      notify(c.number+" → "+(CASE_PIPELINE[newStatus]||{label:newStatus}).label,C.accent);
    }
    setProcessing(null);setPendingNext(null);
  }
  async function savePresiding(){
    setSaving(true);setProcessing("Updating...");
    const extra=hearingDate?{hearingDate,hearingTime,hearingTz}:{};
    await onAction("updateCase",{id:c.id,presiding,court,...extra});
    setProcessing(null);setSaving(false);notify(c.number+" updated.",C.gold);
  }
  return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${ct.color}`,
    borderRadius:"0 3px 3px 0",marginBottom:"0.6rem",overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,
      padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
      <CourtBadge court={c.court}/>
      <StatusPill status={c.status}/>
      <span className="mono" style={{fontSize:9,color:C.textD}}>{c.number}</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,flex:1}}>{c.title}</span>
      {appealCase&&<span className="mono" style={{fontSize:8,color:"#cc6a10"}}>ON APPEAL</span>}
      <span style={{fontSize:11,color:C.textDD}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",background:C.s2}}>
      <CaseTimeline status={c.status} appealCase={appealCase?.number}/>
      {originCase&&<div style={{background:C.s1,border:`1px solid #cc6a1044`,borderLeft:`3px solid #cc6a10`,
        borderRadius:"0 3px 3px 0",padding:"6px 10px",marginBottom:"0.75rem",fontSize:12,color:"#cc8040"}}>
        Appeal of {originCase.number} {" \u2014 "} {originCase.title}
      </div>}
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:4}}>{pipeline.desc}</div>
      {/* Presiding selector */}
      <div style={{marginBottom:"1rem"}}>
        <FL>PRESIDING JUSTICE(S)</FL>
        <JusticeSelector value={presiding} onChange={setPresiding} appointments={appointments} court={c.court}/>
      </div>
      {/* Court elevation (president + emperor) */}
      {isPresident&&c.court==="regional"&&!["appealed","withdrawn","final_upheld","final_overturned","overruled"].includes(c.status)&&<div style={{marginBottom:"1rem"}}>
        <FL>COURT ELEVATION (PRESIDENT / EMPEROR)</FL>
        <DD value={court} onChange={setCourt} options={COURTS.map(x=>({v:x.v,l:x.l}))}/>
        {court==="constitutional"&&c.court==="regional"&&<Disclaimer type="danger">
          Elevating this case to the Constitutional Court is a significant step. It should only be done where the matter directly involves constitutional questions that cannot be addressed at the Regional level.
        </Disclaimer>}
      </div>}
      {["filed","active","hearing"].includes(c.status)&&<div style={{marginBottom:"1rem",background:C.s1,border:`1px solid ${C.border}`,borderRadius:2,padding:"0.75rem"}}>
        <div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:6,letterSpacing:"0.1em"}}>SCHEDULE HEARING — saves with assignment, does not change status</div>
        <HearingScheduler hearingDate={hearingDate} setHearingDate={setHearingDate} hearingTime={hearingTime} setHearingTime={setHearingTime} hearingTz={hearingTz} setHearingTz={setHearingTz}/>
      </div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:"0.75rem"}}>
        <Btn small variant="gold" disabled={saving} onClick={savePresiding}>{saving?"Saving...":"Save Assignment"}</Btn>
        <ArmBtn small label="Strike Case" confirmLabel="Strike from record?" onConfirm={async()=>{
          setProcessing("Removing..."); await onAction("deleteCase",{id:c.id});
          setProcessing(null); notify(c.number+" struck from record.",C.textD);
        }}/>
      </div>
      {isEmperor&&["decided","dismissed","final_upheld","final_overturned"].includes(c.status)&&
        <OverrulePanel caseData={c} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {/* Pipeline actions */}
      {pipeline.next.length>0&&<div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem"}}>
        <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:8}}>AVAILABLE ACTIONS</div>
        {c.status==="active"&&pipeline.next.includes("hearing")&&!hearingDate&&<div style={{marginBottom:"0.65rem"}}><Disclaimer type="warning">Set a hearing date in the scheduler above before advancing to Before the Court.</Disclaimer></div>}
        {pendingNext&&<div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1rem",marginBottom:"0.75rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,marginBottom:6}}>
            Confirm: Move to <strong>{(CASE_PIPELINE[pendingNext]||{label:pendingNext}).label}</strong>?
          </div>
          {pipeline.nextWarnings?.[pendingNext]&&<Disclaimer type="warning">{pipeline.nextWarnings[pendingNext]}</Disclaimer>}
          <div style={{display:"flex",gap:8,marginTop:"0.75rem"}}>
            <Btn small onClick={()=>moveStatus(pendingNext)}>Confirm</Btn>
            <Btn small variant="ghost" onClick={()=>setPendingNext(null)}>Cancel</Btn>
          </div>
        </div>}
        {!pendingNext&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {pipeline.next.map(ns=>{
            const nDef=CASE_PIPELINE[ns]||{};
            const isDestructive=ns==="dismissed"||ns==="withdrawn";
            const isAppeal=ns==="appealed";
            return <Btn key={ns} small variant={isDestructive?"danger":isAppeal?"gold":"primary"}
              onClick={()=>setPendingNext(ns)}>
              {(pipeline.nextLabels||{})[ns]||nDef.label}
            </Btn>;
          })}
        </div>}
        {pipeline.requiresJudgment&&<div style={{marginTop:"0.5rem"}}>
          <Disclaimer type="info">
            This case is under deliberation. A formal judgment must be rendered to advance it. Click below to go to the Render Judgment tab.
          </Disclaimer>
          <div style={{marginTop:8}}><Btn small onClick={()=>onGotoJudgments()}>Go to Render Judgment →</Btn></div>
        </div>}
      </div>}
    </div>}
  </div>;
}
