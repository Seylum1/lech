// ── ACCOUNTS & OFFICES ────────────────────────────────────────────────────────
// Accounts live in the Interior's register, written one row per account
// (mi_acc_<username>) with a legacy blob kept as a fallback. Every ministry
// reads them the same way.
function accountsFrom(raw){
  const seen={},out=[];
  Object.entries(raw||{}).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v&&v.username&&!seen[v.username.toLowerCase()]){seen[v.username.toLowerCase()]=1;out.push(v);}});
  Object.entries((raw||{})["mi_accounts"]||{}).forEach(([k,v])=>{if(v&&v.username&&!seen[v.username.toLowerCase()]){seen[v.username.toLowerCase()]=1;out.push(v);}});
  return out.sort((a,b)=>((a.displayName||a.username)||"").localeCompare((b.displayName||b.username)||""));
}
const accountOpts=(accounts)=>(accounts||[]).map(a=>({v:a.username,l:(a.displayName?a.displayName+" ":"")+"@"+a.username}));
function accountName(accounts,username){
  const a=(accounts||[]).find(x=>String(x.username||"").toLowerCase()===String(username||"").toLowerCase());
  return a?(a.displayName||a.username):username;
}
// Minecraft usernames: 3–16 of [A-Za-z0-9_]. Rejects the spaces and punctuation
// a roleplay name would carry, which is the mistake this field exists to catch.
const isUsername=(s)=>/^[A-Za-z0-9_]{3,16}$/.test(String(s||"").trim());

// The Bundeskongress keeps the officeholders. A portfolio records both a name
// and a username; older entries only have the name, so match either.
function holderOf(officials,portfolio){
  const off=officials||{};
  if(portfolio==="Chancellor")return {username:off.chancellor_username||"",name:off.chancellor||""};
  return {username:(off.minister_usernames||{})[portfolio]||"",name:(off.ministers||{})[portfolio]||""};
}
function holdsOffice(officials,portfolio,user){
  if(!user)return false;
  const h=holderOf(officials,portfolio);
  const u=String(user.username||"").toLowerCase();
  if(h.username)return String(h.username).toLowerCase()===u;
  const bare=String(h.name||"").toLowerCase();
  if(!bare||bare==="vacant")return false;
  return bare===u||bare===String(user.displayName||"").toLowerCase();
}
function holderLabel(officials,portfolio){
  const h=holderOf(officials,portfolio);
  const n=h.name&&h.name!=="Vacant"?h.name:(h.username||"");
  return n||"Vacant";
}

function budgetValidUntil(ratifiedAt){const d=new Date(ratifiedAt);const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);return lastDay.getTime()+15*24*60*60*1000;}
function budgetCooldownUntil(ratifiedAt){const d=new Date(ratifiedAt);return new Date(d.getFullYear(),d.getMonth()+1,1,0,0,0,0).getTime();}

async function sha256(t){const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
async function sgetAll(){try{const r=await fetch(SCRIPT_URL+"?action=getall");const d=await r.json();if(!d.success)return{};const out={};Object.entries(d.data||{}).forEach(([k,v])=>{if(v){try{out[k]=JSON.parse(v);}catch{}}});return out;}catch{return{};}}
// Session token from the hardened backend. Held in memory for the tab session
// and attached to every write; the backend enforces it only in secure mode.
let AUTH_TOKEN=null;
async function sset(k,v){try{await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v),token:AUTH_TOKEN})});return true;}catch{return false;}}
// Dual-mode sign-in: try the hardened `login` endpoint, and if this is still the
// old backend (or CORS blocks the read), fall back to the legacy browser-side
// hash check so the page keeps working right across the rollout.
async function slogin(username,password){
  const u=String(username||"").trim();
  try{
    const r=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"login",username:u,password:password})});
    const d=await r.json();
    if(d&&d.success){AUTH_TOKEN=d.token;return {ok:true,account:d.account};}
    if(d&&d.error&&d.error!=="Unknown action")return {ok:false,error:d.error};
  }catch(e){/* old backend or CORS — fall through to legacy */}
  const raw=await sgetAll();
  const user=accountsFrom(raw).find(a=>String(a.username||"").toLowerCase()===u.toLowerCase());
  if(!user)return {ok:false,error:"ACCESS DENIED"};
  const hash=await sha256(password);
  if(hash!==user.passwordHash)return {ok:false,error:"ACCESS DENIED"};
  return {ok:true,account:user};
}
function fmtCur(n){if(n===null||n===undefined||n==="")return "\u2014";const abs=Math.abs(Number(n));const s=abs>=1000000?(abs/1000000).toFixed(2)+"M":abs>=1000?(abs/1000).toFixed(1)+"K":Number(abs).toLocaleString();return "$"+(Number(n)<0?"-":"")+s;}
function fmtDate(ts){return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});}
function fmtDateShort(ts){return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}
function daysLeft(ts){return Math.max(0,Math.ceil((ts-Date.now())/(1000*60*60*24)));}
function daysAgo(ts){return Math.max(0,Math.floor((Date.now()-ts)/(1000*60*60*24)));}
function genRegNo(businesses){const yr=new Date().getFullYear();const existing=new Set(Object.values(businesses||{}).map(b=>b.registrationNo));let num,a=0;do{num="MoF-"+yr+"-"+String(Math.floor(Math.random()*900)+100).padStart(3,"0");a++;}while(existing.has(num)&&a<50);return num;}

function Btn({children,onClick,variant="primary",disabled,small,full,style:ex={}}){

  const vars={primary:{background:"linear-gradient(135deg,"+C.goldD+","+C.gold+")",borderColor:C.goldD,color:"#100a00"},danger:{background:"transparent",borderColor:C.redD,color:C.redL},armed:{background:"linear-gradient(135deg,#5a0000,#900000)",borderColor:"#aa0000",color:"#ffcccc"},ghost:{background:"transparent",borderColor:C.border,color:C.textD},green:{background:"linear-gradient(135deg,"+C.greenD+","+C.green+")",borderColor:C.greenD,color:"#e8f8ee"},blue:{background:"linear-gradient(135deg,#001a3a,#002a5a)",borderColor:"#0044aa",color:"#88bbff"}};

// Picks a registered account. `allowManual` lets a party with no account be
// named by username instead — never by roleplay name, which is what the hint
// and the validation below are guarding against.
function AccountPicker({value,onChange,accounts,manual,onManualChange,allowManual,blankLabel,disabled}){
  const opts=[{v:"",l:blankLabel||"— Select a registered account —"},...accountOpts(accounts)];
  const bad=manual&&value.trim()&&!isUsername(value);
  return <div>
    {manual
      ?<Inp value={value} onChange={onChange} placeholder="Minecraft username (e.g. Steve_01)"/>
      :<DD value={value} onChange={onChange} options={opts} style={disabled?{opacity:.5}:{}}/>}
    {manual&&<div className="mono" style={{fontSize:9,color:bad?C.redL:C.textDD,marginTop:3}}>
      {bad?"NOT A VALID USERNAME — 3–16 characters, letters/numbers/underscore only. This is their username, not their roleplay name."
        :"Enter their username — not their roleplay name."}
    </div>}
    {allowManual&&<div onClick={()=>{onManualChange(!manual);onChange("");}}
      style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginTop:6}}>
      <div style={{width:14,height:14,borderRadius:2,border:"2px solid "+(manual?C.gold:C.border),

        fontSize:9,color:C.gold,flexShrink:0}}>{manual?"✓":""}</div>
      <span style={{fontSize:12,color:manual?C.text:C.textD}}>This person does not have an Intranet account</span>
    </div>}
  </div>;
}

// ── BUDGET TRACKER ────────────────────────────────────────────────────────────
function BudgetTracker({activeBudget,budgetCooldown,bkBills}){
  const [showHistory,setShowHistory]=useState(false);
  const now=Date.now();
  const isActive=activeBudget&&!activeBudget.voided_at&&now<activeBudget.valid_until;
  const isExpired=activeBudget&&(activeBudget.voided_at||now>=activeBudget.valid_until);
  const daysRem=isActive?daysLeft(activeBudget.valid_until):0;
  const totalDur=isActive?(activeBudget.valid_until-activeBudget.ratified_at):1;
  const pctElapsed=isActive?Math.min(100,((now-activeBudget.ratified_at)/totalDur)*100):100;
  const urgency=daysRem>30?C.greenL:daysRem>14?C.amber:C.redL;
  const coolActive=budgetCooldown&&!budgetCooldown.voided&&now<budgetCooldown.until;
  const proposeDate=budgetCooldown?.until;
  const budgetData=activeBudget?.data||{};
  // Real structure: data.ministries[name].total + agencies, data.special[], data.payroll, data.revenue
  const totalMin=BUDGET_PORTFOLIOS.reduce((a,p)=>{
    const m=budgetData.ministries?.[p];
    const agTotal=(m?.agencies||[]).reduce((b,ag)=>b+(parseFloat(ag.amount)||0),0);
    return a+(parseFloat(m?.total)||0)+agTotal;
  },0);
  const totalSpec=(budgetData.special||[]).reduce((a,s)=>a+(parseFloat(s.amount)||0),0);
  const totalRev=(budgetData.revenue?.items||[]).reduce((a,r)=>a+(parseFloat(r.amount)||0),0);
  const totalPayroll=parseFloat(budgetData.payroll)||0;
  const totalExp=totalMin+totalSpec+totalPayroll;
  const pastBudgets=useMemo(()=>Object.values(bkBills||{}).filter(b=>(b.type==="budget"||b.type==="budget_supplementary")&&b.status==="passed"&&b.id!==activeBudget?.id).sort((a,b)=>(b.ratified_at||0)-(a.ratified_at||0)),[bkBills,activeBudget]);

  return <div className="fadeIn">
    <div style={{background:isActive?"#0a1a10":isExpired?"#1a0808":"#0a0d18",border:"1px solid "+(isActive?C.green:isExpired?C.red:C.border),borderTop:"4px solid "+(isActive?C.greenL:isExpired?C.redL:C.silverD),borderRadius:"0 0 4px 4px",padding:"1.25rem 1.5rem",marginBottom:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
        <div>
          <div className="mono" style={{fontSize:9,color:isActive?C.greenL:isExpired?C.redL:C.textD,letterSpacing:"0.25em",marginBottom:4}}>{isActive?"BUDGET IN FORCE":isExpired?"BUDGET EXPIRED \u2014 NO ACTIVE APPROPRIATION":"NO BUDGET ON RECORD"}</div>
          {activeBudget&&<div style={{fontFamily:"'Cinzel',serif",fontSize:17,fontWeight:700,color:C.text,marginBottom:3}}>{activeBudget.title}</div>}
          {activeBudget&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{activeBudget.type==="budget_supplementary"?"Supplementary Budget":"Imperial Budget"}{" \u2014 "}{activeBudget.submitter}</div>}
          {!activeBudget&&<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginTop:4}}>No budget has been ratified. The Empire is operating without an active appropriation.</div>}
        </div>
        {isActive&&<div style={{textAlign:"center",flexShrink:0}}>

          <div style={{width:pctElapsed+"%",height:"100%",background:urgency,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:11,color:C.textD}}>
          <span>Ratified {fmtDateShort(activeBudget.ratified_at)}</span>
          <span style={{color:urgency}}>Expires {fmtDate(activeBudget.valid_until)}</span>
        </div>
      </div>}
    </div>

    {activeBudget&&<div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
      {[
        ["Ratified",fmtDate(activeBudget.ratified_at),C.gold],
        ["Expiry Date",fmtDate(activeBudget.valid_until),isExpired?C.redL:isActive&&daysRem<14?C.amber:C.text],
        ["New Budget From",proposeDate?(coolActive?fmtDate(proposeDate):"Now (available)"):"—",coolActive?C.amber:C.greenL],
        ["Imperial Reserve",activeBudget.reserve!==undefined?fmtCur(activeBudget.reserve):"\u2014",C.gold],
      ].map(([label,val,color])=><div key={label} style={{background:C.s1,border:"1px solid "+C.border,borderRadius:3,padding:"0.7rem 1rem",flex:1,minWidth:140}}>
        <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.15em",marginBottom:4}}>{label.toUpperCase()}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:color}}>{val}</div>
      </div>)}
    </div>}

    {isExpired&&<div style={{marginBottom:"1rem"}}><Disclaimer type="danger">The Empire is currently operating without an approved budget. A new budget bill must be passed by the Bundeskongress and ratified by the Emperor.</Disclaimer></div>}
    {coolActive&&<div style={{marginBottom:"1rem"}}><Disclaimer type="warning">A new budget may not be proposed until {fmtDate(proposeDate)} (the first day of the month following ratification).</Disclaimer></div>}
    {!coolActive&&activeBudget&&!isExpired&&daysRem<14&&<div style={{marginBottom:"1rem"}}><Disclaimer type="danger">Budget expires in {daysRem} day{daysRem!==1?"s":""}. A new budget bill should be prepared for submission.</Disclaimer></div>}

        {/* Ministry Budget Allocations + Special Allocations */}
    {activeBudget&&budgetData&&<div style={{marginTop:"0.5rem"}}>
      <STitle>Budget Breakdown</STitle>

        {[
          {label:"Total Revenue",value:totalRev,color:"#3a9c3a"},
          {label:"Ministry Allocations",value:totalMin,color:C.gold},
          {label:"Special Allocations",value:totalSpec,color:"#8a6a9a"},
          {label:"Gov. Payroll",value:totalPayroll,color:"#5a88cc"},
          {label:totalRev>=(totalExp)?"Surplus":"Deficit",value:Math.abs(totalRev-totalExp),color:totalRev>=totalExp?"#3a9c3a":"#c09000"},

          </div>

      {/* Imperial Reserve */}
      {activeBudget.reserve!=null&&(
        <div style={{background:"linear-gradient(135deg,#1a1000,#2a1a00)",border:"1px solid "+C.goldD,

          marginBottom:"1rem",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div>
            <div className="mono" style={{fontSize:8,color:C.goldD,letterSpacing:".2em",marginBottom:3}}>IMPERIAL RESERVE FUND</div>

      {/* Ministry allocations */}
      {totalMin>0&&<div style={{marginBottom:"1rem"}}>
        <div className="mono" style={{fontSize:9,color:C.gold,letterSpacing:".2em",marginBottom:6,paddingBottom:4,borderBottom:"1px solid "+C.goldD+"44"}}>

          {BUDGET_PORTFOLIOS.map((p,idx)=>{

            const base=parseFloat(m?.total)||0;
            const ags=m?.agencies||[];
            const agTotal=ags.reduce((a,ag)=>a+(parseFloat(ag.amount)||0),0);
            const total=base+agTotal;
            if(total===0&&ags.length===0) return null;
            const PALETTE=["#4a7aaa","#9a5aaa","#C9A84C","#2a9a4a","#cc6a10","#4a8a8a","#cc2222","#7a6a9a"];
            const col=PALETTE[idx%PALETTE.length];
            const barPct=totalMin>0?(total/totalMin)*100:0;
            const pct=totalMin>0?((total/totalMin)*100).toFixed(1):null;
            return(
              <div key={p} style={{background:C.s1,border:"1px solid "+C.border,borderLeft:"3px solid "+col,
                borderRadius:"0 3px 3px 0"}}>

                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>}

      {/* Special allocations */}
      {(budgetData.special||[]).length>0&&<div style={{marginBottom:"1rem"}}>
        <div className="mono" style={{fontSize:9,color:"#9a7aaa",letterSpacing:".2em",marginBottom:6,paddingBottom:4,borderBottom:"1px solid #6a4a7a44"}}>
          SPECIAL ALLOCATIONS — {fmtCur(totalSpec)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {budgetData.special.map((s,i)=>(
            <div key={i} style={{background:C.s1,border:"1px solid #6a4a7a44",borderLeft:"3px solid #8a6a9a",
              borderRadius:"0 3px 3px 0",padding:"0.5rem 1rem",
              display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:C.text}}>{s.label}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#c0a0d0",fontWeight:700}}>{fmtCur(parseFloat(s.amount)||0)}</span>
            </div>
          ))}
        </div>
      </div>}

      {/* Payroll line */}
      {totalPayroll>0&&<div style={{background:C.s2,border:"1px solid #4a6a9a33",borderLeft:"3px solid #5a88cc",
        borderRadius:"0 3px 3px 0",padding:"0.5rem 1rem",display:"flex",justifyContent:"space-between",
        alignItems:"center",marginBottom:"1rem"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#7aaaee"}}>👥 Government Payroll</span>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#7aaaee",fontWeight:700}}>{fmtCur(totalPayroll)}</span>
      </div>}

      {/* Revenue */}
      {totalRev>0&&(budgetData.revenue?.items||[]).length>0&&<div style={{marginBottom:"1rem"}}>
        <div className="mono" style={{fontSize:9,color:"#3a9c3a",letterSpacing:".2em",marginBottom:6,paddingBottom:4,borderBottom:"1px solid #2a6a2a44"}}>
          REVENUE SOURCES — {fmtCur(totalRev)}
        </div>
        {budgetData.revenue.items.map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",
            borderBottom:"1px solid "+C.border,background:i%2===0?C.s1:C.s2}}>
            <span style={{fontSize:13,color:C.text}}>{r.label||"Revenue"}</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#7ad47a",fontWeight:700}}>{fmtCur(parseFloat(r.amount)||0)}</span>
          </div>
        ))}
      </div>}

      {/* Budget notes */}
      {budgetData.notes&&<div style={{background:C.s1,border:"1px solid "+C.border,borderRadius:3,padding:"0.75rem 1rem"}}>
        <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:".2em",marginBottom:5}}>BUDGET NOTES</div>
        <div style={{fontSize:13,color:C.textD,lineHeight:1.7,fontStyle:"italic"}}>{budgetData.notes}</div>
      </div>}

      {/* Nothing at all */}
      {totalMin===0&&totalSpec===0&&totalPayroll===0&&totalRev===0&&<div style={{background:C.s1,border:"1px solid "+C.border,
        borderRadius:3,padding:"1.5rem",textAlign:"center",color:C.textDD,fontStyle:"italic",fontSize:13}}>
        No budget allocation data recorded.
      </div>}
    </div>}

    {pastBudgets.length>0&&<div style={{marginTop:"1.5rem"}}>
      <button onClick={()=>setShowHistory(v=>!v)} style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",padding:"5px 12px",background:"transparent",border:"1px solid "+C.border,borderRadius:2,color:C.textD,cursor:"pointer",marginBottom:"0.85rem"}}>{showHistory?"Hide Budget History":"Show Budget History ("+(pastBudgets.length)+")"}</button>
      {showHistory&&<div style={{display:"flex",flexDirection:"column",gap:3}}>
        {pastBudgets.map(b=><div key={b.id} style={{background:C.s1,border:"1px solid "+C.border,borderRadius:3,padding:"0.6rem 1rem",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",opacity:.7}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.textD,flex:1}}>{b.title}</span>
          {b.ratified_at&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{fmtDateShort(b.ratified_at)}</span>}
          <span className="mono" style={{fontSize:8,color:C.textDD,background:C.s2,padding:"1px 6px",borderRadius:1}}>{b.type==="budget_supplementary"?"SUPPLEMENTARY":"BUDGET"}</span>
        </div>)}
      </div>}
    </div>}
  </div>;
}

function RegistryPublic({businesses}){
  const [search,setSearch]=useState("");const [indFilter,setIndFilter]=useState("all");const [typeFilter,setTypeFilter]=useState("all");
  const list=useMemo(()=>Object.values(businesses||{}).filter(b=>{
    if(b.licenseStatus!=="active")return false;
    const q=search.toLowerCase();
    const mQ=!q||b.legalName?.toLowerCase().includes(q)||(b.tradingNames||[]).join(" ").toLowerCase().includes(q)||(b.registrationNo||"").toLowerCase().includes(q);
    const mI=indFilter==="all"||(b.industries||[]).includes(indFilter);
    const mT=typeFilter==="all"||b.entityType===typeFilter;
    return mQ&&mI&&mT;
  }).sort((a,b)=>(a.legalName||"").localeCompare(b.legalName||"")),[businesses,search,indFilter,typeFilter]);
  return <div className="fadeIn">
    <div style={{display:"flex",gap:"0.65rem",marginBottom:"1rem",flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:200}}><Inp value={search} onChange={setSearch} placeholder="Search by name or registration number..."/></div>
      <div style={{flex:1,minWidth:160}}><DD value={indFilter} onChange={setIndFilter} options={[{v:"all",l:"All Industries"},...INDUSTRIES.map(i=>({v:i,l:i}))]}/></div>
      <div style={{flex:1,minWidth:160}}><DD value={typeFilter} onChange={setTypeFilter} options={[{v:"all",l:"All Types"},...ENTITY_TYPES.map(t=>({v:t,l:t}))]}/></div>
    </div>
    <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{list.length} REGISTERED ENTERPRISE{list.length!==1?"S":""}</div>
    {list.length===0?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No registered enterprises match your search.</div>
    :<div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>{list.map(b=><BusinessPublicCard key={b.id} business={b}/>)}</div>}
  </div>;
}

// ── BUSINESS REGISTRATION WIZARD (public) ─────────────────────────────────────
function RegistrationForm({countries,businesses,accounts,onSubmit,onCancel}){
  const [step,setStep]=useState(1);
  const [legalName,setLegalName]=useState("");
  const [tradingNamesRaw,setTradingNamesRaw]=useState("");
  const [entityType,setEntityType]=useState("");
  const [owners,setOwners]=useState([{username:"",rpName:"",pct:"100",manual:false}]);
  const [crownOfficer,setCrownOfficer]=useState(false);
  const [noblePatronage,setNoblePatronage]=useState(false);
  const [ownerCitizenships,setOwnerCitizenships]=useState([]);
  const [foreignOwnership,setForeignOwnership]=useState(false);
  const [foreignContracts,setForeignContracts]=useState(false);
  const [industries,setIndustries]=useState([]);
  const [description,setDescription]=useState("");
  const [strategicClass,setStrategicClass]=useState("Civillian");
  const [revenueBand,setRevenueBand]=useState("");
  const [employeeCount,setEmployeeCount]=useState("");
  const [hqCountry,setHqCountry]=useState("");
  const [hqLocation,setHqLocation]=useState("");
  const [additionalLocations,setAdditionalLocations]=useState("");
  const [colonialLicense,setColonialLicense]=useState(false);
  const [licensesHeld,setLicensesHeld]=useState([]);
  const [licensesSeeking,setLicensesSeeking]=useState([]);
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(null);

  const countryOpts=useMemo(()=>{
    const fromMfa=Object.values(countries||{}).map(c=>c.name).filter(Boolean).sort();
    const all=["Empire of Lech",...fromMfa.filter(n=>n!=="Empire of Lech")];
    return [...new Set(all)];
  },[countries]);

  const pctTotal=owners.reduce((a,o)=>a+(parseFloat(o.pct)||0),0);
  const step1Valid=legalName.trim()&&entityType;
  // The principal owner must hold an account. A co-owner may be off-register,
  // but then their username has to actually look like one.
  const ownerValid=(o,i)=>!!o.pct&&(o.manual&&i>0?isUsername(o.username):!!o.username.trim());
  const step2Valid=owners.every(ownerValid)&&Math.abs(pctTotal-100)<0.1;
  const step3Valid=industries.length>0&&description.trim()&&strategicClass&&revenueBand;
  const step4Valid=hqCountry;

  function addOwner(){if(owners.length<6)setOwners([...owners,{username:"",rpName:"",pct:"",manual:false}]);}
  function removeOwner(i){if(owners.length>1)setOwners(owners.filter((_,idx)=>idx!==i));}
  // Takes a patch rather than one field, and updates off the previous state:
  // picking an account writes the username and the display name together, and
  // two field-at-a-time calls in one handler would drop the first one.
  function updateOwner(i,patch){setOwners(prev=>prev.map((o,idx)=>idx===i?{...o,...patch}:o));}

  async function submitForm(){
    setSaving(true);
    const regNo=genRegNo(businesses);
    const biz={
      id:"biz_"+uid(),registrationNo:regNo,legalName:legalName.trim(),
      tradingNames:tradingNamesRaw.split(",").map(s=>s.trim()).filter(Boolean),
      entityType:entityType,owners:owners.map((o,i)=>({username:o.username.trim(),rpName:o.rpName.trim(),pct:o.pct,
        hasAccount:!(o.manual&&i>0),principal:i===0})),
      crownOfficer:crownOfficer,noblePatronage:noblePatronage,
      ownerCitizenships:ownerCitizenships,foreignOwnership:foreignOwnership,foreignContracts:foreignContracts,
      industries:industries,description:description.trim(),strategicClass:strategicClass,
      revenueBand:revenueBand,employeeCount:employeeCount.trim(),
      hqCountry:hqCountry,hqLocation:hqLocation.trim(),additionalLocations:additionalLocations.trim(),
      colonialLicense:colonialLicense,licensesHeld:licensesHeld,licensesSeeking:licensesSeeking,
      licenseStatus:"pending",registered:Date.now(),registrationNotes:"",
    };
    await onSubmit(biz);
    setSaving(false);setDone(regNo);
  }

  if(done)return <div style={{maxWidth:540}}>
    <div style={{background:"#0a1a10",border:"1px solid "+C.green,borderLeft:"4px solid "+C.greenL,borderRadius:"0 3px 3px 0",padding:"1.5rem",marginBottom:"1rem"}}>
      <div className="mono" style={{fontSize:9,letterSpacing:"0.25em",color:C.greenL,marginBottom:8}}>APPLICATION SUBMITTED</div>
      <div className="mono" style={{fontSize:20,color:C.gold,marginBottom:8}}>{done}</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,marginBottom:4}}>{legalName}</div>
      <div style={{fontSize:13,color:C.textD,lineHeight:1.7,borderTop:"1px solid "+C.border,paddingTop:"0.75rem",marginTop:"0.75rem"}}>
        Your registration application has been received by the Ministry of Finance and is pending review. You will be notified once your application has been processed. Please retain your reference number.
      </div>
    </div>
    <Btn variant="ghost" onClick={onCancel}>Back to Registry</Btn>
  </div>;

  return <div style={{maxWidth:660}}>
    <StepBar step={step} steps={["Identity","Ownership","Profile","Compliance"]}/>

    {step===1&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>{"STEP 1 \u2014 ENTERPRISE IDENTITY"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div><FL>LEGAL NAME OF ENTERPRISE *</FL><Inp value={legalName} onChange={setLegalName} placeholder="Full registered legal name"/></div>
        <div><FL>ALTERNATIVE TRADING NAMES <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(comma separated, optional)</span></FL><Inp value={tradingNamesRaw} onChange={setTradingNamesRaw} placeholder="e.g. Crown & Co, The Imperial Co."/></div>
        <div><FL>ENTITY TYPE *</FL>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:4}}>
            {ENTITY_TYPES.map(t=><div key={t} onClick={()=>setEntityType(t)} style={{padding:"8px 10px",cursor:"pointer",borderRadius:2,border:"1px solid "+(entityType===t?C.gold:C.border),background:entityType===t?"#181000":C.s1,transition:"all .12s",display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:12,height:12,borderRadius:"50%",border:"2px solid "+(entityType===t?C.gold:C.textDD),background:entityType===t?C.goldD:"transparent",flexShrink:0}}/>
              <span style={{fontSize:12,color:entityType===t?C.gold:C.textD}}>{t}</span>
            </div>)}
          </div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:"1.25rem"}}>
        <Btn disabled={!step1Valid} onClick={()=>setStep(2)}>{"Next \u2192"}</Btn>
      </div>
    </div>}

    {step===2&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>{"STEP 2 \u2014 OWNERSHIP & CONTROL"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div>
          <FL>BENEFICIAL OWNERS * <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(percentages must total 100%)</span></FL>
          {owners.map((o,i)=><div key={i} style={{background:C.s1,border:"1px solid "+C.border,borderLeft:"3px solid "+(i===0?C.goldD:C.border),borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginBottom:5}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span className="mono" style={{fontSize:8,color:i===0?C.gold:C.textDD,letterSpacing:"0.15em"}}>{i===0?"PRINCIPAL OWNER":"CO-OWNER "+i}</span>
              {owners.length>1&&<div style={{marginLeft:"auto"}}><Btn small variant="ghost" onClick={()=>removeOwner(i)}>{"\u2715"}</Btn></div>}
            </div>
            <div style={{display:"flex",gap:"0.5rem",alignItems:"flex-start",flexWrap:"wrap"}}>
              <div style={{flex:2,minWidth:180}}>
                <AccountPicker value={o.username}
                  onChange={v=>{
                    // Selecting an account offers its display name as the
                    // roleplay name; typing a bare username offers nothing.
                    if(o.manual){updateOwner(i,{username:v});return;}
                    const nm=accountName(accounts,v);
                    updateOwner(i,{username:v,rpName:v&&nm!==v?nm:""});
                  }}
                  accounts={accounts} manual={!!o.manual} onManualChange={m=>updateOwner(i,{manual:m})}
                  allowManual={i>0} blankLabel={i===0?"\u2014 Select your account \u2014":"\u2014 Select an account \u2014"}/>
              </div>
              <div style={{flex:2,minWidth:140}}><Inp value={o.rpName} onChange={v=>updateOwner(i,{rpName:v})} placeholder="Roleplay name (optional)"/></div>
              <div style={{flex:1,minWidth:60,maxWidth:80}}><Inp value={o.pct} onChange={v=>updateOwner(i,{pct:v})} placeholder="%" style={{textAlign:"right"}}/></div>
            </div>
          </div>)}
          <Disclaimer type="info">The principal owner must hold an Imperial Intranet account. Co-owners without an account may be recorded by username.</Disclaimer>
          {pctTotal!==100&&owners.some(o=>o.pct)&&<div className="mono" style={{fontSize:9,color:pctTotal===100?C.greenL:C.amber,marginTop:3}}>Total: {pctTotal.toFixed(1)}% {pctTotal===100?"\u2713":"(must equal 100%)"}</div>}
          {owners.length<6&&<Btn small variant="ghost" onClick={addOwner} style={{marginTop:4}}>+ Add Owner</Btn>}
        </div>
        <div style={{display:"flex",gap:"2rem",flexWrap:"wrap"}}>
          {[["Crown officer involved in ownership?",crownOfficer,setCrownOfficer,"warning"],["Noble patronage or charter held?",noblePatronage,setNoblePatronage,"info"],["Foreign ownership?",foreignOwnership,setForeignOwnership,"warning"],["Foreign government contracts?",foreignContracts,setForeignContracts,"warning"]].map(([label,val,set,type])=><div key={label} onClick={()=>set(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",flex:"0 0 auto"}}>
            <div style={{width:16,height:16,border:"2px solid "+(val?C.gold:C.border),borderRadius:2,background:val?C.goldD:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:val?C.gold:C.textDD}}>{val?"\u2713":""}</div>
            <span style={{fontSize:13,color:val?C.text:C.textD}}>{label}</span>
          </div>)}
        </div>
        {(crownOfficer||foreignOwnership)&&<Disclaimer type="warning">Enterprises with Crown officer involvement or foreign ownership may be subject to additional review by the Ministry.</Disclaimer>}
        <div><FL>OWNER CITIZENSHIPS <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(all owners, optional)</span></FL>
          <MultiCheck options={countryOpts.slice(0,12)} selected={ownerCitizenships} onChange={setOwnerCitizenships} cols={3}/>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={()=>setStep(1)}>{"\u2190 Back"}</Btn>
        <Btn disabled={!step2Valid} onClick={()=>setStep(3)}>{"Next \u2192"}</Btn>
      </div>
    </div>}

    {step===3&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>{"STEP 3 \u2014 BUSINESS PROFILE"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div><FL>INDUSTRIES OF RELEVANCE * <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(select all that apply)</span></FL><MultiCheck options={INDUSTRIES} selected={industries} onChange={setIndustries} cols={3}/></div>
        <div><FL>BUSINESS DESCRIPTION * <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(plain language summary of intended activities)</span></FL><TA value={description} onChange={setDescription} rows={4} placeholder="Describe the nature of your enterprise and its intended activities within the Empire..."/></div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:180}}>
            <FL>STRATEGIC CLASSIFICATION *</FL>
            <DD value={strategicClass} onChange={setStrategicClass} options={STRATEGIC_CLASSES.map(s=>({v:s,l:s}))}/>
            {strategicClass!=="Civillian"&&<Disclaimer type="warning">Non-civilian classification must be confirmed by a Ministry officer prior to registration taking effect.</Disclaimer>}
          </div>
          <div style={{flex:1,minWidth:180}}>
            <FL>REVENUE BAND *</FL>
            <DD value={revenueBand} onChange={setRevenueBand} options={[{v:"",l:"\u2014 Select revenue band \u2014"},...REVENUE_BANDS]}/>
          </div>
        </div>
        <div><FL>EMPLOYEE COUNT <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(usernames and/or number, optional)</span></FL><Inp value={employeeCount} onChange={setEmployeeCount} placeholder="e.g. 3 full-time employees"/></div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={()=>setStep(2)}>{"\u2190 Back"}</Btn>
        <Btn disabled={!step3Valid} onClick={()=>setStep(4)}>{"Next \u2192"}</Btn>
      </div>
    </div>}

    {step===4&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>{"STEP 4 \u2014 LOCATION & COMPLIANCE"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:180}}>
            <FL>COUNTRY OF REGISTRATION / HQ *</FL>
            <DD value={hqCountry} onChange={setHqCountry} options={[{v:"",l:"\u2014 Select country \u2014"},...countryOpts.map(c=>({v:c,l:c}))]}/>
          </div>
          <div style={{flex:1,minWidth:180}}>
            <FL>PRINCIPAL OFFICE LOCATION <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(areashop region)</span></FL>
            <Inp value={hqLocation} onChange={setHqLocation} placeholder="Region or city name"/>
          </div>
        </div>
        <div><FL>ADDITIONAL LOCATIONS / PARTIAL OWNERSHIP <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(optional)</span></FL><Inp value={additionalLocations} onChange={setAdditionalLocations} placeholder="List other regions; include ownership % if partial"/></div>
        <div>
          <FL>SPECIAL LICENSES CURRENTLY HELD <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(select all that apply)</span></FL>
          <MultiCheck options={SPECIAL_LICENSES} selected={licensesHeld} onChange={setLicensesHeld} cols={2}/>
        </div>
        <div>
          <FL>SPECIAL LICENSES BEING SOUGHT <span style={{fontStyle:"italic",color:C.textDD,fontWeight:400,letterSpacing:0}}>(select all that apply)</span></FL>
          <MultiCheck options={SPECIAL_LICENSES} selected={licensesSeeking} onChange={setLicensesSeeking} cols={2}/>
        </div>
        <div onClick={()=>setColonialLicense(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
          <div style={{width:16,height:16,border:"2px solid "+(colonialLicense?C.gold:C.border),borderRadius:2,background:colonialLicense?C.goldD:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:colonialLicense?C.gold:C.textDD}}>{colonialLicense?"\u2713":""}</div>
          <span style={{fontSize:13,color:colonialLicense?C.text:C.textD}}>Colonial Special Operations license held (Ministry of Colonies)</span>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={()=>setStep(3)}>{"\u2190 Back"}</Btn>
        <Btn disabled={!step4Valid} onClick={()=>setStep(5)}>{"Review \u2192"}</Btn>
      </div>
    </div>}

    {step===5&&<div className="fadeIn">
      <div className="mono" style={{fontSize:9,letterSpacing:"0.2em",color:C.textD,marginBottom:"0.85rem"}}>REVIEW YOUR APPLICATION</div>
      <div style={{background:C.s1,border:"1px solid "+C.border,borderTop:"3px solid "+C.gold,borderRadius:"0 0 4px 4px",padding:"1.25rem",marginBottom:"1rem"}}>
        <div style={{marginBottom:"0.75rem"}}><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:3}}>LEGAL NAME</div><div style={{fontFamily:"'Cinzel',serif",fontSize:15,color:C.text}}>{legalName}</div>{tradingNamesRaw&&<div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>Trading as: {tradingNamesRaw}</div>}</div>
        <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap",marginBottom:"0.75rem"}}>
          <div><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:2}}>TYPE</div><div style={{fontSize:13,color:C.text}}>{entityType}</div></div>
          <div><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:2}}>HQ</div><div style={{fontSize:13,color:C.text}}>{hqCountry}{hqLocation?" \u2014 "+hqLocation:""}</div></div>
          <div><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:2}}>CLASSIFICATION</div><div style={{fontSize:13,color:C.text}}>{strategicClass}</div></div>
          <div><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:2}}>REVENUE</div><div style={{fontSize:13,color:C.text}}>{REVENUE_BANDS.find(r=>r.v===revenueBand)?.l||revenueBand}</div></div>
        </div>
        <div style={{marginBottom:"0.75rem"}}><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:3}}>OWNERS</div>{owners.map((o,i)=><div key={i} style={{fontSize:13,color:C.text,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span>{o.rpName||accountName(accounts,o.username)} ({o.pct}%)</span>
          <span className="mono" style={{fontSize:9,color:C.textDD}}>@{o.username}</span>
          {o.manual&&i>0&&<span className="mono" style={{fontSize:8,color:C.amber,border:"1px solid "+C.amberD,borderRadius:1,padding:"0 4px"}}>NO ACCOUNT</span>}
        </div>)}</div>
        {industries.length>0&&<div style={{marginBottom:"0.75rem"}}><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:3}}>INDUSTRIES</div><div style={{fontSize:12,color:C.textD}}>{industries.join(", ")}</div></div>}
        <div style={{borderTop:"1px solid "+C.border,paddingTop:"0.75rem"}}><div className="mono" style={{fontSize:8,color:C.textDD,marginBottom:3}}>DESCRIPTION</div><div style={{fontSize:13,color:C.text,lineHeight:1.7}}>{description}</div></div>
      </div>
      <Disclaimer type="info">By submitting this application you declare the information provided is accurate to the best of your knowledge. Wilful false declarations may result in refusal or revocation of registration.</Disclaimer>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem",alignItems:"center"}}>
        <Btn variant="ghost" onClick={()=>setStep(4)}>{"\u2190 Edit"}</Btn>
        <Btn disabled={saving} onClick={submitForm}>{saving?"Submitting...":"Submit Application"}</Btn>
      </div>
    </div>}
  </div>;
}

// ── CERTIFICATE OF OPERATIONS ─────────────────────────────────────────────────
// Issued when the Ministry admits an enterprise to the register. The signature
// is the Minister of Finance in office at the moment of authorisation and is
// frozen onto the record — a later Minister does not retroactively sign it.
function certNoFor(b){return "COO-"+String(b.registrationNo||"").replace(/^MoF-/,"");}
function CertificateDoc({business:b,onClose}){
  const cert=b.certificate||{};
  const owners=b.owners||[];
  const D={ink:"#1a1408",inkD:"#6a5c3a",rule:"#b9a468",gold:"#8a6c20",paper:"#f6f1e2"};
  // Marks the body only while the certificate is on screen, so printing any
  // other page of the portal is unaffected.
  useEffect(()=>{document.body.classList.add("cert-print");return()=>document.body.classList.remove("cert-print");},[]);
  return <div className="certoverlay" style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(4,4,2,.94)",overflowY:"auto",padding:"1.5rem"}}>
    <div className="noprint" style={{maxWidth:800,margin:"0 auto 1rem",display:"flex",gap:8,justifyContent:"flex-end"}}>
      <Btn small onClick={()=>window.print()}>Save as PDF / Print</Btn>
      <Btn small variant="ghost" onClick={onClose}>Close</Btn>
    </div>
    <div className="printsheet" style={{maxWidth:800,margin:"0 auto",background:D.paper,color:D.ink,
      padding:"3rem 3.25rem",border:"1px solid "+D.rule,boxShadow:"0 0 40px rgba(0,0,0,.6)",position:"relative"}}>
      <div style={{position:"absolute",inset:10,border:"2px solid "+D.rule,pointerEvents:"none"}}/>
      <div style={{position:"absolute",inset:16,border:"1px solid "+D.rule+"88",pointerEvents:"none"}}/>
      <div style={{position:"relative",textAlign:"center",paddingBottom:"1.25rem",borderBottom:"2px solid "+D.rule,marginBottom:"1.75rem"}}>
        <div style={{fontSize:34,color:D.gold,lineHeight:1,marginBottom:6}}>⚜</div>
        <div className="mono" style={{fontSize:9,letterSpacing:"0.5em",color:D.inkD,marginBottom:6}}>EMPIRE OF LECH</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:600,letterSpacing:"0.22em",color:D.ink,marginBottom:10}}>MINISTRY OF FINANCE</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:26,fontWeight:700,letterSpacing:"0.1em",color:D.ink}}>Certificate of Operations</div>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.25em",color:D.gold,marginTop:8}}>{cert.certNo||certNoFor(b)}</div>
      </div>

      <div style={{fontSize:16,lineHeight:2,textAlign:"center",fontStyle:"italic",color:D.ink,marginBottom:"1.75rem"}}>
        This is to certify that the enterprise named below has been duly entered upon the Imperial Register of
        Enterprises, and is authorised to conduct lawful commerce within the Empire of Lech and its territories,
        subject to the laws of the Empire and to the continuing supervision of this Ministry.
      </div>

      <div style={{textAlign:"center",padding:"1.25rem 0",borderTop:"1px solid "+D.rule,borderBottom:"1px solid "+D.rule,marginBottom:"1.5rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:700,color:D.ink,letterSpacing:"0.04em"}}>{b.legalName}</div>
        {b.tradingNames?.length>0&&<div style={{fontSize:14,fontStyle:"italic",color:D.inkD,marginTop:4}}>trading as {b.tradingNames.join(", ")}</div>}
        <div className="mono" style={{fontSize:11,color:D.gold,letterSpacing:"0.2em",marginTop:8}}>{b.registrationNo}</div>
      </div>

      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14,marginBottom:"1.5rem"}}>
        <tbody>
          {[
            ["Entity Type",b.entityType],
            ["Registered Office",[b.hqCountry,b.hqLocation].filter(Boolean).join(" — ")],
            ["Industries",(b.industries||[]).join(", ")],
            ["Strategic Classification",b.strategicClass],
            ["Revenue Band",REVENUE_BANDS.find(r=>r.v===b.revenueBand)?.l||b.revenueBand],
            ["Beneficial Owners",owners.map(o=>(o.rpName||o.username)+" ("+(o.pct||"100")+"%)").join(", ")],
            ["Special Licenses",(b.licensesHeld||[]).join(", ")||"None recorded"],
            ["Date of Registration",b.registered?fmtDate(b.registered):"—"],
          ].filter(([,v])=>v).map(([k,v])=><tr key={k} style={{borderBottom:"1px solid "+D.rule+"55"}}>
            <td className="mono" style={{padding:"7px 0",fontSize:9,letterSpacing:"0.12em",color:D.inkD,width:190,verticalAlign:"top"}}>{String(k).toUpperCase()}</td>
            <td style={{padding:"7px 0",color:D.ink}}>{v}</td>
          </tr>)}
        </tbody>
      </table>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:24,marginTop:"2.5rem",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:220}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:22,color:D.gold,fontStyle:"italic",
            borderBottom:"1px solid "+D.ink,paddingBottom:4,marginBottom:6}}>{cert.ministerName||"—"}</div>
          <div className="mono" style={{fontSize:9,letterSpacing:"0.15em",color:D.inkD}}>MINISTER OF FINANCE</div>
          {cert.ministerUsername&&<div className="mono" style={{fontSize:8,color:D.inkD,marginTop:2}}>@{cert.ministerUsername}</div>}
          <div className="mono" style={{fontSize:9,color:D.inkD,marginTop:6}}>ISSUED {cert.issuedAt?fmtDate(cert.issuedAt).toUpperCase():"—"}</div>
        </div>
        <div style={{width:120,height:120,borderRadius:"50%",border:"2px solid "+D.gold,display:"flex",
          flexDirection:"column",alignItems:"center",justifyContent:"center",color:D.gold,textAlign:"center",
          transform:"rotate(-8deg)",flexShrink:0,opacity:.85}}>
          <div style={{fontSize:22,lineHeight:1}}>⚜</div>
          <div className="mono" style={{fontSize:6,letterSpacing:"0.15em",marginTop:4,padding:"0 8px"}}>MINISTRY OF FINANCE</div>
          <div className="mono" style={{fontSize:6,letterSpacing:"0.15em"}}>EMPIRE OF LECH</div>
          <div className="mono" style={{fontSize:6,letterSpacing:"0.1em",marginTop:3}}>SEALED</div>
        </div>
      </div>

      <div style={{marginTop:"2rem",paddingTop:"0.85rem",borderTop:"1px solid "+D.rule,textAlign:"center"}}>
        <div className="mono" style={{fontSize:8,color:D.inkD,letterSpacing:"0.15em",lineHeight:1.9}}>
          THIS CERTIFICATE REMAINS VALID ONLY WHILE THE REGISTRATION ABOVE IS IN GOOD STANDING.<br/>
          IT MAY BE VERIFIED AGAINST THE IMPERIAL REGISTER OF ENTERPRISES · FIAT PECUNIA
        </div>
      </div>
    </div>
  </div>;
}

// ── PAYROLL PUBLIC VIEW ───────────────────────────────────────────────────────
function PayrollPublic({payroll}){
  const grouped=useMemo(()=>{
    const g={};PAYROLL_CATEGORIES.forEach(c=>{g[c]=[];});
    Object.values(payroll||{}).forEach(p=>{if(g[p.category])g[p.category].push(p);else if(g.Extra)g.Extra.push(p);});
    return g;
  },[payroll]);
  const hasAny=Object.values(grouped).some(arr=>arr.length>0);
  if(!hasAny)return <div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No payroll rates on record.</div>;
  return <div className="fadeIn">
    <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.5rem"}}>Imperial paycheck rates by permission group. Payments are executed automatically in-game by the server economy plugin.</div>
    {PAYROLL_CATEGORIES.map(cat=>{
      const entries=grouped[cat]||[];if(entries.length===0)return null;
      entries.sort((a,b)=>(a.pexGroup||"").localeCompare(b.pexGroup||""));
      const total=entries.reduce((a,e)=>a+(Number(e.amount)||0),0);
      return <div key={cat} style={{marginBottom:"1rem",border:"1px solid "+C.border,borderRadius:6,overflow:"hidden"}}>
        <div style={{background:C.s1,padding:"6px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+C.border}}>
          <span className="mono" style={{fontSize:9,color:C.gold,letterSpacing:"0.2em"}}>{cat.toUpperCase()}</span>
          <span className="mono" style={{fontSize:9,color:C.textDD}}>{entries.length} GROUP{entries.length!==1?"S":""}</span>

// ── EXPENDITURE TRACKER ───────────────────────────────────────────────────────
// Money may only be drawn against a line the Bundeskongress actually voted, so
// the accounts here are read straight out of the ratified budget rather than
// kept as a list of their own. A line that vanishes from the next budget stops
// being spendable the moment that budget is ratified.
function allocationsFrom(activeBudget){
  const data=activeBudget?.data||{};
  const out=[];
  BUDGET_PORTFOLIOS.forEach(p=>{
    const m=data.ministries?.[p];
    if(!m)return;
    const base=parseFloat(m.total)||0;
    if(base>0)out.push({key:"min::"+p,label:p,portfolio:p,amount:base,kind:"ministry"});
    (m.agencies||[]).forEach((ag,i)=>{
      const amt=parseFloat(ag.amount)||0;
      if(amt>0)out.push({key:"ag::"+p+"::"+i,label:ag.name||"Agency "+(i+1),portfolio:p,amount:amt,kind:"agency",parent:p});
    });
  });
  (data.special||[]).forEach((s,i)=>{
    const amt=parseFloat(s.amount)||0;
    // Special allocations answer to no portfolio, so the Finance Minister holds them.
    if(amt>0)out.push({key:"spec::"+i,label:s.label||"Special Allocation "+(i+1),portfolio:"Minister of Finance",amount:amt,kind:"special"});
  });
  return out;
}
// The rule applied to a request is the rule as it stood when the request was
// made, so the chain is computed once and frozen onto the record.
function approvalPlan(amount,portfolio){
  const n=Number(amount)||0;
  const stages=[{id:"portfolio",label:"Portfolio Minister",offices:[portfolio]}];
  if(n>CHANCELLOR_THRESHOLD)
    stages.push({id:"senior",label:"Chancellor",offices:["Chancellor"],
      why:"Expenditure exceeds "+fmtCur(CHANCELLOR_THRESHOLD)+" — the Chancellor's signature is required."});
  else if(n>SENIOR_THRESHOLD)
    stages.push({id:"senior",label:"Senior Sign-Off",offices:["Minister of Finance","Vice Chancellor","Chancellor"],
      why:"Expenditure exceeds "+fmtCur(SENIOR_THRESHOLD)+" — a second signature from the Minister of Finance, Vice Chancellor or Chancellor is required."});
  return stages;
}
function genExpRef(expenditures){
  const yr=new Date().getFullYear();
  const existing=new Set(Object.values(expenditures||{}).map(e=>e.ref));
  let ref,a=0;
  do{ref="EXP-"+yr+"-"+String(Math.floor(Math.random()*9000)+1000);a++;}while(existing.has(ref)&&a<50);
  return ref;
}
const nextStage=(e)=>(e.stages||[]).find(s=>!(e.approvals||{})[s.id]);
// The Emperor may sign in place of any officeholder. It is recorded as the
// prerogative it is, never as though the minister had signed.
function canSignStage(user,officials,stage){
  if(!user||!stage)return false;
  if(user.role==="emperor")return true;
  return (stage.offices||[]).some(o=>holdsOffice(officials,o,user));
}
function signingOffice(user,officials,stage){
  const held=(stage.offices||[]).find(o=>holdsOffice(officials,o,user));
  return held||(user.role==="emperor"?"Imperial Prerogative":"");
}

}

      return <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",

      {over&&<Disclaimer type="warning">This request exceeds the {fmtCur(remaining)} remaining on {alloc.label}. It may still be submitted, but the signing minister will see the overdraw.</Disclaimer>}
      {alloc&&n>0&&<div>
        <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.15em",marginBottom:5}}>SIGNATURES THIS REQUEST WILL NEED</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {plan.map(s=><div key={s.id} style={{background:C.s1,border:"1px solid "+C.border,borderLeft:"3px solid "+C.goldD,
            borderRadius:"0 2px 2px 0",padding:"5px 10px",fontSize:12,color:C.textD}}>
            <span className="mono" style={{fontSize:9,color:C.gold,letterSpacing:"0.1em",marginRight:8}}>{s.label.toUpperCase()}</span>
            {s.offices.map(o=>o+" ("+holderLabel(officials,o)+")").join(" or ")}
          </div>)}
        </div>
        {plan.length>1&&<Disclaimer type="info">{plan[1].why}</Disclaimer>}
      </div>}
      <div><Btn disabled={!valid||saving} onClick={async()=>{
        setSaving(true);setProcessing("Submitting request...");
        await onAction("createExpenditure",{
          id:"exp_"+uid(),ref:genExpRef(expenditures),
          budgetId:activeBudget?.id||null,budgetTitle:activeBudget?.title||"",
          allocKey:alloc.key,allocLabel:alloc.label,allocKind:alloc.kind,portfolio:alloc.portfolio,
          amount:n,purpose:purpose.trim(),justification:justification.trim(),
          requestedBy:user.username,requestedByName:user.displayName||user.username,requestedAt:Date.now(),
          status:"pending",stages:plan.map(s=>({id:s.id,label:s.label,offices:s.offices})),approvals:{},
        });
        setProcessing(null);setSaving(false);notify("Expenditure request submitted.",C.gold);
        setAllocKey("");setAmount("");setPurpose("");setJustification("");
        if(onDone)onDone();
      }}>{saving?"Submitting...":"Submit Request"}</Btn></div>
    </div>
  </div>;
}

function ExpenditureTracker({expenditures,activeBudget,officials,user,onAction,notify,setProcessing,onRequireSignIn,onSignOut}){
  const [sub,setSub]=useState("log");
  const allocations=useMemo(()=>allocationsFrom(activeBudget),[activeBudget]);
  const all=useMemo(()=>Object.values(expenditures||{}).sort((a,b)=>(b.requestedAt||0)-(a.requestedAt||0)),[expenditures]);
  // A voided expenditure stays on the log but stops being money: `logged` is
  // what the register shows, `charged` is what the allocations have actually
  // spent. Every sum below must come from `charged`.
  const logged=all.filter(e=>e.status==="approved"||e.status==="voided");
  const charged=all.filter(e=>e.status==="approved");
  const pending=all.filter(e=>e.status==="pending");
  const awaitingMe=useMemo(()=>pending.filter(e=>canSignStage(user,officials,nextStage(e))),[pending,user,officials]);
  const mine=useMemo(()=>user?all.filter(e=>String(e.requestedBy||"").toLowerCase()===String(user.username||"").toLowerCase()):[],[all,user]);
  const totalLogged=charged.filter(e=>e.budgetId===activeBudget?.id).reduce((a,e)=>a+(Number(e.amount)||0),0);
  const noBudget=!activeBudget||allocations.length===0;

  return <div className="fadeIn">
    <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",marginBottom:"1.25rem"}}>
      {[["Committed This Budget",totalLogged,C.gold],["Awaiting Sign-Off",pending.length,C.amber],["Expenditures Logged",charged.length,C.greenL]]
        .map(([l,v,c],i)=><div key={l} style={{flex:1,minWidth:150,background:C.s1,border:"1px solid "+c+"33",borderTop:"3px solid "+c,
          borderRadius:"0 0 3px 3px",padding:"0.75rem 1rem"}}>
        <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.15em",marginBottom:4}}>{l.toUpperCase()}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:c,fontWeight:700}}>{i===0?fmtCur(v):v}</div>
      </div>)}
    </div>

    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.25rem",flexWrap:"wrap"}}>
      <div style={{display:"flex",gap:0,borderBottom:"1px solid "+C.border,flex:1,flexWrap:"wrap"}}>
        {[["log","Logged Expenditures"],["pending","Awaiting Sign-Off"+(pending.length?" ("+pending.length+")":"")],["allocations","Allocations"]]
          .concat(user?[["mine","My Requests"+(mine.length?" ("+mine.length+")":"")],["request","Request Expenditure"]]:[])
          .concat(user&&awaitingMe.length?[["sign","For My Signature ("+awaitingMe.length+")"]]:[])
          .map(([v,l])=><button key={v} onClick={()=>setSub(v)} style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",
            textTransform:"uppercase",padding:"0.6rem 0.9rem",background:"transparent",border:"none",cursor:"pointer",
            borderBottom:"2px solid "+(sub===v?C.gold:"transparent"),color:sub===v?C.gold:(v==="sign"?C.amber:C.textD)}}>{l}</button>)}
      </div>
      {user
        ?<div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="mono" style={{fontSize:9,color:C.textD}}>{user.displayName||user.username}</span>
          <Btn small variant="ghost" onClick={onSignOut}>Sign Out</Btn>
        </div>
        :<Btn small onClick={onRequireSignIn}>Sign In to Request</Btn>}
    </div>

    {!user&&<div style={{marginBottom:"1rem"}}><Disclaimer type="info">Requesting an expenditure requires an Imperial Intranet account. The record below is open to public inspection.</Disclaimer></div>}
    {noBudget&&<div style={{marginBottom:"1rem"}}><Disclaimer type="danger">There is no ratified budget with spendable allocations. No new expenditure may be drawn until the Bundeskongress passes a budget.</Disclaimer></div>}

    {sub==="log"&&(logged.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No expenditures have been authorised and logged.</div>
      :logged.map(e=><ExpCard key={e.id} exp={e} officials={officials} user={user} onAction={onAction} notify={notify} setProcessing={setProcessing}/>))}

    {sub==="pending"&&(pending.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>Nothing is awaiting sign-off.</div>
      :pending.map(e=><ExpCard key={e.id} exp={e} officials={officials} user={user} onAction={onAction} notify={notify} setProcessing={setProcessing}/>))}

    {sub==="sign"&&(awaitingMe.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>Nothing awaits your signature.</div>
      :awaitingMe.map(e=><ExpCard key={e.id} exp={e} officials={officials} user={user} onAction={onAction} notify={notify} setProcessing={setProcessing} defaultOpen/>))}

    {sub==="mine"&&(mine.length===0
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>You have not requested any expenditure.</div>
      :mine.map(e=><ExpCard key={e.id} exp={e} officials={officials} user={user} onAction={onAction} notify={notify} setProcessing={setProcessing}/>))}

    {sub==="request"&&user&&(noBudget
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No allocations are available to draw on.</div>
      :<ExpRequestForm allocations={allocations} expenditures={expenditures} activeBudget={activeBudget} user={user}
        officials={officials} onAction={onAction} notify={notify} setProcessing={setProcessing} onDone={()=>setSub("mine")}/>)}

    {sub==="allocations"&&(noBudget
      ?<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No allocations on record.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:3}}>
        {allocations.map(a=>{
          const committed=charged.filter(e=>e.allocKey===a.key&&e.budgetId===activeBudget?.id).reduce((x,e)=>x+(Number(e.amount)||0),0);
          const pend=pending.filter(e=>e.allocKey===a.key&&e.budgetId===activeBudget?.id).reduce((x,e)=>x+(Number(e.amount)||0),0);
          const rem=a.amount-committed;
          const pct=a.amount>0?Math.min(100,(committed/a.amount)*100):0;
          const col=rem<0?C.redL:rem<a.amount*0.2?C.amber:C.greenL;
          return <div key={a.key} style={{background:C.s1,border:"1px solid "+C.border,
            borderLeft:"3px solid "+(a.kind==="special"?"#8a6a9a":a.kind==="agency"?C.silverD:C.goldD),
            borderRadius:"0 3px 3px 0",padding:"0.6rem 1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,flexWrap:"wrap"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,flex:1,minWidth:150}}>
                {a.kind==="agency"?"↳ ":a.kind==="special"?"★ ":""}{a.label}
              </span>
              <span className="mono" style={{fontSize:9,color:C.textDD}}>{holderLabel(officials,a.portfolio)} signs</span>
              <span className="mono" style={{fontSize:12,color:col,fontWeight:700}}>{fmtCur(rem)} left</span>
              <span className="mono" style={{fontSize:9,color:C.textDD}}>of {fmtCur(a.amount)}</span>
            </div>
            <div style={{height:4,background:C.s3,borderRadius:2,overflow:"hidden"}}>
              <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+col+"66,"+col+")"}}/>
            </div>
            {pend>0&&<div className="mono" style={{fontSize:9,color:C.amber,marginTop:3}}>{fmtCur(pend)} awaiting sign-off</div>}
          </div>;
        })}
      </div>)}
  </div>;
}

// ── PANEL AUTH ────────────────────────────────────────────────────────────────
// One sign-in serves the whole portal. The Finance panel additionally demands a
// Finance role; the expenditure register does not, because the ministers who
// must sign off on spending are not Finance officers and never will be.
function PanelAuth({onAuth,onCancel,requireMof=true}){
  const [username,setUsername]=useState("");const [password,setPassword]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function doAuth(){
    if(!username.trim()||!password.trim()){setErr("Credentials required.");return;}
    setLoading(true);setErr("");
    try{
      const res=await slogin(username,password);
      if(!res.ok){setErr(res.error||"ACCESS DENIED.");setLoading(false);return;}
      const user=res.account;
      const hasAccess=!requireMof||user.role==="emperor"||user.mofAccess||user.mofRole;
      if(!hasAccess){setErr("AUTHORISATION DENIED \u2014 Finance panel access not granted.");setLoading(false);return;}
      const raw=await sgetAll();
      onAuth(user,raw);
    }catch(e){setErr("Connection error: "+e.message);}
    setLoading(false);
  }
  return <div style={{maxWidth:420,margin:"0 auto"}}>
    <STitle>{requireMof?"Finance Panel Authentication":"Imperial Intranet Sign-In"}</STitle>
    <div style={{background:C.s1,border:"1px solid "+C.border,borderTop:"3px solid "+C.gold,padding:"1.75rem"}}>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.8,marginBottom:"1.25rem",textAlign:"center"}}>
        {requireMof?"Restricted to officers of the Ministry of Finance. Authenticate using your Imperial Intranet credentials."
          :"Any Imperial Intranet account may request an expenditure. Ministers, the Vice Chancellor and the Chancellor sign here."}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
        <div><FL>PASSWORD</FL><Inp value={password} onChange={setPassword} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:C.redL,background:"#1a0808",border:"1px solid "+C.redD+"44",padding:"7px 12px"}}>{err}</div>}
        <Btn onClick={doAuth} disabled={loading||!username.trim()||!password.trim()}>{loading?"Authenticating...":"Authenticate"}</Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

function PanelRegistry({businesses,countries,accounts,officials,user,onAction,notify,setProcessing,isMinister}){
  const [sub,setSub]=useState("review");
  const [search,setSearch]=useState("");
  const pending=Object.values(businesses||{}).filter(b=>b.licenseStatus==="pending");
  const allList=useMemo(()=>Object.values(businesses||{}).filter(b=>{const q=search.toLowerCase();return!q||b.legalName?.toLowerCase().includes(q)||(b.registrationNo||"").toLowerCase().includes(q);}).sort((a,b)=>(b.registered||0)-(a.registered||0)),[businesses,search]);

  return <div>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid "+C.border,marginBottom:"1.5rem"}}>
      {[["review","Applications"+(pending.length>0?" ("+pending.length+")":"")],["all","All Enterprises"],["add","Register Enterprise"]].map(([v,l])=><button key={v} onClick={()=>setSub(v)} style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",padding:"0.6rem 1rem",background:"transparent",border:"none",cursor:"pointer",borderBottom:"2px solid "+(sub===v?C.gold:"transparent"),color:sub===v?C.gold:C.textD}}>{l}</button>)}
    </div>

    {sub==="review"&&<div>
      {pending.length===0?<div style={{textAlign:"center",padding:"2rem",color:C.textDD,fontStyle:"italic"}}>No pending applications.</div>
      :pending.map(b=><PanelBusinessCard key={b.id} business={b} onAction={onAction} notify={notify} setProcessing={setProcessing} isMinister={isMinister} user={user} officials={officials}/>)}
    </div>}

    {sub==="all"&&<div>
      <div style={{marginBottom:"1rem"}}><Inp value={search} onChange={setSearch} placeholder="Search by name or registration number..."/></div>
      <div className="mono" style={{fontSize:9,color:C.textDD,marginBottom:"0.75rem"}}>{allList.length} ENTERPRISE{allList.length!==1?"S":""}</div>
      {allList.map(b=><PanelBusinessCard key={b.id} business={b} onAction={onAction} notify={notify} setProcessing={setProcessing} isMinister={isMinister} user={user} officials={officials}/>)}
    </div>}

    {sub==="add"&&<RegistrationForm countries={countries} businesses={businesses} accounts={accounts}
      onSubmit={async(biz)=>{setProcessing("Registering...");await onAction("createBusiness",biz);setProcessing(null);notify(biz.registrationNo+" registered (pending).",C.gold);setSub("review");}}
      onCancel={()=>setSub("all")}/>}
  </div>;
}

function PanelBusinessCard({business:b,onAction,notify,setProcessing,isMinister,user,officials}){
  const [open,setOpen]=useState(b.licenseStatus==="pending");
  const [notes,setNotes]=useState(b.registrationNotes||"");
  const [status,setStatus]=useState(b.licenseStatus||"pending");
  const [saving,setSaving]=useState(false);
  const [cert,setCert]=useState(false);
  // Admitting an enterprise to the register is what authorises its certificate,
  // so the two happen in one act. The Minister in office signs it; if the seat
  // is vacant the officer who admitted it signs in their own name.
  async function saveStatus(){
    setSaving(true);setProcessing("Updating...");
    const patch={id:b.id,licenseStatus:status,registrationNotes:notes};
    if(status==="active"&&!b.certificate){
      const h=holderOf(officials,"Minister of Finance");
      const vacant=!h.name||h.name==="Vacant";
      patch.certificate={certNo:certNoFor(b),issuedAt:Date.now(),
        ministerName:vacant?(user.displayName||user.username):(h.name||h.username),
        ministerUsername:vacant?user.username:(h.username||""),
        authorisedBy:user.username};
    }
    await onAction("updateBusiness",patch);
    setProcessing(null);setSaving(false);
    notify(patch.certificate?b.registrationNo+" registered — certificate issued.":b.registrationNo+" updated.",C.gold);
  }
  return <div style={{background:C.s1,border:"1px solid "+(b.licenseStatus==="pending"?"#4a3000":C.border),borderLeft:"4px solid "+(b.licenseStatus==="active"?C.greenD:b.licenseStatus==="pending"?C.amberD:C.redD),borderRadius:"0 3px 3px 0",marginBottom:"0.5rem",overflow:"hidden"}}>
    {cert&&<CertificateDoc business={b} onClose={()=>setCert(false)}/>}
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"0.75rem 1rem",cursor:"pointer",flexWrap:"wrap"}}>
      <StatusBadge status={b.licenseStatus||"pending"}/>
      <span className="mono" style={{fontSize:9,color:C.textD}}>{b.registrationNo}</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,flex:1}}>{b.legalName}</span>
      <span style={{fontSize:11,color:C.textD,fontStyle:"italic"}}>{b.entityType}</span>
      <span style={{fontSize:11,color:C.textDD}}>{open?"\u25B2":"\u25BC"}</span>
    </div>
    {open&&<div style={{borderTop:"1px solid "+C.border,padding:"1rem",background:C.s2}}>
      <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap",marginBottom:"0.85rem",fontSize:13,color:C.textD}}>
        {b.owners?.map((o,i)=><span key={i}>{o.rpName||o.username} <span className="mono" style={{fontSize:10,color:C.textDD}}>@{o.username}</span>{o.hasAccount===false?<span className="mono" style={{fontSize:8,color:C.amber,marginLeft:4}}>(no account)</span>:""} ({o.pct}%)</span>)}
        {b.hqCountry&&<span>HQ: {b.hqCountry}{b.hqLocation?" \u2014 "+b.hqLocation:""}</span>}
        {b.industries?.length>0&&<span>{b.industries.join(", ")}</span>}
        {b.strategicClass&&b.strategicClass!=="Civillian"&&<span style={{color:C.amber}}>{b.strategicClass}</span>}
      </div>
      {b.description&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"0.85rem"}}>{b.description}</div>}
      {isMinister&&<div style={{background:C.s1,border:"1px solid "+C.border,borderRadius:3,padding:"0.85rem",marginTop:"0.5rem"}}>
        <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>MINISTRY ACTIONS</div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"flex-end",marginBottom:"0.65rem"}}>
          <div style={{flex:1,minWidth:160}}><FL>LICENSE STATUS</FL>
            <DD value={status} onChange={setStatus} options={LICENSE_STATUSES.map(s=>({v:s,l:s.charAt(0).toUpperCase()+s.slice(1)}))}/>
          </div>
          <Btn small variant={status==="active"?"green":status==="revoked"?"danger":"primary"} disabled={saving} onClick={saveStatus}>{saving?"Saving...":"Update Status"}</Btn>
          {b.certificate&&<Btn small variant="ghost" onClick={()=>setCert(true)}>View Certificate</Btn>}
          <ArmBtn small label="Delete Record" confirmLabel="Delete permanently?" onConfirm={async()=>{setProcessing("Removing...");await onAction("deleteBusiness",{id:b.id});setProcessing(null);notify(b.registrationNo+" deleted.",C.textD);}}/>
        </div>
        {status==="active"&&!b.certificate&&<div style={{marginBottom:"0.65rem"}}><Disclaimer type="success">Setting this enterprise to Active will authorise its Certificate of Operations, signed by {holderLabel(officials,"Minister of Finance")}.</Disclaimer></div>}
        {b.certificate&&<div style={{marginBottom:"0.65rem"}}><Disclaimer type="info">Certificate {b.certificate.certNo} issued {fmtDate(b.certificate.issuedAt)}, signed by {b.certificate.ministerName}.</Disclaimer></div>}
        <div><FL>MINISTRY NOTES / REJECTION REASON</FL><TA value={notes} onChange={setNotes} rows={2} placeholder="Internal notes or reason for rejection/suspension..."/></div>
        {notes!==b.registrationNotes&&<div style={{marginTop:6}}><Btn small variant="ghost" onClick={async()=>{setSaving(true);await onAction("updateBusiness",{id:b.id,registrationNotes:notes});setSaving(false);notify("Notes saved.",C.textD);}}>Save Notes</Btn></div>}
      </div>}
    </div>}
  </div>;
}

// ── PANEL: PAYROLL MANAGEMENT ─────────────────────────────────────────────────
// Every rate carries the trail of who set it to what. It is kept inside the
// panel rather than on the public rate table — the public needs the rate, the
// Ministry needs the accountability.
function SalaryHistory({entry}){
  const hist=[...(entry.history||[])].sort((a,b)=>(b.at||0)-(a.at||0));
  if(hist.length===0)return <div style={{padding:"8px 14px",fontSize:12,color:C.textDD,fontStyle:"italic"}}>No salary history recorded for this rate.</div>;
  return <div style={{padding:"2px 14px 10px"}}>
    <div className="mono" style={{fontSize:8,color:C.textDD,letterSpacing:"0.15em",marginBottom:6}}>SALARY HISTORY — {hist.length} CHANGE{hist.length!==1?"S":""}</div>
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      {hist.map((h,i)=>{
        const rise=h.prev!=null&&h.amount>h.prev, fall=h.prev!=null&&h.amount<h.prev;
        return <div key={i} style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",background:i===0?C.s2:"transparent",
          border:"1px solid "+(i===0?C.border:"transparent"),borderRadius:2,padding:"4px 8px"}}>
          <span className="mono" style={{fontSize:9,color:C.textDD,width:96,flexShrink:0}}>{fmtDateShort(h.at)}</span>
          <span className="mono" style={{fontSize:12,color:C.gold,fontWeight:700,width:80}}>{fmtCur(h.amount)}</span>
          <span className="mono" style={{fontSize:9,color:rise?C.greenL:fall?C.redL:C.textDD,width:110,flexShrink:0}}>
            {h.prev==null?"INITIAL RATE":(rise?"▲ ":"▼ ")+"from "+fmtCur(h.prev)}
          </span>
          <span style={{fontSize:12,color:C.textD,fontStyle:"italic",flex:1}}>set by {h.byName||h.by}</span>
          {h.by&&<span className="mono" style={{fontSize:9,color:C.textDD}}>@{h.by}</span>}
        </div>;
      })}
    </div>
  </div>;
}

function PayrollEditRow({entry,onSave,onRemove,setProcessing,notify}){
  const [editing,setEditing]=useState(false);
  const [showHist,setShowHist]=useState(false);
  const [pexGroup,setPexGroup]=useState(entry.pexGroup||"");
  const [roleName,setRoleName]=useState(entry.roleName||"");
  const [category,setCategory]=useState(entry.category||"Extra");
  const [amount,setAmount]=useState(String(entry.amount||""));

    <div style={{borderBottom:"1px solid "+C.border+"44"}}>
      <div style={{padding:"8px 14px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span className="mono" style={{fontSize:11,color:C.text,flex:1}}>{entry.pexGroup}</span>
        <span style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{entry.roleName||""}</span>

        <Btn small variant="ghost" onClick={()=>setEditing(true)}>Edit</Btn>

      </div>
      {showHist&&<SalaryHistory entry={entry}/>}

  );
  return(
