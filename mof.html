  const bkBills=useMemo(()=>{const b={};Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("bk_bill_")&&v)b[k]=v;});return b;},[raw]);
  const countries=useMemo(()=>raw["mfa_countries"]||{},[raw]);
  const businesses=useMemo(()=>raw["mof_businesses"]||{},[raw]);
  const payroll=useMemo(()=>raw["mof_payroll"]||{},[raw]);
  const debts=useMemo(()=>raw["mof_debts"]||{},[raw]);
  const expenditures=useMemo(()=>raw["mof_expenditures"]||{},[raw]);
  const announcement=useMemo(()=>raw["mof_announcement"]||null,[raw]);
  const shutdown=useMemo(()=>raw["mof_shutdown"]||null,[raw]);
  const accounts=useMemo(()=>accountsFrom(raw),[raw]);
  const officials=useMemo(()=>raw["bk_officials"]||{},[raw]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createBusiness"){const next={...businesses,[payload.id]:payload};setRaw(r=>({...r,mof_businesses:next}));await sset("mof_businesses",next);}
    else if(type==="updateBusiness"){const {id,...rest}=payload;const next={...businesses,[id]:{...businesses[id],...rest,updatedAt:Date.now()}};setRaw(r=>({...r,mof_businesses:next}));await sset("mof_businesses",next);}
    else if(type==="deleteBusiness"){const next={...businesses};delete next[payload.id];setRaw(r=>({...r,mof_businesses:next}));await sset("mof_businesses",next);}
    else if(type==="setPayroll"){
      // A rate change is only worth a history entry when the money changed.
      // Renaming a group or moving its category is not a salary decision.
      const {actor,...entry}=payload;
      const prev=payroll[entry.id];
      const history=[...(prev?.history||[])];
      if(!prev||Number(prev.amount)!==Number(entry.amount))
        history.push({amount:Number(entry.amount),prev:prev?Number(prev.amount):null,at:Date.now(),
          by:actor?.by||"unknown",byName:actor?.byName||"Unknown"});
      const next={...payroll,[entry.id]:{...prev,...entry,history}};
      setRaw(r=>({...r,mof_payroll:next}));await sset("mof_payroll",next);
    }
    else if(type==="deletePayroll"){const next={...payroll};delete next[payload.id];setRaw(r=>({...r,mof_payroll:next}));await sset("mof_payroll",next);}
    else if(type==="wipePayroll"){setRaw(r=>({...r,mof_payroll:{}}));await sset("mof_payroll",{});}
    else if(type==="createDebt"){const next={...debts,[payload.id]:payload};setRaw(r=>({...r,mof_debts:next}));await sset("mof_debts",next);}
    else if(type==="updateDebt"){const {id,...rest}=payload;const next={...debts,[id]:{...debts[id],...rest}};setRaw(r=>({...r,mof_debts:next}));await sset("mof_debts",next);}
    else if(type==="deleteDebt"){const next={...debts};delete next[payload.id];setRaw(r=>({...r,mof_debts:next}));await sset("mof_debts",next);}
    else if(type==="createExpenditure"){const next={...expenditures,[payload.id]:payload};setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);}
    else if(type==="signExpenditure"){
      // A request becomes a logged expenditure the moment its last required
      // signature lands — there is no separate act of logging to forget.
      const e=expenditures[payload.id];if(!e)return;
      const approvals={...(e.approvals||{}),[payload.stageId]:{by:payload.by,byName:payload.byName,office:payload.office,at:payload.at}};
      const updated={...e,approvals};
      if(!(e.stages||[]).some(s=>!approvals[s.id])){updated.status="approved";updated.loggedAt=payload.at;}
      const next={...expenditures,[e.id]:updated};setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);
    }
    else if(type==="rejectExpenditure"){
      const e=expenditures[payload.id];if(!e)return;
      const updated={...e,status:"rejected",rejected:{by:payload.by,byName:payload.byName,office:payload.office,at:payload.at,reason:payload.reason}};
      const next={...expenditures,[e.id]:updated};setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);
    }
    else if(type==="voidExpenditure"){
      // The entry stays on the log; only its status changes, and the sums are
      // taken from status elsewhere, so the money returns to the allocation
      // without anything being recomputed or written back to the budget.
      const e=expenditures[payload.id];if(!e)return;
      const updated={...e,status:"voided",voided:{by:payload.by,byName:payload.byName,at:payload.at,reason:payload.reason||""}};
      const next={...expenditures,[e.id]:updated};setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);
    }
    else if(type==="withdrawExpenditure"){
      const e=expenditures[payload.id];if(!e)return;
      const next={...expenditures,[e.id]:{...e,status:"withdrawn",withdrawnAt:Date.now()}};
      setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);
    }
    else if(type==="deleteExpenditure"){const next={...expenditures};delete next[payload.id];setRaw(r=>({...r,mof_expenditures:next}));await sset("mof_expenditures",next);}
    else if(type==="setAnnouncement"){setRaw(r=>({...r,mof_announcement:payload}));await sset("mof_announcement",payload);}
    else if(type==="setShutdown"){setRaw(r=>({...r,mof_shutdown:payload}));await sset("mof_shutdown",payload);}
  },[raw,businesses,payroll,debts,expenditures]);

  const TABS=[{v:"budget",l:"Treasury",icon:"\u2696"},{v:"registry",l:"Registry",icon:"\uD83C\uDFDB"},{v:"register",l:"Register",icon:"\u270D"},{v:"payroll",l:"Payroll",icon:"\uD83D\uDCB0"},{v:"ledger",l:"Debt Ledger",icon:"\uD83D\uDCCA"},{v:"expenditure",l:"Expenditure",icon:"\uD83E\uDDFE"},{v:"panel",l:"Panel",icon:"\u2699"}];
  // The Panel demands a Finance role; everything else a sign-in touches does not.
  const mofAccess=!!panelUser&&!!(panelUser.role==="emperor"||panelUser.mofAccess||panelUser.mofRole);
  function handleTab(v){
    if(v==="panel"&&!mofAccess){setPanelAuth({requireMof:true,then:"panel"});return;}
    setTab(v);setPanelAuth(false);
  }

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:C.s1,borderBottom:"1px solid "+C.border,padding:"0 1.25rem"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"0.85rem 0",borderBottom:"1px solid "+C.border}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:C.textD,textDecoration:"none",border:"1px solid "+C.border,borderRadius:2,padding:"3px 10px",flexShrink:0}}>{"\u2190 Network"}</a>
          <div style={{flex:1,textAlign:"center"}}>
            <div className="mono" style={{fontSize:8,letterSpacing:"0.5em",color:C.textDD,marginBottom:3}}>EMPIRE OF LECH</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,letterSpacing:"0.12em",color:C.text}}>Ministry of Finance</div>
          </div>
          <div style={{width:80}}/>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>handleTab(t.v)} style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",padding:"0.65rem 1rem",background:"transparent",border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,borderBottom:"2px solid "+(tab===t.v&&!panelAuth?C.gold:"transparent"),color:tab===t.v&&!panelAuth?C.gold:C.textD}}>{t.icon}{" "}{t.l}</button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"1.75rem 1.25rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem",color:C.textDD}}><div className="mono" style={{fontSize:10,letterSpacing:"0.3em",animation:"pulse 1.5s infinite"}}>Loading...</div></div>}
      {loaded&&shutdown?.active&&<ShutdownBanner shutdown={shutdown}/>}
      {loaded&&announcement?.text&&!panelAuth&&<AnnouncementBanner announcement={announcement}/>}
      {loaded&&panelAuth&&<PanelAuth requireMof={panelAuth.requireMof!==false}
        onAuth={(u,r)=>{setPanelUser(u);setRaw(prev=>({...prev,...r}));setTab(panelAuth.then||"panel");setPanelAuth(false);notify("Authenticated.",C.gold);}}
        onCancel={()=>setPanelAuth(false)}/>}
      {loaded&&!panelAuth&&tab==="budget"&&<BudgetTracker activeBudget={activeBudget} budgetCooldown={budgetCooldown} bkBills={bkBills}/>}
      {loaded&&!panelAuth&&tab==="registry"&&<RegistryPublic businesses={businesses}/>}
      {loaded&&!panelAuth&&tab==="register"&&!panelUser&&<div style={{textAlign:"center",padding:"3rem 1rem",color:C.textDD}}>
        <div style={{fontSize:15,color:C.textD,fontStyle:"italic",lineHeight:1.8,maxWidth:460,margin:"0 auto 1.25rem"}}>Registering an enterprise requires an Imperial Intranet account. Sign in to continue — the principal owner must be the account holder.</div>
        <Btn onClick={()=>setPanelAuth({requireMof:false,then:"register"})}>Sign In to Register</Btn>
      </div>}
      {loaded&&!panelAuth&&tab==="register"&&panelUser&&<RegistrationForm countries={countries} businesses={businesses} accounts={accounts} onSubmit={async(biz)=>{await onAction("createBusiness",biz);notify(biz.registrationNo+" application submitted.",C.gold);setTab("registry");}} onCancel={()=>setTab("registry")}/>}
      {loaded&&!panelAuth&&tab==="payroll"&&shutdown?.active&&<ShutdownPayrollNotice/>}
      {loaded&&!panelAuth&&tab==="payroll"&&<PayrollPublic payroll={payroll}/>}
      {loaded&&!panelAuth&&tab==="ledger"&&<DebtPublic debts={debts}/>}
      {loaded&&!panelAuth&&tab==="expenditure"&&<ExpenditureTracker expenditures={expenditures} activeBudget={activeBudget}
        officials={officials} user={panelUser} onAction={onAction} notify={notify} setProcessing={setProcessing}
        onRequireSignIn={()=>setPanelAuth({requireMof:false,then:"expenditure"})}
        onSignOut={()=>{setPanelUser(null);notify("Signed out.",C.textD);}}/>}
      {loaded&&!panelAuth&&tab==="panel"&&mofAccess&&<FinancePanel user={panelUser} businesses={businesses} payroll={payroll} debts={debts} countries={countries} accounts={accounts} officials={officials} announcement={announcement} shutdown={shutdown} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&!panelAuth&&tab==="panel"&&!mofAccess&&<div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>Authentication required. Click Panel to log in.</div>}
    </div>
    <div style={{borderTop:"1px solid "+C.border,padding:"0.75rem 1.25rem",marginTop:"3rem"}}>
      <div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,letterSpacing:"0.15em",textAlign:"center"}}>{"Ministry of Finance \u00B7 Empire of Lech \u00B7 Fiat Pecunia"}</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
