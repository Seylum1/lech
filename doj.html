<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Department of Justice — Republic of Vindex Nation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1930;color:#e8ebf2;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0b1930;}::-webkit-scrollbar-thumb{background:#24406e;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}
.mono{font-family:'Share Tech Mono',monospace;}
.pf{font-family:'Playfair Display',Georgia,serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════════════════════════════════════
   REPUBLIC OF VINDEX NATION — DEPARTMENT OF JUSTICE
   The federal Department of Justice: identity cards for the two States, and the
   law-enforcement agencies. Shares the backend under vx_* keys and the shared
   account. The Attorney General administers it; each agency head runs their own.
   ═══════════════════════════════════════════════════════════════════════════ */
const V={
  bg:"#0b1930",bg2:"#102344",panel:"#13294e",panel2:"#1a3560",line:"#24406e",lineL:"#3a5a94",
  text:"#e8ebf2",textD:"#93a4c3",textDD:"#4d648f",
  gold:"#c9a05a",goldL:"#e2c078",navy:"#0e1f42",
  red:"#c03038",redD:"#7a1c22",redL:"#e08080",green:"#2e8b3d",greenL:"#63c74d",
};

async function sha256(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
const lc=s=>String(s||"").toLowerCase();
function fmtDate(d){if(d===undefined||d===null||d==="")return "—";const s=(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(d))?d+"T12:00:00":d;const t=typeof s==="number"?s:new Date(s).getTime();if(isNaN(t))return ""+d;return new Date(t).toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"});}
function mcFace(n){return "https://mc-heads.net/avatar/"+encodeURIComponent(n||"")+"/128";}

/* ── backend (shared session) ────────────────────────────────────────────── */
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
const SESSION_KEY="lech_session",SESSION_ACC_KEY="lech_session_acc";
function saveSession(t,acc){try{if(t)localStorage.setItem(SESSION_KEY,t);if(acc)localStorage.setItem(SESSION_ACC_KEY,JSON.stringify(acc));}catch(e){}}
function cachedAccount(){try{var t=localStorage.getItem(SESSION_KEY);if(!t)return null;var a=localStorage.getItem(SESSION_ACC_KEY);if(!a)return null;AUTH_TOKEN=t;return JSON.parse(a);}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(SESSION_ACC_KEY);}catch(e){}AUTH_TOKEN=null;}
function forgetSession(){const t=AUTH_TOKEN;clearSession();try{if(t)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});}catch(e){}}
async function srestore(){let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}if(!t)return null;AUTH_TOKEN=t;try{const r=await fetch(API+"/api/me?token="+encodeURIComponent(t));const d=await r.json();if(d&&d.ok&&d.account){saveSession(t,d.account);return d.account;}clearSession();return null;}catch(e){return null;}}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok)?{ok:true}:{ok:false,error:(d&&d.error)||"Refused."};}catch{return {ok:false,error:"Connection error."};}}
async function slogin(username,password){try{const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});const d=await r.json();if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token,d.account);return {ok:true,account:d.account};}return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};}catch(e){return {ok:false,error:"Connection error"};}}

/* ── the two States and the identity card ──────────────────────────────────────
   The Republic issues one identity card; the State of the bearer sets its livery
   and seal, exactly as the Empire's provincial cards do. San Amaro is an island
   State; Viridis is the great metropolitan State. */
const STATES={
  viridis:{name:"Viridis",code:"VI",c1:"#14532d",c2:"#08251a",foil:"#d7ecb4",ink:"#eff8ea",gp:[16,10],motto:"EXCELSIOR",kind:"Metropolitan State",
    seal:'<rect x="5" y="15" width="3.4" height="13"/><rect x="9.5" y="10" width="3.4" height="18"/><rect x="14.2" y="5.5" width="3.6" height="22.5"/><rect x="19.2" y="12" width="3.4" height="16"/><rect x="23.7" y="17" width="3" height="11"/><path d="M16 5.5 V2.5"/><path d="M3.5 28 H29"/>'},
  san_amaro:{name:"San Amaro",code:"SA",c1:"#0d6d68",c2:"#04373b",foil:"#ffdca4",ink:"#effaf6",gp:[11,7],motto:"SUN · SEA · AND · LIBERTY",kind:"Island State",
    seal:'<circle cx="16" cy="7.5" r="3"/><path d="M16 7.5 l-4 -1.5 M16 7.5 l4 -1.5 M16 7.5 l-1.5 -4 M16 7.5 l1.5 -4"/><path d="M16 13 C13.5 17 13.5 23 15 28"/><path d="M16 13 C11 11 8 13 6 16 M16 13 C11.5 14 9.5 17 8.5 21 M16 13 C21 11 24 13 26 16 M16 13 C20.5 14 22.5 17 23.5 21"/><path d="M3.5 27 q3 -2 6 0 t6 0 t6 0 t6 0"/>'},
};
const STATE_OPTS=Object.keys(STATES).map(k=>({v:k,l:STATES[k].name+" — "+STATES[k].kind}));
function idHash(s){s=lc(s);let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0;}return h>>>0;}
function genIdNo(username,code){const six=(idHash("vid:"+username)%900000)+100000;return "VDX-"+code+"-"+six;}
function guillochePath(cx,cy,rad,petals,depth,copies){var d="",TAU=Math.PI*2,S=100;for(var j=0;j<copies;j++){var ph=j*TAU/(petals*copies);for(var i=0;i<=S;i++){var t=i/S*TAU,rr=rad*(1-depth+depth*Math.cos(petals*t)),a=t+ph;d+=(i?"L":"M")+(cx+rr*Math.cos(a)).toFixed(1)+" "+(cy+rr*Math.sin(a)).toFixed(1)+" ";}}return d;}
function idCardHTML(rec,pfp){
  var S=STATES[rec.state]; if(!S) return "";
  var e=function(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");};
  var name=rec.name||rec.username||"—";
  var idno=rec.number||genIdNo(rec.username,S.code);
  var iss=rec.issued?fmtDate(rec.issued):"—", exp=rec.expires?fmtDate(rec.expires):"—";
  var pad=function(s,n){return (s+"<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<").slice(0,n);};
  var mrz1=e(pad("IDVDX"+S.code+"<<"+name.toUpperCase().replace(/[^A-Z]+/g,"<"),36));
  var mrz2=e(pad(idno.replace(/[^A-Z0-9]/g,"")+"<VDX<"+String(rec.expires||"").replace(/[^0-9]/g,"").slice(0,8),36));
  var ticks="";for(var k=0;k<48;k++){var ta=k/48*Math.PI*2;ticks+='<line x1="'+(32+25.5*Math.cos(ta)).toFixed(1)+'" y1="'+(32+25.5*Math.sin(ta)).toFixed(1)+'" x2="'+(32+23.5*Math.cos(ta)).toFixed(1)+'" y2="'+(32+23.5*Math.sin(ta)).toFixed(1)+'"/>';}
  var seal='<g transform="translate(16 16)" stroke-width="1.3">'+S.seal+'</g>';
  var sealSVG='<svg width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="'+S.foil+'" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"><circle cx="32" cy="32" r="30" fill="'+S.foil+'" fill-opacity="0.05" stroke="none"/><circle cx="32" cy="32" r="30"/><circle cx="32" cy="32" r="27.5"/><circle cx="32" cy="32" r="23"/>'+ticks+seal+'</svg>';
  var field=function(k,v,big){return '<div style="min-width:0;"><div style="font-size:7.5px;letter-spacing:.16em;color:'+S.foil+';opacity:.85;margin-bottom:1px;">'+k+'</div><div style="font-family:\''+(big?'Playfair Display':'Crimson Text')+'\',Georgia,serif;font-size:'+(big?'15px':'12.5px')+';font-weight:'+(big?700:600)+';line-height:1.12;color:'+S.ink+';overflow-wrap:anywhere;">'+e(v)+'</div></div>';};
  var guil='<svg viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" fill="none" stroke="'+S.foil+'" stroke-width="0.4" opacity="0.26"><path d="'+guillochePath(206,124,120,S.gp[0],0.13,16)+'"/><path d="'+guillochePath(206,124,76,S.gp[1],0.2,13)+'"/><circle cx="206" cy="124" r="122"/><circle cx="206" cy="124" r="72"/></svg>';
  var starWM='<svg viewBox="0 0 100 100" style="position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);height:150px;width:auto;opacity:.05;pointer-events:none;" fill="'+S.ink+'"><path d="M50 6 L61 39 L96 39 L68 60 L79 94 L50 73 L21 94 L32 60 L4 39 L39 39 Z"/></svg>';
  return ''+
   '<div style="width:100%;max-width:400px;margin:0 auto;font-family:Georgia,serif;">'+
     '<div style="position:relative;border-radius:11px;overflow:hidden;color:'+S.ink+';background:linear-gradient(150deg,'+S.c1+' 0%,'+S.c2+' 100%);box-shadow:0 12px 34px rgba(0,0,0,.5);border:1px solid '+S.foil+'44;">'+
       guil+starWM+
       '<div style="position:absolute;inset:5px;border:1px solid '+S.foil+'55;border-radius:8px;pointer-events:none;"></div>'+
       '<div style="position:absolute;inset:8px;border:1px solid '+S.foil+'22;border-radius:6px;pointer-events:none;"></div>'+
       '<div style="position:relative;padding:11px 15px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid '+S.foil+'44;">'+
         '<div style="flex:none;">'+sealSVG.replace('width="60" height="60"','width="34" height="34"')+'</div>'+
         '<div style="flex:1;min-width:0;">'+
           '<div style="font-family:\'Playfair Display\',Georgia,serif;font-size:12.5px;font-weight:900;letter-spacing:.11em;color:'+S.foil+';">REPUBLIC OF VINDEX NATION</div>'+
           '<div style="font-size:7.5px;letter-spacing:.24em;opacity:.78;">STATE IDENTITY CARD · DEPARTMENT OF JUSTICE</div>'+
         '</div>'+
         '<div style="text-align:right;">'+
           '<div style="font-family:\'Playfair Display\',Georgia,serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:'+S.foil+';">'+e(S.name.toUpperCase())+'</div>'+
           '<div style="font-size:7px;letter-spacing:.26em;opacity:.7;">'+e(S.kind.toUpperCase())+'</div>'+
         '</div>'+
       '</div>'+
       '<div style="position:relative;padding:12px 15px 4px;display:flex;gap:12px;align-items:flex-start;">'+
         '<div style="width:76px;flex:none;">'+
           (pfp
             ? '<img src="'+e(pfp)+'" alt="" style="width:76px;height:92px;border-radius:3px;border:1px solid '+S.foil+'77;box-shadow:inset 0 0 0 2px '+S.c2+';object-fit:cover;display:block;" onerror="this.style.visibility=\'hidden\';"/>'
             : '<div style="width:76px;height:92px;border-radius:3px;border:1px solid '+S.foil+'77;box-shadow:inset 0 0 0 2px '+S.c2+';background:radial-gradient(circle at 50% 33%, rgba(255,255,255,.30) 0 25%, transparent 26%),radial-gradient(ellipse 46% 33% at 50% 102%, rgba(255,255,255,.30) 0 60%, transparent 61%),linear-gradient(160deg, rgba(255,255,255,.10), rgba(0,0,0,.30));"></div>')+
           '<div style="font-family:\'Crimson Text\',Georgia,serif;font-style:italic;font-size:14px;text-align:center;margin-top:5px;transform:rotate(-2deg);line-height:1;color:'+S.ink+';">'+e(name)+'</div>'+
           '<div style="font-size:6.5px;letter-spacing:.16em;opacity:.6;text-align:center;border-top:1px solid '+S.foil+'44;margin-top:2px;padding-top:2px;">SIGNATURE OF BEARER</div>'+
         '</div>'+
         '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;">'+
           field("NAME OF BEARER",name,true)+
           '<div style="display:flex;gap:12px;">'+field("IDENTITY NO.",idno)+field("DATE OF ISSUE",iss)+'</div>'+
           '<div style="display:flex;gap:12px;">'+field("DATE OF EXPIRY",exp)+field("STATE",S.name)+'</div>'+
         '</div>'+
       '</div>'+
       '<div style="position:relative;text-align:center;font-family:\'Playfair Display\',Georgia,serif;font-size:8px;letter-spacing:.28em;color:'+S.foil+';opacity:.82;padding:2px 0 5px;">'+e(S.motto)+'</div>'+
       '<div style="position:relative;background:rgba(0,0,0,.32);border-top:1px solid '+S.foil+'44;padding:5px 12px;">'+
         '<div style="font-family:\'Courier New\',monospace;font-size:9.5px;letter-spacing:1px;white-space:nowrap;overflow:hidden;color:'+S.ink+';">'+mrz1+'</div>'+
         '<div style="font-family:\'Courier New\',monospace;font-size:9.5px;letter-spacing:1px;white-space:nowrap;overflow:hidden;color:'+S.ink+';">'+mrz2+'</div>'+
       '</div>'+
     '</div>'+
   '</div>';
}
function IDCard({rec,pfp}){return <div dangerouslySetInnerHTML={{__html:idCardHTML(rec,pfp)}}/>;}

/* ── UI atoms ────────────────────────────────────────────────────────────── */
function Btn({children,onClick,variant="primary",disabled,small,style:ex={}}){
  const base={fontFamily:"'Playfair Display',serif",fontWeight:700,letterSpacing:"0.06em",fontSize:small?12:13,padding:small?"5px 14px":"8px 20px",border:"1px solid",borderRadius:3,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.45:1,transition:"all .15s"};
  const variants={primary:{background:`linear-gradient(180deg,${V.panel2},${V.navy})`,borderColor:V.lineL,color:V.text},gold:{background:"linear-gradient(180deg,#3d2f14,#57431f)",borderColor:"#7a6231",color:V.goldL},green:{background:"linear-gradient(180deg,#1c4a24,#2e6b38)",borderColor:"#3f8a4c",color:"#d8f0d0"},danger:{background:"transparent",borderColor:V.redD,color:V.redL},armed:{background:`linear-gradient(180deg,${V.redD},${V.red})`,borderColor:V.redD,color:"#f0d0d0"},ghost:{background:"transparent",borderColor:V.line,color:V.textD}};
  return <button onClick={disabled?undefined:onClick} style={{...base,...(variants[variant]||variants.primary),...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,small}){
  const [a,setA]=useState(false);
  useEffect(()=>{if(!a)return;const t=setTimeout(()=>setA(false),4000);return()=>clearTimeout(t);},[a]);
  return a?<Btn variant="armed" small={small} onClick={()=>{setA(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>:<Btn variant="danger" small={small} onClick={()=>setA(true)}>{label}</Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",...ex}} onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;}
function TA({value,onChange,placeholder,rows=3}){return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.6}} onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;}
function Sel({value,onChange,options,style:ex={}}){return <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif",...ex}}>{options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>;}
function FL({children}){return <div className="mono" style={{fontSize:9,color:V.textD,letterSpacing:"0.18em",marginBottom:4,textTransform:"uppercase"}}>{children}</div>;}
function STitle({children,color}){return <div style={{display:"flex",alignItems:"center",gap:12,margin:"1.7rem 0 1rem"}}><span className="pf" style={{fontWeight:700,fontSize:13,letterSpacing:"0.26em",textTransform:"uppercase",color:color||V.gold}}>{children}</span><span style={{flex:1,height:1,background:`linear-gradient(90deg,${V.line},transparent)`}}/></div>;}
function Tag({children,color}){return <span className="mono" style={{fontSize:9,padding:"2px 8px",borderRadius:2,background:(color||V.textD)+"18",border:`1px solid ${(color||V.textD)}55`,color:color||V.textD,whiteSpace:"nowrap"}}>{children}</span>;}
function Toast({msg,color}){if(!msg)return null;return <div style={{position:"fixed",top:14,right:14,zIndex:9999,background:V.panel,border:`1px solid ${color}66`,borderLeft:`3px solid ${color}`,padding:"9px 16px",borderRadius:3,fontFamily:"'Playfair Display',serif",fontSize:12,color,maxWidth:380,animation:"fadeIn .2s ease"}}>{msg}</div>;}
function Overlay({label}){if(!label)return null;return <div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(6,12,26,.96)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div className="mono" style={{color:V.gold,fontSize:10,letterSpacing:"0.35em",marginBottom:8,animation:"pulse 1s infinite"}}>PROCESSING</div><div className="pf" style={{fontSize:17,color:V.text}}>{label}</div></div></div>;}
function Seal({file,size=64,glyph,color,style:ex={}}){
  const [ok,setOk]=useState(true);
  if(!ok||!file)return <div style={{width:size,height:size,borderRadius:"50%",border:`2px solid ${(color||V.gold)}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:V.navy,...ex}}><span className="pf" style={{fontWeight:900,fontSize:size*0.4,color:color||V.gold}}>{glyph||"★"}</span></div>;
  return <img src={file} alt="" draggable={false} onError={()=>setOk(false)} style={{width:size,height:size,objectFit:"contain",flexShrink:0,...ex}}/>;
}
function McFace({account,size=34,style:ex={}}){
  const [ok,setOk]=useState(true);const n=(account&&(account.mcName||account.username))||"";
  if(!ok)return <div style={{width:size,height:size,borderRadius:3,background:V.bg2,border:`1px solid ${V.line}`,flexShrink:0,...ex}}/>;
  return <img src={mcFace(n)} alt="" width={size} height={size} onError={()=>setOk(false)} style={{width:size,height:size,borderRadius:3,imageRendering:"pixelated",border:`1px solid ${V.line}`,flexShrink:0,...ex}}/>;
}
function Person({account,size=38,sub}){
  if(!account)return <span style={{color:V.textDD,fontStyle:"italic"}}>Unknown</span>;
  return <span style={{display:"inline-flex",alignItems:"center",gap:10}}>
    <McFace account={account} size={size}/>
    <span style={{lineHeight:1.2,minWidth:0}}>
      <span className="pf" style={{fontWeight:700,fontSize:14,color:V.text,display:"block"}}>{account.displayName||account.username}</span>
      <span className="mono" style={{fontSize:10,color:V.textDD}}>{sub||("@"+account.username)}</span>
    </span>
  </span>;
}
function AuthModal({onClose,onAuth}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{if(busy)return;if(!u.trim()||!p){setErr("Enter your credentials.");return;}setBusy(true);setErr("");try{const res=await slogin(u,p);if(!res.ok){setErr(res.error==="ACCESS DENIED"?"Credentials rejected.":res.error);setBusy(false);return;}onAuth(res.account);}catch(e){setErr("Connection error.");setBusy(false);}};
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(5,10,22,.92)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{maxWidth:400,width:"100%",background:V.panel,border:`1px solid ${V.line}`,borderTop:`3px solid ${V.gold}`,borderRadius:"0 0 5px 5px",padding:"1.7rem"}} onKeyDown={e=>{if(e.key==="Enter")go();}}>
      <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
        <Seal glyph="§" size={54} style={{margin:"0 auto 10px"}}/>
        <div className="mono" style={{fontSize:9,letterSpacing:"0.4em",color:V.gold}}>DEPARTMENT OF JUSTICE</div>
        <div className="pf" style={{fontWeight:900,fontSize:20,color:V.text,marginTop:4}}>Sign In</div>
        <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginTop:6,lineHeight:1.6}}>Use your Republic of Vindex Nation account. This portal is for authorized personnel.</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>Username</FL><Inp value={u} onChange={setU} placeholder="Username"/></div>
        <div><FL>Password</FL><Inp value={p} onChange={setP} type="password" placeholder="Password"/></div>

const AGENCIES=[
  {id:"vpd",name:"Viridis Police Department",short:"VPD",logo:"VPD.png",glyph:"★",accent:"#3a78c2",
   headTitle:"Chief of Police",deputyTitle:"Deputy Chief",maxDeputies:2,
   blurb:"Municipal and State policing across Viridis — patrol, investigation and public order."},
  {id:"fbi",name:"Federal Bureau of Investigation",short:"FBI",logo:"FBI.png",glyph:"⚖",accent:"#4a6aa0",
   headTitle:"Director",deputyTitle:"Deputy Director",maxDeputies:2,
   blurb:"The Republic's principal federal law-enforcement and domestic-intelligence service."},
  {id:"vss",name:"Vindex Secret Service",short:"VSS",logo:"vss.png",glyph:"✦",accent:"#8a6a34",
   headTitle:"Director",deputyTitle:"Deputy Director",maxDeputies:2,
   blurb:"Protection of the President and the Republic's leaders, and investigation of financial crime."},
  {id:"da",name:"District Attorney's Office",short:"DA",logo:"da.png",glyph:"§",accent:"#7a5a2a",wip:true,
   headTitle:"District Attorney",
   blurb:"Prosecution of offences on behalf of the Republic. Opens once the Judiciary is in session."},
];
const AG_BY_ID=Object.fromEntries(AGENCIES.map(a=>[a.id,a]));
const DEFAULT_RANKS={
  vpd:["Officer","Corporal","Sergeant","Lieutenant","Captain"],
  fbi:["Special Agent","Senior Special Agent","Supervisory Special Agent","Assistant Director"],
  vss:["Special Agent","Senior Special Agent","Resident Agent in Charge","Assistant Director"],
};
function ranksOf(agency,id){
  const r=agency&&agency.ranks;
  if(r&&r.length)return r;
  return (DEFAULT_RANKS[id]||["Officer"]).map(n=>({id:lc(n).replace(/[^a-z]+/g,"_"),name:n}));
}
const isEmperor=u=>!!u&&u.role==="emperor";
const vxRole=u=>String((u&&u.vxRole)||"");
const isPresident=u=>vxRole(u)==="president";
function agencyOf(doj,id){return (doj&&doj.agencies&&doj.agencies[id])||{};}
function isAG(u,doj){return !!u&&!!(doj&&doj.attorneyGeneral)&&lc(u.username)===lc(doj.attorneyGeneral);}
function canSetAG(u){return isEmperor(u)||isPresident(u);}
function dojAdmin(u,doj){return isEmperor(u)||isPresident(u)||isAG(u,doj);}
function isHead(u,ag){return !!u&&lc(ag.head||"")===lc(u.username);}
function isDeputy(u,ag){return !!u&&(ag.deputies||[]).some(d=>lc(d)===lc(u.username));}
function rosterRankOf(ag,u){return (ag.roster||{})[lc(u&&u.username)]||null;}
function inAgency(u,ag){return isHead(u,ag)||isDeputy(u,ag)||!!rosterRankOf(ag,u);}
function canEnterAgency(u,doj,id){return dojAdmin(u,doj)||inAgency(u,agencyOf(doj,id));}
function canManageAgency(u,doj,id){return isEmperor(u)||isAG(u,doj)||isHead(u,agencyOf(doj,id));}

/* ── person lookup helpers ─────────────────────────────────────────────────── */
function acctByName(accounts,uname){return accounts.find(a=>lc(a.username)===lc(uname))||null;}
function titleFor(doj,agencyId,username){
  const ag=agencyOf(doj,agencyId);const cfg=AG_BY_ID[agencyId];
  if(lc(ag.head||"")===lc(username))return cfg.headTitle;
  if((ag.deputies||[]).some(d=>lc(d)===lc(username)))return cfg.deputyTitle;
  const rid=(ag.roster||{})[lc(username)];
  if(rid){const r=ranksOf(ag,agencyId).find(x=>x.id===rid);return r?r.name:"Officer";}
  return null;
}

        <ArmBtn small label="Delete" confirmLabel="Delete?" onConfirm={async()=>{await saveRanks(ranks.filter(x=>x.id!==r.id));}}/>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:"0.4rem"}}>
      <div style={{flex:1,minWidth:200}}><Inp value={newRank} onChange={setNewRank} placeholder="New rank name (highest at top)"/></div>
      <Btn small variant="gold" disabled={!newRank.trim()} onClick={async()=>{const id=lc(newRank).replace(/[^a-z0-9]+/g,"_")+"_"+Math.random().toString(36).slice(2,5);await saveRanks([...ranks,{id,name:newRank.trim()}]);setNewRank("");}}>Add rank</Btn>
    </div>

    <STitle color={cfg.accent}>Appoint to a rank</STitle>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{flex:2,minWidth:200}}><FL>Account</FL><Sel value={appU} onChange={setAppU} options={rosterOpts}/></div>
      <div style={{flex:1,minWidth:150}}><FL>Rank</FL><Sel value={appR} onChange={setAppR} options={rankOpts}/></div>
      <Btn variant="gold" disabled={!appU||!appR} onClick={async()=>{setProcessing("Appointing…");const roster={...(ag.roster||{})};roster[lc(appU)]=appR;const res=await onAction("setRoster",{agency:cfg.id,roster});setProcessing(null);setAppU("");notify(res.ok?"Appointed to "+(ranks.find(r=>r.id===appR)||{}).name+".":res.error,res.ok?V.greenL:V.redL);}}>Appoint</Btn>
    </div>
    {Object.keys(ag.roster||{}).length>0&&<div style={{marginTop:"0.9rem"}}>
      <FL>Current roster</FL>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {Object.keys(ag.roster).map(u=>{const a=acctByName(accounts,u);const r=ranks.find(x=>x.id===ag.roster[u]);return <div key={u} style={{background:V.panel,border:`1px solid ${V.line}`,borderRadius:3,padding:"0.45rem 0.8rem",display:"flex",alignItems:"center",gap:10}}>
          <Person account={a||{username:u}} size={30}/><span style={{flex:1}}/>
          <Tag color={cfg.accent}>{r?r.name:"—"}</Tag>
          <ArmBtn small label="Remove" confirmLabel="Remove?" onConfirm={async()=>{setProcessing("Updating…");const roster={...ag.roster};delete roster[u];const res=await onAction("setRoster",{agency:cfg.id,roster});setProcessing(null);notify(res.ok?"Removed from the roster.":res.error,res.ok?V.greenL:V.redL);}}/>
        </div>;})}
      </div>
    </div>}
  </div>;
}

/* ── the Mobile Data Terminal ──────────────────────────────────────────────── */
const NATION_PP={vx_state_passports:"Republic of Vindex Nation",mfa_passports:"Empire of Lech",wx_state_passports:"Wilden"};
function MDT({cfg,accounts,citizens,ids,passports,records,warrants}){
  const [q,setQ]=useState("");const [sel,setSel]=useState(null);
  const results=q.trim().length>=1?accounts.filter(a=>lc(a.username).includes(lc(q))||lc(a.displayName||"").includes(lc(q))).slice(0,8):[];
  const subject=sel?acctByName(accounts,sel):null;
  const id=subject?ids[lc(subject.username)]:null;
  const subjPass=subject?Object.entries(passports).flatMap(([reg,map])=>Object.values(map||{}).filter(p=>lc(p.username)===lc(subject.username)).map(p=>({...p,nation:NATION_PP[reg]||"Foreign"}))):[];
  const subjRecords=subject?Object.values(records||{}).filter(r=>lc(r.subject)===lc(subject.username)).sort((a,b)=>(b.at||0)-(a.at||0)):[];
  const subjWarrants=subject?Object.values(warrants||{}).filter(w=>lc(w.username)===lc(subject.username)&&w.status==="active"):[];
  const isCit=subject&&citizens.has(lc(subject.username));
  return <div>
    <div style={{background:V.bg2,border:`1px solid ${V.line}`,borderRadius:4,padding:"1rem 1.1rem",marginBottom:"1.1rem"}}>
      <FL>Mobile Data Terminal — subject lookup</FL>
      <Inp value={q} onChange={v=>{setQ(v);setSel(null);}} placeholder="Search any person by name or username (citizens and foreign nationals)…"/>
      {results.length>0&&!sel&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
        {results.map(a=><div key={a.username} onClick={()=>setSel(a.username)} style={{cursor:"pointer",background:V.panel,border:`1px solid ${V.line}`,borderRadius:3,padding:"0.4rem 0.7rem",display:"flex",alignItems:"center",gap:10}}>
          <Person account={a} size={30}/><span style={{flex:1}}/><span className="mono" style={{fontSize:9,color:V.textDD}}>{citizens.has(lc(a.username))?"CITIZEN":"FOREIGN / NON-CITIZEN"}</span>
        </div>)}
      </div>}
    </div>
    {subject&&<div className="fadeIn">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1rem",flexWrap:"wrap"}}>
        <McFace account={subject} size={48}/>
        <div style={{flex:1,minWidth:160}}>
          <div className="pf" style={{fontWeight:700,fontSize:18,color:V.text}}>{subject.displayName||subject.username}</div>
          <div className="mono" style={{fontSize:10,color:V.textDD}}>@{subject.username}</div>
        </div>
        <Tag color={isCit?V.greenL:V.textD}>{isCit?"VINDEX CITIZEN":"FOREIGN / NON-CITIZEN"}</Tag>
        {subjWarrants.length>0&&<Tag color={V.redL}>ACTIVE WARRANT</Tag>}
      </div>
      {subjWarrants.length>0&&<div style={{background:"#2a1013",border:`1px solid ${V.redD}`,borderLeft:`4px solid ${V.red}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"1rem"}}>
        <div className="mono" style={{fontSize:9,color:V.redL,letterSpacing:"0.15em",marginBottom:5}}>ACTIVE WARRANTS ({subjWarrants.length})</div>
        {subjWarrants.map(w=><div key={w.id} style={{fontSize:13,color:V.text,padding:"2px 0"}}>{w.reason||"Warrant"} <span className="mono" style={{fontSize:10,color:V.textDD}}>· {AG_BY_ID[w.agency]?AG_BY_ID[w.agency].short:w.agency} · {fmtDate(w.at)}</span></div>)}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:16}}>
        <div>
          <FL>State identity card</FL>
          {id?<IDCard rec={id} pfp={mcFace(subject.mcName||subject.username)}/>:<div style={{border:`1px dashed ${V.line}`,borderRadius:8,padding:"1.6rem 1rem",textAlign:"center",color:V.textDD,fontStyle:"italic",fontSize:13}}>No Vindex identity card on file.</div>}
        </div>
        <div>
          <FL>Travel documents</FL>
          {subjPass.length===0?<div style={{border:`1px dashed ${V.line}`,borderRadius:8,padding:"1.6rem 1rem",textAlign:"center",color:V.textDD,fontStyle:"italic",fontSize:13}}>No passport on file.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>{subjPass.map((p,i)=>{
              const exp=p.expires&&new Date(p.expires)<new Date();const rev=p.status==="revoked";
              return <div key={i} style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${rev?V.red:exp?"#e08a3a":V.greenL}`,borderRadius:"0 3px 3px 0",padding:"0.7rem 0.9rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}><span className="pf" style={{fontWeight:700,fontSize:14,color:V.text}}>{p.nation}</span><span className="mono" style={{fontSize:11,color:V.goldL}}>{p.number}</span></div>
                <div className="mono" style={{fontSize:10,color:V.textDD,marginTop:3}}>{(p.name||"").toUpperCase()} · EXP {fmtDate(p.expires)} · {rev?"REVOKED":exp?"EXPIRED":"VALID"}</div>
              </div>;})}</div>}
        </div>
      </div>
      <STitle color={cfg.accent}>Record history</STitle>
      {subjRecords.length===0?<div style={{fontSize:13,color:V.textDD,fontStyle:"italic"}}>No records on file.</div>
        :<div style={{display:"flex",flexDirection:"column",gap:5}}>{subjRecords.map(r=><RecordRow key={r.id} r={r} accounts={accounts}/>)}</div>}
    </div>}
  </div>;
}
const REC_META={arrest:{l:"Arrest",color:V.red},ticket:{l:"Citation",color:"#e08a3a"},warning:{l:"Warning",color:V.goldL}};
function RecordRow({r,accounts}){
  const m=REC_META[r.type]||{l:r.type,color:V.textD};const off=acctByName(accounts,r.officer);
  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${m.color}`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.9rem"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <Tag color={m.color}>{m.l.toUpperCase()}</Tag>
      <span className="pf" style={{fontWeight:700,fontSize:14,color:V.text,flex:1}}>{r.charge||m.l}</span>
      <span className="mono" style={{fontSize:9,color:V.textDD}}>{AG_BY_ID[r.agency]?AG_BY_ID[r.agency].short:r.agency} · {fmtDate(r.at)}</span>
    </div>
    {(r.location||r.notes||r.fine)&&<div style={{fontSize:12.5,color:V.textD,marginTop:4,lineHeight:1.5}}>{r.location?("Location: "+r.location+". "):""}{r.fine?("Fine: "+r.fine+". "):""}{r.notes||""}</div>}
    <div className="mono" style={{fontSize:9,color:V.textDD,marginTop:3}}>Officer: {off?(off.displayName||off.username):r.officer}</div>
  </div>;
}

/* ── enforcement: log records + warrants ───────────────────────────────────── */
function Enforcement({cfg,user,accounts,records,warrants,onAction,notify,setProcessing}){
  const [type,setType]=useState("arrest");
  const [subj,setSubj]=useState("");const [charge,setCharge]=useState("");const [location,setLocation]=useState("");const [fine,setFine]=useState("");const [notes,setNotes]=useState("");const [warrant,setWarrant]=useState(false);const [saving,setSaving]=useState(false);
  const opts=[{v:"",l:"— Select subject —"},...accounts.map(a=>({v:a.username,l:(a.displayName?a.displayName+" ":"")+"@"+a.username}))];
  const agRecords=Object.values(records||{}).filter(r=>r.agency===cfg.id).sort((a,b)=>(b.at||0)-(a.at||0)).slice(0,40);
  const agWarrants=Object.values(warrants||{}).filter(w=>w.agency===cfg.id&&w.status==="active").sort((a,b)=>(b.at||0)-(a.at||0));
  return <div>
    <div style={{background:V.bg2,border:`1px solid ${V.line}`,borderRadius:4,padding:"1.2rem",marginBottom:"1.2rem"}}>
      <FL>Log an enforcement action</FL>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"0 0 0.8rem"}}>
        {["arrest","ticket","warning"].map(t=><button key={t} onClick={()=>setType(t)} className="mono" style={{fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase",padding:"5px 14px",background:type===t?V.panel2:"transparent",border:`1px solid ${type===t?(REC_META[t].color):V.line}`,color:type===t?REC_META[t].color:V.textD,borderRadius:2,cursor:"pointer"}}>{REC_META[t].l}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
        <div style={{display:"flex",gap:"0.7rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:200}}><FL>Subject *</FL><Sel value={subj} onChange={setSubj} options={opts}/></div>
          <div style={{flex:2,minWidth:180}}><FL>{type==="ticket"?"Offence":type==="warning"?"Reason":"Charge"} *</FL><Inp value={charge} onChange={setCharge} placeholder={type==="ticket"?"e.g. Speeding":type==="arrest"?"e.g. Grand larceny":"e.g. Trespass — warned"}/></div>
        </div>
        <div style={{display:"flex",gap:"0.7rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>Location</FL><Inp value={location} onChange={setLocation} placeholder="e.g. Viridis, 5th & Main"/></div>
          {type==="ticket"&&<div style={{flex:1,minWidth:120}}><FL>Fine</FL><Inp value={fine} onChange={setFine} placeholder="e.g. $250"/></div>}
        </div>
        <div><FL>Notes</FL><TA value={notes} onChange={setNotes} rows={2} placeholder="Narrative / details…"/></div>
        {type==="arrest"&&<CheckBoxLine checked={warrant} onChange={setWarrant} label="Also issue an active warrant for this subject"/>}
        <Btn variant="gold" disabled={!subj||!charge.trim()||saving} onClick={async()=>{
          setSaving(true);setProcessing("Filing…");
          const a=acctByName(accounts,subj);
          const rec={id:"rec_"+uid(),type,agency:cfg.id,subject:subj,subjectName:a?(a.displayName||a.username):subj,officer:user.username,officerName:user.displayName||user.username,charge:charge.trim(),location:location.trim(),fine:fine.trim(),notes:notes.trim(),at:Date.now()};
          const res=await onAction("logRecord",rec);
          if(res.ok&&type==="arrest"&&warrant){await onAction("issueWarrant",{id:"war_"+uid(),username:subj,subjectName:rec.subjectName,agency:cfg.id,reason:charge.trim(),issuedBy:user.username,issuedByName:rec.officerName,at:Date.now(),status:"active"});}
          setProcessing(null);setSaving(false);
          notify(res.ok?(REC_META[type].l+" logged for "+rec.subjectName+"."):res.error,res.ok?V.greenL:V.redL);
          if(res.ok){setSubj("");setCharge("");setLocation("");setFine("");setNotes("");setWarrant(false);}
        }}>{saving?"Filing…":"File "+REC_META[type].l}</Btn>
      </div>
    </div>
    {agWarrants.length>0&&<><STitle color={V.redL}>Active warrants</STitle>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:"0.5rem"}}>
        {agWarrants.map(w=>{const a=acctByName(accounts,w.username);return <div key={w.id} style={{background:V.panel,border:`1px solid ${V.redD}66`,borderLeft:`4px solid ${V.red}`,borderRadius:"0 3px 3px 0",padding:"0.55rem 0.9rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <Person account={a||{username:w.username}} size={30}/>
          <span style={{fontSize:13,color:V.text,flex:1}}>{w.reason}</span>
          <span className="mono" style={{fontSize:9,color:V.textDD}}>{fmtDate(w.at)}</span>
          <ArmBtn small label="Clear" confirmLabel="Clear warrant?" onConfirm={async()=>{setProcessing("Clearing…");const res=await onAction("clearWarrant",{id:w.id});setProcessing(null);notify(res.ok?"Warrant cleared.":res.error,res.ok?V.greenL:V.redL);}}/>
        </div>;})}
      </div></>}
    <STitle color={cfg.accent}>Recent actions</STitle>
    {agRecords.length===0?<div style={{fontSize:13,color:V.textDD,fontStyle:"italic"}}>No actions logged yet.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:5}}>{agRecords.map(r=><div key={r.id} style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1,minWidth:0}}><RecordRow r={r} accounts={accounts}/></div>
      </div>)}</div>}
  </div>;
}
function CheckBoxLine({checked,onChange,label}){
  return <div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
    <span style={{width:15,height:15,borderRadius:2,border:`2px solid ${checked?V.red:V.line}`,background:checked?"#3a1418":"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:V.redL}}>{checked?"✓":""}</span>
    <span style={{fontSize:13,color:checked?V.text:V.textD}}>{label}</span>
  </div>;
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App(){
  const [raw,setRaw]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState({t:"home"});
  const [user,setUser]=useState(()=>cachedAccount());
  const [authOpen,setAuthOpen]=useState(false);
  const [toast,setToast]=useState({msg:"",color:V.gold});
  const [processing,setProcessing]=useState(null);
  const notify=useCallback((msg,color=V.gold)=>{setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);},[]);

  useEffect(()=>{sgetAll().then(r=>{setRaw(r);setLoaded(true);});},[]);
  useEffect(()=>{srestore().then(acc=>{if(acc){setUser(acc);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));}else if(!AUTH_TOKEN)setUser(null);});},[]);

  const accounts=useMemo(()=>{const out=[];const seen={};const take=v=>{if(v&&v.username&&!seen[lc(v.username)]){seen[lc(v.username)]=1;out.push(v);}};Object.values(raw["mi_accounts"]||{}).forEach(take);Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("vx_acc_"))take(v);});return out.sort((x,y)=>((x.displayName||x.username)||"").localeCompare((y.displayName||y.username)||""));},[raw]);
  const doj=useMemo(()=>raw["vx_doj"]||{},[raw]);
  const ids=useMemo(()=>raw["vx_state_ids"]||{},[raw]);
  const records=useMemo(()=>raw["vx_doj_records"]||{},[raw]);
  const warrants=useMemo(()=>raw["vx_warrants"]||{},[raw]);
  const passports=useMemo(()=>({vx_state_passports:raw["vx_state_passports"]||{},mfa_passports:raw["mfa_passports"]||{},wx_state_passports:raw["wx_state_passports"]||{}}),[raw]);
  const citizens=useMemo(()=>{const s=new Set();Object.values(raw["vx_state_citizens"]||{}).forEach(c=>{if(c&&["citizen","naturalised"].includes(String(c.status||"")))s.add(lc(c.username));});return s;},[raw]);

  const onAction=useCallback(async(type,p)=>{
    // The Department is written whole (it is small): appointments, ranks and the
    // Attorney General all live in the single vx_doj record. Registers of records
    // and warrants are written the same way.
    const putDoj=async(next)=>{const res=await sset("vx_doj",next);if(res.ok)setRaw(r=>({...r,vx_doj:next}));return res;};
    const cur=doj;const agencies={...(cur.agencies||{})};
    const ag=(id)=>({...(agencies[id]||{})});
    if(type==="setAG")return await putDoj({...cur,attorneyGeneral:p.username});
    if(type==="setHead"){agencies[p.agency]={...ag(p.agency),head:p.username};return await putDoj({...cur,agencies});}
    if(type==="setDeputies"){agencies[p.agency]={...ag(p.agency),deputies:p.deputies};return await putDoj({...cur,agencies});}
    if(type==="setRanks"){agencies[p.agency]={...ag(p.agency),ranks:p.ranks};return await putDoj({...cur,agencies});}
    if(type==="setRoster"){agencies[p.agency]={...ag(p.agency),roster:p.roster};return await putDoj({...cur,agencies});}
    if(type==="issueId"){const next={...ids,[lc(p.username)]:p};const res=await sset("vx_state_ids",next);if(res.ok)setRaw(r=>({...r,vx_state_ids:next}));return res;}
    if(type==="revokeId"){const next={...ids};delete next[lc(p.username)];const res=await sset("vx_state_ids",next);if(res.ok)setRaw(r=>({...r,vx_state_ids:next}));return res;}
    if(type==="logRecord"){const next={...records,[p.id]:p};const res=await sset("vx_doj_records",next);if(res.ok)setRaw(r=>({...r,vx_doj_records:next}));return res;}
    if(type==="issueWarrant"){const next={...warrants,[p.id]:p};const res=await sset("vx_warrants",next);if(res.ok)setRaw(r=>({...r,vx_warrants:next}));return res;}
    if(type==="clearWarrant"){const next={...warrants};if(next[p.id])next[p.id]={...next[p.id],status:"cleared",clearedAt:Date.now()};const res=await sset("vx_warrants",next);if(res.ok)setRaw(r=>({...r,vx_warrants:next}));return res;}
    return {ok:false,error:"Unknown action."};
  },[doj,ids,records,warrants]);

  const office=user?(isAG(user,doj)?"Attorney General":isEmperor(user)?"System Administrator":isPresident(user)?"President":"Signed in"):"";
  const cfg=view.t==="agency"?AG_BY_ID[view.id]:null;

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse 80% 45% at 50% -5%, #1c3a6e55, transparent 60%), ${V.bg}`}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:`linear-gradient(180deg,${V.navy},${V.bg2})`,borderBottom:`2px solid ${V.gold}55`}}>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0.8rem 1.2rem",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <a href="vindex.html" className="mono" style={{fontSize:8,letterSpacing:"0.1em",color:V.textD,textDecoration:"none",border:`1px solid ${V.line}`,borderRadius:2,padding:"4px 9px",flexShrink:0}}>← GOV PORTAL</a>
        <Seal glyph="§" size={44}/>
        <div style={{flex:1,minWidth:170,cursor:"pointer"}} onClick={()=>setView({t:"home"})}>
          <div className="pf" style={{fontWeight:900,fontSize:16.5,letterSpacing:"0.04em",color:V.text,lineHeight:1.1}}>Department of Justice</div>
          <div className="mono" style={{fontSize:8,letterSpacing:"0.28em",color:V.gold,marginTop:2}}>REPUBLIC OF VINDEX NATION · FIAT JUSTITIA</div>
        </div>
        {user?<div style={{display:"flex",alignItems:"center",gap:10}}>
          <McFace account={user} size={30}/>
          <div style={{textAlign:"right",lineHeight:1.25}}>
            <div className="pf" style={{fontWeight:700,fontSize:12.5,color:V.text}}>{user.displayName||user.username}</div>
            <div className="mono" style={{fontSize:7.5,letterSpacing:"0.14em",color:dojAdmin(user,doj)?V.goldL:V.textDD}}>{office.toUpperCase()}</div>
          </div>
          <Btn small variant="ghost" onClick={()=>{forgetSession();setUser(null);setView({t:"home"});notify("Signed out.",V.textD);}}>Sign out</Btn>
        </div>:<Btn small variant="gold" onClick={()=>setAuthOpen(true)}>Sign In</Btn>}
      </div>
    </div>

    <div style={{maxWidth:1080,margin:"0 auto",padding:"1.6rem 1.2rem 3rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem"}}><div className="mono" style={{fontSize:10,letterSpacing:"0.35em",color:V.textDD,animation:"pulse 1.4s infinite"}}>LOADING…</div></div>}
      {loaded&&!user&&<div style={{textAlign:"center",padding:"3rem 1rem"}}>
        <Seal glyph="§" size={80} style={{margin:"0 auto 1rem"}}/>
        <div className="pf" style={{fontWeight:900,fontSize:22,color:V.text}}>Department of Justice</div>
        <div style={{fontSize:14,color:V.textD,fontStyle:"italic",margin:"0.6rem auto 1.2rem",maxWidth:440,lineHeight:1.7}}>This is a restricted portal for the Attorney General and the Republic's law-enforcement agencies. Sign in with your Vindex account.</div>
        <Btn variant="gold" onClick={()=>setAuthOpen(true)}>Sign In</Btn>
      </div>}
      {loaded&&user&&view.t==="home"&&<Home user={user} doj={doj} accounts={accounts} onOpen={setView}/>}
      {loaded&&user&&view.t==="ag"&&(dojAdmin(user,doj)
        ?<AGPanel user={user} doj={doj} accounts={accounts} citizens={citizens} ids={ids} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
        :<Denied onBack={()=>setView({t:"home"})}/>)}
      {loaded&&user&&view.t==="agency"&&cfg&&(canEnterAgency(user,doj,cfg.id)
        ?<AgencyView cfg={cfg} user={user} doj={doj} accounts={accounts} citizens={citizens} ids={ids} passports={passports} records={records} warrants={warrants} onAction={onAction} notify={notify} setProcessing={setProcessing} onBack={()=>setView({t:"home"})}/>
        :<Denied onBack={()=>setView({t:"home"})}/>)}
    </div>

    <div style={{borderTop:`1px solid ${V.line}`,padding:"1.1rem 1.2rem 1.5rem"}}>
      <div style={{maxWidth:1080,margin:"0 auto"}} className="mono">
        <span style={{fontSize:8.5,letterSpacing:"0.24em",color:V.textDD}}>DEPARTMENT OF JUSTICE · REPUBLIC OF VINDEX NATION</span>
      </div>
    </div>

    {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)} onAuth={acc=>{setUser(acc);setAuthOpen(false);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));notify("Signed in as "+(acc.displayName||acc.username)+".",V.goldL);}}/>}
  </div>;
}
function Denied({onBack}){return <div style={{textAlign:"center",padding:"3rem 1rem"}}>
  <div className="pf" style={{fontWeight:700,fontSize:18,color:V.text}}>Not authorized</div>
  <div style={{fontSize:14,color:V.textD,fontStyle:"italic",margin:"0.5rem 0 1.2rem"}}>You are not appointed to this office.</div>
  <Btn variant="ghost" onClick={onBack}>← Back</Btn>
</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
