<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Government Portal — Republic of Vindex Nation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1930;color:#e8ebf2;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0b1930;}::-webkit-scrollbar-thumb{background:#24406e;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}

/* The chamber: seven desks, filled or vacant. */
.vx-bench{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════════════════════════════════════
   REPUBLIC OF VINDEX NATION — GOVERNMENT PORTAL
   The seat of the three branches established by The Establishment Act 2024.
   Shares the Empire of Lech's accounts and backend: Vinish office is a field on
   the account (vxRole), granted from the Empire's Interior Ministry, so one
   sign-in carries across both governments. Records live under vx_* keys.
   ═══════════════════════════════════════════════════════════════════════════ */

const V={
  bg:"#0b1930",bg2:"#102344",panel:"#13294e",panel2:"#1a3560",line:"#24406e",lineL:"#3a5a94",
  text:"#e8ebf2",textD:"#93a4c3",textDD:"#4d648f",
  gold:"#c9a05a",goldL:"#e2c078",navy:"#0e1f42",
  red:"#c03038",redD:"#7a1c22",redL:"#e08080",green:"#2e8b3d",greenL:"#63c74d",
  ivory:"#f4f0e4",ink:"#232018",
};

/* ── backend ─────────────────────────────────────────────────────────────── */
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
// The account the token belongs to, cached beside it so a page paints its
// signed-in state on the first frame instead of waiting on the /api/me round
// trip. A display cache only — the server still authorises every read and write
// against the token itself — and it is reconciled the moment /api/me answers, so
// a session ended elsewhere is corrected within one page load.
const SESSION_ACC_KEY="lech_session_acc";
function saveSession(t,acc){try{if(t)localStorage.setItem(SESSION_KEY,t);if(acc)localStorage.setItem(SESSION_ACC_KEY,JSON.stringify(acc));}catch(e){}}
// The cached account, for that optimistic first paint. Adopts the stored token
// too, so the snapshot fetched on the same frame is made as the signed-in account.
function cachedAccount(){
  try{
    var t=localStorage.getItem(SESSION_KEY); if(!t) return null;
    var a=localStorage.getItem(SESSION_ACC_KEY); if(!a) return null;
    AUTH_TOKEN=t; return JSON.parse(a);
  }catch(e){ return null; }
}
// Drop the stored token locally. Never talks to the server, so a network hiccup
// can never destroy a session that is still perfectly good.
function clearSession(){try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(SESSION_ACC_KEY);}catch(e){}AUTH_TOKEN=null;}
// A deliberate sign-out: end the session on the server too. Only ever called
// from a real "Sign Out" control — never from a failed restore.
function forgetSession(){const t=AUTH_TOKEN;clearSession();try{if(t)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});}catch(e){}}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{
    // Plain query token, exactly like every other call on this page, so this is a
    // simple request with no CORS preflight.
    const r=await fetch(API+"/api/me?token="+encodeURIComponent(t));
    const d=await r.json();
    if(d&&d.ok&&d.account){saveSession(t,d.account);return d.account;}   // refresh the cache
    clearSession();return null;      // the server rejected it — genuinely stale
  }catch(e){ return null; }          // offline/blocked — keep the token, retry next page
}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}}
// Per-record writes, so two Representatives voting at the same moment cannot
// overwrite one another the way a whole-map write would.
async function saveRecord(collection,record){
  try{const r=await fetch(API+"/api/write",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:AUTH_TOKEN,collection,record})});const d=await r.json();
    return d&&d.ok?{ok:true}:{ok:false,error:(d&&d.error)||"Refused."};}catch{return {ok:false,error:"Connection error."};}
}
async function deleteRecord(collection,id){
  try{await fetch(API+"/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token:AUTH_TOKEN,collection,id})});return true;}catch{return false;}
}
async function slogin(username,password){try{const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});const d=await r.json();if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token,d.account);return {ok:true,account:d.account};}return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};}catch(e){return {ok:false,error:"Connection error"};}}
function fmtDate(d){if(d===undefined||d===null||d==="")return "—";const s=(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(d))?d+"T12:00:00":d;const t=typeof s==="number"?s:new Date(s).getTime();if(isNaN(t))return ""+d;return new Date(t).toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"});}
// The player's Minecraft face, the same likeness their Imperial ID card carries.
function mcFaceUrl(n){return "https://mc-heads.net/avatar/"+encodeURIComponent(n||"")+"/64";}
function McFace({account,size=34,style:ex={}}){
  const n=account&&(account.mcName||account.username);
  if(!n) return null;
  return <img src={mcFaceUrl(n)} alt="" width={size} height={size} loading="lazy"
    onError={e=>{e.currentTarget.style.visibility="hidden";}}
    style={{width:size,height:size,borderRadius:3,imageRendering:"pixelated",
      border:`1px solid ${V.line}`,background:V.bg2,flexShrink:0,...ex}}/>;
}

/* ═══════════ THE ESTABLISHMENT ACT 2024 — the rules this page enforces ══════
   Sec. 6(2)(a)  A bill passes on at least five of seven Representatives in favour.
   Sec. 6(2)(b)  A presidential veto falls to a unanimous vote of the House.
   Sec. 6(2)(c)  A declaration of war needs six of seven; its veto is final.
   Sec. 7(2)(b)  Articles of Impeachment need five of seven.
   Sec. 3(2)     TEA itself needs six of seven and the President's ratification.
                 Those fractions are absolute — they are of the seven seats, not
                 of however many Representatives happen to vote.                 */
const HOUSE_SEATS=7;
const BILL_KINDS=[
  {v:"bill",       l:"Bill",                        short:"BILL",        threshold:5, vetoOverridable:true,
   cite:"TEA Sec. 6(2)(a)", note:"Five of seven Representatives in favour. The President must then sign it before it takes effect."},
  {v:"war",        l:"Declaration of War",          short:"WAR",         threshold:6, vetoOverridable:false,
   cite:"TEA Sec. 6(2)(c)", note:"Six of seven Representatives in favour. A presidential veto on a declaration of war cannot be overridden."},
  {v:"impeachment",l:"Articles of Impeachment",     short:"IMPEACHMENT", threshold:5, vetoOverridable:true,
   cite:"TEA Sec. 7(2)(b)", note:"Five of seven Representatives in favour. Passage opens the Review Panel, not removal from office."},
  {v:"tea",        l:"Amendment or Repeal of TEA",  short:"TEA",         threshold:6, vetoOverridable:false,
   cite:"TEA Sec. 3(2)",    note:"Six of seven Representatives in favour and the President's ratification. This veto cannot be overridden."},
];
const kindOf=v=>BILL_KINDS.find(k=>k.v===v)||BILL_KINDS[0];

const STATUSES={
  docket:  {l:"On the Docket",       color:V.textD,  desc:"Introduced, awaiting the Speaker to call it to the floor."},
  floor:   {l:"Before the House",    color:V.goldL,  desc:"Voting is open. Representatives may cast or change their vote."},
  passed:  {l:"Passed the House",    color:"#6fa8ff",desc:"Carried by the House, awaiting the President's signature."},
  law:     {l:"Enacted into Law",    color:V.greenL, desc:"Signed by the President and in force."},
  vetoed:  {l:"Vetoed",              color:V.red,    desc:"Returned by the President without signature."},
  override:{l:"Override Vote",       color:"#e08a3a",desc:"The House is voting on whether to override the veto."},
  failed:  {l:"Failed",              color:"#8a93a8",desc:"Did not carry."},
};
const statusOf=s=>STATUSES[s]||STATUSES.docket;

// TEA Sec. 9 — the line of succession to the presidency, in order.
const SUCCESSION=["Vice President","Speaker of the House","Secretary of State","Secretary of Treasury",
  "Secretary of Defense","Attorney General","Secretary of Interior","Secretary of Commerce",
  "Secretary of Health and Human Services"];
const CABINET_POSTS=["Secretary of State","Secretary of Treasury","Secretary of Defense","Attorney General",
  "Secretary of Interior","Secretary of Commerce","Secretary of Health and Human Services","Other"];

/* ── standing ────────────────────────────────────────────────────────────────
   Vinish office is a field on the shared account, granted from the Empire's
   Interior Ministry. The Emperor appoints the President under TEA 4(1)(a) and so
   outranks the office; the server enforces all of this again on every write. */
const vxRole=u=>String((u&&u.vxRole)||"");
const isEmperor=u=>!!u&&u.role==="emperor";
const isPresident=u=>vxRole(u)==="president";
const isSpeaker=u=>vxRole(u)==="speaker";
const isRep=u=>vxRole(u)==="representative";
// Who may put a bill on the floor, close the vote, and keep the roll: the Speaker,
// the President in the Speaker's absence (TEA 6(1)(b)), and the Emperor.
const canPreside=u=>isSpeaker(u)||isPresident(u)||isEmperor(u);
const canIntroduce=u=>isRep(u)||canPreside(u);

/* ── appointments ────────────────────────────────────────────────────────────
   Every Vinish office is conferred here, on this portal, by the Republic's own
   government — the Empire's ministries administer the account, not the office.
   Who may confer what follows the Act: the presidency is the Emperor's gift
   (TEA 4(1)(a)); the President appoints the Speaker (6(1)(a)) and the Cabinet
   (4(2)(f)); the Speaker runs the monthly elections that seat the House
   (6(1)(b)). The server enforces this again on every write. */
const VX_OFFICES=[
  {v:"",              l:"No standing",                   short:"NONE",           color:V.textDD,
   note:"Holds no office in the Republic."},
  {v:"citizen",       l:"Citizen of Vindex",             short:"CITIZEN",        color:V.textD,
   note:"Recognised as Vinish, holding no office."},
  {v:"representative",l:"Representative of the House",   short:"REPRESENTATIVE", color:"#6fa8ff",
   note:"Holds one of the seven seats and votes on every measure before the House."},
  {v:"speaker",       l:"Speaker of the House",          short:"SPEAKER",        color:V.goldL,
   note:"Calls bills to the floor and closes the vote. Runs the monthly elections. Holds no vote."},
  {v:"cabinet",       l:"Cabinet Secretary",             short:"CABINET",        color:"#9a7ab0",
   note:"Serves in the President's Cabinet. Holds no vote in the House."},
  {v:"vice_president",l:"Vice President",                short:"VICE PRESIDENT", color:"#6fa8ff",
   note:"First in the line of succession to the presidency."},
  {v:"president",     l:"President of Vindex Nation",    short:"PRESIDENT",      color:V.goldL,
   note:"Signs or vetoes the House's legislation, and appoints the Speaker and the Cabinet."},
];
const officeOf=v=>VX_OFFICES.find(o=>o.v===String(v||""))||VX_OFFICES[0];
// Which offices this account may confer, and on whom.
function grantableBy(actor){
  if(isEmperor(actor)) return VX_OFFICES.map(o=>o.v);             // including the presidency
  if(isPresident(actor)) return VX_OFFICES.filter(o=>o.v!=="president").map(o=>o.v);
  if(isSpeaker(actor)) return ["","citizen","representative"];    // the elections they run
  return [];
}
const canAppoint=u=>grantableBy(u).length>0;
// A sitting President may only be replaced by the Emperor, so no one else may edit
// that account's office at all — not even to demote them sideways.
function mayEditOffice(actor,target){
  const grants=grantableBy(actor);
  if(grants.length===0) return false;
  return grants.includes(String(target.vxRole||""));
}

/* ── UI atoms ────────────────────────────────────────────────────────────── */
function Btn({children,onClick,variant="primary",disabled,small,style:ex={}}){
  const base={fontFamily:"'Playfair Display',serif",fontWeight:700,letterSpacing:"0.06em",fontSize:small?12:13,
    padding:small?"5px 14px":"8px 20px",border:"1px solid",borderRadius:3,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.45:1,transition:"all .15s"};
  const variants={
    primary:{background:`linear-gradient(180deg,${V.panel2},${V.navy})`,borderColor:V.lineL,color:V.text},
    gold:{background:"linear-gradient(180deg,#3d2f14,#57431f)",borderColor:"#7a6231",color:V.goldL},
    green:{background:"linear-gradient(180deg,#1c4a24,#2e6b38)",borderColor:"#3f8a4c",color:"#d8f0d0"},
    danger:{background:"transparent",borderColor:V.redD,color:V.redL},
    armed:{background:`linear-gradient(180deg,${V.redD},${V.red})`,borderColor:V.redD,color:"#f0d0d0"},
    ghost:{background:"transparent",borderColor:V.line,color:V.textD},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...(variants[variant]||variants.primary),...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,small}){
  const [a,setA]=useState(false);
  useEffect(()=>{if(!a)return;const t=setTimeout(()=>setA(false),4000);return()=>clearTimeout(t);},[a]);
  return a?<Btn variant="armed" small={small} onClick={()=>{setA(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>
    :<Btn variant="danger" small={small} onClick={()=>setA(true)}>{label}</Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",...ex}}
    onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;
}
function TA({value,onChange,placeholder,rows=5}){
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.7}}
    onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;
}
function Sel({value,onChange,options,style:ex={}}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif",...ex}}>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function FL({children}){return <div className="mono" style={{fontSize:9,color:V.textD,letterSpacing:"0.18em",marginBottom:4,textTransform:"uppercase"}}>{children}</div>;}
function STitle({children,color}){return <div style={{display:"flex",alignItems:"center",gap:12,margin:"1.7rem 0 1rem"}}>
  <span className="pf" style={{fontWeight:700,fontSize:13,letterSpacing:"0.26em",textTransform:"uppercase",color:color||V.gold}}>{children}</span>
  <span style={{flex:1,height:1,background:`linear-gradient(90deg,${V.line},transparent)`}}/></div>;}
function Toast({msg,color}){if(!msg)return null;return <div style={{position:"fixed",top:14,right:14,zIndex:9999,background:V.panel,border:`1px solid ${color}66`,borderLeft:`3px solid ${color}`,padding:"9px 16px",borderRadius:3,fontFamily:"'Playfair Display',serif",fontSize:12,color,maxWidth:380,animation:"fadeIn .2s ease"}}>{msg}</div>;}
function Overlay({label}){if(!label)return null;return <div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(6,12,26,.96)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div className="mono" style={{color:V.gold,fontSize:10,letterSpacing:"0.35em",marginBottom:8,animation:"pulse 1s infinite"}}>PROCESSING</div><div className="pf" style={{fontSize:17,color:V.text}}>{label}</div></div></div>;}
function Seal({file,size=64,style:ex={}}){
  const [ok,setOk]=useState(true);
  if(!ok)return <div style={{width:size,height:size,borderRadius:"50%",border:`2px solid ${V.gold}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,...ex}}><span className="pf" style={{fontWeight:900,fontSize:size*0.3,color:V.gold}}>VN</span></div>;
  return <img src={"vindex/"+file} alt="" draggable={false} onError={()=>setOk(false)} style={{width:size,height:size,objectFit:"contain",flexShrink:0,...ex}}/>;
}
function PoweredBy(){
  const [ok,setOk]=useState(true);
  return <div style={{display:"inline-flex",alignItems:"center",gap:9}}>
    <span className="mono" style={{fontSize:8,letterSpacing:"0.22em",color:V.textDD,textTransform:"uppercase"}}>Powered by</span>
    {ok?<img src="vindex/saudkruger.png" alt="Saud Kruger Information Systems" draggable={false} onError={()=>setOk(false)} style={{height:30,width:"auto",objectFit:"contain",borderRadius:4,opacity:.95}}/>
      :<span className="pf" style={{fontWeight:700,fontSize:12,color:V.textD}}>Saud Kruger Information Systems</span>}
  </div>;
}
function Card({children,accent,style:ex={}}){
  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderTop:`3px solid ${accent||V.gold}`,
    borderRadius:"0 0 4px 4px",padding:"1.1rem 1.25rem",...ex}}>{children}</div>;
}
function Empty({children}){return <div style={{fontSize:14,color:V.textDD,fontStyle:"italic",padding:"1.2rem 0"}}>{children}</div>;}
function Cite({children}){return <span className="mono" style={{fontSize:8.5,letterSpacing:"0.12em",color:V.textDD,border:`1px solid ${V.line}`,borderRadius:2,padding:"1px 6px",whiteSpace:"nowrap"}}>{children}</span>;}

/* ── an officeholder, drawn straight from the shared account ─────────────── */
function Officer({account,office,accent,size=44,vacantNote}){
  const col=accent||V.gold;
  if(!account) return <div style={{background:V.bg2,border:`1px dashed ${V.line}`,borderRadius:3,padding:"0.8rem 1rem"}}>
    <div className="mono" style={{fontSize:8.5,letterSpacing:"0.2em",color:V.textDD,marginBottom:4,textTransform:"uppercase"}}>{office}</div>
    <div className="pf" style={{fontSize:15,fontWeight:700,color:V.textDD,fontStyle:"italic"}}>Vacant</div>
    {vacantNote&&<div style={{fontSize:11.5,color:V.textDD,fontStyle:"italic",marginTop:3,lineHeight:1.5}}>{vacantNote}</div>}
  </div>;
  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`3px solid ${col}`,
    borderRadius:"0 3px 3px 0",padding:"0.8rem 1rem",display:"flex",alignItems:"center",gap:11}}>
    <McFace account={account} size={size} style={{borderColor:col+"66"}}/>
    <div style={{minWidth:0}}>
      <div className="mono" style={{fontSize:8.5,letterSpacing:"0.2em",color:col,marginBottom:3,textTransform:"uppercase"}}>{office}</div>
      <div className="pf" style={{fontSize:16,fontWeight:700,color:V.text,lineHeight:1.15,overflowWrap:"anywhere"}}>{account.displayName||account.username}</div>
      {account.displayName&&<div className="mono" style={{fontSize:9.5,color:V.textDD}}>@{account.username}</div>}
    </div>
  </div>;
}

/* ═══════════ VOTE TALLY ══════════════════════════════════════════════════ */
// Ayes are counted against the seven seats, absolutely — TEA Sec. 3(2) is explicit
// that the fraction is not proportional to how many Representatives turn out.
// An override is the one relative test: it asks for every sitting member.
function tally(bill,votes,reps){
  const mine=Object.values(votes||{}).filter(v=>v.billId===bill.id);
  const byUser={}; mine.forEach(v=>{byUser[String(v.username||"").toLowerCase()]=v.vote;});
  const seated=reps.map(r=>String(r.username||"").toLowerCase());
  const cast=seated.map(u=>byUser[u]).filter(Boolean);
  const aye=cast.filter(v=>v==="aye").length;
  const nay=cast.filter(v=>v==="nay").length;
  const present=cast.filter(v=>v==="present").length;
  const k=kindOf(bill.kind);
  const overriding=bill.status==="override";
  // "Unanimous" is defined by TEA Sec. 2 as support from all members who vote on
  // the measure; an override also needs the whole House to have voted, so a veto
  // cannot be undone by two members while five stay silent.
  const need=overriding?Math.max(seated.length,1):k.threshold;
  const carried=overriding
    ? seated.length>0&&aye===seated.length
    : aye>=k.threshold;
  return {aye,nay,present,cast:cast.length,seated:seated.length,byUser,need,carried,overriding,kind:k};
}

function TallyBar({t}){
  const seg=(n,color,label)=>n>0?<div key={label} title={label+": "+n} style={{flex:n,background:color,height:"100%"}}/>:null;
  const unvoted=Math.max(0,t.seated-t.cast);
  return <div>
    <div style={{display:"flex",height:8,borderRadius:2,overflow:"hidden",background:V.bg2,border:`1px solid ${V.line}`}}>
      {seg(t.aye,V.greenL,"Aye")}{seg(t.nay,V.red,"Nay")}{seg(t.present,V.textD,"Present")}{seg(unvoted,"#1b2f52","Not voted")}
    </div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6}}>
      {[["Aye",t.aye,V.greenL],["Nay",t.nay,V.red],["Present",t.present,V.textD]].map(([l,n,c])=>(
        <span key={l} className="mono" style={{fontSize:9.5,color:c,letterSpacing:"0.08em"}}>{l.toUpperCase()} {n}</span>
      ))}
      <span className="mono" style={{fontSize:9.5,color:t.carried?V.greenL:V.textDD,letterSpacing:"0.08em",marginLeft:"auto"}}>
        {t.overriding?"NEEDS ALL "+t.need:"NEEDS "+t.need+" OF "+HOUSE_SEATS}
      </span>
    </div>
  </div>;
}

/* ═══════════ BILL CARD ═══════════════════════════════════════════════════ */
function BillCard({bill,votes,reps,user,accounts,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const [vetoNote,setVetoNote]=useState("");
  const st=statusOf(bill.status);
  const k=kindOf(bill.kind);
  const t=tally(bill,votes,reps);
  const voting=bill.status==="floor"||bill.status==="override";
  const me=String(user?.username||"").toLowerCase();
  const myVote=t.byUser[me];
  const iAmSeated=isRep(user)&&reps.some(r=>String(r.username||"").toLowerCase()===me);
  const sponsor=accounts[String(bill.sponsor||"").toLowerCase()];

  const cast=async(v)=>{
    setProcessing("Recording your vote…");
    const res=await onAction("castVote",{bill,vote:v});
    setProcessing(null);
    notify(res.ok?("Vote recorded: "+v.toUpperCase()+".") :res.error,res.ok?V.greenL:V.redL);
  };

  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${st.color}`,
    borderRadius:"0 3px 3px 0",marginBottom:8,overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{padding:"0.8rem 1.1rem",cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span className="mono" style={{fontSize:9,color:V.goldL,letterSpacing:"0.1em"}}>{bill.number||"—"}</span>
        <span className="pf" style={{fontWeight:700,fontSize:15,color:V.text,flex:1,minWidth:160}}>{bill.title}</span>
        <span className="mono" style={{fontSize:8,color:V.textD,border:`1px solid ${V.line}`,borderRadius:2,padding:"1px 6px"}}>{k.short}</span>
        <span className="mono" style={{fontSize:8.5,color:st.color,border:`1px solid ${st.color}55`,background:st.color+"14",borderRadius:2,padding:"2px 8px"}}>{st.l.toUpperCase()}</span>
        <span style={{fontSize:11,color:V.textDD}}>{open?"▲":"▼"}</span>
      </div>
      {(voting||bill.status==="passed"||bill.status==="law")&&<div style={{marginTop:9}}><TallyBar t={t}/></div>}
    </div>

    {open&&<div style={{borderTop:`1px solid ${V.line}`,background:V.bg2,padding:"1rem 1.1rem"}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
        <Cite>{k.cite}</Cite>
        <span style={{fontSize:12,color:V.textD,fontStyle:"italic",flex:1,minWidth:200,lineHeight:1.6}}>{k.note}</span>
      </div>
      {bill.summary&&<div style={{fontSize:14,color:V.text,lineHeight:1.75,marginBottom:10}}>{bill.summary}</div>}
      {bill.text&&<div style={{background:V.bg,border:`1px solid ${V.line}`,borderRadius:3,padding:"0.85rem 1rem",
        fontSize:13.5,color:V.textD,lineHeight:1.85,whiteSpace:"pre-wrap",maxHeight:280,overflowY:"auto",marginBottom:10}}>{bill.text}</div>}

      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:10}}>
        {sponsor&&<span className="mono" style={{fontSize:9.5,color:V.textDD}}>INTRODUCED BY {(sponsor.displayName||sponsor.username).toUpperCase()}</span>}
        {bill.created&&<span className="mono" style={{fontSize:9.5,color:V.textDD}}>INTRODUCED {fmtDate(bill.created).toUpperCase()}</span>}
        {bill.signedAt&&<span className="mono" style={{fontSize:9.5,color:V.greenL}}>SIGNED {fmtDate(bill.signedAt).toUpperCase()}</span>}
        {bill.vetoedAt&&<span className="mono" style={{fontSize:9.5,color:V.redL}}>VETOED {fmtDate(bill.vetoedAt).toUpperCase()}</span>}
      </div>
      {bill.vetoNote&&<div style={{background:"#2a1013",border:`1px solid ${V.redD}66`,borderLeft:`3px solid ${V.red}`,
        borderRadius:"0 3px 3px 0",padding:"0.7rem 1rem",marginBottom:10}}>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.redL,marginBottom:4}}>VETO MESSAGE</div>
        <div style={{fontSize:13,color:V.text,lineHeight:1.7}}>{bill.vetoNote}</div></div>}

      {/* The roll — who voted, and how. Kept open so the record is public. */}
      {(voting||["passed","law","vetoed","failed"].includes(bill.status))&&reps.length>0&&<div style={{marginBottom:12}}>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.textDD,marginBottom:6}}>THE ROLL</div>
        <div className="vx-bench">
          {reps.map(r=>{
            const v=t.byUser[String(r.username||"").toLowerCase()];
            const col=v==="aye"?V.greenL:v==="nay"?V.red:v==="present"?V.textD:V.textDD;
            return <div key={r.username} style={{display:"flex",alignItems:"center",gap:7,background:V.bg,
              border:`1px solid ${V.line}`,borderRadius:2,padding:"5px 8px"}}>
              <McFace account={r} size={20}/>
              <span style={{fontSize:12.5,color:V.text,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.displayName||r.username}</span>
              <span className="mono" style={{fontSize:8.5,color:col,letterSpacing:"0.08em"}}>{v?v.toUpperCase():"—"}</span>
            </div>;
          })}
        </div>
      </div>}

      {/* Casting a vote. Only a seated Representative sees these. */}
      {voting&&iAmSeated&&<div style={{background:V.bg,border:`1px solid ${V.gold}44`,borderRadius:3,padding:"0.85rem 1rem",marginBottom:10}}>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.goldL,marginBottom:8}}>
          YOUR VOTE{myVote?" — CURRENTLY "+myVote.toUpperCase():""}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn small variant={myVote==="aye"?"green":"ghost"} onClick={()=>cast("aye")}>Aye</Btn>
          <Btn small variant={myVote==="nay"?"armed":"ghost"} onClick={()=>cast("nay")}>Nay</Btn>
          <Btn small variant={myVote==="present"?"primary":"ghost"} onClick={()=>cast("present")}>Present</Btn>
        </div>
        <div style={{fontSize:11.5,color:V.textDD,fontStyle:"italic",marginTop:7,lineHeight:1.6}}>
          You may change your vote until the Speaker closes the floor. Voting "present" is
          taking part without supporting — it counts against neither side, but it is not an aye.
        </div>
      </div>}
      {voting&&!iAmSeated&&<div style={{fontSize:12.5,color:V.textDD,fontStyle:"italic",marginBottom:10,lineHeight:1.6}}>
        {user?"Only the seven sitting Representatives hold a vote in the House.":"Sign in as a sitting Representative to vote."}
      </div>}

      {/* Presiding controls. */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {canPreside(user)&&bill.status==="docket"&&<Btn small variant="gold" onClick={async()=>{
          setProcessing("Calling the bill…");
          const res=await onAction("setStatus",{bill,status:"floor"});
          setProcessing(null); notify(res.ok?"Bill is before the House.":res.error,res.ok?V.goldL:V.redL);
        }}>Call to the Floor</Btn>}

        {canPreside(user)&&voting&&<Btn small variant="gold" onClick={async()=>{
          setProcessing("Closing the floor…");
          // The outcome is settled here, from the roll as it stands.
          const next=t.carried?(t.overriding?"law":"passed"):"failed";
          const res=await onAction("closeFloor",{bill,status:next,carried:t.carried});
          setProcessing(null);
          notify(res.ok?(t.carried?(t.overriding?"Veto overridden — enacted into law.":"Carried — sent to the President."):"The measure failed.")
            :res.error,res.ok?(t.carried?V.greenL:V.textD):V.redL);
        }}>Close the Floor{t.carried?" — Carried":" — Failing"}</Btn>}

        {isPresident(user)&&bill.status==="passed"&&<>
          <Btn small variant="green" onClick={async()=>{
            setProcessing("Signing…");
            const res=await onAction("sign",{bill});
            setProcessing(null); notify(res.ok?"Signed into law.":res.error,res.ok?V.greenL:V.redL);
          }}>Sign into Law</Btn>
          <Inp value={vetoNote} onChange={setVetoNote} placeholder="Veto message (optional)…" style={{maxWidth:280}}/>
          <ArmBtn small label="Veto" confirmLabel="Veto this bill?" onConfirm={async()=>{
            setProcessing("Returning the bill…");
            const res=await onAction("veto",{bill,vetoNote:vetoNote.trim()});
            setProcessing(null); notify(res.ok?"Vetoed and returned to the House.":res.error,res.ok?V.redL:V.redL);
          }}/>
        </>}

        {canPreside(user)&&bill.status==="vetoed"&&(k.vetoOverridable
          ?<Btn small variant="gold" onClick={async()=>{
              setProcessing("Opening the override…");
              const res=await onAction("setStatus",{bill,status:"override"});
              setProcessing(null); notify(res.ok?"Override vote open — a unanimous House is required.":res.error,res.ok?V.goldL:V.redL);
            }}>Open Override Vote</Btn>
          :<span style={{fontSize:12,color:V.redL,fontStyle:"italic"}}>
              This veto is final — {k.cite} allows no override.
            </span>)}

        {canPreside(user)&&["docket","failed"].includes(bill.status)&&
          <ArmBtn small label="Withdraw" confirmLabel="Remove from the record?" onConfirm={async()=>{
            setProcessing("Withdrawing…");
            const res=await onAction("deleteBill",{bill});
            setProcessing(null); notify(res.ok?"Withdrawn.":res.error,V.textD);
          }}/>}
      </div>
      <div style={{fontSize:11.5,color:V.textDD,fontStyle:"italic",marginTop:9,lineHeight:1.6}}>{st.desc}</div>
    </div>}
  </div>;
}

/* ═══════════ HOME ════════════════════════════════════════════════════════ */

  const laws=Object.values(bills||{}).filter(b=>b.status==="law").length;

  const BRANCH=[
    {k:"executive",l:"The Executive",icon:"★",color:V.goldL,
     d:"The President, the Vice President, and the Cabinet. Enacts or vetoes the House's legislation, enforces the law, and issues executive orders.",
     cite:"TEA Sec. 4",foot:president?("President "+(president.displayName||president.username)):"The presidency is vacant"},
    {k:"legislature",l:"The Legislature",icon:"⚖",color:"#6fa8ff",
     d:"The House of Representatives — seven members elected by the general public each month, presided over by a Speaker appointed by the President.",
     cite:"TEA Sec. 6",foot:reps.length+" of "+HOUSE_SEATS+" seats filled · "+onFloor+" before the House"},

      <div style={{fontSize:15,color:V.textD,fontStyle:"italic",marginTop:7,maxWidth:640,margin:"7px auto 0",lineHeight:1.75}}>

        The Establishment Act 2024.
      </div>
    </div>
    <STitle>The Three Branches</STitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12}}>

        <div key={b.k} onClick={()=>onGo(b.k)} style={{background:V.panel,border:`1px solid ${V.line}`,

          transition:"border-color .15s",display:"flex",flexDirection:"column"}}

          onMouseLeave={e=>e.currentTarget.style.borderColor=V.line}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span className="pf" style={{fontSize:22,color:b.color,lineHeight:1}}>{b.icon}</span>
            <span className="pf" style={{fontWeight:700,fontSize:17,color:V.text}}>{b.l}</span>
          </div>
          <div style={{fontSize:13.5,color:V.textD,lineHeight:1.75,flex:1}}>{b.d}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:11,flexWrap:"wrap"}}>

    <STitle>The State of the Republic</STitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
      {[["Acts in force",laws,V.greenL],["Before the House",onFloor,V.goldL],
        ["Seats filled",reps.length+" / "+HOUSE_SEATS,"#6fa8ff"],
        ["Speaker",speaker?(speaker.displayName||speaker.username):"Vacant",V.text]].map(([l,n,c])=>(
        <Card key={l} accent={c}>
          <div className="pf" style={{fontWeight:900,fontSize:22,color:c,lineHeight:1.2,overflowWrap:"anywhere"}}>{n}</div>
          <div className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.textDD,marginTop:5,textTransform:"uppercase"}}>{l}</div>

        borderRadius:"0 3px 3px 0",padding:"0.9rem 1.1rem"}}>

/* ═══════════ EXECUTIVE ═══════════════════════════════════════════════════ */
function ExecutiveTab({president,vp,cabinet,gov,orders,speaker}){
  const posts=gov.cabinet||{};
  const orderList=Object.values(orders||{}).sort((a,b)=>(b.issued||0)-(a.issued||0));
  // The line of succession, with the person who would actually step up named.
  const holderOf=(post)=>{
    if(post==="Vice President") return vp;
    if(post==="Speaker of the House") return speaker;
    return cabinet.find(c=>posts[String(c.username||"").toLowerCase()]===post)||null;
  };
  return <div className="fadeIn">
    <STitle>The Presidency</STitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10}}>
      <Officer account={president} office="President of Vindex Nation" accent={V.goldL} size={52}
        vacantNote="Appointed by the Emperor under TEA Sec. 4(1)(a)."/>
      <Officer account={vp} office="Vice President" accent="#6fa8ff" size={52}
        vacantNote="Assumes the presidency should it fall vacant."/>
    </div>
    <div style={{background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"0.9rem 1.1rem",marginTop:10}}>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
        <Cite>TEA Sec. 4(2)</Cite>
        <span className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.textDD}}>POWERS OF THE EXECUTIVE</span>
      </div>
      <div style={{fontSize:13.5,color:V.textD,lineHeight:1.85}}>
        To enact or veto legislation passed by the House; to authorize a declaration of war;
        to manage the officers and employees of the government, save those of the Judicial and
        Legislative branches; to authorize the use of military force within Vinish territory;
        to enforce the laws; and to appoint and regulate a Cabinet at the President's discretion.
        Any power not granted elsewhere, and not denied by law, rests here.
      </div>
    </div>

    <STitle>The Cabinet</STitle>
    {cabinet.length===0?<Empty>No Cabinet secretaries appointed. The President may create and dismantle departments at their discretion.</Empty>
      :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:10}}>
        {cabinet.map(c=><Officer key={c.username} account={c}
          office={posts[String(c.username||"").toLowerCase()]||"Cabinet Secretary"} accent="#9a7ab0"/>)}
      </div>}

    <STitle>Executive Orders</STitle>
    <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginBottom:10,lineHeight:1.7}}>
      A lawfully-binding directive issued to the Cabinet departments and the citizens of Vindex
      Nation. An executive order may not violate standing law, and is subject to judicial review.
      <span style={{marginLeft:8}}><Cite>TEA Sec. 4(3)</Cite></span>
    </div>
    {orderList.length===0?<Empty>No executive orders on the register.</Empty>
      :orderList.map(o=>(
        <div key={o.id} style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`3px solid ${V.goldL}`,
          borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:6}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span className="mono" style={{fontSize:9,color:V.goldL,letterSpacing:"0.1em"}}>{o.number||"E.O."}</span>
            <span className="pf" style={{fontWeight:700,fontSize:15,color:V.text,flex:1,minWidth:150}}>{o.title}</span>
            <span className="mono" style={{fontSize:9,color:V.textDD}}>{fmtDate(o.issued).toUpperCase()}</span>
          </div>
          {o.text&&<div style={{fontSize:13.5,color:V.textD,lineHeight:1.8,marginTop:7,whiteSpace:"pre-wrap"}}>{o.text}</div>}
        </div>
      ))}

    <STitle>Line of Succession</STitle>
    <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginBottom:10,lineHeight:1.7}}>
      Should the President be removed, the presidency passes in this order.
      <span style={{marginLeft:8}}><Cite>TEA Sec. 9</Cite></span>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      {SUCCESSION.map((post,i)=>{
        const h=holderOf(post);
        return <div key={post} style={{display:"flex",alignItems:"center",gap:10,background:i===0?V.panel:V.bg2,
          border:`1px solid ${V.line}`,borderRadius:2,padding:"6px 12px"}}>
          <span className="mono" style={{fontSize:9,color:V.textDD,width:20,flexShrink:0}}>{i+1}</span>
          <span style={{fontSize:13.5,color:V.text,flex:1,minWidth:130}}>{post}</span>
          {h?<><McFace account={h} size={18}/><span className="mono" style={{fontSize:10,color:V.goldL}}>{h.displayName||h.username}</span></>
            :<span className="mono" style={{fontSize:9,color:V.textDD,fontStyle:"italic"}}>VACANT</span>}
        </div>;
      })}
    </div>
  </div>;
}

/* ═══════════ LEGISLATURE ═════════════════════════════════════════════════ */
function LegislatureTab({speaker,reps,bills,votes,user,accounts,onAction,notify,setProcessing}){
  const [sub,setSub]=useState("floor");
  const all=Object.values(bills||{});
  const onFloor=all.filter(b=>b.status==="floor"||b.status==="override").sort((a,b)=>(b.tabledAt||0)-(a.tabledAt||0));
  const awaiting=all.filter(b=>b.status==="passed"||b.status==="vetoed").sort((a,b)=>(b.closedAt||0)-(a.closedAt||0));
  const docket=all.filter(b=>b.status==="docket").sort((a,b)=>(a.created||0)-(b.created||0));
  const laws=all.filter(b=>b.status==="law").sort((a,b)=>(b.signedAt||0)-(a.signedAt||0));
  const failed=all.filter(b=>b.status==="failed").sort((a,b)=>(b.closedAt||0)-(a.closedAt||0));
  const SUBS=[["floor","Before the House",onFloor.length+awaiting.length],["docket","Docket",docket.length],
    ["law","Law",laws.length],["members","Members",reps.length],["failed","Failed",failed.length]];
  const props={votes,reps,user,accounts,onAction,notify,setProcessing};

  return <div className="fadeIn">
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10,marginBottom:"0.5rem"}}>
      <Officer account={speaker} office="Speaker of the House" accent={V.goldL} size={52}
        vacantNote="Appointed by the President for a term of one month. TEA Sec. 6(1)(a)."/>
      <Card accent="#6fa8ff">
        <div className="pf" style={{fontWeight:900,fontSize:22,color:"#6fa8ff",lineHeight:1.2}}>{reps.length} / {HOUSE_SEATS}</div>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.18em",color:V.textDD,marginTop:5}}>SEATS FILLED</div>
        <div style={{fontSize:12,color:V.textD,fontStyle:"italic",marginTop:6,lineHeight:1.6}}>
          Seven Representatives are elected by the general public each month.
        </div>
      </Card>
    </div>

    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${V.line}`,margin:"1.3rem 0 1rem",overflowX:"auto"}}>
      {SUBS.map(([id,label,n])=>(
        <button key={id} onClick={()=>setSub(id)} className="pf" style={{fontWeight:700,fontSize:11.5,
          letterSpacing:"0.12em",textTransform:"uppercase",padding:"0.6rem 1rem",background:"transparent",
          border:"none",cursor:"pointer",whiteSpace:"nowrap",borderBottom:`2px solid ${sub===id?V.gold:"transparent"}`,
          color:sub===id?V.goldL:V.textD}}>{label}{n>0?" ("+n+")":""}</button>
      ))}
    </div>

    {sub==="floor"&&<>
      <STitle>Voting Now</STitle>
      {onFloor.length===0?<Empty>No measure is before the House. The Speaker calls bills to the floor from the docket.</Empty>
        :onFloor.map(b=><BillCard key={b.id} bill={b} {...props}/>)}
      {awaiting.length>0&&<>
        <STitle color="#6fa8ff">Awaiting the President</STitle>
        {awaiting.map(b=><BillCard key={b.id} bill={b} {...props}/>)}
      </>}
    </>}

    {sub==="docket"&&<>
      <STitle>The Docket</STitle>
      <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginBottom:10,lineHeight:1.7}}>
        Bills introduced but not yet called to the floor.
      </div>
      {docket.length===0?<Empty>Nothing on the docket.</Empty>:docket.map(b=><BillCard key={b.id} bill={b} {...props}/>)}
    </>}

    {sub==="law"&&<>
      <STitle color={V.greenL}>The Law of Vindex Nation</STitle>
      <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginBottom:10,lineHeight:1.7}}>

/* ── APPOINTMENTS — where every Vinish office is conferred ────────────────── */
function AppointmentsForm({user,accounts,onAction,notify,setProcessing}){
  const [search,setSearch]=useState("");
  const [showAll,setShowAll]=useState(false);
  const grants=grantableBy(user);
  const seated=Object.values(accounts).filter(a=>String(a.vxRole||"")!=="").length;
  const reps=Object.values(accounts).filter(a=>String(a.vxRole||"")==="representative").length;
  const q=search.trim().toLowerCase();
  // Everyone holding office is always listed; the rest of the Imperial Network
  // appears only on a search, so the roll is not lost in a directory.
  const list=Object.values(accounts)
    .filter(a=>{
      const holds=String(a.vxRole||"")!=="";
      if(q) return ((a.displayName||"")+" "+(a.username||"")).toLowerCase().includes(q);
      return holds||showAll;
    })
    .sort((a,b)=>{
      const oi=v=>{const i=VX_OFFICES.findIndex(o=>o.v===String(v||""));return i<0?99:(v?-i:99);};
      const d=oi(a.vxRole)-oi(b.vxRole);
      return d!==0?d:((a.displayName||a.username)||"").localeCompare((b.displayName||b.username)||"");
    });

  return <div>
    <div style={{background:V.bg2,border:`1px solid ${V.line}`,borderLeft:`3px solid ${V.gold}`,
      borderRadius:"0 3px 3px 0",padding:"0.9rem 1.1rem",marginBottom:"1rem"}}>

      <div style={{fontSize:13.5,color:V.textD,lineHeight:1.8}}>

          ? <>As Emperor you appoint the President of Vindex Nation, and may confer any Vinish office. <Cite>TEA Sec. 4(1)(a)</Cite></>

          ? <>As President you appoint the Speaker, the Vice President and the Cabinet, and may seat Representatives. The presidency itself is the Emperor's to confer, so you may neither appoint a successor nor remove yourself. <Cite>TEA Sec. 4(2)(f), 6(1)(a)</Cite></>
          : <>As Speaker you seat the Representatives returned by the monthly elections you organize. A Representative may otherwise be removed only on conviction in a federal court, or by impeachment. <Cite>TEA Sec. 6(1)(b)</Cite></>}
      </div>
      <div style={{fontSize:12,color:V.textDD,fontStyle:"italic",marginTop:8,lineHeight:1.7}}>

      </div>
    </div>

      {[["Offices held",seated,V.goldL],["Seats filled",reps+" / "+HOUSE_SEATS,"#6fa8ff"]].map(([l,n,c])=>(

          <div className="mono" style={{fontSize:8,letterSpacing:"0.16em",color:V.textDD,marginTop:3,textTransform:"uppercase"}}>{l}</div>
        </div>

    </div>

    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:"0.9rem"}}>
      <div style={{flex:1,minWidth:200}}><Inp value={search} onChange={setSearch} placeholder="Search the Imperial Network for someone to appoint…"/></div>
      {!q&&<Btn small variant="ghost" onClick={()=>setShowAll(s=>!s)}>{showAll?"Show office-holders only":"Show everyone"}</Btn>}
    </div>

    {list.length===0
      ?<Empty>{q?"No account by that name.":"No Vinish offices conferred yet. Search for an account to appoint."}</Empty>
      :<div style={{display:"flex",flexDirection:"column",gap:5}}>
        {list.map(a=><AppointRow key={a.username} account={a} user={user} grants={grants}
          onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}

  </div>;
}

function AppointRow({account,user,grants,onAction,notify,setProcessing}){
  const cur=String(account.vxRole||"");
  const o=officeOf(cur);
  const isMe=String(account.username||"").toLowerCase()===String(user.username||"").toLowerCase();
  // You may only touch an office you are allowed to confer — which is what keeps a
  // President from demoting the President, or a Speaker from unseating the Cabinet.
  const editable=mayEditOffice(user,account);
  const opts=VX_OFFICES.filter(x=>grants.includes(x.v));
  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`3px solid ${cur?o.color:V.line}`,

    </div>
    {editable
      ?<div style={{minWidth:250}}>
        <Sel value={cur} options={opts.map(x=>({v:x.v,l:x.l}))} onChange={async v=>{
          setProcessing(v?"Conferring office…":"Removing from office…");
          const res=await onAction("setOffice",{account,office:v});
          setProcessing(null);
          notify(res.ok
            ?((account.displayName||account.username)+(v?" — "+officeOf(v).l:" removed from office"))
            :res.error,res.ok?V.goldL:V.redL);
        }}/>
      </div>
      :<div style={{minWidth:250,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8}}>
        <span className="mono" style={{fontSize:9,color:o.color,border:`1px solid ${o.color}44`,

        <span style={{fontSize:11,color:V.textDD,fontStyle:"italic"}}>
          {cur==="president"?"the Emperor's to confer":"not yours to confer"}
        </span>
      </div>}
  </div>;
}
function IntroduceForm({bills,onAction,notify,setProcessing}){

function AuthModal({onClose,onAuth}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(busy)return;
    if(!u.trim()||!p){setErr("Enter your credentials.");return;}
    setBusy(true);setErr("");
    const res=await slogin(u,p);
    if(!res.ok){setErr(res.error==="ACCESS DENIED"?"Credentials rejected.":res.error);setBusy(false);return;}
    onAuth(res.account);
  };
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(5,10,22,.92)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{maxWidth:400,width:"100%",background:V.panel,border:`1px solid ${V.line}`,borderTop:`3px solid ${V.gold}`,borderRadius:"0 0 5px 5px",padding:"1.7rem"}} onKeyDown={e=>{if(e.key==="Enter")go();}}>
      <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
        <Seal file="coa.png" size={56} style={{margin:"0 auto 10px",display:"block"}}/>
        <div className="mono" style={{fontSize:9,letterSpacing:"0.4em",color:V.gold}}>VINDEX NATION</div>
        <div className="pf" style={{fontWeight:900,fontSize:20,color:V.text,marginTop:4}}>Sign In</div>
        <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginTop:6,lineHeight:1.6}}>
          Use your Imperial Network account — the Republic and the Empire share one sign-in.
          The public record is readable without it.
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>Username</FL><Inp value={u} onChange={setU} placeholder="Username"/></div>
        <div><FL>Password</FL><Inp value={p} onChange={setP} type="password" placeholder="Password"/></div>

        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App(){
  const [raw,setRaw]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState("home");
  // Seeded from the cached session so the header shows you signed in immediately;
  // the effect below reconciles it against the server.
  const [user,setUser]=useState(()=>cachedAccount());
  const [authOpen,setAuthOpen]=useState(false);
  const [toast,setToast]=useState({msg:"",color:V.gold});
  const [processing,setProcessing]=useState(null);
  const notify=useCallback((msg,color=V.gold)=>{setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);},[]);

  useEffect(()=>{sgetAll().then(r=>{setRaw(r);setLoaded(true);});},[]);
  // clearSession() drops AUTH_TOKEN, so a null account with no token left means the
  // server genuinely rejected it — sign the optimistic user back out. A null with
  // the token still held is just an unreachable server; keep showing them signed in.
  useEffect(()=>{srestore().then(acc=>{if(acc){setUser(acc);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));}else if(!AUTH_TOKEN)setUser(null);});},[]);

  // Accounts are shared with the Empire and arrive in the snapshot as mi_accounts.
  // Vinish office is a field on them, so the government's roster is simply a read
  // of who holds which office — there is no second roster to keep in step.
  const accounts=useMemo(()=>{
    const out={};
    Object.values(raw["mi_accounts"]||{}).forEach(a=>{if(a&&a.username)out[String(a.username).toLowerCase()]=a;});
    return out;
  },[raw]);
  const byRole=useCallback(r=>Object.values(accounts).filter(a=>String(a.vxRole||"")===r)
    .sort((a,b)=>((a.displayName||a.username)||"").localeCompare((b.displayName||b.username)||"")),[accounts]);
  const president=useMemo(()=>byRole("president")[0]||null,[byRole]);
  const vp=useMemo(()=>byRole("vice_president")[0]||null,[byRole]);
  const speaker=useMemo(()=>byRole("speaker")[0]||null,[byRole]);
  const cabinet=useMemo(()=>byRole("cabinet"),[byRole]);
  // Seven seats; if more accounts carry the standing than there are seats, the
  // extra names are still listed rather than silently dropped.
  const reps=useMemo(()=>byRole("representative"),[byRole]);

  const bills=useMemo(()=>raw["vx_bills"]||{},[raw]);
  const votes=useMemo(()=>raw["vx_votes"]||{},[raw]);
  const orders=useMemo(()=>raw["vx_orders"]||{},[raw]);
  const gov=useMemo(()=>raw["vx_gov"]||{},[raw]);

  const meUser=String(user?.username||"").toLowerCase();

  const onAction=useCallback(async(type,p)=>{
    // Writes go per record, so two Representatives acting at once cannot clobber
    // one another. Local state is updated from the same record that was sent.
    const putBill=async(bill)=>{
      const res=await saveRecord("vx_bills",bill);
      if(res.ok) setRaw(r=>({...r,vx_bills:{...(r.vx_bills||{}),[bill.id]:bill}}));
      return res;
    };
    if(type==="introduce"){
      const id="vxb_"+uid();
      const bill={id,...p,status:"docket",sponsor:meUser,created:Date.now()};
      return await putBill(bill);
    }
    if(type==="setStatus"){
      const bill={...p.bill,status:p.status,
        ...(p.status==="floor"||p.status==="override"?{tabledAt:Date.now()}:{})};
      return await putBill(bill);
    }
    if(type==="closeFloor"){
      const bill={...p.bill,status:p.status,closedAt:Date.now(),
        ...(p.status==="law"?{signedAt:Date.now(),enactedBy:"override"}:{})};
      return await putBill(bill);
    }
    if(type==="sign") return await putBill({...p.bill,status:"law",signedAt:Date.now(),signedBy:meUser});
    if(type==="veto") return await putBill({...p.bill,status:"vetoed",vetoedAt:Date.now(),vetoedBy:meUser,vetoNote:p.vetoNote||""});
    if(type==="deleteBill"){
      const ok=await deleteRecord("vx_bills",p.bill.id);
      if(ok) setRaw(r=>{const n={...(r.vx_bills||{})};delete n[p.bill.id];return {...r,vx_bills:n};});
      return ok?{ok:true}:{ok:false,error:"Could not withdraw."};
    }
    if(type==="castVote"){
      // The id ties the vote to the voter and the bill, so it can be neither cast
      // for someone else nor duplicated. The server checks all of this again.
      const id=p.bill.id+"__"+meUser;
      const rec={id,billId:p.bill.id,username:meUser,vote:p.vote,at:Date.now()};
      const res=await saveRecord("vx_votes",rec);
      if(res.ok) setRaw(r=>({...r,vx_votes:{...(r.vx_votes||{}),[id]:rec}}));
      return res;
    }
    if(type==="issueOrder"){
      const id="vxo_"+uid();
      const rec={id,...p,issued:Date.now(),issuedBy:meUser};
      const res=await saveRecord("vx_orders",rec);
      if(res.ok) setRaw(r=>({...r,vx_orders:{...(r.vx_orders||{}),[id]:rec}}));
      return res;
    }
    if(type==="rescindOrder"){
      const ok=await deleteRecord("vx_orders",p.id);
      if(ok) setRaw(r=>{const n={...(r.vx_orders||{})};delete n[p.id];return {...r,vx_orders:n};});
      return ok?{ok:true}:{ok:false,error:"Could not rescind."};
    }
    if(type==="setOffice"){
      // Office is a field on the shared account, so this is an account write — the
      // server allows a Vinish officer to change vxRole and nothing else about it,
      // which is why the whole existing record is sent back untouched beside it.
      const next={...p.account,vxRole:p.office};
      const res=await saveRecord("accounts",next);
      if(res.ok) setRaw(r=>({...r,mi_accounts:{...(r.mi_accounts||{}),[next.username]:next}}));
      return res;
    }
    if(type==="setCabinetPost"){
      const nextPosts={...(gov.cabinet||{})};
      if(p.post) nextPosts[p.username]=p.post; else delete nextPosts[p.username];
      const next={...gov,cabinet:nextPosts};
      const ok=await sset("vx_gov",next);
      if(ok) setRaw(r=>({...r,vx_gov:next}));
      return ok?{ok:true}:{ok:false,error:"Refused — you may not set Cabinet posts."};
    }
    return {ok:false,error:"Unknown action."};
  },[gov,meUser]);

  const hasPanel=canIntroduce(user)||canAppoint(user);
  const TABS=[
    {v:"home",l:"The Republic"},
    {v:"executive",l:"Executive"},
    {v:"legislature",l:"Legislature"},
    {v:"judiciary",l:"Judiciary"},
    ...(hasPanel?[{v:"panel",l:"Government Panel"}]:[]),
  ];
  const standing=user?(vxRole(user)?officeOf(vxRole(user)).l:(isEmperor(user)?"Emperor of Lech":"Signed in")):"";

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse 80% 45% at 50% -5%, #1c3a6e55, transparent 60%), ${V.bg}`}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:`linear-gradient(180deg,${V.navy},${V.bg2})`,borderBottom:`2px solid ${V.gold}55`}}>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0.8rem 1.2rem",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <a href="index.html" className="mono" style={{fontSize:8,letterSpacing:"0.1em",color:V.textD,textDecoration:"none",border:`1px solid ${V.line}`,borderRadius:2,padding:"4px 9px",flexShrink:0}}>← VINTRANET</a>
        <Seal file="coa.png" size={44}/>
        <div style={{flex:1,minWidth:170}}>
          <div className="pf" style={{fontWeight:900,fontSize:16.5,letterSpacing:"0.05em",color:V.text,lineHeight:1.1}}>Government Portal</div>
          <div className="mono" style={{fontSize:8,letterSpacing:"0.3em",color:V.gold,marginTop:2}}>REPUBLIC OF VINDEX NATION · E PLURIBUS UNUM</div>
        </div>
        {user?<div style={{display:"flex",alignItems:"center",gap:10}}>
          <McFace account={user} size={30}/>
          <div style={{textAlign:"right",lineHeight:1.25}}>
            <div className="pf" style={{fontWeight:700,fontSize:12.5,color:V.text}}>{user.displayName||user.username}</div>
            <div className="mono" style={{fontSize:7.5,letterSpacing:"0.14em",color:hasPanel?V.goldL:V.textDD}}>{standing.toUpperCase()}</div>
          </div>
          <Btn small variant="ghost" onClick={()=>{forgetSession();setUser(null);if(tab==="panel")setTab("home");notify("Signed out.",V.textD);}}>Sign out</Btn>
        </div>:<Btn small variant="gold" onClick={()=>setAuthOpen(true)}>Sign In</Btn>}
      </div>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0 1.2rem",display:"flex",overflowX:"auto"}}>
        {TABS.map(t=>(<button key={t.v} onClick={()=>setTab(t.v)} className="pf" style={{fontWeight:700,fontSize:11.5,letterSpacing:"0.12em",textTransform:"uppercase",padding:"0.7rem 1rem",background:"transparent",border:"none",cursor:"pointer",whiteSpace:"nowrap",borderBottom:`3px solid ${tab===t.v?V.gold:"transparent"}`,color:tab===t.v?V.goldL:V.textD}}>{t.l}</button>))}
      </div>
    </div>

    <div style={{maxWidth:1080,margin:"0 auto",padding:"1.5rem 1.2rem 0",textAlign:"center"}}>
      <Seal file="coa.png" size={112} style={{margin:"0 auto",display:"block"}}/>
      <div className="mono" style={{fontSize:8.5,letterSpacing:"0.45em",color:V.gold,marginTop:"0.7rem"}}>ONE SUPREME LAW · THREE SEPARATE BRANCHES</div>
    </div>

    <div style={{maxWidth:1080,margin:"0 auto",padding:"0.4rem 1.2rem 3rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem"}}><div className="mono" style={{fontSize:10,letterSpacing:"0.35em",color:V.textDD,animation:"pulse 1.4s infinite"}}>LOADING…</div></div>}
      {loaded&&tab==="home"&&<HomeTab president={president} speaker={speaker} reps={reps} bills={bills} onGo={setTab}/>}
      {loaded&&tab==="executive"&&<ExecutiveTab president={president} vp={vp} cabinet={cabinet} gov={gov} orders={orders} speaker={speaker}/>}
      {loaded&&tab==="legislature"&&<LegislatureTab speaker={speaker} reps={reps} bills={bills} votes={votes}
        user={user} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&tab==="judiciary"&&<JudiciaryTab/>}
      {loaded&&tab==="panel"&&hasPanel&&<PanelTab user={user} bills={bills} gov={gov} orders={orders}
        cabinet={cabinet} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>

    <div style={{borderTop:`1px solid ${V.line}`,padding:"1.1rem 1.2rem 1.5rem"}}>
      <div style={{maxWidth:1080,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.26em",color:V.textDD}}>GOVERNMENT OF THE REPUBLIC OF VINDEX NATION · TEA 2024</div>
        <PoweredBy/>
      </div>
    </div>

    {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}
      onAuth={acc=>{setUser(acc);setAuthOpen(false);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));notify("Signed in as "+(acc.displayName||acc.username)+".",V.goldL);}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
