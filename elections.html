<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#0b0e1c;font-family:'Libre Franklin',system-ui,sans-serif;color:#e8e6f0;min-height:100vh;-webkit-text-size-adjust:100%;}

  ::-webkit-scrollbar{width:10px;height:10px;}

  @keyframes blink{50%{opacity:0.35}}
  @keyframes en-crawl{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes en-scan{0%{transform:translateY(-100%);opacity:0}8%{opacity:.8}92%{opacity:.8}100%{transform:translateY(100vh);opacity:0}}
  @keyframes en-live{0%,100%{opacity:1}70%{opacity:.5}}

<body>
<div id="root"></div>
<script type="text/babel">
/* ══════════════════════════════════════════════════════════════════════════
   IMPERIAL ELECTORAL COMMISSION · REICHSWAHLAMT
   ─ Shares the Interior/Foreign-Affairs backend (the "main net").
   ─ Admin login is the SAME credential set as the Ministry of the Interior.
   ─ The voter register is pooled live from the MFA citizenship registry.
   ─ Proportional representation: votes → seats by largest remainder.
   ══════════════════════════════════════════════════════════════════════════ */
const {useState,useEffect,useMemo,useCallback,useRef}=React;

/* Shared backend (Interior · Foreign Affairs · Judiciary · Network homepage). */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxLu8jQehAZJEvMEeCLoHc9S2C4FM8o9fQh8Pp4gMzDNwwIG0S9qLJ5-1gyGM1c_InUfQ/exec";

/* Minimum Interior clearance to administer elections. 0=anyone with an account,
   2=Confidential, 3=Secret, etc. Change here if your returning officers sit lower. */
const ADMIN_MIN_CLEARANCE=2;

/* House size + ballot rules (defaults; each election can override). */
const HOUSE_SEATS=1000;
const VOTES_PER_VOTER=2;
const DEFAULT_ELIGIBILITY=["citizen","naturalised"];

/* ── design tokens — election-night ink + ballot paper ───────────────────── */
const E={
  ink:"#0b0e1c", ink2:"#11152b", ink3:"#1a2042", inkLine:"#2a3056",
  paper:"#f4f1e8", paper2:"#eae3d4"==="x"?"#eae3d4":"#ece6d6", paperLine:"#d9d2bf",
  pInk:"#17181f", pMuted:"#615d4e",
  onInk:"#e8e6f0", onInkMute:"#8a90b8",
  stamp:"#d8443a", indigo:"#5b53d6", green:"#2f9e5e", gold:"#C9A84C",
};
/* Canonical party identities — kept consistent with the rest of the Empire. */
const PARTIES=[
  {id:"catholic",name:"Lech Catholic Social Union",abbr:"LCSU",color:"#C9A84C"},
  {id:"lech_first",name:"Lech First Party",abbr:"LFP",color:"#8B0000"},
  {id:"sup",name:"Social Unity Party",abbr:"SUP",color:"#C05050"},
  {id:"rappier",name:"Rappier of Order",abbr:"RoO",color:"#4A5A8A"},
  {id:"starkes_militar",name:"Starkes Militär Party",abbr:"SMP",color:"#3a5a2a"},
  {id:"independent",name:"Independent",abbr:"IND",color:"#7a7f95"},
];
const partyById=id=>PARTIES.find(p=>p.id===id)||PARTIES[5];

/* ── referendums ─────────────────────────────────────────────────────────────
   Any election may carry one or more referendum questions (tacked onto a contest
   or held on their own). Each ballot records refVotes: { referendumId: optionId }. */
const REF_THRESHOLDS={
  simple:{l:"Simple majority",short:"MAJORITY",need:"more than half"},
  twothirds:{l:"Two-thirds supermajority",short:"2/3 SUPERMAJORITY",need:"at least two-thirds"},
};
function blankReferendum(){return{id:"ref_"+uid(),question:"",description:"",threshold:"simple",
  options:[{id:"for",label:"For"},{id:"against",label:"Against"}]};}
function tallyReferendum(ref,ballots){
  const counts={};(ref.options||[]).forEach(o=>counts[o.id]=0);
  (ballots||[]).forEach(b=>{const pick=(b.refVotes||{})[ref.id];if(pick!=null&&counts[pick]!=null)counts[pick]++;});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  const opts=(ref.options||[]).map(o=>({id:o.id,label:o.label,votes:counts[o.id]||0,
    pctv:total>0?(counts[o.id]||0)/total*100:0})).sort((a,b)=>b.votes-a.votes);
  const isBinary=(ref.options||[]).length===2;
  let verdict=null;
  if(isBinary){
    const aff=ref.options[0],neg=ref.options[1];
    const av=counts[aff.id]||0,nv=counts[neg.id]||0,dec=av+nv;
    let passed=false;
    if(dec>0) passed=ref.threshold==="twothirds"?(av*3>=dec*2&&av>nv):(av>nv);
    const tied=av===nv&&dec>0;
    verdict={av,nv,dec,passed,tied,affLabel:aff.label,negLabel:neg.label,
      label:dec===0?"NO VOTES":tied?"TIED":passed?"CARRIED":"REJECTED",
      color:dec===0?E.onInkMute:tied?E.gold:passed?E.green:E.stamp};
  }
  return {counts,total,opts,isBinary,verdict,winner:opts[0]&&opts[0].votes>0?opts[0]:null};
}

const CITIZEN_STATUSES={citizen:"Citizen",naturalised:"Naturalised",resident:"Permanent Resident",alien:"Registered Alien",revoked:"Revoked",renounced:"Renounced"};

/* The four future constituency regions (geodata not yet in the registry). */
const PLANNED_REGIONS=["Constituency Region I","Constituency Region II","Constituency Region III","Constituency Region IV"];

/* ── backend helpers (same protocol as the rest of the net) ──────────────── */
async function sha256(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
// ── MongoDB backend (Render API) ───────────────────────────────────────────────
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
function saveSession(t){try{if(t)localStorage.setItem(SESSION_KEY,t);}catch(e){}}
function forgetSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}try{if(AUTH_TOKEN)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN})});}catch(e){}AUTH_TOKEN=null;}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{const r=await fetch(API+"/api/me",{headers:{Authorization:"Bearer "+t}});const d=await r.json();if(d&&d.ok&&d.account)return d.account;}catch(e){}
  forgetSession();return null;
}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}}
async function sdel(k){try{await fetch(API+"/api/unset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k})});}catch{}}
async function slogin(username,password){
  try{
    const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});
    const d=await r.json();
    if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token);return {ok:true,account:d.account};}
    return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};
  }catch(e){return {ok:false,error:"Connection error"};}
}

/* ── PR allocation — largest remainder, always sums to seatsTotal ─────────── */
function allocateSeats(voteMap,seatsTotal){
  const entries=Object.entries(voteMap).filter(([_,v])=>v>0);
  const total=entries.reduce((a,[_,v])=>a+v,0);
  if(total===0)return{};
  const rows=entries.map(([id,v])=>{const ex=v*seatsTotal/total;const fl=Math.floor(ex);return{id,votes:v,fl,rem:ex-fl};});
  let used=rows.reduce((a,r)=>a+r.fl,0);
  rows.sort((a,b)=>b.rem-a.rem||b.votes-a.votes);
  const out={};rows.forEach(r=>out[r.id]=r.fl);
  for(let i=0;i<seatsTotal-used;i++)out[rows[i%rows.length].id]++;
  return out;
}
function fmtDate(d){if(!d)return"—";const x=new Date(d);if(isNaN(x))return d;return x.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}
function pct(n,d){return d>0?(n/d*100):0;}

/* ════════════════════════════════════════════════════════════════════════ */
function App(){
  const [raw,setRaw]=useState({});
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("hall");        // hall | vote | admin
  const [selId,setSelId]=useState(null);
  const [admin,setAdmin]=useState(null);         // logged-in Interior account
  const [authOpen,setAuthOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [resultsId,setResultsId]=useState(null);  // which contest the results screen shows
  const note=(m,c)=>{setToast({m,c:c||E.indigo});setTimeout(()=>setToast(null),2800);};

  const loadAll=useCallback(async()=>{const r=await sgetAll();setRaw(r);setLoading(false);return r;},[]);
  useEffect(()=>{loadAll();},[loadAll]);
  // Restore a session signed in on another page (validated server-side). The
  // returning-officer view opens only for accounts that meet the clearance bar;
  // for everyone else the token is still restored so a signed-in citizen can vote.
  useEffect(()=>{srestore().then(acc=>{if(acc&&(acc.clearance||0)>=ADMIN_MIN_CLEARANCE)setAdmin(acc);});},[]);

  /* derive */
  const elections=useMemo(()=>raw["el_elections"]||{},[raw]);
  const citizens=useMemo(()=>Object.values(raw["mfa_citizens"]||{}),[raw]);
  const accounts=useMemo(()=>{const a={};Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v&&v.username)a[v.username.toLowerCase()]=v;});Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(v&&v.username&&!a[v.username.toLowerCase()])a[v.username.toLowerCase()]=v;});return a;},[raw]);
  const ballotsByEl=useMemo(()=>{const m={};Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("el_ballot_")&&v&&v.elId){(m[v.elId]=m[v.elId]||[]).push(v);}});return m;},[raw]);

  const elList=useMemo(()=>Object.values(elections).sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.createdAt||0)-(a.createdAt||0)),[elections]);
  const selected=useMemo(()=>selId?elections[selId]:null,[selId,elections]);
  const resultsEl=useMemo(()=>resultsId?elections[resultsId]:null,[resultsId,elections]);

  /* live polling of ballots while the hall or a result board is up */
  const pollRef=useRef();
  useEffect(()=>{
    const anyOpen=elList.some(e=>e.status==="open");
    if(!anyOpen||view==="admin")return;
    pollRef.current=setInterval(async()=>{const r=await sgetAll();setRaw(r);},7000);
    return()=>clearInterval(pollRef.current);
  },[elList,view]);

  /* which contest the results screen shows: open → most recent certified → newest */
  useEffect(()=>{
    if(loading)return;
    const ids=new Set(elList.map(e=>e.id));
    if(!resultsId||!ids.has(resultsId)){
      const pick=elList.find(e=>e.status==="open")||elList.find(e=>e.status==="closed")||elList[0]||null;
      setResultsId(pick?pick.id:null);
    }
  },[loading,elList,resultsId]);

  /* ── admin write actions ── */
  const saveElections=async(next)=>{setRaw(r=>({...r,el_elections:next}));await sset("el_elections",next);};
  const upsertElection=async(el)=>{const next={...elections,[el.id]:el};await saveElections(next);};
  const deleteElection=async(id)=>{const next={...elections};delete next[id];await saveElections(next);
    const keys=Object.keys(raw).filter(k=>k.startsWith("el_ballot_"+id+"_"));for(const k of keys)await sdel(k);
    setRaw(r=>{const c={...r};keys.forEach(k=>delete c[k]);return c;});};
  const clearBallots=async(id)=>{const keys=Object.keys(raw).filter(k=>k.startsWith("el_ballot_"+id+"_"));for(const k of keys)await sdel(k);
    setRaw(r=>{const c={...r};keys.forEach(k=>delete c[k]);return c;});note("Ballots cleared.",E.stamp);};

  /* ── casting a ballot (public) ── */
  const castBallot=async(el,citizen,payload)=>{
    const key="el_ballot_"+el.id+"_"+citizen.id;
    const ballot={elId:el.id,citizenId:citizen.id,citizenName:citizen.name,
      votes:payload.votes||{},refVotes:payload.refVotes||{},at:Date.now()};
    setRaw(r=>({...r,[key]:ballot}));
    await sset(key,ballot);
  };

  const isResults=!(view==="vote"&&selected)&&!(view==="admin"&&admin);
  return(
    <div style={{minHeight:"100vh",position:"relative",background:E.ink}}>
      <Backdrop/>
      {isResults
        ? <ElectionNightBroadcast el={resultsEl} elList={elList} ballotsByEl={ballotsByEl} citizens={citizens} loading={loading}
            onVote={(id)=>{setSelId(id);setView("vote");}}
            onSwitch={setResultsId}
            admin={admin}
            onAdmin={()=>{if(admin)setView("admin");else setAuthOpen(true);}}
            onLogout={()=>{forgetSession();setAdmin(null);}}/>
        : <>
            <Header view={view} setView={setView} admin={admin} onAdmin={()=>{if(admin)setView("admin");else setAuthOpen(true);}} onLogout={()=>{forgetSession();setAdmin(null);setView("hall");}}/>
            <main style={{position:"relative",zIndex:2,maxWidth:1120,margin:"0 auto",padding:"1.75rem 1.1rem 4rem"}}>
              {view==="admin"&&admin
                ? <AdminPanel admin={admin} elections={elections} elList={elList} ballotsByEl={ballotsByEl} citizens={citizens}
                    onUpsert={upsertElection} onDelete={deleteElection} onClear={clearBallots} note={note} reload={loadAll}/>
                : <VoteFlow el={selected} citizens={citizens} accounts={accounts} ballots={ballotsByEl[selected.id]||[]} onCast={castBallot}
                    onBack={()=>{setView("hall");setSelId(null);}} note={note}/>}
            </main>
            <Footer/>
          </>}

      {authOpen&&<AuthModal accounts={accounts} onClose={()=>setAuthOpen(false)}
        onAuth={(acc)=>{setAdmin(acc);setAuthOpen(false);setView("admin");note("Returning Officer authenticated.",E.green);}}/>}
      {toast&&<Toast {...toast}/>}
    </div>
  );
}

/* ── chrome ──────────────────────────────────────────────────────────────── */
function Backdrop(){
  return <div aria-hidden style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",
    backgroundColor:E.ink,
    backgroundImage:`radial-gradient(ellipse 70% 50% at 50% 0%, ${E.indigo}1f, transparent 60%),
      linear-gradient(${E.inkLine}22 1px,transparent 1px),linear-gradient(90deg,${E.inkLine}22 1px,transparent 1px)`,
    backgroundSize:"100% 100%, 46px 46px, 46px 46px"}}/>;
}
function Stamp({size=92,style={}}){
  const id="stp"+useMemo(()=>uid(),[]);
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" style={{...style}} aria-hidden>
      <defs><path id={id} d="M50,50 m-37,0 a37,37 0 1,1 74,0 a37,37 0 1,1 -74,0"/></defs>
      <circle cx="50" cy="50" r="46" fill="none" stroke={E.stamp} strokeWidth="2"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke={E.stamp} strokeWidth="1"/>
      <text fill={E.stamp} style={{fontFamily:"'Archivo',sans-serif",fontWeight:800,fontSize:8.4,letterSpacing:"2.2px"}}>
        <textPath href={"#"+id} startOffset="0%">· IMPERIAL ELECTORAL COMMISSION · REICHSWAHLAMT </textPath>
      </text>
      <text x="50" y="46" textAnchor="middle" fill={E.stamp} style={{fontFamily:"'Archivo',sans-serif",fontWeight:900,fontSize:15,letterSpacing:"1px"}}>VOTE</text>
      <text x="50" y="60" textAnchor="middle" fill={E.stamp} style={{fontFamily:"'Space Mono',monospace",fontSize:6.5,letterSpacing:"2px"}}>· LECH ·</text>
    </svg>
  );
}
function Header({view,setView,admin,onAdmin,onLogout}){
  return(
    <header style={{position:"relative",zIndex:3,borderBottom:`1px solid ${E.inkLine}`,background:`linear-gradient(180deg,${E.ink2},${E.ink})`}}>
      <div style={{maxWidth:1120,margin:"0 auto",padding:"1.1rem 1.1rem",display:"flex",alignItems:"center",gap:"1rem",flexWrap:"wrap"}}>
        <a href="index.html" className="arch" style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:E.onInkMute,textDecoration:"none",border:`1px solid ${E.inkLine}`,borderRadius:3,padding:"5px 11px"}}>← NETWORK</a>
        <div style={{display:"flex",alignItems:"center",gap:"0.85rem",flex:1,minWidth:230,cursor:"pointer"}} onClick={()=>setView("hall")}>
          <Stamp size={52} style={{transform:"rotate(-10deg)",flexShrink:0}}/>
          <div>
            <div className="arch" style={{fontWeight:900,fontSize:"clamp(18px,3.6vw,24px)",letterSpacing:"0.5px",lineHeight:1,color:E.onInk}}>Imperial Electoral Commission</div>
            <div className="mono" style={{fontSize:10,letterSpacing:"2.5px",color:E.stamp,marginTop:5,textTransform:"uppercase"}}>Reichswahlamt · Empire of Lech</div>
          </div>
        </div>
        <nav style={{display:"flex",gap:6,alignItems:"center"}}>
          <NavBtn active={view==="hall"} onClick={()=>setView("hall")}>← Results</NavBtn>
          {admin
            ?<>
               <span className="mono" style={{fontSize:10,color:E.green}}>● {admin.displayName||admin.username}</span>
               <NavBtn active={view==="admin"} onClick={onAdmin}>Admin</NavBtn>
               <NavBtn onClick={onLogout}>Sign out</NavBtn>
             </>
            :<NavBtn stamp onClick={onAdmin}>Officer login</NavBtn>}
        </nav>
      </div>
    </header>
  );
}
function NavBtn({children,onClick,active,stamp}){
  return <button onClick={onClick} className="arch" style={{fontSize:10,fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",
    padding:"6px 13px",borderRadius:3,cursor:"pointer",whiteSpace:"nowrap",
    border:`1px solid ${stamp?E.stamp:active?E.indigo:E.inkLine}`,
    background:active?E.indigo:stamp?E.stamp+"18":"transparent",
    color:active?"#fff":stamp?E.stamp:E.onInkMute}}>{children}</button>;
}
function Footer(){
  return <footer style={{position:"relative",zIndex:2,borderTop:`1px solid ${E.inkLine}`,padding:"1.1rem",textAlign:"center"}}>
    <span className="mono" style={{fontSize:9.5,letterSpacing:"2px",color:E.onInkMute}}>IMPERIAL ELECTORAL COMMISSION · CERTIFIED COUNT · GOTT MIT UNS</span>
  </footer>;
}
function Toast({m,c}){return <div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",zIndex:200,
  background:E.ink2,border:`1px solid ${c}`,borderLeft:`4px solid ${c}`,borderRadius:4,padding:"0.65rem 1.3rem",
  color:E.onInk,boxShadow:"0 12px 40px #000a"}} className="arch">{m}</div>;}

/* ── results computation shared by hall + boards ─────────────────────────── */
function useResults(el,ballots){
  return useMemo(()=>{
    const cands=el?Object.values(el.candidates||{}):[];
    const tally={};cands.forEach(c=>tally[c.id]=0);
    (ballots||[]).forEach(b=>{Object.entries(b.votes||{}).forEach(([cid,n])=>{if(tally[cid]!=null)tally[cid]+=Number(n)||0;});});
    const totalVotes=Object.values(tally).reduce((a,b)=>a+b,0);
    const seatsTotal=el?.seatsTotal||HOUSE_SEATS;
    const seats=allocateSeats(tally,seatsTotal);
    const rows=cands.map(c=>({...c,votes:tally[c.id]||0,seats:seats[c.id]||0}))
      .sort((a,b)=>b.votes-a.votes||(a.name||"").localeCompare(b.name||""));
    return {rows,totalVotes,seatsTotal,ballotCount:(ballots||[]).length};
  },[el,ballots]);
}

/* ── referendum results board (used on the broadcast & admin) ────────────────── */
function RefResultRow({r,idx,multi,t}){
  const thr=REF_THRESHOLDS[r.threshold]||REF_THRESHOLDS.simple;
  const binary=r.options.length===2;
  const palette=[E.indigo,E.gold,E.green,"#8a5cc4","#3a7a8a"];
  const colorOf=(origIdx)=>binary?(origIdx===0?E.green:E.stamp):palette[origIdx%palette.length];
  const rows=(binary?r.options.map((o,oi)=>({...o,oi})):t.opts.map(o=>({...o,oi:r.options.findIndex(x=>x.id===o.id)})))
    .map(o=>({...o,votes:t.counts[o.id]||0,pctv:t.total>0?((t.counts[o.id]||0)/t.total*100):0}));
  const v=t.verdict;
  const badge=binary
    ?{label:v.label,color:v.color}
    :(t.winner?{label:"LEADING · "+t.winner.label,color:E.gold}:{label:"NO VOTES",color:E.onInkMute});
  return(
    <div>

/* ════════════════════════════════════════════════════════════════════════════
   ELECTION-NIGHT BROADCAST — a full-screen "decision desk" newscast that takes
   over the screen on entry while polls are open. Live, animated, high-tech.
   ════════════════════════════════════════════════════════════════════════════ */
function useCountUp(value,dur=650){
  const [disp,setDisp]=useState(value);
  const fromRef=useRef(value);
  useEffect(()=>{
    const from=fromRef.current,to=value||0;
    if(from===to)return;
    const start=performance.now();let raf;
    const tick=now=>{
      const t=Math.min(1,(now-start)/dur);
      const e=1-Math.pow(1-t,3);
      setDisp(Math.round(from+(to-from)*e));
      if(t<1)raf=requestAnimationFrame(tick);else fromRef.current=to;
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[value,dur]);
  return disp;
}
function BroadcastClock(){
  const [t,setT]=useState(()=>new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  const p=n=>String(n).padStart(2,"0");
  return <span className="mono" style={{fontSize:13,letterSpacing:"2px",color:E.onInk}}>{p(t.getHours())+":"+p(t.getMinutes())+":"+p(t.getSeconds())}</span>;
}
function enHemicycle(n,rInner,rOuter){
  if(n<=0)return{pts:[],seatR:5};
  const rows=Math.max(3,Math.min(16,Math.round(Math.sqrt(n)*0.55)));
  const radii=[];for(let i=0;i<rows;i++)radii.push(rows===1?(rInner+rOuter)/2:rInner+(rOuter-rInner)*i/(rows-1));
  const sum=radii.reduce((a,b)=>a+b,0);
  let counts=radii.map(r=>Math.max(1,Math.floor(n*r/sum)));
  let used=counts.reduce((a,b)=>a+b,0),i=rows-1;
  while(used<n){counts[i]++;used++;i=(i-1+rows)%rows;}
  while(used>n){if(counts[i]>1){counts[i]--;used--;}i=(i-1+rows)%rows;}
  const rowSpacing=(rOuter-rInner)/Math.max(1,rows-1);
  let minArc=Infinity;for(let k=0;k<rows;k++){const a=Math.PI*radii[k]/counts[k];if(a<minArc)minArc=a;}
  const seatR=Math.max(3,0.42*Math.min(rowSpacing,minArc));
  const pts=[];
  for(let k=0;k<rows;k++){const m=counts[k],r=radii[k];for(let j=0;j<m;j++){const t=(j+0.5)/m;pts.push({phi:Math.PI*(1-t),r});}}
  pts.sort((a,b)=>b.phi-a.phi||a.r-b.r);
  return{pts,seatR};
}

function ElectionNightBroadcast({el,elList,ballotsByEl,citizens,loading,onVote,onSwitch,admin,onAdmin,onLogout}){
  const ballots=el?(ballotsByEl[el.id]||[]):[];
  const {rows,totalVotes,seatsTotal,ballotCount}=useResults(el,ballots);
  const elig=eligibleCitizens(citizens,el).length;
  const turnout=elig>0?pct(ballotCount,elig):0;
  const major=Math.floor(seatsTotal/2)+1;
  const status=el?el.status:null;
  const isOpen=status==="open";
  const isClosed=status==="closed";

  const byParty=useMemo(()=>{
    const m={};
    rows.forEach(r=>{const p=partyById(r.party);if(!m[p.id])m[p.id]={...p,votes:0,seats:0};m[p.id].votes+=r.votes;m[p.id].seats+=r.seats;});
    return Object.values(m).sort((a,b)=>b.seats-a.seats||b.votes-a.votes);
  },[rows]);
  const candRows=useMemo(()=>rows.map(r=>{const p=partyById(r.party);return{id:r.id,name:r.name,abbr:p.abbr,color:p.color,votes:r.votes,seats:r.seats};}),[rows]);
  const refs=el?.referendums||[];
  const refOnly=candRows.length===0&&refs.length>0;
  const leader=byParty[0]&&byParty[0].votes>0?byParty[0]:null;
  const runnerUp=byParty[1]||null;
  const hasMajority=!!(leader&&leader.seats>=major);
  const leadMargin=leader&&runnerUp?leader.votes-runnerUp.votes:0;

  const arc=useMemo(()=>{
    const seatMap={};byParty.forEach(p=>{if(p.seats>0)seatMap[p.id]=p.seats;});
    if(Object.values(seatMap).reduce((a,b)=>a+b,0)===0)return null;
    const DOTS=seatsTotal<=280?seatsTotal:280;
    const alloc=allocateSeats(seatMap,DOTS);
    const seq=[];byParty.forEach(p=>{const k=alloc[p.id]||0;for(let i=0;i<k;i++)seq.push(p.color);});
    const {pts,seatR}=enHemicycle(seq.length,118,262);
    return {pts,seatR,seq};
  },[byParty,seatsTotal]);

  const ballotsCU=useCountUp(ballotCount);
  const votesCU=useCountUp(totalVotes);
  const leaderSeatsCU=useCountUp(leader?leader.seats:0);

  let call={k:"",t:"",c:E.indigo};
  if(isClosed){
    if(hasMajority)call={k:"FINAL RESULT · MAJORITY",t:leader.name,sub:leader.abbr+" takes "+leader.seats+" of "+seatsTotal+" seats",c:E.green,win:true};
    else if(leader)call={k:"FINAL RESULT · NO OVERALL MAJORITY",t:leader.abbr+" — largest party",sub:"hung house — "+Math.max(0,major-leader.seats)+" short of a majority",c:E.gold,win:true};
    else call={k:"FINAL RESULT",t:"No votes were cast",sub:"",c:E.onInkMute};

          <a href="index.html" className="arch" style={{fontSize:10,fontWeight:700,letterSpacing:"1.2px",color:E.onInkMute,textDecoration:"none",border:`1px solid ${E.inkLine}`,borderRadius:5,padding:"7px 10px"}}>← Network</a>

                  ?<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}} role="img" aria-label={"Seat projection, "+seatsTotal+" seats"}>
                    {arc.pts.map((p,i)=>{const x=cx+p.r*Math.cos(p.phi),y=cy-p.r*Math.sin(p.phi);return <circle key={i} cx={x} cy={y} r={arc.seatR} fill={arc.seq[i]} stroke="#070912" strokeWidth={arc.seatR>5?1:0.5}/>;})}
                    <line x1={cx} y1={cy} x2={cx} y2={cy-rOuter-2} stroke={E.gold} strokeWidth="2" strokeDasharray="3 5" opacity="0.85"/>
                    <text x={cx} y={14} textAnchor="middle" style={{fontFamily:"'Space Mono',monospace",fontSize:11,letterSpacing:"2px",fill:E.gold}}>MAJORITY {major}</text>
                    <text x={cx} y={cy-30} textAnchor="middle" style={{fontFamily:"'Archivo',sans-serif",fontWeight:900,fontSize:40,fill:leader?leader.color:E.onInk}}>{leaderSeatsCU}</text>
                    <text x={cx} y={cy-12} textAnchor="middle" style={{fontFamily:"'Space Mono',monospace",fontSize:11,letterSpacing:"2px",fill:E.onInkMute}}>{leader?leader.abbr+(isClosed?" WINS":" LEADS"):"—"}</text>
                  </svg>
                  :<div style={{textAlign:"center",padding:"2.5rem 0",color:E.onInkMute}}>
                    <div className="arch" style={{fontWeight:900,fontSize:20}}>{isClosed?"No seats apportioned":"Awaiting first returns"}</div>
                    <div style={{fontSize:13,marginTop:4}}>Seats are apportioned as ballots are counted.</div>
                  </div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px 14px",padding:"6px 0 12px"}}>
                  {byParty.filter(p=>p.seats>0).map(p=>(
                    <span key={p.id} style={{display:"inline-flex",alignItems:"center",gap:6}}>
                      <span style={{width:11,height:11,borderRadius:3,background:p.color,boxShadow:`0 0 8px ${p.color}88`}}/>
                      <span className="mono" style={{fontSize:11,color:E.onInkMute}}>{p.abbr} <b style={{color:p.color}}>{p.seats}</b></span>
                    </span>
                  ))}
                </div>
              </section>

              <section style={{...card,flex:"1 1 360px",minWidth:280,padding:"1rem 0.9rem"}}>
                <div className="arch" style={{fontWeight:800,fontSize:11,letterSpacing:"2.5px",textTransform:"uppercase",color:E.onInkMute,marginBottom:8,paddingLeft:8}}>Candidate Returns</div>
                {candRows.length===0
                  ?<div style={{padding:"2rem",textAlign:"center",color:E.onInkMute,fontStyle:"italic"}}>No candidates registered.</div>
                  :<div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {candRows.slice(0,8).map((p,i)=><EnPartyRow key={p.id} p={p} idx={i} totalVotes={totalVotes} leader={candRows[0]&&candRows[0].votes>0?candRows[0]:null}/>)}
                  </div>}
              </section>
            </div>}

            {/* battle for the house */}
            {!refOnly&&<section style={{...card,padding:"1rem 1.2rem",marginBottom:"1.2rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8,flexWrap:"wrap",gap:6}}>
                <span className="arch" style={{fontWeight:800,fontSize:11,letterSpacing:"2.5px",textTransform:"uppercase",color:E.onInkMute}}>Battle for the House</span>
                <span className="mono" style={{fontSize:10,color:E.onInkMute}}>MAJORITY = {major} OF {seatsTotal}</span>
              </div>
              <div style={{position:"relative",height:30,borderRadius:6,overflow:"hidden",background:E.ink3,border:`1px solid ${E.inkLine}`,display:"flex"}}>
                {byParty.filter(p=>p.seats>0).map(p=>(
                  <div key={p.id} title={p.name+" — "+p.seats} style={{width:pct(p.seats,seatsTotal)+"%",background:`linear-gradient(180deg,${p.color},${p.color}cc)`,transition:"width .8s cubic-bezier(.2,.7,.2,1)",borderRight:"1px solid #07091266"}}/>
                ))}
                <div style={{position:"absolute",left:"50%",top:-2,bottom:-2,width:2,background:E.gold,boxShadow:`0 0 8px ${E.gold}`}}/>
              </div>
              <div className="mono" style={{fontSize:10.5,color:E.onInkMute,marginTop:7}}>
                {leader?<span style={{color:hasMajority?E.green:E.onInk}}>{leader.abbr} {leader.seats} / {major}{hasMajority?"  ✓ majority secured":"  — "+Math.max(0,major-leader.seats)+" short of a majority"}</span>:"Awaiting returns"}
              </div>
            </section>}

            {/* referendum results — shown for referendum-only and mixed contests */}
            {refs.length>0&&<ReferendumBoard referendums={refs} ballots={ballots} title={refOnly?"The Referendum":"Referendums on this ballot"}/>}

            {/* tallies */}
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
              {chip("Ballots cast",ballotsCU.toLocaleString(),E.indigo)}
              {!refOnly&&chip("Total votes",votesCU.toLocaleString(),E.onInk)}
              {chip("Turnout",turnout.toFixed(1)+"%",E.green)}
              {chip("On the register",elig.toLocaleString(),E.onInk)}
            </div>

            {/* call to action */}
            {isOpen&&<div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"center",justifyContent:"center",marginBottom:"0.4rem"}}>
              <button onClick={()=>onVote(el.id)} className="arch" style={{fontWeight:900,fontSize:14,letterSpacing:"0.5px",
                background:E.stamp,color:"#fff",border:"none",borderRadius:8,padding:"12px 26px",cursor:"pointer",boxShadow:"0 6px 22px "+E.stamp+"66"}}>Cast your ballot →</button>
            </div>}
            <div className="mono" style={{textAlign:"center",fontSize:10,letterSpacing:"1.5px",color:E.onInkMute,marginBottom:"1.4rem"}}>
              {isOpen?"● Live count — updates automatically":isClosed?("Certified result"+(el.date?" · "+fmtDate(el.date):"")):"Awaiting the opening of the polls"}
            </div>
          </>}

        {/* planned geography / ridings */}
        <GeographyStub/>
      </div>

      {/* ticker crawl */}
      {el&&<div style={{position:"sticky",bottom:0,zIndex:5,display:"flex",alignItems:"stretch",
        borderTop:`1px solid ${E.inkLine}`,background:"#070912f2",backdropFilter:"blur(6px)"}}>
        <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:7,padding:"0 14px",background:isClosed?E.gold:E.stamp}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:"#fff",animation:isOpen?"en-live 1.4s infinite":"none"}}/>
          <span className="arch" style={{fontWeight:900,fontSize:10,letterSpacing:"2px",color:"#fff"}}>{isClosed?"FINAL":"RESULTS"}</span>
        </div>
        <div style={{overflow:"hidden",flex:1}}>
          <div style={{display:"inline-flex",whiteSpace:"nowrap",animation:"en-crawl 32s linear infinite",padding:"7px 0"}}>
            <span className="mono" style={{fontSize:11.5,letterSpacing:"1.5px",color:E.onInkMute}}>{ticker}</span>
            <span className="mono" style={{fontSize:11.5,letterSpacing:"1.5px",color:E.onInkMute}}>{ticker}</span>
          </div>
        </div>
      </div>}
    </div>,
    document.body
  );
}

function StatusPill({status}){
  const map={draft:["DRAFT",E.onInkMute],open:["● POLLS OPEN",E.green],closed:["RESULT CERTIFIED",E.gold]};
  const [l,c]=map[status]||map.draft;
  return <span className="mono" style={{fontSize:10,letterSpacing:"1.5px",color:c,border:`1px solid ${c}55`,borderRadius:20,padding:"2px 11px",
    animation:status==="open"?"blink 1.6s infinite":"none"}}>{l}</span>;
}

function SectionLabel({children}){return <div className="arch" style={{fontWeight:800,fontSize:11,letterSpacing:"2.5px",textTransform:"uppercase",color:E.onInkMute,margin:"2rem 0 0.9rem",display:"flex",alignItems:"center",gap:10}}><span>{children}</span><span style={{flex:1,height:1,background:E.inkLine}}/></div>;}

/* ── geography stub (planned) ────────────────────────────────────────────── */
function GeographyStub(){
  return(
    <div style={{marginTop:"2rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",
      border:`1px dashed ${E.inkLine}`,borderRadius:6,padding:"0.55rem 0.9rem",background:`${E.ink2}66`}}>
      <span className="mono" style={{fontSize:9,letterSpacing:"1.5px",color:E.gold,border:`1px solid ${E.gold}44`,borderRadius:20,padding:"2px 9px",flexShrink:0}}>PLANNED</span>
      <span className="mono" style={{fontSize:10.5,color:E.onInkMute,lineHeight:1.5}}>Regional ridings — citizens seated by constituency region — arrive once the citizenship registry gains a state field.</span>
    </div>
  );
}

/* ── eligibility helper ──────────────────────────────────────────────────── */
function eligibleCitizens(citizens,el){
  const allow=new Set(el?.eligibility||DEFAULT_ELIGIBILITY);
  return citizens.filter(c=>allow.has(c.status||"citizen"));
}

/* ── VOTE FLOW (public) ──────────────────────────────────────────────────── */
function VoteFlow({el,citizens,accounts,ballots,onCast,onBack,note}){
  const [step,setStep]=useState("identify");   // identify | ballot | done
  const [citizen,setCitizen]=useState(null);
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState(null);       // {code,msg,hint?}
  const [busy,setBusy]=useState(false);
  const [castNow,setCastNow]=useState(false);
  const cands=Object.values(el.candidates||{});
  const voted=useMemo(()=>new Set(ballots.map(b=>b.citizenId)),[ballots]);
  const vpv=el.votesPerVoter||VOTES_PER_VOTER;
  const closed=el.status!=="open";
  const eligLabel=(el.eligibility||DEFAULT_ELIGIBILITY).map(s=>CITIZEN_STATUSES[s]||s).join(" & ");

  /* Voter validation now runs entirely through Ministry of the Interior accounts:
     the account must exist, the password must match, and the account's username
     must be linked to an enfranchised record on the citizenship register. */
  const submitId=async()=>{
    if(busy)return;
    setError(null);
    const u=username.trim().toLowerCase();
    if(!u||!password){setError({code:"REG-100",msg:"Enter both your Interior username and your password."});return;}
    setBusy(true);
    try{
      if(!accounts[u]){setError({code:"REG-101 · NO INTERIOR ACCOUNT",
        msg:"No Ministry of the Interior account exists under that username.",
        hint:"Voting is verified through MOI accounts. If you are a citizen without an account, contact the Ministry of the Interior to be issued one."});return;}
      const res=await slogin(username,password);
      if(!res.ok){setError({code:"REG-102 · CREDENTIALS REJECTED",
        msg:"That password does not match the Interior account on file."});return;}
      const match=citizens.find(c=>(c.username||"").trim().toLowerCase()===u);
      if(!match){setError({code:"REG-201 · NO CITIZEN RECORD LINKED",
        msg:"Your Interior account is not linked to any record on the citizenship register.",
        hint:"Open the Foreign Affairs portal, sign in, and claim your citizenship record — or contact the Ministry to have it linked."});return;}
      const allow=new Set(el.eligibility||DEFAULT_ELIGIBILITY);
      const st=match.status||"citizen";
      if(!allow.has(st)){
        const stl=CITIZEN_STATUSES[st]||st;
        const msg=st==="revoked"?"Your citizenship is recorded as revoked. You are not entitled to vote."
          :st==="renounced"?"Our records show you have renounced your citizenship. You are not entitled to vote."
          :`Your record lists you as ${stl}. Only registered ${eligLabel} are enfranchised for this election.`;
        setError({code:"REG-202 · CATEGORY NOT ENFRANCHISED",msg,
          hint:st==="resident"?"Permanent residents may become eligible through naturalisation — enquire with the Ministry of Foreign Affairs.":undefined});
        return;
      }
      if(voted.has(match.id)){setCitizen(match);setCastNow(false);setStep("done");return;}
      setCitizen(match);setStep("ballot");
    } finally { setBusy(false); }
  };

  return(
    <div>
      <button onClick={onBack} className="arch" style={{fontSize:10,fontWeight:700,letterSpacing:"1.2px",color:E.onInkMute,background:"none",border:`1px solid ${E.inkLine}`,borderRadius:3,padding:"5px 12px",cursor:"pointer",marginBottom:"1.1rem"}}>← Back to the count</button>

      <div style={{background:E.paper,borderRadius:8,border:`1px solid ${E.paperLine}`,boxShadow:"0 24px 60px #0009",overflow:"hidden"}}>
        <div style={{padding:"1.2rem 1.4rem",borderBottom:`2px solid ${E.pInk}`,display:"flex",justifyContent:"space-between",gap:"1rem",flexWrap:"wrap",alignItems:"center"}}>
          <div>
            <div className="mono" style={{fontSize:10,letterSpacing:"2.5px",color:E.stamp,textTransform:"uppercase"}}>Official Ballot Paper</div>
            <h1 className="arch" style={{fontWeight:900,fontSize:"clamp(1.4rem,4vw,2rem)",color:E.pInk,lineHeight:1.05,marginTop:3}}>{el.name}</h1>
          </div>
          <StatusPill status={el.status}/>
        </div>

        {closed?(
          <div style={{padding:"2.2rem 1.4rem",textAlign:"center"}}>
            <div className="arch" style={{fontWeight:800,fontSize:18,color:E.pInk}}>Polls are {el.status==="closed"?"closed — this result is certified.":"not yet open."}</div>
            <p style={{color:E.pMuted,marginTop:6}}>You can still review the count on the main board.</p>
            <div style={{marginTop:14}}><PaperBtn onClick={onBack}>View the count →</PaperBtn></div>
          </div>
        ):step==="identify"?(
          <div style={{padding:"1.3rem 1.4rem"}}>
            <PaperLabel>Step 1 — Verify your entitlement to vote</PaperLabel>
            <p style={{color:E.pMuted,fontSize:13.5,lineHeight:1.6,margin:"0 0 1rem"}}>
              Voting is verified through your <strong style={{color:E.pInk}}>Ministry of the Interior account</strong>, which must be linked to an enfranchised record on the citizenship register. Only registered {eligLabel} may vote, and each citizen casts one ballot.
            </p>
            <div style={{display:"grid",gap:"0.8rem",maxWidth:440}}>
              <div>
                <label className="mono" style={{display:"block",fontSize:10,color:E.pMuted,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>Interior username</label>
                <input autoFocus value={username} onChange={e=>{setUsername(e.target.value);setError(null);}}
                  onKeyDown={e=>{if(e.key==="Enter")submitId();}} placeholder="Your MOI username" style={paperInp}/>
              </div>
              <div>
                <label className="mono" style={{display:"block",fontSize:10,color:E.pMuted,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>Password</label>
                <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError(null);}}
                  onKeyDown={e=>{if(e.key==="Enter")submitId();}} placeholder="Your MOI password" style={paperInp}/>
              </div>
            </div>
            {error&&(
              <div style={{marginTop:13,border:`1px solid ${E.stamp}55`,borderLeft:`4px solid ${E.stamp}`,borderRadius:5,background:E.stamp+"12",padding:"0.75rem 0.95rem",maxWidth:520}}>
                <div className="mono" style={{fontSize:10,letterSpacing:"1.5px",color:E.stamp,fontWeight:700}}>⚠ ERROR {error.code}</div>
                <div style={{fontSize:13.5,color:E.pInk,marginTop:4,lineHeight:1.5}}>{error.msg}</div>
                {error.hint&&<div style={{fontSize:12,color:E.pMuted,marginTop:5,lineHeight:1.5,fontStyle:"italic"}}>{error.hint}</div>}
              </div>
            )}
            <div style={{marginTop:16}}><PaperBtn disabled={busy} onClick={submitId}>{busy?"Verifying…":"Verify & continue →"}</PaperBtn></div>
            <p className="mono" style={{fontSize:10,color:E.pMuted,marginTop:14,lineHeight:1.5}}>
              Your credentials are checked against the Ministry of the Interior, then matched to your citizenship record. The Electoral Commission never stores your password.
            </p>
          </div>
        ):step==="ballot"?(
          <BallotCard el={el} citizen={citizen} cands={cands} vpv={vpv} onBack={()=>setStep("identify")}
            onSubmit={async(payload)=>{await onCast(el,citizen,payload);note("Ballot recorded. Thank you for voting.",E.green);setCastNow(true);setStep("done");}}/>
        ):(
          <div style={{padding:"2.4rem 1.4rem",textAlign:"center"}}>
            <Stamp size={120} style={{transform:"rotate(-9deg)",animation:"seal .5s ease"}}/>
            <div className="arch" style={{fontWeight:900,fontSize:24,color:E.pInk,marginTop:"0.8rem"}}>{castNow?"Ballot recorded":"You’ve already voted"}</div>
            <p style={{color:E.pMuted,marginTop:6}}>
              {castNow
                ? `${citizen?.name}, your vote in “${el.name}” is counted. You may now watch the live result.`
                : `${citizen?.name}, our records show you have already cast a ballot in “${el.name}”. You may watch the live result.`}
            </p>
            <div style={{marginTop:16}}><PaperBtn onClick={onBack}>Watch the live count →</PaperBtn></div>
          </div>
        )}
      </div>
    </div>
  );
}
function BallotCard({el,citizen,cands,vpv,onBack,onSubmit}){
  const refs=el.referendums||[];
  const hasCands=cands.length>0;
  const [alloc,setAlloc]=useState({});
  const [refAns,setRefAns]=useState({});
  const [saving,setSaving]=useState(false);
  const used=Object.values(alloc).reduce((a,b)=>a+b,0);
  const left=vpv-used;
  const bump=(cid,d)=>setAlloc(a=>{const n=Math.max(0,(a[cid]||0)+d);const others=used-(a[cid]||0);if(others+n>vpv)return a;return{...a,[cid]:n};});
  const candsOk=!hasCands||used===vpv;
  const refsOk=refs.every(r=>!!refAns[r.id]);
  const canSubmit=candsOk&&refsOk&&(hasCands||refs.length>0);
  const submit=async()=>{
    if(!canSubmit||saving)return;setSaving(true);
    const votes={};Object.entries(alloc).forEach(([k,v])=>{if(v>0)votes[k]=v;});
    await onSubmit({votes,refVotes:{...refAns}});setSaving(false);
  };
  const optColor=(ref,idx)=>ref.options.length===2?(idx===0?E.green:E.stamp):E.indigo;
  return(
    <div style={{padding:"1.3rem 1.4rem"}}>
      {hasCands&&<>
        <PaperLabel>{refs.length>0?"Part 1":"Step 2"} — Cast your {vpv} vote{vpv!==1?"s":""}</PaperLabel>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.9rem",flexWrap:"wrap",gap:8}}>
          <span style={{color:E.pMuted,fontSize:13.5}}>Voting as <strong style={{color:E.pInk}}>{citizen.name}</strong>. Give {vpv>1?"all your votes to one candidate, or split them":"your vote to one candidate"}.</span>
          <span className="arch" style={{fontWeight:900,fontSize:14,color:left===0?E.green:E.stamp}}>{left} vote{left!==1?"s":""} remaining</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
          {cands.map(c=>{const p=partyById(c.party);const n=alloc[c.id]||0;return(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"0.6rem 0.8rem",border:`1px solid ${n>0?p.color:E.paperLine}`,borderLeft:`4px solid ${p.color}`,borderRadius:5,background:n>0?p.color+"10":"transparent"}}>
              <div style={{flex:1}}>
                <span className="arch" style={{fontWeight:700,fontSize:16,color:E.pInk}}>{c.name}</span>
                <span className="mono" style={{fontSize:10,marginLeft:8,color:p.color==="#C9A84C"?"#8a6a20":p.color}}>{p.abbr}</span>
                {c.blurb&&<div style={{fontSize:12.5,color:E.pMuted,marginTop:2}}>{c.blurb}</div>}
              </div>
              <button onClick={()=>bump(c.id,-1)} disabled={n===0} style={stepBtn(n===0)}>−</button>
              <span className="arch" style={{fontWeight:900,fontSize:20,width:24,textAlign:"center",color:E.pInk}}>{n}</span>
              <button onClick={()=>bump(c.id,1)} disabled={left===0} style={stepBtn(left===0)}>+</button>
            </div>
          );})}
        </div>
      </>}

      {refs.length>0&&<div style={{marginTop:hasCands?"1.4rem":0}}>
        <PaperLabel>{hasCands?"Part 2":"Step 2"} — {refs.length>1?"Referendums":"Referendum"}</PaperLabel>
        {!hasCands&&<div style={{color:E.pMuted,fontSize:13.5,marginBottom:"0.9rem"}}>Voting as <strong style={{color:E.pInk}}>{citizen.name}</strong>. Record your decision on {refs.length>1?"each question":"the question"} below.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          {refs.map((r,ri)=>{const chosen=refAns[r.id];const thr=REF_THRESHOLDS[r.threshold]||REF_THRESHOLDS.simple;return(
            <div key={r.id} style={{border:`1px solid ${chosen?E.indigo:E.paperLine}`,borderLeft:`4px solid ${E.indigo}`,borderRadius:6,padding:"0.85rem 1rem",background:chosen?E.indigo+"08":"transparent"}}>
              <div className="mono" style={{fontSize:9.5,letterSpacing:"1.5px",color:E.stamp,textTransform:"uppercase",marginBottom:4}}>Referendum{refs.length>1?" "+(ri+1):""} · {thr.short}</div>
              <div className="arch" style={{fontWeight:800,fontSize:16,color:E.pInk,lineHeight:1.25}}>{r.question}</div>
              {r.description&&<p style={{fontSize:13,color:E.pMuted,margin:"4px 0 0",lineHeight:1.55}}>{r.description}</p>}
              <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:"0.8rem"}}>
                {r.options.map((o,oi)=>{const sel=chosen===o.id;const oc=optColor(r,oi);return(
                  <button key={o.id} onClick={()=>setRefAns(a=>({...a,[r.id]:o.id}))} className="arch"
                    style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",fontWeight:sel?900:700,fontSize:14.5,
                      padding:"11px 14px",cursor:"pointer",border:`2px solid ${sel?oc:E.paperLine}`,borderRadius:6,
                      background:sel?oc+"12":"#fff",color:sel?oc:E.pInk,transition:"all .12s",lineHeight:1.35}}>
                    <span style={{width:18,height:18,borderRadius:"50%",flexShrink:0,border:`2px solid ${sel?oc:E.paperLine}`,
                      background:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
                      {sel&&<span style={{width:9,height:9,borderRadius:"50%",background:oc}}/>}
                    </span>
                    <span style={{flex:1}}>{o.label}</span>
                    {sel&&<span className="mono" style={{fontSize:9,letterSpacing:"1.5px",color:oc,flexShrink:0}}>SELECTED</span>}
                  </button>
                );})}
              </div>
            </div>
          );})}
        </div>
      </div>}

      {!hasCands&&refs.length===0&&<div style={{color:E.pMuted,fontStyle:"italic"}}>This ballot has no candidates or questions.</div>}

      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.3rem",gap:8}}>
        <button onClick={onBack} className="arch" style={{fontSize:11,fontWeight:700,letterSpacing:"1px",color:E.pMuted,background:"none",border:`1px solid ${E.paperLine}`,borderRadius:4,padding:"7px 14px",cursor:"pointer"}}>← Not me</button>
        <PaperBtn disabled={!canSubmit||saving} onClick={submit}>{saving?"Recording…":"Cast ballot ✓"}</PaperBtn>
      </div>
    </div>
  );
}

/* ── ADMIN (Interior-tied) ───────────────────────────────────────────────── */
function AuthModal({accounts,onClose,onAuth}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!u.trim()||!p){setErr("Enter your Interior credentials.");return;}
    setBusy(true);setErr("");
    const res=await slogin(u,p);
    if(!res.ok){setErr("ACCESS DENIED — credentials rejected.");setBusy(false);return;}
    const acc=res.account;
    if((acc.clearance||0)<ADMIN_MIN_CLEARANCE){setErr(`Clearance too low to administer elections (need level ${ADMIN_MIN_CLEARANCE}+).`);setBusy(false);return;}
    onAuth(acc);
  };
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(4,6,14,.88)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:E.ink2,border:`1px solid ${E.inkLine}`,borderRadius:8,padding:"1.6rem",maxWidth:400,width:"100%"}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"2.5px",color:E.stamp}}>RETURNING OFFICER ACCESS</div>
        <div className="arch" style={{fontWeight:900,fontSize:20,color:E.onInk,margin:"6px 0 4px"}}>Sign in with Interior</div>
        <p style={{color:E.onInkMute,fontSize:13,lineHeight:1.55,marginBottom:"1rem"}}>Use your Ministry of the Interior username and password. Election administration requires clearance level {ADMIN_MIN_CLEARANCE} or higher.</p>
        <InkLabel>Username</InkLabel>
        <input value={u} onChange={e=>setU(e.target.value)} style={inkInp}/>
        <InkLabel>Password</InkLabel>
        <input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={inkInp}/>
        {err&&<div className="mono" style={{color:E.stamp,fontSize:11,margin:"8px 0"}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}>
          <InkBtn onClick={onClose}>Cancel</InkBtn>
          <InkBtn primary onClick={go} disabled={busy}>{busy?"Verifying…":"Authenticate"}</InkBtn>
        </div>
      </div>
    </div>
  );
}

function AdminElection({el,ballots,citizens,onEdit,onUpsert,onDelete,onClear,note}){
  const {rows,totalVotes,ballotCount,seatsTotal}=useResults(el,ballots);
  const elig=eligibleCitizens(citizens,el).length;
  const setStatus=async(s)=>{await onUpsert({...el,status:s,closedAt:s==="closed"?Date.now():el.closedAt});note(s==="open"?"Polls opened.":s==="closed"?"Result certified.":"Set to draft.",E.indigo);};
  const cands=Object.values(el.candidates||{});
  const refs=el.referendums||[];
  const canOpen=cands.length===0?refs.length>=1:cands.length>=2;
  const openWarn=canOpen?"":cands.length===0?"Add at least two candidates, or one referendum question, before opening polls.":"Add at least two candidates before opening polls.";

  return(
    <div style={{background:E.ink2,border:`1px solid ${E.inkLine}`,borderRadius:8,padding:"1.2rem 1.3rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div>
          <h2 className="arch" style={{fontWeight:900,fontSize:22,color:E.onInk}}>{el.name}</h2>
          <div className="mono" style={{fontSize:10,color:E.onInkMute,marginTop:2}}>{fmtDate(el.date)} · {el.votesPerVoter||VOTES_PER_VOTER} votes/voter · {seatsTotal} seats · register {elig} · verified via MOI accounts</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <InkBtn onClick={onEdit}>Edit</InkBtn>
          {el.status!=="open"&&<InkBtn primary onClick={()=>setStatus("open")} disabled={!canOpen}>Open polls</InkBtn>}
          {el.status==="open"&&<InkBtn primary onClick={()=>setStatus("closed")}>Close &amp; certify</InkBtn>}
          {el.status!=="draft"&&<InkBtn onClick={()=>setStatus("draft")}>To draft</InkBtn>}
        </div>
      </div>
      {openWarn&&<div className="mono" style={{fontSize:10.5,color:E.gold,marginTop:8}}>{openWarn}</div>}

      {/* candidates manager */}
      <SectionLabel>Candidates{cands.length===0?" (optional — leave empty for a referendum-only vote)":""}</SectionLabel>
      <CandidateManager el={el} onUpsert={onUpsert} note={note}/>

      {/* referendum manager */}
      <SectionLabel>Referendum questions</SectionLabel>
      <ReferendumManager el={el} ballots={ballots} onUpsert={onUpsert} note={note}/>

      {/* live tally */}
      <SectionLabel>Tally</SectionLabel>
      <div style={{display:"flex",gap:"1.4rem",flexWrap:"wrap",marginBottom:"0.8rem"}}>
        <Stat k="Ballots" v={ballotCount}/><Stat k="Votes" v={totalVotes}/><Stat k="Turnout" v={(elig>0?pct(ballotCount,elig):0).toFixed(1)+"%"}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {rows.map(r=>{const p=partyById(r.party);return(
          <div key={r.id} style={{display:"grid",gridTemplateColumns:"1fr 70px 60px",alignItems:"center",gap:8}}>
            <div style={{minWidth:0}}>
              <span className="arch" style={{fontWeight:700,fontSize:14,color:E.onInk}}>{r.name}</span>
              <div style={{height:7,marginTop:4,borderRadius:4,background:E.ink3,overflow:"hidden"}}><div style={{width:pct(r.votes,totalVotes)+"%",height:"100%",background:p.color,transition:"width .6s"}}/></div>
            </div>
            <span className="mono" style={{fontSize:12,color:E.onInkMute,textAlign:"right"}}>{r.votes} v</span>
            <span className="arch" style={{fontWeight:900,fontSize:16,color:E.onInk,textAlign:"right"}}>{r.seats}</span>
          </div>
        );})}
        {rows.length===0&&<span className="mono" style={{fontSize:11,color:E.onInkMute}}>No votes yet.</span>}
      </div>

      {/* ballot log + danger */}
      <SectionLabel>Ballot log</SectionLabel>
      <div style={{maxHeight:180,overflowY:"auto",border:`1px solid ${E.inkLine}`,borderRadius:5}}>
        {ballots.length===0&&<div className="mono" style={{fontSize:11,color:E.onInkMute,padding:"0.7rem"}}>No ballots cast.</div>}
        {ballots.slice().sort((a,b)=>b.at-a.at).map((b,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",gap:8,padding:"0.4rem 0.7rem",borderBottom:`1px solid ${E.inkLine}`}}>
            <span className="arch" style={{fontSize:13,color:E.onInk,flexShrink:0}}>{b.citizenName}</span>
            <span className="mono" style={{fontSize:10,color:E.onInkMute,textAlign:"right"}}>{[
              Object.entries(b.votes||{}).map(([cid,n])=>{const c=(el.candidates||{})[cid];return (c?c.name:"?")+"×"+n;}).join(", "),
              (refs||[]).map(r=>{const pick=(b.refVotes||{})[r.id];if(!pick)return null;const o=(r.options||[]).find(x=>x.id===pick);return "▸"+(o?o.label:"?");}).filter(Boolean).join(" ")
            ].filter(Boolean).join("  ·  ")}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:"1rem"}}>
        <Armed label="Clear all ballots" onConfirm={()=>onClear(el.id)}/>
        <Armed label="Delete election" danger onConfirm={()=>{onDelete(el.id);note("Election deleted.",E.stamp);}}/>
      </div>
    </div>
  );
}

function CandidateManager({el,onUpsert,note}){
  const [name,setName]=useState("");const [party,setParty]=useState("independent");const [blurb,setBlurb]=useState("");
  const cands=Object.values(el.candidates||{});
  const add=async()=>{if(!name.trim())return;const id="cand_"+uid();const next={...(el.candidates||{}),[id]:{id,name:name.trim(),party,blurb:blurb.trim()}};await onUpsert({...el,candidates:next});setName("");setBlurb("");note("Candidate added.",E.green);};
  const remove=async(id)=>{const next={...(el.candidates||{})};delete next[id];await onUpsert({...el,candidates:next});};
  return(
    <div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:"0.8rem"}}>
        {cands.map(c=>{const p=partyById(c.party);return(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"0.45rem 0.7rem",border:`1px solid ${E.inkLine}`,borderLeft:`4px solid ${p.color}`,borderRadius:4}}>
            <span className="arch" style={{fontWeight:700,fontSize:14,color:E.onInk,flex:1}}>{c.name} <span className="mono" style={{fontSize:10,color:p.color==="#C9A84C"?E.gold:p.color}}>{p.abbr}</span></span>
            <button onClick={()=>remove(c.id)} className="mono" style={{fontSize:10,color:E.stamp,background:"none",border:`1px solid ${E.stamp}55`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>remove</button>
          </div>
        );})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1.3fr 1fr auto",gap:6,alignItems:"end"}}>
        <div><InkLabel>Candidate name</InkLabel><input value={name} onChange={e=>setName(e.target.value)} style={inkInp}/></div>
        <div><InkLabel>Party</InkLabel><select value={party} onChange={e=>setParty(e.target.value)} style={inkInp}>{PARTIES.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        <InkBtn primary onClick={add}>Add</InkBtn>
      </div>
      <div style={{marginTop:6}}><input value={blurb} onChange={e=>setBlurb(e.target.value)} placeholder="Short blurb (optional)" style={inkInp}/></div>
    </div>
  );
}

function ReferendumManager({el,ballots,onUpsert,note}){
  const refs=el.referendums||[];
  const [q,setQ]=useState("");const [desc,setDesc]=useState("");const [thr,setThr]=useState("simple");
  const [opts,setOpts]=useState([{id:"for",label:"For"},{id:"against",label:"Against"}]);
  const setOpt=(i,v)=>setOpts(o=>o.map((x,idx)=>idx===i?{...x,label:v}:x));
  const addOpt=()=>setOpts(o=>o.length>=6?o:[...o,{id:"opt_"+uid(),label:""}]);
  const rmOpt=(i)=>setOpts(o=>o.length<=2?o:o.filter((_,idx)=>idx!==i));
  const reset=()=>{setQ("");setDesc("");setThr("simple");setOpts([{id:"for",label:"For"},{id:"against",label:"Against"}]);};
  const add=async()=>{
    const clean=opts.map(o=>({id:o.id,label:o.label.trim()})).filter(o=>o.label);
    if(!q.trim()||clean.length<2){note("A question and at least two options are required.",E.stamp);return;}
    await onUpsert({...el,referendums:[...refs,{id:"ref_"+uid(),question:q.trim(),description:desc.trim(),threshold:thr,options:clean}]});
    reset();note("Referendum added.",E.green);
  };
  const remove=async(id)=>{await onUpsert({...el,referendums:refs.filter(r=>r.id!==id)});};
  return(
    <div>
      {refs.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"0.9rem"}}>
        {refs.map((r)=>{const t=tallyReferendum(r,ballots);const v=t.verdict;const m=REF_THRESHOLDS[r.threshold]||REF_THRESHOLDS.simple;return(
          <div key={r.id} style={{border:`1px solid ${E.inkLine}`,borderLeft:`4px solid ${E.indigo}`,borderRadius:5,padding:"0.6rem 0.8rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <span className="arch" style={{fontWeight:700,fontSize:14,color:E.onInk}}>{r.question}</span>
                <div className="mono" style={{fontSize:9.5,color:E.onInkMute,marginTop:2}}>{m.short} · {r.options.map(o=>o.label).join(" / ")}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                <span className="mono" style={{fontSize:10,color:v?v.color:E.gold}}>{v?v.label+" "+v.av+"–"+v.nv:(t.winner?t.winner.label:"—")}</span>
                <button onClick={()=>remove(r.id)} className="mono" style={{fontSize:10,color:E.stamp,background:"none",border:`1px solid ${E.stamp}55`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>remove</button>
              </div>
            </div>
          </div>
        );})}
      </div>}
      <div style={{border:`1px solid ${E.inkLine}`,borderRadius:6,padding:"0.85rem",background:E.ink3+"66"}}>
        <InkLabel>New referendum question</InkLabel>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. Shall the Crown ratify the Treaty of …?" style={inkInp}/>
        <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Explanatory note shown to voters (optional)" style={inkInp}/>
        <div style={{maxWidth:280}}>
          <InkLabel>Threshold to carry</InkLabel>
          <select value={thr} onChange={e=>setThr(e.target.value)} style={inkInp}>{Object.entries(REF_THRESHOLDS).map(([k,m])=><option key={k} value={k}>{m.l}</option>)}</select>
        </div>
        <InkLabel>Options {opts.length===2?"— first option is the affirmative (pass / fail)":"— plurality winner"}</InkLabel>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {opts.map((o,i)=>(
            <div key={o.id} style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className="mono" style={{fontSize:10,color:E.onInkMute,width:14}}>{i+1}</span>
              <input value={o.label} onChange={e=>setOpt(i,e.target.value)} placeholder={"Option "+(i+1)} style={{...inkInp,marginBottom:0}}/>
              <button onClick={()=>rmOpt(i)} disabled={opts.length<=2} className="mono" style={{fontSize:11,color:opts.length<=2?E.onInkMute:E.stamp,background:"none",border:`1px solid ${E.inkLine}`,borderRadius:3,padding:"5px 9px",cursor:opts.length<=2?"not-allowed":"pointer"}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
          <InkBtn onClick={addOpt} disabled={opts.length>=6}>+ Option</InkBtn>
          <InkBtn primary onClick={add}>Add referendum</InkBtn>
        </div>
      </div>
    </div>
  );
}


function ElectionEditor({el,onClose,onSave}){
  const [g,setG]=useState({...el});
  const set=(k,v)=>setG(p=>({...p,[k]:v}));
  const toggleElig=(s)=>setG(p=>{const cur=new Set(p.eligibility||DEFAULT_ELIGIBILITY);cur.has(s)?cur.delete(s):cur.add(s);return{...p,eligibility:[...cur]};});
  const elig=new Set(g.eligibility||DEFAULT_ELIGIBILITY);
  return ReactDOM.createPortal((
    <div style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(4,6,14,.9)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"1rem",overflowY:"auto"}}>
      <div style={{background:E.ink2,border:`1px solid ${E.inkLine}`,borderRadius:8,maxWidth:560,width:"100%",margin:"1.5rem 0"}}>
        <div style={{padding:"1.1rem 1.3rem",borderBottom:`1px solid ${E.inkLine}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span className="arch" style={{fontWeight:900,fontSize:18,color:E.onInk}}>{el.name?"Edit election":"New election"}</span>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${E.inkLine}`,color:E.onInkMute,width:30,height:30,borderRadius:3,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"1.2rem 1.3rem"}}>
          <InkLabel>Election name *</InkLabel>
          <input value={g.name||""} onChange={e=>set("name",e.target.value)} placeholder="e.g. 2026 General Election" style={inkInp}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:4}}>
            <div><InkLabel>Polling date</InkLabel><input type="date" value={g.date||""} onChange={e=>set("date",e.target.value)} style={inkInp}/></div>
            <div><InkLabel>Seats</InkLabel><input type="number" value={g.seatsTotal??HOUSE_SEATS} onChange={e=>set("seatsTotal",Math.max(1,parseInt(e.target.value)||HOUSE_SEATS))} style={inkInp}/></div>
            <div><InkLabel>Votes / voter</InkLabel><input type="number" value={g.votesPerVoter??VOTES_PER_VOTER} onChange={e=>set("votesPerVoter",Math.max(1,parseInt(e.target.value)||VOTES_PER_VOTER))} style={inkInp}/></div>
          </div>
          <InkLabel>Who may vote (pooled from the citizenship register)</InkLabel>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(CITIZEN_STATUSES).map(([v,l])=>(
              <label key={v} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:E.onInkMute,border:`1px solid ${elig.has(v)?E.indigo:E.inkLine}`,borderRadius:4,padding:"4px 9px",cursor:"pointer"}}>
                <input type="checkbox" checked={elig.has(v)} onChange={()=>toggleElig(v)}/>{l}
              </label>
            ))}
          </div>

          <InkLabel>Verification</InkLabel>
          <div style={{display:"flex",alignItems:"flex-start",gap:9,border:`1px solid ${E.inkLine}`,borderRadius:5,padding:"0.7rem 0.85rem"}}>
            <span style={{fontSize:16,lineHeight:1}}>🔐</span>
            <span>
              <span className="arch" style={{fontWeight:700,fontSize:13.5,color:E.onInk}}>Voters verify through their MOI account</span>
              <span className="mono" style={{display:"block",fontSize:10.5,color:E.onInkMute,marginTop:3,lineHeight:1.5}}>Each voter signs in with their Ministry of the Interior credentials. The account must be linked to an enfranchised record in one of the categories ticked above. One account, one ballot.</span>
            </span>
          </div>
        </div>
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${E.inkLine}`,display:"flex",justifyContent:"flex-end",gap:8}}>
          <InkBtn onClick={onClose}>Cancel</InkBtn>
          <InkBtn primary disabled={!g.name} onClick={()=>onSave({...g,eligibility:g.eligibility||DEFAULT_ELIGIBILITY})}>Save election</InkBtn>
        </div>
      </div>
    </div>
  ),document.body);
}

function blankElection(){return{id:"el_"+uid(),name:"",date:new Date().toISOString().slice(0,10),status:"draft",seatsTotal:HOUSE_SEATS,votesPerVoter:VOTES_PER_VOTER,eligibility:[...DEFAULT_ELIGIBILITY],candidates:{},referendums:[],createdAt:Date.now()};}

/* ── small UI atoms ──────────────────────────────────────────────────────── */
const paperInp={width:"100%",background:"#fff",border:`1px solid ${E.paperLine}`,borderRadius:5,color:E.pInk,padding:"9px 11px",fontSize:15,outline:"none"};
const inkInp={width:"100%",background:E.ink3,border:`1px solid ${E.inkLine}`,borderRadius:4,color:E.onInk,padding:"7px 10px",fontSize:14,outline:"none",marginBottom:"0.7rem"};
function PaperLabel({children}){return <div className="arch" style={{fontWeight:800,fontSize:10.5,letterSpacing:"2px",textTransform:"uppercase",color:E.stamp,marginBottom:"0.6rem"}}>{children}</div>;}
function InkLabel({children}){return <div className="arch" style={{fontWeight:700,fontSize:9.5,letterSpacing:"1.5px",textTransform:"uppercase",color:E.onInkMute,margin:"0 0 4px"}}>{children}</div>;}
function PaperBtn({children,onClick,disabled}){return <button onClick={disabled?undefined:onClick} disabled={disabled} className="arch" style={{fontWeight:800,fontSize:13,letterSpacing:"0.5px",
  background:disabled?E.paperLine:E.stamp,color:disabled?E.pMuted:"#fff",border:"none",borderRadius:5,padding:"9px 18px",cursor:disabled?"not-allowed":"pointer",boxShadow:disabled?"none":"0 4px 14px #d8443a55"}}>{children}</button>;}
function InkBtn({children,onClick,primary,disabled}){return <button onClick={disabled?undefined:onClick} disabled={disabled} className="arch" style={{fontWeight:700,fontSize:11,letterSpacing:"1px",textTransform:"uppercase",
  background:primary?E.indigo:"transparent",color:primary?"#fff":E.onInkMute,border:`1px solid ${primary?E.indigo:E.inkLine}`,borderRadius:4,padding:"6px 13px",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.45:1}}>{children}</button>;}
function stepBtn(dis){return{width:30,height:30,borderRadius:5,border:`1px solid ${dis?E.paperLine:E.pInk}`,background:dis?E.paper2:"#fff",color:dis?E.paperLine:E.pInk,fontSize:18,fontWeight:700,cursor:dis?"not-allowed":"pointer",lineHeight:1};}
function Stat({k,v}){return <div><div className="arch" style={{fontWeight:900,fontSize:22,color:E.onInk,lineHeight:1}}>{v}</div><div className="mono" style={{fontSize:9,letterSpacing:"1.5px",color:E.onInkMute,textTransform:"uppercase",marginTop:2}}>{k}</div></div>;}
function Armed({label,onConfirm,danger}){
  const [a,setA]=useState(false);
  return a
    ?<span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
       <span className="mono" style={{fontSize:10,color:E.stamp}}>sure?</span>
       <button onClick={onConfirm} className="arch" style={{fontSize:10,fontWeight:700,color:"#fff",background:E.stamp,border:"none",borderRadius:3,padding:"5px 11px",cursor:"pointer"}}>{label}</button>
       <button onClick={()=>setA(false)} className="mono" style={{fontSize:10,color:E.onInkMute,background:"none",border:`1px solid ${E.inkLine}`,borderRadius:3,padding:"5px 9px",cursor:"pointer"}}>no</button>
     </span>
    :<button onClick={()=>setA(true)} className="arch" style={{fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:E.stamp,background:"none",border:`1px solid ${E.stamp}55`,borderRadius:4,padding:"6px 12px",cursor:"pointer"}}>{label}</button>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
