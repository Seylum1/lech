<script type="text/babel">

const { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext } = React;
const COA_B64 = document.getElementById("coa-data").textContent.trim();

// The parties as originally hardcoded. These are now seeded into the registry
// (bk_parties) on first load and are editable from the Throne like any other,
// so this list is only the starting point — never read it directly.
const SEED_PARTIES = [
  { id:"catholic",    name:"Lech Catholic Social Union", color:"#C9A84C", abbr:"LCSU" },
  { id:"lech_first",  name:"Lech First Party",    color:"#8B0000", abbr:"LFP" },
  { id:"sup",         name:"Social Unity Party",  color:"#C05050", abbr:"SUP" },
  { id:"rappier",     name:"Rappier of Order",    color:"#4A5A8A", abbr:"RO" },
  { id:"starkes_militar", name:"Starkes Militär Party", color:"#3a5a2a", abbr:"SMP" },
  { id:"independent", name:"Independent",          color:"#888888", abbr:"IND", protected:true },
];

// Party lookups happen deep inside render code that has no access to state, so
// the registry is held module-side and refreshed whenever parties change. Every
// refresh is paired with a setState, so renders always read the current list.
let PARTY_REGISTRY = SEED_PARTIES.slice();
function setPartyRegistry(map){
  const list=Object.values(map||{});
  PARTY_REGISTRY = list.length ? list.slice().sort((a,b)=>(a.order??0)-(b.order??0)) : SEED_PARTIES.slice();
}
const partyList = () => PARTY_REGISTRY;
const getParty  = (id) => PARTY_REGISTRY.find(p=>p.id===id)||null;
// Back-compat for the many call sites that read PARTIES as an array.
const PARTIES = new Proxy([],{
  get(_,prop){
    const list=PARTY_REGISTRY;
    const v=list[prop];
    return typeof v==="function"?v.bind(list):v;
  },
  has(_,prop){ return prop in PARTY_REGISTRY; },
  ownKeys(){ return Reflect.ownKeys(PARTY_REGISTRY); },
  getOwnPropertyDescriptor(_,prop){
    return Object.getOwnPropertyDescriptor(PARTY_REGISTRY,prop);
  },
});

// Legacy attribution table. Superseded by the bk_former_members registry, which
// now records departures automatically. Kept only so votes cast before that
// registry existed still resolve; do not add to it.
const KNOWN_FORMER_MEMBERS = {
  "KelsoKevin": {name:"KelsoKevin", seats:67, party:"catholic"},
};

// ── VOTER RESOLUTION ─────────────────────────────────────────────────────────
// A vote is a historical fact and must never depend on who currently holds a
// seat. Resolution order, most to least authoritative:
//   1. the snapshot written on the bill when the vote was cast (seats/party as
//      they were at that moment — the only truly correct figure for that vote)
//   2. the sitting member record        (open votes, where live seats apply)
//   3. the former-members registry      (departed, but still attributable)
//   4. the legacy hardcoded table       (pre-registry history)
// Callers that need live seats for an *open* vote pass preferLive.
function resolveVoter(id, roster, former, snapshot, preferLive) {
  const snap = snapshot?.[id];
  const live = roster?.[id];
  if (preferLive && live) return live;
  return snap || live || former?.[id] || KNOWN_FORMER_MEMBERS[id] || null;
}

// The former-members registry is needed by deeply nested vote displays. It is
// read-only reference data, so a context avoids threading it through every
// intermediate component.
const FormerCtx = createContext({});
const useFormer = () => useContext(FormerCtx);

// Everything a bill card needs to offer the signed-in member a ballot.
const BallotCtx = createContext(null);
const useBallot = () => useContext(BallotCtx);

// A seat held by an MOI account is keyed by username, which never changes.
// Unlinked (historical/NPC) seats keep their generated m_* id.
const memberKey = (username) => "u_"+String(username||"").toLowerCase();
const bhKey     = (username) => "ub_"+String(username||"").toLowerCase();
// An account may sit in a chamber under either an MOI-linked or a legacy id.
function findSeat(roster, username, displayName){
  if(!username) return null;
  const direct=roster?.[memberKey(username)]||roster?.[bhKey(username)];
  if(direct) return direct;
  const u=String(username).toLowerCase(), d=String(displayName||"").toLowerCase();
  return Object.values(roster||{}).find(m=>
    String(m.username||"").toLowerCase()===u
    ||(!m.username&&String(m.name||"").toLowerCase()===d&&!!d)
  )||null;
}

// Province names, mirrored from the Ministry of the Interior register so a
// member's stated region can be shown here.
const BK_PROVINCES={
  newport:"Newport", cracov:"Cracov", rome:"Rome",
  kingsland:"Kingsland", aquitaine:"Aquitaine", monegasque:"Monégasque",
  weststadt:"Weststadt",
};

// ── MEMBER DOSSIER ───────────────────────────────────────────────────────────
// One person may appear under several ids over time: a legacy m_* id from the
// old import, a u_<username> id from the register, and an entry in the former-
// members roll. Every one of those must resolve to the same person, or their
// record fragments.
// Old records were labelled by hand and don't always spell the username the way
// the account does ("Middleelement" vs "middlelement"). Lowercasing, dropping
// non-letters and collapsing repeated letters bridges that: it is tolerant of a
// doubled/dropped letter but still requires the same letter sequence, so two
// genuinely different people will not collide.
const idKey=(s)=>String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"").replace(/(.)\1+/g,"$1");

function identityIds(person, members, bundesherren, formerMembers){
  const ids=new Set();
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);

  // Explicit links are authoritative: `aliases` records ids this person has
  // previously voted under, set when a record is linked or merged.
  (person?.aliases||[]).forEach(a=>ids.add(a));

  const rosters=[members,bundesherren,formerMembers];
  // Seed from any roster entry that is clearly the same person, then keep
  // walking: an alias may itself carry aliases (link, then by-elect, then
  // re-link), and each hop can expose ids the first pass could not see.
  let grew=true;
  while(grew){
    grew=false;
    rosters.forEach(roster=>{
      Object.entries(roster||{}).forEach(([id,r])=>{
        if(ids.has(id)) return;
        const ru=String(r.username||"").toLowerCase();
        const rn=String(r.name||"").toLowerCase();
        const same=
          // Same account.
          (u&&ru===u)
          // An unlinked record labelled with the username — this is what a
          // pre-link record looks like, and matching it is what carries the
          // voting history across a re-link. Compared loosely so a doubled or
          // dropped letter in the old hand-typed label still matches.
          ||(uk&&!ru&&idKey(rn)===uk)
          // Same display name, where at least one side is unlinked.
          ||(n&&rn===n&&(!ru||!u))
          // Reached via an already-collected alias.
          ||(r.aliases||[]).some(a=>ids.has(a))
          ||(person?.aliases||[]).includes(id);
        if(same){ ids.add(id); (r.aliases||[]).forEach(a=>ids.add(a)); grew=true; }
      });
    });
  }

  if(person?.id) ids.add(person.id);
  if(u){ ids.add(memberKey(u)); ids.add(bhKey(u)); }
  return ids;
}

// Every vote this person ever cast, in either chamber, across all bills.
function votingRecord(ids, bills){
  const out=[];
  Object.values(bills||{}).forEach(b=>{
    ["bt","bh"].forEach(ch=>{
      const votes=b[ch+"_votes"]||{};
      for(const id of ids){
        if(votes[id]!==undefined){
          out.push({bill:b,chamber:ch,vote:votes[id],
            when:b.ratified_at||b.failed_at||b.created||0});
          break;
        }
      }
    });
  });
  return out.sort((a,b)=>b.when-a.when);
}

// Share of the votes put to this member that they actually took part in. Being
// marked absent is the only thing that counts against it — abstaining is a
// deliberate act and still counts as turning up. Returns null when they have no
// record to judge, so a new member is not shown as 0%.
function activityIndex(votes){
  if(!votes||votes.length===0) return null;
  const absent=votes.filter(v=>v.vote==="absent").length;
  return {pct:Math.round(((votes.length-absent)/votes.length)*100),
    attended:votes.length-absent, total:votes.length, absent};
}

// Everything the register entitles this person to display. Each entry carries
// the reason it was merited, so the UI can explain itself on hover rather than
// showing bare letters.
//   ctx: {members, bundesherren, formerMembers, officials, governments,
//         ihHonours, ijAppointments, account}
function honorifics(person, ctx){
  const styles=[];   // {style, why}
  const suffixes=[]; // {code, label, why, current}
  if(!person) return {prefix:null,suffixes:[],styles:[]};

  const u=String(person.username||"").toLowerCase();
  const n=String(person.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(v)=>{
    const s=String(v||"").toLowerCase();
    if(!s||s==="vacant") return false;
    return s===u||s===n||(!!uk&&idKey(s)===uk);
  };
  const off=ctx?.officials||{};
  const holds=(userKey,nameKey)=>{
    const stored=String(off[userKey]||"").toLowerCase();
    if(stored) return !!u&&stored===u;
    return isThem(off[nameKey]);
  };

  // ── Peerage — held for life ──
  const bhRec=Object.values(ctx?.bundesherren||{}).find(b=>isThem(b.username)||isThem(b.name))
    ||Object.values(ctx?.formerMembers||{}).find(b=>b.rank&&(isThem(b.username)||isThem(b.name)));
  const pr=bhRec?.rank?PEERAGE_RANKS.find(r=>r.v===bhRec.rank):null;
  if(pr?.style) styles.push({style:pr.style,why:pr.l+" — a peerage, held for life"});

  // ── Emperor ──
  if(ctx?.account?.role==="emperor"){
    const o=OFFICE("emperor");
    styles.push({style:o.style,why:o.label});
  }

  // ── Offices currently held ──
  const seated=Object.values(ctx?.members||{}).some(m=>isThem(m.username)||isThem(m.name));
  const cur=[];
  if(holds("chancellor_username","chancellor")) cur.push(OFFICE("chancellor"));
  if(holds("president_bt_username","president_bt")) cur.push(OFFICE("bt_president"));
  Object.entries(off.ministers||{}).forEach(([p,name])=>{
    const mu=(off.minister_usernames||{})[p];
    const hit=mu?(!!u&&String(mu).toLowerCase()===u):isThem(name);
    if(hit) cur.push({...OFFICE("minister"),label:p});
  });
  if(seated) cur.push(OFFICE("member"));
  // Judicial offices come from the Judiciary's own appointments register, and
  // carry whatever style that register gives them — which for the Prosecution
  // Service is none, so a prosecutor picks up no style here.
  Object.values(ctx?.ijAppointments||{}).forEach(a=>{
    if(!isThem(a.username)&&!isThem(a.name)) return;
    const r=IJ_ROLE(a.role);
    if(r?.style) styles.push({style:r.style,why:r.l});
  });

  cur.forEach(o=>{
    if(o.style) styles.push({style:o.style,why:o.label});
    if(o.suffix&&!suffixes.some(s=>s.code===o.suffix))
      suffixes.push({code:o.suffix,label:o.label,why:o.label,current:true});
  });

  // ── Offices once held — the style survives, the post-nominal does not ──
  (ctx?.pastOffices||[]).forEach(({roles})=>{
    roles.forEach(role=>{
      const r=String(role).toLowerCase();
      const o=r.includes("chancellor")?OFFICE("chancellor")
        :r.includes("president of the bundestag")?OFFICE("bt_president")
        :OFFICE("minister");
      if(o?.style&&!styles.some(s=>s.style===o.style&&s.why.startsWith(role)))
        styles.push({style:o.style,why:role+" (former) — the style is retained"});
    });
  });

  // ── Decorations — awards, so permanent ──
  const seen=new Set();
  const addDecor=(code,awarded)=>{
    const d=DECOR(code); if(!d||seen.has(d.v)) return;
    seen.add(d.v);
    suffixes.push({code:d.v,label:d.l,why:d.l+" — "+d.why+(awarded?", awarded "+awarded:""),
      current:true,decoration:true,order:DECORATIONS.findIndex(x=>x.v===d.v)});
  };
  // Conferred by the Imperial Household.
  Object.values(ctx?.ihHonours||{}).forEach(h=>{
    if(!isThem(h.recipientUsername)&&!isThem(h.recipient)) return;
    addDecor(h.medal,h.awarded);
  });
  // Awards made by the War Office before honours moved to the Household are
  // still held on the service record itself. They are decorations like any
  // other, so they count here too — a medal is not lost because the registry
  // that issued it changed. Deduped against the Household register above.
  Object.values(ctx?.mowPersonnel||{}).forEach(p=>{
    if(!isThem(p.username)&&!isThem(p.name)) return;
    (p.medals||[]).forEach(m=>addDecor(m.type,m.awarded));
  });

  // Decorations first (by prestige), then offices — the usual order.
  suffixes.sort((a,b)=>{
    if(!!a.decoration!==!!b.decoration) return a.decoration?-1:1;
    if(a.decoration) return (a.order??99)-(b.order??99);
    return 0;
  });

  styles.sort((a,b)=>(STYLE_RANK[b.style]||0)-(STYLE_RANK[a.style]||0));
  return {prefix:styles[0]||null,styles,suffixes};
}

// A person's record on the bench. Appointments are matched by username, not by
// appointment id, because an id is minted fresh on every appointment — matching
// on it would erase a justice's whole history the moment they were reappointed
// to another court, exactly as a by-election used to erase a member's votes.
// Cases record their presiding justices as appointment ids, so the person's
// appointments are resolved first and their cases found through those.
function judicialRecord(person, ctx){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(v)=>{
    const s=String(v||"").toLowerCase();
    if(!s) return false;
    return s===u||s===n||(!!uk&&idKey(s)===uk);
  };
  const appts=Object.values(ctx?.ijAppointments||{})
    .filter(a=>isThem(a.username)||isThem(a.name));
  if(appts.length===0) return null;

  const apptIds=new Set(appts.map(a=>a.id));
  const presided=Object.values(ctx?.ijCases||{})
    .filter(c=>(c.presiding||[]).some(pid=>apptIds.has(pid)))
    .sort((a,b)=>(b.filed||0)-(a.filed||0));
  const caseIds=new Set(presided.map(c=>c.id));
  const rulings=Object.values(ctx?.ijJudgments||{})
    .filter(j=>caseIds.has(j.caseId))
    .sort((a,b)=>(b.date||0)-(a.date||0));

  const onBench=appts.some(a=>IJ_BENCH_ROLES.includes(a.role));
  return {appts,presided,rulings,onBench};
}

// Of the bills this member took part in, how many were their own work — put
// forward by them, or drafted with them as a co-sponsor. Purely descriptive:
// a member who only ever votes is doing their job, so this carries no colour.
function draftingRatio(votes, submissions){
  const participated=(votes||[]).filter(v=>v.vote!=="absent");
  if(participated.length===0) return null;
  const mine=new Set((submissions||[]).map(s=>s.bill.id));
  const drafted=participated.filter(v=>mine.has(v.bill.id)).length;
  return {pct:Math.round((drafted/participated.length)*100),
    drafted, participated:participated.length};
}

// Bills this person put before a chamber, and those they co-sponsored.
function submissionRecord(person, ids, bills){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const uk=idKey(u);
  const isThem=(name,username)=>{
    const un=String(username||"").toLowerCase(), nm=String(name||"").toLowerCase();
    if(u&&un) return un===u;
    if(!nm) return false;
    return nm===n||nm===u||(!!uk&&idKey(nm)===uk);
  };
  const out=[];
  Object.values(bills||{}).forEach(b=>{
    if(isThem(b.submitter,b.submitterUsername)) out.push({bill:b,role:"submitter"});
    else if((b.cosponsors||[]).some(c=>isThem(c.name,c.username))) out.push({bill:b,role:"cosponsor"});
  });
  return out.sort((a,b)=>(b.bill.created||0)-(a.bill.created||0));
}

// Terms served, cross-referenced against the historical governments record,
// which identifies people by the same usernames used here.
function serviceRecord(person, governments){
  const u=String(person?.username||"").toLowerCase();
  const n=String(person?.name||"").toLowerCase();
  const hit=(v)=>{const s=String(v||"").toLowerCase(); return !!s&&(s===u||s===n);};
  const out=[];
  Object.values(governments||{}).forEach(g=>{
    if(g.example) return;
    const roles=[];
    if(hit(g.chancellor)) roles.push("Imperial Chancellor");
    (g.ministers||[]).forEach(m=>{ if(hit(m.name)) roles.push(m.portfolio); });
    if(roles.length) out.push({gov:g,roles});
  });
  return out.sort((a,b)=>String(b.gov.startDate||"").localeCompare(String(a.gov.startDate||"")));
}

// ── ACCESS ───────────────────────────────────────────────────────────────────
// The Bundeskongress is the source of truth for its own permissions, and they
// are derived rather than stored: seating someone IS granting them access, and
// naming a president IS granting the panel. Nothing to keep in sync, and a role
// can never contradict the seating chart. The Interior mirrors this read-only.
// Officials are recorded by name (and, on newer records, username). Resolve one
// back to a roster record so their name can open a factsheet. Falls back to a
// bare record, which the factsheet can still resolve by name.
function lookupPerson(name, username, ...rosters){
  const u=String(username||"").toLowerCase();
  const n=String(name||"").toLowerCase();
  if(!n&&!u) return null;
  if(n==="vacant") return null;
  for(const roster of rosters){
    const hit=Object.values(roster||{}).find(r=>{
      const ru=String(r.username||"").toLowerCase(), rn=String(r.name||"").toLowerCase();
      return (u&&ru===u)||(n&&(rn===n||ru===n));
    });
    if(hit) return hit;
  }
  return {name:name||username,username:username||""};
}

// Appointment bills carry a nominee's name, not an account. Map it back so a
// ratified appointment actually confers access.
function usernameForName(name, ...rosters){
  const n=String(name||"").trim().toLowerCase();
  if(!n) return "";
  for(const roster of rosters){
    const hit=Object.values(roster||{}).find(r=>
      String(r.name||"").toLowerCase()===n
      ||String(r.displayName||"").toLowerCase()===n
      ||String(r.username||"").toLowerCase()===n);
    if(hit?.username) return hit.username;
  }
  return "";
}

function bkAccess(account, members, bundesherren, officials){
  if(!account) return null;
  const uname=String(account.username||"").toLowerCase();
  const dname=account.displayName||"";
  const seat=findSeat(members,account.username,dname);
  const bhSeat=findSeat(bundesherren,account.username,dname);

  // An office is held either by a stored username, or — for offices recorded
  // before usernames were kept — by a bare name that may be this person's
  // username or their display name. Without this fallback, a sitting president
  // would silently lose their panel until they were re-appointed.
  const aliasesOf=[account.username,dname,seat?.name,bhSeat?.name]
    .filter(Boolean).map(s=>String(s).toLowerCase());
  const holds=(userKey,nameKey)=>{
    const stored=String(officials?.[userKey]||"").toLowerCase();
    if(stored) return !!uname&&stored===uname;
    const bare=String(officials?.[nameKey]||"").toLowerCase();
    return !!bare&&bare!=="vacant"&&aliasesOf.includes(bare);
  };

  if(account.role==="emperor") return {role:"emperor",label:"Emperor",icon:"👑"};
  if(holds("president_bt_username","president_bt")) return {role:"bt_president",label:"President of the Bundestag",  icon:"🏛"};
  if(holds("president_bh_username","president_bh")) return {role:"bh_president",label:"President of the Bundesherren",icon:"🏰"};
  if(seat)   return {role:"member",   label:"Sitting Member",     icon:"🏛", seats:seat.seats};
  if(bhSeat) return {role:"bundesherr",label:"Bundesherr",        icon:"🏰"};
  return null;
}

function budgetValidUntil(ratifiedAt) {
  // Last day of ratification month + 15 days
  const d = new Date(ratifiedAt);
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0, 23, 59, 59, 999);
  return lastDay.getTime() + 15*24*60*60*1000;
}
function budgetCooldownUntil(ratifiedAt) {
  // Can re-propose from the 1st of the following month
  const d=new Date(ratifiedAt);
  return new Date(d.getFullYear(),d.getMonth()+1,1,0,0,0,0).getTime();
}
function fmtCur(n) {
  if(!n&&n!==0) return "—";
  const abs=Math.abs(n);
  const s=abs>=1000000?(abs/1000000).toFixed(1)+"M":abs>=1000?(abs/1000).toFixed(1)+"K":Number(abs).toLocaleString();
  return "$"+(n<0?"-":"")+s;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});
}
function daysLeft(ts) {
  return Math.max(0,Math.ceil((ts-Date.now())/(1000*60*60*24)));
}

// Ministry seals sit in the same folder as the pages, so a bare filename resolves
// on both the Bundeskongress and the Press page. Offices without a dedicated seal
// fall back to the Imperial cypher.
const OFFICE_SEALS={
  "Minister of War":"MOW.png","Minister of Health":"MOH.png",
  "Minister of Foreign Affairs":"MOFA.png","Minister of Finance":"MOF.png",
  "Minister of Interior":"MOI.png","Minister of Infrastructure":"MOIN.png",
};

// The executive offices whose holder may issue a communiqué, resolved from the
// live officials register against the signed-in account.
function heldOffices(user, officials){
  if(!user) return [];
  const off=officials||{};
  const u=String(user.username||"").toLowerCase();
  const d=String(user.displayName||"").toLowerCase();
  const holds=(uKey,nKey)=>{
    const stored=String(off[uKey]||"").toLowerCase();
    if(stored) return !!u&&stored===u;
    const bare=String(off[nKey]||"").toLowerCase();
    return !!bare&&bare!=="vacant"&&(bare===u||bare===d);
  };
  const out=[];
  if(holds("chancellor_username","chancellor")) out.push("Chancellor");
  const mu=off.minister_usernames||{}, mn=off.ministers||{};
  MINISTER_PORTFOLIOS.forEach(p=>{
    const stored=String(mu[p]||"").toLowerCase();
    const hit=stored?(!!u&&stored===u):(!!mn[p]&&String(mn[p]).toLowerCase()!=="vacant"&&[u,d].filter(Boolean).includes(String(mn[p]).toLowerCase()));
    if(hit) out.push(p);
  });
  return out;
}
// A peerage outranks an office for the style of address, so honour it if held.
function peerageOf(user, bundesherren, formerMembers){
  const u=String(user&&user.username||"").toLowerCase(), d=String(user&&user.displayName||"").toLowerCase();
  const isThem=(v)=>{const s=String(v||"").toLowerCase();return !!s&&(s===u||s===d);};
  const rec=Object.values(bundesherren||{}).find(b=>isThem(b.username)||isThem(b.name))
    ||Object.values(formerMembers||{}).find(b=>b.rank&&(isThem(b.username)||isThem(b.name)));
  return rec&&rec.rank?PEERAGE_RANKS.find(r=>r.v===rec.rank):null;
}

async function sha256(t) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// Convert "7:00 PM" style times to "19:00" for Date parsing
function convertTo24(timeStr){
  if(!timeStr) return "00:00";
  const clean=timeStr.trim().toUpperCase();
  const m=clean.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/);
  if(!m) return "00:00";
  let h=parseInt(m[1]); const min=m[2]; const ampm=m[3];
  if(ampm==="PM"&&h!==12) h+=12;
  if(ampm==="AM"&&h===12) h=0;
  return String(h).padStart(2,"0")+":"+min;
}

// ── MongoDB backend (Render API) ───────────────────────────────────────────────
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
// The account the token belongs to, cached beside it so a page paints its
// signed-in state on the first frame instead of waiting on the /api/me round
// trip. A display cache only — the server still authorises every read and write
// against the token itself — and it is reconciled the moment /api/me answers, so
// a session ended elsewhere is corrected within one page load.
const SESSION_ACC_KEY="lech_session_acc";
function saveSession(t,acc){try{if(t)localStorage.setItem(SESSION_KEY,t);if(acc)localStorage.setItem(SESSION_ACC_KEY,JSON.stringify(acc));}catch(e){}}
// The cached account, for that optimistic first paint. Adopts the stored token
// too, so the snapshot fetched on the same frame is made as the signed-in account.
function cachedAccount(){
  try{
    var t=localStorage.getItem(SESSION_KEY); if(!t) return null;
    var a=localStorage.getItem(SESSION_ACC_KEY); if(!a) return null;
    AUTH_TOKEN=t; return JSON.parse(a);
  }catch(e){ return null; }
}
// Drop the stored token locally. Never talks to the server, so a network hiccup
// can never destroy a session that is still perfectly good.
function clearSession(){try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(SESSION_ACC_KEY);}catch(e){}AUTH_TOKEN=null;}
// A deliberate sign-out: end the session on the server too. Only ever called
// from a real "Sign Out" control — never from a failed restore.
function forgetSession(){const t=AUTH_TOKEN;clearSession();try{if(t)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});}catch(e){}}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{
    // Plain query token, exactly like every other call on this page, so this is a
    // simple request with no CORS preflight.
    const r=await fetch(API+"/api/me?token="+encodeURIComponent(t));
    const d=await r.json();
    if(d&&d.ok&&d.account){saveSession(t,d.account);return d.account;}   // refresh the cache
    clearSession();return null;      // the server rejected it — genuinely stale
  }catch(e){ return null; }          // offline/blocked — keep the token, retry next page
}
async function sgetAll(prefix) {
  try {
    const r = await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));
    const d = await r.json();
    if (!d||!d.ok) return {};
    const out={}; const p=prefix||"";
    Object.entries(d.data||{}).forEach(([k,v])=>{ if(k.startsWith(p)) out[k]=v; });  // values already parsed
    return out;
  } catch(e){ return {}; }
}
// ── Atomic write tracking ─────────────────────────────────────────────────────
var _writeTx = null;
function beginTx() { _writeTx = { keys: [], committed: false }; }
function commitTx() { if(_writeTx) _writeTx.committed = true; _writeTx = null; }

// Leaving mid-transaction only warns; nothing is rolled back from here. A
// half-written batch is repaired by finishing the action, not by deleting keys.
window.addEventListener("beforeunload", function(e) {
  if(_writeTx && !_writeTx.committed) {
    e.preventDefault();
    e.returnValue = "Data is still saving. Leaving now may corrupt your data.";
  }
});

async function sset(k,v) {
  try {
    if(_writeTx) _writeTx.keys.push(k);
    const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});
    const d=await r.json(); return !!(d&&d.ok);
  } catch(e){ return false; }
}

// Seats are taken from the vote snapshot first, so a member who has since left
// the chamber still carries the weight they held when they voted. Previously
// this read members[id].seats directly, which silently zeroed a departed
// member's vote on every bill they had ever voted on.
function calcBT(members, votes, threshold=BT_THRESHOLD, snapshot, former, preferLive) {
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    const who=resolveVoter(id,members,former,snapshot,preferLive);
    const s=(who?.seats)||0;
    if(v==="for") f+=s; else if(v==="against") a+=s; else if(v==="abstain"||v==="absent") ab+=s;
  });
  return {for_seats:f,against_seats:a,abstain_seats:ab,passed:f>=threshold,threshold};
}
// `total` drives the majority threshold and must reflect the chamber as it was
// when the vote ran, so a later appointment cannot retroactively move the bar.
function calcBH(bh, votes, snapshot, former, preferLive) {
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    if(!resolveVoter(id,bh,former,snapshot,preferLive)) return;
    if(v==="for") f++; else if(v==="against") a++; else if(v==="abstain") ab++;
  });
  const liveTotal=Object.keys(bh||{}).length;
  const votedTotal=Object.keys(votes||{}).length;
  const total=preferLive?liveTotal:Math.max(liveTotal,votedTotal);
  const thresh=Math.floor(total/2)+1;
  return {for_count:f,against_count:a,abstain_count:ab,total,threshold:thresh,passed:f>=thresh};
}

// ── Bill progress pipeline ───────────────────────────────────────────────────
function BillPipeline({bill}) {
  const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
  const skipBH=bt.skipBH;
  const s=bill.status;

  const bhOriginBill = bill.origin==="bh";
  const bhSkipBT = bt.bhOrigin; // appoint_bh_pres skips BT entirely

  // Define stages based on origin and type
  const stages=[];
  stages.push({key:"submitted", label:"Submitted", icon:"📝"});
  if(bill.type==="motion"){
    if(bill.origin==="bh"){
      stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
      if(bill.motion_scope==="dual") stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});
    } else {
      stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});
      if(bill.motion_scope==="dual") stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
    }
    stages.push({key:"motion_passed",label:"Passed",icon:"✋"});
  } else if(bhOriginBill){
    // BH-originated: BH first, then BT vote (unless bhOrigin type), then Emperor
    stages.push({key:"bh_voting", label:"BH Vote",      icon:"🏰"});
    if(!bhSkipBT)
      stages.push({key:"bt_voting", label:"BT Vote",    icon:"🗳"});
  } else {
    // BT-originated: docket → BT → BH (unless skipBH) → Emperor
    stages.push({key:"docket",    label:"Docket",       icon:"📋"});
    stages.push({key:"bt_voting", label:"BT Vote",      icon:"🗳"});
    if(!skipBH)
      stages.push({key:"bh_voting", label:"BH Vote",    icon:"⚜"});
  }
  if(bill.type!=="motion"){
    stages.push({key:"emperor",   label:"Emperor",      icon:"👑"});
    stages.push({key:"passed",    label:"Law",          icon:"✅"});
  }

  // Map current status to stage key
  const stageKey=(()=>{
    if(["pending_emperor"].includes(s)) return "submitted";
    if(s==="pending_bh") return "submitted";
    if(s==="pending") return bhOriginBill?"bt_voting":"submitted";
    if(s==="docket")       return "docket";
    if(s==="bt_voting")    return "bt_voting";
    if(s==="bh_voting")    return "bh_voting";
    if(["ratification","returned"].includes(s)) return "emperor";
    if(s==="passed")       return "passed";
    if(s==="motion_passed") return "motion_passed";
    return null;
  })();

  const stageIdx=stages.findIndex(st=>st.key===stageKey);
  const failed=["failed_bt","failed_bh","vetoed","repealed","motion_failed"].includes(s);
  const returned=s==="returned";

  return (
    <div style={{marginBottom:"1rem",padding:"0.75rem 1rem",background:C.s1,borderRadius:3,
                  border:`1px solid ${C.border}`}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:8,textTransform:"uppercase"}}>Bill Progress</div>
      <div style={{display:"flex",alignItems:"center",flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
        {stages.map((stage,i)=>{
          const done  = stageIdx>i || s==="passed";
          const active= stageIdx===i && !failed;
          const color = done?"#7ad47a":active?(returned&&stage.key==="emperor"?"#f0a050":"#4a88ff"):C.textDD;
          const isLast= i===stages.length-1;
          return (
            <React.Fragment key={stage.key}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,minWidth:52}}>
                <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                              background:done?"#0a2a0a":active?(returned&&stage.key==="emperor"?"#2a1500":"#001230"):"transparent",
                              border:`2px solid ${color}`,fontSize:13,marginBottom:3,
                              boxShadow:active?`0 0 8px ${color}44`:"none"}}>
                  {done?"✓":stage.icon}
                </div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color,letterSpacing:"0.06em",textAlign:"center",lineHeight:1.3,maxWidth:50}}>
                  {stage.label}
                  {active&&returned&&stage.key==="emperor"&&<div style={{color:"#f0a050",fontSize:7,marginTop:1}}>↩ RETURNED</div>}
                </div>
              </div>
              {!isLast&&(
                <div style={{flex:1,height:2,minWidth:8,maxWidth:32,
                              background:done?`linear-gradient(to right,#3a8a3a,#3a8a3a)`:`linear-gradient(to right,${C.border},${C.border})`,
                              marginBottom:18,flexShrink:1}}/>
              )}
            </React.Fragment>
          );
        })}
        {failed&&(
          <div style={{marginLeft:8,fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.1em",marginBottom:18,flexShrink:0}}>
            {s==="failed_bt"?"✗ Failed BT":s==="failed_bh"?"✗ Failed BH":s==="vetoed"?"🚫 Vetoed":s==="repealed"?"🚫 Repealed":s==="motion_failed"?"✗ Motion Failed":""}
          </div>
        )}
      </div>
    </div>
  );
}

function BillCard({bill,members,bundesherren,ijStatutes,ijCases,bills,defaultOpen}) {
  const formerMembers=useFormer();
  const ballot=useBallot();
  const [open,setOpen]=useState(!!defaultOpen);
  const sm=STATUS_META[bill.status]||{label:bill.status,color:C.textD,icon:"•"};
  const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
  const fmtD=ts=>ts?new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";
  const btData=bill.bt_result||(Object.keys(bill.bt_votes||{}).length>0?calcBT(members,bill.bt_votes,BT_THRESHOLD,bill.bt_vote_names,formerMembers):null);
  const bhData=bill.bh_result||(Object.keys(bill.bh_votes||{}).length>0?calcBH(bundesherren,bill.bh_votes,bill.bh_vote_names,formerMembers):null);
  const isConstitution=bill.grandfathered&&bill.type==="constitutional_amendment";

  const isDecree=bill.status==="decree";
  const finalBg=isConstitution?"#16120a":isDecree?"#160810":C.s2;
  const finalBorder=isConstitution?`1px solid #c8a87088`:isDecree?`1px solid #8b1a4a55`:`1px solid ${C.border}`;
  const finalBorderLeft=isConstitution?`4px solid #C9A84C`:isDecree?`4px solid #8b1a4a`:`4px solid ${sm.color}`;
  const finalShadow=isConstitution?"0 0 12px #C9A84C22":isDecree?"0 0 8px #8b1a4a22":"none";

  return (
    <div className="fu" style={{background:finalBg,border:finalBorder,borderLeft:finalBorderLeft,borderRadius:"0 3px 3px 0",marginBottom:"0.75rem",overflow:"hidden",boxShadow:finalShadow}}>
      {isDecree&&(
        <div style={{background:"linear-gradient(135deg,#1a0820,#120614)",borderBottom:"1px solid #8b1a4a33",padding:"4px 12px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>⚜</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.3em",color:"#c060a0",textTransform:"uppercase"}}>Imperial Instrument of Law</span>
        </div>
      )}
      {isConstitution&&(
        <div style={{background:"linear-gradient(135deg,#2a1e00,#1a1400)",borderBottom:"1px solid #C9A84C33",padding:"4px 12px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>📜</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.3em",color:"#C9A84C",textTransform:"uppercase"}}>Imperial Constitution of the Empire of Lech</span>
          <span style={{fontSize:14}}>📜</span>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"0.85rem 1.1rem",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:isConstitution?C.gold:C.text,fontWeight:700}}>{isConstitution?"⚜":sm.icon} {bill.title}</span>
            {bill.type!=="regular"&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:C.gold,border:`1px solid ${C.gold}44`,padding:"2px 6px",borderRadius:2}}>{bt.icon} {bt.label}</span>}
            {bill.type==="motion"&&bill.motion_scope&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#5aaf8a",border:"1px solid #3a7a5a44",padding:"2px 6px",borderRadius:2}}>{bill.motion_scope==="dual"?"⚖ Dual Chamber":"🏛 Single Chamber"}</span>}
            {bill.status==="decree"&&bill.decree_subtype&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:C.gold,border:`1px solid ${C.gold}44`,padding:"2px 6px",borderRadius:2}}>⚜ {DECREE_SUBTYPES.find(d=>d.v===bill.decree_subtype)?.l||"Imperial Decree"}</span>}
            {bill.grandfathered&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#8a7040",border:"1px solid #8a704044",padding:"2px 6px",borderRadius:2,background:"#1a1400"}}>⚜ Grandfathered</span>}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:sm.color,border:`1px solid ${sm.color}44`,padding:"2px 7px",borderRadius:2}}>{bill.status==="pulled"?(bill.pulled_by==="bt_president"?"📥 Pulled — Bundestag President":bill.pulled_by==="bh_president"?"📥 Pulled — Bundesherren President":"📥 Pulled by the Emperor"):sm.label}</span>
            {(()=>{const lc=bill.category?LAW_CATEGORIES.find(x=>x.v===bill.category):null;return lc?<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:lc.color,border:`1px solid ${lc.color}44`,padding:"2px 7px",borderRadius:2}}>{lc.l}</span>:null;})()}
            <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>by {bill.submitter}</span>
            {(bill.cosponsors||[]).length>0&&(
              <span style={{fontSize:11,color:"#7ad47a",fontStyle:"italic"}}
                title={"Co-sponsors: "+bill.cosponsors.map(c=>c.username||c.name).join(", ")}>
                + {bill.cosponsors.length} co-sponsor{bill.cosponsors.length!==1?"s":""}
              </span>
            )}
            <span style={{fontSize:11,color:C.textDD}}>{fmtD(bill.created)}</span>
            {bill.nominee&&<span style={{fontSize:12,color:C.gold,fontStyle:"italic"}}>Nominee: {bill.nominee}{bill.portfolio?" — "+bill.portfolio:""}</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:12,marginTop:2,flexShrink:0}}>
          {bill.origin&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.08em",
            color:C.textDD,whiteSpace:"nowrap"}}>
            orig. <span style={{color:bill.origin==="bh"?"#c8a870":"#4a88ff"}}>{bill.origin==="bh"?"BH":"BT"}</span>
          </span>}
          <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.textDD}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem 1.1rem"}}>
          <BillPipeline bill={bill}/>
          {bill.status==="decree"&&(bill.decree_text||bill.gdoc_url)&&(
            <div style={{marginBottom:"1rem"}}>
              {bill.gdoc_url&&(
                <a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer"
                  style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.1em",padding:"5px 14px",borderRadius:2,
                           border:`1px solid ${C.gold}55`,background:"#2a2000",color:C.gold,textDecoration:"none",display:"inline-block",marginBottom:bill.decree_text?"0.75rem":"0"}}>
                  📄 View Decree Document →
                </a>
              )}
              {bill.decree_text&&(
                <div style={{background:"#1a1400",border:`1px solid ${C.gold}33`,borderLeft:`3px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.gold,marginBottom:6}}>⚜ IMPERIAL DECREE TEXT</div>
                  <div style={{fontSize:14,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{bill.decree_text}</div>
                </div>
              )}
            </div>
          )}
          {bill.type==="motion"&&bill.motion_text&&(
            <div style={{background:"#0e1a14",border:"1px solid #3a7a5a33",borderLeft:"3px solid #4a9a7a",borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",marginBottom:"1rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:"#5aaf8a",marginBottom:6}}>✋ MOTION TEXT</div>
              <div style={{fontSize:14,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{bill.motion_text}</div>
            </div>
          )}
          {(bill.type==="budget"||bill.type==="budget_supplementary")&&bill.budgetData&&(
            <div style={{marginBottom:"1rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.textDD,marginBottom:8}}>💰 BUDGET DETAIL</div>
              <BudgetDisplay budget={{id:bill.id,title:bill.title,data:bill.budgetData,reserve:bill.budgetReserve??null}} orgChart={null} imperialReserve={bill.budgetReserve??null}/>
            </div>
          )}
          {bill.type!=="motion"&&bill.gdoc_url&&(
            <div style={{marginBottom:"1rem"}}>
              <a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer"
                style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.1em",padding:"5px 14px",borderRadius:2,
                         border:`1px solid ${C.gold}55`,background:"#2a2000",color:C.gold,textDecoration:"none",display:"inline-block"}}>
                📄 View Bill Document →
              </a>
            </div>
          )}
          {(bill.cosponsors||[]).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.textDD,marginBottom:6}}>CO-SPONSORS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {bill.cosponsors.map((c,i)=>{
                  const person=Object.values(members||{}).find(m=>m.username&&m.username===c.username)
                    ||Object.values(bundesherren||{}).find(m=>m.username&&m.username===c.username)
                    ||{username:c.username,name:c.name};
                  return(
                    <div key={i} style={{background:C.s3,border:"1px solid #2a4a2a",borderLeft:"2px solid #4a9a5a",
                      borderRadius:"0 2px 2px 0",padding:"3px 9px"}}>
                      <MemberLink person={person} style={{fontSize:12,color:"#9ad4a0"}}>
                        {c.username||c.name}
                      </MemberLink>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Digital ballot — only while this chamber's vote is actually open. */}
          {ballot&&bill.status==="bt_voting"&&!bill.bt_result&&ballot.digitalVoting?.bt&&ballot.mySeat&&(
            <DigitalBallot bill={bill} chamber="bt" seat={ballot.mySeat}
              onAction={ballot.onAction} notify={ballot.notify}/>
          )}
          {ballot&&bill.status==="bh_voting"&&!bill.bh_result&&ballot.digitalVoting?.bh&&ballot.myBHSeat&&(
            <DigitalBallot bill={bill} chamber="bh" seat={ballot.myBHSeat}
              onAction={ballot.onAction} notify={ballot.notify}/>
          )}
          {btData&&(
            <div style={{marginBottom:"1.25rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.textDD,marginBottom:6}}>BUNDESTAG VOTE {bill.bt_result?"(CLOSED)":"(LIVE)"}</div>
              <VoteBar fv={btData.for_seats} av={btData.against_seats} abv={btData.abstain_seats} total={BT_SEATS_TOTAL} thresh={bill.type==="constitutional_amendment"?BT_SUPERMAJORITY:BT_THRESHOLD} isBT={true}/>
              {Object.keys(bill.bt_votes||{}).length>0&&(
                <div style={{marginTop:"0.75rem",display:"flex",flexWrap:"wrap",gap:4}}>
                  {Object.entries(bill.bt_votes).sort((a,b)=>
                    ((resolveVoter(b[0],members,formerMembers,bill.bt_vote_names)?.seats)||0)
                   -((resolveVoter(a[0],members,formerMembers,bill.bt_vote_names)?.seats)||0)
                  ).map(([mid,vote])=>{
                    const who=resolveVoter(mid,members,formerMembers,bill.bt_vote_names);
                    const name=who?.username||who?.name||"Former Member";
                    const seats=who?.seats??"—";
                    const p=PARTIES.find(x=>x.id===who?.party);
                    const vc=vote==="for"?"#7ad47a":vote==="against"?C.redL:vote==="absent"?"#8888bb":C.textDD;
                    const isFormer=!members[mid];
                    return <div key={mid} style={{background:C.s3,border:`1px solid ${C.border}`,borderLeft:`2px solid ${p?.color||C.border}`,borderRadius:"0 2px 2px 0",padding:"3px 8px",display:"flex",alignItems:"center",gap:5,opacity:isFormer?0.65:1}}>
                      <span style={{fontSize:12,color:C.text}}>{name}{isFormer&&<span style={{fontSize:9,color:C.textDD,marginLeft:3}}>(former)</span>}</span>
                      <span style={{fontSize:10,color:C.textDD}}>({seats})</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:9,fontWeight:700,color:vc}}>{vote.toUpperCase()}</span>
                    </div>;
                  })}
                </div>
              )}
            </div>
          )}
          {bhData&&Object.keys(bill.bh_votes||{}).length>0&&(
            <div style={{marginBottom:"1rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.textDD,marginBottom:6}}>BUNDESHERREN VOTE {bill.bh_result?"(CLOSED)":"(LIVE)"}</div>
              <VoteBar fv={bhData.for_count} av={bhData.against_count} abv={bhData.abstain_count} total={Math.max(bhData.total,1)} thresh={bhData.threshold} isBT={false}/>
              <div style={{marginTop:"0.75rem",display:"flex",flexWrap:"wrap",gap:4}}>
                {Object.entries(bill.bh_votes).map(([bid,vote])=>{
                  const bh=bundesherren[bid];
                  const who=resolveVoter(bid,bundesherren,formerMembers,bill.bh_vote_names);
                  const name=who?.username||who?.name||bid;
                  const rank=who?.rank;
                  const vc=vote==="for"?"#7ad47a":vote==="against"?C.redL:C.textDD;
                  return <div key={bid} style={{background:C.s3,border:`1px solid ${C.gold}33`,borderLeft:`2px solid ${C.gold}`,borderRadius:"0 2px 2px 0",padding:"3px 8px",display:"flex",alignItems:"center",gap:5,opacity:bh?1:0.65}}>
                    <span style={{fontSize:10,color:C.gold}}>⚜</span>
                    <div>
                      {rank&&(()=>{const pr=PEERAGE_RANKS.find(r=>r.v===rank);return pr?<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.12em",color:pr.color,display:"block"}}>{pr.l}</span>:null;})()}
                      <span style={{fontSize:12,color:C.text}}>{name}{!bh&&<span style={{fontSize:9,color:C.textDD,marginLeft:3}}>(former)</span>}</span>
                    </div>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:9,fontWeight:700,color:vc}}>{vote.toUpperCase()}</span>
                  </div>;
                })}
              </div>
            </div>
          )}
          {bill.ratified_at&&<div style={{fontSize:13,color:C.gold,fontStyle:"italic"}}>⚜ Ratified by the Emperor — {new Date(bill.ratified_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>}
          {bill.repeal_on_pass&&bill.repeal_on_pass.length>0&&bill.status!=="passed"&&(
            <div style={{marginTop:4}}>
              <div style={{fontSize:11,color:"#cc7a20",fontStyle:"italic",marginBottom:3}}>⚠ Repeals if ratified:</div>
              {bill.repeal_on_pass.map(rid=>{const t=(bills||{})[rid];return(<div key={rid} style={{fontSize:12,color:"#b06820",paddingLeft:10,lineHeight:1.6}}>• {t?t.title:<span style={{color:C.textDD,fontStyle:"italic"}}>Unknown law ({rid})</span>}</div>);})}
            </div>
          )}
          {bill.status==="passed"&&bill.repeal_on_pass&&bill.repeal_on_pass.length>0&&(
            <div style={{marginTop:4}}>
              <div style={{fontSize:11,color:"#cc5050",fontStyle:"italic",marginBottom:3}}>🚫 Repealed upon ratification:</div>
              {bill.repeal_on_pass.map(rid=>{const t=(bills||{})[rid];return(<div key={rid} style={{fontSize:12,color:"#8a4040",paddingLeft:10,lineHeight:1.6}}>• {t?t.title:<span style={{color:C.textDD,fontStyle:"italic"}}>Unknown law ({rid})</span>}</div>);})}
            </div>
          )}
          {bill.repealed_at&&<div style={{fontSize:13,color:"#c05050",fontStyle:"italic",marginTop:2}}>🚫 Repealed — {new Date(bill.repealed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}{bill.repealed_by_title&&<span style={{color:"#8a4040"}}>{" "}by {bill.repealed_by_title}</span>}</div>}
          {(()=>{
            // Check if any IJ statute references this BK bill (via id match bk_<bill.id>)
            const bkStatuteId="bk_"+bill.id;
            const ijStat=ijStatutes&&Object.values(ijStatutes).find(s=>s.id===bkStatuteId||s.caseRef);
            // Court repeals: ij_statutes with src=court_repeal pointing to this bill
            const courtRepealed=ijStatutes&&Object.values(ijStatutes).find(s=>
              s.src==="court_repeal"&&(s.repealOf===bkStatuteId||s.repealOfTitle===bill.title));
            // Court modifications: ij_statutes referencing this bill
            const mods=ijStatutes?Object.values(ijStatutes).filter(s=>
              s.modifies&&(s.modifies===bkStatuteId||s.modifiesTitle===bill.title)):[];
            if(!courtRepealed&&mods.length===0) return null;
            return <div style={{marginTop:6}}>
              {courtRepealed&&<div style={{background:"#1a0808",border:"1px solid #8b1a1a44",
                borderLeft:"3px solid #cc2222",borderRadius:"0 3px 3px 0",padding:"6px 10px",marginBottom:4}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#c05050",letterSpacing:"0.15em",marginBottom:3}}>
                  ⚖ REPEALED BY COURT ORDER
                </div>
                <div style={{fontSize:12,color:"#e0b0b0"}}>
                  {(()=>{
                    const relCase=ijCases&&Object.values(ijCases).find(x=>x.id===courtRepealed.caseId||x.number===courtRepealed.caseRef);
                    return relCase?<span>{relCase.number} — {relCase.title}{courtRepealed.enacted?" — "+new Date(courtRepealed.enacted).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"}):""}</span>
                      :<span>{courtRepealed.caseRef||"Court Order"}{courtRepealed.enacted?" — "+new Date(courtRepealed.enacted).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"}):""}</span>;
                  })()}
                </div>
              </div>}
              {mods.map((m,i)=>{
                const relCase=ijCases&&Object.values(ijCases).find(c=>c.id===m.caseId||c.number===m.caseRef);
                return <div key={i} style={{background:"#0a1020",border:"1px solid #2a4a8a44",
                  borderLeft:"3px solid #4a6aaa",borderRadius:"0 3px 3px 0",padding:"6px 10px",marginBottom:4}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#6a8acc",letterSpacing:"0.15em",marginBottom:3}}>
                    ⚖ MODIFIED BY COURT ORDER
                  </div>
                  <div style={{fontSize:12,color:"#a0b8e0",marginBottom:2}}>
                    {relCase&&<span>Case {relCase.number} — </span>}
                    {m.enacted&&new Date(m.enacted).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}
                  </div>
                  {m.body&&<details style={{marginTop:4}}>
                    <summary style={{fontSize:11,color:"#6a8acc",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:"0.1em"}}>
                      VIEW MODIFICATION
                    </summary>
                    <div style={{fontSize:13,color:"#a0b8e0",lineHeight:1.7,marginTop:6,paddingTop:6,borderTop:"1px solid #1e2e48",whiteSpace:"pre-wrap"}}>{m.body}</div>
                  </details>}
                </div>;
              })}
            </div>;
          })()}
          {bill.pulled_at&&(
            <div style={{background:"#1a0a1a",border:`1px solid #6a3a6a55`,borderLeft:`3px solid #9a5a9a`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#c080c0",letterSpacing:"0.15em",marginBottom:bill.pull_reason?4:0}}>📥 PULLED BY {bill.pulled_by==="bt_president"?"PRESIDENT OF THE BUNDESTAG":bill.pulled_by==="bh_president"?"PRESIDENT OF THE BUNDESHERREN":"THE EMPEROR"} — {new Date(bill.pulled_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.pull_reason&&<div style={{fontSize:13,color:"#c0a0c0",fontStyle:"italic",lineHeight:1.7}}>{bill.pull_reason}</div>}
            </div>
          )}
          {bill.vetoed_at&&(
            <div style={{background:"#1a0808",border:`1px solid #8b1a1a55`,borderLeft:`3px solid #8b1a1a`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.15em",marginBottom:bill.veto_reason?4:0}}>IMPERIAL VETO — {new Date(bill.vetoed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.veto_reason&&<div style={{fontSize:13,color:"#d08080",fontStyle:"italic",lineHeight:1.7}}>{bill.veto_reason}</div>}
            </div>
          )}
          {bill.returned_at&&(
            <div style={{background:"#1a0e00",border:`1px solid #b05a1055`,borderLeft:`3px solid #f0a050`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#f0a050",letterSpacing:"0.15em",marginBottom:bill.return_notes?4:0}}>RETURNED FOR REVISIONS — {new Date(bill.returned_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.return_notes&&<div style={{fontSize:13,color:"#d0b090",fontStyle:"italic",lineHeight:1.7}}>{bill.return_notes}</div>}
            </div>
          )}
          {bill.failed_at&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>Concluded {new Date(bill.failed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>}
        </div>
      )}
    </div>
  );
}

function VoteRecorder({bill,members,bundesherren,chamber,onSave,onClose}) {
  const formerMembers=useFormer();
  const isBT=chamber==="bt";
  const voterList=isBT
    ? Object.entries(members||{}).sort((a,b)=>b[1].seats-a[1].seats)
    : Object.entries(bundesherren||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

                  <button key={val} onClick={()=>setVotes(prev=>({...prev,[id]:prev[id]===val?undefined:val}))}
                    style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.08em",padding:"3px 8px",borderRadius:2,cursor:"pointer",

        <Btn variant="green" onClick={async()=>{setSaving(true);await onSave(votes);setSaving(false);}} disabled={saving}>{saving?"Saving…":"💾 Save Votes"}</Btn>
        <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
      </div>
    </div>
  );
}

// Offices may only be filled by someone who sits in a chamber. Anyone holding a
// seat in both appears once, marked as such, rather than twice.
function eligibleNominees(members, bundesherren, chambers=["bt","bh"]){
  const out=new Map(); // keyed by username (or name, for unlinked records)
  const add=(m,chamber)=>{
    const key=String(m.username||m.name||"").toLowerCase();
    if(!key) return;
    const existing=out.get(key);
    if(existing){ existing.chambers.add(chamber); return; }
    out.set(key,{username:m.username||"",name:m.name||"",seats:m.seats||0,
      party:m.party||"",chambers:new Set([chamber])});
  };
  if(chambers.includes("bt")) Object.values(members||{}).forEach(m=>add(m,"bt"));
  if(chambers.includes("bh")) Object.values(bundesherren||{}).forEach(m=>add(m,"bh"));
  return [...out.values()]
    .sort((a,b)=>(a.username||a.name).localeCompare(b.username||b.name))
    .map(p=>{
      const both=p.chambers.has("bt")&&p.chambers.has("bh");
      const where=both?"Bundestag & Bundesherren":p.chambers.has("bt")?"Bundestag":"Bundesherren";
      const label=(p.username||p.name)+(p.name&&p.username?" — "+p.name:"")+" · "+where;
      return {...p,both,where,label,v:p.username||p.name};
    });
}

// For offices with no seat requirement: every citizen on the register, noting
// any chamber they happen to sit in.
function allCitizenNominees(accounts, members, bundesherren){
  const seatOf=(uname)=>{
    const u=String(uname||"").toLowerCase();
    const inBT=Object.values(members||{}).some(m=>String(m.username||"").toLowerCase()===u);
    const inBH=Object.values(bundesherren||{}).some(m=>String(m.username||"").toLowerCase()===u);
    return inBT&&inBH?"Bundestag & Bundesherren":inBT?"Bundestag":inBH?"Bundesherren":"No seat";
  };
  return Object.values(accounts||{})
    .filter(a=>a?.username)
    .sort((a,b)=>(a.username||"").localeCompare(b.username||""))
    .map(a=>{
      const where=seatOf(a.username);
      return {username:a.username,name:a.displayName||a.username,seats:0,party:"",
        where,both:false,v:a.username,
        label:a.username+(a.displayName?" — "+a.displayName:"")+" · "+where};
    });
}

                      <span style={{fontSize:12,color:sel?"#f0a060":C.textD,flex:1}}>{b.title}</span>

        <div>
          <FL>SUBMITTING MEMBER</FL>
          <div style={{background:C.s1,border:`1px solid ${C.gold}44`,borderLeft:`3px solid ${C.gold}`,
            borderRadius:"0 2px 2px 0",padding:"8px 12px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:14,color:C.text,fontFamily:"'Cinzel',serif"}}>{submitter}</span>
            <span style={{fontSize:11,color:C.textDD}}>@{user?.username}</span>
            {seatLabel&&<span style={{fontSize:11,color:C.gold,fontStyle:"italic"}}>· {seatLabel}</span>}
          </div>
        </div>
        {needsDoc&&(
          <div>
            <FL>GOOGLE DOC LINK *</FL>
            <Inp value={gdoc} onChange={setGdoc} placeholder="https://docs.google.com/..."/>
            <div style={{fontSize:12,color:C.textDD,marginTop:4,fontStyle:"italic"}}>Paste the shareable link to your Google Doc</div>
          </div>
        )}
        {err&&<div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,padding:"0.6rem 1rem",borderRadius:"0 3px 3px 0",fontSize:13,color:C.redL}}>{err}</div>}
        <Btn onClick={async()=>{
          if(!canSubmit){setErr("You must be signed in as a sitting member to submit.");return;}
          if(needsNominee&&!nominee.trim()){setErr("Please select a nominee.");return;}
          if(isMotion&&!title.trim()){setErr("Please enter a title for the motion.");return;}
          if(isMotion&&!motionText.trim()){setErr("Please write the motion text.");return;}
          if(needsDoc&&(!title.trim()||!gdoc.trim())){setErr("Please fill all required fields.");return;}
          if(needsDoc&&!gdoc.startsWith("http")){setErr("Google Doc link must start with http.");return;}
          setSaving(true);setErr("");
          // The nominee is picked from the roster, so the bill can carry both the
          // name to display and the account the office will actually be granted to.
          const nom=nomineeOf(nominee);
          const nomName=nom?(nom.name||nom.username):nominee.trim();
          const billTitle=needsNominee
            ?(isMinister?"Nominate "+portfolio+" — "+nomName:(BILL_TYPES[actualType]?.label||"Nomination")+" — "+nomName)
            :title.trim();
          const res=await onSubmit({
            origin:chamber,
            type:actualType, title:billTitle,
            gdoc_url:needsNominee?"":isMotion?"":gdoc.trim(),
            submitter:submitter.trim(),
            submitterUsername:user?.username||"",
            nominee:needsNominee?nomName:"",
            nomineeUsername:needsNominee?(nom?.username||""):"",
            cosponsors:cosponsors.length>0
              ?cosponsors.map(v=>{const o=nomineeOf(v)||eligibleNominees(members,bundesherren).find(x=>x.v===v);
                 return {username:o?.username||"",name:o?.name||v};})
              :undefined,
            portfolio:isMinister?portfolio:"",
            category:(isRegular||isBHRegular)?category:"",
            motion_text:isMotion?motionText.trim():undefined,
            motion_scope:isMotion?motionScope:undefined,
            repeal_on_pass:((isRegular||isBHRegular||isConst)&&repealIds.length>0)?repealIds:undefined,
          });
          setSaving(false);
          if(res==="cap") setErr("⚠ The President's queue is full (25 bills max). Wait for the President to review existing submissions before proposing more.");
          else if(res) setDone(true); else setErr("⚠ Submission failed — check your connection and try again.");
        }} disabled={saving||!canSubmit||(needsNominee&&!nominee.trim())||(needsDoc&&(!title.trim()||!gdoc.trim()))||(isMotion&&(!title.trim()||!motionText.trim()))} full>
          {saving?"Submitting…":"⚜ Submit Bill"}
        </Btn>
      </div>
    </div>
  );
}

// ── Session banner helper ────────────────────────────────────────────────────
function SessionBanner({session}) {
  if(!session?.date) return null;
  const fmtDate=d=>{
    try{ return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}); }
    catch{ return d; }
  };
  const isToday=session.date===new Date().toISOString().slice(0,10);
  return (
    <div className="shm" style={{background:isToday?"#0a1a0a":"#0e1018",
                                   border:`1px solid ${isToday?"#3a9c3a44":"#4a88ff33"}`,
                                   borderLeft:`4px solid ${isToday?"#3a9c3a":"#4a88ff"}`,
                                   borderRadius:"0 4px 4px 0",padding:"0.75rem 1.1rem",
                                   marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <span style={{fontSize:22}}>{isToday?"🟢":"📅"}</span>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",
                      color:isToday?"#7ad47a":"#88bbff",textTransform:"uppercase",marginBottom:3}}>
          {isToday?"Session Today":"Next Session"}
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:isToday?"#b0f0b0":"#c8dfff",fontWeight:700}}>
          {fmtDate(session.date)}{session.time?" at "+session.time:""}{session.tz?" ("+session.tz+")":""}
        </div>
        {session.notes&&<div style={{fontSize:13,color:"#88a8cc",fontStyle:"italic",marginTop:3}}>{session.notes}</div>}
      </div>
      <div style={{marginLeft:"auto",fontFamily:"'Cinzel',serif",fontSize:9,color:isToday?"#5a9c5a":"#4a68aa",
                    letterSpacing:"0.1em",textAlign:"right"}}>
        {isToday?"IN SESSION":"UPCOMING"}
      </div>
    </div>
  );
}

function AbsencesPublic({members,absences}){
  const counts=absences||{};
  const mList=Object.values(members||{}).filter(m=>counts[m.id]>0).sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0));
  const allList=Object.values(members||{}).filter(m=>!counts[m.id]||counts[m.id]===0).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const total=Object.values(counts).reduce((a,n)=>a+(n||0),0);
  if(Object.values(members||{}).length===0) return(
    <div style={{textAlign:"center",padding:"3rem",color:C.textDD,fontStyle:"italic"}}>No member data on record.</div>
  );
  return(
    <div className="fu">
      <STitle>Unexcused Absence Record</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Unexcused absences are recorded by the President of the Bundestag. Members with three or more unexcused absences may be subject to disciplinary review.
      </div>
      {total===0
        ?<div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:"4px solid #3a6a3a",borderRadius:"0 4px 4px 0",padding:"1rem 1.25rem",color:"#7ad47a",fontFamily:"'Cinzel',serif",fontSize:13}}>✓ No unexcused absences recorded.</div>
        :<>
          <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:"1.5rem"}}>
            {mList.map(m=>{
              const n=counts[m.id]||0;
              const col=n>=3?"#cc4040":n>=2?"#cc7a20":"#b0a060";
              const bg=n>=3?"#180808":n>=2?"#180e00":"#141000";
              const borderC=n>=3?"#5a1010":n>=2?"#5a3000":"#3a2800";
              const p=PARTIES.find(x=>x.id===m.party);
              return(
                <div key={m.id} style={{background:bg,border:`1px solid ${borderC}`,borderLeft:`4px solid ${col}`,borderRadius:"0 3px 3px 0",padding:"0.65rem 1rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{flex:1}}>
                    <MemberLink person={m} style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700}}>
                      {m.username||m.name}
                    </MemberLink>
                    {p&&<span style={{fontSize:11,color:p.color,marginLeft:8}}>{p.name}</span>}
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.textDD,marginLeft:8}}>{m.seats} seats</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:col,lineHeight:1}}>{n}</span>
                    <div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:col}}>UNEXCUSED</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:C.textDD}}>ABSENCES</div>
                    </div>
                    {n>=3&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:"#cc4040",border:"1px solid #cc404066",borderRadius:2,padding:"2px 6px"}}>⚠ REVIEW</span>}
                  </div>
                </div>
              );
            })}
          </div>
          {allList.length>0&&<>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,letterSpacing:"0.15em",marginBottom:"0.5rem"}}>MEMBERS WITH NO ABSENCES</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {allList.map(m=>{
                const p=PARTIES.find(x=>x.id===m.party);
                return <div key={m.id} style={{fontSize:12,color:C.textD,padding:"3px 10px",border:`1px solid ${C.border}`,borderRadius:2,background:C.s1}}>
                  <MemberLink person={m} style={{color:p?.color||C.textD}}>{m.username||m.name}</MemberLink>
                </div>;
              })}
            </div>
          </>}
        </>}
    </div>
  );
}

// ── Election Countdown ────────────────────────────────────────────────────────
function ElectionCountdown({nextElection}) {
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t);},[]);
  if(!nextElection?.date) return null;
  const elecTs=new Date(nextElection.date+"T00:00:00").getTime();
  const diff=elecTs-now;
  const isPast=diff<0;
  const days=Math.abs(Math.ceil(diff/(1000*60*60*24)));
  const color=isPast?"#cc4040":days<=14?"#f0a050":days<=30?"#C9A84C":"#7ad47a";
  const bg=isPast?"#1a0808":days<=14?"#1a0e00":days<=30?"#1a1400":"#0a1a0a";
  const borderC=isPast?"#6a1010":days<=14?"#6a3800":days<=30?"#5a4000":"#1a4a2a";
  return (
    <div style={{background:bg,border:`1px solid ${borderC}`,borderLeft:`4px solid ${color}`,
      borderRadius:"0 4px 4px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem",
      display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      <span style={{fontSize:24}}>🗳</span>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:color,textTransform:"uppercase",marginBottom:3}}>
          {isPast?"Election Date Passed":"Next General Election"}
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:"#e0d8c8",fontWeight:700}}>
          {new Date(nextElection.date+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}
          {nextElection.notes&&<span style={{fontSize:12,color:"#8a8070",fontWeight:400,fontStyle:"italic",marginLeft:8}}>{nextElection.notes}</span>}
        </div>
      </div>
      <div style={{textAlign:"center",flexShrink:0}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:32,fontWeight:700,color:color,lineHeight:1}}>{days}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.15em",color:"#6a6050"}}>{isPast?"DAYS AGO":"DAYS"}</div>
      </div>
    </div>
  );
}
