// ── Budget Submit Section ────────────────────────────────────────────────────
function BudgetSubmitSection({activeBudget,budgetCooldown,orgChart,onSubmitBudget,imperialReserve}) {
  const [done,setDone]=useState(false);
  const [mode,setMode]=useState(null); // null | "budget" | "supplementary"
  const now=Date.now();
  const budgetActive=activeBudget&&!activeBudget.voided_at&&now<activeBudget.valid_until;
  const cooldownLeft=budgetCooldown&&!budgetCooldown.voided?Math.max(0,budgetCooldown.until-now):0;
  const canSubmitNew=cooldownLeft===0;
  const inGracePeriod=budgetActive&&canSubmitNew;
  const cooldownDays=Math.ceil(cooldownLeft/(1000*60*60*24));
  const daysRemaining=budgetActive?daysLeft(activeBudget.valid_until):0;

  if(done) return (
    <div style={{textAlign:"center",padding:"2.5rem 1rem"}}>
      <div style={{fontSize:32,marginBottom:"0.75rem"}}>💰</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:C.text,marginBottom:8}}>
        {mode==="supplementary"?"Supplementary Budget Submitted":"Budget Bill Submitted"}
      </div>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        {mode==="supplementary"
          ?"Your supplementary budget is pending approval by the President of the Bundestag."
          :"Your budget bill is pending approval by the President of the Bundestag."}
      </div>
      <Btn variant="ghost" small onClick={()=>{setDone(false);setMode(null);}}>Submit Another</Btn>
    </div>
  );

  if(mode) return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.25rem"}}>
        <button onClick={()=>setMode(null)}
          style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",
                   fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:"0.2em"}}>
          💰 {mode==="supplementary"?"SUPPLEMENTARY BUDGET":"BUDGET BILL"}
        </div>
      </div>
      {mode==="supplementary"&&(
        <div style={{background:"#1a1400",border:`1px solid ${C.gold}33`,borderLeft:"3px solid #c8a870",
                     borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"1.25rem",fontSize:13,color:"#c8a870",lineHeight:1.7}}>
          <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:3}}>⚠ SUPPLEMENTARY BUDGET</strong>
          A supplementary budget amends the current active budget. It does not replace it. Use this for emergency allocations or mid-period adjustments. Goes directly to the Bundestag floor then the Emperor.
        </div>
      )}
      {mode==="budget"&&inGracePeriod&&(
        <div style={{background:"#0a1a2a",border:"1px solid #4a88ff33",borderLeft:"3px solid #4a88ff",
                     borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"1.25rem",fontSize:13,color:"#88bbff",lineHeight:1.7}}>
          <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:3}}>ℹ GRACE PERIOD: NEW BUDGET</strong>
          The current budget is still valid for {daysRemaining} more day{daysRemaining!==1?"s":""} but a new one may now be submitted. If ratified, it will immediately supersede the active budget.
        </div>
      )}
      <BudgetForm orgChart={orgChart} isSupplementary={mode==="supplementary"} imperialReserve={imperialReserve}
        onSubmit={async(data)=>{
          const ok=await onSubmitBudget({...data,budgetType:mode});
          if(ok)setDone(true);
          return ok;
        }}
        onCancel={()=>setMode(null)}/>
    </div>
  );

  return (
    <div>
      <STitle>Budget Legislation</STitle>

      {/* Current budget info card */}
      {budgetActive&&(
        <div style={{background:"#0a1a0a",border:"1px solid #2a5a2a44",borderLeft:"3px solid #3a9c3a",
                     borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",marginBottom:"1.25rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:"#5a9c5a",marginBottom:6}}>✓ ACTIVE BUDGET</div>
          <div style={{fontSize:14,color:C.text,fontWeight:700,marginBottom:4}}>{activeBudget.title}</div>
          <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
            <div style={{fontSize:13,color:C.textD}}>Valid until <strong style={{color:inGracePeriod?"#f0a050":"#7ad47a"}}>{fmtDate(activeBudget.valid_until)}</strong></div>
            <div style={{fontSize:13,color:C.textD}}><strong style={{color:inGracePeriod?"#f0a050":"#7ad47a"}}>{daysRemaining}</strong> day{daysRemaining!==1?"s":""} remaining</div>
            {inGracePeriod&&<div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#f0a050",letterSpacing:"0.1em",marginTop:1}}>🕐 IN GRACE PERIOD</div>}
          </div>
        </div>
      )}

      {/* Cooldown info */}
      {!canSubmitNew&&(
        <div style={{background:"#1a0e0e",border:"1px solid #6a1a1a44",borderLeft:"3px solid #8b1a1a",
                     borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",marginBottom:"1.25rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.redL,marginBottom:4}}>🗓 NEW BUDGET AVAILABLE IN</div>
          <div style={{fontSize:20,fontFamily:"'Cinzel',serif",color:C.text,fontWeight:700,marginBottom:2}}>
            {cooldownDays} day{cooldownDays!==1?"s":""}
          </div>
          <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>
            From {fmtDate(budgetCooldown.until)} (the 1st of the following month)
          </div>
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
        {canSubmitNew&&(
          <div onClick={()=>setMode("budget")}
            style={{flex:1,minWidth:180,background:C.s2,border:`2px solid ${C.gold}44`,borderTop:`3px solid ${C.gold}`,
                     borderRadius:"0 0 3px 3px",padding:"1rem",cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.gold}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.gold+"44"}>
            <div style={{fontSize:22,marginBottom:5}}>💰</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.gold,fontWeight:700,marginBottom:4}}>
              {inGracePeriod?"Submit Next Budget":"Submit Budget Bill"}
            </div>
            <div style={{fontSize:12,color:C.textD,fontStyle:"italic",lineHeight:1.5}}>
              {inGracePeriod?"Supersedes current budget upon ratification.":"Active until end of ratification month + 15 days."}
            </div>
          </div>
        )}
        {budgetActive&&(
          <div onClick={()=>setMode("supplementary")}
            style={{flex:1,minWidth:180,background:C.s2,border:"2px solid #c8a87044",borderTop:"3px solid #c8a870",
                     borderRadius:"0 0 3px 3px",padding:"1rem",cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#c8a870"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#c8a87044"}>
            <div style={{fontSize:22,marginBottom:5}}>📋</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:"#c8a870",fontWeight:700,marginBottom:4}}>Supplementary Budget</div>
            <div style={{fontSize:12,color:C.textD,fontStyle:"italic",lineHeight:1.5}}>Emergency or mid-period amendment to the active budget.</div>
          </div>
        )}
        {!canSubmitNew&&!budgetActive&&(
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",padding:"0.5rem 0"}}>
            No budget actions available until the 1st of next month.
          </div>
        )}
      </div>
    </div>
  );
}

class BudgetErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return {error:e};}
  render(){
    if(this.state.error) return (
      <div style={{background:"#1a0808",border:"1px solid #6a1a1a",borderRadius:3,padding:"1rem",color:"#c08080",fontSize:13}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",marginBottom:6}}>⚠ BUDGET DISPLAY ERROR</div>
        <div style={{fontStyle:"italic"}}>There was a problem loading budget data. This may be due to a data format change. Please contact the Emperor to reset the budget via the Panel.</div>
      </div>
    );
    return this.props.children;
  }
}

// ── Budget Status Banner ──────────────────────────────────────────────────────
function BudgetStatusBanner({activeBudget,cooldown}) {
  if(!activeBudget) {
    const cooldownLeft = cooldown&&!cooldown.voided ? Math.max(0,Math.ceil((cooldown.until-Date.now())/(1000*60*60*24))) : 0;
    return (
      <div style={{background:"#1a0e0e",border:"1px solid #6a1a1a",borderLeft:"4px solid #c02020",
                   borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem",
                   display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22}}>⚠</span>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#c02020",letterSpacing:"0.15em",marginBottom:3}}>NO ACTIVE BUDGET</div>
          <div style={{fontSize:13,color:"#c08080",lineHeight:1.6}}>
            {cooldownLeft>0
              ? `A new budget may be submitted in ${cooldownLeft} day${cooldownLeft!==1?"s":""}.`
              : "No budget is currently in effect. Any member may submit a budget bill."}
          </div>
        </div>
      </div>
    );
  }
  const now=Date.now();
  const expired=now>activeBudget.valid_until;
  const voided=!!activeBudget.voided_at;
  const days=daysLeft(activeBudget.valid_until);
  const pct=Math.min(100,Math.max(0,((now-activeBudget.ratified_at)/(activeBudget.valid_until-activeBudget.ratified_at))*100));
  const urgent=days<=5&&!expired&&!voided;

  if(voided) return (
    <div style={{background:"#1a0808",border:"1px solid #6a1a1a",borderLeft:"4px solid #8b1a1a",
                 borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#c02020",letterSpacing:"0.15em",marginBottom:3}}>⚠ BUDGET VOIDED BY IMPERIAL DECREE</div>
      <div style={{fontSize:13,color:"#c08080"}}>Voided on {fmtDate(activeBudget.voided_at)}. A new budget must be passed immediately.</div>
    </div>
  );
  if(expired) return (
    <div style={{background:"#1a1200",border:"1px solid #6a5000",borderLeft:"4px solid #c09000",
                 borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#c09000",letterSpacing:"0.15em",marginBottom:3}}>⚠ BUDGET EXPIRED</div>
      <div style={{fontSize:13,color:"#b09060"}}>The active budget expired on {fmtDate(activeBudget.valid_until)}. A new budget must be passed.</div>
    </div>
  );
  return (
    <div style={{background:"#0a1a0a",border:`1px solid ${urgent?"#c09000":"#2a5a2a"}`,borderLeft:`4px solid ${urgent?"#c09000":"#3a9c3a"}`,
                 borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:8}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:urgent?"#c09000":"#3a9c3a",letterSpacing:"0.15em",marginBottom:3}}>
            {urgent?"⚠ BUDGET EXPIRING SOON":"✓ ACTIVE BUDGET"}
          </div>
          <div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:2}}>{activeBudget.title}</div>
          <div style={{fontSize:12,color:C.textD}}>Valid until {fmtDate(activeBudget.valid_until)} · <strong style={{color:urgent?"#c09000":"#7ad47a"}}>{days} day{days!==1?"s":""} remaining</strong></div>
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,textAlign:"right"}}>
          <div>Ratified {fmtDate(activeBudget.ratified_at)}</div>
          <div>by {activeBudget.submitter}</div>
        </div>
      </div>
      <div style={{height:6,background:C.s3,borderRadius:3,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:urgent?"linear-gradient(to right,#6a5000,#c09000)":"linear-gradient(to right,#1a5a1a,#3a9c3a)",borderRadius:3,transition:"width 1s"}}/>
      </div>
    </div>
  );
}

// ── Budget Display ────────────────────────────────────────────────────────────
function BudgetDisplay({budget,orgChart,imperialReserve}) {
  budget={...budget,reserve:imperialReserve!=null?imperialReserve:budget.reserve};
  const [expanded,setExpanded]=useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  if(!budget||!budget.data) return null;
  const data=budget.data||{};
  if(!data||typeof data!=="object") return null;
  const totalRev=(data.revenue?.items||[]).reduce((a,r)=>a+(parseFloat(r.amount)||0),0);
  const totalMin=BUDGET_PORTFOLIOS.reduce((a,p)=>{
    const m=data.ministries?.[p];
    const ag=m?.agencies||[];
    const agTotal=ag.reduce((b,ag)=>b+(parseFloat(ag.amount)||0),0);
    return a+(parseFloat(m?.total)||0)+agTotal;
  },0);
  const totalSpec=(data.special||[]).reduce((a,s)=>a+(parseFloat(s.amount)||0),0);
  const totalExp=totalMin+totalSpec+(parseFloat(data.payroll)||0);
  const surplus=totalRev-totalExp;

  const SectionHead=({label,color,open,onToggle,right})=>(
    <div onClick={onToggle} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          cursor:"pointer",padding:"0.6rem 0.85rem",background:C.s1,border:`1px solid ${color}33`,
          borderLeft:`3px solid ${color}`,borderRadius:"0 2px 2px 0",marginBottom:open?0:4}}>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",color,textTransform:"uppercase"}}>{label}</span>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {right&&<span style={{fontFamily:"'Cinzel',serif",fontSize:13,color,fontWeight:700}}>{right}</span>}
        <span style={{fontSize:10,color:C.textDD}}>{open?"▲":"▼"}</span>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
      {/* Summary bar */}
      <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap",marginBottom:"0.5rem"}}>
        {[
          {label:"Total Revenue",value:totalRev,color:"#3a9c3a"},
          {label:"Gov. Payroll",value:parseFloat(data.payroll)||0,color:"#5a88cc"},
          {label:"Total Expenditure",value:totalExp,color:C.redL},
          {label:surplus>=0?"Surplus":"Deficit",value:Math.abs(surplus),color:surplus>=0?"#3a9c3a":"#c09000"},
        ].map(({label,value,color})=>(
          <div key={label} style={{flex:1,minWidth:140,background:C.s1,border:`1px solid ${color}33`,
                borderTop:`3px solid ${color}`,borderRadius:"0 0 3px 3px",padding:"0.75rem 1rem"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:4,textTransform:"uppercase"}}>{label}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:20,color,fontWeight:700}}>{fmtCur(value)}</div>
          </div>
        ))}
      </div>

      {(data.payroll||0)>0&&(
        <div style={{background:C.s2,border:"1px solid #4a6a9a33",borderLeft:"3px solid #5a88cc",borderRadius:"0 3px 3px 0",padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:"#7aaaee",textTransform:"uppercase"}}>👥 Government Payroll</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#7aaaee",fontWeight:700}}>{fmtCur(parseFloat(data.payroll)||0)}</span>
        </div>
      )}
      {budget.reserve!=null&&(
        <div style={{background:surplus>=0?"#0a1a14":"#1a0e08",border:`1px solid ${surplus>=0?"#3a7a5a33":"#8a5a3033"}`,borderLeft:`3px solid ${surplus>=0?"#4a9a7a":"#c08040"}`,borderRadius:"0 3px 3px 0",padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:surplus>=0?"#5aaf8a":"#c08040",textTransform:"uppercase"}}>⚜ Imperial Reserve{surplus<0?" (drawing "+fmtCur(Math.abs(surplus))+" from reserve)":""}</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:surplus>=0?"#5aaf8a":"#c08040",fontWeight:700}}>{fmtCur(budget.reserve)}</span>
        </div>
      )}

      {/* Revenue */}
      <SectionHead label="Revenue" color="#3a9c3a" open={expanded.rev} onToggle={()=>toggle("rev")} right={fmtCur(totalRev)}/>
      {expanded.rev&&(
        <div style={{background:C.s2,border:"1px solid #2a5a2a33",borderRadius:"0 0 3px 3px",padding:"0.6rem 0.85rem",marginBottom:4}}>
          {(data.revenue?.items||[]).map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
              <span style={{fontSize:13,color:C.text}}>{r.label||"Revenue"}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#7ad47a",fontWeight:700}}>{fmtCur(parseFloat(r.amount)||0)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Ministries */}
      <SectionHead label="Ministry Allocations" color={C.gold} open={expanded.min} onToggle={()=>toggle("min")} right={fmtCur(totalMin)}/>
      {expanded.min&&(
        <div style={{background:C.s2,border:`1px solid ${C.gold}22`,borderRadius:"0 0 3px 3px",marginBottom:4,overflow:"hidden"}}>
          {BUDGET_PORTFOLIOS.map(p=>{
            const m=data.ministries?.[p];
            const alloc=parseFloat(m?.total)||0;
            const ags=m?.agencies||[];
            const agTotal=ags.reduce((a,ag)=>a+(parseFloat(ag.amount)||0),0);
            const total=alloc+agTotal;
            if(total===0&&ags.length===0) return null;
            return (
              <div key={p} style={{borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px"}}>
                  <span style={{fontSize:13,color:C.text}}>{p}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.gold,fontWeight:700}}>{fmtCur(total)}</span>
                </div>
                {ags.map((ag,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 12px 3px 28px",background:C.s1}}>
                    <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>↳ {ag.name}</span>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.textD}}>{fmtCur(parseFloat(ag.amount)||0)}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* Special */}
      {(data.special||[]).length>0&&<>
        <SectionHead label="Special Allocations" color="#8a6a9a" open={expanded.spec} onToggle={()=>toggle("spec")} right={fmtCur(totalSpec)}/>
        {expanded.spec&&(
          <div style={{background:C.s2,border:"1px solid #6a4a7a33",borderRadius:"0 0 3px 3px",padding:"0.6rem 0.85rem",marginBottom:4}}>
            {data.special.map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.text}}>{s.label}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#c0a0d0",fontWeight:700}}>{fmtCur(parseFloat(s.amount)||0)}</span>
              </div>
            ))}
          </div>
        )}
      </>}

      {/* Notes */}
      {data.notes&&(
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.75rem 1rem",marginTop:4}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:5}}>BUDGET NOTES</div>
          <div style={{fontSize:13,color:C.textD,lineHeight:1.7,fontStyle:"italic"}}>{data.notes}</div>
        </div>
      )}
    </div>
  );
}

// ── Budget Form ───────────────────────────────────────────────────────────────
function BudgetRow({label,color,value}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
      <span style={{fontSize:13,color:C.textD}}>{label}</span>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color,fontWeight:700}}>{fmtCur(value)}</span>
    </div>
  );
}

function NumInp({value,onChange,placeholder}) {
  return (
    <input type="number" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"0"}
      style={{width:"110px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
               padding:"4px 8px",color:C.text,fontSize:13,outline:"none",textAlign:"right"}}
      onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}/>
  );
}

function BudgetForm({orgChart,onSubmit,onCancel,isSupplementary,imperialReserve}) {
  const [title,setTitle]=useState("");
  const [submitter,setSubmitter]=useState("");
  const [notes,setNotes]=useState("");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  // Payroll
  const [payroll,setPayroll]=useState("");

  // Revenue items
  const [revItems,setRevItems]=useState([{id:"r1",label:"Tax Revenue",amount:""}]);
  const addRev=()=>setRevItems(p=>[...p,{id:"r_"+Date.now(),label:"",amount:""}]);
  const setRev=(id,field,val)=>setRevItems(p=>p.map(r=>r.id===id?{...r,[field]:val}:r));
  const removeRev=id=>setRevItems(p=>p.filter(r=>r.id!==id));

  // Ministry allocations
  const [ministries,setMinistries]=useState(()=>{
    const m={};
    BUDGET_PORTFOLIOS.forEach(p=>{m[p]={total:"",agencies:[]};});
    return m;
  });
  const setMinTotal=(p,v)=>setMinistries(m=>({...m,[p]:{...m[p],total:v}}));
  const addAgency=(p,name)=>setMinistries(m=>({...m,[p]:{...m[p],agencies:[...m[p].agencies,{id:"ag_"+Date.now(),name,amount:""}]}}));
  const setAgAmount=(p,id,v)=>setMinistries(m=>({...m,[p]:{...m[p],agencies:m[p].agencies.map(a=>a.id===id?{...a,amount:v}:a)}}));
  const removeAg=(p,id)=>setMinistries(m=>({...m,[p]:{...m[p],agencies:m[p].agencies.filter(a=>a.id!==id)}}));

  // Special allocations
  const [special,setSpecial]=useState([]);
  const addSpec=()=>setSpecial(p=>[...p,{id:"s_"+Date.now(),label:"",amount:""}]);
  const setSpec=(id,field,val)=>setSpecial(p=>p.map(s=>s.id===id?{...s,[field]:val}:s));
  const removeSpec=id=>setSpecial(p=>p.filter(s=>s.id!==id));

  const totalRev=revItems.reduce((a,r)=>a+(parseFloat(r.amount)||0),0);
  const totalMin=BUDGET_PORTFOLIOS.reduce((a,p)=>{
    const m=ministries[p];
    return a+(parseFloat(m.total)||0)+m.agencies.reduce((b,ag)=>b+(parseFloat(ag.amount)||0),0);
  },0);
  const totalSpec=special.reduce((a,s)=>a+(parseFloat(s.amount)||0),0);
  const payrollAmt=parseFloat(payroll)||0;
  const minPayroll=totalRev*0.25;
  const payrollOk=payrollAmt>=minPayroll||totalRev===0;
  const totalExp=totalMin+totalSpec+payrollAmt;
  const surplus=totalRev-totalExp;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
      <div style={{display:"flex",gap:"0.85rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:220}}><FL>BUDGET TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="e.g. Imperial Budget — March 2026"/></div>
        <div style={{flex:1,minWidth:160}}><FL>SUBMITTED BY *</FL><Inp value={submitter} onChange={setSubmitter} placeholder="Your in-game name"/></div>
      </div>

      {/* Revenue */}
      <div style={{background:C.s1,border:"1px solid #2a5a2a44",borderRadius:3,padding:"0.85rem 1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#5a9c5a",marginBottom:"0.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>REVENUE</span><span style={{color:"#7ad47a"}}>{fmtCur(totalRev)}</span>
        </div>
        <div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginBottom:"0.75rem"}}>Please copy the current liquid number from /Treasury Lech in-game.</div>
        {revItems.map(r=>(
          <div key={r.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
            <Inp value={r.label} onChange={v=>setRev(r.id,"label",v)} placeholder="Revenue source" style={{flex:1}}/>
            <NumInp value={r.amount} onChange={v=>setRev(r.id,"amount",v)}/>
            <button onClick={()=>removeRev(r.id)} style={{background:"transparent",border:"none",color:C.textDD,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>✕</button>
          </div>
        ))}
        <Btn variant="ghost" small onClick={addRev}>+ Add Revenue Line</Btn>
      </div>

      {/* Ministries */}
      <div style={{background:C.s1,border:`1px solid ${C.gold}22`,borderRadius:3,padding:"0.85rem 1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.gold,marginBottom:"0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>MINISTRY ALLOCATIONS</span><span>{fmtCur(totalMin)}</span>
        </div>
        {BUDGET_PORTFOLIOS.map(p=>{
          const m=ministries[p];
          const orgAgencies=((orgChart?.agencies||{})[p]||[]);
          return (
            <div key={p} style={{marginBottom:"0.75rem",border:`1px solid ${C.border}`,borderRadius:2,overflow:"hidden"}}>
              <div style={{display:"flex",gap:6,alignItems:"center",padding:"6px 10px",background:C.s2}}>
                <span style={{flex:1,fontSize:13,color:C.text,fontWeight:600}}>{p}</span>
                <NumInp value={m.total} onChange={v=>setMinTotal(p,v)}/>
              </div>
              {m.agencies.map(ag=>(
                <div key={ag.id} style={{display:"flex",gap:6,alignItems:"center",padding:"4px 10px 4px 24px",background:C.s1}}>
                  <span style={{fontSize:12,color:C.textD,flex:1,fontStyle:"italic"}}>↳ {ag.name}</span>
                  <NumInp value={ag.amount} onChange={v=>setAgAmount(p,ag.id,v)}/>
                  <button onClick={()=>removeAg(p,ag.id)} style={{background:"transparent",border:"none",color:C.textDD,cursor:"pointer",fontSize:14,lineHeight:1}}>✕</button>
                </div>
              ))}
              {orgAgencies.length>0&&(
                <div style={{padding:"4px 10px",background:C.s1}}>
                  <select onChange={e=>{if(e.target.value){addAgency(p,e.target.value);e.target.value="";}}}
                    style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 8px",color:C.textD,fontSize:12,fontFamily:"'Crimson Text',serif"}}>
                    <option value="">+ Add agency allocation…</option>
                    {orgAgencies.filter(a=>!m.agencies.find(x=>x.name===a.name)).map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                  </select>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Special */}
      <div style={{background:C.s1,border:"1px solid #6a4a7a33",borderRadius:3,padding:"0.85rem 1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#9a7aaa",marginBottom:"0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>SPECIAL ALLOCATIONS</span><span>{fmtCur(totalSpec)}</span>
        </div>
        {special.map(s=>(
          <div key={s.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
            <Inp value={s.label} onChange={v=>setSpec(s.id,"label",v)} placeholder="Allocation label" style={{flex:1}}/>
            <NumInp value={s.amount} onChange={v=>setSpec(s.id,"amount",v)}/>
            <button onClick={()=>removeSpec(s.id)} style={{background:"transparent",border:"none",color:C.textDD,cursor:"pointer",fontSize:16,lineHeight:1}}>✕</button>
          </div>
        ))}
        <Btn variant="ghost" small onClick={addSpec}>+ Add Special Allocation</Btn>
      </div>

      {!isSupplementary&&(
      <div style={{background:"#0e1620",border:"1px solid #4a6a9a44",borderLeft:`3px solid ${payrollOk?"#5a88cc":"#c05050"}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#7aaaee",marginBottom:"0.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>👥 GOVERNMENT PAYROLL</span>
          <span style={{color:payrollOk?"#7aaaee":"#c05050"}}>{fmtCur(payrollAmt)}</span>
        </div>
        <div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginBottom:"0.75rem",lineHeight:1.6}}>
          Compensation for all government employees. Must be at least <strong style={{color:"#7aaaee"}}>25% of total revenue</strong>
          {totalRev>0&&<span style={{color:payrollOk?"#7ad47a":"#c05050"}}>{" \u2014 minimum "}{fmtCur(minPayroll)}</span>}.
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <NumInp value={payroll} onChange={setPayroll} placeholder="0"/>
          {totalRev>0&&!payrollOk&&(<span style={{fontSize:12,color:"#c05050",fontStyle:"italic"}}>⚠ Below 25% minimum ({fmtCur(minPayroll)})</span>)}
          {totalRev>0&&payrollOk&&payrollAmt>0&&(<span style={{fontSize:12,color:"#7ad47a",fontStyle:"italic"}}>✓ {Math.round(payrollAmt/totalRev*100)}% of revenue</span>)}
        </div>
      </div>)}

      {/* Summary */}
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.textDD,marginBottom:"0.6rem"}}>SUMMARY</div>
        <BudgetRow label="Total Revenue" color="#7ad47a" value={totalRev}/>
        {!isSupplementary&&<BudgetRow label="  Gov. Payroll" color="#7aaaee" value={payrollAmt}/>}
        <BudgetRow label="  Ministry Allocations" color={C.gold} value={totalMin}/>
        <BudgetRow label="  Special Allocations" color="#9a7aaa" value={totalSpec}/>
        <BudgetRow label="Total Expenditure" color={C.redL} value={totalExp}/>
        <div style={{height:1,background:C.border,margin:"6px 0"}}/>
        <BudgetRow label={surplus>=0?"Surplus":"Deficit"} color={surplus>=0?"#7ad47a":"#c09000"} value={Math.abs(surplus)}/>
      </div>

      {imperialReserve>0&&(
        <div style={{background:"#0a1a14",border:"1px solid #3a7a5a33",borderLeft:"3px solid #4a9a7a",borderRadius:"0 3px 3px 0",padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:"#5aaf8a",textTransform:"uppercase"}}>⚜ Imperial Reserve</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:"#5aaf8a",fontWeight:700}}>{fmtCur(imperialReserve)}</span>
        </div>
      )}
      {imperialReserve>0&&surplus<0&&(
        <div style={{background:"#1a0e08",border:"1px solid #8a5a3033",borderLeft:"3px solid #c08040",borderRadius:"0 3px 3px 0",padding:"6px 12px",fontSize:12,color:"#c08040",fontStyle:"italic"}}>
          ⚠ Deficit budget — {fmtCur(Math.abs(surplus))} will be drawn from the Imperial Reserve.
        </div>
      )}
      <div><FL>BUDGET NOTES (optional)</FL><TA value={notes} onChange={setNotes} placeholder="Fiscal policy notes, assumptions, priorities…" rows={3}/></div>

      {err&&<div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,padding:"0.6rem 1rem",borderRadius:"0 3px 3px 0",fontSize:13,color:C.redL}}>{err}</div>}

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={async()=>{
          if(!title.trim()||!submitter.trim()){setErr("Title and submitter name are required.");return;}
          if(!isSupplementary&&!payrollAmt){setErr("Government payroll amount is required.");return;}
          if(!isSupplementary&&totalRev>0&&!payrollOk){setErr("Government payroll must be at least 25% of total revenue ("+fmtCur(minPayroll)+").");return;}
          setSaving(true);setErr("");
          const ok=await onSubmit({
            title:title.trim(),submitter:submitter.trim(),
            data:{revenue:{items:revItems},payroll:isSupplementary?0:payrollAmt,ministries,special,notes:notes.trim()},
          });
          setSaving(false);
          if(!ok) setErr("Submission failed — check your connection.");
        }} disabled={saving||!title.trim()||!submitter.trim()}>
          {saving?"Submitting…":"⚜ Submit Budget Bill"}
        </Btn>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

// ── Budget Tab ────────────────────────────────────────────────────────────────
function BudgetTab({activeBudget,budgetCooldown,bills,members,bundesherren,orgChart,onSubmit,hideSubmit,imperialReserve}) {
  const [showForm,setShowForm]=useState(false);
  const [showHistory,setShowHistory]=useState(false);

  const now=Date.now();
  const budgetActive=activeBudget&&!activeBudget.voided_at&&now<activeBudget.valid_until;
  const cooldownLeft=budgetCooldown&&!budgetCooldown.voided?Math.max(0,budgetCooldown.until-now):0;
  const canSubmit=cooldownLeft===0;
  const inGracePeriod=budgetActive&&canSubmit;

  const inProgress=Object.values(bills||{}).filter(b=>b.type==="budget"&&["pending","docket","bt_voting","ratification","returned"].includes(b.status));
  const archived=Object.values(bills||{}).filter(b=>b.type==="budget"&&["passed","failed_bt","vetoed","pulled"].includes(b.status))
    .sort((a,b)=>(b.ratified_at||b.created)-(a.ratified_at||a.created));

  return (
    <div className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <STitle style={{marginBottom:0}}>Imperial Budget</STitle>
        {canSubmit&&!showForm&&!hideSubmit&&(
          <Btn variant="gold" small onClick={()=>setShowForm(true)}>💰 Submit Budget Bill</Btn>
        )}
      </div>

      {showForm?(
        <div style={{marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:"0.2em",marginBottom:"1rem"}}>NEW BUDGET SUBMISSION</div>
          <BudgetForm orgChart={orgChart} onSubmit={async(data)=>{const ok=await onSubmit(data);if(ok)setShowForm(false);return ok;}} onCancel={()=>setShowForm(false)}/>
        </div>
      ):(
        <>
          <BudgetStatusBanner activeBudget={activeBudget} cooldown={budgetCooldown}/>

          {!canSubmit&&!budgetActive&&cooldownLeft>0&&(
            <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>
              A new budget may be submitted in {Math.ceil(cooldownLeft/(1000*60*60*24))} day{Math.ceil(cooldownLeft/(1000*60*60*24))!==1?"s":""}.
            </div>
          )}

          {inProgress.length>0&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#4a88ff",marginBottom:"0.75rem"}}>BUDGET IN PROGRESS</div>
              {inProgress.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren}/>)}
            </div>
          )}

          {budgetActive&&activeBudget&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.gold,marginBottom:"0.75rem"}}>CURRENT BUDGET — {activeBudget.title}</div>
              <BudgetDisplay budget={activeBudget} orgChart={orgChart} imperialReserve={imperialReserve}/>
            </div>
          )}

          {archived.length>0&&(
            <div>
              <div onClick={()=>setShowHistory(h=>!h)}
                style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.textDD,marginBottom:"0.75rem",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                BUDGET HISTORY ({archived.length}) {showHistory?"▲":"▼"}
              </div>
              {showHistory&&archived.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren}/>)}
            </div>
          )}
        </>
      )}
    </div>
  );
}


// ── Imperial Links Tab ──────────────────────────────────────────────────────
function ImperialLinksTab({imperialLinks}) {
  const links=imperialLinks||[];
  return (
    <div className="fu" style={{maxWidth:600,margin:"0 auto"}}>
      <STitle>Imperial Link Directory</STitle>
      {links.length===0?(
        <div style={{textAlign:"center",padding:"3rem",color:C.textD,fontStyle:"italic",fontSize:14}}>
          No imperial links have been configured yet.
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
          {links.map((l,i)=>(
            <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
              style={{display:"flex",alignItems:"center",gap:14,background:C.s2,
                       border:`1px solid ${C.gold}33`,borderLeft:`4px solid ${C.gold}`,
                       borderRadius:"0 4px 4px 0",padding:"1rem 1.25rem",textDecoration:"none",
                       transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background=C.s1;e.currentTarget.style.borderColor=C.gold;}}
              onMouseLeave={e=>{e.currentTarget.style.background=C.s2;e.currentTarget.style.borderColor=C.gold+"33";}}>
              <span style={{fontSize:22,flexShrink:0}}>🔗</span>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.gold,fontWeight:700,marginBottom:3}}>{l.label}</div>
                <div style={{fontSize:12,color:C.textDD,fontStyle:"italic"}}>{l.url}</div>
              </div>
              <span style={{marginLeft:"auto",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,letterSpacing:"0.1em",flexShrink:0}}>OPEN →</span>
            </a>
          ))}
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("home");
  const [members,setMembers]=useState({});
  const [bundesherren,setBH]=useState({});
  const [officials,setOff]=useState({});
  const [bills,setBills]=useState({});
  const [orgChart,setOrgChart]=useState({});
  const [session,setSession]=useState(null);
  const [announcement,setAnnouncement]=useState(null);
  const [activeBudget,setActiveBudget]=useState(null);
  const [budgetCooldown,setBudgetCooldown]=useState(null);
  const [submitLock,setSubmitLock]=useState(null);
  const [imperialReserve,setImperialReserve]=useState(0);
  const [imperialLinks,setImperialLinks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [ijStatutes,setIjStatutes]=useState({});
  const [ijCases,setIjCases]=useState({});
  const [toast,setToast]=useState({msg:"",color:C.green});
  const [processing,setProcessing]=useState(null);


  const notify=useCallback((msg,color=C.green)=>{
    setToast({msg,color});
    setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  useEffect(()=>{
    (async()=>{
      // Single fetch — pull everything at once instead of 11 round-trips
      const raw = await sgetAll("");
      const g = (k) => { try { return raw[k] ? raw[k] : null; } catch{ return null; } };
      const m=g("bk_members"), bh=g("bk_bh"), off=g("bk_officials"),
            oc=g("bk_orgchart"), sess=g("bk_session"), ann=g("bk_announcement"),
            ab=g("bk_active_budget"), bc=g("bk_budget_cooldown"), sl=g("bk_submit_lock"),
            ir=g("bk_imperial_reserve"), il=g("bk_imperial_links");
      const billsRaw={}, logoRaw={};
      Object.entries(raw||{}).forEach(([k,v])=>{
        if(k.startsWith("bk_bill_")) billsRaw[k]=v;
        else if(k.startsWith("bk_logo_")) logoRaw[k]=v;
      });
      setMembers(m||{}); setBH(bh||{}); setOff(off||{});
      // Re-hydrate logos from separate keys back into orgChart
      const ocBase=oc||{};
      const logos={};
      const agLogos={};
      Object.entries(logoRaw||{}).forEach(([k,v])=>{
        if(k.startsWith("bk_logo_ag_")) agLogos[k.replace("bk_logo_ag_","")]=v;
        else logos[k.replace("bk_logo_","")]=v;
      });
      const hydratedAgencies={};
      Object.entries(ocBase.agencies||{}).forEach(([org,list])=>{
        hydratedAgencies[org]=(list||[]).map(a=>({...a,logo:agLogos[a.id]||null}));
      });
      setOrgChart({...ocBase,logos,agencies:hydratedAgencies});
      setSession(sess||null);
      setAnnouncement(ann||null);
      setActiveBudget(ab||null);
      setBudgetCooldown(bc||null);
      setSubmitLock(sl||null);
      setImperialReserve(ir||0);
      setImperialLinks(il||[]);
      const bmap={};
      Object.values(billsRaw||{}).forEach(b=>{ if(b?.id) bmap[b.id]=b; });
      setBills(bmap); 
      // Also fetch IJ statutes and cases for cross-referencing
      try {
        const ijRaw = await fetch(IJ_SCRIPT_URL+"?action=getall").then(r=>r.json());
        if(ijRaw.success){
          const parse=(k)=>{try{return ijRaw.data[k]?JSON.parse(ijRaw.data[k]):{};}catch{return{};}};
          setIjStatutes(parse("ij_statutes"));
          setIjCases(parse("ij_cases"));
        }
      } catch(e){}
      setLoading(false);
    })();
  },[]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="saveOfficials"){
      setOff(payload); await sset("bk_officials",payload);
    }
    else if(type==="importMembers"){
      const next={};
      payload.members.forEach((m,i)=>{ const id="m_"+Date.now()+"_"+i; next[id]={id,...m,party:m.partyId}; });
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="byElection"){
      const {departingId,newName,newParty}=payload;
      const old=members[departingId]; if(!old) return;
      const next={...members};
      const nid="m_"+uid();
      next[nid]={id:nid,name:newName,party:newParty,seats:old.seats};
      delete next[departingId];
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="addBH"){
      const id="bh_"+uid();
      const next={...bundesherren,[id]:{id,name:payload.name,title:payload.title,rank:payload.rank||""}};
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="removeBH"){
      const next={...bundesherren}; delete next[payload.id];
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="updateBHRank"){
      const next={...bundesherren,[payload.id]:{...bundesherren[payload.id],rank:payload.rank}};
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="submitBudget"){
      const id="bill_"+uid();
      const billType=payload.budgetType==="supplementary"?"budget_supplementary":"budget";
      const bill={id,title:payload.title,type:billType,gdoc_url:"",origin:"bt",
        submitter:payload.submitter,nominee:"",portfolio:"",category:"",
        budgetData:payload.data,
        budgetReserve:imperialReserve??null,
        status:"pending",created:Date.now(),bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,ratified_at:null,failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="voidBudget"){
      if(!activeBudget) return;
      const next={...activeBudget,voided_at:Date.now()};
      setActiveBudget(next); await sset("bk_active_budget",next);
      // Clear cooldown so new budget can be submitted immediately
      setBudgetCooldown(null); await sdel("bk_budget_cooldown");
      notify("⚠ Budget voided by Imperial Decree. A new budget may be submitted immediately.",C.gold);
    }
    else if(type==="submitBill"){
      const origin=payload.origin||"bt";
      // 25 bill cap — count bills pending at each president's queue
      const pendingBT=Object.values(bills||{}).filter(b=>b.status==="pending").length;
      const pendingBH=Object.values(bills||{}).filter(b=>b.status==="pending_bh").length;
      if(origin==="bh"&&pendingBH>=25) return "cap";
      if(origin==="bt"&&pendingBT>=25) return "cap";
      const id="bill_"+uid();
      const isBHNom=payload.type==="appoint_bh_pres";
      const isBTNom=["appoint_bt_pres","appoint_chancellor","nominate_minister"].includes(payload.type);
      let status;
      if(origin==="bh") status="pending_bh";
      else if(isBTNom) status="pending_emperor";
      else status="pending";
      const bill={id,title:payload.title,type:payload.type,gdoc_url:payload.gdoc_url||"",origin,
        submitter:payload.submitter,nominee:payload.nominee||"",portfolio:payload.portfolio||"",category:payload.category||"",
        motion_text:payload.motion_text||"",motion_scope:payload.motion_scope||"",
        status,created:Date.now(),bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,ratified_at:null,failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="approveBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"docket"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="approveBHBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"bh_voting"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="emperorApproveBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"docket"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="saveVotes"){
      const {billId,votes,chamber}=payload;
      const bill=bills[billId]; if(!bill) return;
      const next={...bill,[chamber+"_votes"]:votes};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="closeBTVote"){
      const {billId,result}=payload;
      const bill=bills[billId]; if(!bill) return;
      const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
      // BH-originated bills already had their BH vote — go straight to ratification
      const isMotionBill=bill.type==="motion";
      const dualMotion=isMotionBill&&bill.motion_scope==="dual";
      let nextStatus;
      if(isMotionBill){
        nextStatus=result.passed?(dualMotion&&bill.origin!=="bh"?"bh_voting":"motion_passed"):"motion_failed";
      } else {
        nextStatus=result.passed
          ?(bill.origin==="bh"?"ratification":(bt.skipBH?"ratification":"bh_voting"))
          :"failed_bt";
      }
      const next={...bill,bt_result:{...result,closed_at:Date.now()},status:nextStatus,
        ratified_at:nextStatus==="motion_passed"?Date.now():null,
        failed_at:nextStatus==="motion_failed"?Date.now():null};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="closeBHVote"){
      const {billId,result}=payload;
      const bill=bills[billId]; if(!bill) return;
      const btDef=BILL_TYPES[bill.type]||BILL_TYPES.regular;
      // BH-originated: pass → BT (unless appoint_bh_pres which skips BT → ratification)
      // BT-originated: pass → ratification (BH is the second chamber)
      const isMotionBill2=bill.type==="motion";
      const dualMotion2=isMotionBill2&&bill.motion_scope==="dual";
      let nextStatus;
      if(isMotionBill2){
        nextStatus=result.passed?(dualMotion2&&bill.origin==="bh"?"pending":"motion_passed"):"motion_failed";
      } else {
        nextStatus=result.passed
          ?(bill.origin==="bh"?(btDef.bhOrigin?"ratification":"pending"):"ratification")
          :"failed_bh";
      }
      const next={...bill,bh_result:{...result,closed_at:Date.now()},status:nextStatus,
        ratified_at:nextStatus==="motion_passed"?Date.now():null,
        failed_at:nextStatus==="motion_failed"?Date.now():null};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="updateBillDoc"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,gdoc_url:payload.gdoc_url};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Document link updated.",C.gold);
    }
    else if(type==="requeueBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const returnStatus=bill.return_to==="bh"?"pending_bh":"pending";
      const next={...bill,status:returnStatus};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="pullBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"pulled",pulled_at:Date.now(),pull_reason:payload.reason||"",pulled_by:"emperor"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill pulled from floor.",C.gold);
    }
    else if(type==="migrateGrandfatheredStatus"){
      // Fix old records that used grandfathered/grandfathered_repealed as status
      const toFix=Object.values(bills||{}).filter(b=>b.status==="grandfathered"||b.status==="grandfathered_repealed");
      if(toFix.length===0) return 0;
      const next={...bills};
      toFix.forEach(b=>{
        const newStatus=b.status==="grandfathered_repealed"?"repealed":"passed";
        next[b.id]={...b,status:newStatus,grandfathered:true};
      });
      setBills(next);
      for(let i=0;i<toFix.length;i+=5){
        const batch=toFix.slice(i,i+5);
        await Promise.all(batch.map(b=>sset("bk_bill_"+b.id,next[b.id])));
      }
      return toFix.length;
    }
    else if(type==="correctDatabase"){
      const gfBills=Object.values(bills||{}).filter(b=>b.grandfathered&&b.status);
      if(gfBills.length===0) return 0;
      const updates=gfBills.filter(b=>GF_LINKS[b.title]&&b.gdoc_url!==GF_LINKS[b.title]);
      if(updates.length===0) return 0;
      const next={...bills};
      updates.forEach(b=>{ next[b.id]={...b,gdoc_url:GF_LINKS[b.title]}; });
      setBills(next);
      for(let i=0;i<updates.length;i+=5){
        const batch=updates.slice(i,i+5);
        await Promise.all(batch.map(b=>sset("bk_bill_"+b.id,next[b.id])));
      }
      return updates.length;
    }
    else if(type==="reimportMissingGrandfathered"){
      const existingTitles=new Set(Object.values(bills||{}).filter(b=>b.grandfathered).map(b=>b.title));
      const missing=GRANDFATHERED_BILLS.filter(b=>!existingTitles.has(b.title));
      if(missing.length===0) return "none_missing";
      const now=Date.now();
      const newBills={...bills};
      const billList=[];
      missing.forEach((b,i)=>{
        const id="bill_gf_re_"+i+"_"+uid();
        const bill={id,title:b.title,type:b.type,category:b.category,gdoc_url:"",origin:"bt",
          submitter:"Pre-System Record",nominee:"",portfolio:"",
          status:b.status,created:now-(missing.length-i)*1000,
          grandfathered:true,bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
          ratified_at:now-(missing.length-i)*1000,failed_at:null};
        newBills[id]=bill;
        billList.push({id,bill});
      });
      setBills(newBills);
      for(let i=0;i<billList.length;i+=5){
        const batch=billList.slice(i,i+5);
        await Promise.all(batch.map(({id,bill})=>sset("bk_bill_"+id,bill)));
      }
      return missing.length;
    }
    else if(type==="importGrandfathered"){
      const existing=Object.values(bills||{}).filter(b=>b.status==="grandfathered"||b.status==="grandfathered_repealed");
      if(existing.length>0) return "already_imported";
      const now=Date.now();
      const newBills={...bills};
      const billList=[];
      GRANDFATHERED_BILLS.forEach((b,i)=>{
        const id="bill_gf_"+i+"_"+uid();
        const bill={id,title:b.title,type:b.type,category:b.category,gdoc_url:"",origin:"bt",
          submitter:"Pre-System Record",nominee:"",portfolio:"",
          status:b.status,created:now-(GRANDFATHERED_BILLS.length-i)*1000,
          grandfathered:true,bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
          ratified_at:now-(GRANDFATHERED_BILLS.length-i)*1000,failed_at:null};
        newBills[id]=bill;
        billList.push({id,bill});
      });
      setBills(newBills);
      // Write sequentially in batches of 5 to avoid Apps Script throttling
      for(let i=0;i<billList.length;i+=5){
        const batch=billList.slice(i,i+5);
        await Promise.all(batch.map(({id,bill})=>sset("bk_bill_"+id,bill)));
      }
      return "ok";
    }
    else if(type==="denyBill"){
      const next={...bills}; delete next[payload.billId];
      setBills(next);
      await sdel("bk_bill_"+payload.billId);
    }
    else if(type==="pullBillByPresident"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"pulled",pulled_at:Date.now(),pull_reason:payload.reason||"",pulled_by:payload.pulled_by||"bt_president"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="vetoBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"vetoed",vetoed_at:Date.now(),veto_reason:payload.reason||""};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill vetoed.",C.redL);
    }
    else if(type==="returnBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const returnTo=bill.origin==="bh"?"bh":"bt";
      const next={...bill,status:"returned",returned_at:Date.now(),return_notes:payload.notes||"",
        bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,return_count:(bill.return_count||0)+1,
        return_to:returnTo};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill returned to "+(returnTo==="bh"?"Bundesherren":"Bundestag")+" for revisions.",C.gold);
    }
    else if(type==="ratifyBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"passed",ratified_at:Date.now()};
      beginTx();
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      // Budget activation
      if(bill.type==="budget"||bill.type==="budget_supplementary"){
        const ratifiedAt=Date.now();
        const validUntil=budgetValidUntil(ratifiedAt);
        const ab={id:bill.id,title:bill.title,submitter:bill.submitter,
          ratified_at:ratifiedAt,valid_until:validUntil,type:bill.type,
          data:bill.budgetData||{},reserve:imperialReserve};
        setActiveBudget(ab); await sset("bk_active_budget",ab);
        const cd={until:budgetCooldownUntil(ratifiedAt),voided:false};
        setBudgetCooldown(cd); await sset("bk_budget_cooldown",cd);
        notify("💰 Budget ratified — active until "+fmtDate(validUntil)+".",C.gold);
      }
      // Auto-update officials for appointment bills
      if(bill.type==="appoint_bt_pres"&&bill.nominee){
        const newOff={...(officials||{}),president_bt:bill.nominee};
        setOff(newOff); await sset("bk_officials",newOff);
        // Wipe BT president passphrase
        await sdel("bk_bt_hash");
        notify("🏛 "+bill.nominee+" is now President of the Bundestag. BT panel locked until Emperor sets new passphrase.",C.gold);
      }
      if(bill.type==="appoint_chancellor"&&bill.nominee){
        const newOff={...(officials||{}),chancellor:bill.nominee};
        setOff(newOff); await sset("bk_officials",newOff);
      }
      if(bill.type==="nominate_minister"&&bill.nominee&&bill.portfolio){
        const newOff={...(officials||{}),ministers:{...(officials?.ministers||{}),[bill.portfolio]:bill.nominee}};
        setOff(newOff); await sset("bk_officials",newOff);
        notify("🎖 "+bill.nominee+" appointed as "+bill.portfolio+".",C.gold);
      }
      if(bill.type==="appoint_bh_pres"&&bill.nominee){
        const newOff={...(officials||{}),president_bh:bill.nominee};
        setOff(newOff); await sset("bk_officials",newOff);
        await sdel("bk_bh_hash");
        notify("🏰 "+bill.nominee+" is now President of the Bundesherren. BH panel locked until Emperor sets new passphrase.",C.gold);
      }
      // Dissolve Government
      if(bill.type==="dissolve_government"){
        const newOff={...(officials||{}),chancellor:"Vacant",ministers:{}};
        Object.keys(newOff).forEach(k=>{ if(k.startsWith("vice")) delete newOff[k]; });
        newOff.vice_chancellor="Vacant";
        setOff(newOff); await sset("bk_officials",newOff);
        setMembers({}); await sset("bk_members",{});
        notify("🏚 Government dissolved — all members and ministers dismissed. Start an election.",C.redL);
      }
      commitTx();
    }
    else if(type==="appointMinister"){
      const {portfolio,name}=payload;
      const newOff={...(officials||{}),ministers:{...(officials?.ministers||{}),[portfolio]:name}};
      setOff(newOff); await sset("bk_officials",newOff);
    }
    else if(type==="dismissMinister"){
      const {portfolio}=payload;
      const newOff={...(officials||{}),ministers:{...(officials?.ministers||{}),[portfolio]:"Vacant"}};
      setOff(newOff); await sset("bk_officials",newOff);
      notify("🎖 "+portfolio+" rendered vacant.",C.gold);
    }
    else if(type==="repealBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"repealed",repealed_at:Date.now()};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="deleteBill"){
      const next={...bills}; delete next[payload.billId];
      setBills(next);
      await sdel("bk_bill_"+payload.billId);
    }
    else if(type==="saveDecree"){
      const id="bill_dec_"+uid();
      const bill={id,title:payload.title,type:"decree",gdoc_url:payload.gdoc_url||"",
        decree_text:payload.decree_text||"",decree_subtype:payload.decree_subtype||"decree",
        origin:"emperor",submitter:"Emperor",nominee:"",portfolio:"",category:"",
        status:"decree",created:Date.now(),grandfathered:false,
        bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
        ratified_at:Date.now(),failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="saveImperialReserve"){
      setImperialReserve(payload.amount||0);
      await sset("bk_imperial_reserve",payload.amount||0);
      notify("⚜ Imperial Reserve updated.",C.gold);
    }
    else if(type==="saveImperialLinks"){
      setImperialLinks(payload.links||[]);
      await sset("bk_imperial_links",payload.links||[]);
      notify("🔗 Imperial links updated.",C.gold);
    }
    else if(type==="saveSubmitLock"){
      const lock=payload.lock;
      setSubmitLock(lock); await sset("bk_submit_lock",lock);
      notify(lock?"Submissions locked.":"Submissions unlocked.",C.gold);
    }
    else if(type==="clearSubmitLock"){
      setSubmitLock(null); await sdel("bk_submit_lock");
      notify("Submissions unlocked.",C.gold);
    }
    else if(type==="saveAnnouncement"){
      const ann=payload.announcement;
      setAnnouncement(ann); await sset("bk_announcement",ann);
    }
    else if(type==="deleteAnnouncement"){
      setAnnouncement(null); await sdel("bk_announcement");
      notify("Announcement cleared.",C.gold);
    }
    else if(type==="saveOrgChart"){
      const {orgChart:oc}=payload;
      setOrgChart(oc);
      // Strip logos out of blob and save separately
      const {logos={},agencies={}, ...rest}=oc;
      // Save org logos separately
      const logoSaves=Object.entries(logos).map(([k,v])=>v?sset("bk_logo_"+k,v):sdel("bk_logo_"+k));
      // Save agency logos separately, strip from blob
      const strippedAgencies={};
      const agLogoSaves=[];
      Object.entries(agencies).forEach(([org,list])=>{
        strippedAgencies[org]=(list||[]).map(a=>{
          const {logo,...agRest}=a;
          if(logo) agLogoSaves.push(sset("bk_logo_ag_"+a.id,logo));
          else agLogoSaves.push(sdel("bk_logo_ag_"+a.id));
          return agRest;
        });
      });
      await Promise.all([
        sset("bk_orgchart",{...rest,logos:{},agencies:strippedAgencies}),
        ...logoSaves,
        ...agLogoSaves,
      ]);
    }
    else if(type==="openSession"){
      // Move all docketed bills to bt_voting
      const updates=Object.values(bills).filter(b=>b.status==="docket");
      const next={...bills};
      await Promise.all(updates.map(async b=>{
        const updated={...b,status:"bt_voting"};
        next[b.id]=updated;
        await sset("bk_bill_"+b.id,updated);
      }));
      setBills(next);
      notify("Session opened — "+updates.length+" bill"+(updates.length!==1?"s":"")+" moved to active vote.",C.green);
    }
    else if(type==="saveSession"){
      const {session:s}=payload;
      setSession(s); await sset("bk_session",s);
    }
    else if(type==="savePartyRoles"){
      const newOff={...(officials||{}),partyLeaders:payload.partyLeaders,partyWhips:payload.partyWhips,opposition:payload.opposition,coalitions:payload.coalitions,coalitionMembers:payload.coalitionMembers||[]};
      setOff(newOff); await sset("bk_officials",newOff);
    }
    else if(type==="dismissOfficial"){
      const {role:dismissRole}=payload;
      const newOff={...(officials||{})};
      if(dismissRole==="bt_president"){ newOff.president_bt="Vacant"; await sdel("bk_bt_hash"); notify("🏛 BT President dismissed. Panel locked.",C.gold); }
      else if(dismissRole==="chancellor"){ newOff.chancellor="Vacant"; notify("⚜ Chancellor dismissed.",C.gold); }
      else if(dismissRole==="bh_president"){ newOff.president_bh="Vacant"; await sdel("bk_bh_hash"); notify("🏰 BH President dismissed. Panel locked.",C.gold); }
      setOff(newOff); await sset("bk_officials",newOff);
    }
  },[members,bundesherren,bills,officials,notify]);

  const pendingCount=Object.values(bills).filter(b=>b.status==="pending").length;
  const pendingBHCount=Object.values(bills).filter(b=>b.status==="pending_bh").length;
  const ratifyCount=Object.values(bills).filter(b=>b.status==="ratification").length;

  const TABS=[
    {id:"home",         label:"Home",         icon:"⚜",  badge:0},
    {id:"bundestag",    label:"Bundestag",    icon:"🏛", badge:0},
    {id:"bundesherren", label:"Bundesherren", icon:"🏰", badge:0},
    {id:"submit",       label:"Submit Bill",  icon:"✍",  badge:0},
    {id:"panel",        label:"Panel",        icon:"⚙",  badge:pendingCount+pendingBHCount+ratifyCount},
    {id:"links",         label:"Imperial Links",icon:"🔗", badge:0},
  ];

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <Gstyle/>
      <Toast msg={toast.msg} color={toast.color}/>
      <Overlay label={processing}/>

      <div style={{background:`linear-gradient(180deg,${C.s1} 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.border}`,padding:"1.5rem 1rem 1rem"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",gap:"1.25rem"}}>
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
            padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <img src={COA_B64} alt="" style={{width:56,height:56,objectFit:"contain",filter:"drop-shadow(0 0 10px #C9A84C66)"}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:700,color:C.text,letterSpacing:"0.1em",lineHeight:1.1}}>Imperial Bundeskongress</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.3em",color:C.gold,marginTop:4,textTransform:"uppercase"}}>Empire of Lech · Legislative Chamber · Gott mit uns</div>
          </div>
        </div>
      </div>

      <div style={{background:C.s1,borderBottom:"none"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",overflowX:"auto"}}>
          {TABS.map(t=>{
            const active=tab===t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",
                         padding:"0.75rem 1.1rem",background:"transparent",border:"none",whiteSpace:"nowrap",
                         borderBottom:`2px solid ${active?C.red:"transparent"}`,color:active?C.text:C.textD,
                         cursor:"pointer",position:"relative",transition:"all .16s",flexShrink:0}}>
                {t.icon} {t.label}
                {t.badge>0&&<span style={{position:"absolute",top:8,right:4,background:C.red,color:"#fff",fontFamily:"'Cinzel',serif",fontSize:8,width:14,height:14,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
              </button>
            );
          })}
        </div>
      </div>

      <AnnouncementBanner announcement={announcement} tab={tab}/>

      <div style={{maxWidth:900,margin:"0 auto",padding:"1.5rem 1rem"}}>
        {loading?(
          <div style={{textAlign:"center",padding:"3rem",fontFamily:"'Cinzel',serif",color:C.textD,fontSize:14,letterSpacing:"0.15em"}}>
            <div style={{animation:"pulse 1s infinite",fontSize:24}}>⚜</div>
            <div style={{marginTop:"0.5rem"}}>Loading…</div>
          </div>
        ):(
          <>
            <div style={{display:tab==="home"?"block":"none"}}><LandingPage bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} activeBudget={activeBudget} budgetCooldown={budgetCooldown} imperialReserve={imperialReserve} onAction={onAction} ijStatutes={ijStatutes} ijCases={ijCases}/></div>
            <div style={{display:tab==="bundestag"?"block":"none"}}><BundestagTab members={members} officials={officials} bills={bills} bundesherren={bundesherren} session={session}/></div>
            <div style={{display:tab==="bundesherren"?"block":"none"}}><BundesherrenTab bundesherren={bundesherren} officials={officials} bills={bills} members={members}/></div>
            <div style={{display:tab==="submit"?"block":"none"}}><SubmitTab onSubmit={async(p)=>await onAction("submitBill",p)} onSubmitBudget={async(p)=>await onAction("submitBudget",p)} activeBudget={activeBudget} budgetCooldown={budgetCooldown} orgChart={orgChart} submitLock={submitLock} imperialReserve={imperialReserve}/></div>
            <div style={{display:tab==="links"?"block":"none"}}><ImperialLinksTab imperialLinks={imperialLinks}/></div>
            <div style={{display:tab==="panel"?"block":"none"}}><PanelTab bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} session={session} announcement={announcement} activeBudget={activeBudget} submitLock={submitLock} imperialReserve={imperialReserve} imperialLinks={imperialLinks} onAction={onAction} notify={notify} setProcessing={setProcessing} onEmperorAuth={()=>{}}/></div>
          </>
        )}
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,letterSpacing:"0.2em",textAlign:"center"}}>
        IMPERIAL BUNDESKONGRESS · EMPIRE OF LECH · GOTT MIT UNS
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


</script>
</body>
</html>
