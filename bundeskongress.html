// ── Panel: Emperor ────────────────────────────────────────────────────────────
function ArchiveMgmtRow({b,onAction,notify,setProcessing}) {
  const [editDoc,setEditDoc]=useState(false);
  const [newUrl,setNewUrl]=useState(b.gdoc_url||"");
  const [saving,setSaving]=useState(false);
  const sm=STATUS_META[b.status]||{color:C.textD,icon:"•"};
  return (
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`4px solid ${sm.color}`,borderRadius:"0 3px 3px 0",marginBottom:"0.6rem",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap",padding:"0.75rem 1rem"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,fontWeight:700,marginBottom:3}}>{sm.icon} {b.title}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:sm.color,border:`1px solid ${sm.color}44`,padding:"1px 6px",borderRadius:2}}>{b.status==="pulled"?(b.pulled_by==="bt_president"?"📥 Pulled — Bundestag President":b.pulled_by==="bh_president"?"📥 Pulled — Bundesherren President":"📥 Pulled by the Emperor"):sm.label}</span>
            <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>by {b.submitter}</span>
            {b.gdoc_url&&<a href={b.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View →</a>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          <Btn variant="ghost" small onClick={()=>{setEditDoc(e=>!e);setNewUrl(b.gdoc_url||"");}}>
            {editDoc?"▲":"📎 Edit Doc"}
          </Btn>
          {b.status==="passed"&&(
            <ArmBtn small label="🚫 Repeal" confirmLabel="Repeal this law?" variant="orange"
              onConfirm={async()=>{
                setProcessing("Marking as repealed…");
                await onAction("repealBill",{billId:b.id});
                setProcessing(null); notify("Bill repealed.",C.gold);
              }}/>
          )}
          <ArmBtn small label="🗑 Delete" confirmLabel="Permanently delete?" variant="danger"
            onConfirm={async()=>{
              setProcessing("Deleting bill…");
              await onAction("deleteBill",{billId:b.id});
              setProcessing(null); notify("Bill deleted.",C.textD);
            }}/>
        </div>
      </div>
      {editDoc&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1rem",background:C.s1,display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <FL>DOCUMENT LINK</FL>
          <div style={{display:"flex",gap:8}}>
            <Inp value={newUrl} onChange={setNewUrl} placeholder="https://docs.google.com/..." style={{flex:1}}/>
            <Btn variant="gold" small disabled={saving||!newUrl.trim()||newUrl===b.gdoc_url} onClick={async()=>{
              if(!newUrl.startsWith("http")){notify("Must be a valid URL.",C.redL);return;}
              setSaving(true); setProcessing("Updating document link…");
              await onAction("updateBillDoc",{billId:b.id,gdoc_url:newUrl.trim()});
              setProcessing(null); setSaving(false); setEditDoc(false);
            }}>Save</Btn>
          </div>
          <div style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>This change is not publicly logged. The document link will update silently.</div>
        </div>
      )}
    </div>
  );
}

function PullBillSection({bills,onAction,notify,setProcessing}) {
  const [pullBillId,setPullBillId]=useState("");
  const [reason,setReason]=useState("");
  const [saving,setSaving]=useState(false);

  const active=Object.values(bills||{})
    .filter(b=>["pending","pending_bh","pending_emperor","docket","bt_voting","bh_voting"].includes(b.status))
    .sort((a,b)=>a.title.localeCompare(b.title));

  if(active.length===0) return (
    <div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#9a5a9a",letterSpacing:"0.2em",marginBottom:"0.75rem"}}>📥 PULL A BILL FROM THE FLOOR</div>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>No bills currently in the legislative process.</div>
    </div>
  );

  return (
    <div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#9a5a9a",letterSpacing:"0.2em",marginBottom:"0.75rem"}}>📥 PULL A BILL FROM THE FLOOR</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.6,marginBottom:"0.85rem"}}>
        Immediately removes a bill from wherever it is in the process and archives it as Pulled.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.7rem",maxWidth:500}}>
        <div><FL>SELECT BILL</FL>
          <select value={pullBillId} onChange={e=>setPullBillId(e.target.value)}
            style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"7px 10px",color:C.text,fontSize:14,fontFamily:"'Crimson Text',serif"}}>
            <option value="">— Select a bill —</option>
            {active.map(b=>{
              const sm=STATUS_META[b.status]||{label:b.status};
              return <option key={b.id} value={b.id}>{b.title} ({sm.label})</option>;
            })}
          </select>
        </div>
        <div><FL>REASON (optional — publicly visible)</FL>
          <Inp value={reason} onChange={setReason} placeholder="Grounds for pulling this bill…"/>
        </div>
        <ArmBtn label="📥 Pull Bill" confirmLabel="Pull this bill?" variant="danger"
          onConfirm={async()=>{
            if(!pullBillId) return;
            setSaving(true); setProcessing("Pulling bill…");
            await onAction("pullBill",{billId:pullBillId,reason:reason.trim()});
            setProcessing(null); setSaving(false); setPullBillId(""); setReason("");
          }}/>
      </div>
    </div>
  );
}

function RatifyCard({bill,onAction,notify,setProcessing}) {
  const [action,setAction]=useState(null); // null | "veto" | "return"
  const [notes,setNotes]=useState("");
  const [saving,setSaving]=useState(false);
  const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;

  return (
    <div style={{background:C.s2,border:`1px solid ${C.gold}44`,borderLeft:`4px solid ${C.gold}`,
                  borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"0.75rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:action?12:0}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700,marginBottom:4}}>{bill.title}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {bill.type!=="regular"&&<span style={{fontSize:11,color:C.gold}}>{bt.icon} {bt.label}</span>}
            {bill.nominee&&<span style={{fontSize:12,color:C.gold}}>→ {bill.nominee}{bill.portfolio?" ("+bill.portfolio+")":""}</span>}
            {bill.return_count>0&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#b05a10",border:"1px solid #b05a1044",padding:"1px 6px",borderRadius:2}}>↩ RETURNED {bill.return_count}×</span>}
            {bill.gdoc_url&&<a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View →</a>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
          <ArmBtn variant="gold" small label="⚜ Ratify" confirmLabel="Sign into Law?"
            onConfirm={async()=>{
              setProcessing("Recording ratification…");
              await onAction("ratifyBill",{billId:bill.id});
              setProcessing(null);
              notify("⚜ Bill ratified — now Imperial Law.",C.gold);
            }}/>
          <Btn variant="orange" small onClick={()=>setAction(action==="return"?null:"return")}>↩ Return</Btn>
          <Btn variant="danger" small onClick={()=>setAction(action==="veto"?null:"veto")}>🚫 Veto</Btn>
          <Btn small style={{background:"transparent",border:"1px solid #6a3a6a",color:"#c080c0"}} onClick={()=>setAction(action==="pull"?null:"pull")}>📥 Pull</Btn>
        </div>
      </div>

      {action==="return"&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem",display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:"#f0a050",textTransform:"uppercase"}}>↩ Return for Revisions</div>
          <TA value={notes} onChange={setNotes} placeholder="Describe the required revisions… (the Bundestag will see this)" rows={3}/>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="orange" disabled={saving} onClick={async()=>{
              setSaving(true);
              setProcessing("Returning bill…");
              await onAction("returnBill",{billId:bill.id,notes:notes.trim()});
              setProcessing(null); setSaving(false); setAction(null); setNotes("");
            }}>↩ Confirm Return</Btn>
            <Btn variant="ghost" small onClick={()=>{setAction(null);setNotes("");}}>Cancel</Btn>
          </div>
        </div>
      )}

      {action==="veto"&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem",display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:C.redL,textTransform:"uppercase"}}>🚫 Imperial Veto</div>
          <TA value={notes} onChange={setNotes} placeholder="State the grounds for veto… (optional, will be publicly visible)" rows={3}/>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="danger" disabled={saving} onClick={async()=>{
              setSaving(true);
              setProcessing("Recording veto…");
              await onAction("vetoBill",{billId:bill.id,reason:notes.trim()});
              setProcessing(null); setSaving(false); setAction(null); setNotes("");
            }}>🚫 Confirm Veto</Btn>
            <Btn variant="ghost" small onClick={()=>{setAction(null);setNotes("");}}>Cancel</Btn>
          </div>
        </div>
      )}
      {action==="pull"&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem",display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:"#c080c0",textTransform:"uppercase"}}>📥 Pull Bill from Floor</div>
          <TA value={notes} onChange={setNotes} placeholder="Reason for pulling… (optional, will be publicly visible)" rows={2}/>
          <div style={{display:"flex",gap:8}}>
            <Btn disabled={saving} style={{background:"#2a0a2a",border:"1px solid #6a3a6a",color:"#c080c0",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",padding:"7px 16px",borderRadius:2,cursor:"pointer"}} onClick={async()=>{
              setSaving(true);
              setProcessing("Pulling bill…");
              await onAction("pullBill",{billId:bill.id,reason:notes.trim()});
              setProcessing(null); setSaving(false); setAction(null); setNotes("");
            }}>📥 Confirm Pull</Btn>
            <Btn variant="ghost" small onClick={()=>{setAction(null);setNotes("");}}>Cancel</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Announcement Editor ──────────────────────────────────────────────────────
const ALL_TABS=["home","bundestag","bundesherren","submit","panel"];
const PAGE_LABELS={"home":"Home","bundestag":"Bundestag","bundesherren":"Bundesherren","submit":"Submit Bill","panel":"Panel"};

function AnnouncementEditor({announcement,onAction,notify,setProcessing}) {
  const [tone,setTone]=useState(announcement?.tone||"neutral");
  const [title,setTitle]=useState(announcement?.title||"");
  const [text,setText]=useState(announcement?.text||"");
  const [pages,setPages]=useState(announcement?.pages||ALL_TABS);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(announcement){ setTone(announcement.tone||"neutral"); setTitle(announcement.title||""); setText(announcement.text||""); setPages(announcement.pages||ALL_TABS); }
  },[announcement]);

  const togglePage=p=>setPages(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
  const activeTone=ANNOUNCEMENT_TONES.find(t=>t.v===tone)||ANNOUNCEMENT_TONES[0];

  return (
    <div>
      <STitle>Imperial Announcement</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Post a banner announcement visible to all users on selected pages. Only one announcement may be active at a time.
      </div>

      {/* Preview */}
      {text&&(
        <div style={{marginBottom:"1.25rem"}}>
          <FL>PREVIEW</FL>
          <div style={{background:activeTone.bg,border:`1px solid ${activeTone.border}`,borderBottom:`3px solid ${activeTone.border}`,borderRadius:3,padding:"0.75rem 1rem",display:"flex",alignItems:"flex-start",gap:12}}>
            <span style={{fontSize:20,flexShrink:0,filter:`drop-shadow(0 0 6px ${activeTone.accent}88)`}}>{activeTone.icon}</span>
            <div>
              {title&&<div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.18em",color:activeTone.accent,textTransform:"uppercase",marginBottom:3,fontWeight:700}}>{title}</div>}
              <div style={{fontSize:14,color:activeTone.text,lineHeight:1.7}}>{text}</div>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem",maxWidth:560}}>
        {/* Tone selector */}
        <div>
          <FL>TONE</FL>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {ANNOUNCEMENT_TONES.map(t=>(
              <div key={t.v} onClick={()=>setTone(t.v)}
                style={{flex:1,minWidth:110,background:tone===t.v?t.bg:"transparent",
                         border:`2px solid ${tone===t.v?t.accent:C.border}`,borderRadius:3,
                         padding:"0.6rem 0.85rem",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
                <div style={{fontSize:18,marginBottom:3}}>{t.icon}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:tone===t.v?t.accent:C.textD,letterSpacing:"0.1em"}}>{t.l.toUpperCase()}</div>
              </div>
            ))}
          </div>
        </div>

        <div>
          <FL>TITLE (optional)</FL>
          <Inp value={title} onChange={setTitle} placeholder="e.g. Imperial Notice · By Order of the Emperor"/>
        </div>
        <div>
          <FL>ANNOUNCEMENT TEXT *</FL>
          <TA value={text} onChange={setText} placeholder="Write your announcement here…" rows={3}/>
        </div>

        {/* Page selector */}
        <div>
          <FL>SHOW ON</FL>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <div onClick={()=>setPages(pages.length===ALL_TABS.length?[]:ALL_TABS)}
              style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",padding:"4px 12px",borderRadius:2,cursor:"pointer",
                       border:`1px solid ${pages.length===ALL_TABS.length?C.gold:C.border}`,
                       background:pages.length===ALL_TABS.length?"#2a2000":"transparent",
                       color:pages.length===ALL_TABS.length?C.gold:C.textD}}>
              {pages.length===ALL_TABS.length?"✓ All Pages":"All Pages"}
            </div>
            {ALL_TABS.map(p=>(
              <div key={p} onClick={()=>togglePage(p)}
                style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",padding:"4px 12px",borderRadius:2,cursor:"pointer",
                         border:`1px solid ${pages.includes(p)?activeTone.accent:C.border}`,
                         background:pages.includes(p)?activeTone.bg:"transparent",
                         color:pages.includes(p)?activeTone.text:C.textD}}>
                {pages.includes(p)?"✓ ":""}{PAGE_LABELS[p]}
              </div>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <Btn variant="gold" disabled={saving||!text.trim()||pages.length===0} onClick={async()=>{
            setSaving(true); setProcessing("Posting announcement…");
            await onAction("saveAnnouncement",{announcement:{tone,title:title.trim(),text:text.trim(),pages,posted_at:Date.now()}});
            setProcessing(null); setSaving(false);
            notify("⚜ Announcement posted.",activeTone.accent);
          }}>{saving?"Posting…":"⚜ Post Announcement"}</Btn>
          {announcement?.text&&(
            <ArmBtn label="🗑 Delete Announcement" confirmLabel="Remove announcement?" variant="danger"
              onConfirm={async()=>{
                setProcessing("Removing announcement…");
                await onAction("deleteAnnouncement",{});
                setProcessing(null);
                setTitle(""); setText(""); setTone("neutral"); setPages(ALL_TABS);
              }}/>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Party Roles Section ──────────────────────────────────────────────────────
function PartyRolesSection({officials,members,onAction,notify,setProcessing}) {
  const allMembers=Object.values(members||{}).sort((a,b)=>a.name.localeCompare(b.name));

  const save=async(patch)=>{
    setProcessing("Saving…");
    const next={
      partyLeaders:{...(officials?.partyLeaders||{})},
      partyWhips:  {...(officials?.partyWhips  ||{})},
      opposition:   officials?.opposition||"",
      coalitions:  [...(officials?.coalitions  ||[])],
      coalitionMembers:[...(officials?.coalitionMembers||[])],
      ...patch,
    };
    await onAction("savePartyRoles",next);
    setProcessing(null);
  };

  const setLeader=(partyId,memberId)=>{
    const next={...(officials?.partyLeaders||{})};
    if(memberId) next[partyId]=memberId; else delete next[partyId];
    save({partyLeaders:next});
    notify(memberId?members[memberId]?.name+" set as Party Leader.":"Party Leader cleared.",C.gold);
  };
  const setWhip=(partyId,memberId)=>{
    const next={...(officials?.partyWhips||{})};
    if(memberId) next[partyId]=memberId; else delete next[partyId];
    save({partyWhips:next});
    notify(memberId?members[memberId]?.name+" set as Party Whip.":"Party Whip cleared.","#b0a060");
  };
  const setOpposition=(memberId)=>{
    save({opposition:memberId||""});
    notify(memberId?members[memberId]?.name+" set as Leader of the Opposition.":"Leader of Opposition cleared.","#4a9a5a");
  };
  const toggleCoalition=(partyId)=>{
    const curr=officials?.coalitions||[];
    const next=curr.includes(partyId)?curr.filter(x=>x!==partyId):[...curr,partyId];
    save({coalitions:next});
    notify((curr.includes(partyId)?"Removed from":"Added to")+" coalition: "+PARTIES.find(p=>p.id===partyId)?.name,"#8888ff");
  };
  const toggleCoalitionMember=(memberId)=>{
    const curr=officials?.coalitionMembers||[];
    const next=curr.includes(memberId)?curr.filter(x=>x!==memberId):[...curr,memberId];
    save({coalitionMembers:next});
    const m=Object.values(members||{}).find(x=>x.id===memberId);
    notify((curr.includes(memberId)?"Removed":"Added")+": "+m?.name+" "+(curr.includes(memberId)?"from":"to")+" coalition","#8888ff");
  };

  const RoleSelect=({value,onChange,partyId,placeholder})=>{
    const partyMembers=partyId?Object.values(members||{}).filter(m=>m.party===partyId).sort((a,b)=>b.seats-a.seats):allMembers;
    return (
      <select value={value||""} onChange={e=>onChange(e.target.value||null)}
        style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,padding:"4px 8px",
                 color:C.text,fontSize:13,fontFamily:"'Crimson Text',serif",minWidth:160}}>
        <option value="">— {placeholder} —</option>
        {partyMembers.map(m=><option key={m.id} value={m.id}>{m.name} ({m.seats})</option>)}
      </select>
    );
  };

  return (
    <div style={{maxWidth:580}}>
      <STitle>Party Roles</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.5rem"}}>
        Designate party roles and mark coalition partners. All changes are reflected immediately on the public Bundestag page.
      </div>

      {/* Per-party: Leader + Whip + Coalition */}
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginBottom:"1.5rem"}}>
        {PARTIES.map(party=>{
          const partyMembers=Object.values(members||{}).filter(m=>m.party===party.id).sort((a,b)=>b.seats-a.seats);
          if(partyMembers.length===0) return null;
          const leaderId=(officials?.partyLeaders||{})[party.id];
          const whipId=(officials?.partyWhips||{})[party.id];
          const inCoal=(officials?.coalitions||[]).includes(party.id);
          return (
            <div key={party.id} style={{background:C.s1,border:`1px solid ${party.color}33`,
                                          borderLeft:`4px solid ${party.color}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.75rem",flexWrap:"wrap",gap:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:party.color,fontWeight:700}}>{party.name}</span>
                  {inCoal&&<span style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:"0.12em",color:"#8888ff",border:"1px solid #8888ff44",borderRadius:2,padding:"1px 5px"}}>COALITION</span>}
                </div>
                <div onClick={()=>toggleCoalition(party.id)}
                  style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",padding:"3px 10px",borderRadius:2,cursor:"pointer",
                           border:`1px solid ${inCoal?"#8888ff":"#333366"}`,background:inCoal?"#0a0a1a":"transparent",
                           color:inCoal?"#8888ff":"#555588"}}>
                  {inCoal?"✓ In Coalition":"+ Mark as Coalition"}
                </div>
              </div>
              <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:inCoal&&partyMembers.length>1?"0.75rem":0}}>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.15em",color:"#C9A84C",marginBottom:4}}>PARTY LEADER</div>
                  <RoleSelect value={leaderId} onChange={v=>setLeader(party.id,v)} partyId={party.id} placeholder="No leader"/>
                </div>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.15em",color:"#b0a060",marginBottom:4}}>PARTY WHIP</div>
                  <RoleSelect value={whipId} onChange={v=>setWhip(party.id,v)} partyId={party.id} placeholder="No whip"/>
                </div>
              </div>
              {/* Per-member coalition override — always shown so any party can have mixed members */}
              {partyMembers.length>0&&(
                <div style={{marginTop:"0.6rem",borderTop:`1px solid ${C.border}`,paddingTop:"0.6rem"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.15em",color:"#8888cc",marginBottom:5}}>
                    INDIVIDUAL COALITION MEMBERSHIP
                    {inCoal&&<span style={{color:C.textDD,fontWeight:400,letterSpacing:"0.05em"}}> — whole party is in coalition, deselect members to exclude</span>}
                    {!inCoal&&<span style={{color:C.textDD,fontWeight:400,letterSpacing:"0.05em"}}> — party not in coalition, select individual members to include</span>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {partyMembers.map(m=>{
                      const memberInCoal=inCoal
                        ?!(officials?.coalitionMembers||[]).includes("exclude:"+m.id)
                        :(officials?.coalitionMembers||[]).includes(m.id);
                      return (
                        <div key={m.id} onClick={()=>{
                          if(inCoal){
                            // Toggle exclusion from whole-party coalition
                            const curr=officials?.coalitionMembers||[];
                            const excKey="exclude:"+m.id;
                            const next=curr.includes(excKey)?curr.filter(x=>x!==excKey):[...curr,excKey];
                            save({coalitionMembers:next});
                            notify((curr.includes(excKey)?"Re-included":"Excluded")+": "+m.name,(curr.includes(excKey)?"#8888ff":"#cc8888"));
                          } else {
                            toggleCoalitionMember(m.id);
                          }
                        }}
                          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.06em",padding:"2px 9px",borderRadius:2,cursor:"pointer",
                                   border:`1px solid ${memberInCoal?"#6666cc":"#333355"}`,
                                   background:memberInCoal?"#0a0a20":"transparent",
                                   color:memberInCoal?"#aaaaee":"#555577",transition:"all .12s"}}>
                          {memberInCoal?"⚜ ":""}{m.name} <span style={{opacity:0.6}}>({m.seats})</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Leader of Opposition — cross-party, single member */}
      <Divider/>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#4a9a5a",letterSpacing:"0.2em",marginBottom:"0.5rem"}}>LEADER OF THE OPPOSITION</div>
        <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"0.75rem",lineHeight:1.6}}>
          A single member designated as the formal Leader of the Opposition, regardless of party.
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {officials?.opposition&&members[officials.opposition]&&(
            <div style={{display:"flex",alignItems:"center",gap:7,background:"#0e1a10",border:"1px solid #4a9a5a44",borderRadius:3,padding:"5px 12px"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#4a9a5a",letterSpacing:"0.1em"}}>OPP. LEADER</span>
              <span style={{fontSize:13,color:"#80d0a0",fontWeight:700}}>{members[officials.opposition].name}</span>
            </div>
          )}
          <RoleSelect value={officials?.opposition} onChange={v=>setOpposition(v)} partyId={null} placeholder="Select member"/>
        </div>
      </div>
    </div>
  );
}

// ── Submit Lock Section ──────────────────────────────────────────────────────
function SubmitLockSection({submitLock,onAction,notify,setProcessing}) {
  const [msg,setMsg]=useState(submitLock?.msg||"");
  const isLocked=!!submitLock;

  return (
    <div style={{maxWidth:520}}>
      <STitle>Submit Bill Lock</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Lock the Submit Bill page to prevent members from proposing new bills. A message will be shown in place of the form.
      </div>
      {isLocked&&(
        <div style={{background:"#1a0808",border:"1px solid #6a1a1a",borderLeft:"4px solid #c02020",borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:20}}>🔒</span>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#c02020",letterSpacing:"0.15em",marginBottom:3}}>SUBMISSIONS LOCKED</div>
            <div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>{submitLock.msg||"No message set."}</div>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem",maxWidth:460}}>
        <div>
          <FL>LOCK MESSAGE</FL>
          <Inp value={msg} onChange={setMsg} placeholder="e.g. Submissions suspended pending review of current bills."/>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!isLocked?(
            <ArmBtn label="🔒 Lock Submissions" confirmLabel="Lock submit page?" variant="danger"
              onConfirm={async()=>{
                setProcessing("Locking submissions…");
                await onAction("saveSubmitLock",{lock:{msg:msg.trim()||"The Emperor has temporarily suspended bill submissions."}});
                setProcessing(null);
              }}/>
          ):(
            <ArmBtn label="🔓 Unlock Submissions" confirmLabel="Unlock submit page?" variant="gold"
              onConfirm={async()=>{
                setProcessing("Unlocking submissions…");
                await onAction("clearSubmitLock",{});
                setProcessing(null);
                setMsg("");
              }}/>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Imperial Reserve Section ─────────────────────────────────────────────────
function ImperialReserveSection({imperialReserve,onAction,notify,setProcessing}) {

  const [saving,setSaving]=useState(false);

    <div style={{maxWidth:420}}>
      <STitle>Imperial Reserve</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        The Imperial Reserve is the Empire's treasury surplus fund. It is shown on all budget proposals and ratified budgets. Deficit budgets note that the shortfall is drawn from this reserve.
      </div>
      <div style={{background:C.s1,border:`1px solid ${C.gold}44`,borderTop:`3px solid ${C.gold}`,borderRadius:"0 0 3px 3px",padding:"1.25rem",marginBottom:"1.25rem",textAlign:"center"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:C.textDD,marginBottom:6}}>CURRENT IMPERIAL RESERVE</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:28,color:C.gold,fontWeight:700}}>{fmtCur(imperialReserve||0)}</div>
      </div>
      <div style={{marginBottom:"0.85rem"}}>
        <FL>SET IMPERIAL RESERVE</FL>
        <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0"
          style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                   padding:"7px 10px",color:C.text,fontSize:15,outline:"none",textAlign:"right"}}
          onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>
      <Btn variant="gold" disabled={saving} onClick={async()=>{
        setSaving(true); setProcessing("Updating reserve…");
        await onAction("saveImperialReserve",{amount:parseFloat(amount)||0});

      }}>{saving?"Saving…":"⚜ Set Reserve"}</Btn>
    </div>
  );
}

// ── Imperial Decree Section ───────────────────────────────────────────────────
const DECREE_SUBTYPES=[
  {v:"decree",       l:"Imperial Decree"},
  {v:"letters_patent",l:"Letters Patent"},
  {v:"proclamation", l:"Imperial Proclamation"},
  {v:"edict",        l:"Imperial Edict"},
  {v:"warrant",      l:"Royal Warrant"},
];
function ImperialDecreeSection({onAction,notify,setProcessing}) {
  const [title,setTitle]=useState("");
  const [subtype,setSubtype]=useState("decree");
  const [gdoc,setGdoc]=useState("");
  const [text,setText]=useState("");
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState("");
  const hasDoc=gdoc.trim().startsWith("http");
  const hasText=text.trim().length>0;

  if(done) return (
    <div>
      <STitle>Imperial Decrees</STitle>
      <div style={{background:"#0a1a0a",border:"1px solid #2a5a2a44",borderLeft:"3px solid #3a9c3a",borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",fontSize:14,color:"#7ad47a",marginBottom:"0.85rem"}}>
        ✓ Decree promulgated and added to the archive.
      </div>
      <Btn variant="ghost" small onClick={()=>{setDone(false);setTitle("");setGdoc("");setText("");setSubtype("decree");setErr("");}}>Promulgate Another</Btn>
    </div>
  );

  return (
    <div style={{maxWidth:520}}>
      <STitle>Imperial Decrees</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Promulgate an Imperial Decree, Letters Patent, Proclamation, or other instrument of Imperial law. Decrees are entered directly into the Legislative Archive as law — no vote required.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
        <div><FL>DECREE TYPE</FL><DD value={subtype} onChange={setSubtype} options={DECREE_SUBTYPES}/></div>
        <div><FL>TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="e.g. Letters Patent — Establishment of the Imperial Court"/></div>
        <div>
          <FL>GOOGLE DOC LINK (optional)</FL>
          <Inp value={gdoc} onChange={setGdoc} placeholder="https://docs.google.com/…"/>
          <div style={{fontSize:11,color:C.textDD,marginTop:3,fontStyle:"italic"}}>Paste the document link if the decree has a full written instrument.</div>
        </div>
        <div>
          <FL>DECREE TEXT (optional)</FL>
          <TA value={text} onChange={setText} placeholder="Write the text of the decree here if no document…" rows={6}/>
        </div>
        {!hasDoc&&!hasText&&title.trim()&&(
          <div style={{background:"#1a1200",border:`1px solid ${C.gold}33`,borderLeft:`3px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.6rem 1rem",fontSize:13,color:"#c8a870",fontStyle:"italic"}}>
            ⚠ Either a document link or decree text is recommended.
          </div>

        {err&&<div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,padding:"0.6rem 1rem",borderRadius:"0 3px 3px 0",fontSize:13,color:C.redL}}>{err}</div>}
        <Btn variant="gold" disabled={saving||!title.trim()} onClick={async()=>{
          if(!title.trim()){setErr("Title is required.");return;}
          setSaving(true); setProcessing("Promulgating decree…");
          const ok=await onAction("saveDecree",{title:title.trim(),gdoc_url:gdoc.trim(),decree_text:text.trim(),decree_subtype:subtype});
          setProcessing(null); setSaving(false);
          if(ok) setDone(true); else setErr("Failed — check connection.");
        }}>{saving?"Promulgating…":"⚜ Promulgate Decree"}</Btn>
      </div>
    </div>
  );
}

// ── Imperial Links Section ────────────────────────────────────────────────────
function ImperialLinksSection({imperialLinks,onAction,notify}) {

  return (
    <div style={{maxWidth:520}}>
      <STitle>Imperial Link Directory</STitle>

          <div key={l.id} style={{display:"flex",gap:6,alignItems:"center"}}>

}

// ── Grandfather Section ──────────────────────────────────────────────────────

  const [saving,setSaving]=useState(false);
  const already=Object.values(bills||{}).some(b=>b.status==="grandfathered"||b.status==="grandfathered_repealed");

  return (
    <div style={{maxWidth:520}}>

      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Imports all pre-system bills from the Imperial Legislation Database into the archive as <strong style={{color:C.gold}}>⚜ Grandfathered</strong> records. No voting data will be attached. Repealed bills are imported as Grandfathered — Repealed. This can only be run once.
      </div>
      {already?(
        <div>
          <div style={{background:"#0a1a0a",border:"1px solid #2a5a2a44",borderLeft:"3px solid #3a9c3a",borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",fontSize:14,color:"#7ad47a",marginBottom:"0.75rem"}}>
            ✓ {Object.values(bills||{}).filter(b=>b.grandfathered).length} grandfathered records in database.

          {Object.values(bills||{}).filter(b=>b.grandfathered).length<GRANDFATHERED_BILLS.length&&(
            <ArmBtn label="↻ Import Missing Bills" confirmLabel="Import missing records?" variant="gold"
              onConfirm={async()=>{
                setProcessing("Importing missing bills…");
                const res=await onAction("reimportMissingGrandfathered",{});
                setProcessing(null);
                if(res==="none_missing") notify("No missing bills.",C.gold);
                else notify("⚜ "+res+" missing bill"+(res!==1?"s":"")+" imported.",C.gold);
              }}/>
          )}
          <div style={{marginTop:"0.75rem"}}>
            <ArmBtn label="✦ Migrate Status — Fix Old Records" confirmLabel="Migrate grandfathered statuses?" variant="gold"
              onConfirm={async()=>{
                setProcessing("Migrating bill statuses…");
                const res=await onAction("migrateGrandfatheredStatus",{});
                setProcessing(null);
                if(res===0) notify("No migration needed — all records already correct.",C.gold);
                else notify("✦ "+res+" bill"+(res!==1?"s":"")+" migrated to passed/repealed.",C.gold);
              }}/>
          </div>
          <div style={{marginTop:"0.75rem"}}>
            <ArmBtn label="🔗 Correct Database — Apply Doc Links" confirmLabel="Apply all document links?" variant="gold"
              onConfirm={async()=>{
                setProcessing("Applying document links…");
                const res=await onAction("correctDatabase",{});
                setProcessing(null);
                if(res===0) notify("All links already up to date.",C.gold);
                else notify("🔗 "+res+" bill"+(res!==1?"s":"")+" updated with document links.",C.gold);
              }}/>
          </div>
        </div>
      ):done?(
        <div style={{background:"#0a1a0a",border:"1px solid #2a5a2a44",borderLeft:"3px solid #3a9c3a",borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",fontSize:14,color:"#7ad47a"}}>
          ✓ {GRANDFATHERED_BILLS.length} bills imported successfully.
        </div>
      ):(
        <div>
          <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem",marginBottom:"1.25rem"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:C.textDD,marginBottom:"0.6rem"}}>BILLS TO BE IMPORTED ({GRANDFATHERED_BILLS.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:280,overflowY:"auto"}}>
              {GRANDFATHERED_BILLS.map((b,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 6px",background:C.s2,borderRadius:2,borderLeft:`3px solid ${b.status==="grandfathered_repealed"?"#8b2020":"#8a7040"}`}}>
                  <span style={{fontSize:12,color:b.status==="grandfathered_repealed"?C.textDD:C.text}}>{b.title}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:b.status==="grandfathered_repealed"?"#7a5030":"#8a7040",marginLeft:8,flexShrink:0}}>{b.status==="grandfathered_repealed"?"Repealed":""}</span>
                </div>
              ))}
            </div>
          </div>
          <ArmBtn label="⚜ Import All Grandfathered Bills" confirmLabel="Import all historical records?" variant="gold"
            onConfirm={async()=>{
              setSaving(true); setProcessing("Importing historical bills…");
              const res=await onAction("importGrandfathered",{});
              setProcessing(null); setSaving(false);
              if(res==="already_imported") notify("Already imported.",C.gold);
              else { setDone(true); notify("⚜ "+GRANDFATHERED_BILLS.length+" bills imported.",C.gold); }
            }}/>
        </div>
      )}
    </div>
  );
}

function EmperorPanelContent({bills,members,bundesherren,officials,orgChart,announcement,activeBudget,submitLock,imperialReserve,imperialLinks,onAction,notify,setProcessing}) {
  const [section,setSection]=useState("ratify");

  const [chan,setChan]=useState(officials?.chancellor||"");
  const [pBH,setPBH]=useState(officials?.president_bh||"");
  const [csv,setCsv]=useState(""); const [csvErr,setCsvErr]=useState("");
  const [byDep,setByDep]=useState(""); const [byName,setByName]=useState(""); const [byParty,setByParty]=useState(PARTIES[0].id);
  const [bhName,setBhName]=useState(""); const [bhTitle,setBhTitle]=useState(""); const [bhRank,setBhRank]=useState("");
  const [newBTPw,setNewBTPw]=useState(""); const [newBHPw,setNewBHPw]=useState(""); const [newEmpPw,setNewEmpPw]=useState("");
  const [minPortfolio,setMinPortfolio]=useState(MINISTER_PORTFOLIOS[0]);
  const [minName,setMinName]=useState("");

  useEffect(()=>{ if(officials){ setPBT(officials.president_bt||""); setChan(officials.chancellor||""); setPBH(officials.president_bh||""); } },[officials]);

  const ratifyQueue=Object.values(bills||{}).filter(b=>b.status==="ratification").sort((a,b)=>b.created-a.created);
  const nomQueue=Object.values(bills||{}).filter(b=>b.status==="pending_emperor"&&b.type!=="appoint_bh_pres").sort((a,b)=>a.created-b.created);

  const handleImport=async()=>{
    setCsvErr("");
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){setCsvErr("No data.");return;}
    const parsed=[];
    for(const line of lines){
      const pts=line.split(/[,\t]/).map(s=>s.trim());
      if(pts.length<3){setCsvErr("Bad row: "+line+" — need Name, Party, Seats");return;}
      const seats=parseInt(pts[2]);
      if(isNaN(seats)||seats<1){setCsvErr("Invalid seats: "+line);return;}
      const party=PARTIES.find(p=>p.id===pts[1].toLowerCase()||p.name.toLowerCase()===pts[1].toLowerCase()||p.name.toLowerCase().includes(pts[1].toLowerCase().split(" ")[0]));
      parsed.push({name:pts[0],partyId:party?.id||"independent",seats});
    }
    const total=parsed.reduce((a,m)=>a+m.seats,0);
    if(total!==BT_SEATS_TOTAL){setCsvErr("Seats total "+total+" — must equal exactly "+BT_SEATS_TOTAL);return;}
    setProcessing("Importing members…");
    await onAction("importMembers",{members:parsed});
    setProcessing(null); notify("Imported "+parsed.length+" members ("+total+" seats).",C.green); setCsv("");
  };

  const SECS=[["ratify","⚜ Ratification"],["members","Members"],["bh","Bundesherren"],["officials","Officials"],["ministers","Ministers"],["leaders","Party Leaders"],["archive","Archive"],["govChart","Gov Chart"],["budget","💰 Budget"],["reserve","⚜ Reserve"],["decree","📜 Decrees"],["links","🔗 Links"],["announce","📢 Announcement"],["lock","🔒 Submit Lock"],["grandfather","⚜ Grandfather"],["access","Access Control"]];
  const depOpts=[{v:"",l:"— Select member —"},...Object.entries(members||{}).map(([id,m])=>({v:id,l:m.name+" ("+m.seats+" seats)"}))];

  return (
    <div className="fu">
      <STitle style={{color:C.gold,borderColor:`${C.gold}44`}}>👑 Imperial Throne</STitle>
      <div style={{display:"flex",gap:4,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {SECS.map(([id,l])=>(
          <button key={id} onClick={()=>setSection(id)}
            style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",padding:"4px 12px",borderRadius:2,cursor:"pointer",
                     border:`1px solid ${section===id?C.gold:C.border}`,background:section===id?"#3a2e00":"transparent",color:section===id?C.gold:C.textD}}>
            {l}
          </button>
        ))}
      </div>

      {section==="ratify"&&(
        <div>
          {nomQueue.length>0&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:"0.2em",marginBottom:"0.85rem"}}>NOMINATION BILLS — PENDING IMPERIAL APPROVAL ({nomQueue.length})</div>
              {nomQueue.map(bill=>{
                const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
                return (
                  <div key={bill.id} style={{background:C.s2,border:`1px solid ${C.gold}44`,borderLeft:`4px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"0.6rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700,marginBottom:4}}>{bt.icon} {bt.label}</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:12,color:C.gold,fontWeight:700}}>Nominee: {bill.nominee}{bill.portfolio?" — "+bill.portfolio:""}</span>
                          <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>submitted by {bill.submitter}</span>
                        </div>
                      </div>
                      <Btn variant="gold" small onClick={async()=>{
                        setProcessing("Opening nomination for vote…");
                        await onAction("emperorApproveBill",{billId:bill.id});
                        setProcessing(null);
                        notify("Nomination approved — open for Bundestag vote.",C.gold);
                      }}>⚜ Open for Vote</Btn>
                    </div>
                  </div>
                );
              })}
              <Divider/>
            </div>
          )}
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.textD,letterSpacing:"0.2em",marginBottom:"0.85rem"}}>AWAITING RATIFICATION ({ratifyQueue.length})</div>
          {ratifyQueue.length===0
            ?<div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>Nothing awaiting ratification.</div>
            :ratifyQueue.map(bill=><RatifyCard key={bill.id} bill={bill} onAction={onAction} notify={notify} setProcessing={setProcessing}/>)

              setByDep(""); setByName("");
            }} disabled={!byDep||!byName.trim()}>⚖ Confirm By-Election</Btn>
          </div>
        </div>
      )}

      {section==="bh"&&(
        <div>
          <STitle>Manage Bundesherren</STitle>

              {Object.entries(bundesherren||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name)).map(([id,bh])=>{

                );
              })}
            </div>
          ):<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>No Bundesherren yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",maxWidth:400}}>
            <FL>ADD NEW BUNDESHERR</FL>

          </div>

        <ImperialLinksSection imperialLinks={imperialLinks} onAction={onAction} notify={notify}/>
      )}
      {section==="grandfather"&&(
        <GrandfatherSection bills={bills} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="access"&&(
        <div style={{maxWidth:480}}>
          <STitle>Access Control</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
            Set passphrases for each role. Passphrases are wiped automatically when a new BT or BH President is voted in or dismissed — set new ones here for incoming officeholders.
          </div>
          {[
            ["BT PRESIDENT PASSPHRASE",newBTPw,setNewBTPw,"bk_bt_hash","🏛 BT President access enabled."],
            ["BH PRESIDENT PASSPHRASE",newBHPw,setNewBHPw,"bk_bh_hash","🏰 BH President access enabled."],
            ["EMPEROR PASSPHRASE (change)",newEmpPw,setNewEmpPw,"bk_emp_hash","👑 Emperor passphrase updated."],
          ].map(([label,val,setter,key,msg])=>(
            <div key={key} style={{marginBottom:"1.25rem",background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"1rem"}}>
              <FL>{label}</FL>
              <div style={{display:"flex",gap:8}}>
                <Inp value={val} onChange={setter} type="password" placeholder="New passphrase" style={{flex:1}}/>
                <Btn variant="gold" disabled={!val.trim()} onClick={async()=>{
                  setProcessing("Setting passphrase…");
                  const h=await sha256(val);
                  await sset(key,h); setter("");
                  setProcessing(null); notify(msg,C.gold);
                }}>Set</Btn>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Panel tab (role selector + login) ─────────────────────────────────────────
function PanelTab({bills,members,bundesherren,officials,orgChart,session,announcement,activeBudget,submitLock,imperialReserve,imperialLinks,onAction,notify,setProcessing,onEmperorAuth}) {
  const [role,setRole]=useState(null);
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState("");
  const [storedHash,setStoredHash]=useState(undefined);
  const [loading,setLoading]=useState(false);
  const [locked,setLocked]=useState(false);

  const ROLES=[
    {id:"emperor",    label:"Emperor",                 icon:"👑", hashKey:"bk_emp_hash"},
    {id:"bt_president",label:"President of Bundestag", icon:"🏛", hashKey:"bk_bt_hash"},
    {id:"bh_president",label:"President of Bundesherren",icon:"🏰",hashKey:"bk_bh_hash"},
  ];

  const selectRole=async(r)=>{
    setRole(r); setAuthed(false); setPw(""); setStoredHash(undefined); setLocked(false);
    const h=await sget(r.hashKey);
    setStoredHash(h||null);
    if(!h && r.id!=="emperor") setLocked(true);
  };

  const tryAuth=async()=>{
    setLoading(true);
    const h=await sha256(pw);
    if(h===storedHash){
      setAuthed(true); if(role.id==="emperor"&&onEmperorAuth) onEmperorAuth(true); notify("Access granted.",C.gold);
    } else {
      notify("Incorrect passphrase.",C.redL);
    }
    setLoading(false); setPw("");
  };

  if(!role) return (
    <div className="fu">
      <STitle>Imperial Panel — Select Role</STitle>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",justifyContent:"center",paddingTop:"1rem"}}>
        {ROLES.map(r=>(
          <div key={r.id} onClick={()=>selectRole(r)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:4,padding:"2rem 2.5rem",textAlign:"center",cursor:"pointer",transition:"all .16s",minWidth:160}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.background=C.s3;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.s2;}}>
            <div style={{fontSize:36,marginBottom:"0.75rem"}}>{r.icon}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,letterSpacing:"0.1em"}}>{r.label}</div>
          </div>
        ))}
      </div>
    </div>
  );

  if(authed) return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"1.5rem"}}>
        <button onClick={()=>{setRole(null);setAuthed(false);if(onEmperorAuth)onEmperorAuth(false);}} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.textDD,letterSpacing:"0.15em"}}>{role.icon} {role.label.toUpperCase()}</span>
      </div>
      {role.id==="emperor"&&<EmperorPanelContent bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} announcement={announcement} activeBudget={activeBudget} submitLock={submitLock} imperialReserve={imperialReserve} imperialLinks={imperialLinks} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {role.id==="bt_president"&&<BTPanelContent bills={bills} members={members} bundesherren={bundesherren} session={session} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {role.id==="bh_president"&&<BHPanelContent bills={bills} members={members} bundesherren={bundesherren} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>
  );

  return (
    <div className="fu" style={{maxWidth:380,margin:"0 auto"}}>
      <button onClick={()=>setRole(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em",marginBottom:"1.25rem"}}>← Back</button>
      {storedHash===undefined?(
        <div style={{textAlign:"center",padding:"2rem",fontFamily:"'Cinzel',serif",fontSize:11,color:C.textDD,letterSpacing:"0.15em",animation:"pulse 1s infinite"}}>⚜ Checking access…</div>
      ):locked?(
        <div style={{background:"#1a1010",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,borderRadius:"0 3px 3px 0",padding:"1rem 1.25rem",fontSize:14,color:C.redL,fontStyle:"italic"}}>
          🔒 This panel is currently locked. The Emperor must set up a passphrase for this role before access is granted.
        </div>
      ):(
        <Card style={{textAlign:"center",padding:"2.5rem"}}>
          <div style={{fontSize:36,marginBottom:"0.75rem"}}>{role.icon}</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:C.text,marginBottom:4}}>{role.label}</div>
          <div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"1.25rem"}}>Enter your passphrase.</div>
          <Inp value={pw} onChange={setPw} placeholder="Passphrase" type="password"
            style={{textAlign:"center",letterSpacing:"0.18em",marginBottom:10}}/>
          <Btn onClick={tryAuth} disabled={loading||!pw.trim()} full>{loading?"Verifying…":"⚜ Enter"}</Btn>
        </Card>
      )}
    </div>
  );
}

              The Bundesherren tab on the public site shows active BH votes and bills awaiting Imperial ratification so lords can follow progress between meetings.

          </Section>
        </div>
      )}
    </div>
  );
}

function OrgNode({node}) {
  const [collapsed,setCollapsed]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const hasChildren=node.children&&node.children.length>0;
  const isAgency=node.isAgency;

  const handleClick=()=>{
    if(isAgency) setShowModal(true);
    else if(hasChildren) setCollapsed(c=>!c);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      {showModal&&<AgencyModal node={node} onClose={()=>setShowModal(false)}/>}
      <div onClick={handleClick}
        style={{background:C.s2,border:`2px solid ${node.color||C.border}`,
                 borderRadius:4,padding:"8px 12px",minWidth:130,maxWidth:175,textAlign:"center",
                 cursor:(hasChildren||isAgency)?"pointer":"default",position:"relative",
                 boxShadow:`0 2px 14px ${node.color||"#000"}22`,transition:"all .15s"}}
        onMouseEnter={e=>{ if(hasChildren||isAgency) e.currentTarget.style.borderColor=(node.color||C.border); }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor=(node.color||C.border); }}>
        {node.logo&&<img src={node.logo} alt="" style={{width:32,height:32,objectFit:"contain",display:"block",margin:"0 auto 5px"}}/>}
        {!node.logo&&<div style={{fontSize:20,marginBottom:4}}>{node.icon}</div>}
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,color:node.color||C.text,letterSpacing:"0.07em",lineHeight:1.3,marginBottom:3}}>
          {node.label}
        </div>
        {node.incumbentLabel&&<div style={{fontSize:8,color:C.textDD,letterSpacing:"0.1em",fontFamily:"'Cinzel',serif",marginBottom:2,textTransform:"uppercase"}}>{node.incumbentLabel}</div>}
        {node.incumbent!=null&&<div style={{fontSize:12,color:node.incumbent==="Vacant"?C.textDD:C.gold,fontStyle:node.incumbent==="Vacant"?"italic":"normal",lineHeight:1.3}}>{node.incumbent}</div>}
        {node.sublabel&&<div style={{fontSize:10,color:C.textD,fontStyle:"italic",marginTop:2}}>{node.sublabel}</div>}
        {isAgency&&node.leaderName&&<div style={{fontSize:10,color:C.gold,marginTop:3,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:145}}>{node.leaderName}</div>}
        {isAgency&&<div style={{position:"absolute",top:5,right:6,fontFamily:"'Cinzel',serif",fontSize:7,color:C.textDD,letterSpacing:"0.05em"}}>ⓘ</div>}
        {hasChildren&&<div style={{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",
          background:C.s3,border:`1px solid ${node.color||C.border}`,borderRadius:"50%",
          width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:9,color:node.color||C.textD,zIndex:2,pointerEvents:"none"}}>{collapsed?"[+]":"[-]"}</div>}
      </div>

      {hasChildren&&!collapsed&&(
        <>
          <div style={{width:2,height:18,background:node.color||C.border,opacity:0.6}}/>
          <div style={{position:"relative",display:"flex",flexDirection:"row",alignItems:"flex-start",gap:0}}>
            {node.children.length>1&&(
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,
                            background:`linear-gradient(to right, transparent 0%, ${node.color||C.border}88 15%, ${node.color||C.border}88 85%, transparent 100%)`,
                            zIndex:0}}/>
            )}
            {node.children.map(child=>(
              <div key={child.id} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 10px",minWidth:155}}>
                <div style={{width:2,height:18,background:child.color||C.border,opacity:0.6,flexShrink:0}}/>
                <OrgNode node={child}/>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function GovChartTab({officials,members,bundesherren,orgChart}) {
  const [zoom,setZoom]=useState(0.8);
  const [pan,setPan]=useState({x:0,y:20});
  const [dragging,setDragging]=useState(false);
  const dragRef=useRef(null);

  const mins=officials?.ministers||{};
  const btCount=Object.keys(members||{}).length;
  const bhCount=Object.keys(bundesherren||{}).length;

  const ministryNodes=MINISTER_PORTFOLIOS.map(p=>({
    id:"min_"+p.replace(/\s+/g,"_"),
    label:p,
    icon:"🎖",
    incumbentLabel:"Minister",
    incumbent:mins[p]||"Vacant",
    color:mins[p]&&mins[p]!=="Vacant"?"#c8a040":C.textDD,
    logo:(orgChart?.logos||{})[p]||null,
    children:((orgChart?.agencies||{})[p]||[]).map(a=>({
      id:a.id,label:a.name,icon:"🏢",incumbent:null,isAgency:true,
      color:"#5a7a9a",logo:a.logo||null,children:[],
      leaderTitle:a.leaderTitle||null,leaderName:a.leaderName||null,
    })),
  }));

  const tree={
    id:"emperor",label:"Emperor",icon:"👑",
    incumbentLabel:"Head of State",incumbent:officials?.emperor_name||null,
    color:C.gold,logo:(orgChart?.logos||{})["emperor"]||null,
    children:[
      {id:"bundestag",label:"Bundestag",icon:"🏛",
       incumbentLabel:"President",incumbent:officials?.president_bt||"Vacant",
       sublabel:btCount+" members",color:"#4a88ff",
       logo:(orgChart?.logos||{})["bundestag"]||null,children:[]},
      {id:"council",label:"Imperial Council",icon:"⚜",
       incumbentLabel:"Chancellor",incumbent:officials?.chancellor||"Vacant",
       color:C.gold,logo:(orgChart?.logos||{})["council"]||null,children:ministryNodes},
      {id:"bundesherren",label:"Bundesherren",icon:"🏰",
       incumbentLabel:"President",incumbent:officials?.president_bh||"Vacant",
       sublabel:bhCount+" lords",color:"#c8a870",
       logo:(orgChart?.logos||{})["bundesherren"]||null,children:[]},
    ],
  };

  const onMouseDown=e=>{ dragRef.current={sx:e.clientX-pan.x,sy:e.clientY-pan.y,ox:e.clientX,oy:e.clientY,moved:false}; setDragging(false); };
  const canvasRef=useRef(null);
  const onMouseMove=e=>{ if(!dragRef.current) return; const dx=e.clientX-dragRef.current.ox,dy=e.clientY-dragRef.current.oy; if(!dragRef.current.moved&&Math.sqrt(dx*dx+dy*dy)>4) dragRef.current.moved=true; if(dragRef.current.moved){ setDragging(true); const cw=canvasRef.current?.offsetWidth||900; const ch=canvasRef.current?.offsetHeight||580; const limit=600; const nx=Math.min(limit,Math.max(-limit,e.clientX-dragRef.current.sx)); const ny=Math.min(limit,Math.max(-ch*0.7,e.clientY-dragRef.current.sy)); setPan({x:nx,y:ny}); } };
  const onMouseUp=()=>{ dragRef.current=null; setDragging(false); };
  const onWheel=e=>{ e.preventDefault(); setZoom(z=>Math.min(1.6,Math.max(0.25,z-e.deltaY*0.001))); };

  // Fullscreen controls
  const [fullscreen,setFullscreen]=useState(false);
  useEffect(()=>{
    const onKey=e=>{ if(e.key==="Escape") setFullscreen(false); };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[]);

  const ChartCanvas=()=>(
    <div ref={canvasRef} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
      onWheel={onWheel}
      style={{background:C.s1,
               border:fullscreen?"none":`1px solid ${C.gold}44`,
               boxShadow:fullscreen?"none":`inset 0 0 0 1px ${C.border}, 0 0 20px #C9A84C11`,
               overflow:"hidden",flex:1,cursor:dragging?"grabbing":"grab",
               userSelect:"none",position:"relative",borderRadius:fullscreen?0:3}}>
      <div style={{position:"absolute",inset:0,overflow:"visible",pointerEvents:"none"}}>
        <div style={{position:"absolute",left:`calc(50% + ${pan.x}px)`,top:`calc(40px + ${pan.y}px)`,
                      transform:`translateX(-50%) scale(${zoom})`,
                      transformOrigin:"50% 0",display:"inline-flex",pointerEvents:"all"}}>
          <OrgNode node={tree}/>
        </div>
      </div>
    </div>
  );

  const Controls=()=>(
    <div style={{display:"flex",gap:5,alignItems:"center"}}>
      <button onClick={()=>{setPan({x:0,y:20});setZoom(0.8);}}
        style={{fontFamily:"'Cinzel',serif",fontSize:9,background:"transparent",border:`1px solid ${C.border}`,color:C.textD,padding:"3px 10px",borderRadius:2,cursor:"pointer"}}>Reset</button>
      <button onClick={()=>setZoom(z=>Math.max(0.25,z-0.1))}
        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textD,width:26,height:26,borderRadius:2,cursor:"pointer",fontSize:18,lineHeight:"22px"}}>-</button>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,minWidth:36,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
      <button onClick={()=>setZoom(z=>Math.min(1.6,z+0.1))}
        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textD,width:26,height:26,borderRadius:2,cursor:"pointer",fontSize:18,lineHeight:"22px"}}>+</button>
      <button onClick={()=>setFullscreen(f=>!f)}
        style={{fontFamily:"'Cinzel',serif",fontSize:9,background:fullscreen?"#3a2000":"transparent",
                 border:`1px solid ${fullscreen?C.gold:C.border}`,color:fullscreen?C.gold:C.textD,
                 padding:"3px 10px",borderRadius:2,cursor:"pointer",marginLeft:4}}>
        {fullscreen?"✕ Exit":"⛶ Expand"}
      </button>
    </div>
  );

  if(fullscreen) return (
    <div style={{position:"fixed",inset:0,zIndex:9000,background:C.bg,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                   padding:"10px 16px",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.s1}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.25em",color:C.gold,textTransform:"uppercase"}}>
          Government of the Empire of Lech
        </div>
        <Controls/>
      </div>
      <ChartCanvas/>
      <div style={{textAlign:"center",padding:"6px 0",fontSize:11,color:C.textDD,fontStyle:"italic",
                   borderTop:`1px solid ${C.border}`,background:C.s1,flexShrink:0}}>
        Drag to pan · Scroll to zoom · Click nodes to expand/collapse · Esc to exit
      </div>
    </div>
  );

  return (
    <div className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.85rem",flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.25em",color:C.redL,textTransform:"uppercase"}}>Government of the Empire of Lech</div>
        <Controls/>
      </div>
      <div style={{display:"flex",flexDirection:"column",height:560}}>
        <ChartCanvas/>
      </div>
      <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",marginTop:5,textAlign:"center"}}>
        Drag to pan · Scroll to zoom · Click nodes to expand/collapse
      </div>
    </div>
  );
}

// ── Org Chart Emperor Section ─────────────────────────────────────────────────
function OrgChartSection({orgChart,onAction,notify,setProcessing}) {
  const [selOrg,setSelOrg]=useState("emperor");
  const [agencyName,setAgencyName]=useState("");

  const ORG_OPTIONS=[
    {v:"emperor",l:"Emperor (Crown)"},
    {v:"council",l:"Imperial Council"},
    {v:"bundestag",l:"Bundestag"},
    {v:"bundesherren",l:"Bundesherren"},
    ...MINISTER_PORTFOLIOS.map(p=>({v:p,l:p})),
  ];

  const uploadLogo=async(orgKey,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{
      setProcessing("Uploading logo...");
      const next={...(orgChart||{}),logos:{...(orgChart?.logos||{}),[orgKey]:e.target.result}};
      await onAction("saveOrgChart",{orgChart:next});
      setProcessing(null); notify("Logo updated.",C.gold);
    };
    reader.readAsDataURL(file);
  };
  const clearLogo=async orgKey=>{
    const logos={...(orgChart?.logos||{})}; delete logos[orgKey];
    setProcessing("Removing logo...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),logos}});
    setProcessing(null); notify("Logo removed.",C.textD);
  };
  const addAgency=async()=>{
    if(!agencyName.trim()) return;
    const agencies={...(orgChart?.agencies||{})};
    const list=[...(agencies[selOrg]||[]),{id:"ag_"+uid(),name:agencyName.trim(),logo:null}];
    setProcessing("Adding agency...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies:{...agencies,[selOrg]:list}}});
    setProcessing(null); notify(agencyName+" added.",C.gold); setAgencyName("");
  };
  const removeAgency=async(orgKey,agId)=>{
    const agencies={...(orgChart?.agencies||{})};
    agencies[orgKey]=(agencies[orgKey]||[]).filter(a=>a.id!==agId);
    setProcessing("Removing...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
    setProcessing(null); notify("Agency removed.",C.textD);
  };
  const saveAgencyLeader=async(orgKey,agId,leaderTitle,leaderName)=>{
    const agencies={...(orgChart?.agencies||{})};
    agencies[orgKey]=(agencies[orgKey]||[]).map(a=>a.id===agId?{...a,leaderTitle,leaderName}:a);
    setProcessing("Saving...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
    setProcessing(null); notify("Leader updated.",C.gold);
  };
  const uploadAgencyLogo=async(orgKey,agId,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{
      const agencies={...(orgChart?.agencies||{})};
      agencies[orgKey]=(agencies[orgKey]||[]).map(a=>a.id===agId?{...a,logo:e.target.result}:a);
      setProcessing("Uploading...");
      await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
      setProcessing(null); notify("Agency logo set.",C.gold);
    };
    reader.readAsDataURL(file);
  };

  const curLogo=(orgChart?.logos||{})[selOrg];
  const curAgencies=(orgChart?.agencies||{})[selOrg]||[];

  return (
    <div>
      <STitle>Government Chart</STitle>
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem",maxWidth:500}}>
        <div><FL>ORGANISATION</FL>
          <DD value={selOrg} onChange={v=>{setSelOrg(v);setAgencyName("");}} options={ORG_OPTIONS}/>
        </div>
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem"}}>
          <FL>LOGO</FL>
          <div style={{display:"flex",alignItems:"center",gap:"0.75rem",flexWrap:"wrap",marginBottom:6}}>
            {curLogo
              ?<><img src={curLogo} alt="" style={{width:44,height:44,objectFit:"contain",border:`1px solid ${C.border}`,borderRadius:3,background:"#111",padding:2}}/>
                <Btn variant="danger" small onClick={()=>clearLogo(selOrg)}>Remove</Btn></>
              :<span style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>No logo set</span>
            }
            <label style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",
                            padding:"5px 14px",border:`1px solid ${C.gold}55`,borderRadius:2,cursor:"pointer",
                            background:"#2a2000",color:C.gold}}>
              Upload
              <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadLogo(selOrg,e.target.files[0])}/>
            </label>
          </div>
          <div style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>PNG or SVG recommended. Shown at 32x32 on the chart.</div>
        </div>

        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem"}}>
          <FL>AGENCIES / SUB-UNITS</FL>
          {curAgencies.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:"0.75rem"}}>
              {curAgencies.map(a=>(
                <AgencyEditorRow key={a.id} a={a} selOrg={selOrg}
                  uploadAgencyLogo={uploadAgencyLogo}
                  removeAgency={removeAgency}
                  saveAgencyLeader={saveAgencyLeader}/>
              ))}
            </div>
          )}
          {curAgencies.length===0&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic",marginBottom:"0.6rem"}}>No sub-units added.</div>}
          <div style={{display:"flex",gap:8}}>
            <Inp value={agencyName} onChange={setAgencyName} placeholder="Agency or sub-unit name" style={{flex:1}}/>
            <Btn variant="gold" disabled={!agencyName.trim()} onClick={addAgency}>+ Add</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── Legislative Record ───────────────────────────────────────────────────────
function LegislativeRecord({bills,members,bundesherren,ijStatutes,ijCases}) {
  const [view,setView]=useState("floor"); // "floor" | "archive"

  const floorBills=Object.values(bills||{})
    .filter(b=>["pending","pending_bh","pending_emperor","docket","bt_voting","bh_voting","ratification","returned"].includes(b.status))
    .sort((a,b)=>{
      const order=["bt_voting","bh_voting","ratification","returned","docket","pending","pending_bh","pending_emperor"];
      return order.indexOf(a.status)-order.indexOf(b.status)||b.created-a.created;
    });

  return (
    <div>
      {/* Sub-selector */}
      <div style={{display:"flex",gap:0,marginBottom:"1.5rem",background:C.s2,borderRadius:3,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {[
          {id:"floor",  icon:"🏛", label:"Bundeskongress Floor", desc:"Bills currently in the legislative process"},
          {id:"archive",icon:"📜", label:"Archive",               desc:"Bills no longer in progress"},
        ].map(opt=>{
          const active=view===opt.id;
          return (
            <div key={opt.id} onClick={()=>setView(opt.id)}
              style={{flex:1,padding:"0.85rem 1.1rem",cursor:"pointer",
                       background:active?`linear-gradient(135deg,${C.gold}14,transparent)`:C.s2,

}

// ── Imperial Announcement Banner ─────────────────────────────────────────────
const ANNOUNCEMENT_TONES = [
  { v:"neutral",    l:"Neutral",    icon:"📜", bg:"#1a1610", border:"#5a5030", text:"#d0c890", accent:"#a09060" },
  { v:"positive",   l:"Positive",   icon:"⚜",  bg:"#0e1a0e", border:"#2a5a2a", text:"#a0d0a0", accent:"#60c060" },
  { v:"cautionary", l:"Cautionary", icon:"⚠",  bg:"#1a1400", border:"#6a5000", text:"#e0b860", accent:"#c09030" },
  { v:"alert",      l:"Alert",      icon:"🚨", bg:"#1a0808", border:"#6a1a1a", text:"#e08080", accent:"#c03030" },
];

function AnnouncementBanner({announcement,tab}) {
  const [dismissed,setDismissed]=useState(false);
  const prevAnn=useRef(null);

  // Reset dismissed when announcement changes
  useEffect(()=>{
    if(announcement?.text!==prevAnn.current) { setDismissed(false); prevAnn.current=announcement?.text; }
  },[announcement]);

  if(!announcement?.text||dismissed) return null;
  const pages=announcement.pages||["home","bundestag","bundesherren","submit","panel"];
  if(!pages.includes(tab)&&!pages.includes("all")) return null;

  const tone=ANNOUNCEMENT_TONES.find(t=>t.v===announcement.tone)||ANNOUNCEMENT_TONES[0];

  return (
    <div style={{background:tone.bg,borderTop:`1px solid ${tone.border}`,borderBottom:`3px solid ${tone.border}`,
                  position:"relative",animation:"fadeUp .3s ease"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"0.75rem 1rem",
                   display:"flex",alignItems:"flex-start",gap:12}}>
        <span style={{fontSize:20,flexShrink:0,marginTop:1,filter:`drop-shadow(0 0 6px ${tone.accent}88)`}}>{tone.icon}</span>
        <div style={{flex:1,minWidth:0}}>
          {announcement.title&&(
            <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.18em",
                          color:tone.accent,textTransform:"uppercase",marginBottom:3,fontWeight:700}}>
              {announcement.title}
            </div>
          )}
          <div style={{fontSize:14,color:tone.text,lineHeight:1.7}}>{announcement.text}</div>
        </div>
        <button onClick={()=>setDismissed(true)}
          style={{background:"transparent",border:"none",color:tone.accent,cursor:"pointer",
                   fontSize:16,lineHeight:1,flexShrink:0,opacity:0.7,padding:"2px 4px",marginTop:1}}
          title="Dismiss">✕</button>
      </div>
    </div>
  );
}
