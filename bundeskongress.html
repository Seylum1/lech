// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("home");
  const [members,setMembers]=useState({});
  const [bundesherren,setBH]=useState({});
  const [officials,setOff]=useState({});
  const [formerMembers,setFormerMembers]=useState({});
  const [accounts,setAccounts]=useState({});
  const [parties,setParties]=useState({});
  const [digitalVoting,setDigitalVoting]=useState({bt:false,bh:false});
  const [governments,setGovernments]=useState({});
  const [ihHonours,setIhHonours]=useState({});
  const [ijAppointments,setIjAppointments]=useState({});
  const [ijJudgments,setIjJudgments]=useState({});
  const [mowPersonnel,setMowPersonnel]=useState({});
  const [factsheet,setFactsheet]=useState(null);
  // Seeded from the cached session so the page paints signed-in at once; the
  // restore effect below reconciles it against the server.
  const [user,setUser]=useState(()=>cachedAccount());
  const [bills,setBills]=useState({});
  // Press releases already issued, so an officeholder can see and redact their own.
  const [pressReleases,setPressReleases]=useState({});
  const [orgChart,setOrgChart]=useState({});
  const [session,setSession]=useState(null);
  const [absences,setAbsences]=useState({});
  const [nextElection,setNextElection]=useState(null);
  const [announcement,setAnnouncement]=useState(null);
  const [activeBudget,setActiveBudget]=useState(null);
  const [budgetCooldown,setBudgetCooldown]=useState(null);
  const [submitLock,setSubmitLock]=useState(null);
  const [imperialReserve,setImperialReserve]=useState(0);
  const [imperialLinks,setImperialLinks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [ijStatutes,setIjStatutes]=useState({});
  const [ijCases,setIjCases]=useState({});
  const [toast,setToast]=useState({msg:"",color:C.green});
  const [processing,setProcessing]=useState(null);
  const [showLogin,setShowLogin]=useState(false);


  const notify=useCallback((msg,color=C.green)=>{
    setToast({msg,color});
    setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  // Restore a session signed in on another page (validated server-side). Standing
  // and panel access follow the account, so no extra gate is needed here.
  // clearSession() drops AUTH_TOKEN, so a null account with no token left means the
  // server genuinely rejected it — sign the optimistic user back out. A null with
  // the token still held is just an unreachable server; keep showing them signed in.
  useEffect(()=>{srestore().then(acc=>{if(acc)setUser(acc);else if(!AUTH_TOKEN)setUser(null);});},[]);

  useEffect(()=>{
    (async()=>{
      // Single fetch — pull everything at once instead of 11 round-trips
      const raw = await sgetAll("");
      const g = (k) => { try { return raw[k] ? raw[k] : null; } catch{ return null; } };
      const m=g("bk_members"), bh=g("bk_bh"), off=g("bk_officials"),
            oc=g("bk_orgchart"), sess=g("bk_session"), ann=g("bk_announcement"),
            ab=g("bk_active_budget"), bc=g("bk_budget_cooldown"), sl=g("bk_submit_lock"),
            ir=g("bk_imperial_reserve"), il=g("bk_imperial_links"),
            abs=g("bk_absences"), elec=g("bk_next_election"), fm=g("bk_former_members"),
            govs=g("bk_governments"), pty=g("bk_parties"), dv=g("bk_digital_voting");
      const billsRaw={}, logoRaw={}, relRaw={};
      Object.entries(raw||{}).forEach(([k,v])=>{
        if(k.startsWith("bk_bill_")) billsRaw[k]=v;
        else if(k.startsWith("bk_logo_")) logoRaw[k]=v;
        else if(k.startsWith("press_article_")&&v&&v.pressRelease&&v.id) relRaw[v.id]=v;
      });
      setPressReleases(relRaw);
      setMembers(m||{}); setBH(bh||{}); setOff(off||{}); setFormerMembers(fm||{});
      setGovernments(govs||{});
      setDigitalVoting({bt:!!dv?.bt,bh:!!dv?.bh});
      // Seed the registry from the original hardcoded parties when none are
      // stored, so nothing has to be re-entered and existing member.party ids
      // keep resolving. Seeded in memory only — this page is public, and a
      // visitor merely loading it must not write to the register. The seed is
      // persisted the first time the Throne saves a party.
      let ptyMap=pty&&Object.keys(pty).length?pty:null;
      if(!ptyMap){
        ptyMap={};
        SEED_PARTIES.forEach((p,i)=>{ ptyMap[p.id]={...p,order:i,founded:""}; });
      }
      setParties(ptyMap); setPartyRegistry(ptyMap);
      // Re-hydrate logos from separate keys back into orgChart
      const ocBase=oc||{};
      const logos={};
      const agLogos={};
      Object.entries(logoRaw||{}).forEach(([k,v])=>{
        if(k.startsWith("bk_logo_ag_")) agLogos[k.replace("bk_logo_ag_","")]=v;
        else logos[k.replace("bk_logo_","")]=v;
      });
      const hydratedAgencies={};
      Object.entries(ocBase.agencies||{}).forEach(([org,list])=>{
        hydratedAgencies[org]=(list||[]).map(a=>({...a,logo:agLogos[a.id]||null}));
      });
      setOrgChart({...ocBase,logos,agencies:hydratedAgencies});
      setSession(sess||null);
      setAnnouncement(ann||null);
      setActiveBudget(ab||null);
      setBudgetCooldown(bc||null);
      setSubmitLock(sl||null);
      setImperialReserve(ir||0);
      setImperialLinks(il||[]);
      setAbsences(abs||{});
      setNextElection(elec||null);
      const bmap={};
      Object.values(billsRaw||{}).forEach(b=>{ if(b?.id) bmap[b.id]=b; });
      setBills(bmap); 
      // The shared ministry backend holds IJ records and the MOI account
      // register (mi_acc_*). The Bundeskongress only ever reads accounts —
      // permissions are granted in the Ministry of the Interior.
      // IJ records, honours, and the MOI account register all arrive in the same
      // snapshot now — the Bundeskongress still only reads accounts; permissions
      // are granted in the Ministry of the Interior.
      try {
        const parse=(k)=> raw[k]||{};
        setIjStatutes(parse("ij_statutes"));
        setIjCases(parse("ij_cases"));
        setIjJudgments(parse("ij_judgments"));
        setIhHonours(parse("ih_honours"));
        setIjAppointments(parse("ij_appointments"));
        setMowPersonnel(parse("mow_personnel"));
        const accs={};
        Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{ if(!accs[k]) accs[k]=v; });
        setAccounts(accs);
      } catch(e){}
      setLoading(false);
    })();
  },[]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="saveOfficials"){
      setOff(payload); await sset("bk_officials",payload);
    }
    else if(type==="issuePressRelease"){
      // Published as a Gazette article so it appears on the Press page at once;
      // the server verifies the issuer actually holds this office.
      const id="rel_"+uid();
      const now=Date.now();
      const rec={ id, pressRelease:true, office:payload.office, seal:payload.seal||"",
        signStyle:payload.style, signName:payload.name, signPost:payload.post,
        headline:payload.headline, body:payload.body,
        refNo:"COMM-"+new Date(now).getFullYear()+"-"+String(now).slice(-4),
        byline:"Office of the "+payload.office, dateline:"KINGSLAND",
        section:"Official", status:"published", created:now, publishedAt:now,
        issuedByUsername:(user&&user.username)||"" };
      await sset("press_article_"+id, rec);
      setPressReleases(p=>({...p,[id]:rec}));
    }
    else if(type==="redactPressRelease"){
      // A redaction erases the communiqué outright — it leaves the Gazette with
      // it. The server re-checks that the actor still holds the issuing office.
      const {id}=payload;
      await sdel("press_article_"+id);
      setPressReleases(p=>{ const n={...p}; delete n[id]; return n; });
    }
    else if(type==="importMembers"){
      // Member identity must be stable. This previously minted a fresh
      // "m_<timestamp>_<i>" id for every row, which orphaned every existing
      // vote key and blanked the voting record of the whole chamber on import.
      // An MOI-linked member is keyed by username; otherwise we reuse the id of
      // the sitting member with the same name, and only mint an id for someone
      // genuinely new.
      const byName={};
      Object.values(members||{}).forEach(m=>{ byName[(m.name||"").toLowerCase()]=m; });
      const next={};
      payload.members.forEach(m=>{
        const existing=(m.username&&members[memberKey(m.username)])||byName[(m.name||"").toLowerCase()];
        const id=m.username?memberKey(m.username):(existing?.id||"m_"+uid());
        next[id]={...(existing||{}),id,name:m.name,party:m.partyId||m.party,seats:m.seats,
          username:m.username||existing?.username||""};
      });
      // Anyone dropped by the import is retired, not erased.
      const retired={...formerMembers};
      Object.entries(members||{}).forEach(([id,m])=>{
        if(!next[id]) retired[id]={...m,departed_at:Date.now(),departed_reason:"Left the chamber at import"};
      });
      setFormerMembers(retired); await sset("bk_former_members",retired);
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="setDigitalVoting"){
      const next={...digitalVoting,...payload};
      setDigitalVoting(next); await sset("bk_digital_voting",next);
    }
    else if(type==="castVote"){
      // A member recording their own vote. The same snapshot the presidents'
      // recorder writes is kept, so the seat weight is frozen as cast and the
      // vote survives the member later leaving the chamber.
      const {billId,chamber,voterId,vote}=payload;
      const bill=bills[billId]; if(!bill) return;
      const roster=chamber==="bt"?members:bundesherren;
      const who=roster[voterId]; if(!who) return;
      const votes={...(bill[chamber+"_votes"]||{}),[voterId]:vote};
      const snapKey=chamber+"_vote_names";
      const snapshot={...(bill[snapKey]||{}),
        [voterId]:chamber==="bt"
          ?{name:who.name,seats:who.seats,party:who.party,username:who.username||""}
          :{name:who.name,rank:who.rank,username:who.username||""}};
      const next={...bill,[chamber+"_votes"]:votes,[snapKey]:snapshot};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="linkAccount"){
      // Attach an account to a member who is already seated, keeping their id.
      // This is the correct way to link an existing member: because the record
      // keeps its id, every vote already cast under it stays theirs. Using a
      // by-election for this instead splits the person across two records.
      const {id,username,name}=payload;
      const m=members[id]; if(!m) return;
      const next={...members,[id]:{...m,username,name:name||m.name,
        aliases:Array.from(new Set([...(m.aliases||[]),id]))}};
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="linkBHAccount"){
      const {id,username,name}=payload;
      const b=bundesherren[id]; if(!b) return;
      const next={...bundesherren,[id]:{...b,username,name:name||b.name,
        aliases:Array.from(new Set([...(b.aliases||[]),id]))}};
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="mergeRecord"){
      // Adopt a former record as the same person, so its votes resolve to them.
      const {id,formerId}=payload;
      const m=members[id]||bundesherren[id]; if(!m||!formerMembers[formerId]) return;
      const merged={...m,aliases:Array.from(new Set([...(m.aliases||[]),formerId,
        ...(formerMembers[formerId].aliases||[])]))};
      if(members[id]){ const next={...members,[id]:merged}; setMembers(next); await sset("bk_members",next); }
      else { const next={...bundesherren,[id]:merged}; setBH(next); await sset("bk_bh",next); }
    }
    else if(type==="changeParty"){
      const {id,party}=payload;
      const m=members[id]; if(!m) return;
      const next={...members,[id]:{...m,party,
        partyHistory:Array.from(new Set([...(m.partyHistory||[m.party].filter(Boolean)),party]))}};
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="saveParty"){
      const {party}=payload;
      const id=party.id||("party_"+uid());
      const next={...parties,[id]:{...party,id}};
      setParties(next); setPartyRegistry(next); await sset("bk_parties",next);
    }
    else if(type==="deleteParty"){
      const next={...parties}; delete next[payload.id];
      setParties(next); setPartyRegistry(next); await sset("bk_parties",next);
    }
    else if(type==="seatMember"){
      // Seat a member selected from the MOI register (or an unlinked plain name).
      const {username,name,party,seats}=payload;
      const id=username?memberKey(username):"m_"+uid();
      const next={...members,[id]:{id,name,party,seats,username:username||""}};
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="removeMember"){
      // Retire to the former-members registry so past votes still resolve.
      const m=members[payload.id]; if(!m) return;
      const retired={...formerMembers,[payload.id]:{...m,departed_at:Date.now(),
        departed_reason:payload.reason||"Left the chamber"}};
      setFormerMembers(retired); await sset("bk_former_members",retired);
      const next={...members}; delete next[payload.id];
      setMembers(next); await sset("bk_members",next);
      // Someone who no longer holds a seat cannot preside over the chamber.
      if(m.username&&officials?.president_bt_username===m.username){
        const newOff={...officials,president_bt:"Vacant",president_bt_username:""};
        setOff(newOff); await sset("bk_officials",newOff);
        notify("🏛 "+m.name+" also vacated the Bundestag presidency.",C.gold);
      }
    }
    else if(type==="byElection"){
      const {departingId,newName,newParty,newUsername}=payload;
      const old=members[departingId]; if(!old) return;
      const next={...members};
      const nid=newUsername?memberKey(newUsername):"m_"+uid();
      next[nid]={id:nid,name:newName,party:newParty,seats:old.seats,username:newUsername||""};
      delete next[departingId];
      // The departing member keeps their record; their prior votes resolve
      // through the registry instead of decaying to "Former Member".
      const retired={...formerMembers,[departingId]:{...old,departed_at:Date.now(),
        departed_reason:"Replaced by by-election"}};
      setFormerMembers(retired); await sset("bk_former_members",retired);
      setMembers(next); await sset("bk_members",next);
    }
    else if(type==="addBH"){
      const id=payload.username?bhKey(payload.username):"bh_"+uid();
      const next={...bundesherren,[id]:{id,name:payload.name,title:payload.title,
        rank:payload.rank||"",username:payload.username||""}};
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="removeBH"){
      // Retire rather than delete — their votes must remain attributable.
      const b=bundesherren[payload.id]; if(!b) return;
      const retired={...formerMembers,[payload.id]:{...b,departed_at:Date.now(),
        departed_reason:payload.reason||"Left the Bundesherren"}};
      setFormerMembers(retired); await sset("bk_former_members",retired);
      const next={...bundesherren}; delete next[payload.id];
      setBH(next); await sset("bk_bh",next);
      if(b.username&&officials?.president_bh_username===b.username){
        const newOff={...officials,president_bh:"Vacant",president_bh_username:""};
        setOff(newOff); await sset("bk_officials",newOff);
        notify("🏰 "+b.name+" also vacated the Bundesherren presidency.",C.gold);
      }
    }
    else if(type==="updateBHRank"){
      const next={...bundesherren,[payload.id]:{...bundesherren[payload.id],rank:payload.rank}};
      setBH(next); await sset("bk_bh",next);
    }
    else if(type==="submitBudget"){
      const id="bill_"+uid();
      const billType=payload.budgetType==="supplementary"?"budget_supplementary":"budget";
      const bill={id,title:payload.title,type:billType,gdoc_url:"",origin:"bt",
        submitter:payload.submitter,nominee:"",portfolio:"",category:"",
        budgetData:payload.data,
        budgetReserve:imperialReserve??null,
        status:"pending",created:Date.now(),bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,ratified_at:null,failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="voidBudget"){
      if(!activeBudget) return;
      const next={...activeBudget,voided_at:Date.now()};
      setActiveBudget(next); await sset("bk_active_budget",next);
      // Clear cooldown so new budget can be submitted immediately
      setBudgetCooldown(null); await sdel("bk_budget_cooldown");
      notify("⚠ Budget voided by Imperial Decree. A new budget may be submitted immediately.",C.gold);
    }
    else if(type==="submitBill"){
      const origin=payload.origin||"bt";
      // 25 bill cap — count bills pending at each president's queue
      const pendingBT=Object.values(bills||{}).filter(b=>b.status==="pending").length;
      const pendingBH=Object.values(bills||{}).filter(b=>b.status==="pending_bh").length;
      if(origin==="bh"&&pendingBH>=25) return "cap";
      if(origin==="bt"&&pendingBT>=25) return "cap";
      const id="bill_"+uid();
      const isBHNom=payload.type==="appoint_bh_pres";
      const isBTNom=["appoint_bt_pres","appoint_chancellor","nominate_minister","appoint_prosecutor_general"].includes(payload.type);
      let status;
      if(origin==="bh") status="pending_bh";
      else if(isBTNom) status="pending_emperor";
      else status="pending";
      const bill={id,title:payload.title,type:payload.type,gdoc_url:payload.gdoc_url||"",origin,
        submitter:payload.submitter,submitterUsername:payload.submitterUsername||"",
        nominee:payload.nominee||"",nomineeUsername:payload.nomineeUsername||"",
        cosponsors:payload.cosponsors||undefined,
        portfolio:payload.portfolio||"",category:payload.category||"",
        motion_text:payload.motion_text||"",motion_scope:payload.motion_scope||"",
        repeal_on_pass:payload.repeal_on_pass&&payload.repeal_on_pass.length>0?payload.repeal_on_pass:undefined,
        status,created:Date.now(),bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,ratified_at:null,failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="approveBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"docket"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="approveBHBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"bh_voting"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="emperorApproveBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"docket"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="saveVotes"){
      const {billId,votes,chamber}=payload;
      const bill=bills[billId]; if(!bill) return;
      // Snapshot voter names/seats/party at save time so they survive membership changes
      // Always refresh the snapshot entry so name/seat changes from by-elections are captured
      const snapshotKey=chamber+"_vote_names";
      const existing=bill[snapshotKey]||{};
      const snapshot={...existing};
      Object.keys(votes).forEach(id=>{
        if(chamber==="bt"&&members[id]){
          snapshot[id]={name:members[id].name,seats:members[id].seats,party:members[id].party,
            username:members[id].username||""};
        } else if(chamber==="bh"&&bundesherren[id]){
          snapshot[id]={name:bundesherren[id].name,rank:bundesherren[id].rank,
            username:bundesherren[id].username||""};
        }
        // If member no longer exists and no snapshot, preserve whatever we had
      });
      const next={...bill,[chamber+"_votes"]:votes,[snapshotKey]:snapshot};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="closeBTVote"){
      const {billId,result}=payload;
      const bill=bills[billId]; if(!bill) return;
      const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
      // BH-originated bills already had their BH vote — go straight to ratification
      const isMotionBill=bill.type==="motion";
      const dualMotion=isMotionBill&&bill.motion_scope==="dual";
      let nextStatus;
      if(isMotionBill){
        nextStatus=result.passed?(dualMotion&&bill.origin!=="bh"?"bh_voting":"motion_passed"):"motion_failed";
      } else {
        nextStatus=result.passed
          ?(bill.origin==="bh"?"ratification":(bt.skipBH?"ratification":"bh_voting"))
          :"failed_bt";
      }
      const next={...bill,bt_result:{...result,closed_at:Date.now()},status:nextStatus,
        ratified_at:nextStatus==="motion_passed"?Date.now():null,
        failed_at:nextStatus==="motion_failed"?Date.now():null};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="closeBHVote"){
      const {billId,result}=payload;
      const bill=bills[billId]; if(!bill) return;
      const btDef=BILL_TYPES[bill.type]||BILL_TYPES.regular;
      // BH-originated: pass → BT (unless appoint_bh_pres which skips BT → ratification)
      // BT-originated: pass → ratification (BH is the second chamber)
      const isMotionBill2=bill.type==="motion";
      const dualMotion2=isMotionBill2&&bill.motion_scope==="dual";
      let nextStatus;
      if(isMotionBill2){
        nextStatus=result.passed?(dualMotion2&&bill.origin==="bh"?"pending":"motion_passed"):"motion_failed";
      } else {
        nextStatus=result.passed
          ?(bill.origin==="bh"?(btDef.bhOrigin?"ratification":"pending"):"ratification")
          :"failed_bh";
      }
      const next={...bill,bh_result:{...result,closed_at:Date.now()},status:nextStatus,
        ratified_at:nextStatus==="motion_passed"?Date.now():null,
        failed_at:nextStatus==="motion_failed"?Date.now():null};
      setBills(p=>({...p,[billId]:next}));
      await sset("bk_bill_"+billId,next);
    }
    else if(type==="updateBillDoc"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,gdoc_url:payload.gdoc_url};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Document link updated.",C.gold);
    }
    else if(type==="requeueBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const returnStatus=bill.return_to==="bh"?"pending_bh":"pending";
      const next={...bill,status:returnStatus};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="pullBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"pulled",pulled_at:Date.now(),pull_reason:payload.reason||"",pulled_by:"emperor"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill pulled from floor.",C.gold);
    }
    else if(type==="migrateGrandfatheredStatus"){
      // Fix old records that used grandfathered/grandfathered_repealed as status
      const toFix=Object.values(bills||{}).filter(b=>b.status==="grandfathered"||b.status==="grandfathered_repealed");
      if(toFix.length===0) return 0;
      const next={...bills};
      toFix.forEach(b=>{
        const newStatus=b.status==="grandfathered_repealed"?"repealed":"passed";
        next[b.id]={...b,status:newStatus,grandfathered:true};
      });
      setBills(next);
      for(let i=0;i<toFix.length;i+=5){
        const batch=toFix.slice(i,i+5);
        await Promise.all(batch.map(b=>sset("bk_bill_"+b.id,next[b.id])));
      }
      return toFix.length;
    }
    else if(type==="correctDatabase"){
      const gfBills=Object.values(bills||{}).filter(b=>b.grandfathered&&b.status);
      if(gfBills.length===0) return 0;
      const updates=gfBills.filter(b=>GF_LINKS[b.title]&&b.gdoc_url!==GF_LINKS[b.title]);
      if(updates.length===0) return 0;
      const next={...bills};
      updates.forEach(b=>{ next[b.id]={...b,gdoc_url:GF_LINKS[b.title]}; });
      setBills(next);
      for(let i=0;i<updates.length;i+=5){
        const batch=updates.slice(i,i+5);
        await Promise.all(batch.map(b=>sset("bk_bill_"+b.id,next[b.id])));
      }
      return updates.length;
    }
    else if(type==="reimportMissingGrandfathered"){
      const existingTitles=new Set(Object.values(bills||{}).filter(b=>b.grandfathered).map(b=>b.title));
      const missing=GRANDFATHERED_BILLS.filter(b=>!existingTitles.has(b.title));
      if(missing.length===0) return "none_missing";
      const now=Date.now();
      const newBills={...bills};
      const billList=[];
      missing.forEach((b,i)=>{
        const id="bill_gf_re_"+i+"_"+uid();
        const bill={id,title:b.title,type:b.type,category:b.category,gdoc_url:"",origin:"bt",
          submitter:"Pre-System Record",nominee:"",portfolio:"",
          status:b.status,created:now-(missing.length-i)*1000,
          grandfathered:true,bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
          ratified_at:now-(missing.length-i)*1000,failed_at:null};
        newBills[id]=bill;
        billList.push({id,bill});
      });
      setBills(newBills);
      for(let i=0;i<billList.length;i+=5){
        const batch=billList.slice(i,i+5);
        await Promise.all(batch.map(({id,bill})=>sset("bk_bill_"+id,bill)));
      }
      return missing.length;
    }
    else if(type==="importGrandfathered"){
      const existing=Object.values(bills||{}).filter(b=>b.status==="grandfathered"||b.status==="grandfathered_repealed");
      if(existing.length>0) return "already_imported";
      const now=Date.now();
      const newBills={...bills};
      const billList=[];
      GRANDFATHERED_BILLS.forEach((b,i)=>{
        const id="bill_gf_"+i+"_"+uid();
        const bill={id,title:b.title,type:b.type,category:b.category,gdoc_url:"",origin:"bt",
          submitter:"Pre-System Record",nominee:"",portfolio:"",
          status:b.status,created:now-(GRANDFATHERED_BILLS.length-i)*1000,
          grandfathered:true,bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
          ratified_at:now-(GRANDFATHERED_BILLS.length-i)*1000,failed_at:null};
        newBills[id]=bill;
        billList.push({id,bill});
      });
      setBills(newBills);
      // Write sequentially in batches of 5 to avoid Apps Script throttling
      for(let i=0;i<billList.length;i+=5){
        const batch=billList.slice(i,i+5);
        await Promise.all(batch.map(({id,bill})=>sset("bk_bill_"+id,bill)));
      }
      return "ok";
    }
    else if(type==="denyBill"){
      const next={...bills}; delete next[payload.billId];
      setBills(next);
      await sdel("bk_bill_"+payload.billId);
    }
    else if(type==="pullBillByPresident"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"pulled",pulled_at:Date.now(),pull_reason:payload.reason||"",pulled_by:payload.pulled_by||"bt_president"};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="vetoBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"vetoed",vetoed_at:Date.now(),veto_reason:payload.reason||""};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill vetoed.",C.redL);
    }
    else if(type==="returnBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const returnTo=bill.origin==="bh"?"bh":"bt";
      const next={...bill,status:"returned",returned_at:Date.now(),return_notes:payload.notes||"",
        bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,return_count:(bill.return_count||0)+1,
        return_to:returnTo};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      notify("Bill returned to "+(returnTo==="bh"?"Bundesherren":"Bundestag")+" for revisions.",C.gold);
    }
    else if(type==="ratifyBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"passed",ratified_at:Date.now()};
      beginTx();
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
      // Budget activation
      if(bill.type==="budget"||bill.type==="budget_supplementary"){
        const ratifiedAt=Date.now();
        const validUntil=budgetValidUntil(ratifiedAt);
        const ab={id:bill.id,title:bill.title,submitter:bill.submitter,
          ratified_at:ratifiedAt,valid_until:validUntil,type:bill.type,
          data:bill.budgetData||{},reserve:imperialReserve};
        setActiveBudget(ab); await sset("bk_active_budget",ab);
        const cd={until:budgetCooldownUntil(ratifiedAt),voided:false};
        setBudgetCooldown(cd); await sset("bk_budget_cooldown",cd);
        notify("💰 Budget ratified — active until "+fmtDate(validUntil)+".",C.gold);
      }
      // Auto-update officials for appointment bills. Newer bills carry the
      // nominee's account; older ones only have a name, so fall back to matching.
      const nomUser=bill.nomineeUsername||usernameForName(bill.nominee,members,bundesherren,accounts);
      if(bill.type==="appoint_bt_pres"&&bill.nominee){
        const newOff={...(officials||{}),president_bt:bill.nominee,president_bt_username:nomUser};
        setOff(newOff); await sset("bk_officials",newOff);
        notify(nomUser
          ?"🏛 "+bill.nominee+" is now President of the Bundestag — panel granted."
          :"🏛 "+bill.nominee+" is now President of the Bundestag. No matching account found, so no panel was granted.",C.gold);
      }
      if(bill.type==="appoint_chancellor"&&bill.nominee){
        const newOff={...(officials||{}),chancellor:bill.nominee,chancellor_username:nomUser};
        setOff(newOff); await sset("bk_officials",newOff);
      }
      if(bill.type==="nominate_minister"&&bill.nominee&&bill.portfolio){
        const newOff={...(officials||{}),
          ministers:{...(officials?.ministers||{}),[bill.portfolio]:bill.nominee},
          minister_usernames:{...(officials?.minister_usernames||{}),[bill.portfolio]:nomUser}};
        setOff(newOff); await sset("bk_officials",newOff);
        notify("🎖 "+bill.nominee+" appointed as "+bill.portfolio+".",C.gold);
      }
      // The Prosecutor General is an office of the Judiciary, so a ratified
      // nomination is written into the Judiciary's own appointments register on
      // the shared backend. Any sitting Prosecutor General is replaced.
      if(bill.type==="appoint_prosecutor_general"&&bill.nominee){
        const appts=await sgetMain("ij_appointments")||{};
        const next={};
        Object.entries(appts).forEach(([k,a])=>{ if(a?.role!=="pg") next[k]=a; });
        const id="appt_"+uid();
        next[id]={id,name:bill.nominee,username:nomUser||"",role:"pg",
          since:new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})};
        const ok=await ssetMain("ij_appointments",next);
        notify(ok
          ?"⚖ "+bill.nominee+" appointed Public Prosecutor General — recorded in the Judiciary."
          :"⚖ "+bill.nominee+" ratified, but the Judiciary could not be reached. Record the appointment there manually.",
          ok?C.gold:C.redL);
      }
      if(bill.type==="appoint_bh_pres"&&bill.nominee){
        const newOff={...(officials||{}),president_bh:bill.nominee,president_bh_username:nomUser};
        setOff(newOff); await sset("bk_officials",newOff);
        notify(nomUser
          ?"🏰 "+bill.nominee+" is now President of the Bundesherren — panel granted."
          :"🏰 "+bill.nominee+" is now President of the Bundesherren. No matching account found, so no panel was granted.",C.gold);
      }
      // Dissolve Government
      if(bill.type==="dissolve_government"){
        const newOff={...(officials||{}),chancellor:"Vacant",chancellor_username:"",
          ministers:{},minister_usernames:{},
          president_bt:"Vacant",president_bt_username:""};
        Object.keys(newOff).forEach(k=>{ if(k.startsWith("vice")) delete newOff[k]; });
        newOff.vice_chancellor="Vacant";
        setOff(newOff); await sset("bk_officials",newOff);
        // Retire the chamber to the former-members registry rather than dropping
        // it — every vote these members ever cast resolves through that registry.
        const retired={...formerMembers};
        Object.entries(members||{}).forEach(([id,m])=>{
          retired[id]={...m,departed_at:Date.now(),departed_reason:"Government dissolved"};
        });
        setFormerMembers(retired); await sset("bk_former_members",retired);
        setMembers({}); await sset("bk_members",{});
        notify("🏚 Government dissolved — all members and ministers dismissed. Records retained. Start an election.",C.redL);
      }
      // Auto-repeal any bills flagged for repeal
      if(bill.repeal_on_pass&&bill.repeal_on_pass.length>0){
        for(const rId of bill.repeal_on_pass){
          const rb=bills[rId]; if(!rb||rb.status==="repealed") continue;
          const rNext={...rb,status:"repealed",repealed_at:Date.now(),repealed_by:bill.id,repealed_by_title:bill.title};
          setBills(p=>({...p,[rId]:rNext}));
          await sset("bk_bill_"+rId,rNext);
        }
        notify("🚫 "+bill.repeal_on_pass.length+" law"+(bill.repeal_on_pass.length!==1?"s":"")+" repealed upon ratification.",C.redL);
      }
      commitTx();
    }
    else if(type==="appointMinister"){
      // `ministers` stays a portfolio→name map for display; the parallel
      // username map is what links the office back to an account.
      const {portfolio,name,username}=payload;
      const newOff={...(officials||{}),
        ministers:{...(officials?.ministers||{}),[portfolio]:name},
        minister_usernames:{...(officials?.minister_usernames||{}),[portfolio]:username||""}};
      setOff(newOff); await sset("bk_officials",newOff);
    }
    else if(type==="dismissMinister"){
      const {portfolio}=payload;
      const newOff={...(officials||{}),
        ministers:{...(officials?.ministers||{}),[portfolio]:"Vacant"},
        minister_usernames:{...(officials?.minister_usernames||{}),[portfolio]:""}};
      setOff(newOff); await sset("bk_officials",newOff);
      notify("🎖 "+portfolio+" rendered vacant.",C.gold);
    }
    else if(type==="repealBill"){
      const bill=bills[payload.billId]; if(!bill) return;
      const next={...bill,status:"repealed",repealed_at:Date.now()};
      setBills(p=>({...p,[payload.billId]:next}));
      await sset("bk_bill_"+payload.billId,next);
    }
    else if(type==="deleteBill"){
      const next={...bills}; delete next[payload.billId];
      setBills(next);
      await sdel("bk_bill_"+payload.billId);
    }
    else if(type==="saveDecree"){
      const id="bill_dec_"+uid();
      const bill={id,title:payload.title,type:"decree",gdoc_url:payload.gdoc_url||"",
        decree_text:payload.decree_text||"",decree_subtype:payload.decree_subtype||"decree",
        origin:"emperor",submitter:"Emperor",nominee:"",portfolio:"",category:"",
        status:"decree",created:Date.now(),grandfathered:false,
        bt_votes:{},bh_votes:{},bt_result:null,bh_result:null,
        ratified_at:Date.now(),failed_at:null};
      setBills(p=>({...p,[id]:bill}));
      return await sset("bk_bill_"+id,bill);
    }
    else if(type==="saveImperialReserve"){
      setImperialReserve(payload.amount||0);
      await sset("bk_imperial_reserve",payload.amount||0);
      notify("⚜ Imperial Reserve updated.",C.gold);
    }
    else if(type==="saveImperialLinks"){
      setImperialLinks(payload.links||[]);
      await sset("bk_imperial_links",payload.links||[]);
      notify("🔗 Imperial links updated.",C.gold);
    }
    else if(type==="saveSubmitLock"){
      const lock=payload.lock;
      setSubmitLock(lock); await sset("bk_submit_lock",lock);
      notify(lock?"Submissions locked.":"Submissions unlocked.",C.gold);
    }
    else if(type==="clearSubmitLock"){
      setSubmitLock(null); await sdel("bk_submit_lock");
      notify("Submissions unlocked.",C.gold);
    }
    else if(type==="saveAnnouncement"){
      const ann=payload.announcement;
      setAnnouncement(ann); await sset("bk_announcement",ann);
    }
    else if(type==="deleteAnnouncement"){
      setAnnouncement(null); await sdel("bk_announcement");
      notify("Announcement cleared.",C.gold);
    }
    else if(type==="saveOrgChart"){
      const {orgChart:oc}=payload;
      setOrgChart(oc);
      // Strip logos out of blob and save separately
      const {logos={},agencies={}, ...rest}=oc;
      // Save org logos separately
      const logoSaves=Object.entries(logos).map(([k,v])=>v?sset("bk_logo_"+k,v):sdel("bk_logo_"+k));
      // Save agency logos separately, strip from blob
      const strippedAgencies={};
      const agLogoSaves=[];
      Object.entries(agencies).forEach(([org,list])=>{
        strippedAgencies[org]=(list||[]).map(a=>{
          const {logo,...agRest}=a;
          if(logo) agLogoSaves.push(sset("bk_logo_ag_"+a.id,logo));
          else agLogoSaves.push(sdel("bk_logo_ag_"+a.id));
          return agRest;
        });
      });
      await Promise.all([
        sset("bk_orgchart",{...rest,logos:{},agencies:strippedAgencies}),
        ...logoSaves,
        ...agLogoSaves,
      ]);
    }
    else if(type==="openSession"){
      // Move all docketed bills to bt_voting
      const updates=Object.values(bills).filter(b=>b.status==="docket");
      const next={...bills};
      await Promise.all(updates.map(async b=>{
        const updated={...b,status:"bt_voting"};
        next[b.id]=updated;
        await sset("bk_bill_"+b.id,updated);
      }));
      setBills(next);
      notify("Session opened — "+updates.length+" bill"+(updates.length!==1?"s":"")+" moved to active vote.",C.green);
    }
    else if(type==="saveSession"){
      const {session:s}=payload;
      setSession(s); await sset("bk_session",s);
    }
    else if(type==="saveAbsences"){
      setAbsences(payload.absences); await sset("bk_absences",payload.absences);
    }
    else if(type==="saveNextElection"){
      setNextElection(payload.election); await sset("bk_next_election",payload.election);
    }
    else if(type==="savePartyRoles"){
      const newOff={...(officials||{}),partyLeaders:payload.partyLeaders,partyWhips:payload.partyWhips,opposition:payload.opposition,coalitions:payload.coalitions,coalitionMembers:payload.coalitionMembers||[],governmentType:payload.governmentType||"coalition",governingParty:payload.governingParty||""};
      setOff(newOff); await sset("bk_officials",newOff);
    }
    else if(type==="dismissOfficial"){
      const {role:dismissRole}=payload;
      const newOff={...(officials||{})};
      // Clearing the office clears the username with it, which is what revokes
      // the panel — the two can never drift apart.
      if(dismissRole==="bt_president"){ newOff.president_bt="Vacant"; newOff.president_bt_username=""; notify("🏛 BT President dismissed — panel revoked.",C.gold); }
      else if(dismissRole==="chancellor"){ newOff.chancellor="Vacant"; newOff.chancellor_username=""; notify("⚜ Chancellor dismissed.",C.gold); }
      else if(dismissRole==="bh_president"){ newOff.president_bh="Vacant"; newOff.president_bh_username=""; notify("🏰 BH President dismissed — panel revoked.",C.gold); }
      setOff(newOff); await sset("bk_officials",newOff);
    }
  },[members,bundesherren,bills,officials,notify,formerMembers,activeBudget,imperialReserve,accounts,parties,digitalVoting]);

  const pendingCount=Object.values(bills).filter(b=>b.status==="pending").length;
  const pendingBHCount=Object.values(bills).filter(b=>b.status==="pending_bh").length;
  const ratifyCount=Object.values(bills).filter(b=>b.status==="ratification").length;

  // Registries the register's styles and post-nominals are derived from. The
  // account and past offices are per-person, so callers add those.
  const honoursCtx=useMemo(()=>({members,bundesherren,formerMembers,officials,
    ihHonours,ijAppointments,ijCases,ijJudgments,mowPersonnel,accounts,governments}),
    [members,bundesherren,formerMembers,officials,ihHonours,ijAppointments,ijCases,ijJudgments,mowPersonnel,accounts,governments]);

  // Authority is derived from the seating chart and the officials list.
  const access       = useMemo(()=>bkAccess(user,members,bundesherren,officials),
                        [user,members,bundesherren,officials]);
  const isEmperor    = access?.role==="emperor";
  const isBTPresident= isEmperor||access?.role==="bt_president";
  const isBHPresident= isEmperor||access?.role==="bh_president";
  // Ministers and the Chancellor hold no chamber presidency, but still get the
  // Panel tab so they can issue communiqués under their office.
  const myOffices    = useMemo(()=>heldOffices(user,officials),[user,officials]);
  const hasPanel     = isEmperor||isBTPresident||isBHPresident||myOffices.length>0;
  // Which chamber the signed-in account actually sits in.
  const mySeat   = user?findSeat(members,user.username,user.displayName):null;
  const myBHSeat = user?findSeat(bundesherren,user.username,user.displayName):null;
  const canSubmit= !!user&&(!!mySeat||!!myBHSeat||hasPanel);
  // Losing the panel (sign-out, or dismissal) must not strand the user on a dead tab.
  useEffect(()=>{ if(tab==="panel"&&!hasPanel) setTab("home"); },[hasPanel,tab]);

  const TABS=[
    {id:"home",         label:"Home",         icon:"⚜",  badge:0},
    {id:"bundestag",    label:"Bundestag",    icon:"🏛", badge:0},
    {id:"bundesherren", label:"Bundesherren", icon:"🏰", badge:0},
    {id:"submit",       label:"Submit Bill",  icon:"✍",  badge:0},
    ...(hasPanel?[{id:"panel",label:"Panel",icon:"⚙",badge:pendingCount+pendingBHCount+ratifyCount}]:[]),
    {id:"links",         label:"Imperial Links",icon:"🔗", badge:0},
  ];

  return (
    <FormerCtx.Provider value={formerMembers}>
    <HonoursCtx.Provider value={honoursCtx}>
    <BallotCtx.Provider value={{digitalVoting,mySeat,myBHSeat,onAction,notify}}>
    <FactsheetCtx.Provider value={setFactsheet}>
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <Gstyle/>
      <Toast msg={toast.msg} color={toast.color}/>
      <Overlay label={processing}/>
      {showLogin&&<LoginModal accounts={accounts} members={members} bundesherren={bundesherren}
        officials={officials} notify={notify}
        onClose={()=>setShowLogin(false)}
        onLogin={(acc)=>{setUser(acc);setShowLogin(false);}}/>}
      {factsheet&&<MemberFactsheet person={factsheet} members={members} bundesherren={bundesherren}
        formerMembers={formerMembers} officials={officials} bills={bills} accounts={accounts}
        governments={governments} absences={absences} onClose={()=>setFactsheet(null)}/>}

      <div style={{background:`linear-gradient(180deg,${C.s1} 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.border}`,padding:"1.5rem 1rem 1rem"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",gap:"1.25rem",flexWrap:"wrap"}}>
          <a href="lech.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",
            color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,
            padding:"3px 10px",flexShrink:0}}>{"← Network"}</a>
          <img src={COA_B64} alt="" style={{width:56,height:56,objectFit:"contain",filter:"drop-shadow(0 0 10px #C9A84C66)"}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:700,color:C.text,letterSpacing:"0.1em",lineHeight:1.1}}>Imperial Bundeskongress</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.3em",color:C.gold,marginTop:4,textTransform:"uppercase"}}>Empire of Lech · Legislative Chamber · Gott mit uns</div>
          </div>
          <div style={{flex:1}}/>
          {user?(
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text}}>{user.displayName||user.username}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.14em",color:C.gold,textTransform:"uppercase"}}>
                  {access?access.icon+" "+access.label+(access.role==="member"&&mySeat?" · "+(mySeat.seats||0)+" seats":""):"No seat"}
                </div>
              </div>
              <Btn small variant="ghost" onClick={()=>{forgetSession();setUser(null);setTab("home");notify("Signed out.",C.textD);}}>Sign Out</Btn>
            </div>
          ):(
            <Btn small variant="ghost" onClick={()=>setShowLogin(true)}>⚜ Sign In</Btn>
          )}
        </div>
      </div>

      <div style={{background:C.s1,borderBottom:"none"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",overflowX:"auto"}}>
          {TABS.map(t=>{
            const active=tab===t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",
                         padding:"0.75rem 1.1rem",background:"transparent",border:"none",whiteSpace:"nowrap",
                         borderBottom:`2px solid ${active?C.red:"transparent"}`,color:active?C.text:C.textD,
                         cursor:"pointer",position:"relative",transition:"all .16s",flexShrink:0}}>
                {t.icon} {t.label}
                {t.badge>0&&<span style={{position:"absolute",top:8,right:4,background:C.red,color:"#fff",fontFamily:"'Cinzel',serif",fontSize:8,width:14,height:14,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
              </button>
            );
          })}
          <a href="history.html"
            style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",
                     padding:"0.75rem 1.1rem",background:"transparent",border:"none",whiteSpace:"nowrap",
                     borderBottom:"2px solid transparent",color:C.textD,cursor:"pointer",textDecoration:"none",
                     flexShrink:0,transition:"all .16s"}}
            onMouseOver={e=>e.currentTarget.style.color=C.text}
            onMouseOut={e=>e.currentTarget.style.color=C.textD}>
            📜 History
          </a>
        </div>
      </div>

      <AnnouncementBanner announcement={announcement} tab={tab}/>

      <div style={{maxWidth:900,margin:"0 auto",padding:"1.5rem 1rem"}}>
        {loading?(
          <div style={{textAlign:"center",padding:"3rem",fontFamily:"'Cinzel',serif",color:C.textD,fontSize:14,letterSpacing:"0.15em"}}>
            <div style={{animation:"pulse 1s infinite",fontSize:24}}>⚜</div>
            <div style={{marginTop:"0.5rem"}}>Loading…</div>
          </div>
        ):(
          <>
            <div style={{display:tab==="home"?"block":"none"}}><LandingPage bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} activeBudget={activeBudget} budgetCooldown={budgetCooldown} imperialReserve={imperialReserve} onAction={onAction} ijStatutes={ijStatutes} ijCases={ijCases}/></div>
            <div style={{display:tab==="bundestag"?"block":"none"}}><BundestagTab members={members} officials={officials} bills={bills} bundesherren={bundesherren} session={session} nextElection={nextElection} absences={absences}/></div>
            <div style={{display:tab==="bundesherren"?"block":"none"}}><BundesherrenTab bundesherren={bundesherren} officials={officials} bills={bills} members={members}/></div>
            <div style={{display:tab==="submit"?"block":"none"}}><SubmitTab onSubmit={async(p)=>await onAction("submitBill",p)} onSubmitBudget={async(p)=>await onAction("submitBudget",p)} activeBudget={activeBudget} budgetCooldown={budgetCooldown} orgChart={orgChart} submitLock={submitLock} imperialReserve={imperialReserve} bills={bills} session={session} user={user} mySeat={mySeat} myBHSeat={myBHSeat} canSubmit={canSubmit} hasPanel={hasPanel} members={members} bundesherren={bundesherren} accounts={accounts} onRequestLogin={()=>setShowLogin(true)}/></div>
            <div style={{display:tab==="links"?"block":"none"}}><ImperialLinksTab imperialLinks={imperialLinks}/></div>
            {hasPanel&&<div style={{display:tab==="panel"?"block":"none"}}><PanelTab bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} session={session} announcement={announcement} activeBudget={activeBudget} submitLock={submitLock} imperialReserve={imperialReserve} imperialLinks={imperialLinks} nextElection={nextElection} absences={absences} accounts={accounts} formerMembers={formerMembers} parties={parties} digitalVoting={digitalVoting} pressReleases={pressReleases} user={user} isEmperor={isEmperor} isBTPresident={isBTPresident} isBHPresident={isBHPresident} onAction={onAction} notify={notify} setProcessing={setProcessing}/></div>}
          </>
        )}
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,padding:"1rem",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,letterSpacing:"0.2em",textAlign:"center"}}>
        IMPERIAL BUNDESKONGRESS · EMPIRE OF LECH · GOTT MIT UNS
      </div>
    </div>
    </FactsheetCtx.Provider>
    </BallotCtx.Provider>
    </HonoursCtx.Provider>
    </FormerCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


</script>
</body>
</html>
