function BundestagTab({members,officials,bills,bundesherren,session,nextElection,absences}) {
  const [sub,setSub]=useState("chamber");
  const mList=Object.values(members||{}).sort((a,b)=>b.seats-a.seats);
  const active=Object.values(bills||{}).filter(b=>b.status==="bt_voting").sort((a,b)=>b.created-a.created);
  const docket=Object.values(bills||{}).filter(b=>b.status==="docket").sort((a,b)=>a.created-b.created);
  const byParty={};
  mList.forEach(m=>{(byParty[m.party]||(byParty[m.party]=[])).push(m);});
  const groups=Object.entries(byParty).map(([pid,ms])=>({p:PARTIES.find(x=>x.id===pid),ms,total:ms.reduce((a,m)=>a+m.seats,0)})).sort((a,b)=>b.total-a.total);
  const ministers=officials?.ministers||{};
  const SUBTABS=[["chamber","Chamber"],["ministers","Council of Ministers"],["absences","📋 Absences"]];
  return (
    <div className="fu">
      <OfficialsBanner officials={officials} chamber="bundestag" members={members} bundesherren={bundesherren}/>
      <ElectionCountdown nextElection={nextElection}/>
      <div style={{display:"flex",gap:0,marginBottom:"1.5rem",borderBottom:`1px solid ${C.border}`}}>
        {SUBTABS.map(([id,label])=>(
          <button key={id} onClick={()=>setSub(id)}
            style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",
                     padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",
                     borderBottom:`2px solid ${sub===id?C.gold:"transparent"}`,
                     color:sub===id?C.gold:C.textD,transition:"all .15s"}}>
            {id==="ministers"?"🎖 ":"🏛 "}{label}
          </button>
        ))}
      </div>

      {sub==="chamber"&&<>
        <STitle>Seat Distribution</STitle>
        {mList.length>0?(()=>{
          const coalitionIds=officials?.coalitions||[];
          const coalitionMemberIds=officials?.coalitionMembers||[];
          // Helper: is this specific member in the coalition?
          const isMemberInCoal=(m)=>{
            const partyInCoal=coalitionIds.includes(m.party);
            if(partyInCoal) return !coalitionMemberIds.includes("exclude:"+m.id);
            return coalitionMemberIds.includes(m.id);
          };
          // Compute per-group coalition seat counts
          const groupsWithCoal=groups.map(g=>({
            ...g,
            coalMs:g.ms.filter(m=>isMemberInCoal(m)),
            oppMs:g.ms.filter(m=>!isMemberInCoal(m)),
          }));
          const coalSeats=groupsWithCoal.reduce((a,g)=>a+g.coalMs.reduce((b,m)=>b+m.seats,0),0);
          const oppSeats=groupsWithCoal.reduce((a,g)=>a+g.oppMs.reduce((b,m)=>b+m.seats,0),0);
          const hasCoalition=coalSeats>0;
          // Split groups for display — whole-party-in-coal, whole-party-opp, mixed
          const coalGroups=groupsWithCoal.filter(g=>g.coalMs.length>0&&g.oppMs.length===0);
          const oppGroups=groupsWithCoal.filter(g=>g.oppMs.length>0&&g.coalMs.length===0);
          const mixedGroups=groupsWithCoal.filter(g=>g.coalMs.length>0&&g.oppMs.length>0);

          const MemberChips=({ms,p})=>(
            <div style={{display:"flex",flexWrap:"wrap",gap:3,paddingLeft:8,marginBottom:4}}>
              {ms.map(m=>{
                const isLeader=(officials?.partyLeaders||{})[m.party]===m.id;
                const isWhip=(officials?.partyWhips||{})[m.party]===m.id;
                const isOpposition=(officials?.opposition)===m.id;
                const chipBg=isLeader?"#1a1600":isOpposition?"#0e1a10":C.s2;
                const chipBorder=isLeader?"#C9A84C":isOpposition?"#4a9a5a":isWhip?"#7a6a30":C.border;
                const nameColor=isLeader?"#f0e080":isOpposition?"#80d0a0":C.text;
                return (
                  <div key={m.id} style={{background:chipBg,border:`1px solid ${chipBorder}`,borderRadius:2,padding:"3px 9px",display:"flex",alignItems:"center",gap:6}}>
                    <MemberLink person={m} style={{fontSize:13,color:nameColor,fontWeight:(isLeader||isOpposition)?700:400}}>
                      {m.username||m.name}
                    </MemberLink>
                    <PostNominals person={m}/>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:p?.color||C.gold,fontWeight:700}}>{m.seats}</span>
                    {isLeader&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:"#C9A84C",border:"1px solid #C9A84C66",borderRadius:2,padding:"1px 5px",whiteSpace:"nowrap"}}>LEADER</span>}
                    {isOpposition&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:"#4a9a5a",border:"1px solid #4a9a5a66",borderRadius:2,padding:"1px 5px",whiteSpace:"nowrap"}}>OPP. LEADER</span>}
                    {isWhip&&!isLeader&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:"#b0a060",border:"1px solid #b0a06066",borderRadius:2,padding:"1px 5px",whiteSpace:"nowrap"}}>WHIP</span>}
                  </div>
                );
              })}
            </div>
          );

          const PartyRow=({p,ms,total})=>(
            <div key={p?.id||"x"}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.s1,border:`1px solid ${p?.color||C.border}33`,borderLeft:`4px solid ${p?.color||C.border}`,borderRadius:"0 2px 2px 0",padding:"4px 10px",marginBottom:2}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:p?.color||C.text}}>{p?.name||"Unknown"}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:p?.color||C.gold}}>{total}</span>
              </div>
              <MemberChips ms={ms} p={p}/>
            </div>
          );

          return (
            <>
              <SeatBar members={members}/>

              {/* Balance of power bar */}
              {hasCoalition&&(
                <div style={{marginBottom:"1.5rem"}}>
                  <div style={{height:36,background:C.s3,borderRadius:3,overflow:"hidden",display:"flex",border:`1px solid ${C.border}`,position:"relative",marginBottom:6}}>
                    {/* Government segment */}
                    <div style={{width:(coalSeats/1000*100)+"%",background:"linear-gradient(135deg,#1a1a4a,#2a2a6a)",
                                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                                  borderRight:`2px solid #6666cc`,position:"relative",minWidth:coalSeats>0?2:0}}>
                      {coalSeats>80&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#aaaaee",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>
                        {officials?.governmentType==="single"?"GOVERNMENT":"COALITION"} · {coalSeats}
                      </span>}
                    </div>
                    {/* Opposition segment */}
                    <div style={{flex:1,background:"linear-gradient(135deg,#1a0e0e,#2a1414)",
                                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {oppSeats>80&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#cc8888",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>
                        OPPOSITION · {oppSeats}
                      </span>}
                    </div>
                    {/* 501 majority line */}
                    <div style={{position:"absolute",left:"50.1%",top:0,bottom:0,width:2,background:"rgba(255,255,255,.25)"}}/>
                  </div>
                  <div style={{display:"flex",gap:"1rem",flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:12,height:12,borderRadius:2,background:"linear-gradient(135deg,#1a1a4a,#2a2a6a)",border:"1px solid #6666cc"}}/>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#aaaaee"}}>
                        {officials?.governmentType==="single"?"Government":"Government Coalition"} — <strong>{coalSeats}</strong> seats
                      </span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:12,height:12,borderRadius:2,background:"linear-gradient(135deg,#1a0e0e,#2a1414)",border:"1px solid #884444"}}/>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#cc8888"}}>Opposition — <strong>{oppSeats}</strong> seats</span>
                    </div>
                    {coalSeats>=501&&<span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#7ad47a",letterSpacing:"0.1em"}}>✓ MAJORITY GOVERNMENT</span>}
                    {coalSeats<501&&coalSeats>0&&<span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#f0a050",letterSpacing:"0.1em"}}>⚠ MINORITY GOVERNMENT</span>}
                  </div>
                </div>
              )}

              {/* Party list — grouped */}
              <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:"1.5rem"}}>
                {hasCoalition&&(coalGroups.length>0||mixedGroups.length>0)&&(
                  <div style={{background:"#0a0a18",border:"1px solid #4444aa44",borderRadius:3,padding:"0.6rem 0.85rem 0.5rem",marginBottom:4}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.25em",color:"#8888cc",textTransform:"uppercase",marginBottom:"0.6rem",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1,height:1,background:"linear-gradient(to right,#4444aa44,transparent)"}}/>
                      {officials?.governmentType==="single"?"⚜ Government":"⚜ Government Coalition"}
                      <div style={{flex:1,height:1,background:"linear-gradient(to left,#4444aa44,transparent)"}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {coalGroups.map(({p,ms,total})=><PartyRow key={p?.id||"x"} p={p} ms={ms} total={total}/>)}
                      {mixedGroups.map(({p,coalMs,total})=>(
                        <div key={p?.id||"x"}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.s1,border:`1px solid ${p?.color||C.border}33`,borderLeft:`4px solid ${p?.color||C.border}`,borderRadius:"0 2px 2px 0",padding:"4px 10px",marginBottom:2}}>
                            <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:p?.color||C.text}}>{p?.name||"Unknown"} <span style={{fontSize:9,color:"#8888cc"}}>(partial)</span></span>
                            <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:p?.color||C.gold}}>{coalMs.reduce((a,m)=>a+m.seats,0)}</span>
                          </div>
                          <MemberChips ms={coalMs} p={p}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {hasCoalition&&(oppGroups.length>0||mixedGroups.length>0)&&(
                  <div style={{background:"#140a0a",border:"1px solid #aa444444",borderRadius:3,padding:"0.6rem 0.85rem 0.5rem"}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.25em",color:"#cc8888",textTransform:"uppercase",marginBottom:"0.6rem",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1,height:1,background:"linear-gradient(to right,#aa444444,transparent)"}}/>
                      Opposition
                      <div style={{flex:1,height:1,background:"linear-gradient(to left,#aa444444,transparent)"}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {oppGroups.map(({p,ms,total})=><PartyRow key={p?.id||"x"} p={p} ms={ms} total={total}/>)}
                      {mixedGroups.map(({p,oppMs})=>(
                        <div key={(p?.id||"x")+"_opp"}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.s1,border:`1px solid ${p?.color||C.border}33`,borderLeft:`4px solid ${p?.color||C.border}`,borderRadius:"0 2px 2px 0",padding:"4px 10px",marginBottom:2}}>
                            <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:p?.color||C.text}}>{p?.name||"Unknown"} <span style={{fontSize:9,color:"#cc8888"}}>(partial)</span></span>
                            <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:p?.color||C.gold}}>{oppMs.reduce((a,m)=>a+m.seats,0)}</span>
                          </div>
                          <MemberChips ms={oppMs} p={p}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {!hasCoalition&&groups.map(({p,ms,total})=><PartyRow key={p?.id||"x"} p={p} ms={ms} total={total}/>)}
              </div>
            </>
          );
        })():<div style={{fontSize:15,color:C.textD,fontStyle:"italic",marginBottom:"1.5rem"}}>No seat data yet — import via the Panel.</div>}
        <Divider/>
        <SessionBanner session={session}/>
        <STitle>Current Session — Active Votes</STitle>
        <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"0.85rem"}}>
          Votes are held during the weekly sitting of the Bundestag. Results are recorded by the President of the Bundestag during the session or shortly thereafter.
        </div>
        {active.length===0
          ?<div style={{fontSize:15,color:C.textD,fontStyle:"italic",padding:"0.5rem 0 1rem"}}>No bills are currently being voted on. Check back during the session.</div>
          :active.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren} bills={bills}/>)
        }
        {docket.length>0&&<>
          <Divider/>
          <STitle>Upcoming Docket</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"0.85rem"}}>
            The following bills have been placed on the docket and are scheduled for debate and vote at the next session of the Bundestag.
          </div>
          {docket.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren} bills={bills}/>)}
        </>}
      </>}

      {sub==="ministers"&&<>
        <STitle>Council of Ministers</STitle>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"0.75rem"}}>
          {MINISTER_PORTFOLIOS.map(portfolio=>{
            const incumbent=ministers[portfolio]||"Vacant";
            const vacant=incumbent==="Vacant"||!incumbent;
            const person=vacant?null:lookupPerson(incumbent,
              (officials?.minister_usernames||{})[portfolio],members,bundesherren);
            const p=person?getParty(Object.values(members||{}).find(m=>m.id===person.id)?.party):null;
            return (
              <div key={portfolio} style={{background:C.s2,border:`1px solid ${vacant?C.border:C.gold+"44"}`,
                                            borderTop:`3px solid ${vacant?C.border:(p?.color||C.gold)}`,
                                            borderRadius:"0 0 3px 3px",padding:"0.85rem 1rem"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:5,textTransform:"uppercase"}}>{portfolio}</div>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  {/* The minister's own face where the portfolio is filled; the
                      decoration stands in for a vacancy. */}
                  {vacant
                    ?<span style={{fontSize:18}}>🎖</span>
                    :<McFace person={person} style={{borderColor:(p?.color||C.gold)+"66"}}/>}
                  {vacant
                    ?<span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.textDD,fontWeight:700,fontStyle:"italic"}}>Vacant</span>
                    :<span>
                       <MemberLink person={person} style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,fontWeight:700}}>
                         {person.username||person.name}
                       </MemberLink>
                       <PostNominals person={person}/>
                     </span>}
                </div>
                {p&&<div style={{fontSize:10,color:p.color,marginTop:3}}>{p.name}</div>}
              </div>
            );
          })}
        </div>
      </>}

      {sub==="absences"&&<AbsencesPublic members={members} absences={absences}/>}
    </div>
  );
}

function BundesherrenTab({bundesherren,officials,bills,members}) {
  const RANK_ORDER=["crown_prince","prince","princess","duke","marquess","count","viscount","baron","baronet",""];
  const bhList=Object.values(bundesherren||{}).sort((a,b)=>{
    const ra=RANK_ORDER.indexOf(a.rank||""); const rb=RANK_ORDER.indexOf(b.rank||"");
    const ai=ra===-1?RANK_ORDER.length:ra; const bi=rb===-1?RANK_ORDER.length:rb;
    return ai!==bi?ai-bi:a.name.localeCompare(b.name);
  });
  const active=Object.values(bills||{}).filter(b=>b.status==="bh_voting").sort((a,b)=>b.created-a.created);
  const awaitRat=Object.values(bills||{}).filter(b=>b.status==="ratification").sort((a,b)=>b.created-a.created);
  const total=bhList.length, thresh=total>0?Math.floor(total/2)+1:0;
  return (
    <div className="fu">
      <OfficialsBanner officials={officials} chamber="bundesherren" members={members} bundesherren={bundesherren}/>
      <STitle>The Imperial Lords</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"0.85rem"}}>{total} member{total!==1?"s":""} · Majority: {thresh} of {total}</div>
      {bhList.length>0?(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:"1.5rem"}}>
          {bhList.map(bh=>{
            const pr=bh.rank?PEERAGE_RANKS.find(r=>r.v===bh.rank):null;
            const boxBg=pr?.boxColor||C.s2;
            const borderCol=pr?.borderColor||C.gold;
            return(
              <div key={bh.id} style={{background:boxBg,border:`1px solid ${borderCol}55`,
                borderLeft:`3px solid ${borderCol}`,borderRadius:"0 3px 3px 0",padding:"6px 14px",
                display:"flex",alignItems:"center",gap:8,position:"relative",overflow:"hidden"}}>
                {pr?.fleur&&(
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"flex-end",
                    paddingRight:8,opacity:0.07,fontSize:44,pointerEvents:"none",userSelect:"none",color:borderCol,
                    letterSpacing:"-4px"}}>
                    {"⚜⚜⚜"}
                  </div>
                )}
                <span style={{fontSize:16,color:borderCol,flexShrink:0}}>⚜</span>
                <div style={{position:"relative",zIndex:1}}>
                  {pr&&<div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
                    color:pr.color,marginBottom:2,textTransform:"uppercase"}}>{pr.l}</div>}
                  <div>
                    <MemberLink person={bh} style={{fontFamily:"'Cinzel',serif",fontSize:13,
                      textAlign:"left",color:pr?.royal?pr.color:C.text,fontWeight:pr?.royal?700:400}}>
                      {bh.username||bh.name}
                    </MemberLink>
                    <PostNominals person={bh}/>
                  </div>
                  {bh.title&&<div style={{fontSize:11,color:C.textD,fontStyle:"italic"}}>{bh.title}</div>}
                </div>
              </div>
            );
          })}
        </div>
      ):<div style={{fontSize:15,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>No Bundesherren registered.</div>}
      <Divider/>
      <STitle>Bills Open for Vote</STitle>
      {active.length===0?<div style={{fontSize:15,color:C.textD,fontStyle:"italic",padding:"1rem 0"}}>No bills currently open for Bundesherren vote.</div>
        :active.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren} bills={bills}/>)}
      {awaitRat.filter(b=>b.type!=="budget").length>0&&<><Divider/><STitle>Awaiting Imperial Ratification</STitle>{awaitRat.filter(b=>b.type!=="budget").map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren} bills={bills}/>)}</>}
    </div>
  );
}

function ArchiveTab({bills,members,bundesherren,ijStatutes,ijCases}) {
  const [statusFilter,setStatusFilter]=useState("all");
  const [catFilter,setCatFilter]=useState("all");
  const [search,setSearch]=useState("");

  const statusMatch=(b,f)=>{
    if(f==="all") return true;
    if(f==="passed_all") return b.status==="passed"||b.status==="motion_passed";
    if(f==="failed_all") return b.status==="failed_bt"||b.status==="failed_bh"||b.status==="motion_failed";
    return b.status===f;
  };

  const done=Object.values(bills||{})
    .filter(b=>["passed","failed_bt","failed_bh","repealed","vetoed","pulled","motion_passed","motion_failed","decree"].includes(b.status))
    .sort((a,b)=>(b.ratified_at||b.failed_at||b.repealed_at||b.created)-(a.ratified_at||a.failed_at||a.repealed_at||a.created));

  const shown=done.filter(b=>{
    const statusOk=statusMatch(b,statusFilter);
    const catOk=catFilter==="all"
      ||(catFilter==="nomination"&&["appoint_bt_pres","appoint_chancellor","appoint_bh_pres","nominate_minister"].includes(b.type))
      ||(catFilter==="constitutional"&&b.type==="constitutional_amendment")
      ||(catFilter==="decree_type"&&b.status==="decree")
      ||(catFilter==="motion"&&b.type==="motion")
      ||(catFilter===b.category);
    const q=search.trim().toLowerCase();
    const searchOk=!q||b.title?.toLowerCase().includes(q)||b.submitter?.toLowerCase().includes(q)||b.nominee?.toLowerCase().includes(q);
    return statusOk&&catOk&&searchOk;
  });

  const STATUS_OPTS=[
    {v:"all",         l:"All Statuses"},
    {v:"passed_all",  l:"Passed"},
    {v:"failed_all",  l:"Failed"},
    {v:"vetoed",      l:"Vetoed"},
    {v:"pulled",      l:"Pulled"},
    {v:"repealed",    l:"Repealed"},
    {v:"decree",      l:"Imperial Decree"},
  ];
  const statusCount=(f)=>{
    if(f==="passed_all") return done.filter(b=>b.status==="passed"||b.status==="motion_passed").length;
    if(f==="failed_all") return done.filter(b=>b.status==="failed_bt"||b.status==="failed_bh"||b.status==="motion_failed").length;
    return done.filter(b=>b.status===f).length;
  };
  const CAT_OPTS=[
    {v:"all",l:"All Types"},
    {v:"constitutional",l:"Constitutional Amendment"},
    {v:"nomination",l:"Nominations"},
    {v:"decree_type",l:"Imperial Decrees"},
    {v:"motion",l:"Motions"},
    ...LAW_CATEGORIES.map(lc=>({v:lc.v,l:lc.l})),
  ];

  return (
    <div className="fu">
      <STitle>Legislative Archive</STitle>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:2,minWidth:200}}>
          <FL>SEARCH</FL>
          <div style={{position:"relative"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by title, submitter, nominee…"
              style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                       padding:"7px 10px 7px 32px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=C.redD} onBlur={e=>e.target.style.borderColor=C.border}/>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.textDD,fontSize:14,pointerEvents:"none"}}>🔍</span>
            {search&&<button onClick={()=>setSearch("")}
              style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:C.textD,cursor:"pointer",fontSize:14,lineHeight:1}}>✕</button>}
          </div>
        </div>
        <div style={{flex:1,minWidth:160}}>
          <FL>STATUS</FL>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
            style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                     padding:"7px 10px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
            {STATUS_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}{o.v!=="all"?" ("+statusCount(o.v)+")":""}</option>)}
          </select>
        </div>
        <div style={{flex:1,minWidth:160}}>
          <FL>TYPE</FL>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
            style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                     padding:"7px 10px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif"}}>
            {CAT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
        </div>
      </div>

// ── Absences Tracker (BT President) ──────────────────────────────────────────
function AbsencesTracker({members,absences,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);
  const [saving,setSaving]=useState(false);
  const mList=Object.values(members||{}).sort((a,b)=>b.seats-a.seats);
  const counts=absences||{};
  const totalAbsences=Object.values(counts).reduce((a,n)=>a+(n||0),0);
  const highest=mList.reduce((best,m)=>(!best||(counts[m.id]||0)>(counts[best.id]||0))?m:best,null);

  async function inc(memberId){
    const next={...counts,[memberId]:(counts[memberId]||0)+1};
    setSaving(true); setProcessing("Saving...");
    await onAction("saveAbsences",{absences:next});
    setProcessing(null); setSaving(false);
  }
  async function dec(memberId){
    const cur=counts[memberId]||0; if(cur<=0) return;
    const next={...counts,[memberId]:cur-1};
    setSaving(true); setProcessing("Saving...");
    await onAction("saveAbsences",{absences:next});
    setProcessing(null); setSaving(false);
  }
  async function reset(memberId){
    const next={...counts,[memberId]:0};
    setSaving(true); setProcessing("Saving...");
    await onAction("saveAbsences",{absences:next});
    setProcessing(null); setSaving(false);
  }

  return(
    <div style={{background:C.s1,border:`1px solid #6a3a1a44`,borderLeft:`3px solid #9a4a10`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:open?"0.85rem":0}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#aa5520",marginBottom:3}}>📋 UNEXCUSED ABSENCES</div>
          <div style={{fontSize:13,color:C.textD}}>
            {totalAbsences===0?"No absences recorded."
              :<span>{totalAbsences} total{highest&&counts[highest.id]>0?<span style={{color:"#f0a060"}}> — {highest.name} leads with {counts[highest.id]}</span>:""}</span>}
          </div>
        </div>
        <Btn variant="ghost" small onClick={()=>setOpen(o=>!o)}>{open?"▲ Close":"✎ Manage"}</Btn>
      </div>
      {open&&<div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.85rem"}}>
        {mList.length===0
          ?<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>No members on record.</div>
          :<div style={{display:"flex",flexDirection:"column",gap:3}}>
            {mList.map(m=>{
              const n=counts[m.id]||0;
              const rowColor=n>=3?"#cc4040":n>=1?"#cc7a20":C.textD;
              return(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.border}33`,flexWrap:"wrap"}}>
                  <span style={{flex:1,fontFamily:"'Cinzel',serif",fontSize:12,color:n>0?"#e0c8a0":C.textD,minWidth:120}}>{m.name}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.textDD,marginRight:4}}>{m.seats} seats</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button onClick={()=>dec(m.id)} disabled={saving||n<=0}
                      style={{width:22,height:22,border:`1px solid ${C.border}`,borderRadius:2,background:"transparent",color:C.textD,cursor:n>0?"pointer":"not-allowed",fontSize:13,opacity:n<=0?.3:1}}>−</button>
                    <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,color:rowColor,minWidth:20,textAlign:"center"}}>{n}</span>
                    <button onClick={()=>inc(m.id)} disabled={saving}
                      style={{width:22,height:22,border:`1px solid ${C.border}`,borderRadius:2,background:"transparent",color:C.textD,cursor:"pointer",fontSize:13}}>+</button>
                    {n>0&&<ArmBtn small label="Reset" confirmLabel="Reset to 0?" onConfirm={()=>reset(m.id)} variant="ghost"/>}
                  </div>
                  {n>=3&&<span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.1em",color:"#cc4040",border:"1px solid #cc404044",borderRadius:2,padding:"1px 5px"}}>⚠ HIGH</span>}
                </div>
              );
            })}
          </div>}
      </div>}
    </div>
  );
}

function BTPanelContent({bills,members,bundesherren,session,absences,onAction,notify,setProcessing}) {
  const formerMembers=useFormer();
  const [rec,setRec]=useState(null);
  const [sessSection,setSessSection]=useState(false);
  const [sessDate,setSessDate]=useState(session?.date||"");
  const [sessTime,setSessTime]=useState(session?.time||"");
  const [sessTZ,setSessTZ]=useState(session?.tz||"EST");
  const [sessNotes,setSessNotes]=useState(session?.notes||"");
  const [sessNotice,setSessNotice]=useState(String(session?.noticePeriod!=null?session.noticePeriod:24));

  const returned=Object.values(bills||{}).filter(b=>b.status==="returned"&&b.return_to!=="bh").sort((a,b)=>a.created-b.created);
  const pending=Object.values(bills||{}).filter(b=>b.status==="pending").sort((a,b)=>a.created-b.created);
  const docket=Object.values(bills||{}).filter(b=>b.status==="docket").sort((a,b)=>a.created-b.created);
  const active=Object.values(bills||{}).filter(b=>b.status==="bt_voting").sort((a,b)=>b.created-a.created);

  return (
    <div className="fu">
      <STitle style={{color:"#4a88ff",borderColor:"#4a88ff44"}}>🏛 Bundestag President Panel</STitle>

      {/* Returned bills — show prominently at very top */}
      {returned.length>0&&(
        <div style={{background:"#1a0e00",border:`2px solid #b05a10`,borderRadius:4,padding:"1rem 1.1rem",marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#f0a050",letterSpacing:"0.2em",marginBottom:"0.75rem",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>↩</span> RETURNED FROM THE EMPEROR — REQUIRES REVISION ({returned.length})
          </div>
          <div style={{fontSize:13,color:"#c09060",lineHeight:1.7,marginBottom:"0.85rem",fontStyle:"italic"}}>
            Contact the bill's submitting member and ask them to update the Google Doc with the required revisions.
            Once the document has been revised, confirm below before re-submitting to the docket.
          </div>
          {returned.map(bill=><ReturnedBillRow key={bill.id} bill={bill} presidentRole="bt_president" onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
        </div>
      )}

      {/* Session scheduling */}
      <div style={{background:C.s1,border:`1px solid #4a88ff33`,borderLeft:`3px solid #4a88ff`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:sessSection?"0.85rem":0}}>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#4a88ff",marginBottom:3}}>📅 NEXT SESSION</div>
            {session?.date
              ?<div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{session.date}{session.time?" at "+session.time:""}{session.tz?" ("+session.tz+")":""}</div>
              :<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>No session scheduled</div>
            }
            {session?.date&&<div style={{fontSize:11,color:C.textDD,marginTop:2}}>
              Notice period: {session?.noticePeriod===0?"Emergency (0h)":(session?.noticePeriod||24)+"h"}
            </div>}
          </div>
          <div style={{display:"flex",gap:6}}>
            {docket.length>0&&(
              <ArmBtn small label={"🟢 Open Session ("+docket.length+")"} confirmLabel="Start session?" variant="green"
                onConfirm={async()=>{
                  setProcessing("Opening session…");
                  await onAction("openSession",{});
                  setProcessing(null);
                }}/>
            )}
            <Btn variant="blue" small onClick={()=>setSessSection(s=>!s)}>{sessSection?"▲ Close":"✎ Schedule"}</Btn>
          </div>
        </div>
        {sessSection&&(
          <div style={{display:"flex",flexDirection:"column",gap:"0.7rem",paddingTop:"0.85rem",borderTop:`1px solid ${C.border}`}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:140}}><FL>DATE</FL><Inp value={sessDate} onChange={setSessDate} type="date"/></div>
              <div style={{flex:1,minWidth:120}}><FL>TIME</FL><Inp value={sessTime} onChange={setSessTime} placeholder="e.g. 7:00 PM"/></div>
            </div>
            <div><FL>TIMEZONE</FL>
              <DD value={sessTZ} onChange={setSessTZ} options={TIMEZONES}/>
            </div>
            <div><FL>SESSION NOTES (optional)</FL>
              <Inp value={sessNotes} onChange={setSessNotes} placeholder="e.g. Emergency sitting, special orders…"/>
            </div>
            <div>
              <FL>SUBMISSION NOTICE PERIOD</FL>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[["0","⚡ Emergency (0h)"],["12","12 Hours"],["24","24 Hours (Standard)"],["36","36 Hours"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setSessNotice(v)}
                    style={{flex:1,minWidth:90,fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.08em",
                      padding:"5px 8px",border:`1px solid ${sessNotice===v?"#4a88ff":"#2a3a20"}`,borderRadius:2,cursor:"pointer",
                      background:sessNotice===v?"#0a1225":"transparent",color:sessNotice===v?"#6aa8ff":"#6a7a60"}}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginTop:4,lineHeight:1.5}}>
                {sessNotice==="0"
                  ?"⚠ Emergency — submissions allowed until session opens. Use only in extenuating circumstances."
                  :"Members cannot submit new bills within "+sessNotice+" hours of the scheduled session start."}
              </div>
            </div>
            <Btn variant="blue" small onClick={async()=>{
              setProcessing("Saving session…");
              await onAction("saveSession",{session:{date:sessDate,time:sessTime,tz:sessTZ,notes:sessNotes,noticePeriod:parseInt(sessNotice)||24}});
              setProcessing(null); notify("Session scheduled.",C.green); setSessSection(false);
            }}>💾 Save Session</Btn>
          </div>
        )}
      </div>

      {/* Unexcused Absences Tracker */}
      <AbsencesTracker members={members} absences={absences} onAction={onAction} notify={notify} setProcessing={setProcessing}/>

      {/* Pending approval */}
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.textD,letterSpacing:"0.2em",marginBottom:"0.85rem"}}>PENDING APPROVAL ({pending.length})</div>
      {pending.length===0
        ?<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"1.5rem"}}>No bills awaiting review.</div>
        :pending.map(bill=>{
          const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
          return (
            <div key={bill.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`4px solid #888`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"0.6rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700,marginBottom:4}}>{bill.title}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>by {bill.submitter}</span>
                    {bill.type!=="regular"&&<span style={{fontSize:11,color:C.gold}}>{bt.icon} {bt.label}</span>}
                    {bill.nominee&&<span style={{fontSize:12,color:C.gold}}>→ {bill.nominee}{bill.portfolio?" ("+bill.portfolio+")":""}</span>}
                    {bill.gdoc_url&&<a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View Doc →</a>}
                  </div>
                </div>
                <Btn variant="green" small onClick={async()=>{
                    setProcessing("Adding to docket…");
                    await onAction("approveBill",{billId:bill.id});
                    setProcessing(null);
                    notify("Bill added to docket.",C.green);
                  }}>📋 Add to Docket</Btn>
              </div>
              <PresidentDenyRow bill={bill} presidentRole="bt_president" onAction={onAction} notify={notify} setProcessing={setProcessing}/>
            </div>
          );
        })
      }

      <Divider/>

      {/* Docket */}
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#5a9a5a",letterSpacing:"0.2em",marginBottom:"0.85rem"}}>DOCKET — NEXT SESSION ({docket.length})</div>
      {docket.length===0
        ?<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"1.5rem"}}>No bills on the docket. Approve bills above to add them.</div>
        :<div style={{marginBottom:"1.5rem"}}>
          {docket.map(bill=>(
            <div key={bill.id} style={{background:C.s2,border:`1px solid #5a9a5a33`,borderLeft:`4px solid #5a9a5a`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1.1rem",marginBottom:"0.5rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,fontWeight:700}}>{bill.title}</div>
                  <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>by {bill.submitter}</div>
                </div>
                {bill.gdoc_url&&<a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View →</a>}
              </div>
              <PresidentPullRow bill={bill} presidentRole="bt_president" onAction={onAction} notify={notify} setProcessing={setProcessing}/>
            </div>
          ))}
          <div style={{marginTop:"0.5rem"}}>
            <ArmBtn label={"🟢 Open Session — Move All to Active Vote"} confirmLabel="Start session now?" variant="green"
              onConfirm={async()=>{
                setProcessing("Opening session…");
                await onAction("openSession",{});
                setProcessing(null);
                notify("Session opened — all docket bills are now active.",C.green);
              }}/>
          </div>
        </div>
      }

      <Divider/>

      {/* Active votes */}
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#4a88ff",letterSpacing:"0.2em",marginBottom:"0.85rem"}}>CURRENT SESSION — RECORDING VOTES ({active.length})</div>
      <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.6,marginBottom:"0.85rem"}}>
        Record votes as they are cast during the session. You may save progress and return. Close the vote when recording is complete.
      </div>
      {active.length===0?<div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>No session currently in progress.</div>
        :active.map(bill=>{
          const isRec=rec===bill.id;
          return (
            <div key={bill.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`4px solid #4a88ff`,borderRadius:"0 3px 3px 0",marginBottom:"0.75rem",padding:"0.85rem 1.1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700}}>{bill.title}</div>
                  {bill.nominee&&<div style={{fontSize:12,color:C.gold,fontStyle:"italic",marginTop:2}}>Nominee: {bill.nominee}</div>}
                  {bill.gdoc_url&&<a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em",display:"block",marginTop:3}}>📄 View Doc →</a>}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <Btn variant="blue" small onClick={()=>setRec(isRec?null:bill.id)}>{isRec?"▲ Close":"🗳 Record Votes"}</Btn>
                  <ArmBtn small label="Close Vote" confirmLabel="Close?"
                    onConfirm={async()=>{
                      const btT=bill.type==="constitutional_amendment"?BT_SUPERMAJORITY:BT_THRESHOLD;
                      const res=calcBT(members,bill.bt_votes||{},btT,bill.bt_vote_names,formerMembers,true);
                      setProcessing("Closing vote…");
                      await onAction("closeBTVote",{billId:bill.id,result:res});
                      setProcessing(null);
                      notify(res.passed?"✓ Passed — proceeding to next stage":"✗ Failed — archived",res.passed?C.green:C.redL);
                      setRec(null);
                    }}/>
                </div>
              </div>
              {isRec&&<VoteRecorder bill={bill} members={members} bundesherren={bundesherren} chamber="bt"
                onSave={async(votes)=>{await onAction("saveVotes",{billId:bill.id,votes,chamber:"bt"});notify("Votes saved.",C.green);}}
                onClose={()=>setRec(null)}/>}
            </div>
          );
        })
      }
    </div>
  );
}

// ── Panel: Emperor ────────────────────────────────────────────────────────────
function ArchiveMgmtRow({b,onAction,notify,setProcessing}) {
  const [editDoc,setEditDoc]=useState(false);
  const [newUrl,setNewUrl]=useState(b.gdoc_url||"");
  const [saving,setSaving]=useState(false);
  const sm=STATUS_META[b.status]||{color:C.textD,icon:"•"};
  return (
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderLeft:`4px solid ${sm.color}`,borderRadius:"0 3px 3px 0",marginBottom:"0.6rem",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap",padding:"0.75rem 1rem"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,fontWeight:700,marginBottom:3}}>{sm.icon} {b.title}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:sm.color,border:`1px solid ${sm.color}44`,padding:"1px 6px",borderRadius:2}}>{b.status==="pulled"?(b.pulled_by==="bt_president"?"📥 Pulled — Bundestag President":b.pulled_by==="bh_president"?"📥 Pulled — Bundesherren President":"📥 Pulled by the Emperor"):sm.label}</span>
            <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>by {b.submitter}</span>
            {b.gdoc_url&&<a href={b.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View →</a>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          <Btn variant="ghost" small onClick={()=>{setEditDoc(e=>!e);setNewUrl(b.gdoc_url||"");}}>
            {editDoc?"▲":"📎 Edit Doc"}
          </Btn>
          {b.status==="passed"&&(
            <ArmBtn small label="🚫 Repeal" confirmLabel="Repeal this law?" variant="orange"
              onConfirm={async()=>{
                setProcessing("Marking as repealed…");
                await onAction("repealBill",{billId:b.id});
                setProcessing(null); notify("Bill repealed.",C.gold);
              }}/>
          )}
          <ArmBtn small label="🗑 Delete" confirmLabel="Permanently delete?" variant="danger"
            onConfirm={async()=>{
              setProcessing("Deleting bill…");
              await onAction("deleteBill",{billId:b.id});
              setProcessing(null); notify("Bill deleted.",C.textD);
            }}/>
        </div>
      </div>
      {editDoc&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1rem",background:C.s1,display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <FL>DOCUMENT LINK</FL>
          <div style={{display:"flex",gap:8}}>
            <Inp value={newUrl} onChange={setNewUrl} placeholder="https://docs.google.com/..." style={{flex:1}}/>
            <Btn variant="gold" small disabled={saving||!newUrl.trim()||newUrl===b.gdoc_url} onClick={async()=>{
              if(!newUrl.startsWith("http")){notify("Must be a valid URL.",C.redL);return;}
              setSaving(true); setProcessing("Updating document link…");
              await onAction("updateBillDoc",{billId:b.id,gdoc_url:newUrl.trim()});
              setProcessing(null); setSaving(false); setEditDoc(false);
            }}>Save</Btn>
          </div>
          <div style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>This change is not publicly logged. The document link will update silently.</div>
        </div>
      )}
    </div>
  );
}

function PullBillSection({bills,onAction,notify,setProcessing}) {

  const [reason,setReason]=useState("");
  const [saving,setSaving]=useState(false);

    .filter(b=>["pending","pending_bh","pending_emperor","docket","bt_voting","bh_voting"].includes(b.status))

      <div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>No bills currently in the legislative process.</div>

  return (
    <div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#9a5a9a",letterSpacing:"0.2em",marginBottom:"0.75rem"}}>📥 PULL A BILL FROM THE FLOOR</div>

      <div style={{display:"flex",flexDirection:"column",gap:"0.7rem",maxWidth:500}}>

            <option value="">— Select a bill —</option>

          }}/>

  );
}

// Opened by clicking a member anywhere they are listed. Everything here is
// assembled from existing records — nothing new to maintain by hand.
const FactsheetCtx=createContext(()=>{});
const useFactsheet=()=>useContext(FactsheetCtx);

const ACTIVITY_TOOLTIP=
  "Activity Index — the share of votes put to this member that they took part in. "+
  "Voting for, against or abstaining all count as taking part; only being marked "+
  "absent counts against it. A member present for 3 of 4 votes scores 75%. "+
  "It is drawn from their whole record in the chamber, not the current term.";
const activityColor=(pct)=>pct>=75?"#7ad47a":pct>=50?C.gold:pct>=25?"#cc6a10":C.redL;
// Honorific data for lists, which sit far from where it is loaded.
const HonoursCtx=createContext(null);
const useHonours=()=>useContext(HonoursCtx);

// The player's Minecraft face, as their ID card carries it. Drawn from the
// account behind the record, so an unlinked entry simply shows nothing.
function mcFace(n){return "https://mc-heads.net/avatar/"+encodeURIComponent(n||"")+"/64";}
function McFace({person,size=30,style:ex={}}){
  const ctx=useHonours();
  // Records made before usernames were stored hold one in the name field, which
  // is also what the lists show — so the face follows the name on screen.
  const u=person?.username||person?.name;
  if(!u) return null;
  const acc=ctx?.accounts?.[u]||ctx?.accounts?.[String(u).toLowerCase()];
  return <img src={mcFace(acc?.mcName||u)} alt="" width={size} height={size} loading="lazy"
    onError={e=>{e.currentTarget.style.visibility="hidden";}}
    style={{width:size,height:size,borderRadius:2,imageRendering:"pixelated",
      border:`1px solid ${C.border}`,background:C.s2,flexShrink:0,...ex}}/>;
}

// Fills in the per-person parts of the context — their account, and the offices
// they held under past governments (which is what retains a style for life).
function honorificsFor(person,ctx){
  if(!ctx||!person) return {prefix:null,styles:[],suffixes:[]};
  return honorifics(person,{...ctx,
    account:person.username?ctx.accounts?.[person.username]:null,
    pastOffices:serviceRecord(person,ctx.governments)});
}

// Post-nominals after a name in a list. Deliberately quiet: small, dim, and
// hoverable for the reason — the register is detail, not decoration.
const SHORT_POST_NOMINAL_LIMIT=4;
function PostNominals({person,style:ex={}}){
  const ctx=useHonours();
  if(!ctx||!person) return null;
  const {suffixes}=honorificsFor(person,ctx);
  if(suffixes.length===0) return null;
  // Already ordered by seniority — decorations by prestige, then offices — so
  // the most senior few are simply the front of the list. A full list belongs on
  // the factsheet; a name in a list should stay readable.
  const shown=suffixes.slice(0,SHORT_POST_NOMINAL_LIMIT);
  const rest=suffixes.slice(SHORT_POST_NOMINAL_LIMIT);
  const tip=shown.map(s=>s.code+" — "+s.why).join("\n")
    +(rest.length?"\n\nAlso holds "+rest.map(s=>s.code).join(", ")
      +" — see their factsheet for the full list.":"");
  return(
    <span className="mono" title={tip}
      style={{fontSize:8,letterSpacing:"0.08em",color:C.gold,opacity:0.75,
        cursor:"help",marginLeft:5,...ex}}>
      {shown.map(s=>s.code).join(" ")}
    </span>
  );
}

              {presided.map((c,i)=>(
                <div key={i} style={{background:C.s2,border:`1px solid ${C.border}`,

function MemberFactsheet({person,members,bundesherren,formerMembers,officials,bills,accounts,governments,absences,onClose}){
  const [voteTab,setVoteTab]=useState("bt");
  const [openBill,setOpenBill]=useState(null);
  const honCtx=useHonours();
  if(!person) return null;
  const hon=honorificsFor(person,honCtx);
  const acc=person.username?accounts?.[person.username]:null;
  const ids=identityIds(person,members,bundesherren,formerMembers);
  const votes=votingRecord(ids,bills);
  const submissions=submissionRecord(person,ids,bills);
  const service=serviceRecord(person,governments);
  // The card can be opened from a stub — a judicial appointment, an official's
  // name in a banner — which carries no seat or party of its own. Resolve to the
  // roster record that actually holds them so the card reads the same wherever
  // it was opened from.
  const btRec=Object.values(members||{}).find(m=>ids.has(m.id))||null;
  const bhRec=Object.values(bundesherren||{}).find(b=>ids.has(b.id))||null;
  const seated=!!btRec;
  const bhSeated=!!bhRec;
  const former=Object.values(formerMembers||{}).filter(f=>ids.has(f.id));
  const rec=btRec||bhRec||former[0]||person;
  const party=getParty(person.party||rec.party);
  const region=acc?.stateOfResidency?BK_PROVINCES[acc.stateOfResidency]||acc.stateOfResidency:null;
  // The name they go by, shown only when it adds something over the username.
  const rpName=[acc?.displayName,person.name].find(n=>
    n&&String(n).toLowerCase()!==String(person.username||"").toLowerCase())||null;

  // Current offices held.
  const offices=[];
  const u=String(person.username||"").toLowerCase();
  if(u&&String(officials?.president_bt_username||"").toLowerCase()===u) offices.push("President of the Bundestag");
  if(u&&String(officials?.president_bh_username||"").toLowerCase()===u) offices.push("President of the Bundesherren");
  if(u&&String(officials?.chancellor_username||"").toLowerCase()===u) offices.push("Imperial Chancellor");
  Object.entries(officials?.minister_usernames||{}).forEach(([p,mu])=>{
    if(u&&String(mu||"").toLowerCase()===u) offices.push(p);
  });
  // Offices recorded before usernames were stored hold a bare name, which may be
  // either the person's username or their display name — match against both.
  if(offices.length===0){
    const names=[person.name,person.username,acc?.displayName]
      .filter(Boolean).map(s=>String(s).toLowerCase());
    const is=(v)=>{const s=String(v||"").toLowerCase(); return !!s&&s!=="vacant"&&names.includes(s);};
    if(is(officials?.president_bt)) offices.push("President of the Bundestag");
    if(is(officials?.president_bh)) offices.push("President of the Bundesherren");
    if(is(officials?.chancellor))   offices.push("Imperial Chancellor");
    Object.entries(officials?.ministers||{}).forEach(([p,mn])=>{ if(is(mn)) offices.push(p); });
  }
  const isLeader=(officials?.partyLeaders||{})[person.party];
  if(isLeader&&ids.has(isLeader)) offices.push((party?.name||"Party")+" Leader");
  const isWhip=(officials?.partyWhips||{})[person.party];
  if(isWhip&&ids.has(isWhip)) offices.push((party?.name||"Party")+" Whip");
  if(officials?.opposition&&ids.has(officials.opposition)) offices.push("Leader of the Opposition");

  // Parties held across the current and former rolls.
  const partyHistory=[];
  [...Object.values(members||{}),...Object.values(bundesherren||{}),...Object.values(formerMembers||{})]
    .filter(r=>ids.has(r.id))
    .forEach(r=>{ if(r.party&&!partyHistory.includes(r.party)) partyHistory.push(r.party); });

  const absCount=Object.values(absences||{}).filter(a=>ids.has(a.memberId)&&!a.excused).length;

  // A person may serve in more than one body at once, and each is a separate
  // record — a seat in both chambers, or a seat and a place on the bench. A tab
  // appears only for a body they actually belong to.
  const btVotes=votes.filter(v=>v.chamber==="bt");
  const bhVotes=votes.filter(v=>v.chamber==="bh");
  const judicial=judicialRecord(person,honCtx);
  const RECORDS=[
    ...((seated||btVotes.length>0)?[{v:"bt",l:"Bundestag History",icon:"🏛",n:btVotes.length}]:[]),
    ...((bhSeated||bhVotes.length>0)?[{v:"bh",l:"Bundesherren History",icon:"🏰",n:bhVotes.length}]:[]),
    ...(judicial?[{v:"ij",l:"Judicial Record",icon:"⚖",n:judicial.rulings.length}]:[]),
  ];
  const activeTab=RECORDS.some(r=>r.v===voteTab)?voteTab:(RECORDS[0]?.v||"bt");
  const shownVotes=activeTab==="bh"?bhVotes:activeTab==="bt"?btVotes:[];
  // Judged on the record being shown, so someone in two bodies is measured per body.
  const activity=activityIndex(shownVotes);
  const drafting=draftingRatio(shownVotes,submissions);

  const tally={for:0,against:0,abstain:0,absent:0};
  shownVotes.forEach(v=>{ if(tally[v.vote]!==undefined) tally[v.vote]++; });

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000000dd",zIndex:300,
      display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"2rem 1rem",overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.s1,border:`1px solid ${party?.color||C.gold}55`,
        borderTop:`3px solid ${party?.color||C.gold}`,borderRadius:"0 0 4px 4px",maxWidth:620,width:"100%"}}>

        {/* Header */}
        <div style={{padding:"1.25rem 1.5rem",borderBottom:`1px solid ${C.border}`,
          display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          {/* Opened from a stub the face falls back to the roster record, which
              is the one that actually carries the linked account. */}
          <McFace person={person.username?person:rec} size={56} style={{borderColor:(party?.color||C.gold)+"66"}}/>
          <div style={{flex:1,minWidth:0}}>
            {/* Style of address, per the Imperial Honors & Medals Register. */}
            {hon.prefix&&(
              <div title={hon.styles.map(s=>s.style+" — "+s.why).join("\n")}
                style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.16em",
                  color:C.gold,marginBottom:3,cursor:"help"}}>
                {hon.prefix.style.toUpperCase()}
              </div>
            )}
            <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:C.text,letterSpacing:"0.05em"}}>
              {person.username||person.name}
              <PostNominals person={person} style={{fontSize:11,opacity:1,marginLeft:8}}/>
            </div>
            {/* The chamber lists people by username; the name they go by is revealed here. */}
            {rpName&&(
              <div style={{fontSize:14,color:C.gold,fontStyle:"italic",marginTop:2}}>{rpName}</div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
              {party&&<span style={{fontSize:12,color:party.color}}>{party.name}</span>}
              {!person.username&&<span style={{fontSize:11,color:C.textDD,fontStyle:"italic"}}>unlinked record</span>}
              <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.12em",
                border:`1px solid ${seated||bhSeated?"#4a9a5a66":"#5a5a5a66"}`,borderRadius:2,padding:"1px 6px",
                color:seated||bhSeated?"#7ad47a":"#8a8a8a"}}>
                {seated?"SITTING":bhSeated?"BUNDESHERR":"FORMER"}
              </span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.textD,
            cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
        </div>

        <div style={{padding:"1rem 1.5rem 1.5rem"}}>
          {/* Vote summary */}
          {shownVotes.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:"1rem"}}>
              {[["For",tally.for,"#7ad47a"],["Against",tally.against,C.redL],
                ["Abstain",tally.abstain,C.textD],["Absent",tally.absent,"#8888bb"]].map(([l,n,c])=>(
                <div key={l} style={{background:C.s2,border:`1px solid ${C.border}`,borderTop:`2px solid ${c}`,
