function budgetValidUntil(ratifiedAt) {
  // Last day of ratification month + 15 days
  const d = new Date(ratifiedAt);
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0, 23, 59, 59, 999);
  return lastDay.getTime() + 15*24*60*60*1000;
}
function budgetCooldownUntil(ratifiedAt) {
  // Can re-propose from the 1st of the following month
  const d=new Date(ratifiedAt);
  return new Date(d.getFullYear(),d.getMonth()+1,1,0,0,0,0).getTime();
}
function fmtCur(n) {
  if(!n&&n!==0) return "—";
  const abs=Math.abs(n);
  const s=abs>=1000000?(abs/1000000).toFixed(1)+"M":abs>=1000?(abs/1000).toFixed(1)+"K":Number(abs).toLocaleString();
  return "$"+(n<0?"-":"")+s;
}
function fmtDate(ts) {

}
function daysLeft(ts) {

async function sha256(t) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function sgetAll(prefix) {

// ── Atomic write tracking ─────────────────────────────────────────────────────
var _writeTx = null;
function beginTx() { _writeTx = { keys: [], committed: false }; }
function commitTx() { if(_writeTx) _writeTx.committed = true; _writeTx = null; }

window.addEventListener("beforeunload", function(e) {
  if(_writeTx && !_writeTx.committed) {
    _writeTx.keys.forEach(function(k) {
      try { navigator.sendBeacon(SCRIPT_URL, JSON.stringify({action:"del",key:k})); } catch(ex){}
    });
    e.preventDefault();
    e.returnValue = "Data is still saving. Leaving now may corrupt your data.";
  }
});

async function sset(k,v) {
  try {
    if(_writeTx) _writeTx.keys.push(k);
    await fetch(SCRIPT_URL,{
      method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"set",key:k,value:JSON.stringify(v)}),
    });
    return true;
  } catch(e){ return false; }
}
async function sdel(k) {
  try {
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"del",key:k})});
  } catch{}
}

function calcBT(members, votes, threshold=BT_THRESHOLD) {
  let f=0,a=0,ab=0;
  Object.entries(votes||{}).forEach(([id,v])=>{
    const s=(members[id]?.seats)||0;
    if(v==="for") f+=s; else if(v==="against") a+=s; else if(v==="abstain"||v==="absent") ab+=s;
  });
  return {for_seats:f,against_seats:a,abstain_seats:ab,passed:f>=threshold,threshold};
}
function calcBH(bh, votes) {
  let f=0,a=0,ab=0;
  const total=Object.keys(bh||{}).length;
  Object.entries(votes||{}).forEach(([id,v])=>{
    if(!bh[id]) return;
    if(v==="for") f++; else if(v==="against") a++; else if(v==="abstain") ab++;
  });
  const thresh=Math.floor(total/2)+1;
  return {for_count:f,against_count:a,abstain_count:ab,total,threshold:thresh,passed:f>=thresh};
}

// ── Bill progress pipeline ───────────────────────────────────────────────────
function BillPipeline({bill}) {
  const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
  const skipBH=bt.skipBH;
  const s=bill.status;

  const bhOriginBill = bill.origin==="bh";
  const bhSkipBT = bt.bhOrigin; // appoint_bh_pres skips BT entirely

  // Define stages based on origin and type
  const stages=[];
  stages.push({key:"submitted", label:"Submitted", icon:"📝"});
  if(bill.type==="motion"){
    if(bill.origin==="bh"){
      stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
      if(bill.motion_scope==="dual") stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});
    } else {
      stages.push({key:"bt_voting",label:"BT Vote",icon:"🏛"});
      if(bill.motion_scope==="dual") stages.push({key:"bh_voting",label:"BH Vote",icon:"🏰"});
    }
    stages.push({key:"motion_passed",label:"Passed",icon:"✋"});
  } else if(bhOriginBill){
    // BH-originated: BH first, then BT vote (unless bhOrigin type), then Emperor
    stages.push({key:"bh_voting", label:"BH Vote",      icon:"🏰"});
    if(!bhSkipBT)
      stages.push({key:"bt_voting", label:"BT Vote",    icon:"🗳"});
  } else {
    // BT-originated: docket → BT → BH (unless skipBH) → Emperor
    stages.push({key:"docket",    label:"Docket",       icon:"📋"});
    stages.push({key:"bt_voting", label:"BT Vote",      icon:"🗳"});
    if(!skipBH)
      stages.push({key:"bh_voting", label:"BH Vote",    icon:"⚜"});
  }
  if(bill.type!=="motion"){
    stages.push({key:"emperor",   label:"Emperor",      icon:"👑"});
    stages.push({key:"passed",    label:"Law",          icon:"✅"});
  }

  // Map current status to stage key
  const stageKey=(()=>{
    if(["pending_emperor"].includes(s)) return "submitted";
    if(s==="pending_bh") return "submitted";
    if(s==="pending") return bhOriginBill?"bt_voting":"submitted";
    if(s==="docket")       return "docket";
    if(s==="bt_voting")    return "bt_voting";
    if(s==="bh_voting")    return "bh_voting";
    if(["ratification","returned"].includes(s)) return "emperor";
    if(s==="passed")       return "passed";
    if(s==="motion_passed") return "motion_passed";
    return null;
  })();

  const stageIdx=stages.findIndex(st=>st.key===stageKey);
  const failed=["failed_bt","failed_bh","vetoed","repealed","motion_failed"].includes(s);
  const returned=s==="returned";

  return (
    <div style={{marginBottom:"1rem",padding:"0.75rem 1rem",background:C.s1,borderRadius:3,
                  border:`1px solid ${C.border}`}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:8,textTransform:"uppercase"}}>Bill Progress</div>
      <div style={{display:"flex",alignItems:"center",flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
        {stages.map((stage,i)=>{
          const done  = stageIdx>i || s==="passed";
          const active= stageIdx===i && !failed;
          const color = done?"#7ad47a":active?(returned&&stage.key==="emperor"?"#f0a050":"#4a88ff"):C.textDD;
          const isLast= i===stages.length-1;
          return (
            <React.Fragment key={stage.key}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,minWidth:52}}>
                <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                              background:done?"#0a2a0a":active?(returned&&stage.key==="emperor"?"#2a1500":"#001230"):"transparent",
                              border:`2px solid ${color}`,fontSize:13,marginBottom:3,
                              boxShadow:active?`0 0 8px ${color}44`:"none"}}>
                  {done?"✓":stage.icon}
                </div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color,letterSpacing:"0.06em",textAlign:"center",lineHeight:1.3,maxWidth:50}}>
                  {stage.label}
                  {active&&returned&&stage.key==="emperor"&&<div style={{color:"#f0a050",fontSize:7,marginTop:1}}>↩ RETURNED</div>}
                </div>
              </div>
              {!isLast&&(
                <div style={{flex:1,height:2,minWidth:8,maxWidth:32,
                              background:done?`linear-gradient(to right,#3a8a3a,#3a8a3a)`:`linear-gradient(to right,${C.border},${C.border})`,
                              marginBottom:18,flexShrink:1}}/>
              )}
            </React.Fragment>
          );
        })}
        {failed&&(
          <div style={{marginLeft:8,fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.1em",marginBottom:18,flexShrink:0}}>
            {s==="failed_bt"?"✗ Failed BT":s==="failed_bh"?"✗ Failed BH":s==="vetoed"?"🚫 Vetoed":s==="repealed"?"🚫 Repealed":s==="motion_failed"?"✗ Motion Failed":""}
          </div>
        )}
      </div>
    </div>
  );
}

                    {m.enacted&&<span style={{color:"#5a7090",marginLeft:6}}>{" \u2014 "}{fmtD(m.enacted)}</span>}
                  </div>
                  {(m.presidingNames||[]).length>0&&<div style={{fontSize:12,color:"#5a7090",fontStyle:"italic",marginBottom:m.body?4:0}}>
                    {"Presiding: "}{m.presidingNames.join(", ")}
                  </div>}
                  {m.body&&<details style={{marginTop:4}}>
                    <summary style={{fontSize:11,color:"#6a8acc",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:"0.1em"}}>
                      VIEW MODIFICATION
                    </summary>
                    <div style={{fontSize:13,color:"#a0b8e0",lineHeight:1.7,marginTop:6,paddingTop:6,borderTop:"1px solid #1e2e48",whiteSpace:"pre-wrap"}}>{m.body}</div>
                  </details>}
                </div>;
              })}
            </div>;
          })()}
          {bill.pulled_at&&(
            <div style={{background:"#1a0a1a",border:`1px solid #6a3a6a55`,borderLeft:`3px solid #9a5a9a`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#c080c0",letterSpacing:"0.15em",marginBottom:bill.pull_reason?4:0}}>📥 PULLED BY {bill.pulled_by==="bt_president"?"PRESIDENT OF THE BUNDESTAG":bill.pulled_by==="bh_president"?"PRESIDENT OF THE BUNDESHERREN":"THE EMPEROR"} — {new Date(bill.pulled_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.pull_reason&&<div style={{fontSize:13,color:"#c0a0c0",fontStyle:"italic",lineHeight:1.7}}>{bill.pull_reason}</div>}
            </div>
          )}
          {bill.vetoed_at&&(
            <div style={{background:"#1a0808",border:`1px solid #8b1a1a55`,borderLeft:`3px solid #8b1a1a`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.redL,letterSpacing:"0.15em",marginBottom:bill.veto_reason?4:0}}>IMPERIAL VETO — {new Date(bill.vetoed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.veto_reason&&<div style={{fontSize:13,color:"#d08080",fontStyle:"italic",lineHeight:1.7}}>{bill.veto_reason}</div>}
            </div>
          )}
          {bill.returned_at&&(
            <div style={{background:"#1a0e00",border:`1px solid #b05a1055`,borderLeft:`3px solid #f0a050`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.75rem",marginTop:6}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"#f0a050",letterSpacing:"0.15em",marginBottom:bill.return_notes?4:0}}>RETURNED FOR REVISIONS — {new Date(bill.returned_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
              {bill.return_notes&&<div style={{fontSize:13,color:"#d0b090",fontStyle:"italic",lineHeight:1.7}}>{bill.return_notes}</div>}
            </div>
          )}
          {bill.failed_at&&<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>Concluded {new Date(bill.failed_at).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>}
        </div>
      )}
    </div>
  );
}

function VoteRecorder({bill,members,bundesherren,chamber,onSave,onClose}) {
  const isBT=chamber==="bt";
  const voterList=isBT
    ? Object.entries(members||{}).sort((a,b)=>b[1].seats-a[1].seats)
    : Object.entries(bundesherren||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  const [votes,setVotes]=useState({...(isBT?bill.bt_votes:bill.bh_votes)||{}});
  const [saving,setSaving]=useState(false);
  const btThresh=bill.type==="constitutional_amendment"?BT_SUPERMAJORITY:BT_THRESHOLD;
  const live=isBT?calcBT(members,votes,btThresh):calcBH(bundesherren,votes);
  return (
    <div style={{background:C.s1,border:`2px solid ${C.border}`,borderRadius:4,padding:"1.25rem",marginTop:"0.75rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:"0.85rem"}}>🗳 Recording Votes — {bill.title}</div>
      <div style={{marginBottom:"0.85rem"}}>
        <VoteBar fv={isBT?live.for_seats:live.for_count} av={isBT?live.against_seats:live.against_count}
          abv={isBT?live.abstain_seats:live.abstain_count} total={isBT?BT_SEATS_TOTAL:Math.max(live.total,1)}
          thresh={isBT?btThresh:live.threshold} isBT={isBT}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:320,overflowY:"auto",marginBottom:"0.85rem",paddingRight:2}}>
        {voterList.map(([id,voter])=>{
          const p=isBT?PARTIES.find(x=>x.id===voter.party):null;
          const v=votes[id];
          return (
            <div key={id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.s2,border:`1px solid ${C.border}`,borderLeft:`3px solid ${p?.color||C.gold}`,borderRadius:"0 2px 2px 0",padding:"5px 10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {!isBT&&<span style={{fontSize:10,color:C.gold}}>⚜</span>}
                <span style={{fontSize:13,color:C.text}}>{voter.name}</span>
                {isBT&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:p?.color||C.gold}}>{voter.seats}s</span>}
              </div>
              <div style={{display:"flex",gap:4}}>
                {([["for","FOR","#1a5a1a","#7ad47a"],["against","AGAINST",C.redD,C.redL],["abstain","ABS","#3a3a1a","#b0a878"],...(isBT?[["absent","ABSENT","#2a2a3a","#8888bb"]]:[])] ).map(([val,lbl,bg,clr])=>(
                  <button key={val} onClick={()=>setVotes(prev=>({...prev,[id]:prev[id]===val?undefined:val}))}
                    style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.08em",padding:"3px 8px",borderRadius:2,cursor:"pointer",
                             border:`1px solid ${v===val?clr:C.border}`,background:v===val?bg:"transparent",color:v===val?clr:C.textD}}>
                    {lbl}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn variant="green" onClick={async()=>{setSaving(true);await onSave(votes);setSaving(false);}} disabled={saving}>{saving?"Saving…":"💾 Save Votes"}</Btn>
        <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
      </div>
    </div>
  );
}

// ── Submit tab ────────────────────────────────────────────────────────────────
const TOP_TYPES = [
  { v:"regular",               l:"📜 Normal Bill" },
  { v:"position_nomination",   l:"👤 Position Nomination" },
  { v:"constitutional_amendment", l:"⚖ Constitutional Amendment" },
  { v:"budget",                l:"💰 Budget Bill" },
  { v:"motion",                l:"✋ Motion" },
  { v:"dissolve_government",   l:"🏚 Dissolve Government" },
];
const POSITION_OPTIONS = [
  { v:"appoint_bt_pres",    l:"🏛 President of the Bundestag" },
  { v:"appoint_chancellor", l:"⚜ Chancellor" },
  { v:"nominate_minister",  l:"🎖 Minister" },
];
const BH_TYPES = [
  { v:"regular",         l:"📜 Regular Bill" },
  { v:"appoint_bh_pres", l:"🏰 Nominate President of Bundesherren" },
  { v:"motion",          l:"✋ Motion" },
];


function SubmitTab({onSubmit,onSubmitBudget,activeBudget,budgetCooldown,orgChart,submitLock,imperialReserve}) {
  const [chamber,setChamber]=useState(null); // null | "bt" | "bh"
  const [topType,setTopType]=useState("regular");
  const [bhType,setBhType]=useState("regular");
  const [position,setPosition]=useState("appoint_bt_pres");
  const [title,setTitle]=useState("");
  const [gdoc,setGdoc]=useState("");
  const [submitter,setSubmitter]=useState("");
  const [nominee,setNominee]=useState("");
  const [portfolio,setPortfolio]=useState(MINISTER_PORTFOLIOS[0]);
  const [category,setCategory]=useState(LAW_CATEGORIES[0].v);
  const [motionText,setMotionText]=useState("");
  const [motionScope,setMotionScope]=useState("single"); // "single" | "dual"
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState("");

  const isBT = chamber==="bt";
  const isBH = chamber==="bh";
  const isBHNomination = isBH && bhType==="appoint_bh_pres";
  const isBHRegular    = isBH && bhType==="regular";
  const isBHMotion     = isBH && bhType==="motion";
  const isNomination   = isBT && topType==="position_nomination";
  const isMinister     = isNomination && position==="nominate_minister";
  const isConst        = isBT && topType==="constitutional_amendment";
  const isRegular      = isBT && topType==="regular";
  const isBudget       = isBT && topType==="budget";
  const isMotion       = (isBT && topType==="motion") || isBHMotion;
  const actualType     = isBH ? bhType : (isNomination ? position : topType);
  const needsNominee   = isNomination || isBHNomination;
  const needsDoc       = !needsNominee && !isMotion;

  const reset=()=>{
    setDone(false);setChamber(null);setTopType("regular");setBhType("regular");
    setPosition("appoint_bt_pres");setTitle("");setGdoc("");
    setSubmitter("");setNominee("");setCategory(LAW_CATEGORIES[0].v);
    setMotionText("");setMotionScope("single");
  };

  if(done) return (
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <Card style={{textAlign:"center",padding:"2.5rem"}}>
        <div style={{fontSize:32,marginBottom:"0.75rem"}}>{isBudget?"💰":isMotion?"✋":"📜"}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:C.text,marginBottom:8}}>{isBudget?"Budget Bill Submitted":isMotion?"Motion Submitted":"Bill Submitted"}</div>
        <div style={{fontSize:15,color:C.textD,fontStyle:"italic",lineHeight:1.7}}>
          {isBudget?"Your budget bill is pending approval by the President of the Bundestag."
            :isNomination?"Your nomination is pending Imperial approval before going to the floor."
            :isBHNomination?"Your nomination is pending BH President approval before the vote."
            :isMotion&&motionScope==="single"?("Your motion is pending approval by the President of the "+(isBH?"Bundesherren.":"Bundestag."))
            :isMotion?"Your motion is pending approval and will require a vote in both chambers."
            :isBH?"Your bill is pending approval by the President of the Bundesherren."
            :"Your bill is now pending approval by the President of the Bundestag."}
        </div>
        <div style={{marginTop:"1.25rem"}}><Btn variant="ghost" small onClick={reset}>Submit Another</Btn></div>
      </Card>
    </div>
  );

  if(submitLock) return (
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div style={{background:C.s2,border:"1px solid #6a1a1a",borderRadius:4,padding:"2.5rem",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:"0.75rem"}}>🔒</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:C.text,marginBottom:12}}>Submissions Locked</div>
        <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7}}>{submitLock.msg||"The Emperor has temporarily suspended bill submissions."}</div>
      </div>
    </div>
  );

  // Budget early return — renders BudgetSubmitSection standalone
  if(isBudget&&chamber==="bt") return (
    <div className="fu" style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.25rem"}}>
        <button onClick={()=>{setChamber(null);setTopType("regular");}}
          style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",
                   fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:"0.2em"}}>💰 BUDGET BILL — BUNDESTAG</div>
      </div>
      <BudgetSubmitSection activeBudget={activeBudget} budgetCooldown={budgetCooldown} orgChart={orgChart} imperialReserve={imperialReserve}
        onSubmitBudget={async(data)=>{const ok=await onSubmitBudget(data);if(ok)setDone(true);return ok;}}/>
    </div>
  );

  // Chamber selection screen
  if(!chamber) return (
    <div className="fu" style={{maxWidth:560,margin:"0 auto"}}>
      <STitle>Submit a Bill</STitle>
      <div style={{fontSize:15,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.5rem"}}>
        Select the chamber you are a member of.
      </div>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap"}}>
        {[
          {id:"bt",label:"Bundestag",icon:"🏛",desc:"Representatives of the people. Bills go to BH then Emperor.",color:"#4a88ff"},
          {id:"bh",label:"Bundesherren",icon:"🏰",desc:"The Imperial Lords. Bills go to BT then Emperor.",color:C.gold},
        ].map(ch=>(
          <div key={ch.id} onClick={()=>setChamber(ch.id)}
            style={{flex:1,minWidth:200,background:C.s2,border:`2px solid ${ch.color}44`,borderTop:`4px solid ${ch.color}`,
                     borderRadius:"0 0 4px 4px",padding:"1.5rem",textAlign:"center",cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=ch.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor=ch.color+"44"}>
            <div style={{fontSize:36,marginBottom:"0.75rem"}}>{ch.icon}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:ch.color,fontWeight:700,marginBottom:6}}>{ch.label}</div>
            <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.5}}>{ch.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="fu" style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.25rem"}}>
        <button onClick={()=>{setChamber(null);setErr("");}}
          style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",
                   fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:isBT?"#4a88ff":C.gold,letterSpacing:"0.2em"}}>
          {isBT?"🏛 BUNDESTAG":"🏰 BUNDESHERREN"} — SUBMIT BILL
        </div>
      </div>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
        Draft your bill in Google Docs, then submit it here.
        Make sure your document is set to <strong style={{color:C.text}}>"Anyone with the link can view"</strong>.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>

        {/* BT type selection */}
        {isBT&&(
          <div><FL>BILL TYPE *</FL>
            <DD value={topType} onChange={v=>{setTopType(v);setErr("");}} options={TOP_TYPES}/>
          </div>
        )}

        {/* BT position sub-dropdown */}
        {isNomination&&(
          <div><FL>POSITION *</FL>
            <DD value={position} onChange={v=>{setPosition(v);setErr("");}} options={POSITION_OPTIONS}/>
          </div>
        )}

        {/* BT minister portfolio */}
        {isMinister&&(
          <div><FL>MINISTERIAL PORTFOLIO *</FL>
            <DD value={portfolio} onChange={setPortfolio} options={MINISTER_PORTFOLIOS.map(p=>({v:p,l:p}))}/>
          </div>
        )}

        {/* BH type selection */}
        {isBH&&(
          <div><FL>BILL TYPE *</FL>
            <DD value={bhType} onChange={v=>{setBhType(v);setErr("");}} options={BH_TYPES}/>
          </div>
        )}

        {/* Notices */}
        {isRegular&&(
          <div style={{background:"#0a1a0a",border:`1px solid #3a9c3a44`,borderLeft:`3px solid #3a9c3a`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",fontSize:14,color:"#7ad47a",lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",display:"block",marginBottom:4}}>📜 SIMPLE MAJORITY</strong>
            Requires 501+ seats in the Bundestag and a majority of the Bundesherren. Goes to BH first, then BT, then Emperor.
          </div>
        )}
        {isNomination&&(
          <div style={{background:"#2a2000",border:`1px solid ${C.gold}44`,borderLeft:`3px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",fontSize:14,color:C.gold,lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",display:"block",marginBottom:4}}>⚜ IMPERIAL APPROVAL REQUIRED</strong>
            Nomination bills must be approved by the Emperor before they go to the floor.
          </div>
        )}
        {isConst&&(
          <div style={{background:"#0a1a2a",border:`1px solid #4a88ff44`,borderLeft:`3px solid #4a88ff`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",fontSize:14,color:"#88bbff",lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",display:"block",marginBottom:4}}>⚖ CONSTITUTIONAL AMENDMENT</strong>
            Requires 667+ seats in the Bundestag and a majority of the Bundesherren. Goes to BH first, then BT, then Emperor.
          </div>
        )}
        {isBHRegular&&(
          <div style={{background:"#1a1400",border:`1px solid ${C.gold}33`,borderLeft:`3px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",fontSize:14,color:"#c8a860",lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",display:"block",marginBottom:4}}>🏰 BUNDESHERREN BILL</strong>
            This bill will be voted on by the Bundesherren first, then the Bundestag, then sent to the Emperor for ratification.
          </div>
        )}
        {isBHNomination&&(
          <div style={{background:"#1a1400",border:`1px solid ${C.gold}33`,borderLeft:`3px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",fontSize:14,color:"#c8a860",lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",display:"block",marginBottom:4}}>🏰 BUNDESHERREN NOMINATION</strong>
            The nomination for President of the Bundesherren is voted on by the Bundesherren and then sent directly to the Emperor — no Bundestag involvement.
          </div>
        )}

        {isBT&&topType==="dissolve_government"&&(
          <div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"0.85rem",fontSize:14,color:C.redL,lineHeight:1.7}}>
            <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:4}}>🏚 DISSOLVE GOVERNMENT</strong>
            Passes the Bundestag by simple majority (501+ seats). Does not go to the Bundesherren. Requires Imperial ratification. Upon ratification, all Bundestag members, ministers, Vice Chancellor and Chancellor are immediately dismissed.
          </div>
        )}
        {isMotion&&(
          <div>
            <div style={{background:"#0e1a14",border:"1px solid #3a7a5a44",borderLeft:"3px solid #4a9a7a",borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"0.85rem",fontSize:14,color:"#80c8a0",lineHeight:1.7}}>
              <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:4,color:"#6abf90"}}>✋ MOTION</strong>
              Motions are resolutions passed directly by the chamber(s) without requiring a Google Doc. Write the full motion text below. The Emperor is not required to ratify motions.
            </div>
            <div style={{display:"flex",gap:6,marginBottom:"0.85rem"}}>
              <div onClick={()=>setMotionScope("single")}
                style={{flex:1,padding:"0.6rem 0.85rem",cursor:"pointer",borderRadius:3,textAlign:"center",
                         border:`2px solid ${motionScope==="single"?"#4a9a7a":"#333"}`,
                         background:motionScope==="single"?"#0a1a14":"transparent"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:motionScope==="single"?"#6abf90":C.textD,marginBottom:3}}>🏛 SINGLE CHAMBER</div>
                <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>Only the {isBH?"Bundesherren":"Bundestag"} votes</div>
              </div>
              <div onClick={()=>setMotionScope("dual")}
                style={{flex:1,padding:"0.6rem 0.85rem",cursor:"pointer",borderRadius:3,textAlign:"center",
                         border:`2px solid ${motionScope==="dual"?"#4a9a7a":"#333"}`,
                         background:motionScope==="dual"?"#0a1a14":"transparent"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:motionScope==="dual"?"#6abf90":C.textD,marginBottom:3}}>⚖ DUAL CHAMBER</div>
                <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>Both BT and BH must pass</div>
              </div>
            </div>
            <FL>MOTION TEXT *</FL>
            <TA value={motionText} onChange={setMotionText} placeholder="Write the full text of the motion here…" rows={6}/>
          </div>
        )}
        {needsNominee
          ?<div><FL>NOMINEE NAME *</FL><Inp value={nominee} onChange={setNominee} placeholder="Full name of the nominee"/></div>
          :<div><FL>BILL TITLE *</FL><Inp value={title} onChange={setTitle} placeholder="e.g. Imperial Revenue Act 2024"/></div>
        }
        {(isRegular||isBHRegular)&&(
          <div><FL>LAW CATEGORY *</FL>
            <DD value={category} onChange={setCategory} options={LAW_CATEGORIES.map(lc=>({v:lc.v,l:lc.l}))}/>
          </div>
        )}
        <div><FL>YOUR NAME *</FL><Inp value={submitter} onChange={setSubmitter} placeholder="Your in-game name"/></div>
        {needsDoc&&(
          <div>
            <FL>GOOGLE DOC LINK *</FL>
            <Inp value={gdoc} onChange={setGdoc} placeholder="https://docs.google.com/..."/>
            <div style={{fontSize:12,color:C.textDD,marginTop:4,fontStyle:"italic"}}>Paste the shareable link to your Google Doc</div>
          </div>
        )}
        {err&&<div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,padding:"0.6rem 1rem",borderRadius:"0 3px 3px 0",fontSize:13,color:C.redL}}>{err}</div>}
        <Btn onClick={async()=>{
          if(!submitter.trim()){setErr("Please enter your name.");return;}
          if(needsNominee&&!nominee.trim()){setErr("Please enter the nominee's name.");return;}
          if(isMotion&&!title.trim()){setErr("Please enter a title for the motion.");return;}
          if(isMotion&&!motionText.trim()){setErr("Please write the motion text.");return;}
          if(needsDoc&&(!title.trim()||!gdoc.trim())){setErr("Please fill all required fields.");return;}
          if(needsDoc&&!gdoc.startsWith("http")){setErr("Google Doc link must start with http.");return;}
          setSaving(true);setErr("");
          const billTitle=needsNominee
            ?(isMinister?"Nominate "+portfolio+" — "+nominee.trim():(BILL_TYPES[actualType]?.label||"Nomination")+" — "+nominee.trim())
            :title.trim();
          const res=await onSubmit({
            origin:chamber,
            type:actualType, title:billTitle,
            gdoc_url:needsNominee?"":isMotion?"":gdoc.trim(),
            submitter:submitter.trim(),
            nominee:needsNominee?nominee.trim():"",
            portfolio:isMinister?portfolio:"",
            category:(isRegular||isBHRegular)?category:"",
            motion_text:isMotion?motionText.trim():undefined,
            motion_scope:isMotion?motionScope:undefined,
          });
          setSaving(false);
          if(res==="cap") setErr("⚠ The President's queue is full (25 bills max). Wait for the President to review existing submissions before proposing more.");
          else if(res) setDone(true); else setErr("⚠ Submission failed — check your connection and try again.");
        }} disabled={saving||!submitter.trim()||(needsNominee&&!nominee.trim())||(needsDoc&&(!title.trim()||!gdoc.trim()))||(isMotion&&(!title.trim()||!motionText.trim()))} full>
          {saving?"Submitting…":"⚜ Submit Bill"}
        </Btn>
      </div>
    </div>
  );
}

// ── Session banner helper ────────────────────────────────────────────────────
function SessionBanner({session}) {
  if(!session?.date) return null;
  const fmtDate=d=>{
    try{ return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}); }
    catch{ return d; }
  };
  const isToday=session.date===new Date().toISOString().slice(0,10);
  return (
    <div className="shm" style={{background:isToday?"#0a1a0a":"#0e1018",
                                   border:`1px solid ${isToday?"#3a9c3a44":"#4a88ff33"}`,
                                   borderLeft:`4px solid ${isToday?"#3a9c3a":"#4a88ff"}`,
                                   borderRadius:"0 4px 4px 0",padding:"0.75rem 1.1rem",
                                   marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <span style={{fontSize:22}}>{isToday?"🟢":"📅"}</span>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",
                      color:isToday?"#7ad47a":"#88bbff",textTransform:"uppercase",marginBottom:3}}>
          {isToday?"Session Today":"Next Session"}
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:isToday?"#b0f0b0":"#c8dfff",fontWeight:700}}>
          {fmtDate(session.date)}{session.time?" at "+session.time:""}{session.tz?" ("+session.tz+")":""}
        </div>
        {session.notes&&<div style={{fontSize:13,color:"#88a8cc",fontStyle:"italic",marginTop:3}}>{session.notes}</div>}
      </div>
      <div style={{marginLeft:"auto",fontFamily:"'Cinzel',serif",fontSize:9,color:isToday?"#5a9c5a":"#4a68aa",
                    letterSpacing:"0.1em",textAlign:"right"}}>
        {isToday?"IN SESSION":"UPCOMING"}
      </div>
    </div>
  );
}

function BundesherrenTab({bundesherren,officials,bills,members}) {

    const ra=RANK_ORDER.indexOf(a.rank||""); const rb=RANK_ORDER.indexOf(b.rank||"");
    const ai=ra===-1?RANK_ORDER.length:ra; const bi=rb===-1?RANK_ORDER.length:rb;
    return ai!==bi?ai-bi:a.name.localeCompare(b.name);
  });
  const active=Object.values(bills||{}).filter(b=>b.status==="bh_voting").sort((a,b)=>b.created-a.created);
  const awaitRat=Object.values(bills||{}).filter(b=>b.status==="ratification").sort((a,b)=>b.created-a.created);
  const total=bhList.length, thresh=total>0?Math.floor(total/2)+1:0;
  return (
    <div className="fu">
      <OfficialsBanner officials={officials} chamber="bundesherren"/>
      <STitle>The Imperial Lords</STitle>
      <div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"0.85rem"}}>{total} member{total!==1?"s":""} · Majority: {thresh} of {total}</div>

        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:"1.5rem"}}>

            return(
              <div key={bh.id} style={{background:boxBg,border:`1px solid ${borderCol}55`,
                borderLeft:`3px solid ${borderCol}`,borderRadius:"0 3px 3px 0",padding:"6px 14px",
                display:"flex",alignItems:"center",gap:8,position:"relative",overflow:"hidden"}}>
                {pr?.fleur&&(
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"flex-end",

                    letterSpacing:"-4px"}}>

                )}
                <span style={{fontSize:16,color:borderCol,flexShrink:0}}>⚜</span>
                <div style={{position:"relative",zIndex:1}}>
                  {pr&&<div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",
                    color:pr.color,marginBottom:2,textTransform:"uppercase"}}>{pr.l}</div>}
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,
                    color:pr?.royal?pr.color:C.text,fontWeight:pr?.royal?700:400}}>{bh.name}</div>
                  {bh.title&&<div style={{fontSize:11,color:C.textD,fontStyle:"italic"}}>{bh.title}</div>}
                </div>
              </div>
            );
          })}
        </div>
      ):<div style={{fontSize:15,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>No Bundesherren registered.</div>}
      <Divider/>
      <STitle>Bills Open for Vote</STitle>
      {active.length===0?<div style={{fontSize:15,color:C.textD,fontStyle:"italic",padding:"1rem 0"}}>No bills currently open for Bundesherren vote.</div>
        :active.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren}/>)}
      {awaitRat.filter(b=>b.type!=="budget").length>0&&<><Divider/><STitle>Awaiting Imperial Ratification</STitle>{awaitRat.filter(b=>b.type!=="budget").map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren}/>)}</>}
    </div>
  );
}

function ArchiveTab({bills,members,bundesherren,ijStatutes,ijCases}) {
  const [statusFilter,setStatusFilter]=useState("all");
  const [catFilter,setCatFilter]=useState("all");
  const [search,setSearch]=useState("");

  // Build a set of BK bill IDs / titles that have been court-repealed
  const courtRepealedIds=useMemo(()=>{
    const s=new Set();
    Object.values(ijStatutes||{}).forEach(r=>{
      if(r.src==="court_repeal"){
        if(r.repealOf) s.add(r.repealOf);
        if(r.repealOfTitle) s.add(r.repealOfTitle);
      }
    });
    return s;
  },[ijStatutes]);

  const isCourtRepealed=b=>courtRepealedIds.has("bk_"+b.id)||courtRepealedIds.has(b.title||"");

  const statusMatch=(b,f)=>{
    if(f==="all") return true;
    if(f==="passed_all") return b.status==="passed"||b.status==="motion_passed";
    if(f==="failed_all") return b.status==="failed_bt"||b.status==="failed_bh"||b.status==="motion_failed";
    // "repealed" filter catches both manually-repealed AND court-repealed passed bills
    if(f==="repealed") return b.status==="repealed"||(b.status==="passed"&&isCourtRepealed(b));
    return b.status===f;
  };

  const done=Object.values(bills||{})
    .filter(b=>["passed","failed_bt","failed_bh","repealed","vetoed","pulled","motion_passed","motion_failed","decree"].includes(b.status))
    .sort((a,b)=>(b.ratified_at||b.failed_at||b.repealed_at||b.created)-(a.ratified_at||a.failed_at||a.repealed_at||a.created));

  const shown=done.filter(b=>{
    const statusOk=statusMatch(b,statusFilter);
    const catOk=catFilter==="all"
      ||(catFilter==="nomination"&&["appoint_bt_pres","appoint_chancellor","appoint_bh_pres","nominate_minister"].includes(b.type))
      ||(catFilter==="constitutional"&&b.type==="constitutional_amendment")
      ||(catFilter==="decree_type"&&b.status==="decree")
      ||(catFilter==="motion"&&b.type==="motion")
      ||(catFilter===b.category);
    const q=search.trim().toLowerCase();
    const searchOk=!q||b.title?.toLowerCase().includes(q)||b.submitter?.toLowerCase().includes(q)||b.nominee?.toLowerCase().includes(q);
    return statusOk&&catOk&&searchOk;
  });

  const STATUS_OPTS=[
    {v:"all",         l:"All Statuses"},
    {v:"passed_all",  l:"Passed"},
    {v:"failed_all",  l:"Failed"},
    {v:"vetoed",      l:"Vetoed"},
    {v:"pulled",      l:"Pulled"},
    {v:"repealed",    l:"Repealed"},
    {v:"decree",      l:"Imperial Decree"},
  ];
  const statusCount=(f)=>{
    if(f==="passed_all") return done.filter(b=>b.status==="passed"||b.status==="motion_passed").length;
    if(f==="failed_all") return done.filter(b=>b.status==="failed_bt"||b.status==="failed_bh"||b.status==="motion_failed").length;
    if(f==="repealed") return done.filter(b=>b.status==="repealed"||(b.status==="passed"&&isCourtRepealed(b))).length;
    return done.filter(b=>b.status===f).length;
  };
  const CAT_OPTS=[
    {v:"all",l:"All Types"},
    {v:"constitutional",l:"Constitutional Amendment"},
    {v:"nomination",l:"Nominations"},
    {v:"decree_type",l:"Imperial Decrees"},
    {v:"motion",l:"Motions"},
    ...LAW_CATEGORIES.map(lc=>({v:lc.v,l:lc.l})),
  ];

  return (
    <div className="fu">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:"1.25rem"}}>
        <STitle style={{marginBottom:0}}>Legislative Archive</STitle>
        <a href="ij.html" target="_blank" rel="noopener noreferrer"
          style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",
                   padding:"4px 12px",borderRadius:2,border:`1px solid ${C.gold}55`,background:"#1a1400",
                   color:C.gold,textDecoration:"none",flexShrink:0}}>
          {"Imperial Legal Code \u2192"}
        </a>
      </div>
      <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.25rem",flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:2,minWidth:200}}>
          <FL>SEARCH</FL>
          <div style={{position:"relative"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by title, submitter, nominee…"
              style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:2,
                       padding:"7px 10px 7px 32px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=C.redD} onBlur={e=>e.target.style.borderColor=C.border}/>

        </div>
        <div style={{flex:1,minWidth:160}}>

          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}

  );
}

// ── Returned bill row (with revision confirmation) ───────────────────────────
function ReturnedBillRow({bill,presidentRole,onAction,notify,setProcessing}) {

            <span style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#b05a10",border:"1px solid #b05a1044",borderRadius:2,padding:"1px 5px"}}>RETURNED {bill.return_count||1}×</span>
            <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>Submitted by {bill.submitter}</span>
            {bill.gdoc_url&&<a href={bill.gdoc_url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.gold,letterSpacing:"0.08em"}}>📄 View Doc →</a>}
          </div>
        </div>

        )}
      </div>

      {bill.return_notes&&(
        <div style={{background:"#0e0800",border:`1px solid #b05a1033`,borderRadius:3,padding:"0.6rem 0.75rem",marginTop:4,marginBottom:step!=="idle"?8:0}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#b05a10",letterSpacing:"0.15em",marginBottom:4}}>IMPERIAL REVISION NOTES</div>
          <div style={{fontSize:13,color:"#d0b090",lineHeight:1.7,fontStyle:"italic"}}>{bill.return_notes}</div>
        </div>
      )}

      {step==="confirm"&&(
        <div style={{background:"#0a0e00",border:`1px solid #5a7a2033`,borderLeft:`3px solid #8ab840`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginTop:6}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",color:"#a0c860",marginBottom:8,textTransform:"uppercase"}}>
            ✎ Revision Confirmation Required
          </div>
          <div style={{fontSize:13,color:"#c0d0a0",lineHeight:1.7,marginBottom:"0.85rem"}}>
            Confirm that you have liaised with <strong style={{color:"#f0e0c0"}}>{bill.submitter}</strong> and that the Google Doc has been updated to address all of the Emperor's revision notes before re-submitting to the docket.
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn variant="green" disabled={saving} onClick={async()=>{
              setSaving(true);
              setProcessing("Re-queuing bill…");
              await onAction("requeueBill",{billId:bill.id});
              setProcessing(null); setSaving(false);
              notify("Bill re-queued — revisions confirmed.",C.green);
            }}>✓ Yes — Document Has Been Revised</Btn>
            <Btn variant="danger" small disabled={saving} onClick={()=>setStep("denied")}>✗ Not Yet</Btn>
            <Btn small style={{background:"transparent",border:"1px solid #5a3a5a",color:"#b070b0"}} disabled={saving} onClick={()=>setStep("pull")}>📥 Pull Bill</Btn>
          </div>
        </div>
      )}

      {step==="denied"&&(
        <div style={{background:"#150808",border:`1px solid #5a1a1a33`,borderLeft:`3px solid ${C.redD}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginTop:6}}>
          <div style={{fontSize:13,color:C.textD,lineHeight:1.7,marginBottom:8}}>
            Do not re-submit until the document has been updated. Reach out to <strong style={{color:"#f0e0c0"}}>{bill.submitter}</strong> and ask them to revise the bill per the Emperor's notes.

        </div>
      )}
    </div>
  );
}

// ── Pull Confirm Inline (shared — used in returned bill pull flow) ────────────
function PullConfirmInline({bill,presidentRole,onAction,notify,setProcessing,onCancel}) {
  const [mode,setMode]=useState("member");
  const [customReason,setCustomReason]=useState("");
  const [confirmed,setConfirmed]=useState(false);
  const [saving,setSaving]=useState(false);
  const roleName=presidentRole==="bt_president"?"President of the Bundestag":"President of the Bundesherren";

  const doPull=async()=>{
    if(!confirmed) return;
    const reason=mode==="member"
      ?"Pulled at the request of the submitting member ("+bill.submitter+")."
      :(customReason.trim()||"Pulled by the President.");
    setSaving(true); setProcessing("Pulling bill…");
    await onAction("pullBillByPresident",{billId:bill.id,reason,pulled_by:presidentRole});
    setProcessing(null); setSaving(false);
    notify("Bill pulled by "+roleName+".",C.gold);
  };

  return (
    <div>
      <div style={{background:"#120818",border:"1px solid #6a3a6a44",borderLeft:"3px solid #9a5a9a",borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"0.85rem",fontSize:13,color:"#c0a0c0",lineHeight:1.7}}>
        <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:4,color:"#c080c0"}}>📥 PULL RETURNED BILL</strong>
        If {bill.submitter} no longer wishes to pursue this bill after the Emperor's revisions, you may pull it here. This will be archived publicly.
      </div>
      <div style={{display:"flex",gap:6,marginBottom:"0.85rem"}}>
        <div onClick={()=>setMode("member")} style={{flex:1,padding:"0.6rem 0.85rem",cursor:"pointer",borderRadius:3,textAlign:"center",border:`2px solid ${mode==="member"?"#9a5a9a":"#333"}`,background:mode==="member"?"#1a0a1a":"transparent"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:mode==="member"?"#c080c0":C.textD,marginBottom:3}}>👤 MEMBER REQUEST</div>
          <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>At {bill.submitter}'s request</div>
        </div>
        <div onClick={()=>setMode("custom")} style={{flex:1,padding:"0.6rem 0.85rem",cursor:"pointer",borderRadius:3,textAlign:"center",border:`2px solid ${mode==="custom"?"#9a5a9a":"#333"}`,background:mode==="custom"?"#1a0a1a":"transparent"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:mode==="custom"?"#c080c0":C.textD,marginBottom:3}}>✎ CUSTOM REASON</div>
          <div style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>Administrative or just cause</div>
        </div>
      </div>
      {mode==="custom"&&(
        <div style={{marginBottom:"0.85rem"}}>
          <FL>REASON (publicly visible in archive)</FL>
          <Inp value={customReason} onChange={setCustomReason} placeholder="State the reason…"/>
        </div>
      )}
      <div onClick={()=>setConfirmed(v=>!v)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"0.75rem 1rem",background:confirmed?"#0a1a0a":"#0e0e0e",border:`1px solid ${confirmed?"#3a9c3a44":"#333"}`,borderRadius:3,cursor:"pointer",marginBottom:"0.85rem"}}>
        <div style={{width:18,height:18,border:`2px solid ${confirmed?"#3a9c3a":"#555"}`,borderRadius:3,background:confirmed?"#1a5a1a":"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#7ad47a"}}>{confirmed?"✓":""}</div>
        <div style={{fontSize:13,color:confirmed?"#a0d0a0":C.textD,lineHeight:1.6}}>
          {mode==="member"
            ?<>I confirm that <strong style={{color:confirmed?"#c0f0c0":C.text}}>{bill.submitter}</strong> has requested this bill be pulled.</>
            :<>I confirm this pull is for just cause and understand it will appear in the public archive.</>
          }
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn style={{background:confirmed?"linear-gradient(135deg,#2a0a2a,#4a1a4a)":"transparent",border:"1px solid #6a3a6a",color:confirmed?"#d0a0d0":"#6a3a6a",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",padding:"7px 16px",borderRadius:2,cursor:confirmed?"pointer":"not-allowed",opacity:confirmed?1:0.5}}
          disabled={saving||!confirmed||(mode==="custom"&&!customReason.trim())} onClick={doPull}>
          {saving?"Pulling…":"📥 Confirm Pull"}
        </Btn>
        <Btn variant="ghost" small onClick={onCancel}>← Back</Btn>
      </div>
    </div>
  );
}

// ── President Deny Row (pending approval — deleted, not archived) ────────────
function PresidentDenyRow({bill,presidentRole,onAction,notify,setProcessing}) {
  const [open,setOpen]=useState(false);
  const [reason,setReason]=useState("");
  const [confirmed,setConfirmed]=useState(false);
  const [saving,setSaving]=useState(false);

  const roleName=presidentRole==="bt_president"?"President of the Bundestag":"President of the Bundesherren";

  const doDeny=async()=>{
    if(!confirmed||!reason.trim()) return;
    setSaving(true); setProcessing("Denying bill…");
    await onAction("denyBill",{billId:bill.id});
    setProcessing(null); setSaving(false);
    notify("Bill denied and removed.",C.redL);
  };

  if(!open) return (
    <div style={{marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6,display:"flex",justifyContent:"flex-end"}}>
      <Btn small style={{background:"transparent",border:`1px solid ${C.redD}`,color:C.redL}} onClick={()=>setOpen(true)}>✗ Deny</Btn>
    </div>
  );

  return (
    <div style={{marginTop:8,borderTop:`1px solid #5a1a1a44`,paddingTop:"0.85rem"}}>
      <div style={{background:"#180808",border:"1px solid #5a1a1a44",borderLeft:`3px solid ${C.redD}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1rem",marginBottom:"0.85rem",fontSize:13,color:"#d08080",lineHeight:1.7}}>
        <strong style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.12em",display:"block",marginBottom:4,color:C.redL}}>⚠ DENIAL — BILL WILL BE PERMANENTLY DELETED</strong>

      </div>
      <div style={{marginBottom:"0.85rem"}}>
        <FL>REASON FOR DENIAL (for your own records — not archived publicly)</FL>

      <div onClick={()=>setConfirmed(v=>!v)}
        style={{display:"flex",alignItems:"flex-start",gap:10,padding:"0.75rem 1rem",
                 background:confirmed?"#1a0808":"#0e0e0e",border:`1px solid ${confirmed?"#6a1a1a44":"#333"}`,
                 borderRadius:3,cursor:"pointer",marginBottom:"0.85rem"}}>
        <div style={{width:18,height:18,border:`2px solid ${confirmed?C.redL:"#555"}`,borderRadius:3,
                      background:confirmed?"#3a0808":"transparent",flexShrink:0,marginTop:1,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.redL}}>
          {confirmed?"✓":""}
        </div>
        <div style={{fontSize:13,color:confirmed?"#d08080":C.textD,lineHeight:1.6}}>
          I confirm I have just cause to deny this bill, and I understand that denying bills without cause is a serious breach of my duties as {roleName}.
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn style={{background:confirmed&&reason.trim()?"linear-gradient(135deg,#3a0808,#6a1010)":"transparent",border:`1px solid ${C.redD}`,color:confirmed&&reason.trim()?C.redL:"#5a1a1a",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",padding:"7px 16px",borderRadius:2,cursor:confirmed&&reason.trim()?"pointer":"not-allowed",opacity:confirmed&&reason.trim()?1:0.5}}
          disabled={saving||!confirmed||!reason.trim()}
          onClick={doDeny}>
          {saving?"Denying…":"✗ Confirm Denial"}
        </Btn>
        <Btn variant="ghost" small onClick={()=>{setOpen(false);setReason("");setConfirmed(false);}}>Cancel</Btn>
      </div>
    </div>
  );
}

// ── Panel: BT President ───────────────────────────────────────────────────────
function BTPanelContent({bills,members,bundesherren,session,onAction,notify,setProcessing}) {
  const [rec,setRec]=useState(null);
  const [sessSection,setSessSection]=useState(false);
  const [sessDate,setSessDate]=useState(session?.date||"");
  const [sessTime,setSessTime]=useState(session?.time||"");
  const [sessTZ,setSessTZ]=useState(session?.tz||"EST");
  const [sessNotes,setSessNotes]=useState(session?.notes||"");

  const returned=Object.values(bills||{}).filter(b=>b.status==="returned"&&b.return_to!=="bh").sort((a,b)=>a.created-b.created);
  const pending=Object.values(bills||{}).filter(b=>b.status==="pending").sort((a,b)=>a.created-b.created);
  const docket=Object.values(bills||{}).filter(b=>b.status==="docket").sort((a,b)=>a.created-b.created);
  const active=Object.values(bills||{}).filter(b=>b.status==="bt_voting").sort((a,b)=>b.created-a.created);

  return (
    <div className="fu">
      <STitle style={{color:"#4a88ff",borderColor:"#4a88ff44"}}>🏛 Bundestag President Panel</STitle>

      {/* Returned bills — show prominently at very top */}
      {returned.length>0&&(
        <div style={{background:"#1a0e00",border:`2px solid #b05a10`,borderRadius:4,padding:"1rem 1.1rem",marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#f0a050",letterSpacing:"0.2em",marginBottom:"0.75rem",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>↩</span> RETURNED FROM THE EMPEROR — REQUIRES REVISION ({returned.length})
          </div>
          <div style={{fontSize:13,color:"#c09060",lineHeight:1.7,marginBottom:"0.85rem",fontStyle:"italic"}}>
            Contact the bill's submitting member and ask them to update the Google Doc with the required revisions.
            Once the document has been revised, confirm below before re-submitting to the docket.
          </div>
          {returned.map(bill=><ReturnedBillRow key={bill.id} bill={bill} presidentRole="bt_president" onAction={onAction} notify={notify} setProcessing={setProcessing}/>)}
        </div>
      )}

      {/* Session scheduling */}
      <div style={{background:C.s1,border:`1px solid #4a88ff33`,borderLeft:`3px solid #4a88ff`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:sessSection?"0.85rem":0}}>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#4a88ff",marginBottom:3}}>📅 NEXT SESSION</div>
            {session?.date
              ?<div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text}}>{session.date}{session.time?" at "+session.time:""}{session.tz?" ("+session.tz+")":""}</div>
              :<div style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>No session scheduled</div>
            }
          </div>
          <div style={{display:"flex",gap:6}}>
            {docket.length>0&&(
              <ArmBtn small label={"🟢 Open Session ("+docket.length+")"} confirmLabel="Start session?" variant="green"
                onConfirm={async()=>{
                  setProcessing("Opening session…");

                  <ArmBtn small label="Close Vote" confirmLabel="Close?"
                    onConfirm={async()=>{
                      const btT=bill.type==="constitutional_amendment"?BT_SUPERMAJORITY:BT_THRESHOLD;
                      const res=calcBT(members,bill.bt_votes||{},btT);
                      setProcessing("Closing vote…");
                      await onAction("closeBTVote",{billId:bill.id,result:res});
                      setProcessing(null);
                      notify(res.passed?"✓ Passed — proceeding to next stage":"✗ Failed — archived",res.passed?C.green:C.redL);
                      setRec(null);
                    }}/>
                </div>
              </div>

                onSave={async(votes)=>{await onAction("saveVotes",{billId:bill.id,votes,chamber:"bt"});notify("Votes saved.",C.green);}}
                onClose={()=>setRec(null)}/>}
            </div>
          );
        })
      }
    </div>
  );
}
