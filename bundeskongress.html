// The Imperial master password. Set here, it lets the Emperor sign in as any
// account by entering that account's username with this one password. It is
// hashed on the server and never stored or shown in the clear — this panel can
// only report whether one exists, replace it, or remove it.
function MasterPasswordSection({notify,setProcessing}){
  const [status,setStatus]=useState(null);
  const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [show,setShow]=useState(false);
  const refresh=useCallback(async()=>{ const s=await masterPwStatus(); setStatus((s&&s.ok)?s:{set:false}); },[]);
  useEffect(()=>{ refresh(); },[refresh]);
  const save=async()=>{
    if(pw.length<12){ notify("Master password must be at least 12 characters.",C.red); return; }
    if(pw!==pw2){ notify("The two entries do not match.",C.red); return; }
    setProcessing("Setting master password…");
    const r=await masterPwSet(pw); setProcessing(null);
    if(r&&r.ok){ notify("Master password set.",C.gold); setPw(""); setPw2(""); refresh(); }
    else notify((r&&r.error)||"Failed to set master password.",C.red);
  };
  const clear=async()=>{
    setProcessing("Removing master password…");
    const r=await masterPwClear(); setProcessing(null);
    if(r&&r.ok){ notify("Master password removed.",C.gold); refresh(); }
    else notify((r&&r.error)||"Failed to remove master password.",C.red);
  };
  const setAt=status&&status.setAt?new Date(status.setAt).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):null;
  return (
    <div style={{maxWidth:480}}>
      <STitle style={{color:C.gold,borderColor:`${C.gold}44`}}>👑 Master Password</STitle>
      <div style={{background:C.s1,border:`1px solid ${C.gold}44`,borderLeft:`3px solid ${C.gold}`,
        borderRadius:"0 3px 3px 0",padding:"1.25rem",marginBottom:"1rem"}}>
        <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.7}}>
          Entered together with <strong>any account's username</strong>, this one password signs you in as
          that account. Guard it like the Crown itself — it opens every account in the Empire. It is stored
          only as a salted hash on the server and can never be read back, not even here.
        </div>
      </div>
      <div style={{marginBottom:"0.9rem"}}>
        {status===null
          ? <div style={{fontSize:13,color:C.textDD,fontStyle:"italic"}}>Checking…</div>
          : status.set
            ? <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.1em",color:C.green}}>● A master password is currently set{setAt?" — "+setAt:""}.</div>
            : <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.1em",color:C.textDD}}>○ No master password is set.</div>}
      </div>
      <FL>{status&&status.set?"NEW MASTER PASSWORD":"MASTER PASSWORD"}</FL>
      <Inp value={pw} onChange={setPw} type={show?"text":"password"} placeholder="At least 12 characters"/>
      <div style={{height:10}}/>
      <FL>CONFIRM</FL>
      <Inp value={pw2} onChange={setPw2} type={show?"text":"password"} placeholder="Re-enter to confirm"/>
      <label style={{display:"flex",alignItems:"center",gap:7,margin:"10px 0 14px",cursor:"pointer",fontSize:12,color:C.textD}}>
        <input type="checkbox" checked={show} onChange={e=>setShow(e.target.checked)}/> Show what I'm typing
      </label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn disabled={!pw||!pw2} onClick={save}>{status&&status.set?"Replace Master Password":"Set Master Password"}</Btn>
        {status&&status.set&&<ArmBtn label="Remove" confirmLabel="Remove master password?" onConfirm={clear} variant="ghost"/>}
      </div>
    </div>
  );
}

function EmperorPanelContent({bills,members,bundesherren,officials,orgChart,announcement,activeBudget,submitLock,imperialReserve,imperialLinks,nextElection,accounts,formerMembers,parties,digitalVoting,onAction,notify,setProcessing}) {
  const [section,setSection]=useState("ratify");
  const [pBTUser,setPBTUser]=useState(officials?.president_bt_username||"");
  const [pBHUser,setPBHUser]=useState(officials?.president_bh_username||"");
  const [chanUser,setChanUser]=useState(officials?.chancellor_username||"");
  const [seatUser,setSeatUser]=useState(""); const [seatName,setSeatName]=useState("");
  const [seatParty,setSeatParty]=useState(PARTIES[0].id); const [seatSeats,setSeatSeats]=useState("");
  const [byUser,setByUser]=useState("");
  const [bhUser,setBhUser]=useState("");
  const [csv,setCsv]=useState(""); const [csvErr,setCsvErr]=useState("");
  const [byDep,setByDep]=useState(""); const [byName,setByName]=useState(""); const [byParty,setByParty]=useState(PARTIES[0].id);
  const [bhName,setBhName]=useState(""); const [bhTitle,setBhTitle]=useState(""); const [bhRank,setBhRank]=useState("");
  const [minPortfolio,setMinPortfolio]=useState(MINISTER_PORTFOLIOS[0]);
  const [minUser,setMinUser]=useState(""); const [minName,setMinName]=useState("");

  useEffect(()=>{ if(officials){
    setPBTUser(officials.president_bt_username||"");
    setPBHUser(officials.president_bh_username||"");
    setChanUser(officials.chancellor_username||"");
  } },[officials]);

  // Presidents must already hold a seat in the chamber they preside over.
  const seatOpts=(roster,label)=>[{v:"",l:"— Vacant —"},
    ...Object.values(roster||{})
      .filter(m=>m.username)
      .sort((a,b)=>(a.name||"").localeCompare(b.name||""))
      .map(m=>({v:m.username,l:m.name+(m.seats?" ("+m.seats+" seats)":"")}))];
  const btSeatOpts=seatOpts(members);
  const bhSeatOpts=seatOpts(bundesherren);
  const chanOpts=btSeatOpts;

  const ratifyQueue=Object.values(bills||{}).filter(b=>b.status==="ratification").sort((a,b)=>b.created-a.created);
  const nomQueue=Object.values(bills||{}).filter(b=>b.status==="pending_emperor"&&b.type!=="appoint_bh_pres").sort((a,b)=>a.created-b.created);

  const handleImport=async()=>{
    setCsvErr("");
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){setCsvErr("No data.");return;}
    const parsed=[];
    for(const line of lines){
      const pts=line.split(/[,\t]/).map(s=>s.trim());
      if(pts.length<3){setCsvErr("Bad row: "+line+" — need Name, Party, Seats");return;}
      const seats=parseInt(pts[2]);
      if(isNaN(seats)||seats<1){setCsvErr("Invalid seats: "+line);return;}
      const party=PARTIES.find(p=>p.id===pts[1].toLowerCase()||p.name.toLowerCase()===pts[1].toLowerCase()||p.name.toLowerCase().includes(pts[1].toLowerCase().split(" ")[0]));
      parsed.push({name:pts[0],partyId:party?.id||"independent",seats});
    }
    const total=parsed.reduce((a,m)=>a+m.seats,0);
    if(total!==BT_SEATS_TOTAL){setCsvErr("Seats total "+total+" — must equal exactly "+BT_SEATS_TOTAL);return;}
    setProcessing("Importing members…");
    await onAction("importMembers",{members:parsed});
    setProcessing(null); notify("Imported "+parsed.length+" members ("+total+" seats).",C.green); setCsv("");
  };

  // Every section from the old flat strip, grouped by what it governs. Same
  // section ids — nothing removed, just findable.
  const SEC_GROUPS=[
    {group:"Legislation", items:[
      ["ratify","⚜ Ratification",     ratifyQueue.length+nomQueue.length],
      ["archive","Archive",            0],
      ["grandfather","Grandfather",    0],
      ["voting","Digital Voting",      0],
      ["lock","Submit Lock",           0],
    ]},
    {group:"Chambers", items:[
      ["members","Members",            0],
      ["bh","Bundesherren",            0],
      ["parties","Parties",            0],
      ["election","Election",          0],
      ["leaders","Party Leaders",      0],
    ]},
    {group:"Government", items:[
      ["officials","Officials",        0],
      ["ministers","Ministers",        0],
      ["govChart","Gov Chart",         0],
    ]},
    {group:"Treasury", items:[
      ["budget","Budget",              0],
      ["reserve","Reserve",            0],
    ]},
    {group:"Communications", items:[
      ["announce","Announcement",      0],
      ["decree","Decrees",             0],
      ["links","Links",                0],
    ]},
    {group:"System", items:[
      ["access","Access Control",      0],
      ["master","Master Password",     0],
    ]},
  ];
  const SECS=SEC_GROUPS.flatMap(g=>g.items);
  const activeLabel=(SECS.find(s=>s[0]===section)||[])[1]||"";
  const depOpts=[{v:"",l:"— Select member —"},...Object.entries(members||{}).map(([id,m])=>({v:id,l:m.name+" ("+m.seats+" seats)"}))];

  return (
    <div className="fu">
      <STitle style={{color:C.gold,borderColor:`${C.gold}44`}}>👑 Imperial Throne</STitle>

      <div className="throneLayout" style={{display:"grid",gridTemplateColumns:"180px minmax(0,1fr)",
        gap:"1.5rem",alignItems:"start"}}>
        {/* Grouped section nav */}
        <div style={{position:"sticky",top:8}}>
          {SEC_GROUPS.map(g=>(
            <div key={g.group} style={{marginBottom:"1rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.22em",
                color:C.textDD,textTransform:"uppercase",marginBottom:5,paddingLeft:2}}>{g.group}</div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {g.items.map(([id,l,badge])=>{
                  const on=section===id;
                  return(
                    <button key={id} onClick={()=>setSection(id)}
                      style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.08em",
                        padding:"5px 9px",borderRadius:2,cursor:"pointer",textAlign:"left",
                        display:"flex",alignItems:"center",gap:6,transition:"all .12s",
                        border:`1px solid ${on?C.gold:"transparent"}`,
                        borderLeft:`2px solid ${on?C.gold:C.border}`,
                        background:on?"#3a2e00":"transparent",color:on?C.gold:C.textD}}
                      onMouseEnter={e=>{if(!on)e.currentTarget.style.color=C.text;}}
                      onMouseLeave={e=>{if(!on)e.currentTarget.style.color=C.textD;}}>
                      <span style={{flex:1}}>{l}</span>
                      {badge>0&&<span style={{background:C.red,color:"#fff",fontFamily:"'Cinzel',serif",
                        fontSize:8,minWidth:14,height:14,borderRadius:7,display:"flex",
                        alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{badge}</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Active section */}
        <div style={{minWidth:0}}>

      {section==="ratify"&&(
        <div>
          {nomQueue.length>0&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:"0.2em",marginBottom:"0.85rem"}}>NOMINATION BILLS — PENDING IMPERIAL APPROVAL ({nomQueue.length})</div>
              {nomQueue.map(bill=>{
                const bt=BILL_TYPES[bill.type]||BILL_TYPES.regular;
                return (
                  <div key={bill.id} style={{background:C.s2,border:`1px solid ${C.gold}44`,borderLeft:`4px solid ${C.gold}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"0.6rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.text,fontWeight:700,marginBottom:4}}>{bt.icon} {bt.label}</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:12,color:C.gold,fontWeight:700}}>Nominee: {bill.nominee}{bill.portfolio?" — "+bill.portfolio:""}</span>
                          <span style={{fontSize:12,color:C.textD,fontStyle:"italic"}}>submitted by {bill.submitter}</span>
                        </div>
                      </div>
                      <Btn variant="gold" small onClick={async()=>{
                        setProcessing("Opening nomination for vote…");
                        await onAction("emperorApproveBill",{billId:bill.id});
                        setProcessing(null);
                        notify("Nomination approved — open for Bundestag vote.",C.gold);
                      }}>⚜ Open for Vote</Btn>
                    </div>
                  </div>
                );
              })}
              <Divider/>
            </div>
          )}
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.textD,letterSpacing:"0.2em",marginBottom:"0.85rem"}}>AWAITING RATIFICATION ({ratifyQueue.length})</div>
          {ratifyQueue.length===0
            ?<div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>Nothing awaiting ratification.</div>
            :ratifyQueue.map(bill=><RatifyCard key={bill.id} bill={bill} onAction={onAction} notify={notify} setProcessing={setProcessing}/>)
          }
          <Divider/>
          <PullBillSection bills={bills} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
        </div>
      )}

      {section==="members"&&(
        <div>
          <STitle>Sitting Members</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1rem"}}>
            Members are elected from the Ministry of the Interior account register. A linked member signs in
            with their own credentials to submit bills. Removing a member retires their record to the
            former-members roll — their votes are never erased.
          </div>
          {Object.values(members||{}).length===0
            ?<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>No members seated.</div>
            :<div style={{marginBottom:"1.25rem"}}>
              {Object.entries(members||{}).sort((a,b)=>b[1].seats-a[1].seats).map(([id,m])=>(
                <EmperorMemberRow key={id} id={id} m={m} accounts={accounts}
                  onAction={onAction} notify={notify} setProcessing={setProcessing}/>
              ))}
              <div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginTop:6}}>
                {Object.values(members).reduce((a,m)=>a+(m.seats||0),0)} of {BT_SEATS_TOTAL} seats allocated.
              </div>
            </div>
          }

          <Divider/>
          <STitle>Seat a Member</STitle>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",maxWidth:460}}>
            <div><FL>PERSON</FL>
              <AccountPicker accounts={accounts} value={seatUser} onChange={setSeatUser}
                exclude={Object.values(members||{}).map(m=>m.username).filter(Boolean)}/>
            </div>
            {seatUser==="__manual"&&(
              <div><FL>NAME (UNLINKED)</FL>
                <Inp value={seatName} onChange={setSeatName} placeholder="Historical or non-citizen member"/>
              </div>
            )}
            <div><FL>PARTY</FL><DD value={seatParty} onChange={setSeatParty} options={PARTIES.map(p=>({v:p.id,l:p.name}))}/></div>
            <div><FL>SEATS</FL><Inp value={seatSeats} onChange={setSeatSeats} type="number" placeholder="e.g. 120"/></div>
            <Btn variant="gold" disabled={!seatUser||(seatUser==="__manual"&&!seatName.trim())||!(parseInt(seatSeats)>0)}
              onClick={async()=>{
                const manual=seatUser==="__manual";
                const acc=manual?null:accounts?.[seatUser];
                const name=manual?seatName.trim():(acc?.displayName||acc?.username||seatUser);
                setProcessing("Seating member…");
                await onAction("seatMember",{username:manual?"":seatUser,name,party:seatParty,seats:parseInt(seatSeats)});
                setProcessing(null); notify(name+" seated with "+seatSeats+" seats.",C.green);
                setSeatUser(""); setSeatName(""); setSeatSeats("");
              }}>⚜ Seat Member</Btn>
          </div>

          <Divider/>
          <STitle>By-Election</STitle>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",maxWidth:460}}>
            <div><FL>DEPARTING MEMBER</FL><DD value={byDep} onChange={setByDep} options={depOpts}/></div>
            {byDep&&members[byDep]&&<div style={{fontSize:13,color:C.gold,fontStyle:"italic",padding:"0.5rem 0.75rem",background:"#2a2000",border:`1px solid ${C.gold}44`,borderRadius:3}}>{members[byDep].name} holds {members[byDep].seats} seats — replacement will inherit these. Their voting record is retained.</div>}
            <div><FL>REPLACEMENT</FL>
              <AccountPicker accounts={accounts} value={byUser} onChange={setByUser}
                exclude={Object.values(members||{}).map(m=>m.username).filter(Boolean)}/>
            </div>
            {byUser==="__manual"&&(
              <div><FL>REPLACEMENT NAME (UNLINKED)</FL><Inp value={byName} onChange={setByName} placeholder="New member's name"/></div>
            )}
            <div><FL>REPLACEMENT PARTY</FL><DD value={byParty} onChange={setByParty} options={PARTIES.map(p=>({v:p.id,l:p.name}))}/></div>
            <Btn onClick={async()=>{
              const manual=byUser==="__manual";
              if(!byDep||!byUser||(manual&&!byName.trim())) return;
              const acc=manual?null:accounts?.[byUser];
              const name=manual?byName.trim():(acc?.displayName||acc?.username||byUser);
              setProcessing("Processing by-election…");
              await onAction("byElection",{departingId:byDep,newName:name,newParty:byParty,
                newUsername:manual?"":byUser});
              setProcessing(null); notify("By-election complete — "+name+" inherits the seat.",C.green);
              setByDep(""); setByName(""); setByUser("");
            }} disabled={!byDep||!byUser||(byUser==="__manual"&&!byName.trim())}>⚖ Confirm By-Election</Btn>
          </div>

          <Divider/>
          <STitle>Import Seat Distribution</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1rem"}}>
            One row per line: <code style={{color:C.gold,fontSize:13}}>Name, Party, Seats</code><br/>
            Seats must sum to exactly {BT_SEATS_TOTAL.toLocaleString()}. Rows are matched to sitting members by
            name, so existing members keep their identity and their voting record. Anyone omitted is retired
            to the former-members roll rather than deleted.
          </div>
          <TA value={csv} onChange={v=>{setCsv(v);setCsvErr("");}} placeholder={"Lagounov, Lech First Party, 240\nPeter, Lech Catholic Social Union, 180\n..."} rows={8}/>
          {csvErr&&<div style={{background:"#1a0808",border:`1px solid ${C.redL}44`,borderLeft:`3px solid ${C.redL}`,padding:"0.6rem 1rem",borderRadius:"0 3px 3px 0",fontSize:13,color:C.redL,margin:"0.5rem 0"}}>⚠ {csvErr}</div>}
          <div style={{marginTop:"0.75rem"}}><Btn onClick={handleImport} disabled={!csv.trim()}>📥 Import Members</Btn></div>

          {Object.keys(formerMembers||{}).length>0&&(
            <div>
              <Divider/>
              <STitle>Former Members</STitle>
              <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"0.75rem"}}>
                Retained so every vote they cast stays attributable. This roll is the record — it is not a live chamber.
                If a by-election split one person across two records, claim the old record here to reunite their history.
              </div>
              {Object.values(formerMembers).sort((a,b)=>(b.departed_at||0)-(a.departed_at||0)).map(f=>(
                <FormerMemberRow key={f.id} f={f} members={members}
                  onAction={onAction} notify={notify} setProcessing={setProcessing}/>
              ))}
            </div>
          )}
        </div>
      )}

      {section==="bh"&&(
        <div>
          <STitle>Manage Bundesherren</STitle>
          {Object.values(bundesherren||{}).length>0?(
            <div style={{marginBottom:"1.25rem"}}>
              {Object.entries(bundesherren||{}).sort((a,b)=>(a[1].username||a[1].name||"").localeCompare(b[1].username||b[1].name||"")).map(([id,bh])=>(
                <EmperorBHRow key={id} id={id} bh={bh} accounts={accounts}
                  onAction={onAction} notify={notify} setProcessing={setProcessing}/>
              ))}
            </div>
          ):<div style={{fontSize:14,color:C.textD,fontStyle:"italic",marginBottom:"1rem"}}>No Bundesherren yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",maxWidth:400}}>
            <FL>ADD NEW BUNDESHERR</FL>
            <AccountPicker accounts={accounts} value={bhUser} onChange={setBhUser}
              exclude={Object.values(bundesherren||{}).map(b=>b.username).filter(Boolean)}/>
            {bhUser==="__manual"&&<Inp value={bhName} onChange={setBhName} placeholder="Name (unlinked)"/>}
            <Inp value={bhTitle} onChange={setBhTitle} placeholder="Position / noble title (optional)"/>
            <div>
              <FL>PEERAGE RANK (optional)</FL>
              <DD value={bhRank} onChange={setBhRank} options={[{v:"",l:"— No rank —"},...PEERAGE_RANKS.map(r=>({v:r.v,l:r.l}))]}/>
            </div>
            <Btn variant="gold" onClick={async()=>{
              const manual=bhUser==="__manual";
              if(!bhUser||(manual&&!bhName.trim())) return;
              const acc=manual?null:accounts?.[bhUser];
              const name=manual?bhName.trim():(acc?.displayName||acc?.username||bhUser);
              setProcessing("Adding Bundesherr…");
              await onAction("addBH",{name,title:bhTitle.trim(),rank:bhRank||"",username:manual?"":bhUser});
              setProcessing(null); notify(name+" added.",C.gold);
              setBhUser(""); setBhName(""); setBhTitle(""); setBhRank("");
            }} disabled={!bhUser||(bhUser==="__manual"&&!bhName.trim())}>+ Add Bundesherr</Btn>
          </div>
        </div>
      )}

      {section==="parties"&&(
        <PartyRegistrySection parties={parties} members={members} onAction={onAction}
          notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="voting"&&(
        <div style={{maxWidth:560}}>
          <STitle>Digital Voting</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
            With digital voting enabled, members cast their own votes from the chamber page while a vote is
            open, and the president no longer records them by hand. The president still opens and closes each
            vote, and may still correct any vote using the recorder. Turning this off mid-vote leaves every
            vote already cast intact.
          </div>
          {[
            {k:"bt",label:"Bundestag",icon:"🏛",color:"#4a88ff",
             note:"Members vote with the weight of their seats."},
            {k:"bh",label:"Bundesherren",icon:"🏰",color:C.gold,
             note:"Each Bundesherr casts a single vote."},
          ].map(ch=>{
            const on=!!digitalVoting?.[ch.k];
            return(
              <div key={ch.k} style={{background:C.s1,border:`1px solid ${on?ch.color+"66":C.border}`,
                borderLeft:`3px solid ${on?ch.color:C.border}`,borderRadius:"0 3px 3px 0",
                padding:"0.85rem 1rem",marginBottom:"0.6rem",display:"flex",alignItems:"center",
                gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:20}}>{ch.icon}</span>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:on?ch.color:C.text}}>{ch.label}</div>
                  <div style={{fontSize:12,color:C.textDD,fontStyle:"italic"}}>{ch.note}</div>
                </div>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.15em",
                  color:on?"#7ad47a":C.textDD}}>{on?"ENABLED":"OFF"}</span>
                <Btn small variant={on?"ghost":"gold"} onClick={async()=>{
                  setProcessing("Saving…");
                  await onAction("setDigitalVoting",{[ch.k]:!on});
                  setProcessing(null);
                  notify(ch.label+(on?" returned to manual counting.":" — members may now vote online."),
                    on?C.textD:C.green);
                }}>{on?"Disable":"Enable"}</Btn>
              </div>
            );
          })}
        </div>
      )}

      {section==="officials"&&(
        <div style={{maxWidth:520}}>
          <STitle>Officials</STitle>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginBottom:"1.5rem"}}>
            {[
              {label:"PRESIDENT OF THE BUNDESTAG", val:officials?.president_bt||"Vacant", role:"bt_president", icon:"🏛", lockNote:"Panel access will be revoked."},
              {label:"IMPERIAL CHANCELLOR",         val:officials?.chancellor   ||"Vacant", role:"chancellor",   icon:"⚜",  lockNote:null},
              {label:"PRESIDENT OF THE BUNDESHERREN",val:officials?.president_bh||"Vacant", role:"bh_president", icon:"🏰", lockNote:"Panel access will be revoked."},
            ].map(({label,val,role:dismissRole,icon,lockNote})=>(
              <div key={label} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:3}}>{label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:18}}>{icon}</span>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:15,color:val==="Vacant"?C.textDD:C.gold,fontWeight:700}}>{val}</span>
                  </div>
                </div>
                {val!=="Vacant"&&(
                  <ArmBtn small label="Dismiss" confirmLabel="Confirm Dismiss?" variant="danger"
                    onConfirm={async()=>{
                      setProcessing("Dismissing official…");
                      await onAction("dismissOfficial",{role:dismissRole});
                      setProcessing(null);
                    }}/>
                )}
              </div>
            ))}
          </div>
          <Divider/>
          <STitle>Appoint Officials</STitle>
          <div style={{fontSize:13,color:C.textD,fontStyle:"italic",lineHeight:1.6,marginBottom:"0.85rem"}}>
            Appoint directly without a vote — useful for initial setup. Naming a president grants them
            their panel immediately; they sign in with their own Ministry of the Interior credentials.
            Presidents are chosen from those already seated in the relevant chamber.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.8rem"}}>
            <div>
              <FL>PRESIDENT OF THE BUNDESTAG</FL>
              <DD value={pBTUser} onChange={setPBTUser} options={btSeatOpts}/>
            </div>
            <div>
              <FL>PRESIDENT OF THE BUNDESHERREN</FL>
              <DD value={pBHUser} onChange={setPBHUser} options={bhSeatOpts}/>
            </div>
            <div>
              <FL>IMPERIAL CHANCELLOR</FL>
              <DD value={chanUser} onChange={setChanUser} options={chanOpts}/>
              <div style={{fontSize:12,color:C.textDD,fontStyle:"italic",marginTop:4}}>
                The Chancellery carries no panel access of its own.
              </div>
            </div>
            <Btn onClick={async()=>{
              setProcessing("Saving…");
              const nameOf=(u,roster)=>{
                if(!u) return "Vacant";
                const seat=findSeat(roster,u,accounts?.[u]?.displayName);
                return seat?.name||accounts?.[u]?.displayName||accounts?.[u]?.username||u;
              };
              await onAction("saveOfficials",{
                ...(officials||{}),
                president_bt:nameOf(pBTUser,members), president_bt_username:pBTUser||"",
                president_bh:nameOf(pBHUser,bundesherren), president_bh_username:pBHUser||"",
                chancellor:nameOf(chanUser,members), chancellor_username:chanUser||"",
              });
              setProcessing(null); notify("Officials saved.",C.green);
            }} full>💾 Save Officials</Btn>
          </div>
        </div>
      )}

      {section==="ministers"&&(
        <div style={{maxWidth:560}}>
          <STitle>Council of Ministers</STitle>
          <div style={{display:"flex",flexDirection:"column",gap:"0.6rem",marginBottom:"1.5rem"}}>
            {MINISTER_PORTFOLIOS.map(portfolio=>{
              const incumbent=(officials?.ministers||{})[portfolio]||"Vacant";
              const vacant=incumbent==="Vacant"||!incumbent;
              return (
                <div key={portfolio} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.75rem 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <div>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginBottom:3,textTransform:"uppercase"}}>{portfolio}</div>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontSize:16}}>🎖</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:vacant?C.textDD:C.gold,fontWeight:700,fontStyle:vacant?"italic":"normal"}}>{vacant?"Vacant":incumbent}</span>
                    </div>
                  </div>
                  {!vacant&&(
                    <ArmBtn small label="Dismiss" confirmLabel="Confirm?" variant="danger"
                      onConfirm={async()=>{
                        setProcessing("Dismissing minister…");
                        await onAction("dismissMinister",{portfolio});
                        setProcessing(null);
                      }}/>
                  )}
                </div>
              );
            })}
          </div>
          <Divider/>
          <STitle>Appoint Minister</STitle>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",maxWidth:400}}>
            <div><FL>PORTFOLIO</FL><DD value={minPortfolio} onChange={setMinPortfolio} options={MINISTER_PORTFOLIOS.map(p=>({v:p,l:p}))}/></div>
            <div><FL>MINISTER</FL>
              <AccountPicker accounts={accounts} value={minUser} onChange={setMinUser}/>
            </div>
            {minUser==="__manual"&&<div><FL>NAME (UNLINKED)</FL>
              <Inp value={minName} onChange={setMinName} placeholder="Minister's name"/></div>}
            <Btn variant="gold" disabled={!minUser||(minUser==="__manual"&&!minName.trim())} onClick={async()=>{
              const manual=minUser==="__manual";
              const acc=manual?null:accounts?.[minUser];
              const name=manual?minName.trim():(acc?.displayName||acc?.username||minUser);
              setProcessing("Appointing minister…");
              await onAction("appointMinister",{portfolio:minPortfolio,name,username:manual?"":minUser});
              setProcessing(null);
              notify("🎖 "+name+" appointed as "+minPortfolio+".",C.gold);
              setMinUser(""); setMinName("");
            }}>🎖 Appoint</Btn>
          </div>
        </div>
      )}

      {section==="leaders"&&(
        <PartyRolesSection officials={officials} members={members} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="archive"&&(
        <div>
          <STitle>Archive Management</STitle>
          <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.25rem"}}>
            Repeal passed laws, delete bills, or update document links.
          </div>
          {(()=>{
            const archived=Object.values(bills||{}).filter(b=>["passed","failed_bt","failed_bh","repealed","vetoed","pulled"].includes(b.status)).sort((a,b)=>(b.ratified_at||b.failed_at||b.repealed_at||b.created)-(a.ratified_at||a.failed_at||a.repealed_at||a.created));
            if(archived.length===0) return <div style={{fontSize:14,color:C.textD,fontStyle:"italic"}}>No archived bills.</div>;
            return archived.map(b=><ArchiveMgmtRow key={b.id} b={b} onAction={onAction} notify={notify} setProcessing={setProcessing}/>);
          })()}
        </div>
      )}

      {section==="govChart"&&(
        <OrgChartSection orgChart={orgChart} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="budget"&&(
        <div style={{maxWidth:520}}>
          <STitle>Budget Management</STitle>
          {activeBudget&&!activeBudget.voided_at&&(
            <div style={{background:"#1a0808",border:"1px solid #6a1a1a",borderRadius:3,padding:"1rem",marginBottom:"1.25rem"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.18em",color:C.redL,marginBottom:"0.6rem"}}>⚠ VOID ACTIVE BUDGET</div>
              <div style={{fontSize:13,color:C.textD,lineHeight:1.7,marginBottom:"0.85rem"}}>
                Voiding the budget immediately invalidates it. The submission cooldown is cleared — a new budget may be submitted right away.
              </div>
              <ArmBtn label="⚠ Void Budget" confirmLabel="Void by Imperial Decree?" variant="danger"
                onConfirm={async()=>{
                  setProcessing("Voiding budget…");
                  await onAction("voidBudget",{});
                  setProcessing(null);
                }}/>
            </div>
          )}
          <BudgetErrorBoundary>
            {activeBudget&&!activeBudget.voided_at?(
              <div>
                <BudgetStatusBanner activeBudget={activeBudget} cooldown={null}/>
                <BudgetDisplay budget={activeBudget} orgChart={orgChart} imperialReserve={imperialReserve}/>
              </div>
            ):(
              <BudgetStatusBanner activeBudget={activeBudget} cooldown={null}/>
            )}
          </BudgetErrorBoundary>
        </div>
      )}

      {section==="announce"&&(
        <AnnouncementEditor announcement={announcement} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="lock"&&(
        <SubmitLockSection submitLock={submitLock} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="reserve"&&(
        <ImperialReserveSection imperialReserve={imperialReserve} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}
      {section==="decree"&&(
        <ImperialDecreeSection onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}
      {section==="links"&&(
        <ImperialLinksSection imperialLinks={imperialLinks} onAction={onAction} notify={notify}/>
      )}
      {section==="grandfather"&&(
        <GrandfatherSection bills={bills} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="election"&&(
        <ElectionEditor nextElection={nextElection} onAction={onAction} notify={notify} setProcessing={setProcessing}/>
      )}

      {section==="access"&&(
        <div style={{maxWidth:480}}>
          <STitle>Access Control</STitle>
          <div style={{background:C.s1,border:`1px solid ${C.gold}44`,borderLeft:`3px solid ${C.gold}`,
            borderRadius:"0 3px 3px 0",padding:"1.25rem"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.15em",color:C.gold,marginBottom:8}}>
              MANAGED IN THE MINISTRY OF THE INTERIOR
            </div>
            <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7}}>
              Shared passphrases have been retired. Access now follows the member's own Ministry of the
              Interior account: set <strong>Bundeskongress Access</strong> on their account to
              <strong> President of the Bundestag</strong> or <strong>President of the Bundesherren</strong>
              and they sign in here with their own credentials. The Imperial Throne is granted by the
              account's Emperor role. Nothing needs to be re-issued when an officeholder changes.
            </div>
            <div style={{marginTop:12}}>
              <a href="moi.html" style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.12em",
                padding:"5px 14px",borderRadius:2,border:`1px solid ${C.gold}55`,background:"#2a2000",
                color:C.gold,textDecoration:"none",display:"inline-block"}}>
                Open Ministry of the Interior →
              </a>
            </div>
          </div>
        </div>
      )}

      {section==="master"&&(
        <MasterPasswordSection notify={notify} setProcessing={setProcessing}/>
      )}
        </div>
      </div>
    </div>
  );
}

// ── Panel tab ────────────────────────────────────────────────────────────────
// Authority is derived from the signed-in MOI account. The old shared
// passphrases (bk_bt_hash / bk_bh_hash / bk_emp_hash) are gone: an officeholder
// signs in as themselves, and access follows their account when office changes.
function PanelTab({bills,members,bundesherren,officials,orgChart,session,announcement,activeBudget,submitLock,imperialReserve,imperialLinks,nextElection,absences,accounts,formerMembers,parties,digitalVoting,pressReleases,user,isEmperor,isBTPresident,isBHPresident,onAction,notify,setProcessing}) {
  const myOffices=heldOffices(user,officials);
  const avail=[
    ...(isEmperor?[{id:"emperor",label:"Imperial Throne",icon:"👑"}]:[]),
    ...(isBTPresident?[{id:"bt_president",label:"President of the Bundestag",icon:"🏛"}]:[]),
    ...(isBHPresident?[{id:"bh_president",label:"President of the Bundesherren",icon:"🏰"}]:[]),
    ...myOffices.map(o=>({id:"office:"+o,label:o,icon:"📜"})),
  ];
  const [role,setRole]=useState(avail.length===1?avail[0].id:null);

  if(avail.length===0) return (
    <div className="fu" style={{maxWidth:460,margin:"0 auto"}}>
      <Card style={{textAlign:"center",padding:"2.5rem"}}>
        <div style={{fontSize:36,marginBottom:"0.75rem"}}>🔒</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:C.text,marginBottom:8}}>No Panel Access</div>
        <div style={{fontSize:14,color:C.textD,fontStyle:"italic",lineHeight:1.7}}>
          Panels are reserved for the presidents of either chamber and the Emperor. Access is granted
          on your Ministry of the Interior account.
        </div>
      </Card>
    </div>
  );

  const current=avail.find(r=>r.id===role);
  // Emperor may also hold a chamber presidency; let them choose which hat to wear.
  if(!current) return (
    <div className="fu">
      <STitle>Imperial Panel — Select Role</STitle>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",justifyContent:"center",paddingTop:"1rem"}}>
        {avail.map(r=>(
          <div key={r.id} onClick={()=>setRole(r.id)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:4,padding:"2rem 2.5rem",textAlign:"center",cursor:"pointer",transition:"all .16s",minWidth:160}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.background=C.s3;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.s2;}}>
            <div style={{fontSize:36,marginBottom:"0.75rem"}}>{r.icon}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.text,letterSpacing:"0.1em"}}>{r.label}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {avail.length>1&&(
          <button onClick={()=>setRole(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        )}
        <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.textDD,letterSpacing:"0.15em"}}>
          {current.icon} {current.label.toUpperCase()}
        </span>
        <span style={{fontSize:12,color:C.textDD,fontStyle:"italic"}}>
          signed in as {user?.displayName||user?.username}
        </span>
      </div>
      {role==="emperor"&&<EmperorPanelContent bills={bills} members={members} bundesherren={bundesherren} officials={officials} orgChart={orgChart} announcement={announcement} activeBudget={activeBudget} submitLock={submitLock} imperialReserve={imperialReserve} imperialLinks={imperialLinks} nextElection={nextElection} accounts={accounts} formerMembers={formerMembers} parties={parties} digitalVoting={digitalVoting} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {role==="bt_president"&&<BTPanelContent bills={bills} members={members} bundesherren={bundesherren} session={session} absences={absences} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {role==="bh_president"&&<BHPanelContent bills={bills} members={members} bundesherren={bundesherren} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {typeof role==="string"&&role.indexOf("office:")===0&&<CommuniquePanel office={role.slice(7)} user={user} bundesherren={bundesherren} formerMembers={formerMembers} pressReleases={pressReleases} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>
  );
}

// ── How-To tab ───────────────────────────────────────────────────────────────
function HowToTab() {
  const [role,setRole]=useState(null);

  const ROLES=[
    {id:"bt_member",  label:"Bundestag Member",           icon:"🏛", color:"#4a88ff"},
    {id:"bh_member",  label:"Bundesherren Member",         icon:"🏰", color:C.gold},
    {id:"bt_president",label:"President of the Bundestag", icon:"🎖", color:"#4a88ff"},
    {id:"bh_president",label:"President of the Bundesherren",icon:"⚜",color:C.gold},
  ];

  const Section=({title,color,children})=>(
    <div style={{marginBottom:"1.5rem"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.2em",color:color||C.redL,
                    textTransform:"uppercase",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginBottom:"0.85rem"}}>
        {title}
      </div>
      {children}
    </div>
  );

  const Step=({n,children})=>(
    <div style={{display:"flex",gap:12,marginBottom:"0.6rem",alignItems:"flex-start"}}>
      <div style={{width:22,height:22,borderRadius:"50%",background:C.s3,border:`1px solid ${C.border}`,
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                    fontFamily:"'Cinzel',serif",fontSize:11,color:C.textD,marginTop:1}}>{n}</div>
      <div style={{fontSize:14,color:C.text,lineHeight:1.7}}>{children}</div>
    </div>
  );

  const Note=({children})=>(
    <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.textDD}`,
                  borderRadius:"0 3px 3px 0",padding:"0.6rem 0.85rem",fontSize:13,color:C.textD,
                  fontStyle:"italic",lineHeight:1.6,marginBottom:"0.75rem"}}>{children}</div>
  );

  const Flow=({steps})=>(
    <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:4,marginBottom:"0.75rem",padding:"0.6rem 0.85rem",background:C.s1,borderRadius:3,border:`1px solid ${C.border}`}}>
      {steps.map((s,i)=>(
        <React.Fragment key={i}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:s.color||C.textD,letterSpacing:"0.05em"}}>{s.label}</span>
          {i<steps.length-1&&<span style={{color:C.textDD,fontSize:12}}>→</span>}
        </React.Fragment>
      ))}
    </div>
  );

  if(!role) return (
    <div className="fu">
      <STitle>How It Works</STitle>
      <div style={{fontSize:15,color:C.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.5rem"}}>
        Select your role to see a guide tailored to you.
      </div>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap"}}>
        {ROLES.map(r=>(
          <div key={r.id} onClick={()=>setRole(r.id)}
            style={{flex:1,minWidth:180,background:C.s2,border:`2px solid ${r.color}33`,borderTop:`4px solid ${r.color}`,
                     borderRadius:"0 0 4px 4px",padding:"1.5rem",textAlign:"center",cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=r.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor=r.color+"33"}>
            <div style={{fontSize:32,marginBottom:"0.6rem"}}>{r.icon}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:r.color,fontWeight:700}}>{r.label}</div>
          </div>
        ))}
      </div>
    </div>
  );

  const r=ROLES.find(x=>x.id===role);

  return (
    <div className="fu">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.5rem"}}>
        <button onClick={()=>setRole(null)} style={{background:"transparent",border:`1px solid ${C.border}`,
          borderRadius:2,padding:"3px 10px",fontFamily:"'Cinzel',serif",fontSize:9,color:C.textD,cursor:"pointer",letterSpacing:"0.1em"}}>← Back</button>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:r.color,letterSpacing:"0.15em"}}>{r.icon} {r.label.toUpperCase()}</div>
      </div>

      {role==="bt_member"&&(
        <div>
          <Section title="Your Role" color="#4a88ff">
            <div style={{fontSize:14,color:C.text,lineHeight:1.8,marginBottom:"0.75rem"}}>
              You are a representative of the people. You can submit bills for debate, and your seat allocation determines how much your vote weighs in any division.
            </div>
          </Section>
          <Section title="Submitting a Bill" color="#4a88ff">
            <Step n="1">Go to the <strong>Submit Bill</strong> tab and select <strong>Bundestag</strong>.</Step>
            <Step n="2">Choose your bill type: <strong>Normal Bill</strong>, <strong>Position Nomination</strong>, or <strong>Constitutional Amendment</strong>.</Step>
            <Step n="3">Fill in the title, your name, and paste the link to your Google Doc. Set the doc to <em>"Anyone with the link can view"</em>.</Step>
            <Step n="4">Submit. Your bill lands in the BT President's approval queue.</Step>
            <Note>Position nominations (Chancellor, Ministers, BT President) must be approved by the Emperor before going to the floor. You will not be notified automatically — check the <strong>Legislative Record → Bundeskongress Floor</strong> on the Home page.</Note>
          </Section>
          <Section title="Bill Routing — Normal Bill" color="#4a88ff">
            <Flow steps={[
              {label:"Submitted",color:"#888"},
              {label:"BT President Review",color:"#4a88ff"},
              {label:"Docket",color:"#5a9a5a"},
              {label:"BT Vote (session)",color:"#4a88ff"},
              {label:"Bundesherren Vote",color:C.gold},
              {label:"Emperor",color:C.gold},
              {label:"Law ✅",color:"#7ad47a"},
            ]}/>
            <Note>Votes are cast during the weekly Bundestag session. The President records results during or shortly after. A bill needs 501+ seats to pass the Bundestag.</Note>
          </Section>
          <Section title="Bill Routing — Constitutional Amendment" color="#4a88ff">
            <Flow steps={[
              {label:"Submitted",color:"#888"},
              {label:"BT President Review",color:"#4a88ff"},
              {label:"Docket",color:"#5a9a5a"},
              {label:"BT Vote (667+ seats)",color:"#4a88ff"},
              {label:"Bundesherren Vote",color:C.gold},
              {label:"Emperor",color:C.gold},
              {label:"Law ✅",color:"#7ad47a"},
            ]}/>
          </Section>
          <Section title="What Can Happen to Your Bill" color="#4a88ff">
            <Step n="✅">Passes both chambers → sent to Emperor for ratification → becomes law.</Step>
            <Step n="↩">Returned by Emperor → goes back to the BT President queue. The President will contact you to revise the document before re-submitting.</Step>
            <Step n="🚫">Vetoed → archived permanently with the Emperor's stated reason.</Step>
            <Step n="📥">Pulled → the Emperor has removed it from the process at any stage.</Step>
            <Step n="❌">Failed in BT or BH → archived. You can submit a revised version as a new bill.</Step>
          </Section>
          <Section title="Tracking Your Bill" color="#4a88ff">
            <div style={{fontSize:14,color:C.text,lineHeight:1.8}}>
              Go to <strong>Home → Legislative Record → Bundeskongress Floor</strong> to see every active bill with its current stage. Click any bill to expand the progress pipeline and see exactly where it is in the process.
            </div>
          </Section>
        </div>
      )}

      {role==="bh_member"&&(
        <div>
          <Section title="Your Role" color={C.gold}>
            <div style={{fontSize:14,color:C.text,lineHeight:1.8,marginBottom:"0.75rem"}}>
              You are an Imperial Lord. You can submit bills that start in the Bundesherren, or nominate a new President of the Bundesherren. Your vote carries equal weight to all other lords.
            </div>
          </Section>
          <Section title="Submitting a Bill" color={C.gold}>
            <Step n="1">Go to <strong>Submit Bill</strong> and select <strong>Bundesherren</strong>.</Step>
            <Step n="2">Choose <strong>Regular Bill</strong> or <strong>Nominate President of Bundesherren</strong>.</Step>
            <Step n="3">Fill in your details and Google Doc link.</Step>
            <Step n="4">Submit. Your bill goes to the BH President's queue first.</Step>
          </Section>
          <Section title="Bill Routing — BH Regular Bill" color={C.gold}>
            <Flow steps={[
              {label:"Submitted",color:"#888"},
              {label:"BH President Review",color:C.gold},
              {label:"Bundesherren Vote",color:C.gold},
              {label:"BT President Queue",color:"#4a88ff"},
              {label:"BT Docket",color:"#5a9a5a"},
              {label:"BT Vote",color:"#4a88ff"},
              {label:"Emperor",color:C.gold},
              {label:"Law ✅",color:"#7ad47a"},
            ]}/>
            <Note>BH bills go to the Bundesherren first, then enter the BT President's queue to be docketed for a Bundestag session, then go to the Emperor.</Note>
          </Section>
          <Section title="Bill Routing — BH President Nomination" color={C.gold}>
            <Flow steps={[
              {label:"Submitted",color:"#888"},
              {label:"BH President Review",color:C.gold},
              {label:"Bundesherren Vote",color:C.gold},
              {label:"Emperor",color:C.gold},
              {label:"Appointed ✅",color:"#7ad47a"},
            ]}/>
            <Note>BH President nominations do not go to the Bundestag — they are decided by the Bundesherren alone, then ratified by the Emperor.</Note>
          </Section>
          <Section title="Tracking Your Bill" color={C.gold}>
            <div style={{fontSize:14,color:C.text,lineHeight:1.8}}>
              Go to <strong>Home → Legislative Record → Bundeskongress Floor</strong> to track all active bills. Click any bill to see its progress pipeline.
            </div>
          </Section>
        </div>
      )}

      {role==="bt_president"&&(
        <div>
          <Section title="Your Role" color="#4a88ff">
            <div style={{fontSize:14,color:C.text,lineHeight:1.8}}>

function OrgNode({node}) {
  const [collapsed,setCollapsed]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const hasChildren=node.children&&node.children.length>0;
  const isAgency=node.isAgency;

  const handleClick=()=>{
    if(isAgency) setShowModal(true);
    else if(hasChildren) setCollapsed(c=>!c);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      {showModal&&<AgencyModal node={node} onClose={()=>setShowModal(false)}/>}
      <div onClick={handleClick}
        style={{background:C.s2,border:`2px solid ${node.color||C.border}`,
                 borderRadius:4,padding:"8px 12px",minWidth:130,maxWidth:175,textAlign:"center",
                 cursor:(hasChildren||isAgency)?"pointer":"default",position:"relative",
                 boxShadow:`0 2px 14px ${node.color||"#000"}22`,transition:"all .15s"}}
        onMouseEnter={e=>{ if(hasChildren||isAgency) e.currentTarget.style.borderColor=(node.color||C.border); }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor=(node.color||C.border); }}>
        {node.logo&&<img src={node.logo} alt="" style={{width:32,height:32,objectFit:"contain",display:"block",margin:"0 auto 5px"}}/>}
        {!node.logo&&<div style={{fontSize:20,marginBottom:4}}>{node.icon}</div>}
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,color:node.color||C.text,letterSpacing:"0.07em",lineHeight:1.3,marginBottom:3}}>
          {node.label}
        </div>
        {node.incumbentLabel&&<div style={{fontSize:8,color:C.textDD,letterSpacing:"0.1em",fontFamily:"'Cinzel',serif",marginBottom:2,textTransform:"uppercase"}}>{node.incumbentLabel}</div>}
        {node.incumbent!=null&&<div style={{fontSize:12,color:node.incumbent==="Vacant"?C.textDD:C.gold,fontStyle:node.incumbent==="Vacant"?"italic":"normal",lineHeight:1.3}}>{node.incumbent}</div>}
        {node.sublabel&&<div style={{fontSize:10,color:C.textD,fontStyle:"italic",marginTop:2}}>{node.sublabel}</div>}
        {isAgency&&node.leaderName&&<div style={{fontSize:10,color:C.gold,marginTop:3,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:145}}>{node.leaderName}</div>}
        {isAgency&&<div style={{position:"absolute",top:5,right:6,fontFamily:"'Cinzel',serif",fontSize:7,color:C.textDD,letterSpacing:"0.05em"}}>ⓘ</div>}
        {hasChildren&&<div style={{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",
          background:C.s3,border:`1px solid ${node.color||C.border}`,borderRadius:"50%",
          width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:9,color:node.color||C.textD,zIndex:2,pointerEvents:"none"}}>{collapsed?"[+]":"[-]"}</div>}
      </div>

      {hasChildren&&!collapsed&&(
        <>
          <div style={{width:2,height:18,background:node.color||C.border,opacity:0.6}}/>
          <div style={{position:"relative",display:"flex",flexDirection:"row",alignItems:"flex-start",gap:0}}>
            {node.children.length>1&&(
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,
                            background:`linear-gradient(to right, transparent 0%, ${node.color||C.border}88 15%, ${node.color||C.border}88 85%, transparent 100%)`,
                            zIndex:0}}/>
            )}
            {node.children.map(child=>(
              <div key={child.id} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 10px",minWidth:155}}>
                <div style={{width:2,height:18,background:child.color||C.border,opacity:0.6,flexShrink:0}}/>
                <OrgNode node={child}/>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function GovChartTab({officials,members,bundesherren,orgChart}) {
  const [zoom,setZoom]=useState(0.8);
  const [pan,setPan]=useState({x:0,y:20});
  const [dragging,setDragging]=useState(false);
  const dragRef=useRef(null);

  const mins=officials?.ministers||{};
  const btCount=Object.keys(members||{}).length;
  const bhCount=Object.keys(bundesherren||{}).length;

  const ministryNodes=MINISTER_PORTFOLIOS.map(p=>({
    id:"min_"+p.replace(/\s+/g,"_"),
    label:p,
    icon:"🎖",
    incumbentLabel:"Minister",
    incumbent:mins[p]||"Vacant",
    color:mins[p]&&mins[p]!=="Vacant"?"#c8a040":C.textDD,
    logo:(orgChart?.logos||{})[p]||null,
    children:((orgChart?.agencies||{})[p]||[]).map(a=>({
      id:a.id,label:a.name,icon:"🏢",incumbent:null,isAgency:true,
      color:"#5a7a9a",logo:a.logo||null,children:[],
      leaderTitle:a.leaderTitle||null,leaderName:a.leaderName||null,
    })),
  }));

  const tree={
    id:"emperor",label:"Emperor",icon:"👑",
    incumbentLabel:"Head of State",incumbent:officials?.emperor_name||null,
    color:C.gold,logo:(orgChart?.logos||{})["emperor"]||null,
    children:[
      {id:"bundestag",label:"Bundestag",icon:"🏛",
       incumbentLabel:"President",incumbent:officials?.president_bt||"Vacant",
       sublabel:btCount+" members",color:"#4a88ff",
       logo:(orgChart?.logos||{})["bundestag"]||null,children:[]},
      {id:"council",label:"Imperial Council",icon:"⚜",
       incumbentLabel:"Chancellor",incumbent:officials?.chancellor||"Vacant",
       color:C.gold,logo:(orgChart?.logos||{})["council"]||null,children:ministryNodes},
      {id:"bundesherren",label:"Bundesherren",icon:"🏰",
       incumbentLabel:"President",incumbent:officials?.president_bh||"Vacant",
       sublabel:bhCount+" lords",color:"#c8a870",
       logo:(orgChart?.logos||{})["bundesherren"]||null,children:[]},
    ],
  };

  const onMouseDown=e=>{ dragRef.current={sx:e.clientX-pan.x,sy:e.clientY-pan.y,ox:e.clientX,oy:e.clientY,moved:false}; setDragging(false); };
  const canvasRef=useRef(null);
  const onMouseMove=e=>{ if(!dragRef.current) return; const dx=e.clientX-dragRef.current.ox,dy=e.clientY-dragRef.current.oy; if(!dragRef.current.moved&&Math.sqrt(dx*dx+dy*dy)>4) dragRef.current.moved=true; if(dragRef.current.moved){ setDragging(true); const cw=canvasRef.current?.offsetWidth||900; const ch=canvasRef.current?.offsetHeight||580; const limit=600; const nx=Math.min(limit,Math.max(-limit,e.clientX-dragRef.current.sx)); const ny=Math.min(limit,Math.max(-ch*0.7,e.clientY-dragRef.current.sy)); setPan({x:nx,y:ny}); } };
  const onMouseUp=()=>{ dragRef.current=null; setDragging(false); };
  const onWheel=e=>{ e.preventDefault(); setZoom(z=>Math.min(1.6,Math.max(0.25,z-e.deltaY*0.001))); };

  // Fullscreen controls
  const [fullscreen,setFullscreen]=useState(false);
  useEffect(()=>{
    const onKey=e=>{ if(e.key==="Escape") setFullscreen(false); };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[]);

  const ChartCanvas=()=>(
    <div ref={canvasRef} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
      onWheel={onWheel}
      style={{background:C.s1,
               border:fullscreen?"none":`1px solid ${C.gold}44`,
               boxShadow:fullscreen?"none":`inset 0 0 0 1px ${C.border}, 0 0 20px #C9A84C11`,
               overflow:"hidden",flex:1,cursor:dragging?"grabbing":"grab",
               userSelect:"none",position:"relative",borderRadius:fullscreen?0:3}}>
      <div style={{position:"absolute",inset:0,overflow:"visible",pointerEvents:"none"}}>
        <div style={{position:"absolute",left:`calc(50% + ${pan.x}px)`,top:`calc(40px + ${pan.y}px)`,
                      transform:`translateX(-50%) scale(${zoom})`,
                      transformOrigin:"50% 0",display:"inline-flex",pointerEvents:"all"}}>
          <OrgNode node={tree}/>
        </div>
      </div>
    </div>
  );

  const Controls=()=>(
    <div style={{display:"flex",gap:5,alignItems:"center"}}>
      <button onClick={()=>{setPan({x:0,y:20});setZoom(0.8);}}
        style={{fontFamily:"'Cinzel',serif",fontSize:9,background:"transparent",border:`1px solid ${C.border}`,color:C.textD,padding:"3px 10px",borderRadius:2,cursor:"pointer"}}>Reset</button>
      <button onClick={()=>setZoom(z=>Math.max(0.25,z-0.1))}
        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textD,width:26,height:26,borderRadius:2,cursor:"pointer",fontSize:18,lineHeight:"22px"}}>-</button>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.textDD,minWidth:36,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
      <button onClick={()=>setZoom(z=>Math.min(1.6,z+0.1))}
        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textD,width:26,height:26,borderRadius:2,cursor:"pointer",fontSize:18,lineHeight:"22px"}}>+</button>
      <button onClick={()=>setFullscreen(f=>!f)}
        style={{fontFamily:"'Cinzel',serif",fontSize:9,background:fullscreen?"#3a2000":"transparent",
                 border:`1px solid ${fullscreen?C.gold:C.border}`,color:fullscreen?C.gold:C.textD,
                 padding:"3px 10px",borderRadius:2,cursor:"pointer",marginLeft:4}}>
        {fullscreen?"✕ Exit":"⛶ Expand"}
      </button>
    </div>
  );

  if(fullscreen) return (
    <div style={{position:"fixed",inset:0,zIndex:9000,background:C.bg,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                   padding:"10px 16px",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.s1}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.25em",color:C.gold,textTransform:"uppercase"}}>
          Government of the Empire of Lech
        </div>
        <Controls/>
      </div>
      <ChartCanvas/>
      <div style={{textAlign:"center",padding:"6px 0",fontSize:11,color:C.textDD,fontStyle:"italic",
                   borderTop:`1px solid ${C.border}`,background:C.s1,flexShrink:0}}>
        Drag to pan · Scroll to zoom · Click nodes to expand/collapse · Esc to exit
      </div>
    </div>
  );

  return (
    <div className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.85rem",flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.25em",color:C.redL,textTransform:"uppercase"}}>Government of the Empire of Lech</div>
        <Controls/>
      </div>
      <div style={{display:"flex",flexDirection:"column",height:560}}>
        <ChartCanvas/>
      </div>
      <div style={{fontSize:11,color:C.textDD,fontStyle:"italic",marginTop:5,textAlign:"center"}}>
        Drag to pan · Scroll to zoom · Click nodes to expand/collapse
      </div>
    </div>
  );
}

// ── Org Chart Emperor Section ─────────────────────────────────────────────────
function OrgChartSection({orgChart,onAction,notify,setProcessing}) {
  const [selOrg,setSelOrg]=useState("emperor");
  const [agencyName,setAgencyName]=useState("");

  const ORG_OPTIONS=[
    {v:"emperor",l:"Emperor (Crown)"},
    {v:"council",l:"Imperial Council"},
    {v:"bundestag",l:"Bundestag"},
    {v:"bundesherren",l:"Bundesherren"},
    ...MINISTER_PORTFOLIOS.map(p=>({v:p,l:p})),
  ];

  const uploadLogo=async(orgKey,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{
      setProcessing("Uploading logo...");
      const next={...(orgChart||{}),logos:{...(orgChart?.logos||{}),[orgKey]:e.target.result}};
      await onAction("saveOrgChart",{orgChart:next});
      setProcessing(null); notify("Logo updated.",C.gold);
    };
    reader.readAsDataURL(file);
  };
  const clearLogo=async orgKey=>{
    const logos={...(orgChart?.logos||{})}; delete logos[orgKey];
    setProcessing("Removing logo...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),logos}});
    setProcessing(null); notify("Logo removed.",C.textD);
  };
  const addAgency=async()=>{
    if(!agencyName.trim()) return;
    const agencies={...(orgChart?.agencies||{})};
    const list=[...(agencies[selOrg]||[]),{id:"ag_"+uid(),name:agencyName.trim(),logo:null}];
    setProcessing("Adding agency...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies:{...agencies,[selOrg]:list}}});
    setProcessing(null); notify(agencyName+" added.",C.gold); setAgencyName("");
  };
  const removeAgency=async(orgKey,agId)=>{
    const agencies={...(orgChart?.agencies||{})};
    agencies[orgKey]=(agencies[orgKey]||[]).filter(a=>a.id!==agId);
    setProcessing("Removing...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
    setProcessing(null); notify("Agency removed.",C.textD);
  };
  const saveAgencyLeader=async(orgKey,agId,leaderTitle,leaderName)=>{
    const agencies={...(orgChart?.agencies||{})};
    agencies[orgKey]=(agencies[orgKey]||[]).map(a=>a.id===agId?{...a,leaderTitle,leaderName}:a);
    setProcessing("Saving...");
    await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
    setProcessing(null); notify("Leader updated.",C.gold);
  };
  const uploadAgencyLogo=async(orgKey,agId,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{
      const agencies={...(orgChart?.agencies||{})};
      agencies[orgKey]=(agencies[orgKey]||[]).map(a=>a.id===agId?{...a,logo:e.target.result}:a);
      setProcessing("Uploading...");
      await onAction("saveOrgChart",{orgChart:{...(orgChart||{}),agencies}});
      setProcessing(null); notify("Agency logo set.",C.gold);
    };
    reader.readAsDataURL(file);
  };

  const curLogo=(orgChart?.logos||{})[selOrg];
  const curAgencies=(orgChart?.agencies||{})[selOrg]||[];

  return (
    <div>
      <STitle>Government Chart</STitle>
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem",maxWidth:500}}>
        <div><FL>ORGANISATION</FL>
          <DD value={selOrg} onChange={v=>{setSelOrg(v);setAgencyName("");}} options={ORG_OPTIONS}/>
        </div>
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.85rem 1rem"}}>
          <FL>LOGO</FL>
          <div style={{display:"flex",alignItems:"center",gap:"0.75rem",flexWrap:"wrap",marginBottom:6}}>
            {curLogo
              ?<><img src={curLogo} alt="" style={{width:44,height:44,objectFit:"contain",border:`1px solid ${C.border}`,borderRadius:3,background:"#111",padding:2}}/>
                <Btn variant="danger" small onClick={()=>clearLogo(selOrg)}>Remove</Btn></>
              :<span style={{fontSize:13,color:C.textD,fontStyle:"italic"}}>No logo set</span>
            }
            <label style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",

          {curAgencies.length>0&&(

          </div>

// ── Legislative Record ───────────────────────────────────────────────────────
function LegislativeRecord({bills,members,bundesherren,ijStatutes,ijCases}) {
  const [view,setView]=useState("floor"); // "floor" | "archive"

  const floorBills=Object.values(bills||{})
    .filter(b=>["pending","pending_bh","pending_emperor","docket","bt_voting","bh_voting","ratification","returned"].includes(b.status))
    .sort((a,b)=>{
      const order=["bt_voting","bh_voting","ratification","returned","docket","pending","pending_bh","pending_emperor"];
      return order.indexOf(a.status)-order.indexOf(b.status)||b.created-a.created;
    });

  return (
    <div>
      {/* Sub-selector */}
      <div style={{display:"flex",gap:0,marginBottom:"1.5rem",background:C.s2,borderRadius:3,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {[
          {id:"floor",  icon:"🏛", label:"Bundeskongress Floor", desc:"Bills currently in the legislative process"},
          {id:"archive",icon:"📜", label:"Archive",               desc:"Bills no longer in progress"},
        ].map(opt=>{
          const active=view===opt.id;
          return (
            <div key={opt.id} onClick={()=>setView(opt.id)}
              style={{flex:1,padding:"0.85rem 1.1rem",cursor:"pointer",
                       background:active?`linear-gradient(135deg,${C.gold}14,transparent)`:C.s2,
                       borderRight:opt.id==="floor"?`1px solid ${C.border}`:"none",
                       borderBottom:`3px solid ${active?C.gold:"transparent"}`,
                       transition:"all .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <span style={{fontSize:18}}>{opt.icon}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:active?C.gold:C.text,
                               fontWeight:active?700:400,letterSpacing:"0.08em"}}>{opt.label}</span>
              </div>
              <div style={{fontSize:12,color:C.textD,fontStyle:"italic",paddingLeft:26}}>{opt.desc}</div>
            </div>
          );
        })}
      </div>

      {view==="floor"&&(
        floorBills.length===0
          ?<div style={{textAlign:"center",padding:"2rem",color:C.textD,fontStyle:"italic",fontSize:14}}>
            No bills are currently on the floor.
          </div>
          :floorBills.map(b=><BillCard key={b.id} bill={b} members={members} bundesherren={bundesherren} bills={bills}/>)
      )}

      {view==="archive"&&(
        <ArchiveTab bills={bills} members={members} bundesherren={bundesherren} ijStatutes={ijStatutes} ijCases={ijCases}/>
      )}
    </div>
  );
}

// ── Imperial Announcement Banner ─────────────────────────────────────────────
const ANNOUNCEMENT_TONES = [
  { v:"neutral",    l:"Neutral",    icon:"📜", bg:"#1a1610", border:"#5a5030", text:"#d0c890", accent:"#a09060" },
  { v:"positive",   l:"Positive",   icon:"⚜",  bg:"#0e1a0e", border:"#2a5a2a", text:"#a0d0a0", accent:"#60c060" },
  { v:"cautionary", l:"Cautionary", icon:"⚠",  bg:"#1a1400", border:"#6a5000", text:"#e0b860", accent:"#c09030" },
  { v:"alert",      l:"Alert",      icon:"🚨", bg:"#1a0808", border:"#6a1a1a", text:"#e08080", accent:"#c03030" },
];

function AnnouncementBanner({announcement,tab}) {
  const [dismissed,setDismissed]=useState(false);
  const prevAnn=useRef(null);

  // Reset dismissed when announcement changes
  useEffect(()=>{
    if(announcement?.text!==prevAnn.current) { setDismissed(false); prevAnn.current=announcement?.text; }
  },[announcement]);

  if(!announcement?.text||dismissed) return null;
  const pages=announcement.pages||["home","bundestag","bundesherren","submit","panel"];
  if(!pages.includes(tab)&&!pages.includes("all")) return null;

  const tone=ANNOUNCEMENT_TONES.find(t=>t.v===announcement.tone)||ANNOUNCEMENT_TONES[0];

  return (
    <div style={{background:tone.bg,borderTop:`1px solid ${tone.border}`,borderBottom:`3px solid ${tone.border}`,
                  position:"relative",animation:"fadeUp .3s ease"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"0.75rem 1rem",
                   display:"flex",alignItems:"flex-start",gap:12}}>
        <span style={{fontSize:20,flexShrink:0,marginTop:1,filter:`drop-shadow(0 0 6px ${tone.accent}88)`}}>{tone.icon}</span>
        <div style={{flex:1,minWidth:0}}>
          {announcement.title&&(
            <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.18em",
                          color:tone.accent,textTransform:"uppercase",marginBottom:3,fontWeight:700}}>
              {announcement.title}
            </div>
          )}
          <div style={{fontSize:14,color:tone.text,lineHeight:1.7}}>{announcement.text}</div>
        </div>
        <button onClick={()=>setDismissed(true)}
          style={{background:"transparent",border:"none",color:tone.accent,cursor:"pointer",
                   fontSize:16,lineHeight:1,flexShrink:0,opacity:0.7,padding:"2px 4px",marginTop:1}}
          title="Dismiss">✕</button>
      </div>
    </div>
  );
}
