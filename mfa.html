<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#080e0a;color:#ccd8cc;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#080e0a;}
::-webkit-scrollbar-thumb{background:#1a4a28;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}
.mono{font-family:'Share Tech Mono',monospace;}

/* ── PASSPORT VIEWER ─────────────────────────────────────────────────────── */
.pp-overlay{position:fixed;inset:0;z-index:9990;background:rgba(3,6,4,.93);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1rem;animation:fadeIn .25s ease;}
.pp-stage{--ppw:300px;--pph:420px;perspective:2200px;position:relative;
  width:calc(var(--ppw)*2);height:var(--pph);transition:transform .8s cubic-bezier(.45,.05,.2,1);}
@media(max-width:700px){.pp-stage{--ppw:220px;--pph:308px;}}
.pp-stage.closed{transform:translateX(calc(var(--ppw)/-2));}
.pp-stage.closed-end{transform:translateX(calc(var(--ppw)/2));}
.pp-sheet{position:absolute;top:0;right:0;width:var(--ppw);height:var(--pph);
  transform-origin:left center;transform-style:preserve-3d;
  transition:transform .85s cubic-bezier(.45,.05,.2,1);cursor:pointer;}
.pp-sheet.flipped{transform:rotateY(-180deg);}
.pp-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;border-radius:5px 14px 14px 5px;box-shadow:0 16px 44px rgba(0,0,0,.5);}
.pp-face.back{transform:rotateY(180deg);border-radius:14px 5px 5px 14px;}
.pp-paper{background:
  radial-gradient(ellipse 120% 90% at 50% -20%, rgba(120,100,150,.06), transparent 60%),
  radial-gradient(ellipse 120% 90% at 50% 120%, rgba(90,120,160,.07), transparent 60%),
  repeating-radial-gradient(circle at 50% 50%, transparent 0px, transparent 9px, rgba(90,80,120,.035) 10px),
  linear-gradient(160deg,#efe8d6 0%,#e7dfc9 55%,#ded4ba 100%);
  box-shadow:inset 0 0 34px rgba(90,70,40,.22);}
.pp-gold-frame{position:absolute;inset:10px;border:2px solid rgba(212,180,110,.85);border-radius:8px;pointer-events:none;
  box-shadow:0 0 0 3px transparent, inset 0 0 0 1px rgba(212,180,110,.35);}
.pp-gold-frame::after{content:'';position:absolute;inset:4px;border:1px solid rgba(212,180,110,.55);border-radius:5px;}
@keyframes ppStamp{0%{opacity:0;transform:rotate(-14deg) scale(1.6);}60%{opacity:1;transform:rotate(-14deg) scale(.94);}100%{opacity:1;transform:rotate(-14deg) scale(1);}}
.pp-revoked{animation:ppStamp .5s ease .45s both;}
</style>
</head>

  if(days===0)return {label:"Expires today",color:"#cc6a10",state:"soon"};
  if(days<=14)return {label:"Expires in "+days+" day"+(days!==1?"s":""),color:"#cc6a10",state:"soon"};
  return {label:"Valid",color:"#2a9a4a",state:"valid"};
}
function VisaValidityBadge({visa}){const vv=visaValidity(visa);if(!vv)return null;return <span className="mono" style={{fontSize:9,padding:"2px 8px",borderRadius:1,background:vv.color+"18",border:`1px solid ${vv.color}55`,color:vv.color}}>{vv.label.toUpperCase()}</span>;}

// ── PASSPORTS ─────────────────────────────────────────────────────────────────
const PASSPORT_TYPES=[
  {v:"standard",  l:"Standard Passport",   short:"ORDINARY",   code:"P<", cover:"#12244e", coverDeep:"#0a1530", trim:"#c9a84c"},
  {v:"diplomatic",l:"Diplomatic Passport", short:"DIPLOMATIC", code:"PD", cover:"#48111a", coverDeep:"#2a080e", trim:"#e0c060"},
  {v:"official",  l:"Official / Service",  short:"OFFICIAL",   code:"PS", cover:"#123322", coverDeep:"#081d12", trim:"#c9a84c"},
  {v:"imperial",  l:"Imperial Household",  short:"IMPERIAL",   code:"PI", cover:"#131316", coverDeep:"#08080a", trim:"#e8cc70"},
];
const ppType=(v)=>PASSPORT_TYPES.find(t=>t.v===v)||PASSPORT_TYPES[0];
function passportValidity(p){
  if(!p)return null;
  if(p.status==="revoked")return {label:"Revoked",color:"#cc2222",state:"revoked"};
  if(!p.expires)return {label:"Valid",color:"#2a9a4a",state:"valid"};
  const end=new Date(p.expires+"T23:59:59").getTime();
  if(isNaN(end))return {label:"Valid",color:"#2a9a4a",state:"valid"};
  const days=Math.ceil((end-Date.now())/86400000);
  if(days<0)return {label:"Expired",color:"#cc2222",state:"expired"};
  if(days<=90)return {label:"Expires in "+days+" day"+(days!==1?"s":""),color:"#cc6a10",state:"soon"};
  return {label:"Valid",color:"#2a9a4a",state:"valid"};
}
function PassportValidityBadge({passport}){const pv=passportValidity(passport);if(!pv)return null;return <span className="mono" style={{fontSize:9,padding:"2px 8px",borderRadius:1,background:pv.color+"18",border:`1px solid ${pv.color}55`,color:pv.color}}>{pv.label.toUpperCase()}</span>;}
// Machine-readable zone (aesthetic — mirrors ICAO layout)
function mrzClean(s){return (s||"").toUpperCase().replace(/[^A-Z0-9 ]/g,"").trim().replace(/ +/g,"<");}
function mrzPad(s,n){return (s+"<".repeat(n)).slice(0,n);}
function mrzDate(d){if(!d)return "<<<<<<";const t=new Date(d);if(isNaN(t.getTime()))return "<<<<<<";const p=x=>String(x).padStart(2,"0");return String(t.getFullYear()).slice(2)+p(t.getMonth()+1)+p(t.getDate());}
function ppMRZ(p){
  const t=ppType(p.type);
  const l1=mrzPad(t.code.replace("<","")+"<"+"LEC"+mrzClean(p.name)+"<<"+mrzClean(p.username||""),44);
  const l2=mrzPad(mrzPad(mrzClean(p.number),9)+"4LEC"+mrzDate(p.issued)+"7<"+mrzDate(p.expires)+"2",44);
  return [l1.slice(0,44),l2.slice(0,44)];
}
function genPassportNo(passports){
  const existing=new Set(Object.values(passports||{}).map(p=>p.number));
  let n,tries=0;
  do{n="L"+String(Math.floor(1000000+Math.random()*9000000));tries++;}while(existing.has(n)&&tries<60);
  return n;
}

async function sha256(t){const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
// ── MongoDB backend (Render API) ───────────────────────────────────────────────
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
function saveSession(t){try{if(t)localStorage.setItem(SESSION_KEY,t);}catch(e){}}
function forgetSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}try{if(AUTH_TOKEN)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN})});}catch(e){}AUTH_TOKEN=null;}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{const r=await fetch(API+"/api/me",{headers:{Authorization:"Bearer "+t}});const d=await r.json();if(d&&d.ok&&d.account)return d.account;}catch(e){}
  forgetSession();return null;
}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}}
async function sdel(k){try{await fetch(API+"/api/unset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k})});}catch{}}
async function slogin(username,password){try{const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});const d=await r.json();if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token);return {ok:true,account:d.account};}return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};}catch(e){return {ok:false,error:"Connection error"};}}

function SignIn({onAuth,onClose}){
  const [username,setUsername]=useState("");const [password,setPassword]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);

      if(!res.ok){setErr(res.error==="ACCESS DENIED"?"Incorrect password.":res.error);setLoading(false);return;}

        <span className="mono" style={{fontSize:11,color:C.textD,flex:1}}>claims account <span style={{color:C.gold}}>{c.claimedBy}</span></span>
        <Btn small variant="gold" onClick={async()=>{setProcessing("Approving claim...");await onAction("updateCitizen",{id:c.id,username:c.claimedBy,claimedBy:"",claimStatus:""});setProcessing(null);notify(c.name+" linked to "+c.claimedBy+".",C.accent);}}>Approve</Btn>
        <ArmBtn small label="Reject" confirmLabel="Reject?" onConfirm={async()=>{setProcessing("Rejecting...");await onAction("updateCitizen",{id:c.id,claimedBy:"",claimStatus:""});setProcessing(null);notify("Claim rejected.",C.textD);}}/>
      </div>)}
    </div>}

    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div className="mono" style={{fontSize:9,color:C.textD,letterSpacing:"0.15em",marginBottom:"0.75rem"}}>ADD RECORD</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>LINK MOI ACCOUNT <span style={{fontStyle:"italic",color:C.textDD,fontSize:9,fontFamily:"'Crimson Text',serif",fontWeight:400,letterSpacing:0}}>(optional — leave manual for inactive citizens with no account)</span></FL><DD value={acct} onChange={pickAccount} options={acctOpts}/></div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>FULL NAME *</FL><Inp value={name} onChange={setName} placeholder="In-game name"/></div>
          <div style={{flex:1,minWidth:140}}><FL>USERNAME</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
          <div style={{flex:1,minWidth:140}}><FL>NATIONALITY</FL><Inp value={nationality} onChange={setNationality} placeholder="Origin country"/></div>
        </div>
        <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}><FL>STATUS</FL><DD value={status} onChange={setStatus} options={CITIZENSHIP_STATUSES.map(s=>({v:s.v,l:s.l}))}/></div>
          <div style={{flex:1,minWidth:140}}><FL>DATE GRANTED</FL><Inp value={since} onChange={setSince} type="date"/></div>
          <div style={{flex:2,minWidth:200}}><FL>NOTES</FL><Inp value={notes} onChange={setNotes} placeholder="Additional notes..."/></div>
        </div>
        <Btn small disabled={!name.trim()||saving} onClick={async()=>{setSaving(true);setProcessing("Adding...");await onAction("createCitizen",{name:name.trim(),username:username.trim(),nationality:nationality.trim(),status,since,notes:notes.trim()});setProcessing(null);setSaving(false);notify(name+" added.",C.accent);setAcct("");setName("");setUsername("");setNationality("");setNotes("");}}>{saving?"Adding...":"Add to Registry"}</Btn>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:4}}>{list.map(c=>{const st=CITIZENSHIP_STATUSES.find(s=>s.v===c.status)||CITIZENSHIP_STATUSES[0];return <CitizenRow key={c.id} citizen={c} st={st} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>;})}</div>
  </div>;
}

function CitizenRow({citizen,st,accounts,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);const [status,setStatus]=useState(citizen.status||"citizen");const [uname,setUname]=useState(citizen.username||"");const [notes,setNotes]=useState(citizen.notes||"");const [saving,setSaving]=useState(false);
  const linked=!!(citizen.username&&(accounts||[]).some(a=>a.username.toLowerCase()===citizen.username.toLowerCase()));
  return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderLeft:`4px solid ${st.color}`,borderRadius:"0 3px 3px 0",overflow:"hidden",marginBottom:4}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"0.65rem 1rem",cursor:"pointer",flexWrap:"wrap"}}><span className="mono" style={{fontSize:9,color:st.color,padding:"2px 8px",background:C.s2,border:`1px solid ${st.color}44`}}>{st.l.toUpperCase()}</span><span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:C.text,flex:1}}>{citizen.name}</span>{citizen.claimStatus==="pending"&&<span className="mono" style={{fontSize:8,color:C.gold,border:`1px solid ${C.gold}44`,borderRadius:2,padding:"1px 6px"}}>CLAIM PENDING</span>}{citizen.reviewRequested&&<span className="mono" style={{fontSize:8,color:"#b89ac8",border:`1px solid #6a4a8a`,borderRadius:2,padding:"1px 6px"}}>REVIEW REQUESTED</span>}{citizen.username?<span className="mono" style={{fontSize:10,color:linked?"#5aaa7a":C.textD}}>{citizen.username}{linked?" ✓":""}</span>:<span className="mono" style={{fontSize:9,color:C.textDD,fontStyle:"italic"}}>unlinked</span>}{citizen.since&&<span className="mono" style={{fontSize:9,color:C.textDD}}>{citizen.since}</span>}<span style={{fontSize:11,color:C.textDD}}>{open?"A":"V"}</span></div>
    {open&&<div style={{borderTop:`1px solid ${C.border}`,padding:"0.85rem",background:C.s2,display:"flex",gap:"0.75rem",flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{flex:1,minWidth:150}}><FL>STATUS</FL><DD value={status} onChange={setStatus} options={CITIZENSHIP_STATUSES.map(s=>({v:s.v,l:s.l}))}/></div>
      <div style={{flex:1,minWidth:150}}><FL>LINKED USERNAME</FL><Inp value={uname} onChange={setUname} placeholder="MOI username (blank = unlinked)"/></div>
      <div style={{flex:2,minWidth:180}}><FL>NOTES</FL><Inp value={notes} onChange={setNotes} placeholder="Notes..."/></div>
      <Btn small variant="gold" disabled={saving} onClick={async()=>{setSaving(true);setProcessing("Updating...");await onAction("updateCitizen",{id:citizen.id,status,username:uname.trim(),notes:notes.trim(),reviewRequested:false,reviewRequestedAt:null});setProcessing(null);setSaving(false);notify(citizen.name+" updated.",C.gold);}}>{saving?"Saving...":"Save"}</Btn>
      <ArmBtn small label="Remove" confirmLabel="Remove?" onConfirm={async()=>{setProcessing("Removing...");await onAction("deleteCitizen",{id:citizen.id});setProcessing(null);notify(citizen.name+" removed.",C.textD);}}/>
    </div>}
  </div>;
}

function App(){
  const [tab,setTab]=useState("advisories");
  const [raw,setRaw]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [user,setUser]=useState(null);
  const [authOpen,setAuthOpen]=useState(false);
  const [toast,setToast]=useState({msg:"",color:""});
  const [processing,setProcessing]=useState(null);

  const notify=useCallback((msg,color=C.accent)=>{
    setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);
  },[]);

  useEffect(()=>{sgetAll().then(r=>{setRaw(r);setLoaded(true);});},[]);
  // Restore a session signed in on another page (validated server-side), then
  // pull the snapshot again with the token so protected records load too.
  useEffect(()=>{srestore().then(acc=>{if(acc){setUser(acc);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));}});},[]);

  const accounts=useMemo(()=>{
    const out=[];const seen={};
    Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("mi_acc_")&&v&&v.username&&!seen[v.username.toLowerCase()]){seen[v.username.toLowerCase()]=1;out.push(v);}});
    Object.entries(raw["mi_accounts"]||{}).forEach(([k,v])=>{if(v&&v.username&&!seen[v.username.toLowerCase()]){seen[v.username.toLowerCase()]=1;out.push(v);}});
    return out.sort((x,y)=>((x.displayName||x.username)||"").localeCompare((y.displayName||y.username)||""));
  },[raw]);
  const canPanel=user&&(user.role==="emperor"||user.role==="minister"||user.mfaAccess);
  const countries=useMemo(()=>raw["mfa_countries"]||{},[raw]);
  const advisories=useMemo(()=>raw["mfa_advisories"]||{},[raw]);
  const restrictions=useMemo(()=>raw["mfa_restrictions"]||{},[raw]);
  const visas=useMemo(()=>raw["mfa_visas"]||{},[raw]);
  const citizens=useMemo(()=>raw["mfa_citizens"]||{},[raw]);
  const passports=useMemo(()=>raw["mfa_passports"]||{},[raw]);
  const pendingVisas=useMemo(()=>Object.values(visas).filter(v=>v.status==="pending").length,[visas]);

  const onAction=useCallback(async(type,payload)=>{
    if(type==="createCountry"){const id="cty_"+uid();const next={...countries,[id]:{...payload,id,created:Date.now()}};setRaw(r=>({...r,mfa_countries:next}));await sset("mfa_countries",next);}
    else if(type==="updateCountry"){const {id,...rest}=payload;const next={...countries,[id]:{...countries[id],...rest}};setRaw(r=>({...r,mfa_countries:next}));await sset("mfa_countries",next);}
    else if(type==="deleteCountry"){const next={...countries};delete next[payload.id];setRaw(r=>({...r,mfa_countries:next}));await sset("mfa_countries",next);}
    else if(type==="updateAdvisory"){const next={...advisories,[payload.countryId]:{level:payload.level,text:payload.text,updatedAt:payload.updatedAt}};setRaw(r=>({...r,mfa_advisories:next}));await sset("mfa_advisories",next);}
    else if(type==="createRestriction"){const id="rst_"+uid();const next={...restrictions,[id]:{...payload,id}};setRaw(r=>({...r,mfa_restrictions:next}));await sset("mfa_restrictions",next);}
    else if(type==="deleteRestriction"){const next={...restrictions};delete next[payload.id];setRaw(r=>({...r,mfa_restrictions:next}));await sset("mfa_restrictions",next);}
    else if(type==="submitVisa"){const id="vis_"+uid();const next={...visas,[id]:{...payload,id}};setRaw(r=>({...r,mfa_visas:next}));return await sset("mfa_visas",next);}
    else if(type==="updateVisa"){const {id,...rest}=payload;const next={...visas,[id]:{...visas[id],...rest}};setRaw(r=>({...r,mfa_visas:next}));await sset("mfa_visas",next);}
    else if(type==="createCitizen"){const id="cit_"+uid();const next={...citizens,[id]:{...payload,id}};setRaw(r=>({...r,mfa_citizens:next}));await sset("mfa_citizens",next);}
    else if(type==="updateCitizen"){const {id,...rest}=payload;const next={...citizens,[id]:{...citizens[id],...rest}};setRaw(r=>({...r,mfa_citizens:next}));await sset("mfa_citizens",next);}
    else if(type==="deleteCitizen"){const next={...citizens};delete next[payload.id];setRaw(r=>({...r,mfa_citizens:next}));await sset("mfa_citizens",next);}
    else if(type==="createPassport"){const id="ppt_"+uid();const next={...passports,[id]:{...payload,id}};setRaw(r=>({...r,mfa_passports:next}));await sset("mfa_passports",next);}
    else if(type==="updatePassport"){const {id,...rest}=payload;const next={...passports,[id]:{...passports[id],...rest}};setRaw(r=>({...r,mfa_passports:next}));await sset("mfa_passports",next);}
    else if(type==="deletePassport"){const next={...passports};delete next[payload.id];setRaw(r=>({...r,mfa_passports:next}));await sset("mfa_passports",next);}
  },[raw,countries,advisories,restrictions,visas,citizens,passports]);

  const TABS=[{v:"advisories",l:"Travel Advisories",icon:"+"},{v:"citizenship",l:"Citizenship",icon:"+"},{v:"visa",l:"Visa Applications",icon:"+"},{v:"passports",l:"Passports",icon:"+"},{v:"policy",l:"Foreign Policy",icon:"+"},{v:"restrictions",l:"Restrictions",icon:"+"},{v:"panel",l:"Panel",icon:"+"}];

  function handleTabClick(v){setTab(v);}
  const myCitizenship=user?Object.values(citizens).find(c=>(c.username||"").toLowerCase()===user.username.toLowerCase()):null;

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"0 1.25rem"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"0.75rem 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <span style={{fontSize:18}}>+</span>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13,letterSpacing:"0.15em",color:C.text,lineHeight:1}}>Ministry of Foreign Affairs</div>
              <div className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:C.textDD,marginTop:1}}>Empire of Lech</div>
            </div>
          </div>
          {user?<div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{textAlign:"right",lineHeight:1.2}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.text}}>{user.displayName||user.username}</div>
              <div className="mono" style={{fontSize:7,color:canPanel?C.gold:C.textDD,letterSpacing:"0.1em"}}>{canPanel?"MINISTRY ACCESS":myCitizenship?"REGISTERED CITIZEN":"SIGNED IN"}</div>
            </div>
            <Btn small variant="ghost" onClick={()=>{forgetSession();setUser(null);if(tab==="panel")setTab("advisories");notify("Signed out.",C.textD);}}>Sign Out</Btn>
          </div>:<Btn small onClick={()=>setAuthOpen(true)}>Sign In</Btn>}
          <a href="index.html" style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:C.textD,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 10px"}}>Back</a>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>handleTabClick(t.v)} style={{fontFamily:"'Cinzel',serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",padding:"0.65rem 1rem",background:"transparent",border:"none",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0,borderBottom:`2px solid ${tab===t.v?C.accent:"transparent"}`,color:tab===t.v?C.accent:C.textD}}>{t.l}{t.v==="panel"&&pendingVisas>0&&canPanel&&<span style={{marginLeft:4,background:C.redD,color:"#fff",fontSize:9,padding:"1px 5px",borderRadius:8}}>{pendingVisas}</span>}</button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"1.75rem 1.25rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem",color:C.textDD}}><div className="mono" style={{fontSize:10,letterSpacing:"0.3em",animation:"pulse 1.5s infinite"}}>Loading...</div></div>}
      {authOpen&&<SignIn onClose={()=>setAuthOpen(false)} onAuth={(u,r)=>{setUser(u);setRaw(prev=>({...prev,...r}));setAuthOpen(false);notify("Signed in as "+(u.displayName||u.username)+".",C.gold);}}/>}
      {loaded&&tab==="advisories"&&<AdvisoriesTab countries={countries} advisories={advisories}/>}
      {loaded&&tab==="citizenship"&&<CitizenshipTab citizens={citizens} user={user} myCitizenship={myCitizenship} onRequireSignIn={()=>setAuthOpen(true)} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&tab==="visa"&&<VisaTab countries={countries} onSubmitVisa={data=>onAction("submitVisa",data)} notify={notify} visas={visas} user={user} myCitizenship={myCitizenship}/>}
      {loaded&&tab==="passports"&&<PassportsTab passports={passports} visas={visas}/>}
      {loaded&&tab==="policy"&&<PolicyTab countries={countries} advisories={advisories} restrictions={restrictions}/>}
      {loaded&&tab==="restrictions"&&<RestrictionsTab restrictions={restrictions}/>}
      {loaded&&tab==="panel"&&canPanel&&<PanelContent user={user} countries={countries} advisories={advisories} restrictions={restrictions} visas={visas} citizens={citizens} passports={passports} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&tab==="panel"&&!canPanel&&<div style={{textAlign:"center",padding:"3rem",color:C.textDD}}>
        <div style={{fontStyle:"italic",marginBottom:"1rem"}}>{user?"Your account does not have Foreign Affairs panel access.":"Sign in with your Imperial Intranet account to access the Ministry panel."}</div>
        {!user&&<Btn onClick={()=>setAuthOpen(true)}>Sign In</Btn>}
      </div>}
    </div>
    <div style={{borderTop:`1px solid ${C.border}`,padding:"0.75rem 1.25rem",marginTop:"3rem"}}><div className="mono" style={{maxWidth:1100,margin:"0 auto",fontSize:9,color:C.textDD,letterSpacing:"0.15em",textAlign:"center"}}>Ministry of Foreign Affairs - Empire of Lech</div></div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
