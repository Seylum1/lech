<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1930;color:#e8ebf2;font-family:'Crimson Text',Georgia,serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0b1930;}::-webkit-scrollbar-thumb{background:#24406e;border-radius:2px;}
input,select,textarea{font-family:'Crimson Text',Georgia,serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.fadeIn{animation:fadeIn .3s ease both;}

/* ── PASSPORT VIEWER ─────────────────────────────────────────────────────── */
.sp-overlay{position:fixed;inset:0;z-index:9990;background:rgba(4,8,18,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .25s ease;}
.sp-stage{--ppw:300px;--pph:420px;perspective:2200px;position:relative;width:calc(var(--ppw)*2);height:var(--pph);transition:transform .8s cubic-bezier(.45,.05,.2,1);}
@media(max-width:700px){.sp-stage{--ppw:220px;--pph:308px;}}
.sp-stage.closed{transform:translateX(calc(var(--ppw)/-2));}
.sp-stage.closed-end{transform:translateX(calc(var(--ppw)/2));}
.sp-sheet{position:absolute;top:0;right:0;width:var(--ppw);height:var(--pph);transform-origin:left center;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.45,.05,.2,1);cursor:pointer;}
.sp-sheet.flipped{transform:rotateY(-180deg);}
.sp-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;border-radius:5px 14px 14px 5px;box-shadow:0 16px 44px rgba(0,0,0,.5);}
.sp-face.back{transform:rotateY(180deg);border-radius:14px 5px 5px 14px;}
.sp-paper{background:
  radial-gradient(ellipse 120% 90% at 50% -20%, rgba(80,110,160,.06), transparent 60%),
  radial-gradient(ellipse 120% 90% at 50% 120%, rgba(120,100,60,.06), transparent 60%),
  repeating-radial-gradient(circle at 50% 50%, transparent 0px, transparent 9px, rgba(90,80,120,.03) 10px),
  linear-gradient(160deg,#f2ecdc 0%,#e9e1cd 55%,#ded3b8 100%);
  box-shadow:inset 0 0 34px rgba(90,70,40,.2);}
.sp-frame{position:absolute;inset:10px;border:2px solid rgba(160,130,70,.8);border-radius:8px;pointer-events:none;}
.sp-frame::after{content:'';position:absolute;inset:4px;border:1px solid rgba(160,130,70,.5);border-radius:5px;}
@keyframes spStamp{0%{opacity:0;transform:rotate(-13deg) scale(1.6);}60%{opacity:1;transform:rotate(-13deg) scale(.94);}100%{opacity:1;transform:rotate(-13deg) scale(1);}}
.sp-revoked{animation:spStamp .5s ease .45s both;}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════════════ */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxLu8jQehAZJEvMEeCLoHc9S2C4FM8o9fQh8Pp4gMzDNwwIG0S9qLJ5-1gyGM1c_InUfQ/exec";

const VISA_TYPES=[{v:"tourist",l:"Tourist / B-2"},{v:"business",l:"Business / B-1"},{v:"student",l:"Student / F-1"},{v:"work",l:"Work / H-1"},{v:"diplomatic",l:"Diplomatic / A"},{v:"transit",l:"Transit / C"},{v:"residence",l:"Permanent Residence"},{v:"other",l:"Other"}];
const VISA_STATUSES=[{v:"pending",l:"Under Review",color:V.goldL},{v:"approved",l:"Approved",color:V.greenL},{v:"rejected",l:"Denied",color:V.red},{v:"additional",l:"Additional Info Req.",color:"#e08a3a"},{v:"withdrawn",l:"Withdrawn",color:"#8a93a8"}];
const CITIZENSHIP_STATUSES=[{v:"citizen",l:"Citizen",color:V.greenL},{v:"naturalised",l:"Naturalized",color:"#5aae7a"},{v:"resident",l:"Permanent Resident",color:"#6fa8ff"},{v:"alien",l:"Registered Alien",color:"#9a7ab0"},{v:"revoked",l:"Revoked",color:V.red},{v:"renounced",l:"Renounced",color:"#8a93a8"}];
const RESTRICTION_TYPES=[{v:"travel_ban",l:"Travel Ban"},{v:"entry_denied",l:"Entry Denied"},{v:"persona_non_grata",l:"Persona Non Grata"},{v:"watch_list",l:"Watch List"},{v:"asset_freeze",l:"Asset Freeze"}];

const PASSPORT_TYPES=[
  {v:"regular",   l:"Regular Passport",   short:"REGULAR",    code:"P",  cover:"#16234a", coverDeep:"#0b142e", trim:"#c9a05a",
    eligibility:"Issuable to any citizen or national of the Republic of Vindex Nation for ordinary international travel."},
  {v:"official",  l:"Official Passport",  short:"OFFICIAL",   code:"PS", cover:"#7a323e", coverDeep:"#521f28", trim:"#e0bd78",
    restricted:true,
    eligibility:"Issuable to citizen-employees of Vindex Nation assigned to duties overseas, permanently or temporarily; to Members of Congress who travel abroad on official business; and to V.N. military personnel when deployed overseas."},
  {v:"diplomatic",l:"Diplomatic Passport",short:"DIPLOMATIC", code:"PD", cover:"#9a1620", coverDeep:"#5e0d13", trim:"#e6c680",
    restricted:true,
    eligibility:"Issuable to Vinish diplomats accredited overseas; to citizens resident in Vindex who travel abroad for diplomatic work; and to the President, President-Elect, Vice President, Vice-President-Elect, former Presidents and Vice Presidents, the Chief Justice, Justices of the Supreme Court, current Cabinet members, and the Attorney General."},
  {v:"service",   l:"Service Passport",   short:"SERVICE",    code:"PT", cover:"#40454e", coverDeep:"#262a31", trim:"#c8ccd4",
    restricted:true,
    eligibility:"Issuable to certain non-personal-services contractors who travel abroad in support of, and pursuant to, a contract with the Government of Vindex Nation."},
];
const ppType=v=>PASSPORT_TYPES.find(t=>t.v===v)||PASSPORT_TYPES[0];

/* ── backend ─────────────────────────────────────────────────────────────── */
async function sha256(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,8);}
// ── MongoDB backend (Render API) ───────────────────────────────────────────────
const API="https://lech-backend.onrender.com";
let AUTH_TOKEN=null;
// ── Shared sign-in across the Imperial Network ─────────────────────────────────
// One session token, kept in localStorage under a single key, so signing in on
// any page keeps you signed in on the others (same origin). It is re-validated
// against the server on every page load and dropped at once if the server
// rejects it; signing out clears it everywhere.
const SESSION_KEY="lech_session";
function saveSession(t){try{if(t)localStorage.setItem(SESSION_KEY,t);}catch(e){}}
// Drop the stored token locally. Never talks to the server, so a network hiccup
// can never destroy a session that is still perfectly good.
function clearSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}AUTH_TOKEN=null;}
// A deliberate sign-out: end the session on the server too. Only ever called
// from a real "Sign Out" control — never from a failed restore.
function forgetSession(){const t=AUTH_TOKEN;clearSession();try{if(t)fetch(API+"/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:t})});}catch(e){}}
async function srestore(){
  let t=null;try{t=localStorage.getItem(SESSION_KEY);}catch(e){}
  if(!t)return null;AUTH_TOKEN=t;
  try{
    // Plain query token, exactly like every other call on this page, so this is a
    // simple request with no CORS preflight.
    const r=await fetch(API+"/api/me?token="+encodeURIComponent(t));
    const d=await r.json();
    if(d&&d.ok&&d.account)return d.account;
    clearSession();return null;      // the server rejected it — genuinely stale
  }catch(e){ return null; }          // offline/blocked — keep the token, retry next page
}
async function sgetAll(){try{const r=await fetch(API+"/api/data"+(AUTH_TOKEN?"?token="+encodeURIComponent(AUTH_TOKEN):""));const d=await r.json();return (d&&d.ok)?(d.data||{}):{};}catch{return{};}}
async function sset(k,v){try{const r=await fetch(API+"/api/set",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k,value:v})});const d=await r.json();return !!(d&&d.ok);}catch{return false;}}
async function sdel(k){try{await fetch(API+"/api/unset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:AUTH_TOKEN,key:k})});}catch{}}
async function slogin(username,password){try{const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:String(username||"").trim(),password})});const d=await r.json();if(d&&d.ok){AUTH_TOKEN=d.token;saveSession(d.token);return {ok:true,account:d.account};}return {ok:false,error:(d&&d.error)||"ACCESS DENIED"};}catch(e){return {ok:false,error:"Connection error"};}}
function fmtDate(d){if(d===undefined||d===null||d==="")return "—";const s=(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(d))?d+"T12:00:00":d;const t=typeof s==="number"?s:new Date(s).getTime();if(isNaN(t))return ""+d;return new Date(t).toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"});}

const getAL=l=>ADVISORY_LEVELS.find(a=>a.level===l)||ADVISORY_LEVELS[0];
const getRT=v=>RELATION_TYPES.find(r=>r.v===v)||RELATION_TYPES[2];
function getAdvisory(country){
  if(country&&country.advisoryLevel!==undefined)return{level:country.advisoryLevel,text:country.advisoryText||"",updatedAt:country.advisoryUpdatedAt};
  return{level:1,text:""};
}
function visaValidity(v){
  if(!v||v.status!=="approved")return null;
  if(v.permanent||v.validUntil==="permanent")return{label:"Permanent",color:V.greenL,state:"permanent"};
  if(!v.validUntil)return{label:"No expiry set",color:"#7a9ab0",state:"open"};
  const end=new Date(v.validUntil+"T23:59:59").getTime();
  if(isNaN(end))return{label:"Valid",color:V.greenL,state:"valid"};
  const days=Math.ceil((end-Date.now())/86400000);
  if(days<0)return{label:"Expired",color:V.red,state:"expired"};
  if(days<=14)return{label:"Expires in "+days+" day"+(days!==1?"s":""),color:"#e08a3a",state:"soon"};
  return{label:"Valid",color:V.greenL,state:"valid"};
}
function passportValidity(p){
  if(!p)return null;
  if(p.status==="revoked")return{label:"Revoked",color:V.red,state:"revoked"};
  if(!p.expires)return{label:"Valid",color:V.greenL,state:"valid"};
  const end=new Date(p.expires+"T23:59:59").getTime();
  if(isNaN(end))return{label:"Valid",color:V.greenL,state:"valid"};
  const days=Math.ceil((end-Date.now())/86400000);
  if(days<0)return{label:"Expired",color:V.red,state:"expired"};
  if(days<=90)return{label:"Expires in "+days+" day"+(days!==1?"s":""),color:"#e08a3a",state:"soon"};
  return{label:"Valid",color:V.greenL,state:"valid"};
}
function mrzClean(s){return (s||"").toUpperCase().replace(/[^A-Z0-9 ]/g,"").trim().replace(/ +/g,"<");}
function mrzPad(s,n){return (s+"<".repeat(n)).slice(0,n);}
function mrzDate(d){if(!d)return "<<<<<<";const t=new Date(d);if(isNaN(t.getTime()))return "<<<<<<";const p=x=>String(x).padStart(2,"0");return String(t.getFullYear()).slice(2)+p(t.getMonth()+1)+p(t.getDate());}
function ppMRZ(p){
  const t=ppType(p.type);
  const l1=mrzPad(t.code.replace("<","")+"<"+"VDX"+mrzClean(p.name)+"<<"+mrzClean(p.username||""),44);
  const l2=mrzPad(mrzPad(mrzClean(p.number),9)+"6VDX"+mrzDate(p.issued)+"3<"+mrzDate(p.expires)+"1",44);
  return[l1.slice(0,44),l2.slice(0,44)];
}
function genPassportNo(passports){
  const existing=new Set(Object.values(passports||{}).map(p=>p.number));
  let n,tries=0;do{n="V"+String(Math.floor(10000000+Math.random()*90000000));tries++;}while(existing.has(n)&&tries<60);return n;
}

/* ── SEED DATA (shown when the store is empty — real records replace it) ──── */
const SEED_COUNTRIES={
  s_lech:{id:"s_lech",name:"Empire of Lech",entityType:"state",relation:"full",visaPolicy:"Visa on arrival for Vindex nationals",visaOnArrival:true,policyStatement:"The Republic maintains full and cordial diplomatic relations with the Empire of Lech, its principal trading partner.",advisoryLevel:1,advisoryText:"Vindex citizens may travel freely. Exercise normal precautions.",advisoryUpdatedAt:Date.now()-86400000*6},
  s_arden:{id:"s_arden",name:"Kingdom of Wilden",entityType:"state",relation:"limited",visaPolicy:"eVisa required in advance",visaOnArrival:false,policyStatement:"Limited relations pending a bilateral treaty of friendship.",advisoryLevel:2,advisoryText:"Exercise increased caution due to periodic civil unrest in border provinces.",advisoryUpdatedAt:Date.now()-86400000*3},

};
const SEED_PASSPORTS={
  p_seed1:{id:"p_seed1",number:"V40218837",name:"Jonathan A. Vance",username:"jvance",type:"diplomatic",issued:"2026-01-12",expires:"2036-01-12",placeOfIssue:"the Federal Capital",status:"active",issuedAt:Date.now()-86400000*40},
  p_seed2:{id:"p_seed2",number:"V71559024",name:"Eleanor M. Cross",username:"ecross",type:"regular",issued:"2025-09-03",expires:"2035-09-03",placeOfIssue:"the Federal Capital",status:"active",issuedAt:Date.now()-86400000*120},

  p_seed4:{id:"p_seed4",number:"V10883745",name:"Priya R. Anand",username:"panand",type:"regular",issued:"2021-06-01",expires:"2026-06-01",placeOfIssue:"the Federal Capital",status:"active",issuedAt:Date.now()-86400000*1200},

const SEED_VISAS={
  v_seed1:{id:"v_seed1",ref:"VDX-2026-004821",name:"Aldric Thorne",username:"athorne",nationality:"Empire of Lech",type:"business",purpose:"Trade delegation to Port Meridian.",status:"approved",submitted:Date.now()-86400000*20,issuedAt:Date.now()-86400000*15,validUntil:"2027-01-01"},
};

/* ── permissions (Vindex roles; admin inherits president) ────────────────── */
const canPanel=u=>u&&(u.role==="president"||u.role==="admin");

/* ── UI atoms ────────────────────────────────────────────────────────────── */
function Btn({children,onClick,variant="primary",disabled,small,style:ex={}}){
  const base={fontFamily:"'Playfair Display',serif",fontWeight:700,letterSpacing:"0.06em",fontSize:small?12:13,
    padding:small?"5px 14px":"8px 20px",border:"1px solid",borderRadius:3,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.45:1,transition:"all .15s"};
  const variants={
    primary:{background:`linear-gradient(180deg,${V.panel2},${V.navy})`,borderColor:V.lineL,color:V.text},
    gold:{background:"linear-gradient(180deg,#3d2f14,#57431f)",borderColor:"#7a6231",color:V.goldL},
    green:{background:"linear-gradient(180deg,#1c4a24,#2e6b38)",borderColor:"#3f8a4c",color:"#d8f0d0"},
    danger:{background:"transparent",borderColor:V.redD,color:V.redL},
    armed:{background:`linear-gradient(180deg,${V.redD},${V.red})`,borderColor:V.redD,color:"#f0d0d0"},
    ghost:{background:"transparent",borderColor:V.line,color:V.textD},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...(variants[variant]||variants.primary),...ex}}>{children}</button>;
}
function ArmBtn({label,confirmLabel,onConfirm,small}){
  const [a,setA]=useState(false);
  useEffect(()=>{if(!a)return;const t=setTimeout(()=>setA(false),4000);return()=>clearTimeout(t);},[a]);
  return a?<Btn variant="armed" small={small} onClick={()=>{setA(false);onConfirm();}}>{confirmLabel||"Confirm?"}</Btn>
    :<Btn variant="danger" small={small} onClick={()=>setA(true)}>{label}</Btn>;
}
function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",...ex}}
    onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;
}
function TA({value,onChange,placeholder,rows=4}){
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.7}}
    onFocus={e=>e.target.style.borderColor=V.gold} onBlur={e=>e.target.style.borderColor=V.line}/>;
}
function Sel({value,onChange,options,style:ex={}}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"8px 12px",color:V.text,fontSize:14,outline:"none",fontFamily:"'Crimson Text',serif",...ex}}>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function CheckBox({checked,onChange,label}){
  return <div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}}>
    <span style={{width:15,height:15,borderRadius:2,border:`2px solid ${checked?V.gold:V.line}`,background:checked?"#3d2f14":"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:V.goldL}}>{checked?"✓":""}</span>
    <span style={{fontSize:13,color:checked?V.text:V.textD}}>{label}</span>
  </div>;
}
function FL({children}){return <div className="mono" style={{fontSize:9,color:V.textD,letterSpacing:"0.18em",marginBottom:4,textTransform:"uppercase"}}>{children}</div>;}
function STitle({children,color}){return <div style={{display:"flex",alignItems:"center",gap:12,margin:"1.7rem 0 1rem"}}>
  <span className="pf" style={{fontWeight:700,fontSize:13,letterSpacing:"0.26em",textTransform:"uppercase",color:color||V.gold}}>{children}</span>
  <span style={{flex:1,height:1,background:`linear-gradient(90deg,${V.line},transparent)`}}/></div>;}
function Toast({msg,color}){if(!msg)return null;return <div style={{position:"fixed",top:14,right:14,zIndex:9999,background:V.panel,border:`1px solid ${color}66`,borderLeft:`3px solid ${color}`,padding:"9px 16px",borderRadius:3,fontFamily:"'Playfair Display',serif",fontSize:12,color,maxWidth:380,animation:"fadeIn .2s ease"}}>{msg}</div>;}
function Overlay({label}){if(!label)return null;return <div style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(6,12,26,.96)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div className="mono" style={{color:V.gold,fontSize:10,letterSpacing:"0.35em",marginBottom:8,animation:"pulse 1s infinite"}}>PROCESSING</div><div className="pf" style={{fontSize:17,color:V.text}}>{label}</div></div></div>;}
function Seal({file,size=64,style:ex={}}){
  const [ok,setOk]=useState(true);
  if(!ok)return <div style={{width:size,height:size,borderRadius:"50%",border:`2px solid ${V.gold}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,...ex}}><span className="pf" style={{fontWeight:900,fontSize:size*0.3,color:V.gold}}>VN</span></div>;
  return <img src={"vindex/"+file} alt="" draggable={false} onError={()=>setOk(false)} style={{width:size,height:size,objectFit:"contain",flexShrink:0,...ex}}/>;
}
function PoweredBy(){
  const [ok,setOk]=useState(true);
  return <div style={{display:"inline-flex",alignItems:"center",gap:9}}>
    <span className="mono" style={{fontSize:8,letterSpacing:"0.22em",color:V.textDD,textTransform:"uppercase"}}>Powered by</span>
    {ok?<img src="vindex/saudkruger.png" alt="Saud Kruger Information Systems" draggable={false} onError={()=>setOk(false)} style={{height:30,width:"auto",objectFit:"contain",borderRadius:4,opacity:.95}}/>

function RelBadge({relation}){const rt=getRT(relation);return <span className="mono" style={{fontSize:9,padding:"2px 8px",background:V.bg,border:`1px solid ${rt.color}55`,color:rt.color,borderRadius:2}}>{rt.badge}</span>;}
function AdvBadge({level}){const al=getAL(level||1);return <span className="mono" style={{fontSize:9,padding:"2px 8px",background:al.bg,border:`1px solid ${al.border}`,color:al.color,borderRadius:2}}>{al.code} — {al.label}</span>;}
function VisaValidBadge({visa}){const vv=visaValidity(visa);if(!vv)return null;return <span className="mono" style={{fontSize:9,padding:"2px 8px",borderRadius:2,background:vv.color+"18",border:`1px solid ${vv.color}55`,color:vv.color}}>{vv.label.toUpperCase()}</span>;}
function PassValidBadge({passport}){const pv=passportValidity(passport);if(!pv)return null;return <span className="mono" style={{fontSize:9,padding:"2px 8px",borderRadius:2,background:pv.color+"18",border:`1px solid ${pv.color}55`,color:pv.color}}>{pv.label.toUpperCase()}</span>;}

/* Clean single-line visa requirement */
function VisaInfo({country}){
  const hasReq=country.visaOnArrival!==undefined;
  if(!hasReq&&!country.visaPolicy)return null;
  const req=country.visaOnArrival===false?"Visa Required in Advance":"Visa on Arrival";
  const col=country.visaOnArrival===false?"#e08a3a":V.greenL;
  return <div style={{marginTop:"0.75rem",background:V.bg2,border:`1px solid ${V.line}`,borderRadius:3,padding:"7px 12px"}}>
    {hasReq&&<div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
      <span className="mono" style={{fontSize:9,color:V.textDD,letterSpacing:"0.08em"}}>ENTRY FOR VINDEX NATIONALS</span>
      <span className="pf" style={{fontSize:13,color:col}}>{req}</span></div>}
    {country.visaPolicy&&<div style={{fontSize:13,color:V.textD,fontStyle:"italic",lineHeight:1.6,marginTop:hasReq?4:0}}>{country.visaPolicy}</div>}
  </div>;
}

              <div style={{flex:1,minWidth:0,lineHeight:1.25}}>

/* ── FOREIGN POLICY ──────────────────────────────────────────────────────── */
function PolicyTab({countries,restrictions}){
  const [selected,setSelected]=useState(null);
  const list=Object.values(countries||{}).sort((a,b)=>{const o={full:0,limited:1,none:2,hostile:3};return(o[a.relation]||2)-(o[b.relation]||2)||(a.name||"").localeCompare(b.name||"");});
  const sel=selected?countries[selected]:null;
  return <div className="fadeIn">
    <STitle>Foreign Policy</STitle>
    <div style={{fontSize:14,color:V.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.2rem"}}>The official foreign policy of the Republic of Vindex Nation, as set by the Department of State.</div>
    {list.length===0?<div style={{textAlign:"center",padding:"3rem",color:V.textDD,fontStyle:"italic"}}>No foreign policy records published.</div>
    :<div style={{display:"flex",gap:"1.3rem",flexWrap:"wrap"}}>
      <div style={{flex:"0 0 220px",minWidth:180}}>
        {list.map(c=>{const rt=getRT(c.relation);return <div key={c.id} onClick={()=>setSelected(selected===c.id?null:c.id)} style={{background:selected===c.id?V.panel2:V.panel,border:`1px solid ${selected===c.id?rt.color:V.line}`,borderLeft:`4px solid ${rt.color}`,borderRadius:"0 3px 3px 0",padding:"0.6rem 0.85rem",marginBottom:4,cursor:"pointer"}}>
          <div className="pf" style={{fontWeight:700,fontSize:13,color:V.text,marginBottom:2}}>{c.name}</div><span className="mono" style={{fontSize:8,color:rt.color}}>{rt.badge}</span></div>;})}
      </div>
      <div style={{flex:1,minWidth:280}}>
        {!sel?<div style={{textAlign:"center",padding:"3rem",color:V.textDD,fontStyle:"italic",border:`1px dashed ${V.line}`,borderRadius:4}}>Select a nation to view the Republic's policy.</div>
        :<CountryDetail country={sel} restrictions={restrictions}/>}
      </div>
    </div>}
  </div>;
}
function CountryDetail({country,restrictions}){
  const rt=getRT(country.relation);const adv=getAdvisory(country);const al=getAL(adv.level||1);
  const cr=Object.values(restrictions||{}).filter(r=>r.country===country.id||r.countryName===country.name);
  return <div>
    <div style={{background:V.panel,border:`1px solid ${rt.color}44`,borderTop:`3px solid ${rt.color}`,borderRadius:"0 0 4px 4px",padding:"1.2rem",marginBottom:"1rem"}}>
      <div className="pf" style={{fontWeight:700,fontSize:18,color:V.text,marginBottom:6}}>{country.name}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"0.85rem"}}><RelBadge relation={country.relation}/><AdvBadge level={adv.level||1}/>{country.entityType&&<span className="mono" style={{fontSize:9,color:V.textDD,padding:"2px 8px",background:V.bg2,border:`1px solid ${V.line}`}}>{(ENTITY_TYPES.find(e=>e.v===country.entityType)||{l:""}).l}</span>}</div>
      {country.policyStatement&&<div style={{fontSize:14,color:V.text,lineHeight:1.8,marginBottom:"0.5rem"}}>{country.policyStatement}</div>}
      <div style={{borderTop:`1px solid ${V.line}`,paddingTop:"0.25rem"}}><VisaInfo country={country}/></div>
    </div>
    {adv.text&&<div style={{background:al.bg,border:`1px solid ${al.border}`,borderLeft:`3px solid ${al.color}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem",marginBottom:"1rem"}}><div className="mono" style={{fontSize:9,color:al.color,marginBottom:4}}>TRAVEL ADVISORY</div><div style={{fontSize:14,color:V.text,lineHeight:1.7}}>{adv.text}</div></div>}
    {cr.length>0&&<div style={{background:V.panel,border:`1px solid ${V.redD}44`,borderLeft:`3px solid ${V.red}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1rem"}}><div className="mono" style={{fontSize:9,color:V.redL,marginBottom:6}}>INDIVIDUAL RESTRICTIONS ({cr.length})</div>{cr.map((r,i)=><div key={i} style={{fontSize:13,color:V.text,padding:"4px 0",borderBottom:i<cr.length-1?`1px solid ${V.line}`:"none"}}>{r.name} — <span style={{color:V.redL,fontSize:12}}>{(RESTRICTION_TYPES.find(t=>t.v===r.type)||{l:r.type}).l}</span></div>)}</div>}
  </div>;
}

/* ── CITIZENSHIP ─────────────────────────────────────────────────────────── */
function CitizenshipTab({citizens,user,myCitizenship,onRequireSignIn,onAction,notify,setProcessing}){
  const [search,setSearch]=useState("");const [filter,setFilter]=useState("all");
  const all=Object.values(citizens||{});
  const uname=user?user.username.toLowerCase():"";
  const myPending=user?all.find(c=>c.claimStatus==="pending"&&(c.claimedBy||"").toLowerCase()===uname):null;
  const list=all.filter(c=>{const q=search.toLowerCase();return(!q||(c.name||"").toLowerCase().includes(q)||(c.username||"").toLowerCase().includes(q))&&(filter==="all"||c.status===filter);}).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const claim=async(c)=>{setProcessing("Submitting claim…");await onAction("updateCitizen",{id:c.id,claimedBy:user.username,claimStatus:"pending"});setProcessing(null);notify("Claim submitted for review.",V.goldL);};
  return <div className="fadeIn">
    <STitle>Citizenship &amp; Nationality</STitle>
    <div style={{fontSize:14,color:V.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.1rem"}}>Official register of the citizens and nationals of the Republic of Vindex Nation, maintained by the Department of State.</div>
    {!user&&<div style={{background:V.panel,border:`1px solid ${V.line}`,borderRadius:4,padding:"0.85rem 1.1rem",marginBottom:"1.1rem",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <span style={{fontSize:13,color:V.textD,fontStyle:"italic",flex:1}}>Sign in to view your own status, or to claim an existing record.</span><Btn small variant="gold" onClick={onRequireSignIn}>Sign In</Btn></div>}
    {user&&myCitizenship&&<div style={{background:"#0e2418",border:"1px solid #1e5230",borderLeft:`3px solid ${V.greenL}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.1rem"}}>
      <div className="mono" style={{fontSize:9,color:V.greenL,letterSpacing:"0.1em",marginBottom:3}}>YOUR RECORD</div>
      <span className="pf" style={{fontWeight:700,fontSize:15,color:V.text}}>{myCitizenship.name}</span>
      <span style={{fontSize:13,color:V.textD,marginLeft:10}}>{(CITIZENSHIP_STATUSES.find(s=>s.v===myCitizenship.status)||{l:myCitizenship.status}).l}{myCitizenship.since?" · since "+myCitizenship.since:""}</span></div>}
    {user&&!myCitizenship&&myPending&&<div style={{background:"#241c08",border:`1px solid ${V.gold}44`,borderLeft:`3px solid ${V.gold}`,borderRadius:"0 3px 3px 0",padding:"0.85rem 1.1rem",marginBottom:"1.1rem"}}>
      <div className="mono" style={{fontSize:9,color:V.goldL,letterSpacing:"0.1em",marginBottom:3}}>CLAIM PENDING</div><span style={{fontSize:13,color:V.textD}}>Your claim on <span style={{color:V.text}} className="pf">{myPending.name}</span> is awaiting Department confirmation.</span></div>}
    {user&&!myCitizenship&&!myPending&&<div style={{background:V.panel,border:`1px solid ${V.line}`,borderRadius:4,padding:"0.85rem 1.1rem",marginBottom:"1.1rem",fontSize:13,color:V.textD,fontStyle:"italic"}}>No record is linked to your account. If you are a citizen, find your record below and select <span style={{color:V.goldL,fontStyle:"normal"}}>This is me</span> to claim it.</div>}
    <div style={{display:"flex",gap:"0.75rem",marginBottom:"1.1rem",flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:180}}><Inp value={search} onChange={setSearch} placeholder="Search name or account…"/></div>
      <div style={{flex:1,minWidth:160}}><Sel value={filter} onChange={setFilter} options={[{v:"all",l:"All Status"},...CITIZENSHIP_STATUSES.map(s=>({v:s.v,l:s.l}))]}/></div>
    </div>
    {list.length===0?<div style={{textAlign:"center",padding:"2rem",color:V.textDD,fontStyle:"italic"}}>No records found.</div>
    :<div style={{display:"flex",flexDirection:"column",gap:4}}>
      {list.map(c=>{const st=CITIZENSHIP_STATUSES.find(s=>s.v===c.status)||CITIZENSHIP_STATUSES[0];
        const isMine=user&&(c.username||"").toLowerCase()===uname;
        const claimable=user&&!myCitizenship&&!myPending&&!c.username&&c.claimStatus!=="pending";
        const pendingByMe=user&&c.claimStatus==="pending"&&(c.claimedBy||"").toLowerCase()===uname;
        return <div key={c.id} style={{background:isMine?"#0e2016":V.panel,border:`1px solid ${isMine?"#1e5230":V.line}`,borderLeft:`4px solid ${st.color}`,borderRadius:"0 3px 3px 0",padding:"0.65rem 1.1rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span className="mono" style={{fontSize:9,padding:"2px 8px",background:V.bg2,border:`1px solid ${st.color}44`,color:st.color}}>{st.l.toUpperCase()}</span>
          <span className="pf" style={{fontWeight:700,fontSize:14,color:V.text,flex:1}}>{c.name}{isMine&&<span className="mono" style={{fontSize:8,color:V.greenL,marginLeft:8,border:"1px solid #2a5a2a",borderRadius:2,padding:"1px 6px"}}>YOU</span>}</span>
          {c.username&&<span className="mono" style={{fontSize:10,color:V.textD}}>{c.username}</span>}
          {c.nationality&&<span style={{fontSize:12,color:V.textDD,fontStyle:"italic"}}>{c.nationality}</span>}
          {c.since&&<span className="mono" style={{fontSize:9,color:V.textDD}}>Since {c.since}</span>}
          {claimable&&<Btn small variant="ghost" onClick={()=>claim(c)}>This is me</Btn>}
          {pendingByMe&&<span className="mono" style={{fontSize:8,color:V.goldL,border:`1px solid ${V.gold}44`,borderRadius:2,padding:"1px 6px"}}>CLAIM PENDING</span>}
        </div>;})}
    </div>}
  </div>;
}

/* ── VISAS ───────────────────────────────────────────────────────────────── */
function VisaTab({countries,visas,user,myCitizenship,onAction,notify}){
  const [sub,setSub]=useState("apply");const [trackRef,setTrackRef]=useState("");const [tracked,setTracked]=useState(null);
  const doTrack=()=>{const ref=trackRef.trim().toUpperCase();if(!ref)return;setTracked(Object.values(visas||{}).find(v=>(v.ref||"").toUpperCase()===ref)||"notfound");};
  const st=tracked&&tracked!=="notfound"?(VISA_STATUSES.find(s=>s.v===tracked.status)||VISA_STATUSES[0]):null;
  const vt=tracked&&tracked!=="notfound"?(VISA_TYPES.find(t=>t.v===tracked.type)||VISA_TYPES[0]):null;
  return <div className="fadeIn">
    <STitle>Visa Services</STitle>
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${V.line}`,marginBottom:"1.3rem"}}>
      {[["apply","Apply for a Visa"],["track","Track Application"],["issued","Issued Visas"]].map(([v,l])=><button key={v} onClick={()=>setSub(v)} className="pf" style={{fontWeight:700,fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",padding:"0.6rem 1.1rem",background:"transparent",border:"none",cursor:"pointer",borderBottom:`2px solid ${sub===v?V.gold:"transparent"}`,color:sub===v?V.goldL:V.textD}}>{l}</button>)}
    </div>
    {sub==="apply"&&<VisaForm countries={countries} onSubmit={d=>onAction("submitVisa",d)} notify={notify} user={user} myCitizenship={myCitizenship}/>}
    {sub==="issued"&&<IssuedVisas visas={visas}/>}
    {sub==="track"&&<div>
      <div style={{fontSize:14,color:V.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.1rem"}}>Enter your application reference number to check your status.</div>
      <div style={{display:"flex",gap:8,maxWidth:420,marginBottom:"1rem"}}><Inp value={trackRef} onChange={setTrackRef} placeholder="e.g. VDX-2026-001234" style={{flex:1}}/><Btn onClick={doTrack}>Check</Btn></div>
      {tracked==="notfound"&&<div style={{background:V.panel,border:`1px solid ${V.redD}44`,borderLeft:`3px solid ${V.redD}`,borderRadius:"0 3px 3px 0",padding:"1rem",maxWidth:480}}><div className="pf" style={{fontWeight:700,fontSize:13,color:V.redL,marginBottom:4}}>Reference Not Found</div><div style={{fontSize:13,color:V.textD,fontStyle:"italic"}}>No application found. Check the reference and try again.</div></div>}
      {tracked&&tracked!=="notfound"&&st&&vt&&<div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${st.color}`,borderRadius:"0 3px 3px 0",padding:"1.25rem",maxWidth:480}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.85rem",flexWrap:"wrap",gap:8}}>
          <div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:3}}>REFERENCE</div><div className="pf" style={{fontWeight:700,fontSize:14,color:V.text}}>{tracked.ref}</div></div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}><span className="mono" style={{fontSize:10,padding:"3px 10px",background:V.bg2,border:`1px solid ${st.color}44`,color:st.color}}>{st.l.toUpperCase()}</span><VisaValidBadge visa={tracked}/></div>
        </div>
        <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap",marginBottom:"0.75rem"}}>
          <div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2}}>APPLICANT</div><span style={{fontSize:13,color:V.text}}>{tracked.name}</span></div>
          <div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2}}>TYPE</div><span style={{fontSize:13,color:V.text}}>{vt.l}</span></div>
          <div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2}}>SUBMITTED</div><span style={{fontSize:13,color:V.text}}>{fmtDate(tracked.submitted)}</span></div>
          {tracked.status==="approved"&&tracked.issuedAt&&<div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2}}>ISSUED</div><span style={{fontSize:13,color:V.text}}>{fmtDate(tracked.issuedAt)}</span></div>}
          {tracked.status==="approved"&&<div><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2}}>VALID UNTIL</div><span style={{fontSize:13,color:V.text}}>{tracked.permanent||tracked.validUntil==="permanent"?"Permanent":(tracked.validUntil?fmtDate(tracked.validUntil):"—")}</span></div>}
        </div>
        {tracked.reviewNote&&<div style={{background:V.bg2,border:`1px solid ${V.line}`,borderLeft:`3px solid ${st.color}`,borderRadius:"0 2px 2px 0",padding:"0.6rem 0.85rem",fontSize:13,color:V.text,fontStyle:"italic"}}><div className="mono" style={{fontSize:9,color:V.textDD,marginBottom:2,fontStyle:"normal"}}>NOTE FROM THE DEPARTMENT</div>{tracked.reviewNote}</div>}
      </div>}
    </div>}
  </div>;
}
function IssuedVisas({visas}){
  const [search,setSearch]=useState("");const [showExpired,setShowExpired]=useState(false);
  const all=Object.values(visas||{}).filter(v=>v.status==="approved");
  const activeCount=all.filter(v=>(visaValidity(v)||{}).state!=="expired").length;
  const rank=v=>(visaValidity(v)||{}).state==="expired"?2:1;
  const list=all.filter(v=>{const q=search.toLowerCase();const mQ=!q||(v.name||"").toLowerCase().includes(q)||(v.nationality||"").toLowerCase().includes(q);return mQ&&(showExpired||(visaValidity(v)||{}).state!=="expired");}).sort((a,b)=>rank(a)-rank(b)||(a.name||"").localeCompare(b.name||""));
  return <div>
    <div style={{fontSize:14,color:V.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:"1.1rem"}}>Public register of visas issued by the Department of State — {activeCount} currently active.</div>
    <div style={{display:"flex",gap:"1rem",marginBottom:"1.1rem",flexWrap:"wrap",alignItems:"center"}}><div style={{flex:2,minWidth:200}}><Inp value={search} onChange={setSearch} placeholder="Search holder or nationality…"/></div><CheckBox checked={showExpired} onChange={setShowExpired} label="Show expired"/></div>
    {list.length===0?<div style={{textAlign:"center",padding:"3rem",color:V.textDD,fontStyle:"italic"}}>No issued visas to display.</div>
    :<div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
      {list.map(v=>{const vt=VISA_TYPES.find(t=>t.v===v.type)||VISA_TYPES[0];const vv=visaValidity(v)||{};const exp=vv.state==="expired";return(
        <div key={v.id} style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${vv.color||V.line}`,borderRadius:"0 3px 3px 0",padding:"0.75rem 1.1rem",opacity:exp?.62:1}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:6}}>
            <div style={{lineHeight:1.2}}><div className="pf" style={{fontWeight:700,fontSize:15,color:V.text}}>{v.username||v.name}</div>{v.username&&v.name&&<div className="mono" style={{fontSize:10,color:V.textDD,fontStyle:"italic"}}>{v.name}</div>}</div>
            <span className="mono" style={{fontSize:9,color:V.textD,padding:"2px 8px",background:V.bg2,border:`1px solid ${V.line}`}}>{vt.l}</span>
            {v.nationality&&<span style={{fontSize:12,color:V.textDD,fontStyle:"italic"}}>{v.nationality}</span>}<span style={{flex:1}}/><VisaValidBadge visa={v}/></div>
          <div style={{display:"flex",gap:"1.75rem",flexWrap:"wrap"}}>
            <div><span className="mono" style={{fontSize:8,color:V.textDD,marginRight:6}}>ISSUED</span><span style={{fontSize:13,color:V.text}}>{fmtDate(v.issuedAt)}</span></div>
            <div><span className="mono" style={{fontSize:8,color:V.textDD,marginRight:6}}>VALID UNTIL</span><span style={{fontSize:13,color:exp?V.redL:V.text}}>{v.permanent||v.validUntil==="permanent"?"Permanent":(v.validUntil?fmtDate(v.validUntil):"—")}</span></div></div>
        </div>);})}
    </div>}
  </div>;
}
function VisaForm({countries,onSubmit,notify,user,myCitizenship}){
  const [name,setName]=useState(user?((myCitizenship&&myCitizenship.name)||user.displayName||""):"");
  const [username,setUsername]=useState(user?user.username:"");
  const [nationality,setNationality]=useState(user&&myCitizenship?(myCitizenship.nationality||""):"");
  const [otherCountry,setOtherCountry]=useState("");const [type,setType]=useState("tourist");const [purpose,setPurpose]=useState("");const [duration,setDuration]=useState("");const [notes,setNotes]=useState("");const [saving,setSaving]=useState(false);const [done,setDone]=useState(null);
  const recognised=Object.values(countries||{}).filter(c=>(c.relation==="full"||c.relation==="limited")&&(c.entityType==="state"||c.entityType==="territory")).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const effNat=nationality==="__other"?otherCountry:nationality;
  if(done)return <div style={{maxWidth:480}}>
    <div style={{background:V.panel,border:"1px solid #2a5a2a",borderLeft:`4px solid ${V.greenL}`,borderRadius:"0 3px 3px 0",padding:"1.25rem",marginBottom:"1rem"}}>
      <div className="pf" style={{fontWeight:700,fontSize:14,color:V.greenL,marginBottom:6}}>Application Submitted</div>
      <div style={{fontSize:14,color:V.textD,lineHeight:1.7,marginBottom:"0.5rem"}}>Your reference number is:</div>
      <div className="mono" style={{fontSize:14,color:V.goldL,marginBottom:"0.75rem"}}>{done}</div>
      <div style={{fontSize:13,color:V.textD,fontStyle:"italic"}}>Use the Track Application tab to follow up.</div></div>
    <Btn variant="ghost" onClick={()=>{setDone(null);setName("");setUsername("");setNationality("");setOtherCountry("");setPurpose("");setDuration("");setNotes("");}}>Submit Another</Btn></div>;
  return <div style={{maxWidth:560}}>
    <div style={{fontSize:14,color:V.textD,fontStyle:"italic",lineHeight:1.7,marginBottom:user?"0.75rem":"1.1rem"}}>Complete all required fields. A reference number will be issued upon submission.</div>
    {user&&<div style={{background:V.bg2,border:`1px solid ${V.gold}44`,borderLeft:`3px solid ${V.gold}`,borderRadius:"0 2px 2px 0",padding:"7px 12px",marginBottom:"1.1rem",fontSize:12,color:V.textD}}><span className="mono" style={{fontSize:9,color:V.goldL,marginRight:8}}>PRE-FILLED</span>Details filled from your account ({user.username}). Edit any field if applying on someone else's behalf.</div>}
    <div style={{display:"flex",flexDirection:"column",gap:"0.85rem"}}>
      <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:180}}><FL>Full name *</FL><Inp value={name} onChange={setName} placeholder="Applicant's name"/></div>
        <div style={{flex:1,minWidth:140}}><FL>Account / username *</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
      </div>
      <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180}}><FL>Country of citizenship *</FL>
          {recognised.length>0?<Sel value={nationality} onChange={setNationality} options={[{v:"",l:"— Select —"},...recognised.map(c=>({v:c.name,l:c.name})),{v:"__other",l:"Other / Not Listed"}]}/>:<Inp value={nationality} onChange={setNationality} placeholder="Country"/>}
          {nationality==="__other"&&<div style={{marginTop:4}}><Inp value={otherCountry} onChange={setOtherCountry} placeholder="Enter country name"/></div>}</div>
        <div style={{flex:1,minWidth:160}}><FL>Visa type *</FL><Sel value={type} onChange={setType} options={VISA_TYPES.map(t=>({v:t.v,l:t.l}))}/></div>
      </div>
      <div><FL>Purpose of visit *</FL><TA value={purpose} onChange={setPurpose} rows={3} placeholder="Describe the purpose of your application…"/></div>
      <div><FL>Intended duration</FL><Inp value={duration} onChange={setDuration} placeholder="e.g. 30 days, Permanent"/></div>
      <div><FL>Additional information</FL><TA value={notes} onChange={setNotes} rows={2} placeholder="Anything else relevant…"/></div>
      <Btn variant="gold" disabled={!name.trim()||!username.trim()||!purpose.trim()||!effNat.trim()||saving} onClick={async()=>{
        setSaving(true);const ref="VDX-"+new Date().getFullYear()+"-"+Math.random().toString().slice(2,8).toUpperCase();
        const ok=await onSubmit({name:name.trim(),username:username.trim(),nationality:effNat.trim(),type,purpose:purpose.trim(),duration:duration.trim(),notes:notes.trim(),ref,status:"pending",submitted:Date.now()});
        setSaving(false);if(ok!==false)setDone(ref);else notify("Submission failed.",V.redL);
      }}>{saving?"Submitting…":"Submit Application"}</Btn>
    </div>
  </div>;
}

/* ── PANEL ───────────────────────────────────────────────────────────────── */
function Panel({user,countries,restrictions,visas,citizens,passports,accounts,onAction,notify,setProcessing}){
  const [sec,setSec]=useState("countries");
  const pending=Object.values(visas||{}).filter(v=>v.status==="pending").length;
  const claims=Object.values(citizens||{}).filter(c=>c.claimStatus==="pending").length;

        <div key={p.id} style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${t.cover}`,borderRadius:"0 3px 3px 0",padding:"0.55rem 1rem",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",opacity:revoked?.7:1}}>

          <div style={{flex:1,minWidth:140,lineHeight:1.25}}><span className="pf" style={{fontWeight:700,fontSize:13,color:V.text}}>{p.username||p.name}</span>{p.username&&p.name&&<span className="mono" style={{fontSize:9,color:V.textDD,fontStyle:"italic",marginLeft:8}}>{p.name}</span>}</div>
          <span className="mono" style={{fontSize:9,color:V.goldL}}>{p.number}</span>
          <span className="mono" style={{fontSize:8,color:t.trim,border:`1px solid ${t.trim}44`,padding:"1px 6px",borderRadius:2}}>{t.short}</span>
          <PassValidBadge passport={p}/>
          <Btn small variant="ghost" onClick={()=>setViewing(p)}>View</Btn>
          {revoked?<Btn small variant="gold" onClick={async()=>{setProcessing("Reinstating…");await onAction("updatePassport",{id:p.id,status:"active"});setProcessing(null);notify(p.number+" reinstated.",V.goldL);}}>Reinstate</Btn>
            :<ArmBtn small label="Revoke" confirmLabel="Revoke?" onConfirm={async()=>{setProcessing("Revoking…");await onAction("updatePassport",{id:p.id,status:"revoked"});setProcessing(null);notify(p.number+" revoked.",V.redL);}}/>}
          <ArmBtn small label="Remove" confirmLabel="Delete?" onConfirm={async()=>{setProcessing("Removing…");await onAction("deletePassport",{id:p.id});setProcessing(null);notify("Record removed.",V.textD);}}/>
        </div>);})}
    </div>
  </div>;
}
function PanelCitizenship({citizens,accounts,onAction,notify,setProcessing}){
  const [acct,setAcct]=useState("");const [name,setName]=useState("");const [username,setUsername]=useState("");const [nationality,setNationality]=useState("");const [status,setStatus]=useState("citizen");const [since,setSince]=useState(new Date().toISOString().slice(0,10));const [notes,setNotes]=useState("");const [saving,setSaving]=useState(false);
  const list=Object.values(citizens||{}).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const claims=list.filter(c=>c.claimStatus==="pending");
  const acctOpts=[{v:"",l:"— Manual entry (no account) —"},...((accounts||[]).map(a=>({v:a.username,l:(a.displayName?a.displayName+" ":"")+"@"+a.username})))];
  const pick=u=>{setAcct(u);const a=(accounts||[]).find(x=>x.username===u);if(a){setUsername(a.username);if(!name.trim()||name===username)setName(a.displayName||a.username);}else setUsername("");};
  return <div>
    <span className="pf" style={{fontWeight:700,fontSize:13,color:V.text}}>Citizenship Register</span>
    {claims.length>0&&<div style={{background:"#241c08",border:`1px solid ${V.gold}44`,borderLeft:`3px solid ${V.gold}`,borderRadius:"0 3px 3px 0",padding:"1rem 1.1rem",margin:"0.8rem 0"}}>
      <div className="mono" style={{fontSize:9,color:V.goldL,letterSpacing:"0.1em",marginBottom:"0.7rem"}}>PENDING ACCOUNT CLAIMS ({claims.length})</div>
      {claims.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",padding:"0.5rem 0",borderBottom:`1px solid ${V.line}`}}>
        <span className="pf" style={{fontWeight:700,fontSize:14,color:V.text}}>{c.name}</span>
        <span className="mono" style={{fontSize:11,color:V.textD,flex:1}}>claims account <span style={{color:V.goldL}}>{c.claimedBy}</span></span>
        <Btn small variant="green" onClick={async()=>{setProcessing("Approving…");await onAction("updateCitizen",{id:c.id,username:c.claimedBy,claimedBy:"",claimStatus:""});setProcessing(null);notify(c.name+" linked to "+c.claimedBy+".",V.greenL);}}>Approve</Btn>
        <ArmBtn small label="Reject" confirmLabel="Reject?" onConfirm={async()=>{setProcessing("Rejecting…");await onAction("updateCitizen",{id:c.id,claimedBy:"",claimStatus:""});setProcessing(null);notify("Claim rejected.",V.textD);}}/>
      </div>)}
    </div>}
    <div style={{background:V.bg2,border:`1px solid ${V.line}`,borderRadius:4,padding:"1.1rem",margin:"0.8rem 0 1.1rem"}}>
      <div className="mono" style={{fontSize:9,color:V.textD,letterSpacing:"0.15em",marginBottom:"0.7rem"}}>ADD RECORD</div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
        <div><FL>Link account <span style={{fontStyle:"italic",color:V.textDD,fontSize:9,fontWeight:400,letterSpacing:0}}>(optional — manual for those with no account)</span></FL><Sel value={acct} onChange={pick} options={acctOpts}/></div>
        <div style={{display:"flex",gap:"0.7rem",flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}><FL>Full name</FL><Inp value={name} onChange={setName} placeholder="Name"/></div>
          <div style={{flex:1,minWidth:140}}><FL>Username</FL><Inp value={username} onChange={setUsername} placeholder="Username"/></div>
          <div style={{flex:1,minWidth:140}}><FL>Nationality of origin</FL><Inp value={nationality} onChange={setNationality} placeholder="Origin country"/></div>
        </div>
        <div style={{display:"flex",gap:"0.7rem",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}><FL>Status</FL><Sel value={status} onChange={setStatus} options={CITIZENSHIP_STATUSES.map(s=>({v:s.v,l:s.l}))}/></div>
          <div style={{flex:1,minWidth:140}}><FL>Date granted</FL><Inp value={since} onChange={setSince} type="date"/></div>
          <div style={{flex:2,minWidth:200}}><FL>Notes</FL><Inp value={notes} onChange={setNotes} placeholder="Additional notes…"/></div>
        </div>
        <Btn small variant="gold" disabled={!name.trim()||saving} onClick={async()=>{setSaving(true);setProcessing("Adding…");await onAction("createCitizen",{name:name.trim(),username:username.trim(),nationality:nationality.trim(),status,since,notes:notes.trim()});setProcessing(null);setSaving(false);setAcct("");setName("");setUsername("");setNationality("");setNotes("");notify(name+" added.",V.goldL);}}>{saving?"Adding…":"Add to register"}</Btn>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:4}}>{list.map(c=>{const st=CITIZENSHIP_STATUSES.find(s=>s.v===c.status)||CITIZENSHIP_STATUSES[0];return <CitizenRow key={c.id} citizen={c} st={st} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>;})}</div>
  </div>;
}
function CitizenRow({citizen,st,accounts,onAction,notify,setProcessing}){
  const [open,setOpen]=useState(false);const [status,setStatus]=useState(citizen.status||"citizen");const [uname,setUname]=useState(citizen.username||"");const [notes,setNotes]=useState(citizen.notes||"");const [saving,setSaving]=useState(false);
  const linked=!!(citizen.username&&(accounts||[]).some(a=>a.username.toLowerCase()===citizen.username.toLowerCase()));
  return <div style={{background:V.panel,border:`1px solid ${V.line}`,borderLeft:`4px solid ${st.color}`,borderRadius:"0 3px 3px 0",overflow:"hidden",marginBottom:4}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"0.6rem 1rem",cursor:"pointer",flexWrap:"wrap"}}><span className="mono" style={{fontSize:9,color:st.color,padding:"2px 8px",background:V.bg2,border:`1px solid ${st.color}44`}}>{st.l.toUpperCase()}</span><span className="pf" style={{fontWeight:700,fontSize:14,color:V.text,flex:1}}>{citizen.name}</span>{citizen.claimStatus==="pending"&&<span className="mono" style={{fontSize:8,color:V.goldL,border:`1px solid ${V.gold}44`,borderRadius:2,padding:"1px 6px"}}>CLAIM PENDING</span>}{citizen.username?<span className="mono" style={{fontSize:10,color:linked?"#5aae7a":V.textD}}>{citizen.username}{linked?" ✓":""}</span>:<span className="mono" style={{fontSize:9,color:V.textDD,fontStyle:"italic"}}>unlinked</span>}{citizen.since&&<span className="mono" style={{fontSize:9,color:V.textDD}}>{citizen.since}</span>}<span style={{fontSize:11,color:V.textDD}}>{open?"▲":"▼"}</span></div>
    {open&&<div style={{borderTop:`1px solid ${V.line}`,padding:"0.85rem",background:V.bg2,display:"flex",gap:"0.7rem",flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{flex:1,minWidth:150}}><FL>Status</FL><Sel value={status} onChange={setStatus} options={CITIZENSHIP_STATUSES.map(s=>({v:s.v,l:s.l}))}/></div>
      <div style={{flex:1,minWidth:150}}><FL>Linked username</FL><Inp value={uname} onChange={setUname} placeholder="Account (blank = unlinked)"/></div>
      <div style={{flex:2,minWidth:180}}><FL>Notes</FL><Inp value={notes} onChange={setNotes} placeholder="Notes…"/></div>
      <Btn small variant="gold" disabled={saving} onClick={async()=>{setSaving(true);setProcessing("Updating…");await onAction("updateCitizen",{id:citizen.id,status,username:uname.trim(),notes:notes.trim()});setProcessing(null);setSaving(false);notify(citizen.name+" updated.",V.goldL);}}>{saving?"Saving…":"Save"}</Btn>
      <ArmBtn small label="Remove" confirmLabel="Remove?" onConfirm={async()=>{setProcessing("Removing…");await onAction("deleteCitizen",{id:citizen.id});setProcessing(null);notify(citizen.name+" removed.",V.textD);}}/>
    </div>}
  </div>;
}

/* ── AUTH ────────────────────────────────────────────────────────────────── */
function AuthModal({accounts,onClose,onAuth,notify}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(busy)return;
    if(!u.trim()||!p){setErr("Enter your credentials.");return;}
    setBusy(true);setErr("");
    try{
      const res=await slogin(u,p);
      if(!res.ok){setErr(res.error==="ACCESS DENIED"?"Credentials rejected.":res.error);setBusy(false);return;}
      onAuth(res.account);
    }catch(e){setErr("Connection error.");setBusy(false);}
  };
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(5,10,22,.92)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{maxWidth:400,width:"100%",background:V.panel,border:`1px solid ${V.line}`,borderTop:`3px solid ${V.gold}`,borderRadius:"0 0 5px 5px",padding:"1.7rem"}} onKeyDown={e=>{if(e.key==="Enter")go();}}>
      <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
        <Seal file="state.png" size={56} style={{margin:"0 auto 10px",display:"block"}}/>
        <div className="mono" style={{fontSize:9,letterSpacing:"0.4em",color:V.gold}}>DEPARTMENT OF STATE</div>
        <div className="pf" style={{fontWeight:900,fontSize:20,color:V.text,marginTop:4}}>Sign In</div>
        <div style={{fontSize:13,color:V.textD,fontStyle:"italic",marginTop:6,lineHeight:1.6}}>Use your Republic of Vindex Nation account. Public records are viewable without signing in.</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        <div><FL>Username</FL><Inp value={u} onChange={setU} placeholder="Username"/></div>
        <div><FL>Password</FL><Inp value={p} onChange={setP} type="password" placeholder="Password"/></div>
        {err&&<div className="mono" style={{fontSize:10,color:V.redL,background:"#2a1215",border:`1px solid ${V.redD}66`,padding:"7px 12px",borderRadius:2}}>{err}</div>}
        <Btn variant="gold" onClick={go} disabled={busy}>{busy?"Verifying…":"Sign In"}</Btn>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      </div>
    </div>
  </div>;
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App(){
  const [raw,setRaw]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState("advisories");
  const [user,setUser]=useState(null);
  const [authOpen,setAuthOpen]=useState(false);
  const [toast,setToast]=useState({msg:"",color:V.gold});
  const [processing,setProcessing]=useState(null);
  const notify=useCallback((msg,color=V.gold)=>{setToast({msg,color});setTimeout(()=>setToast(t=>t.msg===msg?{msg:"",color}:t),4000);},[]);

  useEffect(()=>{sgetAll().then(r=>{setRaw(r);setLoaded(true);});},[]);
  // Restore a session signed in on another page (validated server-side), then
  // pull the snapshot again with the token so protected records load too.
  useEffect(()=>{srestore().then(acc=>{if(acc){setUser(acc);sgetAll().then(r=>setRaw(prev=>({...prev,...r})));}});},[]);

  const accounts=useMemo(()=>{
    const out=[];const seen={};
    Object.entries(raw).forEach(([k,v])=>{if(k.startsWith("vx_acc_")&&v&&v.username&&!seen[v.username.toLowerCase()]){seen[v.username.toLowerCase()]=1;out.push(v);}});
    return out.sort((x,y)=>((x.displayName||x.username)||"").localeCompare((y.displayName||y.username)||""));
  },[raw]);
  const countries=useMemo(()=>{const c=raw["vx_state_countries"];return c&&Object.keys(c).length?c:SEED_COUNTRIES;},[raw]);
  const restrictions=useMemo(()=>raw["vx_state_restrictions"]||{},[raw]);
  const visas=useMemo(()=>{const v=raw["vx_state_visas"];return v&&Object.keys(v).length?v:SEED_VISAS;},[raw]);
  const citizens=useMemo(()=>raw["vx_state_citizens"]||{},[raw]);
  const passports=useMemo(()=>{const p=raw["vx_state_passports"];return p&&Object.keys(p).length?p:SEED_PASSPORTS;},[raw]);
  const iCanPanel=canPanel(user);
  const myCitizenship=user?Object.values(citizens).find(c=>(c.username||"").toLowerCase()===user.username.toLowerCase()):null;

  const onAction=useCallback(async(type,p)=>{
    const store=(key,cur,next)=>{setRaw(r=>({...r,[key]:next}));return sset(key,next);};
    if(type==="createCountry"){const id="cty_"+uid();const cur=raw["vx_state_countries"]||countries;const next={...cur,[id]:{...p,id,created:Date.now()}};return store("vx_state_countries",cur,next);}
    if(type==="updateCountry"){const {id,...rest}=p;const cur=raw["vx_state_countries"]||countries;const next={...cur,[id]:{...cur[id],...rest}};return store("vx_state_countries",cur,next);}
    if(type==="deleteCountry"){const cur=raw["vx_state_countries"]||countries;const next={...cur};delete next[p.id];return store("vx_state_countries",cur,next);}
    if(type==="createRestriction"){const id="rst_"+uid();const next={...restrictions,[id]:{...p,id}};return store("vx_state_restrictions",restrictions,next);}
    if(type==="deleteRestriction"){const next={...restrictions};delete next[p.id];return store("vx_state_restrictions",restrictions,next);}
    if(type==="submitVisa"){const id="vis_"+uid();const cur=raw["vx_state_visas"]||{};const next={...cur,[id]:{...p,id}};return store("vx_state_visas",cur,next);}
    if(type==="updateVisa"){const {id,...rest}=p;const cur=raw["vx_state_visas"]||visas;const next={...cur,[id]:{...cur[id],...rest}};return store("vx_state_visas",cur,next);}
    if(type==="createCitizen"){const id="cit_"+uid();const next={...citizens,[id]:{...p,id}};return store("vx_state_citizens",citizens,next);}
    if(type==="updateCitizen"){const {id,...rest}=p;const next={...citizens,[id]:{...citizens[id],...rest}};return store("vx_state_citizens",citizens,next);}
    if(type==="deleteCitizen"){const next={...citizens};delete next[p.id];return store("vx_state_citizens",citizens,next);}
    if(type==="createPassport"){const id="ppt_"+uid();const cur=raw["vx_state_passports"]||{};const next={...cur,[id]:{...p,id}};return store("vx_state_passports",cur,next);}
    if(type==="updatePassport"){const {id,...rest}=p;const cur=raw["vx_state_passports"]||passports;const next={...cur,[id]:{...cur[id],...rest}};return store("vx_state_passports",cur,next);}
    if(type==="deletePassport"){const cur=raw["vx_state_passports"]||passports;const next={...cur};delete next[p.id];return store("vx_state_passports",cur,next);}
  },[raw,countries,restrictions,visas,citizens,passports]);

  const TABS=[
    {v:"advisories",l:"Travel Advisories"},
    {v:"citizenship",l:"Citizenship"},
    {v:"visa",l:"Visas"},
    {v:"passports",l:"Passports"},
    {v:"policy",l:"Foreign Policy"},
    ...(iCanPanel?[{v:"panel",l:"Department Panel"}]:[]),
  ];

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse 80% 45% at 50% -5%, #1c3a6e55, transparent 60%), ${V.bg}`}}>
    <Toast msg={toast.msg} color={toast.color}/>
    <Overlay label={processing}/>
    <div style={{background:`linear-gradient(180deg,${V.navy},${V.bg2})`,borderBottom:`2px solid ${V.gold}55`}}>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0.8rem 1.2rem",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <a href="vindex.html" className="mono" style={{fontSize:8,letterSpacing:"0.1em",color:V.textD,textDecoration:"none",border:`1px solid ${V.line}`,borderRadius:2,padding:"4px 9px",flexShrink:0}}>← GOV PORTAL</a>
        <Seal file="state.png" size={44}/>
        <div style={{flex:1,minWidth:170}}>
          <div className="pf" style={{fontWeight:900,fontSize:16.5,letterSpacing:"0.05em",color:V.text,lineHeight:1.1}}>Department of State</div>
          <div className="mono" style={{fontSize:8,letterSpacing:"0.3em",color:V.gold,marginTop:2}}>REPUBLIC OF VINDEX NATION · E PLURIBUS UNUM</div>
        </div>
        {user?<div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right",lineHeight:1.25}}>
            <div className="pf" style={{fontWeight:700,fontSize:12.5,color:V.text}}>{user.displayName||user.username}</div>
            <div className="mono" style={{fontSize:7.5,letterSpacing:"0.14em",color:iCanPanel?V.goldL:V.textDD}}>{iCanPanel?"DEPARTMENT ACCESS":"SIGNED IN"}</div>
          </div>
          <Btn small variant="ghost" onClick={()=>{forgetSession();setUser(null);if(tab==="panel")setTab("advisories");notify("Signed out.",V.textD);}}>Sign out</Btn>
        </div>:<Btn small variant="gold" onClick={()=>setAuthOpen(true)}>Sign In</Btn>}
      </div>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0 1.2rem",display:"flex",overflowX:"auto"}}>
        {TABS.map(t=>(<button key={t.v} onClick={()=>setTab(t.v)} className="pf" style={{fontWeight:700,fontSize:11.5,letterSpacing:"0.12em",textTransform:"uppercase",padding:"0.7rem 1rem",background:"transparent",border:"none",cursor:"pointer",whiteSpace:"nowrap",borderBottom:`3px solid ${tab===t.v?V.gold:"transparent"}`,color:tab===t.v?V.goldL:V.textD}}>{t.l}</button>))}
      </div>
    </div>

    {/* hero seal */}
    <div style={{maxWidth:1080,margin:"0 auto",padding:"1.5rem 1.2rem 0",textAlign:"center"}}>
      <Seal file="state.png" size={128} style={{margin:"0 auto",display:"block"}}/>
      <div className="mono" style={{fontSize:8.5,letterSpacing:"0.45em",color:V.gold,marginTop:"0.7rem"}}>UNITED IN DIPLOMACY · SECURE IN LIBERTY</div>
    </div>

    <div style={{maxWidth:1080,margin:"0 auto",padding:"0.4rem 1.2rem 3rem"}}>
      {!loaded&&<div style={{textAlign:"center",padding:"4rem"}}><div className="mono" style={{fontSize:10,letterSpacing:"0.35em",color:V.textDD,animation:"pulse 1.4s infinite"}}>LOADING…</div></div>}
      {loaded&&tab==="advisories"&&<AdvisoriesTab countries={countries}/>}
      {loaded&&tab==="citizenship"&&<CitizenshipTab citizens={citizens} user={user} myCitizenship={myCitizenship} onRequireSignIn={()=>setAuthOpen(true)} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
      {loaded&&tab==="visa"&&<VisaTab countries={countries} visas={visas} user={user} myCitizenship={myCitizenship} onAction={onAction} notify={notify}/>}
      {loaded&&tab==="passports"&&<PassportsTab passports={passports} visas={visas}/>}
      {loaded&&tab==="policy"&&<PolicyTab countries={countries} restrictions={restrictions}/>}
      {loaded&&tab==="panel"&&iCanPanel&&<Panel user={user} countries={countries} restrictions={restrictions} visas={visas} citizens={citizens} passports={passports} accounts={accounts} onAction={onAction} notify={notify} setProcessing={setProcessing}/>}
    </div>

    <div style={{borderTop:`1px solid ${V.line}`,padding:"1.1rem 1.2rem 1.5rem"}}>
      <div style={{maxWidth:1080,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div className="mono" style={{fontSize:8.5,letterSpacing:"0.26em",color:V.textDD}}>DEPARTMENT OF STATE · REPUBLIC OF VINDEX NATION · E PLURIBUS UNUM</div>
        <PoweredBy/>
      </div>
    </div>

    {authOpen&&<AuthModal accounts={accounts} notify={notify} onClose={()=>setAuthOpen(false)}
      onAuth={acc=>{setUser(acc);setAuthOpen(false);notify("Signed in as "+(acc.displayName||acc.username)+".",V.goldL);}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
